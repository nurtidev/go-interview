# приватный тренажёр, Go-квизы, личное использование
slug: quiz-string-immutable-index-assign
section: go-internals
title: "Строка неизменяема: присваивание по индексу не компилируется"
difficulty: middle
tags: [string, immutability, runes, compile-error]
question_md: |
  Что выведет этот код (или почему)?

  ```go
  package main

  import "fmt"

  func main() {
    str := "Привет"
    str[2] = 'e'
    fmt.Println(str)
  }
  ```
answer_levels:
  - level: middle
    text_md: |
      Код НЕ компилируется:

      ```
      ./main.go:7:2: cannot assign to str[2] (neither addressable nor a map index expression)
      ```

      Строки в Go неизменяемы: присвоить `str[i] = ...` нельзя. Индексация строки возвращает БАЙТ (значение, не адресуемое), а не изменяемую ячейку. Чтобы поменять символ, строку конвертируют в `[]byte` или `[]rune`, правят и собирают обратно.
  - level: senior
    text_md: |
      `string` — это неизменяемый дескриптор `(ptr, len)`, ссылающийся на read-only байты. `str[i]` — выражение типа `byte`, оно неадресуемо и не является элементом присваивания, поэтому компилятор запрещает `str[i] = x`.

      Второй нюанс — тут кириллица: `"Привет"` в UTF-8 занимает 12 байт (каждая буква — 2 байта), `str[2]` — это СЕРЕДИНА руны «р», один байт, а не символ. Даже разрешив запись, вы бы испортили кодировку. Правильно: `r := []rune(str); r[1] = 'e'; str = string(r)` — по рунам, а не по байтам.
  - level: deep
    text_md: |
      Неизменяемость строк — фундамент: она позволяет безопасно шарить строки без копий (подстроки, ключи map, конкатенация через builder), не боясь мутаций из другого места. `[]byte(s)` и `string(b)` делают КОПИЮ (кроме оптимизаций компилятора в узких случаях вроде `string(b)` как ключа map или в range). Тонкость `[]byte` vs `[]rune`: индексация по байтам ломает многобайтовые руны, а `for i, r := range s` итерирует по рунам с их байтовыми offset'ами и подставляет U+FFFD на невалидный UTF-8. `len(s)` — это байты, а число рун даёт `utf8.RuneCountInString(s)`.
