# приватный тренажёр, Go-квизы, личное использование
slug: quiz-waitgroup-channel-send-deadlock
section: concurrency
title: "WaitGroup ждёт горутины, которые висят на send -> deadlock"
difficulty: senior
tags: [channel, waitgroup, deadlock, unbuffered]
question_md: |
  Что выведет этот код (или почему)? Исправьте все проблемы.

  ```go
  func main() {
    ch := make(chan int)
    wg := &sync.WaitGroup{}
    wg.Add(3)
    for i := 0; i < 3; i++ {
      go func(v int) {
        defer wg.Done()
        ch <- v * v
      }(i)
    }
    wg.Wait()
    var sum int
    for v := range ch {
      sum += v
    }
    fmt.Printf("result: %d\n", sum)
  }
  ```
answer_levels:
  - level: middle
    text_md: |
      Ничего не выведет — упадёт с:

      ```
      fatal error: all goroutines are asleep - deadlock!
      ```

      Канал небуферизованный, а получатель (`for v := range ch`) стоит ПОСЛЕ `wg.Wait()`. Горутины блокируются на `ch <- v*v` (некому принять), поэтому `defer wg.Done()` не выполняется, счётчик WG не обнуляется, `wg.Wait()` висит вечно. Все горутины спят -> рантайм фиксирует deadlock.
  - level: senior
    text_md: |
      Инверсия порядка «жди -> читай». `defer wg.Done()` отработает только когда горутина ВЕРНЁТСЯ, но она застряла на отправке в unbuffered-канал без читателя. Значит `Wait()` и три отправителя блокируют друг друга: классический цикл ожидания. Go-scheduler видит, что ни одна горутина не может продвинуться, и аварийно завершает процесс.

      Даже убрав `Wait()` до чтения, второй баг — `for range ch` без `close(ch)` завис бы после трёх значений, ожидая четвёртого.
  - level: deep
    text_md: |
      Рабочий паттерн — читать конкурентно с записью и закрывать канал по завершении: запустить отправителей, в отдельной горутине `go func(){ wg.Wait(); close(ch) }()`, а в main сделать `for v := range ch { sum += v }`. Тогда `range` получает три значения и штатно выходит на `close`. Ключевые правила: (1) канал закрывает ОТПРАВИТЕЛЬ, ровно один раз; (2) `Wait()` не должен стоять на пути у горутин, которых он ждёт; (3) для unbuffered-канала отправка и приём должны идти конкурентно. Альтернатива без WaitGroup — знать число элементов и делать ровно N приёмов, либо буферизовать канал на 3, чтобы отправители не блокировались (но тогда `range` всё равно нужен `close`).
follow_ups:
  - "Какие именно горутины заблокированы и на какой операции каждая?"
  - "Почему for range ch завис бы даже без проблемы с WaitGroup?"
  - "Как правильно организовать close(ch) относительно wg.Wait()?"
