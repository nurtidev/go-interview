# приватный тренажёр, Go-квизы, личное использование
slug: quiz-send-unbuffered-no-receiver-deadlock
section: concurrency
title: "Отправка в unbuffered-канал до старта получателя"
difficulty: middle
tags: [channel, deadlock, unbuffered, goroutine]
question_md: |
  Будет ошибка, что все горутины заблокированы. Какие горутины будут заблокированы и почему?

  ```go
  package main
  import "fmt"
  func main() {
    ch := make(chan int)
    ch <- 1
    go func() {
      fmt.Println(<-ch)
    }()
  }
  ```
answer_levels:
  - level: middle
    text_md: |
      Упадёт с:

      ```
      fatal error: all goroutines are asleep - deadlock!
      ```

      Заблокирована ОДНА горутина — main, на строке `ch <- 1`. Канал небуферизованный, отправка блокируется до появления получателя. Но горутина-получатель ещё не запущена — она объявлена ПОСЛЕ `ch <- 1`, а main до неё не доходит. Читателя нет, отправка висит вечно, других живых горутин нет -> deadlock.
  - level: senior
    text_md: |
      Отправка в unbuffered-канал — это рандеву: она разблокируется ровно в момент, когда кто-то читает. `ch <- 1` в main блокирует main немедленно. Строка `go func(){...}()` находится ПОСЛЕ и никогда не выполнится, потому что main не продвинулся. То есть горутина-получатель даже не создаётся. Единственная существующая горутина (main) спит на send -> рантайм детектит, что прогресс невозможен, и завершает процесс.

      Фикс: запустить получателя ДО отправки (`go func(){...}(); ch <- 1`) — тогда рандеву состоится.
  - level: deep
    text_md: |
      Deadlock-детектор рантайма срабатывает, только когда СПЯТ ВСЕ горутины (нет ни одной runnable). Если бы в программе крутилась хоть одна не связанная с этим каналом активная горутина, паники «all goroutines asleep» не было бы — main так и висел бы, а процесс не падал (тихий вечный блок, который детектор не ловит). Порядок «сначала запусти читателя, потом пиши» — общее правило для unbuffered-каналов. Альтернатива — буфер: `make(chan int, 1)` позволил бы `ch <- 1` пройти без читателя (значение легло бы в буфер), но тогда горутина-получатель всё равно не успела бы выполниться, т.к. main сразу вышел бы — снова недетерминированный/пустой вывод.
follow_ups:
