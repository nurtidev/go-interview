# приватный тренажёр, Go-квизы, личное использование
slug: quiz-invalid-channel-type-compile-error
section: concurrency
title: "make(char string, 3): несуществующий тип -> ошибка компиляции"
difficulty: middle
tags: [channel, compile-error, syntax]
question_md: |
  Что выведется? Исправьте проблему.

  ```go
  m := make(char string, 3)
  cnt := 5
  for i := 0; i < cnt; i++ {
    go func() {
      m <- fmt.Sprintf("Goroutine %d", i)
    }()
  }
  for i := 0; i < cnt; i++ {
    go ReceiveFromCh(m)
  }
  ```
answer_levels:
  - level: middle
    text_md: |
      Код НЕ компилируется:

      ```
      ./main.go:9:17: syntax error: unexpected name string in argument list; possibly missing comma or )
      ```

      `make(char string, 3)` — бессмыслица: `char` в Go не существует, а `make` для канала пишется `make(chan T, N)`. Компилятор спотыкается о `chan`-подобную конструкцию с опечаткой. Правильно: `m := make(chan string, 5)`.
  - level: senior
    text_md: |
      Автор хотел буферизованный канал строк, но написал `char` вместо `chan` (и `string` как отдельный аргумент). Форма `make` для канала — `make(chan ElemType, capacity)`. После фикса `m := make(chan string, 5)` появляется вторая, уже логическая проблема, ради которой задача и дана: захват переменной цикла `i` в замыкании.

      До Go 1.22 все горутины-отправители делили одну `i` и, стартуя после цикла, видели `i == 5` -> печаталось бы `Goroutine 5` пять раз. Фикс — передать `i` параметром: `go func(i int){ m <- fmt.Sprintf("Goroutine %d", i) }(i)`.
  - level: deep
    text_md: |
      Даже после обоих фиксов есть тонкости синхронизации: `ReceiveFromCh` в отдельных горутинах печатает без ожидания — `main` может выйти раньше, и часть значений не выведется (нужен `WaitGroup`/сбор через канал). С Go 1.22 loop variable стала per-iteration, поэтому баг с `i` там не воспроизводится — но это ловушка, которую всё ещё спрашивают, и в проде на старых версиях она реальна. Про буфер: `cap=5` позволяет пяти отправителям положить значения без блокировки, но порядок доставки при конкурентном приёме недетерминирован; для сохранения порядка нужен один потребитель, читающий канал последовательно, или индексация результатов.
