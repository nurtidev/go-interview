# приватный тренажёр, Go-квизы, личное использование
slug: quiz-method-set-value-pointer-receiver
section: go-internals
title: "Method set: вызов pointer-метода на неадресуемом значении"
difficulty: senior
tags: [method-set, receiver, addressability, compile-error]
question_md: |
  Какие строки компилируются, а какие нет и почему?

  ```go
  package main

  type T []int
  func (T) X(){}
  func (*T) Z(){}

  func main() {
    var t T
    t.X() // 1
    t.Z() // 2
    var p = &t
    p.X() // 3
    p.Z() // 4
    T{}.X() // 5
    T{}.Z() // 6
  }
  ```
answer_levels:
  - level: middle
    text_md: |
      Код НЕ компилируется — ошибка ровно на строке 6:

      ```
      ./main.go:16:6: cannot call pointer method Z on T
      ```

      Строки 1-5 корректны. Проблема только с `T{}.Z()`: `Z` имеет pointer-receiver `(*T)`, а `T{}` — composite literal, значение НЕадресуемое, взять `&T{}` нельзя, поэтому pointer-метод вызвать нельзя.
  - level: senior
    text_md: |
      Правило: метод с value-receiver можно звать и на значении, и на указателе; метод с pointer-receiver — только если получатель АДРЕСУЕМ (компилятор сам берёт `&`).

      - 1 `t.X()`: value-метод на переменной — ok.
      - 2 `t.Z()`: pointer-метод, но `t` — адресуемая переменная -> авто `(&t).Z()` — ok.
      - 3 `p.X()`: value-метод через указатель -> авто `(*p).X()` — ok.
      - 4 `p.Z()`: pointer-метод на указателе — ok.
      - 5 `T{}.X()`: value-метод на неадресуемом литерале — ok (value-методу адресуемость не нужна).
      - 6 `T{}.Z()`: pointer-метод на неадресуемом `T{}` -> нельзя взять адрес -> ошибка компиляции.
  - level: deep
    text_md: |
      Ключевое различие method set по спецификации: method set типа `T` включает методы с receiver `T`; method set `*T` включает методы и с `T`, и с `*T`. «Автовзятие адреса» для pointer-метода — синтаксический сахар, работающий ТОЛЬКО когда операнд адресуем (переменная, элемент slice, разыменование указателя, поле адресуемой структуры). Неадресуемы: литералы (`T{}`), результаты вызова функций, элементы map, значения в интерфейсе. Практическое следствие: если тип реализует интерфейс методами с pointer-receiver, то интерфейсу удовлетворяет `*T`, а НЕ `T` — попытка `var i I = T{}` не скомпилируется, тогда как `var i I = &t` — да. Это же объясняет, почему нельзя вызвать pointer-метод на элементе map (`m[k].Z()`).
