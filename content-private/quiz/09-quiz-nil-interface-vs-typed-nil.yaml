# приватный тренажёр, Go-квизы, личное использование
slug: quiz-nil-interface-vs-typed-nil
section: go-internals
title: "nil-интерфейс vs типизированный nil-указатель"
difficulty: senior
tags: [interface, nil, iface, eface]
question_md: |
  Что выведет этот код (или почему)?

  ```go
  type impl struct{}

  type I interface {
    C()
  }

  func (*impl) C() {}

  func A() I {
    return nil
  }
  func B() I {
    var ret *impl
    return ret
  }

  func main() {
    a := A()
    b := B()
    fmt.Println(a == b)
  }
  ```
answer_levels:
  - level: middle
    text_md: |
      Выведет `false`.

      `A()` возвращает настоящий nil-интерфейс: оба внутренних слова (тип и значение) нулевые. `B()` возвращает `*impl`, равный nil, но «завёрнутый» в интерфейс `I`: тип есть (`*impl`), значение — nil-указатель. Интерфейс с непустым типом уже НЕ равен nil-интерфейсу. Поэтому `a != b`, и печатается `false`. Отдельно: `a == nil` -> true, `b == nil` -> false.
  - level: senior
    text_md: |
      Непустой интерфейс — это пара `(itab, data)` (`runtime.iface`): `itab` кодирует динамический тип + таблицу методов, `data` — указатель на значение. Интерфейс равен `nil`, только когда ОБА слова нулевые.

      `A()` кладёт литеральный `nil` -> `(nil, nil)`. `B()` присваивает интерфейсу `(*impl)(nil)`: `itab` становится непустым (тип `*impl`), `data == nil`. Сравнение `a == b` сравнивает пары: у `a` `itab==nil`, у `b` `itab!=nil` -> не равны -> `false`. Это же ловушка `if err != nil`, когда возвращают конкретный `*MyError`(nil) как `error`.
  - level: deep
    text_md: |
      Классический баг: функция объявляет `var e *MyError; ...; return e` с типом возврата `error`. Даже если `e == nil`, вызывающий `if err != nil` увидит true, потому что интерфейс несёт тип `*MyError`. Лечится возвратом явного `nil` (`return nil`), а не типизированного указателя. Тонкость сравнимости: интерфейсы сравнимы, если сравнимы их динамические типы; если под интерфейсом лежит несравнимый тип (slice/map/func) и оба непустые — сравнение паникует в рантайме. Здесь до этого не доходит, т.к. `data==nil`, но знать про это стоит. Также `pointer`-receiver у `C()` означает, что method set `I` реализует `*impl`, а не `impl` — почему `var ret *impl` и работает как `I`.
follow_ups:
