# приватный тренажёр, Go-квизы, личное использование
slug: quiz-mutex-counter-10000-goroutines
section: concurrency
title: "10000 горутин с mutex-счётчиком: что и за сколько"
difficulty: middle
tags: [waitgroup, mutex, goroutine, concurrency]
question_md: |
  Что выведет на экран и сколько времени будет работать? Как ускорить?

  ```go
  const numRequests = 10000

  var count int
  var m sync.Mutex

  func networkRequest() {
    time.Sleep(time.Millisecond) // Эмуляция сетевого запроса.
    m.Lock()
    count++
    m.Unlock()
  }

  func main() {
    var wg sync.WaitGroup
    wg.Add(numRequests)
    for i := 0; i < numRequests; i++ {
      go func() {
        defer wg.Done()
        networkRequest()
      }()
    }
    wg.Wait()
    fmt.Println(count)
  }
  ```
answer_levels:
  - level: middle
    text_md: |
      Выведет `10000` — детерминированно. Счётчик защищён мьютексом (без гонки), а `wg.Wait()` дожидается всех 10000 горутин перед печатью.

      Работать будет НЕ 10000 мс, а ~единицы-десятки миллисекунд: все горутины запускаются практически одновременно, их `time.Sleep(1ms)` идут ПАРАЛЛЕЛЬНО, а не последовательно. На тестовой машине — около 8 мс.
  - level: senior
    text_md: |
      Ключевая идея: 10000 горутин дёшевы (стек ~2-8 КБ, мультиплексируются на GOMAXPROCS потоков), поэтому 10000 однопоточных `Sleep(1ms)` перекрываются во времени -> общее время близко к одному `Sleep` плюс накладные расходы планировщика и contention на мьютексе. Мьютекс держится наносекунды (только `count++`), так что он почти не сериализует.

      Здесь код УЖЕ параллелен и корректен. «Ускорить» относительно наивной последовательной версии (10 секунд) — как раз и означает «запускать сетевые вызовы конкурентно», что тут сделано.
  - level: deep
    text_md: |
      Если бы `networkRequest` был реальным сетевым вызовом, всплыли бы проблемы, которых нет в эмуляции: (1) 10000 одновременных соединений упрутся в лимиты ОС (ulimit/файловые дескрипторы, эфемерные порты), лимиты пула HTTP-клиента и удалённого сервиса; (2) без таймаута/контекста зависший вызов держит горутину и ресурс неопределённо долго; (3) нет backpressure — всплеск нагрузки убьёт и клиента, и сервер. Решение — ОГРАНИЧИТЬ конкурентность: worker pool или семафор (`make(chan struct{}, N)`) на N одновременных запросов, `context.WithTimeout` на каждый вызов, ретраи с джиттером. Про мьютекс: на 10000 инкрементов `atomic.AddInt64` был бы дешевле (нет park/unpark при contention), но на таком коротком критическом участке разница мала. Если «url мало, а запросов много» — кешировать/дедуплицировать ответы (singleflight), а не бить по сети каждый раз.
