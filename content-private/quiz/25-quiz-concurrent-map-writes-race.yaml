# приватный тренажёр, Go-квизы, личное использование
slug: quiz-concurrent-map-writes-race
section: concurrency
title: "Три горутины пишут x[1]: concurrent map writes"
difficulty: senior
tags: [data-race, map, nondeterministic, sleep-sync]
question_md: |
  Что выведется? Исправьте проблему.

  ```go
  x := make(map[int]int, 1)
  go func() { x[1] = 2 }()
  go func() { x[1] = 7 }()
  go func() { x[1] = 10 }()
  time.Sleep(100 * time.Millisecond)
  fmt.Println("x[1] =", x[1])
  ```
answer_levels:
  - level: middle
    text_md: |
      Вывод НЕДЕТЕРМИНИРОВАН — это data race на map с конкурентной записью. Возможны два исхода:

      - процесс падает: `fatal error: concurrent map writes` (рантайм ловит одновременную запись);
      - либо печатает `x[1] = 2`, `x[1] = 7` или `x[1] = 10` — какое из трёх присваиваний оказалось последним.

      На тестовой машине из 10 запусков ~6 упали с `concurrent map writes`, остальные напечатали 2 или 10. Под `-race` — `WARNING: DATA RACE`.
  - level: senior
    text_md: |
      `time.Sleep` — это НЕ синхронизация: он лишь даёт горутинам время, но не устанавливает happens-before и не защищает map. Запись в map (`mapassign`) выставляет внутренний флаг `hashWriting`; если другая горутина входит в запись и видит флаг — рантайм делает `throw("concurrent map writes")` (best-effort детектор, поэтому падает не всегда). Даже когда не падает, итоговое значение — гонка: побеждает произвольная запись.

      Фикс: сериализовать доступ — `sync.Mutex` вокруг `x[1] = ...`, или `sync.Map`, или свести запись к одной горутине. И заменить `Sleep` на `WaitGroup` для корректного ожидания.
  - level: deep
    text_md: |
      Три отдельные проблемы часто путают: (1) синхронизация ЗАВЕРШЕНИЯ (тут её нет — `Sleep` вместо `WaitGroup`); (2) взаимное исключение ДОСТУПА (тут его нет — гонка на map); (3) детектор `concurrent map writes` — это НЕ гарантия падения, а эвристика по флагу, поэтому баг «мигает» и на CI без `-race` может не воспроизвестись. Почему запись важнее чтения: конкурентные ЧТЕНИЯ map безопасны, но чтение одновременно с записью — уже гонка (может вернуть мусор/паникнуть). Поэтому даже read-mostly кэш требует `RWMutex` или `sync.Map`. Практический вывод: единственный надёжный способ поймать такие баги до прода — запускать тесты с `-race`, а не полагаться на рантаймовый детектор.
follow_ups:
