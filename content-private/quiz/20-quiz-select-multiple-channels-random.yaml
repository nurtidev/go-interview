# приватный тренажёр, Go-квизы, личное использование
slug: quiz-select-multiple-channels-random
section: concurrency
title: "select из трёх каналов: какой сработает?"
difficulty: senior
tags: [select, channel, nondeterministic, scheduler]
question_md: |
  Как будет работать код? Как сделать, чтобы срабатывал только первый `ch`?

  ```go
  func main() {
    ch := make(chan bool)
    ch2 := make(chan bool)
    ch3 := make(chan bool)
    go func() { ch <- true }()
    go func() { ch2 <- true }()
    go func() { ch3 <- true }()

    select {
    case <-ch:
      fmt.Printf("val from ch")
    case <-ch2:
      fmt.Printf("val from ch2")
    case <-ch3:
      fmt.Printf("val from ch3")
    }
  }
  ```
answer_levels:
  - level: middle
    text_md: |
      Печатается РОВНО ОДНА строка — какая именно, не определено. `select` выбирает среди готовых case'ов; три горутины пишут в три разных канала, `select` заберёт значение из того, что оказался готов, и выйдет (остальные две горутины останутся висеть на своих send, но main уже завершится).

      Вывод недетерминирован: `val from ch`, `val from ch2` или `val from ch3` — по запуску. (На тестовой машине из-за особенностей планировщика почти всегда выпадало `val from ch3`, но полагаться на это НЕЛЬЗЯ.)
  - level: senior
    text_md: |
      Семантика `select`: если готово несколько case'ов, выбирается один равновероятным псевдослучайным выбором; если не готов ни один (и нет `default`) — блокировка до первого готового. Здесь каналы unbuffered, отправители блокируются, пока `select` их не заберёт, так что «готовность» определяется тем, какую горутину планировщик успел довести до операции send к моменту `select`.

      Почему на практике часто один и тот же канал: горутины кладутся в очередь планировщика, и слот `runnext` работает LIFO — последняя созданная горутина (пишущая в `ch3`) запускается первой и первой доходит до рандеву. Это деталь реализации, не гарантия.
  - level: deep
    text_md: |
      «Выводить только первый ch» — задача на приоритет, которого у `select` НЕТ (он честно случаен). Приоритет эмулируют вложенным select с `default`: сначала `select { case <-ch: ...; default: }`, и только если `ch` пуст — общий `select` по остальным; либо двухуровневая схема, где ветка `ch` перепроверяется первой. Ещё нюансы: `case` с nil-каналом никогда не готов (приём/отправка в nil-канал блокируются вечно) — этим «отключают» ветки динамически; `select{}` без case'ов блокирует навсегда; `default` делает select неблокирующим. Псевдослучайность выбора намеренна — она предотвращает starvation каналов при постоянной готовности нескольких веток.
