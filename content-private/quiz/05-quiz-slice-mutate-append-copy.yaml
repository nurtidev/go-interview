# приватный тренажёр, Go-квизы, личное использование
slug: quiz-slice-mutate-append-copy
section: go-internals
title: "Мутация элемента виден, append — нет"
difficulty: middle
tags: [slice, append, mutation, cap]
question_md: |
  Что выведет этот код (или почему)?

  ```go
  mutate := func(a []int) {
    a[0] = 0
    a = append(a, 1)
    fmt.Println(a)
  }
  a := []int{1, 2, 3, 4}
  mutate(a)
  fmt.Println(a)
  ```
answer_levels:
  - level: middle
    text_md: |
      Выведет:

      ```
      [0 2 3 4 1]
      [0 2 3 4]
      ```

      Внутри `mutate`: `a[0] = 0` меняет элемент общего backing array — это видно снаружи. Затем `append(a, 1)` при `len==cap==4` реаллоцирует новый массив `[0 2 3 4 1]` и печатает его. Снаружи же исходный `a` — это старый массив с уже изменённым первым элементом: `[0 2 3 4]`.
  - level: senior
    text_md: |
      Два разных типа изменений через копию дескриптора: мутация ЭЛЕМЕНТА (`a[0]=0`) пишет в backing по общему указателю -> видно у вызывающего; рост slice (`append` при `len==cap`) создаёт новый backing и меняет только локальный `ptr` -> у вызывающего остаётся старый массив.

      Порядок важен: `a[0]=0` выполняется ДО реаллокации, ещё по общему массиву, поэтому `0` «просачивается» наружу. `append` уже работает с новым массивом, и `1` наружу не идёт.
  - level: deep
    text_md: |
      Результат чувствителен к `cap`. Здесь `cap==4`, реаллокация гарантирована. Если бы было `a := make([]int, 4, 8)`, `append` записал бы `1` в `a[4]` ТОГО ЖЕ backing; снаружи `len` остался бы 4 (`[0 2 3 4]`, `1` невидим через внешнюю переменную), но данные `1` уже сидели бы в общей памяти и «всплыли» бы при следующем append у вызывающего. То есть по внешнему выводу `[0 2 3 4]` нельзя понять, была реаллокация или нет — а поведение при дальнейшей работе разное. Это источник трудноуловимых багов; лечится full slice expression или явным копированием.
follow_ups:
