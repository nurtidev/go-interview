# приватный тренажёр, Go-квизы, личное использование
slug: quiz-slice-len-cap-append-variants
section: go-internals
title: "Четыре варианта mod(slice): когда append рвёт связь"
difficulty: senior
tags: [slice, append, cap, aliasing]
question_md: |
  Что выведет каждый из вариантов (и почему)?

  ```go
  // Вариант 1
  func mod(a []int) {
    for i := range a { a[i] = 5 }
    fmt.Println(a)
  }
  func main() {
    sl := []int{1, 2, 3, 5}
    mod(sl)
    fmt.Println(sl)
  }

  // Вариант 2
  func mod(a []int) {
    for i := range a { a[i] = 5 }
    fmt.Println(a)
  }
  func main() {
    sl := make([]int, 4, 8)
    sl[0], sl[1], sl[2], sl[3] = 1, 2, 3, 5
    mod(sl)
    fmt.Println(sl)
  }

  // Вариант 3
  func mod(a []int) {
    a = append(a, 125)
    for i := range a { a[i] = 5 }
    fmt.Println(a)
  }
  func main() {
    sl := make([]int, 4, 8)
    sl[0], sl[1], sl[2], sl[3] = 1, 2, 3, 5
    mod(sl)
    fmt.Println(sl)
  }

  // Вариант 4
  func mod(a []int) {
    a = append(a, 125)
    for i := range a { a[i] = 5 }
    fmt.Println(a)
  }
  func main() {
    sl := []int{1, 2, 3, 4, 5}
    mod(sl)
    fmt.Println(sl)
  }
  ```
answer_levels:
  - level: middle
    text_md: |
      - **Вариант 1:** `[5 5 5 5]` / `[5 5 5 5]`. Только мутация элементов по общему backing — видно снаружи.
      - **Вариант 2:** `[5 5 5 5]` / `[5 5 5 5]`. То же самое; `cap=8` тут ни на что не влияет, append нет.
      - **Вариант 3:** `[5 5 5 5 5]` / `[5 5 5 5]`. `append(a,125)` при `cap=8>len=4` пишет в тот же backing (без реаллокации), затем всё превращается в 5. Внутри `len=5` -> печатает пять пятёрок; снаружи `len(sl)=4` -> четыре (пятый элемент физически в общем массиве, но невидим через `sl`).
      - **Вариант 4:** `[5 5 5 5 5 5]` / `[1 2 3 4 5]`. Тут `len==cap==5`, `append` РЕАЛЛОЦИРУЕТ -> `mod` работает с новым массивом, снаружи `sl` не тронут.
  - level: senior
    text_md: |
      Всё сводится к соотношению `len`/`cap` в момент append и к тому, что элементные записи идут по общему указателю, а рост дескриптора — по локальной копии.

      В 1 и 2 append нет — цикл переписывает существующие элементы общего массива, снаружи видно. Разница `cap` 4 vs 8 не проявляется.

      В 3 у `sl` есть запас (`cap=8`), поэтому `append(a,125)` НЕ реаллоцирует: пишет `125` в `a[4]` общего массива, `len(a)` локально становится 5. Цикл ставит все в 5, включая `a[4]`. `mod` печатает `[5 5 5 5 5]`. У вызывающего `len(sl)` остался 4, поэтому `Println(sl)` показывает `[5 5 5 5]` — хотя в общей памяти пятый слот тоже 5.

      В 4 `sl` литерал из 5 элементов -> `len==cap==5`. `append` реаллоцирует, `mod` уходит на новый массив; исходный `sl` вообще не меняется -> `[1 2 3 4 5]`.
  - level: deep
    text_md: |
      Вариант 3 — самый коварный: снаружи `[5 5 5 5]` создаёт иллюзию, что append «не подействовал», хотя на самом деле пятый пятёрочный элемент лежит в общем backing и всплывёт, если вызывающий сам сделает `sl = append(sl, x)` — он затрёт этот слот, но факт разделяемой памяти остаётся. Различие вариантов 3 и 4 держится исключительно на `cap` (8 против 5), а `cap` после append ещё и округляется `roundupsize` под size-class аллокатора, поэтому «есть/нет реаллокации» нельзя надёжно предсказать в общем случае. Отсюда правило: не полагайтесь на shared backing; хотите изоляцию — `a[:len:len]` или `copy`.
