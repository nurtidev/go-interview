# приватный тренажёр, Go-квизы, личное использование
slug: quiz-concurrent-map-global-race
section: concurrency
title: "wg.Done() в начале горутины + гонка на глобальных map и int"
difficulty: senior
tags: [data-race, map, waitgroup, nondeterministic]
question_md: |
  Что выведет этот код и как исправить?

  ```go
  var globalMap = map[string][]int{"test": {}, "test2": {}, "test3": {}}
  var a = 0

  func main() {
    wg := sync.WaitGroup{}
    wg.Add(3)
    go func() {
      wg.Done()
      a = 10
      globalMap["test"] = append(globalMap["test"], a)
    }()
    go func() {
      wg.Done()
      a = 11
      globalMap["test2"] = append(globalMap["test2"], a)
    }()
    go func() {
      wg.Done()
      a = 12
      globalMap["test3"] = append(globalMap["test3"], a)
    }()
    wg.Wait()
    fmt.Printf("%v", globalMap)
    fmt.Printf("%d", a)
  }
  ```
answer_levels:
  - level: middle
    text_md: |
      Вывод НЕДЕТЕРМИНИРОВАН — в коде data race. Два дефекта: (1) `wg.Done()` вызывается в НАЧАЛЕ каждой горутины, поэтому `wg.Wait()` может разблокироваться до того, как горутины запишут в map; (2) горутины конкурентно пишут в общую map и в общую переменную `a` без синхронизации.

      Под `-race` рантайм печатает `WARNING: DATA RACE`. Без него чаще всего выходит что-то вроде `map[test:[10] test2:[11] test3:[12]]` и `a` = 10/11/12 (по запуску), но встречаются и «неправильные» значения в слайсах (например `test:[12]`), потому что `a` перезаписывается другой горутиной ДО append. Возможен и `fatal error: concurrent map writes`.
  - level: senior
    text_md: |
      `wg.Done()` в первой строке горутины ломает смысл WaitGroup: он должен отмечать ЗАВЕРШЕНИЕ работы, а не старт. Из-за этого `Wait()` не гарантирует, что записи выполнены — возможна печать частичной/пустой map.

      Гонок две. Первая — на `a`: `a = 10` и `append(..., a)` не атомарны вместе, между ними другая горутина может выставить `a = 12`, и в `test` попадёт 12. Вторая — на самой map: `append`-присваивание по ключу — это запись в `hmap`; конкурентные записи (даже по разным ключам) не защищены и детектируются рантаймом как `concurrent map writes` (может уронить процесс).

      Фикс: `defer wg.Done()` в КОНЦЕ; убрать общую `a` (сделать локальной в каждой горутине); защитить map мьютексом или писать в разные структуры и сливать после `Wait()`.
  - level: deep
    text_md: |
      Даже запись по РАЗНЫМ ключам одной map небезопасна: `mapassign` трогает общие поля `hmap` (count, флаги, возможный рост/эвакуация бакетов), поэтому «разные ключи» не спасают — нужен внешний мьютекс либо `sync.Map` (последняя оптимизирована под непересекающиеся ключи и read-heavy паттерны). Рантаймовый детектор `concurrent map writes` — best-effort (проверяет флаг `hashWriting`), поэтому «иногда падает, иногда нет»; надёжно ловит только `-race`. Про `a`: даже если бы это был счётчик, `a++` не атомарен — нужен `sync/atomic` или мьютекс. Правильный дизайн: никакого общего мутабельного состояния между горутинами без синхронизации; результаты собираются через канал или защищённую агрегирующую структуру после корректного `Wait()`.
