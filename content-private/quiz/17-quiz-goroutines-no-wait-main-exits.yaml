# приватный тренажёр, Go-квизы, личное использование
slug: quiz-goroutines-no-wait-main-exits
section: concurrency
title: "5000 горутин без ожидания: main выходит раньше"
difficulty: middle
tags: [goroutine, scheduler, nondeterministic, main-exit]
question_md: |
  Что выведет этот код (или почему)? Должны выводиться все значения.

  ```go
  func main() {
    a := 5000
    for i := 0; i < a; i++ {
      go fmt.Println(i)
    }
  }
  ```
answer_levels:
  - level: middle
    text_md: |
      Вывод НЕДЕТЕРМИНИРОВАН. Программа не ждёт горутины: как только `main` возвращается, процесс завершается и невыполнившиеся `go fmt.Println(i)` просто не успевают отработать. Гарантий нет — от «ничего не напечатано» до «часть чисел в произвольном порядке».

      На тестовой машине (`go run`, GOMAXPROCS>1) успевало напечататься ~1500-1900 из 5000, порядок перемешан. На другой машине/запуске может быть 0 или почти все. Чтобы вывести ВСЕ — надо дождаться горутин.
  - level: senior
    text_md: |
      Три источника неопределённости: (1) `main` не синхронизируется с горутинами — выход из `main` = `os.Exit`, живые горутины убиваются на месте; (2) сколько успеет выполниться, зависит от планировщика, числа P (GOMAXPROCS) и того, сколько времени `main` тратит на запуск 5000 горутин; (3) порядок вывода произволен, т.к. горутины бегут параллельно и `fmt.Println` лишь атомарен на уровне одной записи в stdout.

      Фикс: `var wg sync.WaitGroup; wg.Add(a); for i...{ go func(i int){ defer wg.Done(); fmt.Println(i) }(i) }; wg.Wait()`. Это гарантирует, что все отработают (порядок всё равно произвольный).
  - level: deep
    text_md: |
      Почему «на бумаге ноль, а на практике полторы тысячи»? При `go run` есть задержка старта, а планировщик успевает раскидать горутины по нескольким P до того, как `main` дойдёт до конца цикла и вернётся — поэтому и печатается много. Это иллюстрирует, что «выводить один вывод как истину» для такого кода нельзя. Тонкости фикса: захват `i` — до Go 1.22 нужно было передавать `i` параметром или копировать (`i := i`), иначе все горутины видели финальное `i` (общая loop-var); с Go 1.22 loop variable своя на итерацию. Если нужен ещё и ПОРЯДОК вывода — одних горутин мало: собирают результаты в срез по индексу или сериализуют через канал/мьютекс.
