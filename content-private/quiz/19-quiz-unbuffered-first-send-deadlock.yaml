# приватный тренажёр, Go-квизы, личное использование
slug: quiz-unbuffered-first-send-deadlock
section: concurrency
title: "ch <- true в main блокирует до любого получателя"
difficulty: middle
tags: [channel, deadlock, unbuffered]
question_md: |
  Как это работает, что не так, что поправить?

  ```go
  func main() {
    ch := make(chan bool)
    ch <- true
    go func() {
      <-ch
    }()
    ch <- true
  }
  ```
answer_levels:
  - level: middle
    text_md: |
      Упадёт сразу:

      ```
      fatal error: all goroutines are asleep - deadlock!
      ```

      Блокируется main на ПЕРВОЙ же строке `ch <- true`: канал небуферизованный, получателя нет (горутина-читатель объявлена ниже и не запустится, пока main висит). До `go func(){...}` и до второй отправки выполнение не доходит. Единственная горутина спит на send -> deadlock.
  - level: senior
    text_md: |
      Логика автора, видимо: «первую отправку заберёт горутина, вторую — что-то ещё». Но обе отправки — синхронные рандеву, а получатель запускается СТРОКОЙ НИЖЕ первой отправки, до которой поток управления не доходит. Даже если мысленно переставить: одна горутина-читатель может обслужить только один `<-ch`, а отправок две -> вторая всё равно повисла бы. То есть баланс send/recv нарушен и по порядку, и по количеству.

      Минимальный рабочий вариант: запустить читателя(-ей) ДО отправок и обеспечить столько приёмов, сколько отправок (`go func(){ <-ch; <-ch }(); ch <- true; ch <- true`), либо буферизовать канал.
  - level: deep
    text_md: |
      Здесь два независимых дефекта: (1) порядок — отправка раньше, чем существует получатель; (2) арность — две отправки против одного приёма. Разные фиксы дают разное поведение: буфер `make(chan bool, 2)` уберёт блокировку отправок, но горутина-читатель всё равно может не успеть до выхода main -> её приём не гарантирован. Синхронный вариант с двумя приёмами в отдельной горутине корректнее, но требует, чтобы main дождался её (иначе после второй отправки main выйдет, и `<-ch` во второй раз может не выполниться — впрочем, обе отправки к этому моменту уже прошли рандеву). Общий принцип: у unbuffered-канала число успешных send строго равно числу recv, и они должны идти конкурентно.
follow_ups:
