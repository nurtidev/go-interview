# приватный тренажёр, Go-квизы, личное использование
slug: quiz-defer-loop-lifo
section: go-internals
title: "defer в цикле: порядок LIFO"
difficulty: middle
tags: [defer, lifo, evaluation]
question_md: |
  Что выведет этот код (или почему)?

  ```go
  func main() {
    fmt.Println("start")
    for i := 1; i < 4; i++ {
      defer fmt.Println(i)
    }
    fmt.Println("end")
  }
  ```
answer_levels:
  - level: middle
    text_md: |
      Выведет:

      ```
      start
      end
      3
      2
      1
      ```

      `defer` откладывает вызовы на момент выхода из функции и выполняет их в порядке LIFO (стек): последний отложенный — первым. В цикле отложились `Println(1)`, `Println(2)`, `Println(3)`. После `end` они срабатывают в обратном порядке: `3 2 1`.
  - level: senior
    text_md: |
      Два момента. Первый — порядок: отложенные вызовы кладутся в связанный список/стек горутины и при возврате из функции разматываются LIFO. Второй, важнее, — аргументы `defer` вычисляются НЕМЕДЛЕННО в момент выполнения `defer`, а не при вызове. Поэтому `defer fmt.Println(i)` фиксирует ТЕКУЩЕЕ значение `i` (1, 2, 3), а не финальное. Итог `3 2 1` — следствие LIFO над уже зафиксированными 1,2,3.

      Если бы аргумент вычислялся лениво (как в замыкании `defer func(){ fmt.Println(i) }()`), результат зависел бы от финального `i`.
  - level: deep
    text_md: |
      Разница между `defer fmt.Println(i)` и `defer func(){ fmt.Println(i) }()` — историческая ловушка. До Go 1.22 замыкание захватывало переменную цикла `i` по ссылке, и на момент выхода все три замыкания видели `i==4` (loop-var шарилась) -> печаталось `4 4 4`. С Go 1.22 семантика loop variable изменилась: `i` теперь новая на каждой итерации, поэтому замыкание напечатало бы `3 2 1`, как и прямой `defer`. В нашем коде аргумент вычисляется сразу, так что поведение стабильно `3 2 1` во всех версиях. Ещё нюанс: `defer` в горячем цикле копит записи до конца функции — в длинном цикле это утечка/задержка освобождения ресурсов; для per-iteration cleanup выносят тело в отдельную функцию.
