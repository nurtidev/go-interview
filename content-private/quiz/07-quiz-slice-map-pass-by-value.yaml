# приватный тренажёр, Go-квизы, личное использование
slug: quiz-slice-map-pass-by-value
section: go-internals
title: "slice и map как аргументы: append vs запись в map"
difficulty: senior
tags: [slice, map, append, panic]
question_md: |
  Что выведет этот код (или почему)? Что произойдёт в `println` для слайса и для мапы?

  ```go
  func a(s []int) {
    s = append(s, 37)
  }

  func b(m map[int]int) {
    m[3] = 33
  }

  func main() {
    s := make([]int, 3, 8)
    m := make(map[int]int, 8)

    a(s)
    println(s[3]) //?

    b(m)
    println(m[3]) //?
  }
  ```
answer_levels:
  - level: middle
    text_md: |
      Программа упадёт с паникой на строке `println(s[3])`:

      ```
      panic: runtime error: index out of range [3] with length 3
      ```

      Внутри `a` `append(s, 37)` при `cap=8` пишет `37` в backing по индексу 3, но `len` растёт только у локальной копии `s`. У `main` `len(s)` остаётся 3, а индексация `s[3]` проверяется по `len`, не по `cap` -> выход за границы -> паника.

      Строка про map до выполнения не доходит, но если бы дошла — `println(m[3])` дал бы `33`: map передаётся как указатель на `hmap`, запись `m[3]=33` видна снаружи.
  - level: senior
    text_md: |
      Контраст двух reference-подобных типов. Slice — дескриптор по значению: `append` в `a` мутирует общий backing (кладёт `37` в слот 3), но новый `len=4` остаётся в локальной копии. Индексация `s[i]` в рантайме проверяется против `len`, а не `cap`: `s[3]` при `len=3` -> `panic: index out of range`. Данные `37` физически в памяти есть, но легально недоступны через `s`.

      Map — это указатель на `runtime.hmap`; копия аргумента указывает на тот же `hmap`, поэтому `m[3]=33` в `b` видна в `main`. Никакого «переприсваивания», как со slice, не нужно.
  - level: deep
    text_md: |
      Тонкость: индексация именно по `len`, а не по `cap`, — сознательное решение (иначе можно было бы читать неинициализированный/чужой хвост). Чтобы «увидеть» appended-элемент, нужно вернуть slice наружу (`s = a(s)`) или переслайсить `s[:4]` — но тогда вы полагаетесь на shared backing. С map зеркальная асимметрия: писать через аргумент можно и это видно, но если внутри функции сделать `m = make(...)` или `m = nil`, наружу это не пройдёт — переприсвоена лишь копия указателя. То есть и slice, и map «передаются по значению», просто значение у них — дескриптор/указатель, и границы наблюдаемости мутаций разные.
