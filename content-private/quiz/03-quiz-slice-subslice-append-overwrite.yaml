# приватный тренажёр, Go-квизы, личное использование
slug: quiz-slice-subslice-append-overwrite
section: go-internals
title: "append на подслайсе портит родительский slice"
difficulty: senior
tags: [slice, subslice, append, aliasing]
question_md: |
  Что выведет этот код (или почему)?

  ```go
  package main
  import "fmt"
  func main() {
    c := []string{"A", "B", "D", "E"}
    b := c[1:2]
    b = append(b, "TT")
    fmt.Println(c)
    fmt.Println(b)
  }
  ```
answer_levels:
  - level: middle
    text_md: |
      Выведет:

      ```
      [A B TT E]
      [B TT]
      ```

      `b := c[1:2]` — это `len=1`, но `cap=3` (от индекса 1 до конца backing array `c`). Значит запас есть, и `append(b, "TT")` пишет НЕ в новый массив, а в `c[2]`, затирая `"D"` на `"TT"`. Поэтому `c` становится `[A B TT E]`, а `b` (окно `c[1:3]`) — `[B TT]`.
  - level: senior
    text_md: |
      `c[1:2]` наследует backing array `c`; `cap` подслайса считается от нижней границы среза до конца ёмкости родителя: `cap(b) == cap(c) - 1 == 3`. При `len(b)=1 < cap(b)=3` `append` не реаллоцирует, а кладёт элемент в следующую позицию backing — это `c[2]`. `"D"` перезаписывается. `b` теперь `len=2`, и его второй элемент физически совпадает с `c[2]`.

      Мораль: срез `c[lo:hi]` не «отрезает хвост» по ёмкости — хвостовые элементы родителя остаются в зоне досягаемости append и тихо перетираются.
  - level: deep
    text_md: |
      Защита — three-index slice: `b := c[1:2:2]` ограничивает `cap(b)=1`, и любой `append` форсирует копию в новый массив, оставляя `c` нетронутым. Второй нюанс — утечка: `b := c[1:2]` держит живым ВЕСЬ backing array `c`, пока жив `b`, даже если из `c` нужен один элемент; GC не соберёт массив. Если `c` большой, копируют нужный кусок в свежий slice. Ещё тоньше: для slice указателей обнуляют "отрезанные" элементы, иначе они удерживают объекты живыми через backing.
