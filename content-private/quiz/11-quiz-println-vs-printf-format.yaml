# приватный тренажёр, Go-квизы, личное использование
slug: quiz-println-vs-printf-format
section: go-internals
title: "fmt.Println с %f-плейсхолдерами вместо Printf"
difficulty: middle
tags: [fmt, formatting, gotcha]
question_md: |
  Что выведет этот код (или почему)?

  ```go
  package main

  import (
    "fmt"
    "math"
  )

  func main() {
    x := 2.0
    y := 3.0

    result := math.Pow(x, y)

    fmt.Println("%f ^ %f = %f\n", x, y, result)
  }
  ```
answer_levels:
  - level: middle
    text_md: |
      Выведет (обратите внимание на перевод строки и ведущий пробел):

      ```
      %f ^ %f = %f
       2 3 8
      ```

      Использован `Println`, а не `Printf`. `Println` НЕ интерпретирует `%f` — печатает строку формата буквально, а остальные аргументы просто добавляет через пробел. `\n` внутри строки — реальный перевод строки, поэтому `2 3 8` уезжают на новую строку с ведущим пробелом (разделитель между аргументами). Числа печатаются как `2 3 8`, а не `2.000000` — `Println` форматирует float через `%v`.
  - level: senior
    text_md: |
      `Println(a...)` склеивает операнды через один пробел, добавляет `\n` в конце и форматирует каждый глаголом `%v` (по умолчанию). Здесь операнды: строка `"%f ^ %f = %f\n"` и три `float64`. Глаголы `%f` внутри строки — обычные символы, никакой подстановки нет.

      Раскладка вывода: `"%f ^ %f = %f\n"` + `" "` + `2` + `" "` + `3` + `" "` + `8` + `"\n"`. `\n` в строке рвёт строку до `2`, а разделительный пробел перед `2` даёт ведущий отступ. `%v` для `float64` печатает кратчайшее представление -> `2`, `3`, `8`, а не `2.000000`.
  - level: deep
    text_md: |
      Хотели `Printf` — забыли `f`; классическая опечатка. С `Printf("%f ^ %f = %f\n", x, y, result)` вышло бы `2.000000 ^ 3.000000 = 8.000000`. Тонкость `%v` vs `%f`: `%v` для float использует формат `%g` (кратчайшее точное), поэтому `2.0` -> `2`; а `%f` — фиксированные 6 знаков. Ещё нюанс: `go vet` ловит несоответствие числа/типа аргументов глаголам в Printf-семействе, но `Println` он так не проверяет — поэтому ошибку «строка формата в Println» компилятор и vet молча пропускают, она выявляется только по неверному выводу.
follow_ups:
  - "Что выведет тот же код, если заменить Println на Printf?"
  - "Почему float64 2.0 печатается как 2, а не 2.000000?"
