# приватный тренажёр, Go-квизы, личное использование
slug: quiz-slice-append-aliasing
section: go-internals
title: "b := append(a,..) и c := append(a,..) от общего a"
difficulty: senior
tags: [slice, append, aliasing, cap]
question_md: |
  Что выведет каждый вариант (и почему)?

  ```go
  // Вариант 1
  func main() {
    a := []int{1, 2}
    a = append(a, 3)
    b := append(a, 4)
    c := append(a, 5)
    fmt.Println(b)
    fmt.Println(c)
  }

  // Вариант 2
  func main() {
    a := []int{1, 2}
    a = append(a, 3)
    a = append(a, 7)
    b := append(a, 4)
    c := append(a, 5)
    fmt.Println(b)
    fmt.Println(c)
  }
  ```
answer_levels:
  - level: middle
    text_md: |
      - **Вариант 1:** оба `Println` дают `[1 2 3 5]`. После `a := {1,2}; append(a,3)` у `a` `len=3, cap=4` (есть запас). `b := append(a,4)` пишет `4` в общий слот `[3]`; `c := append(a,5)` пишет `5` в ТОТ ЖЕ слот `[3]`, затирая `4`. `b` и `c` смотрят в один backing -> оба `[1 2 3 5]`.
      - **Вариант 2:** `b == [1 2 3 7 4]`, `c == [1 2 3 7 5]`. После двух append `a` имеет `len=4, cap=4` (запаса нет). И `b`, и `c` реаллоцируют КАЖДЫЙ свой новый массив -> они независимы, `4` и `5` не пересекаются.
  - level: senior
    text_md: |
      Разница — наличие свободного слота у `a` в момент `b`/`c`.

      Вариант 1: рост `{1,2}`(cap2) -> append 3 -> реаллок до cap 4, `len=3`. Есть слот `[3]`. `b` и `c` оба пишут в него без реаллокации, поэтому делят память; последняя запись (`5`) побеждает, и `b` тоже её «видит».

      Вариант 2: после append 3 (cap4, len3) и append 7 (len4, cap4) запас исчерпан. Теперь `b := append(a,4)` вынужден `growslice` -> новый массив `[1 2 3 7 4]`; `c := append(a,5)` снова видит `a` с `len==cap` -> ЕЩЁ один новый массив `[1 2 3 7 5]`. Два независимых буфера.
  - level: deep
    text_md: |
      Это демонстрация того, что `append` детерминирован только относительно `len`/`cap`, а сами значения `cap` — следствие истории роста и `roundupsize`. Один и тот же паттерн `b,c := append(a,..)` даёт то shared-, то независимый результат в зависимости от того, был ли свободный слот. На практике если нужно из одного `a` получить несколько независимых расширений, форсируйте копию: `b := append(a[:len(a):len(a)], 4)` — three-index slice обнуляет `cap` до `len`, и каждый append гарантированно аллоцирует свой массив. Иначе получаете «спутанные» слайсы, где запись в один меняет другой.
