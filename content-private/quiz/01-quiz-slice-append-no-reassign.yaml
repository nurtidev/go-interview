# приватный тренажёр, Go-квизы, личное использование
slug: quiz-slice-append-no-reassign
section: go-internals
title: "append без переприсваивания vs sort по месту"
difficulty: middle
tags: [slice, append, mutation]
question_md: |
  Что выведет этот код (или почему)?

  ```go
  func main() {
    v := []int{3, 4, 1, 2, 5}
    ap(v)
    sr(v)
    fmt.Println(v)
  }

  func ap(arr []int) {
    arr = append(arr, 10)
  }

  func sr(arr []int) {
    sort.Ints(arr)
  }
  ```
answer_levels:
  - level: middle
    text_md: |
      Выведет `[1 2 3 4 5]`.

      `ap` получает копию slice-header (`ptr,len,cap`). `len==cap==5`, поэтому `append` выделяет НОВЫЙ массив, пишет туда и возвращает новый slice — но результат присваивается локальной `arr` и наружу не виден. `10` в `v` не попадает. `sr` же не растит slice, а сортирует существующий backing array по индексам — эта мутация видна снаружи, потому что backing общий. Итог: `v` отсортирован, `10` потерян.
  - level: senior
    text_md: |
      Slice передаётся по значению, но значение — это дескриптор с указателем на общий backing array. Отсюда правило: изменения ЭЛЕМЕНТОВ (`arr[i] = ...`, `sort.Ints`) видны у вызывающего, а изменения самого ДЕСКРИПТОРА (`len`, `cap`, `ptr` после реаллокации) — нет, потому что копия дескриптора локальна.

      В `ap` при `len==cap` `append` идёт в `runtime.growslice`, аллоцирует новый массив, копирует пять элементов, ставит `10` и возвращает slice с новым `ptr`/`cap`. Присваивание `arr = ...` меняет только локальную копию. Именно поэтому канонический идиом — `s = append(s, x)`: без переприсваивания у вызывающего результат теряется.
  - level: deep
    text_md: |
      Подводный камень: результат `ap` зависит от `cap`. Здесь `cap==len`, реаллокация неизбежна, поэтому `v` гарантированно не увидит `10`. Но если бы у `v` был запас (`v := make([]int, 5, 8)`), `append` записал бы `10` в `v[5]` того же backing array — и хотя `len(v)` снаружи остался бы 5 (элемент "невидим" через `v`), соседний slice с бóльшим `cap`/`len` его бы увидел. То есть один и тот же код «то портит соседей, то нет» в зависимости от ёмкости. Защита от таких сюрпризов — full slice expression `v[:5:5]` или возврат результата наружу.
follow_ups:
  - "Почему sort.Ints виден снаружи, а append — нет, хотя оба получают slice по значению?"
  - "Как изменится вывод, если v создать как make([]int, 5, 8)?"
  - "Зачем всегда писать s = append(s, x) и что будет, если этого не делать?"
