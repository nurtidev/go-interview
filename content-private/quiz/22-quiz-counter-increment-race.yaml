# приватный тренажёр, Go-квизы, личное использование
slug: quiz-counter-increment-race
section: concurrency
title: "1000 горутин counter++ без синхронизации"
difficulty: middle
tags: [data-race, atomic, goroutine, nondeterministic]
question_md: |
  Что выведется и как исправить?

  ```go
  func main() {
    var counter int
    for i := 0; i < 1000; i++ {
      go func() {
        counter++
      }()
    }
    fmt.Println(counter)
  }
  ```
answer_levels:
  - level: middle
    text_md: |
      Вывод НЕДЕТЕРМИНИРОВАН и в общем случае некорректен. Две проблемы: (1) `main` не ждёт горутины — печатает `counter` сразу после запуска цикла; (2) `counter++` из 1000 горутин — data race.

      «Учебный» ожидаемый ответ — `0` (горутины не успели). Но на практике `counter++` очень дёшев, а запуск 1000 горутин занимает время, поэтому на тестовой машине печаталось ~917-968 (и меняется от запуска к запуску). Диапазон в принципе `0..1000`. Под `-race` — `WARNING: DATA RACE`.
  - level: senior
    text_md: |
      `counter++` — это read-modify-write (загрузка, +1, запись), не атомарная операция. Конкурентные инкременты теряют обновления (lost updates): две горутины читают одно значение и пишут одно и то же. Плюс нет happens-before между горутинами и `Println`, поэтому и значение, и сам факт «сколько успело» не определены.

      Фикс любой из: `sync.Mutex` вокруг `counter++`; `atomic.AddInt64(&counter, 1)` + `atomic.LoadInt64`; и в любом случае `sync.WaitGroup`, чтобы `main` дождался всех перед чтением. Только тогда гарантированно получим `1000`.
  - level: deep
    text_md: |
      Почему «на бумаге 0, а на деле ~950»? Планировщик при GOMAXPROCS>1 успевает выполнить большинство горутин, пока main крутит цикл создания; это и показывает, что предсказывать конкретное число нельзя — оно зависит от числа P, нагрузки и рантайма. Тонкость: даже atomic-инкремент даст `1000` ТОЛЬКО вместе с `WaitGroup` — атомарность решает потерю обновлений, но не синхронизацию с моментом чтения. `atomic` дешевле мьютекса на простом счётчике (одна CAS/ADD-инструкция против park/unpark), но для составных инвариантов нужен мьютекс. Go Memory Model прямо говорит: без явной синхронизации нет гарантий видимости записей между горутинами — поэтому `-race` и считается обязательным в CI.
