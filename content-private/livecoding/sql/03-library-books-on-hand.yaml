# приватный тренажёр, личное использование
slug: iv-library-books-on-hand
kind: sql
title: "Библиотека: книги, которые сейчас на руках"
difficulty: middle
tags: [join, null, anti-join]
statement_md: |
  Схема библиотеки: авторы `authors`, книги `books`, связь «книга —
  автор» `book_authors` (многие-ко-многим), читатели `readers` и выдачи
  `loans (id, book_id, reader_id, borrowed_at, returned_at)`. Книга
  существует в единственном экземпляре и одновременно может быть только у
  одного читателя. Книга **на руках**, если по ней есть выдача, которая ещё
  не возвращена (`returned_at IS NULL`).

  Верните один столбец `title` — названия всех книг, которые сейчас на
  руках. Отсортируйте по `title` по возрастанию.
starter_code: |
  -- Верните title книг, у которых есть незакрытая выдача (returned_at IS NULL).
  SELECT ...
hints:
  - "Признак «книга на руках» лежит в loans: незакрытая выдача — это returned_at IS NULL."
  - "Соедините books с loans по book_id и оставьте только строки с незакрытой выдачей."
  - "Одну и ту же книгу могли выдавать много раз (история), но открытая выдача по книге не более одной — уникальный частичный индекс это гарантирует, поэтому дубликатов title не будет."
solution_md: |
  ### Идея

  «На руках» = существует выдача с `returned_at IS NULL`. Соединяем `books`
  с `loans` по `book_id` и фильтруем незакрытые выдачи. Инвариант «один
  экземпляр, один читатель одновременно» в схеме выражен частичным
  уникальным индексом `ux_loans_open_book` по `book_id` для строк, где
  `returned_at IS NULL`, — поэтому у книги не может быть двух открытых
  выдач и `title` не задвоится.

  ### Эталонный запрос

  ```sql
  SELECT b.title
  FROM books b
  JOIN loans l ON l.book_id = b.id
  WHERE l.returned_at IS NULL
  ORDER BY b.title;
  ```

  ### Типичные ошибки на интервью

  - Проверять `returned_at = NULL` вместо `IS NULL`.
  - Взять все выдачи без фильтра по возврату — попадут и уже сданные книги.
  - Игнорировать возможные дубли: если бы схема допускала несколько открытых
    выдач по книге, понадобился бы `DISTINCT` или агрегирование.
schema_sql: |
  CREATE TABLE authors (
    id   INTEGER PRIMARY KEY,
    name TEXT NOT NULL
  );
  CREATE TABLE books (
    id    INTEGER PRIMARY KEY,
    title TEXT NOT NULL
  );
  CREATE TABLE book_authors (
    book_id   INTEGER NOT NULL,
    author_id INTEGER NOT NULL,
    PRIMARY KEY (book_id, author_id)
  );
  CREATE TABLE readers (
    id   INTEGER PRIMARY KEY,
    name TEXT NOT NULL
  );
  CREATE TABLE loans (
    id          INTEGER PRIMARY KEY,
    book_id     INTEGER NOT NULL,
    reader_id   INTEGER NOT NULL,
    borrowed_at TEXT NOT NULL,
    returned_at TEXT
  );
  CREATE UNIQUE INDEX ux_loans_open_book ON loans (book_id) WHERE returned_at IS NULL;
