# приватный тренажёр, личное использование
slug: once-do
kind: go
title: "Реализовать sync.Once с нуля"
difficulty: senior
tags: [concurrency, atomic, mutex]
statement_md: |
  Реализуйте аналог `sync.Once` — примитив «выполнить действие ровно один раз».

  ```go
  type Once struct { /* ... */ }
  func (o *Once) Do(fn func())
  ```

  Контракт (как у стандартного `sync.Once`):

  - `fn` выполняется **ровно один раз** за всё время жизни `Once`, сколько бы
    горутин ни звали `Do` (и с какими бы `fn`).
  - `Do` **не возвращается**, пока первый вызов `fn` не завершится: конкурентный
    вызов `Do` обязан дождаться конца первого `fn`, а не проскочить мимо.
  - Эффекты первого `fn` должны быть видимы после возврата любого `Do`
    (корректная публикация — проверяется под `-race`).

  Требования: без гонок, быстрый путь после первого выполнения — без дорогой
  блокировки.
