hints:
  - "Читаем много, пишем редко — берите `sync.RWMutex`. Быстрый путь: под `RLock` проверяете, есть ли ключ; читатели друг друга не блокируют, поэтому обычный `GetOrCreate` (ключ уже есть) идёт параллельно."
  - "Если под `RLock` ключа нет — отпускаете `RLock`, берёте `Lock` и **перепроверяете** ключ (double-checked locking): пока вы шли за write-блокировкой, другая горутина могла его уже вставить."
  - "Только если и после перепроверки ключа нет — зовёте `create()`, сохраняете и возвращаете. Перепроверка гарантирует, что `create` для ключа выполнится максимум раз."
solution_md: |
  ### Идея

  Раз чтений намного больше вставок, берём `sync.RWMutex`: множество читателей
  держат `RLock` одновременно и не мешают друг другу. Быстрый путь `GetOrCreate` —
  под `RLock` посмотреть, есть ли ключ, и если есть — сразу вернуть.

  Если ключа нет, переходим на медленный путь: отпускаем `RLock`, берём `Lock` и
  **перепроверяем** наличие ключа (double-checked locking). Перепроверка
  обязательна: между `RUnlock` и `Lock` другая горутина могла вставить этот ключ,
  и без повторной проверки мы вызвали бы `create` дважды и затёрли чужое значение.
  Только если ключа по-прежнему нет — зовём `create()`, сохраняем, возвращаем.

  ### Эталонное решение

  ```go
  package main

  import "sync"

  type SafeMap struct {
      mu   sync.RWMutex
      data map[string]string
  }

  func NewSafeMap() *SafeMap {
      return &SafeMap{data: make(map[string]string)}
  }

  func (m *SafeMap) GetOrCreate(key string, create func() string) string {
      // Быстрый путь: под RLock проверяем наличие ключа (читатели не мешают друг другу).
      m.mu.RLock()
      v, ok := m.data[key]
      m.mu.RUnlock()
      if ok {
          return v
      }

      // Медленный путь: берём write-lock и ПЕРЕПРОВЕРЯЕМ — другой мог вставить,
      // пока мы шли за блокировкой (double-checked locking).
      m.mu.Lock()
      defer m.mu.Unlock()
      if v, ok := m.data[key]; ok {
          return v
      }
      v = create()
      m.data[key] = v
      return v
  }
  ```

  ### Типичные ошибки на интервью

  - Пропустить перепроверку под `Lock` — гонка «проверил под RLock, вставляю под Lock»: `create` вызовется дважды, значение перезапишется.
  - Держать `RLock` и пытаться из-под него взять `Lock` — апгрейд блокировки в Go не поддерживается, будет дедлок.
  - Обойтись обычным `Mutex` — корректно, но читатели сериализуются; при перекосе в чтения теряем главный выигрыш.
  - Читать/писать `data` вообще без блокировки на быстром пути — гонка на map (`-race`/`fatal error: concurrent map`).
