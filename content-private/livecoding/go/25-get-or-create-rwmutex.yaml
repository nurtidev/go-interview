test_code: |
  package main

  import (
      "fmt"
      "sync"
      "sync/atomic"
      "testing"
  )

  func TestGetOrCreateCreatesOncePerKey(t *testing.T) {
      m := NewSafeMap()
      var creates int32

      const goroutines = 100
      results := make([]string, goroutines)
      var wg sync.WaitGroup
      wg.Add(goroutines)
      for g := 0; g < goroutines; g++ {
          go func(g int) {
              defer wg.Done()
              results[g] = m.GetOrCreate("k", func() string {
                  atomic.AddInt32(&creates, 1)
                  return "value"
              })
          }(g)
      }
      wg.Wait()

      if creates != 1 {
          t.Fatalf("create вызвана %d раз для одного ключа, want 1", creates)
      }
      for g := 0; g < goroutines; g++ {
          if results[g] != "value" {
              t.Fatalf("горутина %d получила %q, want \"value\"", g, results[g])
          }
      }
  }

  func TestGetOrCreateReturnsExisting(t *testing.T) {
      m := NewSafeMap()
      first := m.GetOrCreate("k", func() string { return "first" })
      second := m.GetOrCreate("k", func() string { return "second" })
      if first != "first" || second != "first" {
          t.Fatalf("got (%q, %q), want (\"first\", \"first\")", first, second)
      }
  }

  func TestGetOrCreateManyKeys(t *testing.T) {
      m := NewSafeMap()
      var wg sync.WaitGroup
      const keys = 50
      wg.Add(keys)
      for k := 0; k < keys; k++ {
          go func(k int) {
              defer wg.Done()
              key := fmt.Sprintf("k%d", k)
              want := fmt.Sprintf("v%d", k)
              got := m.GetOrCreate(key, func() string { return want })
              if got != want {
                  t.Errorf("ключ %s: got %q, want %q", key, got, want)
              }
          }(k)
      }
      wg.Wait()
  }
