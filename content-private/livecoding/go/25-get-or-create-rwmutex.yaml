title: "GetOrCreate: двойная проверка на RWMutex"
difficulty: senior
tags: [concurrency, rwmutex, map]
statement_md: |
  Реализуйте потокобезопасную карту, оптимизированную под **чтения** (их на
  порядки больше, чем вставок).

  ```go
  func NewSafeMap() *SafeMap
  func (m *SafeMap) GetOrCreate(key string, create func() string) string
  ```

  `GetOrCreate` возвращает значение по ключу; если ключа ещё нет — создаёт его
  через `create()`, сохраняет и возвращает.

  Требования:

  - Быстрый путь (ключ уже есть) не должен блокировать других читателей — они
    читают карту параллельно.
  - `create()` для одного ключа вызывается **не более одного раза**, даже если в
    него одновременно влетело много горутин.
  - Без гонок данных на карте (проверяется под `-race`).
