slug: semaphore-channel
kind: go
title: "Семафор на буферизованном канале"
difficulty: middle
tags: [concurrency, channels, semaphore]
statement_md: |
  Реализуйте **семафор** — примитив, разрешающий одновременно работать не более
  чем `n` горутинам.

  ```go
  func NewSemaphore(n int) *Semaphore
  func (s *Semaphore) Acquire()          // занять место; блокирует, если мест нет
  func (s *Semaphore) Release()          // освободить ранее занятое место
  func (s *Semaphore) TryAcquire() bool  // занять место без блокировки
  ```

  Дано: `n > 0`. `Acquire` занимает одно из `n` мест; если свободных нет —
  блокирует вызывающую горутину, пока кто-нибудь не сделает `Release`.
  `TryAcquire` пытается занять место, но **не блокирует**: возвращает `true`,
  если место было и его заняли, иначе `false`.

  Гарантируется: `Release` не вызывается раньше `Acquire`, число `Release` не
  превышает число успешных `Acquire`.

  Требования: без гонок (`-race`) и без busy-waiting.
