slug: generator-context-cancel
kind: go
title: "Генератор с отменой по context (без утечки)"
difficulty: middle
tags: [concurrency, context, channels]
statement_md: |
  Реализуйте бесконечный генератор чисел, управляемый через `context.Context`.

  ```go
  func Generate(ctx context.Context, start int) <-chan int
  ```

  Дано: контекст `ctx` и начальное число `start`. Верните канал, в который
  горутина пишет `start`, `start+1`, `start+2`, … — пока потребитель читает.
  Как только `ctx` отменён, горутина должна завершиться, а канал — закрыться.

  Требования:

  - Никакого busy-waiting: отправка значения и проверка отмены — через `select`.
  - После отмены горутина **не должна утекать** (проверяется по числу горутин).
  - Потребитель может прекратить читать в любой момент, отменив `ctx`.

  Пример: `ctx` с отменой, читаем `11 12 13 14 15`, затем прерываем цикл и
  вызываем `cancel()` — горутина генератора завершается, канал закрывается.
