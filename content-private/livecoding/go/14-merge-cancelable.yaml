# приватный тренажёр, по мотивам курса «Многозадачность в Go», личное использование
slug: merge-cancelable
kind: go
title: "Fan-in с отменой по context (без утечек)"
difficulty: staff
tags: [concurrency, channels, context]
statement_md: |
  Реализуйте `Merge` — fan-in, сливающий значения из нескольких входных каналов
  в один выходной, с поддержкой отмены через `context.Context`.

  ```go
  func Merge(ctx context.Context, chs ...<-chan int) <-chan int
  ```

  Дано: контекст `ctx` и произвольное число входных каналов. Верните выходной
  канал со всеми значениями входов (порядок не важен, ничего не теряется и не
  дублируется).

  Требования:

  - Выходной канал закрывается, когда закрыты **все** входы **или** отменён
    `ctx` — иначе потребитель на `for v := range out` зависнет.
  - Отмена работает, даже если пересылающая горутина заблокирована на отправке в
    выход (значения больше никто не читает). Горутины **не должны утекать** ни при
    нормальном завершении, ни при отмене.
  - `Merge()` без входных каналов возвращает немедленно закрытый канал.

  Проверяется под `-race` и на отсутствие утечки горутин.
