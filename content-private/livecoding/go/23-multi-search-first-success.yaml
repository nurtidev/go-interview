# приватный тренажёр, личное использование
slug: multi-search-first-success
kind: go
title: "MultiSearch: первый успешный результат"
difficulty: senior
tags: [concurrency, context, channels]
statement_md: |
  Реализуйте `MultiSearch`: выполняет один и тот же запрос через несколько
  источников и возвращает **первый успешный** результат, отменяя остальные.

  ```go
  type Result struct{ Source string }
  type SearchFunc func(ctx context.Context, query string) (Result, error)

  func MultiSearch(ctx context.Context, query string, sfs []SearchFunc) (Result, error)
  ```

  - Все `sfs` запускаются параллельно с одним `query`.
  - Как только **любой** источник вернул результат без ошибки — немедленно
    возвращаем его, а остальным сигналим об отмене (через производный контекст).
  - Если **все** вернули ошибку — возвращаем последнюю полученную ошибку.

  Требования:

  - Проигравшие горутины не должны утекать: они обязаны иметь возможность
    завершиться даже после того, как `MultiSearch` уже вернулся.
  - Без гонок (`-race`).
