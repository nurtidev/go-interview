# приватный тренажёр, по мотивам курса «Многозадачность в Go», личное использование
slug: gather-parallel
kind: go
title: "Параллельный gather (Promise.all)"
difficulty: middle
tags: [concurrency, goroutines, waitgroup]
statement_md: |
  Реализуйте аналог `Promise.all()` / `asyncio.gather()` — функцию `Gather`,
  которая запускает переданные функции **одновременно** и возвращает их
  результаты в том же порядке, что и во входном срезе.

  ```go
  func Gather(funcs []func() int) []int
  ```

  Дано: срез функций `funcs`. Нужно выполнить их **параллельно** (не
  последовательно) и вернуть срез результатов, где `результат[i]` соответствует
  `funcs[i]`.

  Пример: три функции, спящие 200/300/400 мс, при параллельном запуске в сумме
  занимают ~400 мс, а не 900. Порядок результатов должен совпадать с порядком
  функций — сбор через общий канал с последующей сортировкой не подходит.

  Требования: без гонок данных (`-race`).
