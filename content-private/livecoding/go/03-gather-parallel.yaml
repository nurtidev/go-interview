hints:
  - "Заведите заранее `results := make([]int, len(funcs))`. Каждую функцию запускайте в своей горутине — так они выполняются параллельно."
  - "Порядок сохраняется сам собой, если каждая горутина пишет результат по своему индексу `results[i]` — разные индексы одного среза можно писать конкурентно без гонки."
  - "Дождитесь всех горутин через `sync.WaitGroup` (по одному `Add(1)`/`Done()` на функцию) и только потом возвращайте срез. Индекс `i` и функцию передавайте параметрами горутины, а не захватывайте по ссылке."
solution_md: |
  ### Идея

  Чтобы функции выполнялись параллельно, каждую запускаем в своей горутине.
  Порядок результатов сохраняем, записывая результат сразу по индексу: горутина
  `i` пишет в `results[i]`. Запись в разные элементы одного среза из разных
  горутин — не гонка (это разные ячейки памяти), поэтому дополнительная
  синхронизация значений не нужна; синхронизируем лишь момент «все закончили»
  через `sync.WaitGroup`.

  ### Эталонное решение

  ```go
  package main

  import "sync"

  func Gather(funcs []func() int) []int {
      results := make([]int, len(funcs))
      var wg sync.WaitGroup
      wg.Add(len(funcs))
      for i, fn := range funcs {
          go func(i int, fn func() int) {
              defer wg.Done()
              results[i] = fn()
          }(i, fn)
      }
      wg.Wait()
      return results
  }
  ```

  Сложность: время ≈ времени самой долгой функции (а не суммы), память `O(n)`.

  ### Типичные ошибки на интервью

  - Захватить `i`/`fn` замыканием без передачи параметром — на Go ≤ 1.21 все горутины запишут по последнему индексу (в 1.22+ переменная цикла своя на итерацию, но передавать явно надёжнее).
  - Собирать результаты в общий канал и потом сортировать — теряется исходный порядок и усложняется код.
  - Писать в `results` под общим мьютексом — лишняя сериализация: разные индексы и так независимы.
  - Забыть `wg.Wait()` — вернуть срез с ещё не заполненными значениями.
time_limit_sec: 12
race: true
test_code: |
  package main

  import (
      "testing"
      "time"
  )

  func TestGatherPreservesOrder(t *testing.T) {
      funcs := []func() int{
          func() int { return 1 },
          func() int { return 4 },
          func() int { return 9 },
          func() int { return 16 },
      }
      got := Gather(funcs)
      want := []int{1, 4, 9, 16}
      if len(got) != len(want) {
          t.Fatalf("длина результата %d, want %d", len(got), len(want))
      }
      for i := range want {
          if got[i] != want[i] {
              t.Fatalf("got[%d] = %d, want %d (порядок нарушен?)", i, got[i], want[i])
          }
      }
  }

  func TestGatherRunsInParallel(t *testing.T) {
      const n = 8
      funcs := make([]func() int, n)
      for i := 0; i < n; i++ {
          i := i
          funcs[i] = func() int {
              time.Sleep(40 * time.Millisecond)
              return i * i
          }
      }
      start := time.Now()
      got := Gather(funcs)
      elapsed := time.Since(start)
      if elapsed > 200*time.Millisecond {
          t.Fatalf("выполнялось %v — похоже, последовательно (ожидался параллелизм)", elapsed)
      }
      if len(got) != n {
          t.Fatalf("длина результата %d, want %d", len(got), n)
      }
      for i := 0; i < n; i++ {
          if got[i] != i*i {
              t.Fatalf("got[%d] = %d, want %d", i, got[i], i*i)
          }
      }
  }
