slug: errgroup-cancel
kind: go
title: "RunAll: сбор результатов с отменой по первой ошибке"
difficulty: staff
tags: [concurrency, context, waitgroup]
statement_md: |
  Реализуйте `RunAll` — аналог `errgroup`: запускает задачи параллельно, при
  первой ошибке отменяет остальные.

  ```go
  type Task func(ctx context.Context) (int, error)

  func RunAll(ctx context.Context, tasks []Task) ([]int, error)
  ```

  - Все `tasks` выполняются параллельно, каждой передаётся производный контекст.
  - Если **все** успешны — вернуть срез результатов (`results[i]` соответствует
    `tasks[i]`) и `nil`.
  - Если **любая** вернула ошибку — немедленно отменить производный контекст
    (чтобы остальные, слушающие `ctx.Done()`, прекратили работу) и вернуть
    `(nil, перваяОшибка)`.

  Требования:

  - Порядок результатов совпадает с порядком задач.
  - Возврат — после завершения всех горутин (никаких висящих в фоне).
  - Без гонок на результатах и на переменной ошибки (проверяется под `-race`).
