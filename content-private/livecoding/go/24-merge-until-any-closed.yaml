# приватный тренажёр, личное использование
slug: merge-until-any-closed
kind: go
title: "Merge N каналов с остановкой по первому закрытию"
difficulty: senior
tags: [concurrency, channels, fan-in]
statement_md: |
  Реализуйте вариант fan-in `Merge`: он сливает значения из входных каналов в
  один выходной, но **как только любой из входов закрывается**, прекращает
  пересылку и закрывает выход.

  ```go
  func Merge(chs ...<-chan int) <-chan int
  ```

  Дано: несколько входных каналов. Верните выходной канал со значениями входов.
  Отличие от обычного fan-in: обычный ждёт закрытия **всех** входов, а этот
  останавливается по **первому** закрывшемуся входу.

  Требования:

  - Выходной канал закрывается ровно один раз — когда закрылся любой из входов
    (иначе потребитель на `for v := range out` зависнет).
  - Никаких паник «send on closed channel» и никаких утечек горутин: все
    пересылающие горутины должны завершиться.
  - Проверяется под `-race`.
