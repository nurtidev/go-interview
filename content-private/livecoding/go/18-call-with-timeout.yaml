# приватный тренажёр, личное использование
slug: call-with-timeout
kind: go
title: "Обёртка с таймаутом над непредсказуемой функцией"
difficulty: middle
tags: [concurrency, time, channels]
statement_md: |
  Есть функция `fn`, работающая непредсказуемо долго (представьте сетевой вызов)
  и возвращающая число. Напишите обёртку `CallWithTimeout`, которая запускает
  `fn` с фиксированным таймаутом.

  ```go
  func CallWithTimeout(timeout time.Duration, fn func() int) (int, error)
  ```

  - Если `fn` успела за `timeout` — верните её результат и `nil`.
  - Если не успела — верните `(0, ErrTimeout)`; сам результат в этом случае не
    важен.

  Требования:

  - После таймаута горутина, выполняющая `fn`, **не должна утекать** — даже если
    `fn` завершится сильно позже, её горутина обязана спокойно доработать и выйти.
  - Без гонок (`-race`).
