title: "Барьер синхронизации N горутин"
difficulty: senior
tags: [concurrency, channels, sync]
statement_md: |
  Реализуйте одноразовый **барьер синхронизации** на `n` горутин.

  ```go
  func NewBarrier(n int) *Barrier
  func (b *Barrier) Wait()
  ```

  Дано: `n > 0`. Каждая горутина, дойдя до барьера, вызывает `Wait()` и
  блокируется. Когда `Wait()` вызвали все `n` горутин, барьер разблокирует их
  **все разом**. Ни одна не должна пройти барьер, пока не собрались все `n`.

  Требования:

  - Без гонок (`-race`) и без busy-waiting.
  - Барьер одноразовый; число горутин, работающих с ним, строго равно `n`.

  Пример: 4 горутины с разным временем подготовки — быстрые ждут у барьера
  медленных, и только после прихода четвёртой все продолжают одновременно.
