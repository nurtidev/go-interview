# приватный тренажёр, по мотивам курса «Многозадачность в Go», личное использование
slug: concurrent-group-panic
kind: go
title: "Группа горутин с пробросом паники в Wait"
difficulty: senior
tags: [concurrency, waitgroup, panic]
statement_md: |
  Реализуйте `Group` — группу, которая запускает функции в отдельных горутинах и
  дожидается их в `Wait()`. Если **любая** из функций запаниковала, `Wait()`
  должен запаниковать с тем же значением.

  ```go
  func (g *Group) Go(fn func())   // запустить fn в отдельной горутине
  func (g *Group) Wait()          // дождаться всех; паниковать, если паниковала любая
  ```

  Дано: нулевое значение `Group` готово к использованию (`var g Group`). `Go`
  запускает `fn` в горутине и сам паниковать не должен — паника функции не
  вылетает из `Go`. Позже, из `Wait()`, паника должна воспроизвестись с тем же
  «содержимым» (аргументом `panic`). Если паниковали несколько — допустимо
  воспроизвести любую из них.

  Ключевая деталь: `recover()` ловит панику только в **той же** горутине, где она
  произошла. Значит, перехватывать нужно внутри запускаемой горутины, а не в
  `Wait`.

  Требования: без гонок данных при сохранении паники (проверяется под `-race`).
