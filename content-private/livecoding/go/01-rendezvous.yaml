# приватный тренажёр, по мотивам курса «Многозадачность в Go», личное использование
slug: rendezvous
kind: go
title: "Рандеву двух горутин"
difficulty: middle
tags: [concurrency, channels, sync]
statement_md: |
  Реализуйте одноразовое **рандеву** (точку встречи) ровно двух горутин.

  ```go
  func NewRendezvous() *Rendezvous
  func (r *Rendezvous) Ready()
  ```

  Дано: две горутины, каждая в какой-то момент вызывает `Ready()`. Та, что
  пришла первой, должна **заблокироваться** и ждать вторую. Когда обе вызвали
  `Ready()`, обе разблокируются (практически одновременно) и идут дальше.

  Требования:

  - Без гонок данных (проверяется под `-race`) и без busy-waiting (никаких
    циклов `for r.val != 2 {}`, крутящих процессор).
  - Рандеву одноразовое, `Ready()` вызывается ровно два раза (по разу из каждой
    горутины).

  Пример: горутина A приходит к точке сбора позже B — значит B ждёт A, и обе
  продолжают только после того, как обе оказались в `Ready()`.
