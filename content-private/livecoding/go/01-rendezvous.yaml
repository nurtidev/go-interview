hints:
  - "Busy-waiting (`for r.val != 2 {}`) недопустим — заблокироваться без траты процессора умеет канал. Нужен общий счётчик прибытий и канал-сигнал разблокировки."
  - "Счётчик прибытий меняют две горутины одновременно — защитите его `sync.Mutex`. Под мьютексом инкрементируйте счётчик и запомните, стала ли текущая горутина второй."
  - "Приём `close(канал)` как широковещательный сигнал: вторая (последняя) прибывшая горутина закрывает общий канал `release` и выходит; первая, прибывшая раньше, ждёт на `<-release`. Закрытие разблокирует всех, кто читает из канала."
solution_md: |
  ### Идея

  Рандеву — «кто пришёл первым, ждёт второго; пришли оба — идут дальше». Нужны
  две вещи: общий счётчик прибытий и способ заблокироваться без busy-waiting.

  Счётчик `arrived` меняют обе горутины, поэтому его инкремент — под
  `sync.Mutex`. Под тем же мьютексом запоминаем, оказалась ли текущая горутина
  последней (`arrived == 2`).

  Блокировку даёт закрытие канала: закрытый канал мгновенно разблокирует всех,
  кто читает из него (`<-release`). Поэтому **последняя** прибывшая горутина
  закрывает `release` (и сама сразу идёт дальше), а первая, пришедшая раньше,
  висит на `<-release`, пока его не закроют. `close` как широковещательный
  сигнал события — тот же приём, что у канала отмены.

  ### Эталонное решение

  ```go
  package main

  import "sync"

  type Rendezvous struct {
      mu      sync.Mutex
      arrived int
      release chan struct{}
  }

  func NewRendezvous() *Rendezvous {
      return &Rendezvous{release: make(chan struct{})}
  }

  func (r *Rendezvous) Ready() {
      r.mu.Lock()
      r.arrived++
      last := r.arrived == 2
      r.mu.Unlock()

      if last {
          close(r.release) // разблокирует первую горутину (и не блокирует эту)
          return
      }
      <-r.release // первая пришедшая ждёт, пока вторая закроет канал
  }
  ```

  Сложность: `O(1)` на вызов, блокировка отдаётся планировщику (не busy-wait).

  ### Типичные ошибки на интервью

  - `for r.val != 2 {}` — busy-waiting, грузит ядро на 100% и вдобавок гонка на `val`.
  - Инкремент счётчика без мьютекса — гонка, ловится `-race`.
  - Использовать `send` вместо `close`: одна отправка в небуферизованный канал разблокирует лишь одного читателя, а нужно «оба разом» — `close` делает это широковещательно.
  - Держать мьютекс на время `<-release` — дедлок: вторая горутина не сможет взять `Lock`, чтобы стать последней.
time_limit_sec: 15
race: true
test_code: |
  package main

  import (
      "sync"
      "sync/atomic"
      "testing"
      "time"
  )

  func TestRendezvousBothArriveBeforeProceeding(t *testing.T) {
      for iter := 0; iter < 200; iter++ {
          r := NewRendezvous()
          var aHere, bHere atomic.Bool
          errCh := make(chan string, 2)

          var wg sync.WaitGroup
          wg.Add(2)

          go func() {
              defer wg.Done()
              time.Sleep(2 * time.Millisecond) // A приходит позже
              aHere.Store(true)
              r.Ready()
              if !bHere.Load() {
                  errCh <- "A прошла рандеву, а B ещё не прибыла"
              }
          }()
          go func() {
              defer wg.Done()
              bHere.Store(true)
              r.Ready() // B приходит раньше — обязана ждать A
              if !aHere.Load() {
                  errCh <- "B прошла рандеву, а A ещё не прибыла"
              }
          }()

          done := make(chan struct{})
          go func() { wg.Wait(); close(done) }()
          select {
          case <-done:
          case <-time.After(2 * time.Second):
              t.Fatal("рандеву зависло: Ready() не разблокировался")
          }
          close(errCh)
          for msg := range errCh {
              t.Fatalf("итерация %d: %s", iter, msg)
          }
      }
  }
