# приватный тренажёр, по мотивам курса «Многозадачность в Go», личное использование
slug: with-timeout-context
kind: go
title: "Таймаут-обёртка операции через context"
difficulty: senior
tags: [concurrency, context, timeout]
statement_md: |
  Реализуйте обобщённую обёртку `WithTimeout`, которая выполняет функцию и
  возвращает её результат, но не ждёт дольше, чем разрешает `context.Context`.

  ```go
  func WithTimeout[T any](ctx context.Context, fn func() T) (T, error)
  ```

  Дано: контекст `ctx` (обычно с таймаутом/отменой) и функция `fn`.

  - Если `fn` успела вернуть результат до завершения `ctx` — верните
    `(результат, nil)`.
  - Если `ctx` завершился раньше (`ctx.Done()` сработал) — верните нулевое
    значение `T` и `ctx.Err()` (`context.DeadlineExceeded` или
    `context.Canceled`).

  Требования:

  - Ожидание результата и ожидание `ctx.Done()` — конкурентно, через `select`.
  - Горутина, исполняющая `fn`, не должна намертво блокировать выдачу результата
    (подумайте о ёмкости канала). Проверяется под `-race`.
