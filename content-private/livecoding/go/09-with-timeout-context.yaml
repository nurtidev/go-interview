hints:
  - "Запустите `fn` в отдельной горутине, а результат передайте в канал. В основной горутине выбирайте через `select` между `<-done` (результат готов) и `<-ctx.Done()` (контекст завершился)."
  - "Канал результата сделайте буферизованным (`make(chan T, 1)`). Иначе при таймауте, когда никто уже не читает канал, горутина `fn` навсегда зависнет на отправке — утечка."
  - "В ветке `<-ctx.Done()` верните `var zero T` и `ctx.Err()` — он сам вернёт `context.DeadlineExceeded` при таймауте или `context.Canceled` при отмене."
solution_md: |
  ### Идея

  Запускаем `fn` в отдельной горутине и её результат кладём в канал `done`.
  Основная горутина в `select` ждёт, что случится первым: `fn` вернула результат
  (`<-done`) или контекст завершился (`<-ctx.Done()`). В первом случае возвращаем
  результат, во втором — нулевое значение и `ctx.Err()`.

  Важная деталь — **буфер размера 1** у `done`. При таймауте основная горутина
  уходит по ветке `<-ctx.Done()` и больше не читает `done`. Если бы канал был
  небуферизованным, горутина `fn` навсегда зависла бы на `done <- ...` (утечка).
  Буфер на один элемент позволяет ей завершиться, даже если результат уже никому
  не нужен.

  ### Эталонное решение

  ```go
  package main

  import "context"

  func WithTimeout[T any](ctx context.Context, fn func() T) (T, error) {
      done := make(chan T, 1) // буфер 1 — fn не зависнет на отправке после таймаута
      go func() {
          done <- fn()
      }()

      select {
      case r := <-done:
          return r, nil
      case <-ctx.Done():
          var zero T
          return zero, ctx.Err()
      }
  }
  ```

  ### Типичные ошибки на интервью

  - Небуферизованный `done` — при таймауте горутина `fn` навсегда зависает на отправке (goroutine leak).
  - Возвращать свою ошибку `errors.New("timeout")` вместо `ctx.Err()` — теряется различие между `DeadlineExceeded` и `Canceled`.
  - Ждать `fn` без `select` (например, сначала `<-done`, потом проверять `ctx`) — таймаут не сработает, пока `fn` не завершится.
  - Помнить: `fn`, начавшую долгую работу, эта обёртка не «убьёт» — она продолжит выполняться в фоне; отменять надо саму `fn` через тот же `ctx`.
time_limit_sec: 15
race: true
test_code: |
  package main

  import (
      "context"
      "errors"
      "sync"
      "testing"
      "time"
  )

  func TestWithTimeoutFast(t *testing.T) {
      ctx, cancel := context.WithTimeout(context.Background(), 200*time.Millisecond)
      defer cancel()
      got, err := WithTimeout(ctx, func() int { return 42 })
      if err != nil {
          t.Fatalf("неожиданная ошибка: %v", err)
      }
      if got != 42 {
          t.Fatalf("результат %d, want 42", got)
      }
  }

  func TestWithTimeoutDeadline(t *testing.T) {
      ctx, cancel := context.WithTimeout(context.Background(), 20*time.Millisecond)
      defer cancel()
      _, err := WithTimeout(ctx, func() int {
          time.Sleep(200 * time.Millisecond)
          return 1
      })
      if !errors.Is(err, context.DeadlineExceeded) {
          t.Fatalf("ошибка = %v, want context.DeadlineExceeded", err)
      }
  }

  func TestWithTimeoutCanceled(t *testing.T) {
      ctx, cancel := context.WithCancel(context.Background())
      go func() {
          time.Sleep(20 * time.Millisecond)
          cancel()
      }()
      _, err := WithTimeout(ctx, func() int {
          time.Sleep(200 * time.Millisecond)
          return 1
      })
      if !errors.Is(err, context.Canceled) {
          t.Fatalf("ошибка = %v, want context.Canceled", err)
      }
  }

  func TestWithTimeoutConcurrent(t *testing.T) {
      var wg sync.WaitGroup
      for i := 0; i < 50; i++ {
          wg.Add(1)
          go func(i int) {
              defer wg.Done()
              ctx, cancel := context.WithTimeout(context.Background(), 100*time.Millisecond)
              defer cancel()
              got, err := WithTimeout(ctx, func() int { return i })
              if err != nil || got != i {
                  t.Errorf("got %d, err %v; want %d, nil", got, err, i)
              }
          }(i)
      }
      wg.Wait()
  }
