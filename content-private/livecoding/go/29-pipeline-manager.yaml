hints:
  - "Прочитайте пачку `m.r.Read()`, затем на каждый элемент запустите горутину. Дождитесь всех через `sync.WaitGroup` перед выходом из `Manage` (блокирующий контракт)."
  - "Внутри горутины ведите `cur := d` и прогоняйте по цепочке: `for _, p := range m.ps { out, err := p.Process(cur); if err != nil { return }; cur = out }`. `return` при ошибке и есть «пропустить элемент»."
  - "После успешного прохода всей цепочки вызовите `m.w.Write(cur)`. `Write` зовётся из многих горутин одновременно — потокобезопасность самого writer'а на его стороне, но ваш Manager не должен добавлять общих незащищённых переменных."
solution_md: |
  ### Идея

  `Manage` — конвейер «прочитал пачку → обработал конкурентно → записал успешные».
  Читаем пачку из `Reader`, на каждый элемент — своя горутина (конкурентная
  обработка), а `sync.WaitGroup` держит `Manage` заблокированным до конца всей
  пачки.

  Внутри горутины элемент последовательно проходит цепочку `Processor`'ов: выход
  одного становится входом следующего. Если любой `Process` вернул ошибку —
  делаем `return`, и элемент просто не доходит до `Writer` (это и есть «пропустить
  при ошибке»). Прошедший всю цепочку элемент отдаём в `Writer`. Никакого общего
  изменяемого состояния в Manager нет, поэтому гонок он не вносит; синхронизацию
  записи обеспечивает сам `Writer`.

  ### Эталонное решение

  ```go
  package main

  import "sync"

  type Data struct {
      ID int
  }

  type Reader interface {
      Read() []Data
  }

  type Processor interface {
      Process(Data) (Data, error)
  }

  type Writer interface {
      Write(Data)
  }

  type Manager interface {
      Manage()
  }

  type manager struct {
      r  Reader
      ps []Processor
      w  Writer
  }

  func NewManager(r Reader, ps []Processor, w Writer) Manager {
      return &manager{r: r, ps: ps, w: w}
  }

  func (m *manager) Manage() {
      batch := m.r.Read()
      var wg sync.WaitGroup
      wg.Add(len(batch))
      for _, d := range batch {
          go func(d Data) {
              defer wg.Done()
              cur := d
              for _, p := range m.ps {
                  out, err := p.Process(cur)
                  if err != nil {
                      return // ошибка обработки — пропускаем элемент
                  }
                  cur = out
              }
              m.w.Write(cur)
          }(d)
      }
      wg.Wait()
  }
  ```

  ### Типичные ошибки на интервью

  - Продолжать цепочку после ошибки `Process` — в `Writer` попадёт «полуобработанный» или невалидный элемент.
  - Захватить `d` замыканием без параметра — на Go ≤ 1.21 все горутины обработают последний элемент пачки.
  - Не дождаться `wg.Wait()` — `Manage` вернётся, пока часть элементов ещё в обработке (нарушен блокирующий контракт).
  - Копить результаты в общий срез без синхронизации вместо вызова `Writer` — гонка данных.
time_limit_sec: 20
race: true
test_code: |
  package main

  import (
      "errors"
      "sort"
      "sync"
      "testing"
  )

  type sliceReader struct{ items []Data }

  func (s sliceReader) Read() []Data { return s.items }

  type addProc struct{ n int }

  func (a addProc) Process(d Data) (Data, error) { return Data{ID: d.ID + a.n}, nil }

  type rejectEvenProc struct{}

  func (rejectEvenProc) Process(d Data) (Data, error) {
      if d.ID%2 == 0 {
          return Data{}, errors.New("even rejected")
      }
      return d, nil
  }

  type collectWriter struct {
      mu  sync.Mutex
      got []int
  }

  func (w *collectWriter) Write(d Data) {
      w.mu.Lock()
      w.got = append(w.got, d.ID)
      w.mu.Unlock()
  }

  func (w *collectWriter) sorted() []int {
      w.mu.Lock()
      defer w.mu.Unlock()
      out := append([]int(nil), w.got...)
      sort.Ints(out)
      return out
  }

  func TestManagerSkipsErrors(t *testing.T) {
      r := sliceReader{items: []Data{{1}, {2}, {3}, {4}, {5}, {6}}}
      w := &collectWriter{}
      // +1 ко всем: 2,3,4,5,6,7; затем отбраковка чётных -> остаются 3,5,7
      m := NewManager(r, []Processor{addProc{1}, rejectEvenProc{}}, w)
      m.Manage()

      got := w.sorted()
      want := []int{3, 5, 7}
      if len(got) != len(want) {
          t.Fatalf("записано %v, want %v", got, want)
      }
      for i := range want {
          if got[i] != want[i] {
              t.Fatalf("записано %v, want %v", got, want)
          }
      }
  }

  func TestManagerWritesAllOnSuccess(t *testing.T) {
      r := sliceReader{items: []Data{{10}, {20}, {30}}}
      w := &collectWriter{}
      m := NewManager(r, []Processor{addProc{5}}, w)
      m.Manage()

      got := w.sorted()
      want := []int{15, 25, 35}
      if len(got) != len(want) {
          t.Fatalf("записано %v, want %v", got, want)
      }
      for i := range want {
          if got[i] != want[i] {
              t.Fatalf("записано %v, want %v", got, want)
          }
      }
  }
