# приватный тренажёр, личное использование
slug: pipeline-manager
kind: go
title: "Manager: Reader → Processors → Writer с пропуском ошибок"
difficulty: staff
tags: [concurrency, pipeline, waitgroup]
statement_md: |
  Реализуйте `Manager`, связывающий три интерфейса в конвейер.

  ```go
  type Data struct{ ID int }
  type Reader interface{ Read() []Data }
  type Processor interface{ Process(Data) (Data, error) }
  type Writer interface{ Write(Data) }
  type Manager interface{ Manage() }

  func NewManager(r Reader, ps []Processor, w Writer) Manager
  ```

  `Manage` должен:

  - прочитать пачку данных из `Reader`;
  - прогнать **каждый** элемент через цепочку `Processor`'ов по порядку (выход
    одного — вход следующего);
  - если какой-то `Processor` вернул ошибку — этот элемент **пропускается** (в
    `Writer` не попадает);
  - успешно обработанные элементы передать в `Writer`.

  Требования:

  - Элементы пачки обрабатываются **конкурентно**.
  - `Manage` блокирует, пока вся пачка не обработана.
  - Без гонок (`-race`); `Writer` может вызываться из разных горутин.
