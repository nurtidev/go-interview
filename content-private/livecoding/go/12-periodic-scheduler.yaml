# приватный тренажёр, по мотивам курса «Многозадачность в Go», личное использование
slug: periodic-scheduler
kind: go
title: "Периодический планировщик с мгновенной отменой"
difficulty: senior
tags: [concurrency, time, ticker]
statement_md: |
  Напишите `Schedule` — запуск регулярного выполнения функции с заданным
  интервалом и возможностью остановки.

  ```go
  func Schedule(dur time.Duration, fn func()) (cancel func())
  ```

  Дано: интервал `dur` и функция `fn`. `Schedule` возвращает `cancel`.

  - Каждые `dur` времени выполняется `fn`.
  - После `cancel()` вызовы `fn` прекращаются.

  Требования:

  - Пропущенные тики **не накапливаются**: если `fn` работает дольше `dur`, тик,
    пришедшийся на момент, пока `fn` ещё выполняется, пропускается (а не копится в
    очередь).
  - Отмена **мгновенная**: горутина завершается сразу при `cancel()`.
  - `cancel()` можно вызвать несколько раз — по первому останавливает, при
    повторных **без паники**.
  - Без гонок (`-race`).
