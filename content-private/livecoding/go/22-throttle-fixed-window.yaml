# приватный тренажёр, личное использование
slug: throttle-fixed-window
kind: go
title: "Ограничитель вызовов (фиксированное окно)"
difficulty: senior
tags: [concurrency, mutex, rate-limit]
statement_md: |
  Реализуйте ограничитель `Throttle`: он следит, чтобы функция `fn` выполнялась
  не более `limit` раз за каждое окно длиной `window` (фиксированное окно).

  ```go
  func Throttle(limit int, window time.Duration, fn func()) (handle func() error, cancel func())
  ```

  Поведение `handle`:

  - Первые `limit` вызовов в текущем окне выполняют `fn` и возвращают `nil`.
  - Следующие вызовы в том же окне сразу возвращают `ErrBusy` (без вызова `fn`).
  - С началом нового окна счётчик сбрасывается — снова доступно `limit` вызовов.

  Дополнительно:

  - После `cancel` любой `handle` возвращает `ErrCanceled`.
  - `cancel` **идемпотентен** (повторные вызовы ничего не делают).
  - `handle` и `cancel` безопасны при **одновременном** вызове из разных горутин
    (проверяется под `-race`).

  Отличие от «ограничителя скорости» (token bucket): здесь вызовы не размазываются
  во времени — просто первые `limit` в окне проходят, остальные отклоняются до
  конца окна.
