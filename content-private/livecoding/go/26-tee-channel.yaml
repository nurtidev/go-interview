title: "Tee-канал: раздвоение потока"
difficulty: senior
tags: [concurrency, channels, cancellation]
statement_md: |
  Реализуйте `Tee` — раздвоение потока: каждое значение из входного канала
  доставляется в **оба** выходных канала.

  ```go
  func Tee(done <-chan struct{}, in <-chan int) (<-chan int, <-chan int)
  ```

  Дано: канал отмены `done` и входной канал `in`. Верните два выходных канала.
  Каждое значение из `in` должно уйти и в первый, и во второй выход.

  Требования:

  - Значение попадает в оба выхода (порядок сохраняется, ничего не теряется).
  - Работа прекращается, когда закрыт `in` **или** закрыт `done`; оба выходных
    канала при этом закрываются.
  - Единственная рабочая горутина не должна утекать (проверяется под `-race` и по
    числу горутин).
