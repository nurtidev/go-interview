# приватный тренажёр, по мотивам курса «Многозадачность в Go», личное использование
slug: leaked-goroutine-select
kind: go
title: "Зависшая горутина внутри select и как её починить"
difficulty: senior
tags: [concurrency, channels, goroutine-leak]
statement_md: |
  Реализуйте этап конвейера `Modify`, который читает значения из входного канала,
  применяет к ним функцию `f` и пересылает результат в выходной канал — при этом
  **не оставляя зависших горутин**.

  ```go
  func Modify(cancel <-chan struct{}, in <-chan int, f func(int) int) <-chan int
  ```

  Дано: входной канал `in`, функция `f` (может быть медленной) и канал отмены
  `cancel`. Верните выходной канал, куда идут `f(v)` для каждого `v` из `in`.

  Требования:

  - Поддержка отмены: при закрытии `cancel` горутина завершается.
  - Выходной канал закрывается, когда `in` исчерпан **или** пришла отмена.
  - Подвох: горутина не должна зависнуть, даже если отмена пришла в момент, когда
    горутина заблокирована на **отправке** результата в выход. Наивный
    `select { case v := <-in: out <- f(v); case <-cancel: ... }` протекает:
    выбрав ветку `<-in`, горутина застревает на `out <- ...` — а эта операция
    уже не под защитой верхнего `select`, и `cancel` её не прервёт.

  Проверяется под `-race` и на отсутствие утечки горутин.
