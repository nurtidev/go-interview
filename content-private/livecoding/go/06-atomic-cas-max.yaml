# приватный тренажёр, по мотивам курса «Многозадачность в Go», личное использование
slug: atomic-cas-max
kind: go
title: "Lock-free максимум через compare-and-swap"
difficulty: senior
tags: [atomic, cas, concurrency]
statement_md: |
  Реализуйте `MaxTracker` — потокобезопасный трекер максимума наблюдённых
  значений. Обновление должно быть **lock-free** — через `sync/atomic` и
  `CompareAndSwap`, без `sync.Mutex`.

  ```go
  func NewMaxTracker() *MaxTracker
  func (m *MaxTracker) Observe(x int64)  // учесть значение
  func (m *MaxTracker) Max() int64       // текущий максимум
  ```

  Дано: тысячи горутин конкурентно вызывают `Observe`. `Max` возвращает
  наибольшее из всех наблюдённых значений (или `math.MinInt64`, если ещё ничего
  не наблюдали).

  Почему не подойдёт наивное `if x > m.v { m.v = x }`: между чтением `m.v` и
  записью другая горутина могла обновить максимум — запись «затрёт» её значение
  (потерянное обновление). Нужна атомарная операция «сравни-и-запиши».

  Требования: без гонок и без потери обновлений (проверяется под `-race`).
