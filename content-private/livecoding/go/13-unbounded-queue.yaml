# приватный тренажёр, по мотивам курса «Многозадачность в Go», личное использование
slug: unbounded-queue
kind: go
title: "Блокирующая очередь без ограничения размера"
difficulty: staff
tags: [concurrency, sync, cond]
statement_md: |
  Реализуйте потокобезопасную FIFO-очередь **без ограничения размера**.

  ```go
  func NewQueue() *Queue
  func (q *Queue) Put(v int)  // добавить элемент (никогда не блокирует)
  func (q *Queue) Get() int   // извлечь элемент; блокирует, если очередь пуста
  ```

  Дано: очередь должна расти без ограничений (в отличие от буферизованного
  канала фиксированной ёмкости). `Put` кладёт элемент в конец и не блокирует
  никогда. `Get` возвращает элемент с начала (FIFO); если очередь пуста —
  **блокирует** вызывающую горутину, пока элемент не появится (без busy-waiting).

  Методы вызываются из разных горутин конкурентно.

  Требования: без гонок (`-race`), без busy-waiting, без потерь и дублирования
  элементов при конкуренции.
