# приватный тренажёр, по мотивам курса «Многозадачность в Go», личное использование
slug: delayed-call
kind: go
title: "Отложенный вызов с мгновенной отменой (аналог time.AfterFunc)"
difficulty: middle
tags: [concurrency, time, cancellation]
statement_md: |
  Напишите `Delay` — аналог `time.AfterFunc()`: он выполняет функцию спустя
  заданное время, но с возможностью отмены.

  ```go
  func Delay(dur time.Duration, fn func()) (cancel func())
  ```

  Дано: интервал `dur` и функция `fn`. `Delay` возвращает функцию `cancel`.

  - Через `dur` времени `fn` выполняется — если до этого не вызвали `cancel`.
  - Если `cancel()` вызван **до** истечения `dur` — `fn` не выполняется.
  - Если `cancel()` вызван **после** — ничего не происходит.

  Требования:

  - Отмена **мгновенная**: горутина, запущенная внутри `Delay`, завершается
    сразу при `cancel()`, а не «доспав» оставшееся время.
  - `cancel()` можно вызвать несколько раз — по первому происходит отмена, при
    повторных **не должно быть паники**.
  - Без гонок (`-race`).
