# приватный тренажёр, личное использование
slug: worker-stop-wait
kind: go
title: "Работяга: Start / Stop / Wait"
difficulty: senior
tags: [concurrency, waitgroup, lifecycle]
statement_md: |
  Реализуйте тип `Worker`, который циклически выполняет заданную функцию в
  отдельной горутине и умеет корректно останавливаться.

  ```go
  func NewWorker(fn func() error) *Worker
  func (w *Worker) Start()   // запускает рабочий цикл в горутине
  func (w *Worker) Stop()    // просит остановиться (идемпотентно)
  func (w *Worker) Wait()    // блокирует, пока горутина воркера не завершится
  ```

  Рабочий цикл повторяет `fn()`, пока не выполнится одно из:

  - `fn` вернула ошибку — цикл завершается сам;
  - вызван `Stop()` — цикл завершается на следующей проверке.

  Требования:

  - `Stop()` можно вызывать несколько раз (в т.ч. из другой горутины) — **без
    паники**, останавливает по первому вызову.
  - `Wait()` разблокируется ровно тогда, когда горутина воркера действительно
    вышла.
  - Без гонок (`-race`).
