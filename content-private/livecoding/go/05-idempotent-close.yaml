# приватный тренажёр, по мотивам курса «Многозадачность в Go», личное использование
slug: idempotent-close
kind: go
title: "Идемпотентный Close (почему select+default не атомарен)"
difficulty: senior
tags: [concurrency, sync, idempotency]
statement_md: |
  Реализуйте `OnceCloser` — обёртку, которая гарантирует, что функция
  освобождения ресурса `free` будет вызвана **не более одного раза**, даже если
  `Close()` вызывают одновременно из многих горутин.

  ```go
  func NewOnceCloser(free func()) *OnceCloser
  func (c *OnceCloser) Close()
  ```

  Дано: функция `free`, которую нельзя вызывать дважды (повторный вызов —
  ошибка/паника). `Close()` при первом вызове выполняет `free`; повторные и
  конкурентные вызовы не должны ни повторно вызывать `free`, ни паниковать.

  Подвох: наивная защита через `select`+`default` по каналу-флагу **не решает
  задачу** — выбор ветки `select` и её тело не атомарны, две горутины могут
  одновременно провалиться в `default` и обе вызвать `free`. Нужна настоящая
  атомарность операции «проверить-и-освободить».

  Требования: `free` ровно один раз при любом числе конкурентных `Close()`
  (проверяется под `-race`).
starter_code: |
