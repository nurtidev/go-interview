slug: fan-in-workers
kind: go
title: "Fan-out/fan-in: пул воркеров над общим каналом"
difficulty: middle
tags: [concurrency, channels, waitgroup]
statement_md: |
  Реализуйте fan-out/fan-in: `FanIn` запускает `workers` горутин, которые
  разбирают значения из одного входного канала `in`, применяют к каждому `fn` и
  складывают результаты в общий выходной канал.

  ```go
  func FanIn(in <-chan int, workers int, fn func(int) int) <-chan int
  ```

  Дано: входной канал `in` (кто-то в него пишет и затем закрывает), число
  воркеров `workers` и функция `fn`. Верните выходной канал со всеми
  результатами `fn(v)` для каждого `v` из `in` (порядок не важен).

  Требования:

  - Обработка идёт параллельно: `workers` горутин одновременно тянут из `in`.
  - Выходной канал закрывается **ровно один раз**, когда `in` исчерпан и все
    воркеры завершились — иначе потребитель на `for v := range out` зависнет.
  - Без гонок и без потери/дублирования значений (проверяется под `-race`).
