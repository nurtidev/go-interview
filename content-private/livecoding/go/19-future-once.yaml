# приватный тренажёр, личное использование
slug: future-once
kind: go
title: "Одноразовый Future (Set/Get)"
difficulty: middle
tags: [concurrency, channels, sync]
statement_md: |
  Реализуйте одноразовый **Future** — «обещанный результат», который сначала
  ждут, потом однажды устанавливают.

  ```go
  func NewFuture() *Future
  func (f *Future) Set(v int)
  func (f *Future) Get() int
  ```

  - `Get()` **блокирует** всех вызывающих, пока не будет вызван `Set`. После
    `Set` любой `Get` (в том числе будущий) немедленно отдаёт установленное
    значение.
  - `Set` можно вызвать несколько раз и из разных горутин — **побеждает первый**,
    остальные вызовы игнорируются (без паники).

  Требования: без гонок и без busy-waiting (проверяется под `-race`). `Get` могут
  одновременно звать много горутин — все должны получить одно и то же значение.
