# приватный тренажёр, личное использование
slug: fetch-all-or-error
kind: go
title: "Параллельная загрузка: nil или первая ошибка"
difficulty: middle
tags: [concurrency, waitgroup, errors]
statement_md: |
  Реализуйте `FetchAll` — запускает набор операций параллельно и ждёт их
  завершения.

  ```go
  func FetchAll(fns []func() error) error
  ```

  Дано: срез функций (каждая имитирует загрузку и возвращает ошибку или `nil`).
  Выполните все **параллельно**. Если все успешны — верните `nil`; если хотя бы
  одна вернула ошибку — верните ошибку (первую зафиксированную).

  Требования:

  - Функции выполняются одновременно, а не последовательно.
  - Возврат только после того, как **все** горутины завершились.
  - Без гонок при записи общей ошибки (проверяется под `-race`).
