# приватный тренажёр, по мотивам курса «Многозадачность в Go», личное использование
slug: ticker-aggregator
kind: go
title: "Тикер-агрегатор: периодический сброс накопленной суммы"
difficulty: staff
tags: [concurrency, time, ticker]
statement_md: |
  Реализуйте `Aggregator`, который принимает значения и раз в `interval`
  сбрасывает накопленную с прошлого раза сумму в выходной канал.

  ```go
  func NewAggregator(interval time.Duration) *Aggregator
  func (a *Aggregator) Add(v int64)      // прибавить значение (из многих горутин)
  func (a *Aggregator) Out() <-chan int64 // канал периодических сумм
  func (a *Aggregator) Stop()            // досылает остаток и закрывает Out()
  ```

  Дано: значения поступают через `Add` из многих горутин. Каждые `interval`
  времени агрегатор отправляет в `Out()` сумму значений, накопленную с момента
  прошлого сброса, и обнуляет накопитель. `Stop()` досылает накопленный остаток
  и закрывает `Out()`; после `Stop()` потребитель, читающий `for s := range
  a.Out()`, штатно завершает цикл.

  Требования:

  - `Add` потокобезопасен для конкурентных вызовов (`-race`).
  - Ни одно значение не теряется: сумма всех выданных в `Out()` величин равна
    сумме всех `Add` (даже с учётом финального сброса в `Stop`).
  - `Stop()` идемпотентен (повторные вызовы без паники), внутренняя горутина не
    утекает.
