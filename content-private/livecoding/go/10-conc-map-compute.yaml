# приватный тренажёр, по мотивам курса «Многозадачность в Go», личное использование
slug: conc-map-compute
kind: go
title: "Конкурентная карта: SetIfAbsent и Compute"
difficulty: senior
tags: [concurrency, mutex, generics]
statement_md: |
  Дана потокобезопасная обобщённая карта `ConcMap` с `Get`. Добавьте два метода,
  выполняющих **составную операцию атомарно** (проверку и изменение под одной
  блокировкой).

  ```go
  func (m *ConcMap[K, V]) SetIfAbsent(key K, val V) V
  func (m *ConcMap[K, V]) Compute(key K, fn func(V) V)
  ```

  - `SetIfAbsent` кладёт `val` по ключу, только если ключа ещё нет, и возвращает
    **актуальное** значение: если ключ уже был — старое; если не было — только
    что вставленное. При конкурентной вставке одного ключа «побеждает» ровно
    один, и все вызовы возвращают значение победителя.
  - `Compute` заменяет значение по ключу результатом `fn(текущее значение)`.
    `fn` должна примениться атомарно: параллельные `Compute("k", +1)` из двух
    горутин по 100 раз каждая дают итог 200 (ничего не теряется).

  Требования: без гонок и без потерянных обновлений (проверяется под `-race`).
