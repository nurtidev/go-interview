# приватный тренажёр, личное использование
slug: iv-go-review-concurrent-map
section: private
title: "Ревью кода: параллельный инкремент счётчиков в map"
difficulty: senior
tags: [review, go, concurrency, data-race]
question_md: |
  Найдите проблемы в этом коде, который параллельно увеличивает счётчики по
  ключам.

  ```go
  type Counter struct {
      counts map[string]int
  }

  func (c *Counter) Add(keys []string) {
      var wg sync.WaitGroup
      for _, k := range keys {
          wg.Add(1)
          go func(k string) {
              defer wg.Done()
              c.counts[k]++
          }(k)
      }
      wg.Wait()
  }
  ```
answer_levels:
  - level: middle
    text_md: |
      Главная проблема — **гонка данных на map**. Встроенная `map` в Go **не
      безопасна для конкурентной записи**: несколько горутин делают
      `c.counts[k]++` одновременно, и рантайм это детектирует, аварийно
      завершая процесс с `fatal error: concurrent map writes` (это не
      обычная паника — её нельзя перехватить `recover`).

      Минимальное исправление — защитить доступ мьютексом:

      ```go
      type Counter struct {
          mu     sync.Mutex
          counts map[string]int
      }

      // внутри горутины:
      c.mu.Lock()
      c.counts[k]++
      c.mu.Unlock()
      ```
  - level: senior
    text_md: |
      Тоньше:

      - **`counts[k]++` не атомарна сама по себе.** Это read-modify-write
        (прочитать, прибавить, записать). Даже если бы map была потокобезопасной
        для отдельных операций, инкремент без блокировки терял бы обновления.
        Нужна синхронизация вокруг всего `++`, а не только вокруг записи.

      - **`nil`-map.** Если `Counter` создан без инициализации `counts`
        (`&Counter{}`), запись в `nil`-map — паника. Нужен конструктор,
        инициализирующий `counts: make(map[string]int)`.

      - **Смысл распараллеливания.** Задача — просто прибавить по ключу. Под
        мьютексом все горутины всё равно выстроятся в очередь на `Lock`,
        поэтому параллелизм не даёт ускорения, зато добавляет накладные
        расходы. Здесь горутины вообще не нужны — обычный цикл быстрее и
        проще.
  - level: deep
    text_md: |
      Самое тонкое и про выбор инструмента:

      - **`sync.Map` — не тот инструмент.** Её часто предлагают «чтобы без
        мьютекса», но у `sync.Map` нет атомарного инкремента: пришлось бы
        `LoadOrStore` + CAS/`atomic`, что сложнее и медленнее обычного
        `map` под `Mutex` для сценария «много записей по одним и тем же
        ключам». `sync.Map` выгодна при почти-только-чтении и
        непересекающихся ключах, а не для счётчиков.

      - **Порча памяти, а не просто гонка.** Конкурентная запись в map может
        не только потерять обновления, но и повредить внутренние структуры
        (при разрастании/rehash), поэтому рантайм и делает аварийный `fatal
        error`, а не молча продолжает.

      - **Анти-паттерн «горутина на единицу работы».** Планировщик, `wg.Add`
        и захват мьютекса на каждый `++` стоят кратно дороже самой операции.
        Если распараллеливание действительно нужно (тяжёлая работа на ключ) —
        применяют шардированную map (массив бакетов со своим мьютексом,
        ключ -> шард по хешу) или агрегируют локально в каждой горутине и
        сливают результаты в конце, минимизируя contention.

      - **Как поймать.** `go test -race` немедленно показывает гонку; без
        `-race` баг может «не проявляться» на малом числе ключей/горутин и
        стрелять в проде под нагрузкой.
