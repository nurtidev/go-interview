# приватный тренажёр, личное использование
slug: iv-pastebin-capacity
section: system-design
title: "Capacity estimation: сервис сниппетов (аналог Pastebin)"
difficulty: senior
tags: [capacity, system-design, estimation]
question_md: |
  Спроектируйте сервис коротких сниппетов (аналог Pastebin) и оцените
  нагрузку. Вводные:

  - функционал: создать сниппет и прочитать сниппет;
  - 10 млн созданий в месяц, чтений в 10 раз больше;
  - каждый сниппет хранится 1 месяц, затем удаляется;
  - чтение должно быть максимально быстрым;
  - поверх основной нагрузки аналитики периодически кидают тяжёлые
    («жирные») запросы.

  Посчитайте RPS и объём хранения по шагам и предложите архитектуру с
  учётом требований.
answer_levels:
  - level: middle
    text_md: |
      **Шаг 1. RPS.** В месяце ≈ 30 * 24 * 3600 ≈ 2.6 млн секунд.

      - Записи (создания): 10^7 / 2.6*10^6 ≈ **~4 записи/с** в среднем.
      - Чтения: в 10 раз больше ≈ **~40 чтений/с** в среднем.
      - Это средние; реальный пик обычно в 3–5 раз выше, закладываем
        **~20 записей/с и ~150–200 чтений/с** на пике.

      Вывод: нагрузка небольшая, система read-heavy (чтений на порядок
      больше записей) — оптимизируем прежде всего путь чтения.

      **Шаг 2. Хранение.** Сниппет живёт 1 месяц, создаётся 10 млн/месяц —
      значит в любой момент времени активно храним **≈ 10 млн сниппетов**
      (старые истекают ровно с той же скоростью, что появляются новые).

      Пусть средний размер сниппета ≈ 10 КБ. Тогда:
      10^7 * 10 КБ ≈ **~100 ГБ** активных данных. Если средний размер 100 КБ —
      ~1 ТБ. Порядок — десятки–сотни ГБ, помещается на один-два узла.

      **Шаг 3. Базовая архитектура.**

      - Запись: генерируем короткий id (base62), кладём `id -> содержимое` в
        хранилище с TTL 1 месяц.
      - Чтение: по id достаём содержимое; т.к. read-heavy — кэшируем горячие
        сниппеты.
  - level: senior
    text_md: |
      **Быстрое чтение.** Ключевое требование. Слои:

      - **CDN + кэш (Redis).** Сниппет иммутабелен (создать/прочитать, без
        частых правок) — идеально кэшируется. TTL кэша совпадает со сроком
        жизни сниппета. Большинство чтений уходит в кэш/CDN, БД разгружена.
      - **Хранилище.** Метаданные (id, created_at, expires_at, size) — в
        компактной таблице/KV; крупный текст можно держать в объектном
        хранилище (S3-подобном) и отдавать через CDN. При ~100 ГБ данных
        подойдёт и обычная реляционная БД с индексом по id.
      - **Истечение.** TTL на уровне KV (Redis EXPIRE) либо фоновая
        джоба-уборщик по `expires_at`. За счёт удаления объём хранения
        стационарен (~10 млн записей), не растёт бесконечно.

      **Изоляция аналитики.** «Жирные» запросы аналитиков нельзя пускать в
      тот же инстанс, что обслуживает быстрые чтения, — они выедают буферный
      кэш и блокировки, деградируя p99 основного трафика. Разделяем:

      - отдельная **read-реплика** для аналитических запросов, основной
        трафик — на primary/кэш;
      - ещё лучше — выносить аналитику в отдельное **OLAP-хранилище**
        (например, ClickHouse), наполняемое асинхронно потоком событий, а не
        запросами по OLTP-базе.

      **Полоса.** 40 чтений/с * 10 КБ ≈ 400 КБ/с в среднем, на пике единицы
      МБ/с — незначительно, тем более за CDN.
  - level: deep
    text_md: |
      Тонкости и trade-offs:

      - **Генерация id.** Нужен короткий уникальный ключ. Варианты: случайный
        base62 длиной 7–8 символов (проверять коллизию вставкой с unique-
        индексом и ретраем) либо счётчик/Snowflake с кодированием в base62.
        При 10 млн/мес и 8 символах base62 (62^8 ≈ 2*10^14) вероятность
        коллизий ничтожна.
      - **Read-heavy => реплики.** Масштабирование чтений — горизонтально
        репликами; запись слабая (~4/с), одного primary хватит с огромным
        запасом. Узкое место не в throughput, а в latency чтения — его
        закрывает кэш.
      - **Согласованность кэша.** Сниппеты иммутабельны, поэтому инвалидация
        почти не нужна — только по истечении TTL; это резко упрощает
        кэширование (нет проблемы устаревших данных при обновлениях).
      - **Изоляция аналитики глубже.** Даже read-реплика разделяет ресурсы
        хранилища (диск, репликационный лаг под тяжёлыми запросами). Чистое
        решение — CQRS: OLTP отдаёт создания/чтения, а события уходят в
        отдельный аналитический контур (Kafka -> ClickHouse), где «жирные»
        запросы никак не влияют на продакшн-путь.
      - **Пиковость и защита.** Rate limiting на создание (антиспам), лимит
        размера сниппета, TTL-очистка батчами, чтобы не создавать всплесков
        нагрузки на удаление.
      - **Стоимость хранения.** ~100 ГБ * (реплики + бэкапы) — всё равно
        дёшево; главный расход — трафик чтения, который снимает CDN.
