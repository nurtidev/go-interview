# приватный тренажёр, личное использование
slug: iv-lost-orders-outbox
section: system-design
title: "Медленная аналитика теряет заказы: как перестать терять"
difficulty: senior
tags: [outbox, reliability, async, system-design]
question_md: |
  Создание заказа сейчас устроено так:

  ```
  1. приходит запрос (SetOrder: id, status)
  2. пишем заказ в БД
  3. синхронно шлём запрос в сервис аналитики (популярность товаров)
  4. возвращаем ответ клиенту
  ```

  Сервис аналитики периодически работает медленно или таймаутит, из-за
  шага 3 мы не успеваем ответить и **теряем заказы** (и деньги). Нагрузка
  высокая (highload). Как перестроить последовательность, чтобы перестать
  терять заказы? Опишите шаги, какие данные сохраняются/передаются, и
  приведите SQL, если появляется работа с БД.
answer_levels:
  - level: middle
    text_md: |
      Корень проблемы: доступность оформления заказа искусственно завязана
      на доступность **необязательного** сервиса аналитики. Аналитика — это
      сайд-эффект, а не часть транзакции заказа; она не должна блокировать
      ответ клиенту.

      Базовое исправление — убрать синхронный вызов аналитики из критического
      пути:

      ```
      1. приходит запрос
      2. пишем заказ в БД
      3. возвращаем ответ клиенту   <- сразу после коммита заказа
      4. аналитику уведомляем асинхронно (не блокируя ответ)
      ```

      Тогда таймаут аналитики влияет только на её собственную актуальность, а
      не на приём заказов. Наивный способ «асинхронно» — отправить событие в
      очередь (Kafka/RabbitMQ) или в фоновую горутину после коммита.
  - level: senior
    text_md: |
      Наивное «после коммита стрельнуть в горутине/очереди» имеет дыру: если
      процесс упал (или сеть моргнула) **между** коммитом заказа и отправкой
      события — заказ есть, а аналитика о нём не узнала. Теперь мы теряем не
      заказы, а события (что для подсчёта популярности тоже плохо). Нужна
      **атомарность** «сохранили заказ» и «зафиксировали намерение уведомить
      аналитику».

      Решение — **transactional outbox**: в одной транзакции с заказом пишем
      строку в таблицу-исходящих, а отдельный воркер-релей асинхронно её
      доставляет.

      ```sql
      CREATE TABLE outbox (
        id           BIGSERIAL PRIMARY KEY,
        order_id     BIGINT NOT NULL,
        payload      JSONB NOT NULL,      -- что шлём в аналитику
        created_at   TIMESTAMPTZ NOT NULL DEFAULT now(),
        processed_at TIMESTAMPTZ          -- NULL = ещё не доставлено
      );
      CREATE INDEX ix_outbox_unprocessed ON outbox (id) WHERE processed_at IS NULL;
      ```

      Запись заказа и события — одной транзакцией:

      ```sql
      BEGIN;
        INSERT INTO orders (id, status) VALUES ($1, $2);
        INSERT INTO outbox (order_id, payload)
        VALUES ($1, jsonb_build_object('order_id', $1, 'items', $3));
      COMMIT;
      ```

      Отдельный воркер выгребает недоставленные события и шлёт в аналитику;
      под highload воркеров несколько, поэтому берём строки с
      `FOR UPDATE SKIP LOCKED`, чтобы они не мешали друг другу:

      ```sql
      SELECT id, payload
      FROM outbox
      WHERE processed_at IS NULL
      ORDER BY id
      LIMIT 100
      FOR UPDATE SKIP LOCKED;
      -- ... отправили в аналитику ...
      UPDATE outbox SET processed_at = now() WHERE id = ANY($1);
      ```

      Теперь ответ клиенту зависит только от БД заказов; аналитика может
      лежать сколько угодно — события накопятся в outbox и доставятся позже.
  - level: deep
    text_md: |
      Тонкости production-реализации:

      - **Гарантия — at-least-once.** Между «отправили в аналитику» и
        «пометили processed_at» воркер может упасть — событие уедет повторно.
        Значит аналитика должна быть **идемпотентной**: дедуплицировать по
        `order_id`/event id (уникальный ключ или upsert). Exactly-once на
        уровне доставки в общем случае недостижим — его эмулируют
        at-least-once + идемпотентность на приёмнике.
      - **Порядок.** Если аналитике важен порядок событий по заказу —
        обрабатывать по ключу (`order_id`) последовательно; `ORDER BY id` +
        один воркер на ключ или партиционирование по ключу в Kafka.
      - **Poller vs CDC.** Периодический `SELECT ... SKIP LOCKED` — простой
        polling. Альтернатива без нагрузки на БД опросами — **CDC**
        (Debezium читает WAL/logical replication) и публикует изменения
        outbox в Kafka. Это снимает polling-нагрузку и даёт масштабируемую
        доставку.
      - **Рост таблицы.** Outbox нужно чистить: удалять/архивировать
        `processed_at IS NOT NULL` старше N часов (партиции по времени +
        `DROP PARTITION`, либо батч-DELETE), иначе таблица и индекс распухают.
      - **Dead-letter и ретраи.** Если аналитика отвергает событие
        (постоянная ошибка) — счётчик попыток и перенос в dead-letter, чтобы
        один «ядовитый» месседж не застревал в голове очереди.
      - **Почему не 2PC.** Распределённая транзакция между БД заказов и
        сервисом аналитики (2PC) дала бы атомарность, но она хрупкая и
        медленная под highload (блокировки, координатор — единая точка
        отказа). Outbox переносит атомарность внутрь одной локальной БД —
        отсюда его надёжность и популярность.
      - **Backpressure.** Пока аналитика тормозит, outbox растёт — это
        нормально (буфер), но нужен мониторинг лага (`count(*) where
        processed_at is null` и возраст самой старой строки), чтобы вовремя
        заметить, что аналитика не разгребает.
