# приватный тренажёр, личное использование
slug: iv-ssh-timeout-tunnel
section: platform
title: "SSH-таймаут до БД: как достучаться через бастион"
difficulty: middle
tags: [linux, ssh, networking]
question_md: |
  Топология: ваша машина `computer` -> промежуточный сервер (bastion/jump
  host) -> сервер `database`. Нужно с `computer` выполнить SQL-запрос на
  `database`. Прямой `ssh database` не проходит — таймаут (соединение
  висит и обрывается по времени). Что можно сделать, чтобы всё же
  подключиться и выполнить запрос?
answer_levels:
  - level: middle
    text_md: |
      Таймаут (а не «connection refused») почти всегда означает, что до
      `database` **нет сетевой связности напрямую**: пакеты некуда доставить —
      мешает firewall/security group, или сервер в приватной подсети и
      доступен только через bastion. «Refused» означало бы, что хост виден, но
      порт закрыт; «timeout» — что до хоста вообще не доходит.

      Стандартное решение — пройти через промежуточный (jump) хост, к
      которому доступ есть. Современный способ — `ProxyJump`:

      ```bash
      ssh -J user@bastion user@database
      ```

      Дальше SQL можно выполнить прямо на сервере (`psql`, `mysql`), либо
      пробросить порт БД к себе (см. senior-уровень) и подключиться локальным
      клиентом.
  - level: senior
    text_md: |
      Практичнее не заходить руками, а **пробросить порт БД** на локальную
      машину через SSH-туннель (local port forwarding). Тогда локальный
      SQL-клиент/приложение работает так, будто БД на `localhost`:

      ```bash
      # локальный порт 5432 -> database:5432 через bastion
      ssh -N -L 5432:database:5432 user@bastion
      # в другом терминале:
      psql -h 127.0.0.1 -p 5432 -U app mydb
      ```

      Здесь `database:5432` резолвится **на стороне bastion**, поэтому даже
      если из дома до БД нет маршрута, туннель работает. Флаг `-N` — не
      выполнять команду, только форвардинг; `-f` — уйти в фон.

      Чтобы не печатать `-J` каждый раз, это удобно зафиксировать в
      `~/.ssh/config`:

      ```
      Host database
        HostName 10.0.1.20
        User app
        ProxyJump bastion
      ```
  - level: deep
    text_md: |
      Тонкости и диагностика:

      - **Почему именно timeout.** Отличать «пакет молча дропнут firewall'ом»
        (timeout) от «дошёл, но порт закрыт» (RST -> refused) помогает
        `nc -vz database 22` / `nmap`. Timeout -> проблема на уровне
        маршрутизации/фильтрации, а не в самом sshd.
      - **`ProxyJump` vs `ProxyCommand`.** `-J` — это сахар над
        `ProxyCommand ssh -W %h:%p bastion`. Старый `ProxyCommand` с
        `netcat` (`nc %h %p`) всё ещё встречается, но `-W`/`-J` не требуют
        `nc` на бастионе.
      - **Несколько прыжков.** `ssh -J user@b1,user@b2 database` —
        цепочка бастионов.
      - **Тюнинг таймаутов.** `ConnectTimeout`, а для длинных туннелей —
        `ServerAliveInterval`/`ServerAliveCountMax`, чтобы туннель не рвался
        на idle.
      - **Альтернативы.** Если задача разовая — `ssh user@database 'psql -c
        "..."'` выполнит запрос без интерактивной сессии. В облаках вместо
        классического bastion часто используют SSM Session Manager /
        IAP-туннели — там «bastion» логический, но идея та же: доступ к
        приватному хосту через управляемый прокси.
