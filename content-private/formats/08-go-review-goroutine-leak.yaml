# приватный тренажёр, личное использование
slug: iv-go-review-goroutine-leak
section: private
title: "Ревью кода: параллельный сбор ответов по URL"
difficulty: senior
tags: [review, go, concurrency, goroutine-leak]
question_md: |
  Найдите проблемы в этой функции, которая должна параллельно опросить
  список URL и вернуть их статусы.

  ```go
  func fetchAll(urls []string) []string {
      ch := make(chan string)

      for _, u := range urls {
          go func() {
              resp, _ := http.Get(u)
              ch <- resp.Status
          }()
      }

      var out []string
      for i := 0; i < len(urls)-1; i++ {
          out = append(out, <-ch)
      }
      return out
  }
  ```
answer_levels:
  - level: middle
    text_md: |
      Две очевидные ошибки:

      - **Off-by-one в приёме.** Цикл читает `len(urls)-1` значений, а
        отправляют все `len(urls)` горутин. Один результат недополучен, а
        одна горутина навсегда зависнет на `ch <- ...` (некому принять) —
        **утечка горутины**. Читать надо ровно `len(urls)` раз.

      - **Захват переменной цикла `u`.** До Go 1.22 все горутины замыкают
        одну и ту же переменную `u` и увидят её последнее значение — опросят
        последний URL несколько раз. Исправление: передавать параметром
        `go func(u string){...}(u)` (в Go 1.22+ семантика per-iteration это
        чинит, но полагаться на версию — плохо, лучше передать явно).
  - level: senior
    text_md: |
      Тоньше:

      - **Небуферизованный канал + меньше приёмов, чем отправок.** Даже без
        off-by-one: если хоть одна горутина отправит в `ch`, когда основная
        уже перестала читать, она заблокируется навсегда. Канал стоит сделать
        буферизованным на `len(urls)` либо гарантированно вычитать все
        значения.

      - **Проигнорированная ошибка `http.Get`.** При ошибке `resp == nil`, и
        `resp.Status` — паника внутри горутины, которая уронит **весь**
        процесс (панику в чужой горутине не поймать снаружи).

      - **`resp.Body` не закрывается.** Даже для успешных ответов тело не
        читается и не закрывается — соединение не возвращается в пул, утечка
        коннектов под нагрузкой.

      - **Недетерминированный порядок.** Результаты складываются в порядке
        готовности, а не в порядке `urls` — если порядок важен, нужно писать
        по индексу в заранее выделенный слайс.
  - level: deep
    text_md: |
      Самое тонкое и вопрос дизайна:

      - **Нет ограничения конкуренции.** На большом списке функция создаёт
        столько горутин и одновременных HTTP-соединений, сколько URL —
        тысячи. Это исчерпывает файловые дескрипторы и эфемерные порты. Нужен
        семафор (буферизованный канал) или пул воркеров, ограничивающий
        параллелизм.

      - **Нет контекста и отмены.** Один зависший URL держит горутину до
        собственного таймаута (которого у `http.Get` нет). Нужен
        `context.Context` с таймаутом/отменой и `http.NewRequestWithContext`.

      - **Правильная форма.** Собрать всё через `sync.WaitGroup` +
        буферизованный канал (или `golang.org/x/sync/errgroup` с
        `SetLimit`), закрыть канал после `wg.Wait()`, писать результат по
        индексу, обязательно `defer resp.Body.Close()` и обработка ошибок
        каждого запроса. Ошибки отдельных URL не должны терять остальные
        результаты.

      - **Как ловить.** Утечка горутин и гонки ловятся `go test -race` и
        мониторингом `runtime.NumGoroutine()` — при таком коде число горутин
        растёт и не спадает.
