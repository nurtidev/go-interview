# приватный тренажёр, личное использование
slug: iv-go-review-http-handler
section: private
title: "Ревью кода: HTTP-хендлер с запросом в БД и во внешний сервис"
difficulty: senior
tags: [review, go, http, sql]
question_md: |
  Найдите проблемы в этом HTTP-хендлере на Go и предложите, как их исправить.

  ```go
  func GetUser(w http.ResponseWriter, r *http.Request) {
      id := r.URL.Query().Get("id")

      query := "SELECT name, email FROM users WHERE id = " + id
      rows, _ := db.Query(query)

      var name, email string
      for rows.Next() {
          rows.Scan(&name, &email)
      }

      resp, _ := http.Get("http://profile-svc/avatar?id=" + id)
      body, _ := io.ReadAll(resp.Body)

      w.Write([]byte(name + email + string(body)))
  }
  ```
answer_levels:
  - level: middle
    text_md: |
      Грубые проблемы, видимые сразу:

      - **SQL-инъекция.** `id` из query-параметра клеится прямо в текст
        запроса. `?id=1 OR 1=1` вернёт всех, `?id=0; DROP TABLE users` —
        катастрофа. Нужен параметризованный запрос с плейсхолдером:

        ```go
        row := db.QueryRowContext(ctx, "SELECT name, email FROM users WHERE id = $1", id)
        ```

      - **Проигнорированные ошибки.** Везде `_`: у `db.Query`, `rows.Scan`,
        `http.Get`. Если запрос упал, `rows` будет `nil`, а
        `for rows.Next()` — паника. Ошибки нужно проверять и отвечать
        клиенту корректным статусом (400/404/500).

      - **Утечка ресурсов.** `rows` не закрывается (`defer rows.Close()`), а
        `resp.Body` не закрывается — при потоке запросов это утечка
        соединений и файловых дескрипторов.
  - level: senior
    text_md: |
      Более тонкие вещи:

      - **Нет контекста и таймаутов.** Хендлер не пробрасывает
        `r.Context()` в `db.Query`/`http.Get`. Медленная БД или зависший
        `profile-svc` держат горутину хендлера бесконечно; при пиковой
        нагрузке горутины и соединения копятся до исчерпания ресурсов. Нужны
        `...Context(ctx, ...)` и `http.Client` с таймаутом (стандартный
        `http.Get` использует `DefaultClient` **без** таймаута).

      - **`rows.Err()` не проверяется.** После цикла `for rows.Next()` нужно
        `if err := rows.Err(); err != nil { ... }` — иначе ошибка обрыва
        итерации молча теряется, и вернётся неполный/пустой результат как
        «успех».

      - **Ошибка `w.Write` и статус.** Код никогда не выставляет статус явно
        и не различает «не найдено» и «ошибка». При пустой выборке вернётся
        пустая строка с 200 OK.

      - **Утечка PII.** `email` (персональные данные) склеивается в тело
        ответа вместе с чем попало — как минимум сомнительно с точки зрения
        приватности и формата ответа.
  - level: deep
    text_md: |
      Самое тонкое:

      - **`resp` может быть `nil` при ошибке.** В Go при `resp, err :=
        http.Get(...)` если `err != nil`, то `resp == nil`, и
        `resp.Body` — немедленная паника. Игнор ошибки здесь особенно
        опасен: обращение к `nil`-ответу роняет процесс.

      - **`resp.StatusCode` не проверяется.** Даже при `err == nil` ответ
        может быть 500/404 — тело окажется страницей ошибки, которую мы молча
        вклеим в ответ пользователю.

      - **SSRF / инъекция в URL.** `id` без экранирования вставляется во
        внешний URL. Кроме порчи запроса это потенциальный вектор
        манипуляции downstream-вызовом; параметры надо кодировать
        (`url.Values`/`url.QueryEscape`), а лучше валидировать `id` как
        число.

      - **Отсутствие переиспользования клиента и лимитов.** Для внешних
        вызовов нужен сконфигурированный `*http.Client` (таймауты,
        `Transport` с лимитами пула), а не `http.Get`. Иначе под нагрузкой —
        рост числа TCP-соединений и деградация.

      - **Смешение ответственностей.** Хендлер сам ходит в БД и во внешний
        сервис, клеит ответ строками — нет слоя, нет обработки ошибок, нет
        сериализации (JSON). Это уже дизайн-замечание, но именно его ждут на
        senior-ревью.
