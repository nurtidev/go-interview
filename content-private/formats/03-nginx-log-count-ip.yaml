# приватный тренажёр, личное использование
slug: iv-nginx-log-count-ip
section: platform
title: "Посчитать строки логов nginx по конкретному IP"
difficulty: middle
tags: [linux, bash, logs]
question_md: |
  Есть файл логов nginx `access.log` в стандартном combined-формате (IP
  клиента — первое поле строки). Нужно посчитать, сколько запросов пришло с
  конкретного IP, например `203.0.113.7`. Составьте команду(ы) bash и
  объясните нюансы.
answer_levels:
  - level: middle
    text_md: |
      Простейший вариант — посчитать строки, содержащие этот IP:

      ```bash
      grep -c '203.0.113.7' access.log
      ```

      `grep -c` печатает число совпавших **строк** (не совпадений — если в
      строке IP встретился дважды, это всё равно +1, что нам и нужно).

      Альтернатива через подсчёт строк:

      ```bash
      grep '203.0.113.7' access.log | wc -l
      ```

      `grep -c` предпочтительнее: не плодит лишний процесс и не ошибётся на
      пустом выводе.
  - level: senior
    text_md: |
      Наивный `grep '203.0.113.7'` неточен по двум причинам:

      - **Точка в regex — любой символ**, поэтому шаблон матчит и
        `203X0X113X7`. Нужно экранировать (`203\.0\.113\.7`) или искать
        фиксированную строку через `grep -F`.
      - **Подстрочное совпадение**: `203.0.113.7` найдётся внутри
        `203.0.113.70` или в URL/User-Agent. IP клиента — это **первое
        поле** строки, надёжнее матчить именно его.

      Точный подсчёт по первому полю:

      ```bash
      awk '$1 == "203.0.113.7" { n++ } END { print n+0 }' access.log
      ```

      Или через grep с якорем начала строки и фиксированной строкой:

      ```bash
      grep -c '^203\.0\.113\.7 ' access.log
      ```

      (`^` — начало строки, пробел после IP — граница поля.)
  - level: deep
    text_md: |
      Дополнительные соображения:

      - **`X-Forwarded-For` / реальный клиент.** За балансировщиком/CDN в
        `$remote_addr` окажется IP прокси, а настоящий клиент — в заголовке,
        который в combined-логе не первое поле. Тогда нужно парсить
        соответствующее поле (или настроить `log_format` с
        `$http_x_forwarded_for` и матчить его).
      - **Топ IP по количеству** — частое продолжение задачи:

        ```bash
        awk '{ print $1 }' access.log | sort | uniq -c | sort -rn | head
        ```

      - **Ротация логов.** Реальные логи бьются на `access.log`,
        `access.log.1`, `access.log.2.gz`. По архивам считают `zgrep`/`zcat`:

        ```bash
        zcat -f access.log* | awk '$1=="203.0.113.7"{n++} END{print n+0}'
        ```

      - **Производительность.** На больших файлах один проход `awk` быстрее,
        чем `grep | wc`; для гигабайтных логов помогает `LC_ALL=C`, чтобы
        отключить дорогое Unicode-сравнение.
