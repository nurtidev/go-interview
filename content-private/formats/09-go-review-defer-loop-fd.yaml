# приватный тренажёр, личное использование
slug: iv-go-review-defer-loop-fd
section: private
title: "Ревью кода: суммарный размер файлов и defer в цикле"
difficulty: middle
tags: [review, go, defer, resources]
question_md: |
  Найдите проблемы в функции, которая считает суммарный размер набора
  файлов.

  ```go
  func totalSize(paths []string) (int64, error) {
      var total int64
      for _, p := range paths {
          f, err := os.Open(p)
          if err != nil {
              return 0, err
          }
          defer f.Close()

          info, _ := f.Stat()
          total += info.Size()
      }
      return total, nil
  }
  ```
answer_levels:
  - level: middle
    text_md: |
      Главная проблема — **`defer f.Close()` внутри цикла**. `defer`
      выполняется не в конце итерации, а в конце **функции**. Значит все
      открытые файлы остаются открытыми до самого `return`: на большом списке
      это накопление дескрипторов и ошибка `too many open files` (упор в
      `ulimit -n`).

      Правильно — закрывать файл в конце каждой итерации, а не копить defer'ы.
      Проще всего вынести тело в отдельную функцию/замыкание, где `defer`
      сработает per-iteration:

      ```go
      for _, p := range paths {
          if err := func() error {
              f, err := os.Open(p)
              if err != nil {
                  return err
              }
              defer f.Close()
              info, err := f.Stat()
              if err != nil {
                  return err
              }
              total += info.Size()
              return nil
          }(); err != nil {
              return 0, err
          }
      }
      ```
  - level: senior
    text_md: |
      Тоньше:

      - **Проигнорированная ошибка `f.Stat()`.** При `_` в случае ошибки
        `info == nil`, и `info.Size()` — паника. Ошибку надо проверять.

      - **Файл вообще не нужно открывать.** Чтобы узнать размер, достаточно
        `os.Stat(p)` — он не занимает файловый дескриптор вовсе. Тогда
        проблема с `defer`/fd исчезает в принципе:

        ```go
        for _, p := range paths {
            info, err := os.Stat(p)
            if err != nil {
                return 0, err
            }
            total += info.Size()
        }
        ```

      - **Поведение при ошибке.** Сейчас первая же ошибка обрывает всё и
        возвращает 0. Иногда это верно, но стоит осознанно решить: падать на
        первой ошибке или собирать частичный результат.
  - level: deep
    text_md: |
      Самое тонкое:

      - **`os.Stat` следует по симлинкам, `os.Lstat` — нет.** Для симлинка на
        большой файл они дадут разный размер; для директорий `Size()` вообще
        не равен суммарному размеру содержимого. Нужно решить, как считать
        симлинки и папки (и хотим ли рекурсивно — тогда `filepath.WalkDir`).

      - **TOCTOU.** Между `Stat` и реальным использованием файл может
        измениться/исчезнуть — для «суммарного размера» это обычно
        допустимо, но если по этим размерам потом что-то аллоцируется,
        расхождение возможно.

      - **Почему `defer` в цикле — классическая ловушка.** `defer` привязан к
        возврату из функции, а не к границе блока. Помимо утечки fd это ещё и
        рост LIFO-стека отложенных вызовов (память) при большом числе
        итераций. Линтеры (`gocritic`, `revive`) специально ловят
        `deferInLoop`.

      - **Ошибка `Close` при чтении.** Здесь файл только читается, поэтому
        игнор ошибки `Close` не критичен; но при записи `Close` может
        вернуть ошибку сброса буфера на диск, и её нужно проверять
        (именованный возврат + `defer func(){ err = f.Close() }()`).
