# приватный тренажёр, банк вопросов по грейдам, личное использование
slug: zad-string-internals-basic
section: go-internals
title: "Строка в Go: неизменяемый срез байт, руны"
difficulty: senior
tags: [strings, runes, go-internals]
question_md: |
  Что из себя представляет строка в Go? Чем отличается байт от руны в Go?
answer_levels:
  - level: middle
    text_md: |
      В Go строка — это срез (slice) байтов, доступный только для чтения
      (неизменяемый).
  - level: senior
    text_md: |
      Хороший кандидат знает, как итерироваться посимвольно (рунами) по
      строке — через `range` по строке, а не по индексу байта напрямую, —
      и знает, как подсчитать количество рун в строке (например,
      `utf8.RuneCountInString` или `len([]rune(s))`), в отличие от `len(s)`,
      который считает байты.
  - level: deep
    text_md: |
      Руна (`rune`) — это тип в Go, псевдоним `int32`, предназначенный для
      представления кодовых точек Unicode, для кодирования которых может
      потребоваться до 32 бит. Строки в Go хранятся в кодировке UTF-8, где
      один символ может занимать от 1 до 4 байт — отсюда и разница между
      `len(s)` (число байт) и числом рун: для строки, содержащей символы
      вне ASCII, эти два числа расходятся, и полагаться на `len(s)` как на
      «число символов» — частая ошибка.
