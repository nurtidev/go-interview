# приватный тренажёр, банк вопросов по грейдам, личное использование
slug: zad-sql-join-ban-list
section: platform
title: "SQL: покупки до бана и пользователи с суммой покупок больше порога"
difficulty: senior
tags: [sql, joins, having]
question_md: |
  Есть база с такой схемой данных:

  ```
  // user
  id | firstname | lastname | birth
  1  | Ivan      | Petrov   | 1996-05-01
  2  | Anna      | Petrova  | 1999-06-01
  3  | Anna      | Petrova  | 1990-10-02

  // purchase
  sku| price | user_id | date
  1  | 5500  | 1       | 2021-02-15
  1  | 5700  | 1       | 2021-01-15
  2  | 4000  | 1       | 2021-02-14
  3  | 8000  | 2       | 2021-03-01
  4  | 400   | 2       | 2021-03-02

  // ban_list
  user_id | date_from
  1       | 2021-03-08
  ```

  1. Вывести уникальные комбинации пользователя и id товара для всех
     покупок, совершённых пользователями до того, как их забанили.
     Отсортировать сначала по имени пользователя, потом по SKU.
  2. Найти пользователей, которые совершили покупок на сумму больше 5000р.
     Вывести их имена в формате `id пользователя | имя | фамилия | сумма
     покупок`.
answer_levels:
  - level: middle
    text_md: |
      Первый запрос проверяет умение работать с `JOIN`, `DISTINCT`,
      `WHERE` и `ORDER BY` одновременно, да ещё и с условием, зависящим от
      **сравнения дат из двух разных таблиц**, а не просто от наличия
      записи в `ban_list`.
  - level: senior
    text_md: |
      ```sql
      SELECT DISTINCT u.id, firstname, lastname, p.item_id
      FROM users u
           JOIN purchase p ON u.id = p.user_id
           LEFT JOIN ban_list bl ON u.id = bl.user_id -- не забыть left join,
                                                       -- иначе в результат попадут
                                                       -- только покупки забаненных
      WHERE bl.user_id IS NULL                        -- пользователь не забанен
         OR bl.date_from > p.date                      -- или забанен позже, чем
                                                        -- совершена покупка
      ORDER BY lastname, firstname, u.id, p.item_id     -- сортировка по фамилии,
                                                         -- затем по имени
      ```

      Ключевая ловушка — использовать именно `LEFT JOIN` для `ban_list`:
      обычный `INNER JOIN` оставил бы в результате только пользователей, у
      которых **есть** запись в `ban_list`, отбросив вообще все покупки
      никогда не банившихся пользователей. Второй нюанс — правильный
      порядок полей в `ORDER BY`: сортировка «по имени пользователя»
      подразумевает сначала фамилию, потом имя (`lastname, firstname`), а
      не наоборот — кандидату лучше догадаться об этом самому или уточнить
      формулировку заранее.
  - level: deep
    text_md: |
      Второй запрос проверяет `HAVING` и понимание, чем он отличается от
      `WHERE`:

      ```sql
      SELECT u.id, u.firstname, u.lastname, SUM(p.price)
      FROM users u JOIN purchase p ON u.id = p.user_id
      GROUP BY u.id, u.firstname, u.lastname -- агрегирующие функции без
                                              -- group by не сработают
      HAVING SUM(p.price) > 5000
      ```

      Так же корректен и вариант с оборачиванием агрегата в подзапрос и
      фильтрацией через внешний `WHERE`:

      ```sql
      SELECT * FROM (
          SELECT u.id, u.firstname, u.lastname, SUM(p.price) s
          FROM users u JOIN purchase p ON u.id = p.user_id
          GROUP BY u.id, u.firstname, u.lastname
      ) t WHERE s > 5000
      ```

      но даже при таком (формально верном) ответе кандидата стоит
      дополнительно спросить именно про `HAVING`, чтобы убедиться, что
      разница между `WHERE` (фильтрует строки до агрегации) и `HAVING`
      (фильтрует уже агрегированные группы) осознанная, а не обойдена
      случайно через подзапрос.
follow_ups:
  - "Что изменится в первом запросе, если заменить LEFT JOIN на обычный JOIN с ban_list?"
  - "Чем HAVING принципиально отличается от WHERE?"
