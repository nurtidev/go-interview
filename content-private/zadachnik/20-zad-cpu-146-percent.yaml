# приватный тренажёр, банк вопросов по грейдам, личное использование
slug: zad-cpu-146-percent
section: os
title: "top показывает 146% CPU — это реальная ситуация?"
difficulty: staff
tags: [linux, cpu, scheduler]
question_md: |
  Команда `top` показывает, что какой-то процесс потребляет 146% CPU. Это
  реальная ситуация? Если да, нужно ли с этим что-то делать?
answer_levels:
  - level: middle
    text_md: |
      Это может быть из-за того, что процесс использует несколько ядер —
      кандидат может не знать точно, нужно ли с этим что-то делать. Красный
      флаг — если кандидат говорит «ну это, наверное, какая-то перегрузка
      системы» (то есть считает 146% ошибкой или аномалией по умолчанию).
  - level: senior
    text_md: |
      Да, это абсолютно реальная ситуация: проценты CPU в `top` считаются
      на одно ядро, и 146% означает, что процесс (за счёт нескольких
      потоков) потребляет почти 1.5 ядра. При таких вводных нельзя сказать,
      нужно ли что-то с этим делать — в общем случае это абсолютно
      нормально для многопоточного приложения и зависит от того, укладывается
      ли сервис в выделенные ему ресурсы (лимиты CPU) и в требования по
      задержке.
  - level: deep
    text_md: |
      Полезно понимать, как система распределяет процессорное время между
      задачами — через CFS (Completely Fair Scheduler), планировщик
      процессов Linux по умолчанию для обычных (не realtime) задач. CFS не
      делит время на жёсткие тайм-слоты по числу процессов, а стремится
      дать каждой задаче «справедливую» долю процессорного времени
      пропорционально её весу (`nice`), поддерживая для этого виртуальное
      время выполнения каждой задачи и всегда выбирая для запуска задачу с
      наименьшим накопленным `vruntime` (грубо — дерево, отсортированное по
      этому времени). Задача, использующая несколько потоков, может
      получать процессорное время сразу на нескольких ядрах параллельно —
      отсюда и `%CPU` больше 100%.
