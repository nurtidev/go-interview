# приватный тренажёр, банк вопросов по грейдам, личное использование
slug: zad-channels-basics
section: concurrency
title: "Каналы: буферизация, nil-канал, паттерны"
difficulty: senior
tags: [channels, select, concurrency]
question_md: |
  Что такое каналы? Зачем нужны? Какие они бывают? К чему приведут операции
  чтения/записи над закрытым каналом? Над nil-каналом? Какой ещё способ
  блокировки навсегда? Что такое select? Как канал устроен внутри? Какие
  паттерны конкурентного программирования используют каналы?
answer_levels:
  - level: middle
    text_md: |
      Каналы — механизм взаимодействия между горутинами. Они
      потокобезопасны: к одному каналу могут обращаться несколько горутин
      одновременно без дополнительной внешней синхронизации. Каналы
      бывают буферизированные (асинхронные — отправка не блокируется, пока
      в буфере есть место) и небуферизированные (синхронные — отправка
      блокируется, пока её не заберёт получатель).
  - level: senior
    text_md: |
      Чтение из закрытого канала вернёт нулевое значение (немедленно, не
      блокируясь), запись в закрытый канал вызовет панику. Чтение из
      `nil`-канала приведёт к блокировке навсегда; запись в `nil`-канал
      тоже приведёт к блокировке навсегда; закрытие `nil`-канала приводит к
      панике. Ещё один способ заблокироваться навсегда — пустой `select {}`
      без единого кейса.

      `select` можно объяснить вкратце как `switch` для каналов: он
      выбирает один из готовых кейсов чтения/записи по нескольким каналам
      одновременно (а если ни один не готов и нет `default` — блокируется,
      ожидая, пока хоть один не станет готов). Другие примитивы
      синхронизации в Go, помимо каналов, — `Mutex`, `WaitGroup`.
  - level: deep
    text_md: |
      Внутри канал — это структура с метаданными вроде размера буфера,
      признака «закрыт/открыт», очередей горутин, ожидающих отправки и
      получения, и т.д. В этой структуре также есть мьютекс для безопасного
      конкурентного доступа к внутреннему состоянию самого канала — именно
      он и даёт каналу свойство потокобезопасности «из коробки».

      Паттерны конкурентного программирования, использующие каналы:
      генераторы (функция возвращает канал, в который сама поставляет
      значения из горутины), Fan-In (слияние нескольких каналов в один,
      см. отдельный вопрос про merge каналов), Fan-Out (раздача задач из
      одного канала нескольким воркерам-горутинам), и управляющий канал
      (канал, используемый не для передачи данных, а как сигнал — done/
      quit/cancel).
