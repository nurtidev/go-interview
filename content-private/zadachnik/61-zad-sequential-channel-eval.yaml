# приватный тренажёр, банк вопросов по грейдам, личное использование
slug: zad-sequential-channel-eval
section: concurrency
title: "Порядок вычисления двух <-worker() в одном выражении присваивания"
difficulty: senior
tags: [channels, goroutine, evaluation-order]
question_md: |
  Что выведет программа? Почему?

  ```go
  func main() {
      timeStart := time.Now()
      _, _ = <-worker(), <-worker()
      println(int(time.Since(timeStart).Seconds()))
  }

  func worker() chan int {
      ch := make(chan int)
      go func() {
          time.Sleep(3 * time.Second)
          ch <- 1
      }()
      return ch
  }
  ```
answer_levels:
  - level: middle
    text_md: |
      Программа выведет `6`, а не `3`, как можно было бы наивно ожидать
      от «двух параллельных операций».
  - level: senior
    text_md: |
      Причина — оба вызова `worker()` и оба чтения из полученных каналов
      в одном выражении присваивания `_, _ = <-worker(), <-worker()`
      вычисляются последовательно, слева направо: сначала полностью
      вызывается первый `worker()`, запускается его внутренняя горутина, и
      выполняется `<-` (чтение), которое блокируется на ~3 секунды, пока
      горутина не пришлёт значение. Только **после** того как первое
      чтение завершилось, вычисляется второй операнд — вызывается второй
      `worker()` и выполняется второе чтение, которое снова блокируется на
      ~3 секунды.
  - level: deep
    text_md: |
      Это не конкурентное ожидание двух `worker()` параллельно (что дало
      бы суммарное время ~3 секунды, если бы оба вызова `worker()`
      происходили одновременно, а последующие чтения ждали одновременно
      запущенные горутины) — а строго последовательное вычисление операндов
      одного выражения в Go: спецификация языка гарантирует порядок
      вычисления слева направо для операндов внутри одного выражения (в
      том числе и для присваивания нескольким переменным), и это правило
      не связано с конкурентностью каналов как таковой — сами горутины
      внутри `worker()` асинхронны, но сама точка вызова `<-worker()`
      находится в одном последовательном потоке управления `main`, поэтому
      итоговое суммарное время — `3 + 3 = 6` секунд, а не `max(3, 3) = 3`.
follow_ups:
  - "Как переписать код, чтобы оба worker() реально стартовали и ожидались параллельно, уложившись в ~3 секунды?"
  - "Гарантирует ли спецификация Go порядок вычисления операндов слева направо в присваивании нескольким переменным?"
