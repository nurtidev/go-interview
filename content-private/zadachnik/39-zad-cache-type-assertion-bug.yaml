# приватный тренажёр, банк вопросов по грейдам, личное использование
slug: zad-cache-type-assertion-bug
section: go-internals
title: "Почему кеш никогда не срабатывает: указатель vs значение в type assertion"
difficulty: senior
tags: [interfaces, type-assertion, pointers]
question_md: |
  Это почти реальный пример из одного из сервисов. Код — обёртка над
  кешем, который пишет и читает данные из кэша. Несмотря на то, что
  внедрение данного кэша должно было облегчить основное хранилище, этого
  не произошло. Почему?

  ```go
  type Storage struct {
      cache *lru.Cache
  }

  func (s *Storage) Set(wh *warehouse.Warehouse) {
      s.cache.Put(wh.Id, *wh)
  }

  func (s *Storage) Get(id types.WarehouseId) *warehouse.Warehouse {
      item, ok := s.cache.Get(id)
      if ok {
          if wh, ok := item.(*warehouse.Warehouse); ok {
              return wh
          }
      }
      return nil
  }
  ```
answer_levels:
  - level: middle
    text_md: |
      В `Set` в кеш кладётся **значение** `*wh` (разыменованный указатель,
      то есть `warehouse.Warehouse`), а в `Get` type assertion делается с
      **указателем** `*warehouse.Warehouse`. Это разные типы.
  - level: senior
    text_md: |
      Type assertion `item.(*warehouse.Warehouse)` проверяет, хранится ли
      в интерфейсном значении `item` именно значение конкретного типа
      `*warehouse.Warehouse`. Раз в кеш положили `warehouse.Warehouse` (не
      указатель), а спрашивают `*warehouse.Warehouse` (указатель) — типы не
      совпадают, поэтому `ok` в `if wh, ok := item.(*warehouse.Warehouse); ok`
      всегда будет `false`.
  - level: deep
    text_md: |
      Из-за этого `Get` **всегда** возвращает `nil`, даже если элемент
      реально лежит в кеше по данному ключу (`ok` от `s.cache.Get(id)`
      может быть `true`, но внутренний type assertion проваливается и
      функция уходит по ветке `return nil`, никак не сигнализируя об
      ошибке — молча). Кеш формально «работает» — заполняется, занимает
      память, — но никогда не отдаёт данные обратно, поэтому нагрузка на
      основное хранилище не снижается вообще: каждый `Get` фактически
      промахивается и код-вызыватель, получив `nil`, идёт читать данные из
      основного хранилища напрямую. Это показательный пример того, почему
      важно быть последовательным в выборе — хранить в кеше указатели или
      значения — и почему такие ошибки не ловятся компилятором (интерфейс
      `interface{}` в `lru.Cache` принимает что угодно, а несовпадение
      конкретного типа внутри вскрывается только в рантайме через `ok`).
follow_ups:
  - "Как исправить код, чтобы кеш реально начал срабатывать?"
  - "Почему эта ошибка не ловится компилятором, а проявляется только в рантайме?"
  - "Чем чревато последовательное хранение то указателей, то значений одного типа в одном кеше на interface{}?"
