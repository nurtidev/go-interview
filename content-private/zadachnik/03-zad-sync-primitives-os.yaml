slug: zad-sync-primitives-os
section: os
title: "Примитивы синхронизации в ОС: от мьютексов до futex"
difficulty: staff
tags: [os, synchronization, mutex]
question_md: |
  Какие знаешь примитивы синхронизации в операционной системе?
answer_levels:
  - level: middle
    text_md: |
      Базовый примитив синхронизации — мьютекс (mutex): даёт эксклюзивный
      доступ к ресурсу только одному потоку одновременно.
  - level: senior
    text_md: |
      Помимо мьютексов, есть семафоры — обобщение мьютекса, которое
      позволяет одновременный доступ ограниченному числу потоков (а не
      только одному), и файлы как примитив синхронизации (например, файловые
      блокировки, `flock`), которые позволяют координироваться между
      разными процессами, в том числе не связанными общей памятью.
  - level: deep
    text_md: |
      На более глубоком уровне стоит знать spinlock — блокировку, в которой
      поток, не сумевший захватить ресурс, не засыпает, а крутится в цикле
      (busy-wait), опрашивая состояние блокировки; это эффективно только
      когда ожидаемое время удержания блокировки очень мало (меньше
      стоимости переключения контекста). А также гибридные схемы вроде
      futex (fast userspace mutex) в Linux: в отсутствие конкуренции
      блокировка захватывается и освобождается полностью в user space без
      системного вызова, и только при реальной конкуренции (когда поток
      нужно усыпить/разбудить) происходит обращение к ядру — именно на
      futex обычно строятся мьютексы стандартных библиотек (в том числе
      `sync.Mutex` в Go в части взаимодействия с ОС при контенции).
follow_ups:
