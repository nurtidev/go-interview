# приватный тренажёр, банк вопросов по грейдам, личное использование
slug: zad-hash-table-design
section: algorithms
title: "Как устроена хеш-таблица: коллизии, рехеширование, хеш-функции"
difficulty: staff
tags: [hash-table, data-structures]
question_md: |
  Как устроена структура данных «хеш-таблица»? Интересует не детали
  реализации в каком-либо языке, а общая идея. Допустим, есть операция set:
  на вход подаётся ключ-строка и значение-число. Что происходит внутри
  функции?
answer_levels:
  - level: middle
    text_md: |
      Хеш-таблица — структура данных, операции над которой (вставка, поиск,
      удаление по ключу) в среднем выполняются за O(1), в отличие от
      линейного поиска по массиву или списку.
  - level: senior
    text_md: |
      Под капотом хеш-таблица имеет массив определённой длины. От ключа
      считается некий хеш с помощью хеш-функции, которая обеспечивает
      равномерное распределение значений. Хеш — это некое большое число,
      которое затем нужно привести к длине массива; приведение
      осуществляется остатком от деления на длину массива. Полученное число
      используется как индекс в массиве, куда кладётся пара «ключ-значение».

      При таком подходе неизбежно случаются коллизии (два разных ключа дают
      один и тот же индекс), и их нужно как-то разрешать: либо хранением
      списка элементов внутри одной ячейки массива (chaining), либо поиском
      ближайшей свободной ячейки в массиве (open addressing).
  - level: deep
    text_md: |
      По мере роста числа элементов относительно размера массива (растёт
      load factor) хеш-таблицу нужно рехешировать — выделить массив большего
      размера и заново разложить по нему все элементы, потому что иначе
      растёт длина цепочек коллизий и деградирует амортизированная сложность
      O(1). Хорошая хеш-функция должна давать равномерное распределение и
      быть быстрой; для этого подходят функции вроде crc32 (быстрая, для
      контрольных сумм не для безопасности), а вот криптографические
      md5/sha1 избыточно дороги для обычной хеш-таблицы и не нужны, если нет
      требований к устойчивости от подбора коллизий (в реальных
      реализациях stdlib многих языков хеш-функция ещё и рандомизируется
      seed'ом при старте процесса — это защита от атак с намеренным
      подбором коллизий, DoS через специально составленные ключи).

      На продвинутом уровне важно понимать, что рехеширование не обязано
      быть «остановить мир и переложить всё за одну операцию»: можно делать
      его плавно (incremental resizing) — постепенно, по одному-два
      элемента за каждую последующую операцию вставки/чтения, перекладывая
      старый массив в новый, чтобы не блокировать хеш-таблицу на время
      полного rehash большого объёма данных. Способов разрешения коллизий,
      помимо chaining и open addressing (linear probing, quadratic probing,
      double hashing), — несколько, и они по-разному ведут себя при высоком
      load factor и при удалении элементов.
