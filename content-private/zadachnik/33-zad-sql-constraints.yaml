# приватный тренажёр, банк вопросов по грейдам, личное использование
slug: zad-sql-constraints
section: platform
title: "Constraint'ы в РСУБД: CHECK, UNIQUE, FK и их эффекты"
difficulty: senior
tags: [sql, constraints, postgres]
question_md: |
  Какие существуют общие типы ограничений (constraint) в реляционных базах
  данных? Расскажите кратко о назначении каждого. Что произойдёт при
  нарушении CHECK? Может ли CHECK/UNIQUE работать на несколько столбцов
  сразу? Что такое NULL? Что вернёт `select b - c as delta from test_table`,
  если `c` не заполнен? Что происходит с таблицей при добавлении первичного
  ключа? Как настроить ON DELETE RESTRICT/CASCADE для внешних ключей? Каковы
  плюсы и минусы FOREIGN KEY?
answer_levels:
  - level: middle
    text_md: |
      Общие типы constraint'ов в реляционных БД:

      - **CHECK** (ограничение-проверка) — наиболее общий тип, контролирует
        соответствие значения поля заданному в выражении условию.
      - **NOT NULL** — запрещает присваивать столбцу значение `NULL`.
      - **UNIQUE** — гарантирует уникальность данных в столбце (или группе
        столбцов) среди всех строк таблицы.
      - **PRIMARY KEY** — столбец (или группа столбцов), являющийся
        уникальным идентификатором строк таблицы.
      - **FOREIGN KEY** — значения столбца (или группы столбцов) должны
        соответствовать значениям в некоторой строке другой таблицы.
      - **EXCLUDE** (Postgres) — гарантирует, что при сравнении любых двух
        строк по указанным столбцам/выражениям с помощью заданных
        операторов минимум одно из сравнений вернёт `false` или `NULL`.

      При нарушении `CHECK` происходит ошибка модификации данных на уровне
      самой БД и откат (`rollback`) транзакции. Ограничению можно задать
      отдельное имя — тогда при ошибке будет возвращено имя нарушенного
      ограничения, что визуально улучшает диагностику.
  - level: senior
    text_md: |
      И `CHECK`, и `UNIQUE` могут ссылаться на несколько столбцов сразу — в
      этом случае ограничение проверяет данные всех включённых столбцов при
      каждой модификации:

      ```sql
      CREATE TABLE TEST_TABLE (
          A bigint,
          B bigint,
          C bigint,
          CHECK(A - B >= C),
          UNIQUE (b, c)
      );
      ```

      `NULL` — это указатель на отсутствие реального значения поля таблицы,
      а не «пустое» число или строка. Поэтому для примера:

      ```sql
      CREATE TABLE TEST_TABLE (
          A serial,
          B bigint,
          C bigint);
      insert into test_table(b) values (5);
      select b - c as delta from test_table;
      ```

      запрос `select b - c as delta from test_table` вернёт `NULL`:
      недопустимо осуществлять операции сравнения или арифметические
      операции со столбцами, где разрешено хранить `NULL`, без обёртки
      такого столбца в `COALESCE` или аналогичную функцию — автоматического
      преобразования к значению по умолчанию базового типа не происходит.

      При добавлении первичного ключа автоматически создаётся уникальный
      индекс (B-дерево) для соответствующего столбца (или группы столбцов),
      и эти столбцы автоматически помечаются как `NOT NULL` — поэтому для
      примера с `PRIMARY KEY (a, c)` и `insert into test_table(b) values (5)`
      (без указания `c`) команда `insert` не отработает и упадёт с ошибкой
      нарушения первичного ключа: для данных в составе ключа `NULL`
      недопустим.
  - level: deep
    text_md: |
      `FOREIGN KEY` нужен для поддержания ссылочной целостности данных
      средствами самой базы данных. Пример настройки поведения при
      удалении — гарантированно не удалять связанные строки из
      `order_items` при удалении продукта, но каскадно удалять их при
      удалении заказа:

      ```sql
      CREATE TABLE products (
          product_no integer PRIMARY KEY,
          name text,
          price numeric
      );
      CREATE TABLE orders (
          order_id integer PRIMARY KEY,
          shipping_address text
      );
      CREATE TABLE order_items (
          product_no integer REFERENCES products ON DELETE RESTRICT,
          order_id integer REFERENCES orders ON DELETE CASCADE,
          quantity integer,
          PRIMARY KEY (product_no, order_id)
      );
      ```

      Плюсы `FOREIGN KEY`: гарантированный контроль целостности данных на
      уровне БД без лишних усилий на стороне приложения. Минусы: можно
      поймать неожиданное поведение `RESTRICT`/`CASCADE` и потерять данные,
      либо получить ситуацию, когда при кажущейся целостности базы
      контроли данных на уровне приложения на самом деле сломаны — вплоть
      до полной неработоспособности; сложности при модификации схем данных
      в шардированных базах; и самое важное для нагруженных приложений —
      каскадные блокировки страниц данных всех связанных ключами таблиц,
      что сказывается на производительности и времени отклика
      модифицирующих запросов, приводит к сложностям при массовых
      манипуляциях с данными (вплоть до полной потери производительности,
      пока не завершится большая модифицирующая транзакция) и повышает
      риск поймать deadlock.
