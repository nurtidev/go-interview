# приватный тренажёр, банк вопросов по грейдам, личное использование
slug: zad-tcp-vs-udp-basics
section: networks
title: "TCP / UDP: базовые различия и сценарии применения"
difficulty: senior
tags: [tcp, udp, networks]
question_md: |
  Чем различаются протоколы TCP и UDP? Зачем нужен UDP, если он такой
  ненадёжный, и зачем нужен TCP, если он такой медленный? Где применяется
  UDP? Опишите высокоуровневую схему взаимодействия клиента и сервера по
  TCP.
answer_levels:
  - level: middle
    text_md: |
      TCP требует установки соединения, а UDP — нет; TCP надёжный, а UDP
      датаграммы могут теряться/дублироваться/переупорядочиваться; TCP
      медленнее UDP; UDP поддерживает broadcast датаграммы.
  - level: senior
    text_md: |
      UDP при всей ненадёжности быстрее — за счёт отсутствия подтверждений
      доставки. TCP при всей медлительности надёжнее — за счёт механизма
      подтверждений (ACK) и повторной отправки потерянных сегментов. UDP
      применяется там, где скорость важнее полной надёжности: передача
      потокового видео/аудио, торренты, онлайн-игры, DNS.
  - level: deep
    text_md: |
      Высокоуровневая схема взаимодействия по TCP: сервер создаёт сокет и
      начинает слушать входящие соединения на определённом порту (`bind`,
      `listen`, `accept`), клиент создаёт сокет и подключается к серверу с
      помощью `connect`, далее происходит обмен сообщениями (`send`/`recv`),
      в конце сокеты закрываются. Хорошая мнемоника для запоминания
      разницы (в шутливой форме, которую можно услышать от кандидата): «Знаю
      анекдот про UDP, но не факт, что он до вас дойдёт... Знаю анекдот про
      TCP. Если он до вас не дойдёт, я повторю его снова» — обыгрывает
      именно то, что UDP не гарантирует доставку, а TCP ретранслирует
      потерянные данные.
