# приватный тренажёр, банк вопросов по грейдам, личное использование
slug: zad-http-protocol-basics
section: networks
title: "HTTP протокол: структура запроса/ответа, методы, коды состояний"
difficulty: senior
tags: [http, networks]
question_md: |
  Что из себя представляет протокол HTTP? Из каких основных частей состоит
  HTTP-запрос и HTTP-ответ? Какие есть основные методы HTTP? Примеры
  HTTP-заголовков? Классы кодов состояний HTTP?
answer_levels:
  - level: middle
    text_md: |
      HTTP — текстовый протокол, функционирующий по принципу
      запрос-ответ. HTTP-запрос состоит из стартовой строки (включающей
      метод, идентификатор ресурса и версию протокола), заголовков и тела
      сообщения. HTTP-ответ похож по структуре на HTTP-запрос, но стартовая
      строка вместо метода и URI содержит код состояния.
  - level: senior
    text_md: |
      Основные методы HTTP: `GET`, `HEAD`, `POST`, `PUT`, `DELETE`. Примеры
      заголовков: `Content-Length`, `Content-Type`, `Cookie`,
      `Authorization`, `User-Agent`. Классы кодов состояния: 1xx
      (informational), 2xx (success), 3xx (redirect), 4xx (client error),
      5xx (server error).
  - level: deep
    text_md: |
      Хороший кандидат может рассказать про cookie (механизм хранения
      состояния на стороне клиента поверх принципиально stateless
      протокола — сервер выставляет `Set-Cookie`, браузер возвращает
      `Cookie` на последующих запросах к тому же домену), самостоятельно
      написать HTTP-запрос текстом (стартовая строка + заголовки + пустая
      строка + тело), и объяснить, почему статику рекомендуется размещать на
      отдельном домене: браузеры ограничивают число параллельных соединений
      на один домен, и запросы к статике (без cookie основного домена)
      не тащат за собой лишние заголовки аутентификации — что также снижает
      риск некоторых видов атак и разгружает основной сервер приложения.
