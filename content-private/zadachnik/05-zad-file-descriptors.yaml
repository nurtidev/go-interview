# приватный тренажёр, банк вопросов по грейдам, личное использование
slug: zad-file-descriptors
section: os
title: "Файловый дескриптор: что это и почему диск может быть «переполнен» на пустом месте"
difficulty: staff
tags: [os, file-descriptor, linux]
question_md: |
  Что такое файловый дескриптор? Что такое stdin/stdout/stderr и какие
  дескрипторы им назначены? `du`/`df` показывает, что место в файловой
  системе ещё есть, а записать ничего невозможно, т.к. «нет места». Почему и
  как исправить?
answer_levels:
  - level: middle
    text_md: |
      При открытии файла операционная система выдаёт некий идентификатор —
      файловый дескриптор, который можно использовать, чтобы совершать
      чтение/запись файла и другие операции над ним. Это универсальный
      идентификатор, который ОС выдаёт для работы со множеством сущностей:
      реальные файлы на диске, виртуальные файлы (включая замапленные на
      память), различные устройства ввода/вывода, пайпы, сокеты и т.д.
  - level: senior
    text_md: |
      Стандартные дескрипторы, которые есть у каждого процесса: stdin
      (ввод), stdout (вывод), stderr (вывод ошибок) — это стандартные
      интерфейсы приложения для ввода информации, вывода и вывода ошибок.
      Им назначены идентификаторы 0, 1 и 2 соответственно. Обычно при
      запуске приложений из консоли stdout/stderr перенаправляются в
      консоль.
  - level: deep
    text_md: |
      Ситуация «место есть, но писать некуда» типично возникает так: файл
      удалили (`rm`), а какой-то процесс всё ещё держит его открытым через
      файловый дескриптор. При удалении файла реальное освобождение
      дискового пространства происходит только тогда, когда дескрипторы,
      указывающие на этот файл (inode со счётчиком ссылок), закрыты всеми
      приложениями — до этого момента `du`/`df` могут расходиться: `df`
      считает место, которое ОС ещё не освободила из-за открытых
      дескрипторов, а `du` — по видимым в файловой системе именам файлов,
      которых уже нет. Чтобы исправить, нужно найти процесс, который держит
      дескрипторы удалённого файла (например, `lsof | grep deleted`), и либо
      корректно завершить его работу, либо перезапустить его, чтобы он
      закрыл дескрипторы и место реально освободилось.
