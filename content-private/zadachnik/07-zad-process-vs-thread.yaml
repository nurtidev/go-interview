slug: zad-process-vs-thread
section: os
title: "Процесс vs системный поток: разделение памяти и способы обмена данными"
difficulty: staff
tags: [os, process, thread]
question_md: |
  Чем отличается процесс от системного потока? Как процессы могут
  обмениваться информацией?
answer_levels:
  - level: middle
    text_md: |
      Системный поток запускается внутри процесса. Процессы не шарят
      память между собой, а потоки внутри одного процесса — шарят.
  - level: senior
    text_md: |
      Процессы могут обмениваться информацией через сокеты, пайпы, сигналы.
      И то и другое в терминах ядра Linux — это `Task`. Ключевое отличие в
      том, что процессы по умолчанию не шарят память, а потоки в рамках
      процесса — шарят.
  - level: deep
    text_md: |
      При этом процессы тоже могут шарить память между собой — делается это
      через специальные механизмы вроде `shm_open` (POSIX shared memory) или
      `mmap` с флагом `MAP_SHARED`: несколько процессов мапят один и тот же
      участок физической памяти в своё виртуальное адресное пространство,
      получая доступ к общим данным без копирования через ядро (в отличие
      от пайпов/сокетов, где данные обязательно проходят через буферы
      ядра).
follow_ups:
