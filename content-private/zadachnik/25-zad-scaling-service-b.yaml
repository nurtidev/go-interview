# приватный тренажёр, банк вопросов по грейдам, личное использование
slug: zad-scaling-service-b
section: platform
title: "Масштабирование сервиса B: server-side и client-side балансировка"
difficulty: senior
tags: [scaling, load-balancing, dns]
question_md: |
  Есть два сервиса A и B, сервис A отправляет запросы в сервис B по HTTP.
  Какие существуют варианты для масштабирования сервиса B? Сколько
  балансировщиков будет в первой схеме? Как приложение узнает, где они
  запущены? Как именно будет выглядеть discovery через DNS?
answer_levels:
  - level: middle
    text_md: |
      Однозначно правильного ответа нет — многое зависит от конкретной
      ситуации, но есть два основных направления: server-side balancing —
      добавляем промежуточный балансировщик (nginx / haproxy) перед
      инстансами B; и client-side balancing — используем DNS / consul /
      etcd, из которого A сам узнаёт, где запущен B, и балансирует запросы
      самостоятельно, без промежуточного узла.
  - level: senior
    text_md: |
      В схеме с промежуточным балансировщиком его самого нужно как минимум
      два (single instance балансировщика — новая единая точка отказа,
      которая сводит на нет весь смысл масштабирования B). Если
      балансировщиков больше одного, встаёт тот же вопрос заново: как A
      узнаёт, где запущены сами балансировщики? Один из вариантов ответа —
      балансировщики можно находить через DNS.
  - level: deep
    text_md: |
      Discovery через DNS обычно выглядит так: A-записи — несколько IP
      адресов на одно имя, и клиентская библиотека/резолвер round-robin'ит
      между ними при каждом резолве имени; либо SRV-записи — DNS-записи,
      которые дополнительно кодируют порт и приоритет/вес для каждого
      узла (в отличие от простых A-записей, где только IP), что позволяет
      явно управлять весами балансировки и приоритетом отказоустойчивости
      прямо на уровне DNS без дополнительного протокола discovery.
