# приватный тренажёр, банк вопросов по грейдам, личное использование
slug: zad-syscalls
section: os
title: "Что такое системный вызов (syscall)"
difficulty: senior
tags: [os, syscall, kernel]
question_md: |
  Что такое сисколл? Что происходит во время его вызова? Что делают
  системные вызовы fork и epoll?
answer_levels:
  - level: middle
    text_md: |
      Сисколл (system call) — вызов какой-то функции в операционной системе,
      например чтение файла. Это способ, которым прикладная программа
      просит ядро выполнить действие, недоступное ей напрямую.
  - level: senior
    text_md: |
      Во время вызова сисколла происходит переключение из User Space в
      Kernel Space, после чего система выполняет необходимые действия и
      возвращает управление обратно в User Space. Примеры системных вызовов:
      `fork` — запускает копию текущего процесса; `read`/`write` — чтение и
      запись в файловый дескриптор.
  - level: deep
    text_md: |
      `epoll` — системный вызов, позволяющий асинхронно получать события о
      том, что из дескриптора можно вычитать кусок информации (готовность
      дескриптора к чтению/записи), не опрашивая все дескрипторы по очереди
      (в отличие от `select`/`poll`). Именно на этом системном вызове (и его
      аналогах — `kqueue` на BSD/macOS) строится netpoller рантайма Go,
      который позволяет горутинам блокироваться на сетевом I/O без
      блокировки системного потока.
