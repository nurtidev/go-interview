# приватный тренажёр, банк вопросов по грейдам, личное использование
slug: zad-map-range-order
section: go-internals
title: "Порядок обхода map в Go: почему он случайный"
difficulty: senior
tags: [map, range, go-internals]
question_md: |
  Что выведет данный код?

  ```go
  m := map[string]int{"a":1,"b":2,"c":3}
  for a, b := range m {
      fmt.Println(a, b)
  }
  ```
answer_levels:
  - level: middle
    text_md: |
      Выведутся все элементы мапы в виде пар «ключ, значение», но порядок
      вывода не гарантирован.
  - level: senior
    text_md: |
      Элементы мапы будут выведены в случайном порядке — это сделано
      специально, чтобы код не был завязан на конкретную реализацию мапы
      (устройство хеш-таблицы внутри может меняться между версиями
      рантайма, и порядок итерации не является частью языковой гарантии,
      на которую можно было бы опереться).
  - level: deep
    text_md: |
      Если для логики важен порядок — на map полагаться нельзя в принципе,
      нужно использовать дополнительную упорядоченную структуру: например,
      слайс ключей, отсортированный явно, или слайс/массив пар
      «ключ-значение» вместо самой map. Рантайм Go намеренно
      рандомизирует стартовую точку обхода бакетов на каждой итерации
      (а не просто оставляет порядок «как получится» из-за устройства
      хеш-таблицы) именно для того, чтобы разработчики не могли случайно
      написать код, который выглядит рабочим сейчас, но сломается при
      следующем внутреннем изменении реализации map — эта рандомизация
      закреплена в поведении рантайма умышленно, а не является побочным
      эффектом.
follow_ups:
