# приватный тренажёр, банк вопросов по грейдам, личное использование
slug: zad-loop-variable-goroutine
section: concurrency
title: "Итерационные переменные в горутинах: захват общей ячейки до Go 1.22"
difficulty: senior
tags: [goroutine, loopvar, closures]
question_md: |
  Что выведет данный код? Как исправить?

  ```go
  func main() {
      values := []int{1,2,3,4,5}
      for _, val := range values {
          go func() {
              fmt.Println(val)
          }()
      }
      time.Sleep(100 * time.Millisecond)
  }
  ```
answer_levels:
  - level: middle
    text_md: |
      Для версий Go до 1.22 — одинаковые адреса и одинаковые значения,
      программа выведет:
      ```
      5
      5
      5
      5
      5
      ```
      (то же самое число 5 пять раз, а не значения 1–5 в каком-либо
      порядке).
  - level: senior
    text_md: |
      Причина — до Go 1.22 переменная `val` в `for _, val := range values`
      была одной и той же ячейкой памяти на все итерации цикла: все пять
      запущенных горутин замыкают одну и ту же переменную `val`, а не её
      снимок на момент запуска. К моменту, когда горутины реально
      запланированы и выполняют `fmt.Println(val)` (после `time.Sleep`),
      цикл уже успевает пройти до конца, и `val` содержит своё последнее
      значение — `5` — которое и видят все горутины одновременно.
  - level: deep
    text_md: |
      Исправить можно, скопировав переменную в тело цикла:

      ```go
      for _, val := range values {
          val := val // Копируем переменную
          go func() {
              fmt.Println(val)
          }()
      }
      ```

      или передав значение аргументом горутины:

      ```go
      for _, val := range values {
          go func(val int) {
              fmt.Println(val)
          }(val)
      }
      ```

      Оба способа создают отдельную копию значения для каждой итерации,
      которую замыкание захватывает независимо от остальных. Плюсом
      засчитывается решение без `time.Sleep` (то есть с явной
      синхронизацией через `sync.WaitGroup`, а не с расчётом на то, что
      100 мс хватит горутинам на выполнение) и знание того, что начиная с
      Go 1.22 семантика переменных циклов `for` изменена — на каждой
      итерации создаётся новая переменная, и проблема с общей ячейкой
      памяти на актуальных версиях языка больше не воспроизводится сама по
      себе.
follow_ups:
  - "Как исправить программу так, чтобы каждая горутина видела своё собственное значение?"
  - "Как избежать time.Sleep для синхронизации и дождаться горутин надёжно?"
