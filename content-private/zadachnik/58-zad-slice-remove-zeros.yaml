# приватный тренажёр, банк вопросов по грейдам, личное использование
slug: zad-slice-remove-zeros
section: algorithms
title: "Удаление нулей из слайса in-place"
difficulty: middle
tags: [slice, algorithms, two-pointers]
question_md: |
  Дан слайс целых чисел. Напишите функцию remove, удаляющую все нули.

  Примеры:

  ```
  remove([]) -> []
  remove([0]) -> []
  remove([1,0,0,2]) -> [1,2]
  ```

  Оцените сложность решения.
answer_levels:
  - level: middle
    text_md: |
      Идея — два указателя (техника two pointers): один (`i`) идёт по
      всему исходному слайсу, второй (`j`) отмечает, куда писать очередной
      ненулевой элемент.
  - level: senior
    text_md: |
      Реализация без выделения дополнительного слайса — запись
      производится в тот же массив, что и чтение:

      ```go
      func remove(in []int) []int {
          i := 0
          j := 0
          for ; i < len(in); i++ {
              if in[i] != 0 {
                  in[j] = in[i]
                  j++
              }
          }
          return in[:j]
      }
      ```
  - level: deep
    text_md: |
      Сложность — O(n) по времени (ровно один проход по слайсу, `i`
      двигается строго вперёд на каждой итерации) и O(1) по дополнительной
      памяти (не считая самого возвращаемого результата) — новый массив не
      выделяется, используется только исходная память под `in`, урезанная
      по длине через `in[:j]`. Важный побочный эффект такого in-place
      подхода: результат — это срез **того же** нижележащего массива, что
      и исходный `in`, поэтому если где-то в коде ещё жив другой слайс,
      смотрящий на тот же массив, он увидит изменённые (переставленные)
      данные — это стоит явно проговорить как компромисс между экономией
      памяти и побочными эффектами aliasing'а.
follow_ups:
  - "Оцените сложность решения (время и память)."
  - "К каким побочным эффектам может привести in-place изменение исходного слайса, если на тот же массив смотрит ещё один слайс?"
