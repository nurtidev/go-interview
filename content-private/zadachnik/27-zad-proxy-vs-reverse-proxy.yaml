# приватный тренажёр, банк вопросов по грейдам, личное использование
slug: zad-proxy-vs-reverse-proxy
section: platform
title: "Proxy vs reverse proxy: кто о ком знает"
difficulty: senior
tags: [proxy, architecture, networks]
question_md: |
  В чём разница между proxy и reverse proxy?
answer_levels:
  - level: middle
    text_md: |
      В случае обычного proxy клиент знает, что его запрос/соединение
      пойдёт через proxy к точке назначения — клиент осознанно настроен
      работать через промежуточный узел.
  - level: senior
    text_md: |
      Если используется reverse proxy, клиент ничего не знает о его
      существовании: с точки зрения клиента запрос идёт напрямую к
      серверу, а на самом деле принимается reverse proxy, который решает,
      куда его перенаправить. Клиент не знает и не может знать, кем
      конкретно (каким из бэкенд-инстансов) будет обработан его запрос.
  - level: deep
    text_md: |
      Отсюда и разное типичное назначение: forward proxy обычно ставится
      на стороне клиента (или сети клиента) — для кеширования исходящих
      запросов, фильтрации/контроля доступа, анонимизации исходящего
      трафика. Reverse proxy ставится на стороне сервера — перед одним или
      несколькими бэкендами — и решает задачи балансировки нагрузки между
      инстансами, терминации TLS, кеширования ответов и единой точки входа
      для нескольких внутренних сервисов, оставаясь прозрачным для внешнего
      клиента.
follow_ups:
  - "Какие задачи обычно решает reverse proxy на стороне сервера (балансировка, TLS-терминация, кеширование)?"
  - "Зачем клиенту вообще может понадобиться forward proxy?"
