# приватный тренажёр, банк вопросов по грейдам, личное использование
slug: zad-memory-leak-oom
section: os
title: "Утечка памяти на голом сервере: своп и OOM Killer"
difficulty: staff
tags: [memory, linux, oom]
question_md: |
  На голом сервере запущен какой-то сервис, и в нём есть утечка памяти. Что
  произойдёт, когда память закончится? (Речь не про Kubernetes и ограничения
  контейнеров, а про голый сервер.) На какой тип памяти система будет
  опираться при решении запустить OOM Killer? Зачем нужна виртуальная память?
answer_levels:
  - level: middle
    text_md: |
      Система убьёт процесс. Есть два варианта развития событий в
      зависимости от того, включён ли своп (swap). Если своп включён,
      система может жить в таком состоянии довольно долго, т.к. для памяти
      будет использоваться диск. Если своп отключён, придёт OOM Killer и
      начнёт убивать процессы — не факт, что умрёт именно наш сервис с
      утечкой, но рано или поздно его тоже убьёт.
  - level: senior
    text_md: |
      Важно, что при решении, кого убивать, система оценивает не
      виртуальную память процессов, а только реально используемую память,
      которая мапится в физическую (resident memory), — большой объём
      зарезервированной, но не тронутой виртуальной памяти сам по себе не
      провоцирует OOM Killer.
  - level: deep
    text_md: |
      Виртуальная память — концепт современных операционных систем,
      позволяющий через механизм страниц транслировать части виртуального
      адресного пространства в другие типы памяти: диск (своп), физическую
      память, память устройств и т.д. Помимо решения задачи со свопом,
      виртуальная память обеспечивает изоляцию памяти между процессами
      (один процесс не видит и не может напрямую повредить память другого)
      и возможность защищать отдельные куски памяти от операций записи или
      от выполнения кода (см. также вопрос про страницы памяти).
