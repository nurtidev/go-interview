slug: zad-closures-basics
section: go-internals
title: "Замыкания: функция, ссылающаяся на внешние переменные"
difficulty: senior
tags: [closures, go-internals]
question_md: |
  Что такое замыкание? Приведите пример использования замыкания.
answer_levels:
  - level: middle
    text_md: |
      Замыкание — это функция, которая ссылается на переменные вне её
      собственного тела (из окружающей области видимости, в которой она
      была объявлена).
  - level: senior
    text_md: |
      Функция-замыкание имеет доступ к связанным переменным окружающей
      области видимости, а также может присваивать им значения — то есть
      не только читает, но и изменяет их состояние между вызовами.
  - level: deep
    text_md: |
      Пример — функция `accum` возвращает замыкание, которое хранит и
      накапливает состояние (`sum`) между вызовами, хотя сама переменная
      `sum` больше не существует как отдельная именованная переменная в
      вызывающем коде — она «живёт» внутри замыкания:

      ```go
      func accum() func(int) int {
          sum := 0
          return func(x int) int {
              sum += x
              return sum
          }
      }
      ```

      Каждый вызов `accum()` создаёт новую независимую переменную `sum` и
      новое замыкание над ней — два разных вызова `accum()` дают два
      независимых счётчика, не влияющих друг на друга, потому что каждый
      захватывает свою собственную копию переменной `sum` из своего
      собственного вызова функции `accum`.
follow_ups:
  - "Что произойдёт, если вызвать accum() дважды и использовать оба полученных замыкания параллельно — будут ли они делить состояние?"
  - "Чем захват переменной в замыкании отличается от захвата переменной цикла в горутине (см. вопрос про итерационные переменные)?"
