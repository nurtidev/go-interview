# приватный тренажёр, банк вопросов по грейдам, личное использование
slug: zad-url-checker-goroutines
section: concurrency
title: "Проверка списка URL в горутинах: от синхронного кода до worker pool"
difficulty: senior
tags: [goroutine, channels, worker-pool]
question_md: |
  Есть набор URL'ов. Напишите программу, которая:

  1. Поочерёдно выполнит HTTP-запросы по предложенному списку ссылок. В
     случае получения кода «200 OK» печатаем «адрес url - ok», иначе (или
     при ошибке) — «адрес url - not ok». Запросы по списку выполняются в
     горутинах. Печать результатов происходит в основном потоке.
  2. Модифицируйте программу так, чтобы использовались каналы для
     коммуникации основного потока с горутинами.
  3. Модифицируйте программу так, чтобы нигде не использовалась длина
     слайса урлов — считайте, что URL'ы приходят из внешнего источника, и
     их количество заранее неизвестно. Предложите идиоматичный способ
     узнавать об окончании списка и сигнализировать об окончании работы
     дальше.
  4. (необязательно) При получении 2 первых ответов «200 OK» остальные
     запросы штатно прерываются, с сообщением о завершении.
  5. (необязательно) Как бы вы отрефакторили код? Какие тесты написали бы?
     Какие интерфейсы предложили бы для генерации моков?

  ```go
  package main
  func main() {
    var urls = []string{
      "http://ozon.ru",
      "https://ozon.ru",
      "http://google.com",
      "http://somesite.com",
      "http://non-existent.domain.tld",
      "https://ya.ru",
      "http://ya.ru",
      "http://ёёёё",
    }
  }
  ```
answer_levels:
  - level: middle
    text_md: |
      Базовый уровень (первый пункт задачи — своего рода разминка) —
      синхронное решение, которое идёт последовательно и выполняет запросы
      один за другим, без конкурентности вообще; горутины запускаются, но
      печать и ожидание координируются просто (например, через
      `sync.WaitGroup` без каналов).
  - level: senior
    text_md: |
      Более уверенное решение использует канал, куда отправляются
      результаты проверки URL, горутины-воркеры, которые выполняют
      запросы и шлют результат в канал, и `sync.WaitGroup` для отслеживания
      завершения всех воркеров (обычно — отдельная горутина, которая ждёт
      `wg.Wait()` и затем закрывает канал результатов, чтобы `range` по
      каналу в основной горутине корректно завершился).

      Чтобы не завязываться на длину слайса урлов (пункт 3), идиоматичный
      Go-приём — читать URL'ы из канала-источника (генератора) и писать
      результаты в канал-приёмник, завершая работу через `close` канала:
      закрытие канала-источника внешним поставщиком данных — стандартный
      сигнал «данные закончились», который `range` по каналу воспринимает
      корректно, не требуя знания заранее числа элементов.
  - level: deep
    text_md: |
      Остановку выполнения воркеров раньше срока (пункт 4 — после первых 2
      ответов «200 OK» прервать остальные) реализуют через `context` с
      отменой (`context.WithCancel`) или через отдельный управляющий канал
      "done"/"quit": воркеры в цикле обработки проверяют этот канал/контекст
      в `select` наравне с основной работой и завершаются, получив сигнал
      отмены, печатая сообщение о завершении. Ограничение количества
      одновременных исходящих запросов реализуется классическим паттерном
      worker pool (фиксированное число воркеров, разбирающих задачи из
      общего канала) либо семафором на канале (`chan struct{}` заданной
      ёмкости). Счётчик, агрегирующий информацию из разных горутин
      (например, число успешных проверок), можно сделать либо через
      `atomic`, либо через отдельную горутину-агрегатор, которая
      единолично владеет состоянием счётчика и получает обновления по
      каналу — оба подхода снимают гонку данных, но `atomic` дешевле для
      простого счётчика, а выделенная горутина удобнее, когда логика
      агрегации сложнее одного инкремента.
