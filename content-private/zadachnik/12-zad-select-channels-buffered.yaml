# приватный тренажёр, банк вопросов по грейдам, личное использование
slug: zad-select-channels-buffered
section: concurrency
title: "select по буферизированному каналу: что выведет код"
difficulty: senior
tags: [select, channels, goroutine]
question_md: |
  Что выведет этот код?

  ```go
  package main
  func main(){
  ch := make(chan int, 1)
  for i := 0; i < 10; i++ {
  select {
  case x := <-ch:
  print(x)
  case ch <- i:
  }
  }
  }
  ```
answer_levels:
  - level: middle
    text_md: |
      Код выведет: `0 2 4 6 8`.
  - level: senior
    text_md: |
      Канал буферизирован на 1 элемент. На чётных итерациях `i`
      (0, 2, 4, 6, 8) буфер канала пуст, поэтому кейс на чтение `<-ch`
      заблокирован (нечего читать), и `select` выбирает единственный
      готовый кейс — запись `ch <- i`, значение уходит в буфер. На
      следующей (нечётной) итерации буфер уже занят, поэтому кейс записи
      заблокирован, а кейс чтения готов — значение вычитывается и
      печатается, буфер снова пуст. Так чтение и запись чередуются, и
      печатаются только значения `i`, записанные на чётных итерациях.
  - level: deep
    text_md: |
      Если сделать канал небуферизированным (`make(chan int)`), поведение
      меняется принципиально: небуферизированная отправка `ch <- i`
      становится готовой только тогда, когда есть готовый получатель в
      этом же `select` — а получатель здесь тот же самый `select` в той же
      горутине, который не может одновременно быть и отправителем, и
      получателем сам себе. В результате оба кейса на первой же итерации
      не готовы одновременно, ни один не может продвинуться, и рантайм
      обнаруживает, что все горутины программы заблокированы навсегда —
      происходит паника `fatal error: all goroutines are asleep - deadlock!`.
follow_ups:
  - "Что изменится, если сделать канал небуферизированным? Хороший кандидат должен предсказать панику из-за дедлока."
  - "Как select выбирает между несколькими одновременно готовыми кейсами?"
