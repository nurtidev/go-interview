# приватный тренажёр, банк вопросов по грейдам, личное использование
slug: zad-library-schema-design
section: platform
title: "Схема данных для библиотеки: автор, книга, читатель"
difficulty: senior
tags: [sql, schema-design, joins]
question_md: |
  Нужно описать модель библиотеки. Есть 3 сущности: «Автор», «Книга»,
  «Читатель». Физически книга только одна и может быть только у одного
  читателя. Нужно составить таблицы для библиотеки так, чтобы это учесть.
  Дальше — выбрать названия всех книг, которые на руках; выбрать названия
  всех книг в библиотеке, у которых больше 3 авторов; выбрать имена топ-3
  читаемых авторов на данный момент.
answer_levels:
  - level: middle
    text_md: |
      На базовом уровне таблицы для библиотеки можно описать в псевдокоде,
      а задачи на выборку решать через подзапросы, без использования join —
      этого достаточно, чтобы показать понимание сущностей и связей между
      ними (книга у читателя — это факт «на руках», отдельный от самой
      книги).
  - level: senior
    text_md: |
      На более уверенном уровне таблицы создаются в одном из диалектов SQL,
      с нужными индексами, и учтено, что у книги может быть несколько
      авторов (то есть связь книга-автор — N-M, требует связующей
      таблицы), а все три выборки решаются преимущественно без подзапросов,
      через join.
  - level: deep
    text_md: |
      Примерные схемы решений трёх выборок: (1) «книги, которые на руках» —
      `inner join` таблицы «книги на руках» с таблицей «Книга»: раз книга
      физически одна и связь с читателем — факт выдачи, `inner join`
      однозначно даёт только выданные экземпляры. (2) «книги с больше чем 3
      авторами» — `left join` по таблицам «книги на руках», «Книга» и
      «Автор», с условием, что книга **не** на руках (то есть `left join` с
      проверкой на `NULL` в части «на руках»), группировкой по книге/автору
      и условием `count(авторов) > 3`. (3) «топ-3 читаемых автора на данный
      момент» — `inner join` по таблицам «книги на руках», «Книга» и
      «Автор» с группировкой по автору, сортировкой по количеству
      (`count`) и `LIMIT 3` — здесь `inner join` уместен, потому что нас
      интересуют именно читаемые **сейчас** книги, то есть обязательно
      связанные с фактом выдачи.
follow_ups:
  - "Написать запрос — выбрать названия всех книг, которые на руках."
  - "Написать запрос — выбрать названия всех книг в библиотеке, у которых больше 3 авторов."
  - "Написать запрос — выбрать имена топ-3 читаемых авторов на данный момент."
