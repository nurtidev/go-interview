# приватный тренажёр, банк вопросов по грейдам, личное использование
slug: zad-transactions-isolation-basic
section: platform
title: "Транзакция и уровни изоляции: базовое определение"
difficulty: senior
tags: [transactions, isolation, sql]
question_md: |
  Что такое транзакция? Какие уровни изоляции транзакций существуют в
  РСУБД?
answer_levels:
  - level: middle
    text_md: |
      Транзакция — это группа выполняющихся команд, которую можно
      подтвердить (`COMMIT`) или отменить (`ROLLBACK`) целиком, либо
      частично — с откатом до `SavePoint`.
  - level: senior
    text_md: |
      Типичный пример использования транзакции — банковский перевод с
      одного счёта на другой: списание с одного счёта и зачисление на
      другой должны либо оба применяться, либо оба отмениться, иначе
      деньги «потеряются» или «появятся из ниоткуда» при сбое посередине.
  - level: deep
    text_md: |
      Стандартные уровни изоляции транзакций: `Read uncommitted`, `Read
      committed`, `Repeatable read`, `Serializable` — каждый следующий
      уровень исключает больше аномалий параллельного выполнения ценой
      меньшей параллельности. Отдельный практический нюанс: в PostgreSQL
      уровень `Read uncommitted` формально объявлен в синтаксисе, но
      фактически ведёт себя как `Read committed` — PostgreSQL никогда не
      позволяет читать незакоммиченные данные другой транзакции (грязное
      чтение в PostgreSQL невозможно ни на каком уровне изоляции), в
      отличие, например, от некоторых конфигураций MySQL/InnoDB.
follow_ups:
  - "Можно ли получить грязное чтение (dirty read) в PostgreSQL, даже если явно выставить уровень Read uncommitted?"
  - "Приведите пример, где нужна именно транзакция, а не отдельные независимые запросы."
