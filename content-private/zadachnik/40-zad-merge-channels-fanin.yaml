# приватный тренажёр, банк вопросов по грейдам, личное использование
slug: zad-merge-channels-fanin
section: concurrency
title: "Merge N каналов в один (fan-in)"
difficulty: senior
tags: [channels, fan-in, waitgroup]
question_md: |
  Написать код функции, которая делает merge N каналов. Весь входной поток
  перенаправляется в один канал.

  ```go
  func merge(cs ...<-chan int) <-chan int {
      ...
  }
  ```
answer_levels:
  - level: middle
    text_md: |
      Это вопрос на написание кода, который потом прикладывается к
      протоколу собеседования — классический паттерн fan-in: несколько
      входных каналов сливаются в один выходной, из которого читает
      единственный потребитель.
  - level: senior
    text_md: |
      Для каждого входного канала запускается своя горутина, которая
      читает из него и пересылает значения в общий выходной канал `out`,
      пока входной канал не закроется. Полная реализация:

      ```go
      func merge(cs ...<-chan int) <-chan int {
          var wg sync.WaitGroup
          out := make(chan int)
          // Start an output goroutine for each input channel in cs.  output
          // copies values from c to out until c is closed, then calls wg.Done.
          output := func(c <-chan int) {
              for n := range c {
                  out <- n
              }
              wg.Done()
          }
          wg.Add(len(cs))
          for _, c := range cs {
              go output(c)
          }
          // Start a goroutine to close out once all the output goroutines are
          // done.  This must start after the wg.Add call.
          go func() {
              wg.Wait()
              close(out)
          }()
          return out
      }
      ```
  - level: deep
    text_md: |
      Ключевая деталь корректности — закрыть `out`, только когда закрыты
      **все** входные каналы, иначе потребитель никогда не узнает, что
      данные закончились (либо, что хуже, кто-то попытается писать в уже
      закрытый канал и получит панику). Именно поэтому в реализации выше
      закрытием `out` занимается отдельная горутина, которая дожидается
      завершения всех output-горутин через `wg.Wait()` и только после
      этого закрывает `out` — ни одна из output-горутин не может закрыть
      `out` сама, потому что не знает, закончили ли остальные.

      Порядок важен: `wg.Add(len(cs))` должен произойти **до** запуска
      горутины, которая делает `wg.Wait()` — иначе есть риск гонки, при
      которой `Wait()` увидит счётчик 0 (ещё не увеличенный) и вернётся
      немедленно, закрыв `out` до того, как реально стартовали output-горутины.
follow_ups:
  - "Что произойдёт, если закрыть out до того, как завершились все output-горутины?"
  - "Почему важно, чтобы wg.Add(len(cs)) выполнился до запуска горутины с wg.Wait()?"
