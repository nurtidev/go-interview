# приватный тренажёр, банк вопросов по грейдам, личное использование
slug: zad-gomaxprocs
section: go-internals
title: "GOMAXPROCS: что ограничивает и почему потребление CPU может быть выше"
difficulty: senior
tags: [gomaxprocs, scheduler, goroutine]
question_md: |
  Что такое GOMAXPROCS? Зачем это нужно? Может ли приложение с
  GOMAXPROCS=4 потреблять больше 4 ядер CPU?
answer_levels:
  - level: middle
    text_md: |
      GOMAXPROCS ограничивает количество потоков ОС, которые Go-рантайм
      использует одновременно для исполнения Go-кода.
  - level: senior
    text_md: |
      Да, приложение с GOMAXPROCS=4 может потреблять больше 4 ядер CPU. Это
      происходит из-за того, что Go-рантайм запускает дополнительные потоки
      на блокирующие системные вызовы: когда горутина уходит в блокирующий
      syscall, рантайм может создать (или использовать) ещё один поток ОС,
      чтобы не останавливать исполнение остальных горутин.
  - level: deep
    text_md: |
      В эти микро-моменты — пока один поток завис в блокирующем syscall, а
      рантайм уже поднял дополнительный поток ОС для продолжения исполнения
      готовых горутин — количество одновременно используемых ядер может
      кратковременно превышать значение GOMAXPROCS. Само же GOMAXPROCS
      ограничивает не общее число потоков ОС (их может быть больше — см.
      `runtime/debug.SetMaxThreads`), а именно число потоков, которые
      одновременно исполняют пользовательский Go-код (число `P` в терминах
      планировщика GMP).
