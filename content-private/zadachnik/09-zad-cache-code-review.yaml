# приватный тренажёр, банк вопросов по грейдам, личное использование
slug: zad-cache-code-review
section: concurrency
title: "Код-ревью наивного in-memory кеша под высокой нагрузкой"
difficulty: staff
tags: [mutex, sync-map, sharding, code-review]
question_md: |
  Разработчик дал на ревью код своего нового кэша, который будет
  использоваться под высокой нагрузкой в проде (частота записи/чтения —
  20%/80%). Проведите код-ревью:

  ```go
  package main

  import (
      "fmt"
      "sync"
  )

  func main() {
      fmt.Println(GetOrCreate("hello", "world"))
      fmt.Println(Get("hello"))
  }

  var cache = make(map[string]string)

  // GetOrCreate проверяет существование ключа key
  // Если такого нет, то создает новое значение
  func GetOrCreate(key, value string) string {
      var m sync.Mutex
      m.Lock()
      value = cache[key]
      m.Unlock()
      if value != "" {
          return value
      }
      m.Lock()
      cache[key] = value
      m.Unlock()
      return value
  }

  func Get(key string) string {
      var m sync.Mutex
      m.Lock()
      v := cache[key]
      m.Unlock()
      return v
  }
  ```
answer_levels:
  - level: middle
    text_md: |
      Первая и самая грубая ошибка — `m := sync.Mutex{}` объявлен как
      **локальная переменная** внутри каждой функции. Это означает, что
      `GetOrCreate` и `Get` лочат каждый свой собственный, независимый
      мьютекс — блокировка вообще ничего не защищает, доступ к общей `map`
      `cache` остаётся не синхронизированным. Мьютекс должен быть общим для
      всех обращений к `cache` — обычно его оформляют полем структуры,
      вместе с самой мапой:

      ```go
      type Cache struct {
          mu   sync.Mutex
          data map[string]string
      }
      ```

      Также стоит использовать `defer m.Unlock()` сразу после `Lock()`,
      чтобы блокировка гарантированно снималась даже при раннем `return` или
      панике внутри защищённого участка.
  - level: senior
    text_md: |
      Даже после того как мьютекс стал общим полем структуры, у
      `GetOrCreate` остаётся структурная проблема: он лочит мьютекс дважды
      (отдельно на чтение, отдельно на запись) — между этими двумя
      секциями другая горутина может успеть вставить своё значение для того
      же ключа, и конкурентная запись «перезатрёт» результат гонки без
      видимой паники, но с некорректным результатом (последняя записавшая
      горутина выигрывает, хотя обе думали, что создают значение первыми).
      Правильнее лочить один раз на весь `GetOrCreate` — проверка и запись
      должны быть атомарны относительно других вызовов.

      Раз чтения (80%) значительно преобладают над записями (20%), имеет
      смысл использовать `sync.RWMutex` вместо `sync.Mutex`: несколько
      читателей смогут держать `RLock()` одновременно, и только запись
      требует эксклюзивного `Lock()`.
  - level: deep
    text_md: |
      Следующий уровень — `sync.Map` из стандартной библиотеки, оптимизированный
      именно под паттерн «пишут редко, читают часто, и набор ключей
      относительно стабилен» (внутри — отдельные read-only и dirty карты,
      что позволяет читателям в основном не брать блокировку вовсе).
      Важно понимать компромисс: `sync.RWMutex` + обычная `map` может
      оказаться быстрее, если запись происходит достаточно часто или ключи
      сильно меняются, — `sync.Map` не бесплатная замена, а точечная
      оптимизация под конкретный профиль нагрузки, и её стоит обосновывать
      бенчмарком, а не использовать по умолчанию.

      Финальный шаг для по-настоящему высокой нагрузки — разбить кеш на
      несколько независимых шардов, каждый со своим мьютексом (или
      `RWMutex`): ключ хешируется, и по хешу выбирается шард. Это снижает
      contention — конкурирующие обращения к разным ключам, попавшим в
      разные шарды, больше не блокируют друг друга, тогда как единый
      мьютекс на весь кеш сериализует вообще все обращения независимо от
      того, к разным ли ключам они идут.
follow_ups:
  - "Почему объявление мьютекса как локальной переменной делает блокировку бесполезной?"
  - "Чем sync.RWMutex отличается от sync.Map по внутреннему устройству и когда RWMutex может оказаться быстрее?"
  - "Как устроено шардирование кеша и сколько шардов имеет смысл заводить?"
