# приватный тренажёр, банк вопросов по грейдам, личное использование
slug: zad-lru-cache-design
section: algorithms
title: "LRU cache: устройство на хеш-таблице и двусвязном списке (теория)"
difficulty: senior
tags: [lru, cache, data-structures]
question_md: |
  Расскажите, как устроен LRU cache. Кеш имеет фиксированный максимальный
  размер. Если после вставки нового элемента превышается максимально
  допустимый размер кеша, из него нужно удалить самый старый элемент.

  Пример:

  ```
  cache = new LRU(capacity=2)
  cache.put(A, 1); // cache is {A=1}
  cache.put(B, 2); // cache is {A=1, B=2}
  cache.get(A);    // return 1
  cache.put(C, 3); // {A=1, C=3}, element B=2 was evicted
  cache.get(B);    // returns -1 (not found)
  cache.put(D, 4); // {D=4, C=3}
  cache.get(A);    // return -1 (not found)
  cache.get(C);    // return 3
  cache.get(D);    // return 4
  ```
answer_levels:
  - level: middle
    text_md: |
      Если кандидат затрудняется, можно спросить, какие вообще структуры
      данных он знает и какая сложность операций у них (массив, словарь/мапа,
      деревья) — это подводит к идее LRU.

      Основа кеша — хеш-таблица: ключи в ней те же, что и в LRU-кеше, а
      значения — сложнее: они оборачиваются в структуру `Node` — узел
      двусвязного списка. `Node` хранит ключ, значение и ссылки на
      `prev`/`next` узлы.
  - level: senior
    text_md: |
      Хеш-таблица одна не решает задачу — нужно ещё уметь определять, какой
      элемент самый старый (least recently used), для этого и нужен
      двусвязный список: элементы в нём располагаются в хронологическом
      порядке операций доступа. Самый старый элемент находится в голове
      списка, а новые и только что обновлённые (прочитанные или
      перезаписанные) элементы перемещаются в хвост списка.
  - level: deep
    text_md: |
      Ключевая инвариантность реализации: обе структуры работают за O(1) на
      операцию. Если мы читаем по ключу не в первый раз, элемент нужно
      переместить из середины списка в хвост — хеш-таблица за O(1) находит
      нужный узел по ключу, а двусвязный список позволяет за O(1) удалить
      этот узел из середины (переставив ссылки соседних узлов, не проходя
      весь список) и перемонтировать его в хвост. Именно двусвязность
      списка (а не односвязность) критична: без ссылки на `prev` удаление
      произвольного узла из середины потребовало бы линейного поиска его
      предшественника. При вставке нового элемента сверх capacity удаляется
      голова списка, и парный ключ убирается из хеш-таблицы — обе операции
      тоже O(1).
