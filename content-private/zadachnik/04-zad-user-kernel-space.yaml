# приватный тренажёр, банк вопросов по грейдам, личное использование
slug: zad-user-kernel-space
section: os
title: "User space vs kernel space: зачем нужно разделение"
difficulty: senior
tags: [os, kernel, security]
question_md: |
  Что такое user space и kernel space? Зачем нужно такое разделение?
answer_levels:
  - level: middle
    text_md: |
      Прикладные программы работают в User Space, а операционная система —
      в Kernel Space. User space — окружение и режим процессора, в котором
      процессу доступна только его виртуальная память и отсутствует часть
      низкоуровневых команд процессора. Kernel space — окружение, в котором
      работает система: ей доступен весь арсенал процессора, включая доступ
      к устройствам и менеджмент памяти.
  - level: senior
    text_md: |
      Разделение нужно для безопасности — чтобы никакое прикладное ПО не
      могло сломать систему (напрямую записать в чужую память, перенастроить
      устройство, обрушить ядро). Переключение между этими режимами
      происходит при вызове приложением системных вызовов — их можно
      считать своего рода API операционной системы: приложение не может
      напрямую выполнить привилегированную операцию, оно просит об этом
      ядро через строго определённый интерфейс.
  - level: deep
    text_md: |
      Каждый переход user space → kernel space (через syscall, аппаратное
      прерывание или исключение процессора) — это смена привилегированного
      уровня выполнения на аппаратном уровне (например, ring 3 → ring 0 на
      x86), с сохранением состояния регистров вызывающего кода и переключением
      на стек ядра для обработки запроса, а по завершении — возвратом в
      user space с восстановлением состояния. Это не бесплатно (в отличие,
      например, от переключения горутин Go, которое остаётся целиком в user
      space) — отсюда общее правило проектирования высоконагруженных систем:
      минимизировать число системных вызовов на горячем пути (батчинг
      операций записи, `readv`/`writev`, `io_uring` вместо множества мелких
      `read`/`write`).
