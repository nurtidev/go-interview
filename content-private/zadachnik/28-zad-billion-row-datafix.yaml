# приватный тренажёр, банк вопросов по грейдам, личное использование
slug: zad-billion-row-datafix
section: platform
title: "Датафикс 10 млн строк в таблице на 1 млрд записей в проде"
difficulty: senior
tags: [postgres, datafix, batching]
question_md: |
  Есть таблица на 1 миллиард записей, которая активно используется в
  проде. Нужно сделать датафикс, который модифицирует 10 миллионов строк.
  Как бы вы подошли к решению задачи?
answer_levels:
  - level: middle
    text_md: |
      Делать `UPDATE` батчами, с фильтром по индексируемым полям — не одним
      огромным `UPDATE` по всей таблице, а частями, чтобы не держать
      долгую блокировку и не раздувать транзакцию.
  - level: senior
    text_md: |
      Из практики: чаще всего нужно поправить только строки за какой-то
      узкий период (например, «за сегодня»), а на остальные — не тратить
      время; это сразу переводит задачу в класс более простых, потому что
      обычно есть какой-то соседний индекс (например, по дате), коррелирующий
      с появлением испорченных записей, и по этому индексу можно радикально
      сократить количество перебираемых строк.

      Если данные реально размазаны равномерно по всей таблице, но есть
      индекс, позволяющий найти нужные строки, — проще: пишем код, который
      отдельно набирает `ID` строк, где условие выполняется, а затем
      накатывает изменения пачками с `WHERE ID IN (...)`.
  - level: deep
    text_md: |
      Если индекса по нужному условию нет и приходится перебирать все
      строки — план такой: выбрать `ID`, начиная с которого баг уже
      исправлен (граница, за которой чинить не нужно); затем написать
      скрипт, который читает данные кусками со слейва (реплики, чтобы не
      грузить мастер тяжёлым full/партиальным сканом) и сохраняет в файл
      `ID` строк, где нужно поменять данные; и в конце накатывать изменения
      пачками по 1000–10 000 строк на мастер, беря `ID` из подготовленного
      файла. Чтение со слейва разгружает мастер на самом дорогом этапе
      (поиск нужных строк без индекса), а собственно модификация — короткими
      батчами по готовому списку `ID` — минимизирует время удержания
      блокировок на проде.
follow_ups:
  - "Как найти границу (ID), с которой баг уже исправлен, и почему это сокращает объём работы?"
  - "Почему выгодно читать данные для поиска нужных строк со слейва, а не с мастера?"
  - "Каким должен быть размер батча при накате изменений и от чего он зависит?"
