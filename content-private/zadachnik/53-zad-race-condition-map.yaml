# приватный тренажёр, банк вопросов по грейдам, личное использование
slug: zad-race-condition-map
section: concurrency
title: "Race condition при конкурентной записи в map"
difficulty: senior
tags: [race-condition, mutex, map]
question_md: |
  Можно ли передать переменную в несколько горутин? Что будет с этим
  кодом?

  ```go
  x := make(map[int]int, 1)
  go func() { x[1] = 2 }()
  go func() { x[1] = 7 }()
  go func() { x[1] = 10 }()
  time.Sleep(100 * time.Millisecond)
  fmt.Println("x[1] =", x[1])
  ```
answer_levels:
  - level: middle
    text_md: |
      Можно, но нужно учесть race condition. Без синхронизации это
      приведёт к панике `fatal error: concurrent map writes` (при условии
      `GOMAXPROCS != 1`, то есть когда запись действительно может
      происходить параллельно на разных ядрах) — встроенная map в Go не
      потокобезопасна и не защищена от конкурентной записи сама по себе.
  - level: senior
    text_md: |
      Решение — защитить запись мьютексом:

      ```go
      x := make(map[int]int, 1)
      lock := sync.RWMutex{}
      go func() {
          lock.Lock()
          x[1] = 2
          lock.Unlock()
      }()
      go func() {
          lock.Lock()
          x[1] = 7
          lock.Unlock()
      }()
      go func() {
          lock.Lock()
          x[1] = 11
          lock.Unlock()
      }()
      time.Sleep(100 * time.Millisecond)
      fmt.Println("x[1] =", x[1])
      ```

      Итоговое значение `x[1]` при этом всё равно недетерминировано (зависит
      от того, какая горутина последней захватит блокировку) — мьютекс
      убирает гонку данных (data race, UB на уровне памяти), но не
      убирает состояние гонки (race condition) в смысле непредсказуемого
      порядка событий, если сам порядок важен для корректности логики.
  - level: deep
    text_md: |
      Можно продемонстрировать решение и без `sync.Mutex`/`sync.RWMutex` —
      например, через `sync.Map` (потокобезопасная map из stdlib) или
      через модель «одна горутина-владелец map, остальные шлют ей
      изменения по каналу» (actor-подобный паттерн: любая мутация состояния
      идёт последовательно через одну горутину, конкурентного доступа к
      самой map просто не возникает в принципе, а не убирается
      постфактум блокировкой). Средства для предотвращения race condition
      в общем случае: `Mutex` (можно и самому реализовать простой вариант
      поверх atomic-примитивов), атомарные операции (`sync/atomic`) для
      простых счётчиков, и упомянутая модель единственного владельца
      состояния. Виды mutex — полностью блокирующий (`sync.Mutex`) и
      блокировка только на запись при разрешённом параллельном чтении
      (`sync.RWMutex`).
