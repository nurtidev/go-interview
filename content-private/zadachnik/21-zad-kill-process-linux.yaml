slug: zad-kill-process-linux
section: os
title: "Как убить процесс в Linux и что делать, если он не реагирует"
difficulty: senior
tags: [linux, signals, process]
question_md: |
  Как убить процесс в Linux'е? Что делать, если я вызываю kill и процесс
  продолжает работать? Что такое `-9`?
answer_levels:
  - level: middle
    text_md: |
      Ожидается хотя бы один из вариантов: `kill <pid>` / `kill -9 <pid>`,
      `killall <process_name>`, либо через `top`/`htop` — найти процесс и
      нажать `k`.
  - level: senior
    text_md: |
      Плюсом — указаны способы нахождения `pid` процесса (`ps aux` и
      аналоги в связке с `grep`, либо `top`/`htop`). Хороший кандидат
      расскажет о сигналах: `kill` по умолчанию (без флага) отправляет
      сигнал `SIGTERM` — просьбу процессу корректно завершиться, которую
      процесс может перехватить и, например, сначала освободить ресурсы.
  - level: deep
    text_md: |
      `-9` — это сигнал `SIGKILL`, отправляемый процессу. В отличие от
      `SIGTERM`, `SIGKILL` нельзя перехватить, заблокировать или
      проигнорировать — ядро завершает процесс немедленно и безусловно.
      Именно поэтому `SIGKILL` считается «плохим» способом останова:
      процесс не успевает закрыть файлы, зафиксировать/откатить
      транзакции, освободить блокировки или корректно закрыть сетевые
      соединения — отсюда практика сначала слать `SIGTERM` и ждать
      graceful shutdown, и только если процесс не завершился за разумное
      время, эскалировать до `SIGKILL`. Если после обычного `kill`
      (`SIGTERM`) процесс продолжает работать — либо он ещё не успел
      завершиться (обработка сигнала и graceful shutdown занимают время),
      либо он в состоянии, в котором не может обработать сигнал (например,
      завис в неубиваемом состоянии `D` — uninterruptible sleep, обычно
      ожидание I/O) — тогда и нужен `SIGKILL` как последний довод.
