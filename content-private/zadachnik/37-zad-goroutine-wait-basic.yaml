# приватный тренажёр, банк вопросов по грейдам, личное использование
slug: zad-goroutine-wait-basic
section: concurrency
title: "Ожидание завершения горутин: WaitGroup и переменная цикла"
difficulty: senior
tags: [goroutine, waitgroup, loopvar]
question_md: |
  Что выведет на экран эта программа?

  ```go
  func main() {
      for i := 0; i < 5; i++ {
          go func() {
              fmt.Println(i)
          }()
      }
  }
  ```

  Как изменить программу, чтобы дожидаться всех созданных горутин? Как
  изменить программу, чтобы каждая горутина правильно выводила свой индекс?
answer_levels:
  - level: middle
    text_md: |
      Поведение не определено — скорее всего, ничего не будет выведено на
      экран, поскольку `main` завершится, не дождавшись горутин: у
      программы нет ни одного механизма ожидания их завершения.
  - level: senior
    text_md: |
      В программе есть и вторая проблема — даже если дождаться всех
      горутин, на экран, скорее всего, будет выведено одно и то же число
      пять раз, поскольку все горутины используют одну и ту же переменную
      `i` (для версий Go до 1.22; начиная с Go 1.22 переменная цикла
      создаётся заново на каждой итерации, и эта проблема больше не
      воспроизводится). Чтобы дождаться всех горутин, используют
      `sync.WaitGroup`:

      ```go
      func main() {
          wg := sync.WaitGroup{}
          for i := 0; i < 5; i++ {
              wg.Add(1)
              go func() {
                  defer wg.Done()
                  fmt.Println(i)
              }()
          }
          wg.Wait()
      }
      ```

      Плюсом засчитывается решение через `defer wg.Done()` (гарантирует
      декремент даже при панике внутри горутины).
  - level: deep
    text_md: |
      Чтобы при этом каждая горутина корректно выводила именно свой индекс
      (а не одно и то же значение), нужна локальная копия `i` для каждой
      итерации — либо явно передать `i` в горутину как аргумент, либо (для
      версий Go до 1.22) переобъявить `i := i` внутри тела цикла:

      ```go
      func main() {
          var wg sync.WaitGroup
          for i := 0; i < 5; i++ {
              wg.Add(1)
              go func(k int) {
                  defer wg.Done()
                  fmt.Println(k)
              }(i)
          }
          wg.Wait()
      }
      ```

      Кандидат, знающий, что с Go 1.22 семантика переменной цикла
      изменилась (новая переменная на каждой итерации), может справедливо
      заметить, что на актуальной версии языка эта конкретная проблема уже
      не воспроизводится сама по себе — но неопределённость с недождавшимся
      `main()` (первая проблема) остаётся в любом случае, независимо от
      версии Go.
