title: "Перебор паролей по известному алфавиту и хешу"
difficulty: senior
tags: [brute-force, hashing, security]
question_md: |
  У нас есть база данных с паролями пользователей, пароли захешированы
  (функция `hashPassword`), а также известен набор символов, которые могут
  быть использованы в паролях (переменная `alphabet`). Нужно реализовать
  функцию `RecoverPassword` так, чтобы она восстанавливала пароль по
  известному хешу. Базовые требования — решить как угодно.

  ```go
  package main
  import (
      "crypto/md5"
      "testing"
  )
  var alphabet = []rune{'a', 'b', 'c', 'd', '1', '2', '3'}
  func RecoverPassword(h []byte) string {
      // TODO: implement me
      return ""
  }
  func TestRecoverPassword(t *testing.T) {
      for _, exp := range []string{
          "a",
          "12",
          "abc333d",
      } {
          t.Run(exp, func(t *testing.T) {
              act := RecoverPassword(hashPassword(exp))
              if act != exp {
                  t.Error("recovered:", act, "expected:", exp)
              }
          })
      }
  }
  func hashPassword(in string) []byte {
      h := md5.Sum([]byte(in))
      return h[:]
  }
  ```
answer_levels:
  - level: middle
    text_md: |
      Это вопрос на написание кода, который потом прикладывается к
      протоколу собеседования. Идея простого решения — перебор всех
      возможных строк по возрастанию длины, генерируемых из `alphabet`, с
      сравнением хеша каждой сгенерированной строки с целевым хешом:

      ```go
      func RecoverPassword(h []byte) string {
          var step int
          for ; ; step++ {
              guess := genPassword(step)
              if bytes.Equal(hashPassword(guess), h) {
                  return guess
              }
          }
      }

      func genPassword(step int) (res string) {
          for {
              res = string(alphabet[step%len(alphabet)]) + res
              step = step/len(alphabet) - 1
              if step < 0 {
                  break
              }
          }
          return
      }
      ```

      Максимальное число перебираемых комбинаций здесь ограничено
      `math.MaxInt64` (тип `step`).
  - level: senior
    text_md: |
      Вычислительная сложность подбора пароля перебором — `O(a^n)`, где
      `a` — размер алфавита, `n` — длина пароля; для `n`-битовой
      хеш-функции сложность нахождения первого прообраза (найти хоть
      какой-то вход с заданным хешом, не обязательно исходный пароль) в
      общем случае оценивается как `O(2^n)`.

      Чтобы сделать подбор константным по сложности при ограниченной длине
      пароля, используют rainbow table — предвычисленную таблицу
      «хеш → пароль» (точнее, цепочки хешей и восстановлений), которая
      меняет затраты времени перебора на затраты памяти на хранение
      таблицы, посчитанной один раз заранее.
  - level: deep
    text_md: |
      Атакующий может скомпрометировать криптосистему через timing-attack:
      если сравнение введённого пароля/хеша с эталоном идёт побайтово и
      прерывается на первом несовпадении, время сравнения коррелирует с
      числом совпавших первых байт — атакующий может подбирать пароль
      побайтово, замеряя время ответа. Защита — сравнение за константное
      время (constant-time comparison), ограничение количества попыток
      входа, и ограничение по времени в случае одноразовых паролей (OTP) из
      SMS. Разработчики сервиса могут усложнить подбор паролей: использовать
      крипто-стойкое хеширование, спроектированное умышленно медленным и
      требовательным к памяти (в отличие от `md5`, который в этом примере
      быстрый и потому удобен для брутфорса, — на практике для паролей
      применяют `bcrypt`/`scrypt`/`argon2`), добавлять уникальную соль на
      каждый пароль (что делает rainbow table бесполезной, поскольку
      таблицу нужно было бы пересчитывать под каждую соль отдельно), и
      сравнивать хеши за константное время.
