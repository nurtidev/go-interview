# приватный тренажёр, банк вопросов по грейдам, личное использование
slug: zad-interfaces-type-assertion
section: go-internals
title: "Интерфейсы в Go: duck typing и type assertion между интерфейсами"
difficulty: senior
tags: [interfaces, type-assertion, go-internals]
question_md: |
  Что такое интерфейс в Go? Как он устроен?

  ```go
  type Foo struct{}
  func (f *Foo) A() {}
  func (f *Foo) B() {}
  func (f *Foo) C() {}

  type AB interface {
      A()
      B()
  }
  type BC interface {
      B()
      C()
  }

  func main() {
      var f AB = &Foo{}
      y := f.(BC) // сработает ли такой type-assertion?
      y.A() // а этот вызов?
      _ = y
  }
  ```
answer_levels:
  - level: middle
    text_md: |
      Интерфейс в Go — это абстракция поведения других типов: определение,
      описывающее конкретные методы, которые должны быть у какого-то
      другого типа. Если тип реализует все эти методы, говорят, что «тип
      удовлетворяет интерфейсу». Интерфейсы позволяют определить обобщённую
      реализацию без привязки к конкретному типу: когда объявление
      (переменной, параметра функции, поля структуры) имеет интерфейсный
      тип, можно передать туда объект любого типа, пока он удовлетворяет
      этому интерфейсу.
  - level: senior
    text_md: |
      Хороший кандидат расскажет, что такое duck typing — реализация
      интерфейса в Go неявная: не нужно явно писать «тип X реализует
      интерфейс Y», достаточно, чтобы у типа были нужные методы с нужными
      сигнатурами. Может назвать несколько интерфейсов из stdlib: `error`,
      `io.Writer`, `io.Reader`, `context.Context`, `Stringer` и т.д.

      В примере кода `f.(BC)` сработает: `*Foo` реализует и `A()`, и `B()`,
      и `C()`, то есть удовлетворяет и `AB`, и `BC` одновременно —
      несмотря на то, что статический тип переменной `f` — `AB`, реальное
      (динамическое) значение внутри интерфейса — это `*Foo`, у которого
      есть все нужные методы для `BC`, поэтому type assertion к `BC`
      успешен.
  - level: deep
    text_md: |
      А вот `y.A()` не скомпилируется: `y` имеет статический тип `BC`,
      интерфейс `BC` объявляет только `B()` и `C()`, метод `A()` в нём не
      объявлен — компилятор не знает, что динамическое значение внутри `y`
      на самом деле умеет ещё и `A()` (в общем случае, для произвольного
      значения типа `BC`, это и не гарантировано: интерфейсу `BC` может
      удовлетворять тип, у которого вообще нет метода `A()`). Ошибка
      «`y.A undefined (type BC has no field or method A)`» — на этапе
      компиляции, а не в рантайме, потому что Go проверяет доступность
      методов интерфейса статически по объявлению интерфейса, а не по
      фактическому динамическому типу значения.

      Основное отличие применения интерфейса в Go от интерфейсов
      классического ООП (Java, C#) именно в этом: там имплементация
      интерфейса указывается для класса явно (`class Foo implements Bar`),
      в Go — неявно, через совпадение набора методов (structural typing /
      duck typing), без какой-либо явной декларации связи между типом и
      интерфейсом.
