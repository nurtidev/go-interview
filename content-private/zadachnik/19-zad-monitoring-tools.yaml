# приватный тренажёр, банк вопросов по грейдам, личное использование
slug: zad-monitoring-tools
section: platform
title: "Инструменты мониторинга и отладки микросервисов"
difficulty: senior
tags: [observability, monitoring, prometheus]
question_md: |
  Какие существуют инструменты для мониторинга и отладки микросервисов?
answer_levels:
  - level: middle
    text_md: |
      Базовый уровень: логи, графики, информация о загрузке CPU/памяти на
      сервере — без подробностей об инструментах для сбора и агрегации.
      Инфраструктурные средства мониторинга: `munin`, `zabbix`.
  - level: senior
    text_md: |
      Более полный ответ включает метрики и систему алертинга поверх них:
      `prometheus` для сбора и хранения метрик, `grafana` для их
      визуализации. Для профилирования Go-сервиса используется `pprof`.
      Микросервису на Go полезен хендлер `/debug/vars` — для выдачи
      отладочной информации (например, об использовании памяти или GC).
      Логи микросервиса в Kubernetes смотрят через `kubectl logs`.
  - level: deep
    text_md: |
      На продвинутом уровне добавляются подробности трейсинга и
      профилирования плюс реальный опыт решения практических задач с их
      помощью. Полезно понимать разницу ролей этих четырёх типов
      наблюдаемости: логи дают сообщения об ошибках (что именно пошло не
      так, в конкретном месте кода); метрики дают детальную агрегированную
      картину состояния сервиса во времени (нагрузка, время ответа, RPS);
      профайлер даёт картину по используемым ресурсам (CPU, память) внутри
      одного процесса; трассировка (distributed tracing) даёт картину по
      взаимосвязям в больших микросервисных системах и позволяет находить
      узкие места конкретно в пути запроса через несколько сервисов —
      логи и метрики такого сквозного взгляда не дают.
