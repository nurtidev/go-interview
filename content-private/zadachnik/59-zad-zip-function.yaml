# приватный тренажёр, банк вопросов по грейдам, личное использование
slug: zad-zip-function
section: algorithms
title: "Функция zip: попарное и вариативное соединение слайсов"
difficulty: middle
tags: [slice, algorithms, variadic]
question_md: |
  Требуется реализовать функцию zip, которая соединяет элементы двух
  слайсов в слайс пар.

  ```go
  func main() {
      s1, s2 := []int{1, 2, 3}, []int{4, 5, 6, 7, 8}
      fmt.Println(zip(s1, s2)) // [[1 4] [2 5] [3 6]]
  }
  func zip(s1 []int, s2 []int) [][]int {
      //...
  }
  ```

  Реализуйте версию функции zip, которая сможет соединять произвольное
  количество слайсов.
answer_levels:
  - level: middle
    text_md: |
      Базовое решение для двух слайсов: результат ограничен длиной более
      короткого из двух входных слайсов — избыточные «хвостовые» элементы
      более длинного слайса просто не попадают в результат.

      ```go
      func zip(s1 []int, s2 []int) [][]int {
          minLen := len(s1)
          if len(s2) < minLen {
              minLen = len(s2)
          }
          res := make([][]int, 0, minLen)
          for i := 0; i < minLen; i++ {
              res = append(res, []int{s1[i], s2[i]})
          }
          return res
      }
      ```
  - level: senior
    text_md: |
      Обобщение до произвольного числа слайсов через variadic-параметр
      `...[]int`: минимальная длина теперь ищется среди всех переданных
      слайсов, а не только двух:

      ```go
      func zip(s ...[]int) [][]int {
          if len(s) == 0 {
              return [][]int{}
          }
          minLen := len(s[0])
          for i := 1; i < len(s); i++ {
              if len(s[i]) < minLen {
                  minLen = len(s[i])
              }
          }
          res := make([][]int, 0, minLen)
          for i := 0; i < minLen; i++ {
              x := make([]int, 0, len(s))
              for k := 0; k < len(s); k++ {
                  x = append(x, s[k][i])
              }
              res = append(res, x)
          }
          return res
      }
      ```
  - level: deep
    text_md: |
      Сложность — O(n*k), где `n` — минимальная длина среди входных
      слайсов, `k` — их количество: внешний цикл проходит `n` раз, а
      внутренний, собирающий одну «строку» результата, — `k` раз на каждой
      итерации внешнего. Обе предварительные аллокации (`make(..., 0,
      minLen)` для результата и `make(..., 0, len(s))` для каждой строки)
      важны для производительности: без них `append` многократно
      реаллоцировал бы память по мере роста, хотя итоговый размер известен
      заранее. Явная проверка `len(s) == 0` в variadic-версии нужна,
      потому что `s[0]` для пустого `s` привёл бы к панике `index out of
      range` — с двумя фиксированными параметрами в базовой версии такой
      проблемы не было, поскольку оба параметра обязательны.
