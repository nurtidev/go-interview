# приватный тренажёр, банк вопросов по грейдам, личное использование
slug: zad-defer-value-capture
section: go-internals
title: "Defer: когда вычисляются аргументы метода"
difficulty: senior
tags: [defer, closures, go-internals]
question_md: |
  Что такое defer? Что выведет следующий код?

  ```go
  type X struct {
      V int
  }
  func (x X) S() {
      fmt.Println(x.V)
  }
  func main() {
      x := X{123}
      defer x.S()
      x.V = 456
  }
  ```

  А что изменится, если изменить код так:

  ```go
  func main() {
      x := X{123}
      defer func(){ x.S() }()
      x.V = 456
  }
  ```

  Что произойдёт, если писать несколько `defer` подряд? В каких случаях
  `defer` вызван не будет?
answer_levels:
  - level: middle
    text_md: |
      `defer` гарантирует отложенный вызов функции, который произойдёт по
      мере выполнения программы (при выходе из окружающей функции). `defer`
      добавляет функцию в стек вызовов приложения.
  - level: senior
    text_md: |
      В первом варианте код выведет `123`: аргументы метода, включая
      receiver (`x` в `x.S()`), вычисляются и фиксируются **в момент
      объявления** `defer`, а не в момент фактического вызова — на момент
      `defer x.S()` `x.V` ещё равен `123`, и именно эта копия `x`
      (значение-receiver, а не ссылка) будет использована при реальном
      вызове в конце функции, уже после того как `x.V` изменили на `456`.

      Во втором варианте (обёртка в анонимную функцию `defer func(){ x.S() }()`)
      выведется `456`: здесь откладывается вызов не `x.S()` с уже
      зафиксированным `x`, а вызов анонимной функции без аргументов —
      само тело `x.S()` выполнится только в момент фактического вызова
      defer, и к этому моменту замыкание видит `x` таким, какой он стал
      на момент вызова (уже `456`), потому что замыкание захватывает `x`
      по ссылке (не копирует его при объявлении `defer`).
  - level: deep
    text_md: |
      Если писать несколько `defer` подряд, они вызовутся в обратном
      порядке — LIFO (last in, first out), так как это именно стек
      вызовов функций, а не очередь.

      `defer` не будет вызван в нескольких случаях: при `os.Exit()`
      (немедленное завершение процесса без разворачивания стека и
      выполнения отложенных вызовов); при панике, дошедшей до `os.Exit` —
      если сама паника происходит, `defer`'ы в стеке всё же выполнятся по
      мере разворачивания стека паники (в этом смысле паника без
      восстановления через `recover` не отменяет вызов `defer`'ов), но
      если где-то в цепочке восстановления вызывается `os.Exit`, дальнейшее
      разворачивание прекращается; и при `log.Fatal`, который внутри сам
      вызывает `os.Exit` — соответственно, любые незавершившиеся к этому
      моменту `defer` тоже не выполнятся.
