# приватный тренажёр, банк вопросов по грейдам, личное использование
slug: zad-rdbms-schema-design
section: platform
title: "Проектирование схемы РСУБД: пользователь, чат, сообщение"
difficulty: senior
tags: [sql, schema-design, indexes]
question_md: |
  Есть 3 сущности — пользователь, чат, сообщение.

  - У пользователя есть имя и дата регистрации.
  - У чата есть название и дата создания.
  - У сообщения есть текст, автор и дата создания.
  - Пользователь может состоять в нескольких чатах одновременно.
  - Сообщение обязательно принадлежит чату, сообщение не может принадлежать
    более чем 1 чату одновременно.

  Нужно описать предметную область в виде таблиц. Дальше: выбрать все чаты
  пользователя Вася (left/right join); что такое индекс и сколько их будет в
  этой схеме; запрос со временем начинает работать медленнее — почему и как
  исправить; что показывает `EXPLAIN`; как заполнять `id` при вставках; как
  масштабироваться, если данных становится слишком много; какой первичный
  ключ лучше — числовой или UUID?
answer_levels:
  - level: middle
    text_md: |
      Базовая схема из трёх таблиц со связью 1-N (сообщение → автор,
      сообщение → чат):

      ```sql
      create table users (
        id int primary key,
        name text not null,
        created_at timestamp not null
      );
      create table chats (
        id int primary key,
        name text not null,
        created_at timestamp not null
      );
      create table messages (
        id int primary key,
        content text not null,
        author_id int not null, -- ссылка на автора, связь N-1
        chat_id int not null, -- принадлежность к чату, связь N-1
        created_at timestamp not null
      );
      ```
  - level: senior
    text_md: |
      Связь «пользователь может состоять в нескольких чатах одновременно» —
      это N-M, для неё нужна отдельная связующая таблица:

      ```sql
      create table user_chats ( -- таблица для связи N-M
        user_id int,
        chat_id int,
        primary key (user_id, chat_id)
        -- primary key (chat_id, user_id) тоже допускается
      );

      select uc.chat_id, c.name chat_name
      from users u
      join user_chats uc on uc.user_id = u.id
      join chats c on c.id = uc.chat_id
      where u.name = 'Вася'
      ```

      Индекс — вспомогательная структура данных для ускорения доступа к
      таблице, неявно управляется ядром БД. Для этой схемы будет создано 4
      индекса: по одному уникальному B-tree индексу на `primary key` каждой
      таблицы (users, chats, messages, user_chats). Если запрос из примера
      выше со временем замедляется по мере роста таблиц — не хватает индекса
      на `users(name)`; в более сложных случаях запрос профилируют через
      `EXPLAIN [ANALYZE]` — план запроса с оценкой стоимости по узлам, и узел
      `SeqScan` там, где ожидался поиск по индексу, однозначно сигнализирует
      о нехватке индекса. Поле `id` заполняется автоинкрементом:

      ```sql
      create table users (
          id serial primary key
      );
      ```
  - level: deep
    text_md: |
      Если запрос вместо `join` использует `left join`, для чатов, у
      которых нет ни одного пользователя, в результате появится строка с
      `NULL` вместо данных пользователя — семантика меняется с «только
      совпадения» на «все строки левой таблицы, даже без пары».

      Если число пользователей растёт и скоро не хватит места на диске для
      всей переписки — нужно шардировать. Шардировать стоит наиболее
      сильно растущую таблицу — в данном примере это `messages`, потому что
      она хранит генерируемый пользователями текст и растёт быстрее всего
      (в отличие от `users`/`chats`, которые растут гораздо медленнее).

      Выбор первичного ключа — числовой автоинкремент (`serial`/`bigserial`)
      против UUID, сгенерированного на стороне приложения, — это компромисс:
      числовой ключ компактнее, монотонно возрастает (что дружит с B-tree
      индексом и HOT-обновлениями), но требует похода в БД за значением или
      централизованной генерации; UUID можно сгенерировать на клиенте до
      вставки (удобно для шардированных/распределённых систем без единой
      точки генерации id), но случайный UUID v4 не монотонен и хуже ведёт
      себя в B-tree индексе (случайные вставки по всему дереву вместо
      дозаписи в конец), что при высокой нагрузке даёт больше bloat и
      худшую page locality — отсюда на практике для распределённых систем
      часто выбирают UUID v7 (или ULID) — генерируемые с временной
      компонентой, поэтому почти монотонные.
