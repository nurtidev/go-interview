# приватный тренажёр, банк вопросов по грейдам, личное использование
slug: zad-slice-append-basics
section: go-internals
title: "Слайсы: append, реаллокация и трёхиндексный срез"
difficulty: senior
tags: [slice, append, go-internals]
question_md: |
  Что выведет данная программа? Почему так?

  ```go
  func main() {
  nums := []int{1, 2, 3}
  addNum(nums[0:2])
  fmt.Println(nums) // ?
  addNums(nums[0:2])
  fmt.Println(nums) // ?
  }

  func addNum(nums []int) {
  nums = append(nums, 4)
  }

  func addNums(nums []int) {
  nums = append(nums, 5, 6)
  }
  ```
answer_levels:
  - level: middle
    text_md: |
      Программа выведет:
      1. `1 2 4` — при первом вызове `addNum` слайс `nums[0:2]` имеет
         `len == 2`, но `cap == 3` (унаследован от исходного массива из 3
         элементов), поэтому `append` одного элемента помещается в
         свободное место исходного массива без реаллокации — и меняет
         элемент с индексом 2 в исходном массиве (то есть `nums[2]`
         снаружи).
      2. `1 2 4` — при втором вызове `addNums(nums[0:2])` снова передаётся
         срез с `len == 2, cap == 3` от **исходного** (уже изменённого на
         предыдущем шаге) массива `[1 2 4]`; `append` двух элементов (5 и
         6) превышает оставшуюся ёмкость (нужно 4 элемента, а cap всё ещё
         3), поэтому происходит реаллокация в новый, больший массив — и
         исходный массив (а значит и `nums` в `main`) не меняется вовсе,
         остаётся `1 2 4`.
  - level: senior
    text_md: |
      И `addNum`, и `addNums` присваивают результат `append` **локальной**
      переменной `nums` внутри функции — это не меняет слайс `nums` в
      `main()`, потому что слайс передаётся по значению (копируется
      заголовок из указателя, `len`, `cap`), а вызывающая сторона не видит
      переприсваивание локальной переменной внутри функции. Единственный
      способ, которым вызов может повлиять на данные, видимые снаружи, — это
      запись в элементы **нижележащего массива**, на который всё ещё
      указывают оба слайса (`nums[0:2]` внутри и `nums` в `main`). Именно
      это и происходит в первом вызове: `append` без реаллокации пишет
      элемент по индексу `len` в тот же массив, на который смотрит и
      исходный `nums`.
  - level: deep
    text_md: |
      Чтобы полностью изолировать переданный срез от возможной записи через
      `append` в вызываемой функции, используют трёхиндексный срез
      `nums[0:2:2]` — третий индекс явно ограничивает `cap` результата
      значением `2`, равным `len`. Тогда `append` в `addNum` не находит
      свободного места (`len == cap`) и всегда реаллоцирует новый массив,
      какой бы малой ни была добавка, — исходный массив в `main` гарантированно
      не меняется ни при каких количествах добавляемых элементов. Это
      стандартный приём защиты от «протекания» изменений через
      alias-семантику слайсов, когда слайс передаётся дальше по коду и
      нельзя гарантировать, что получатель не вызовет `append`.
