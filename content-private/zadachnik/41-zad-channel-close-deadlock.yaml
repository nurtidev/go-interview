# приватный тренажёр, банк вопросов по грейдам, личное использование
slug: zad-channel-close-deadlock
section: concurrency
title: "Незакрытый канал: чтение через range и дедлок"
difficulty: senior
tags: [channels, deadlock, range]
question_md: |
  Что выведет данная программа? Она отработает корректно?

  ```go
  func main() {
      ch := make(chan int)
      go func() {
          for i := 0; i < 5; i++ {
              ch <- i
          }
      }()
      for n := range ch {
          fmt.Println(n)
      }
  }
  ```
answer_levels:
  - level: middle
    text_md: |
      Программа содержит ошибку: она сначала выведет числа от 0 до 4, а
      потом упадёт с сообщением `all goroutines are asleep - deadlock!`.
  - level: senior
    text_md: |
      Причина — `for n := range ch` продолжает читать из канала `ch`,
      пока тот не будет закрыт. Горутина, отправляющая значения, никогда не
      закрывает `ch` после отправки последнего значения — она просто
      завершается. После этого в основной горутине `range` пытается
      прочитать следующее значение из пустого и никем не заполняемого
      канала, блокируется навсегда, а поскольку больше никаких активных
      горутин не осталось, планировщик Go обнаруживает, что вся программа
      находится в тупике, и завершает её с ошибкой дедлока.
  - level: deep
    text_md: |
      Чтобы починить программу, нужно закрыть канал в конце
      горутины-отправителя — после последней отправки:

      ```go
      func main() {
          ch := make(chan int)
          go func() {
              for i := 0; i < 5; i++ {
                  ch <- i
              }
              close(ch)  // <<<
          }()
          for n := range ch {
              fmt.Println(n)
          }
      }
      ```

      `close(ch)` не «стирает» значения, уже отправленные в канал — все
      значения, лежащие в буфере (или уже переданные ожидающему читателю),
      по-прежнему будут вычитаны `range`. `range` завершает цикл сам, как
      только канал одновременно закрыт и пуст — это и есть штатный,
      идиоматичный сигнал «данные закончились», без которого читающая
      сторона не может отличить «пока нет данных, подождите» от «данных
      больше не будет никогда».
follow_ups:
  - "Кто должен закрывать канал — отправитель или получатель, и почему?"
  - "Что произойдёт, если попытаться писать в уже закрытый канал?"
