# приватный тренажёр, банк вопросов по грейдам, личное использование
slug: zad-string-immutability
section: go-internals
title: "Неизменяемость строк: почему s[0] = \"R\" не компилируется"
difficulty: middle
tags: [strings, go-internals, compile-error]
question_md: |
  Что выведет программа?

  ```go
  s := "test"
  println(s[0]) // ответ кандидата
  s[0] = "R"
  println(s) // ответ кандидата
  ```
answer_levels:
  - level: middle
    text_md: |
      Слабый (неверный) ответ, который иногда даёт кандидат: «выведет 116
      (номер байта) и не заменит R, будет `test`» — то есть кандидат
      предполагает, что присваивание элементу строки просто молча
      игнорируется в рантайме.
  - level: senior
    text_md: |
      Правильный ответ: этот код вообще не скомпилируется. `s[0]` для
      строки имеет тип `byte`, а не `string`, поэтому `s[0] = "R"` — это
      уже ошибка типов на этапе компиляции (нельзя присвоить `string`
      значению типа `byte`). Но даже если бы типы совпадали, присваивание
      всё равно было бы ошибкой компиляции: строки в Go неизменяемы, у
      `string` в принципе нет операции индексированной записи — `s[0] = x`
      для строки не компилируется в Go ни при каких `x`.
  - level: deep
    text_md: |
      Продвинутый ответ — как поменять код так, чтобы он всё же менял
      байты и при этом компилировался: перевести строку в изменяемое
      представление, например `[]byte(s)`, изменить нужный байт там, и
      обратно сконвертировать в строку:

      ```go
      s := "test"
      b := []byte(s)
      b[0] = 'R' // байт (rune-литерал одного символа), не string "R"
      s = string(b)
      println(s) // "Rest"
      ```

      Обе конверсии (`[]byte(s)` и `string(b)`) физически копируют данные
      (строка неизменяема, слайс байт — изменяем, поэтому нельзя просто
      «переинтерпретировать» одну память как другую без копии) — это
      осознанная плата за то, что неизменяемость строк в остальное время
      даёт дешёвое совместное владение данными (несколько строк могут
      безопасно указывать на одну и ту же память, не боясь, что кто-то её
      исподтишка изменит).
follow_ups:
  - "Как поменять этот код так, чтобы он менял байты строки и всё же компилировался?"
  - "Почему конверсии []byte(s) и string(b) физически копируют данные, а не просто меняют тип указателя?"
