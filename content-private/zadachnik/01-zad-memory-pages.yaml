# приватный тренажёр, банк вопросов по грейдам, личное использование
slug: zad-memory-pages
section: os
title: "Страница памяти: отображение на физическую память, TLB, hugepages"
difficulty: staff
tags: [memory, virtual-memory, os]
question_md: |
  Что такое страница памяти? Если страницы мапятся на физическую память, то
  каждое обращение к памяти — это поиск в некоторой мапе. Как это может
  работать быстро? Что такое hugepages?
answer_levels:
  - level: middle
    text_md: |
      Страница памяти — единица структурирования виртуальной памяти. Она
      позволяет отображать (мапить) виртуальную память процесса на физическую
      память либо на файл. Страничная организация также позволяет защищать
      отдельные куски памяти от записи — разрешения выставляются на уровне
      страницы.
  - level: senior
    text_md: |
      Раз каждое обращение к памяти в теории требует поиска в таблице
      отображений виртуальных адресов на физические, у процессора есть
      специальный кэш для этого мапинга. Поэтому если программа работает с
      близкими (соседними) адресами памяти — а это типичный паттерн для
      большинства программ, — трансляция адреса почти всегда попадает в этот
      кэш, и работает это очень быстро.
  - level: deep
    text_md: |
      Этот аппаратный кэш отображений — TLB (Translation Lookaside Buffer).
      Hugepages — механизм, позволяющий менять размер страницы со
      стандартных 4 КБ до бОльших значений (например, 256 МБ). Это нужно для
      высокопроизводительных программ типа баз данных: чем крупнее страница,
      тем меньше страниц нужно для описания того же объёма памяти, а значит —
      меньше записей нужно держать в TLB и реже случаются промахи (TLB miss)
      при обращении к большим массивам данных.
