# приватный тренажёр, банк вопросов по грейдам, личное использование
slug: zad-transaction-anomalies
section: platform
title: "Аномалии при параллельном исполнении транзакций"
difficulty: senior
tags: [transactions, isolation, postgres]
question_md: |
  Какие аномалии могут быть при исполнении нескольких транзакций
  параллельно? Расскажите кратко о них.
answer_levels:
  - level: middle
    text_md: |
      Базовый уровень ответа — просто перечислить аномалии, без
      подробностей: грязное чтение (dirty read), неповторяемое чтение
      (non-repeatable read), фантомное чтение (phantom read), аномалия
      сериализации (serialization anomaly).
  - level: senior
    text_md: |
      Более полный ответ — перечислить аномалии с краткими пояснениями по
      каждой: грязное чтение — транзакция видит незакоммиченные изменения
      другой транзакции, которые потом могут откатиться; неповторяемое
      чтение — повторное чтение той же строки в рамках одной транзакции
      даёт другой результат, потому что другая транзакция успела её
      изменить и закоммитить между чтениями; фантомное чтение — повторный
      запрос с тем же условием в рамках одной транзакции возвращает другой
      **набор** строк (появились/исчезли строки, а не изменилось значение
      уже прочитанной).
  - level: deep
    text_md: |
      Аномалия сериализации — самая тонкая: результат параллельного
      выполнения нескольких транзакций не соответствует никакому
      возможному результату их последовательного (одна за другой)
      выполнения в любом порядке, хотя по отдельности ни грязного, ни
      неповторяемого, ни фантомного чтения формально не произошло. Она
      возможна даже на уровне изоляции `REPEATABLE READ` и требует именно
      `SERIALIZABLE` для полного исключения — на этом уровне PostgreSQL
      отслеживает зависимости между транзакциями и откатывает одну из них с
      ошибкой сериализации, если обнаруживает цикл зависимостей, который
      не мог бы возникнуть при последовательном выполнении.
follow_ups:
  - "Какой уровень изоляции нужен, чтобы полностью исключить аномалию сериализации?"
  - "Чем неповторяемое чтение отличается от фантомного?"
