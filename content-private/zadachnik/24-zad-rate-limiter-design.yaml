# приватный тренажёр, банк вопросов по грейдам, личное использование
slug: zad-rate-limiter-design
section: platform
title: "Проектирование rate limiter для внешнего API с лимитом RPS"
difficulty: senior
tags: [rate-limiting, redis, architecture]
question_md: |
  Мой сервис использует внешний API для построения маршрутов, в рамках
  тарифа у нас есть ограничение по RPS. Нужно спроектировать rate limiter.
  Как можно оптимизировать работу с redis'ом?
answer_levels:
  - level: middle
    text_md: |
      Есть два основных подхода. Без использования внешнего хранилища:
      каждый инстанс сервиса получает свою долю лимита `x / n`, где `x` —
      общее допустимое количество запросов, а `n` — количество инстансов.
      Плюсы: простая реализация и конфигурация, нет дополнительных
      задержек. Минусы: балансировка запросов между инстансами имеет
      большое значение — если инстансы получают неравномерную нагрузку,
      часть лимита будет простаивать, а часть — упираться раньше времени.
  - level: senior
    text_md: |
      Альтернатива — с использованием внешнего хранилища, например redis,
      в котором хранится счётчик количества запросов за нужное временное
      окно. Плюсы: нет единой точки отказа при правильной архитектуре
      (несколько инстансов redis), не имеет значения, насколько
      сбалансированы запросы по инстансам сервиса — лимит общий и
      централизованный. Минусы: увеличение времени запроса (лишний round
      trip до redis на каждую проверку), сам redis становится точкой
      отказа, если не зарезервирован, и конфигурация сложнее, чем в
      локальном варианте.
  - level: deep
    text_md: |
      Работу с redis можно оптимизировать, используя Lua-скрипт: вместо
      нескольких отдельных команд (`GET` счётчика, проверка, `INCR`), что
      создаёт гонку между несколькими инстансами сервиса, обращающимися к
      redis одновременно, стоит сделать одну атомарную процедуру на Lua,
      которая целиком выполняется на стороне redis (redis однопоточен для
      выполнения команд, поэтому Lua-скрипт исполняется атомарно
      относительно других клиентов) и возвращает просто `true`/`false` —
      разрешён запрос или нет. Это убирает race condition между
      «прочитать текущий счётчик» и «увеличить его» и минимизирует число
      round trip'ов до redis до одного на проверку.
