# приватный тренажёр, банк вопросов по грейдам, личное использование
slug: zad-slow-analytics-service
section: platform
title: "Медленный сервис аналитики блокирует создание заказа"
difficulty: senior
tags: [architecture, async, queue]
question_md: |
  На примере создания заказа: есть запрос на сервис и есть ответ, между
  этими двумя действиями мы складываем в аналитику товары, которые
  заказали (например, для подсчёта популярности товаров). Сервис аналитики
  периодически работает медленно или вовсе таймаутит, и мы не успеваем
  ответить — теряем заказы.

  ```
  +-------+         +---------------+    +-------------------+
  | User  |         | OrderService  |    | AnalyticsService  |
  +-------+         +---------------+    +-------------------+
      |                     |                      |
      | CreateOrder         |                      |
      |-------------------->|                      |
      |                     |                      |
      |                     | TrackOrder           |
      |                     |--------------------->|
      |                     |                      |
      |                     |                      | Too long action
      |                     |                      |----------------
      |                     |                      |               |
      |                     |                      |<---------------
      |                     |                      |
      |                     |<---------------------|
      |                     |                      |
      |<--------------------|                      |
  ```

  Что делать, чтобы перестать терять заказы (и деньги соответственно)?
answer_levels:
  - level: middle
    text_md: |
      Нужно придумать, как распараллелить (сделать асинхронным) сохранение
      заказа и отправку данных в аналитику — ответ пользователю не должен
      зависеть от того, как быстро отработает сервис аналитики.
  - level: senior
    text_md: |
      Типичная асинхронная схема — сохранить событие для аналитики локально
      (в БД или очередь) и отдать ответ пользователю сразу, а данные в
      аналитику отправлять воркерами отдельно, вне пути запроса. Если
      решение через БД: воркеры не должны брать в работу одни и те же
      данные — нужен механизм, который не даст нескольким воркерам
      заселектить одинаковые записи одновременно, например мастер-процесс,
      раздающий задачи, либо `SELECT ... FOR UPDATE SKIP LOCKED`.

      Если сама аналитика не готова читать данные из нас или нашей очереди —
      нужно придумать способ самим пушить данные в аналитику из своей
      очереди (наша сторона инициирует отправку, а не ждёт, пока
      аналитика заберёт).
  - level: deep
    text_md: |
      Дальше возникают проблемы уже другого рода. Если отдел аналитики
      жалуется на высокий RPS от нас (мы кладём их сервис под нагрузкой) —
      простое снижение RPS в конфигах статическим числом плохая идея: тогда
      будет копиться очередь без разгрузки. Нужно экспоненциальное
      повышение или понижение нагрузки в зависимости от текущего состояния
      аналитики (по сути — адаптивный rate limiting/circuit breaker с
      обратной связью по здоровью сервиса-получателя).

      Если проблема с самой аналитикой решена, но появляется проблема с
      местом, занимаемым нашей очередью (инфраструктура ограничила ресурсы,
      расширять некуда, а сама аналитика планирует переписать сервис
      неизвестно когда) — нужно своё решение независимо от других команд:
      просеивать данные в зависимости от квоты на ресурсы и загруженности
      очереди — например, вытеснением старых данных или прореживанием
      (сэмплированием) данных для аналитики уже на входе нашего сервиса,
      если её всё равно используют для приблизительной статистики, а не для
      точного учёта.
follow_ups:
  - "Если решение через БД: как организовать воркеры так, чтобы они не брали в работу одни и те же данные?"
  - "Сервис аналитики не читает данные из нас или нашей очереди — что делать?"
  - "Отдел аналитики жалуется на высокий RPS от нас — как решить проблему без статичного снижения лимита?"
  - "Место под очередь ограничено, расширять некуда — как поступить с прореживанием данных?"
