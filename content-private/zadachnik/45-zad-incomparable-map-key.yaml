# приватный тренажёр, банк вопросов по грейдам, личное использование
slug: zad-incomparable-map-key
section: go-internals
title: "Incomparable types: почему код с map[B]int может не скомпилиться"
difficulty: senior
tags: [map, types, go-internals]
question_md: |
  В каких случаях данный код даст ошибку?

  ```go
  a := map[B]int{}
  a[d] = 0
  e, ok := a[d]
  ```
answer_levels:
  - level: middle
    text_md: |
      Ожидаются, среди прочего, следующие варианты (для базового ответа
      достаточно назвать примерно 2/3 из списка):

      1. `B` — incomparable type, то есть тип, который не поддерживает
         операторы сравнения `==` и `!=` (а ключ map обязан их
         поддерживать).
      2. `B` вообще не является типом (не объявлен).
      3. `d` не является значением типа `B`.
  - level: senior
    text_md: |
      Ещё возможные причины ошибки: `a` или `e` уже определены выше (в
      таком контексте, что новое объявление через `:=` конфликтует), либо
      `B`/`d` вообще не определены в области видимости. Более полный
      ответ включает все эти пункты, а не только часть.
  - level: deep
    text_md: |
      Отдельный, более тонкий класс проблем — race condition из-за
      конкурентной записи в map: если несколько горутин одновременно
      пишут в `a` (или пишут и читают одновременно) без синхронизации,
      программа скомпилируется и может даже успешно отработать несколько
      раз, но рано или поздно рантайм обнаружит одновременный доступ и
      упадёт с `fatal error: concurrent map writes` — это не ошибка
      компиляции, а ошибка времени выполнения, и она принципиально не
      ловится статическим анализом кода в общем случае (только `-race` в
      рантайме). Что касается incomparable types в Go — это slice, функции,
      а также структуры и массивы, содержащие несравнимые поля/элементы
      (например, `struct { S []int }` или `[3][]int` — несравнимы, потому
      что несравним `[]int` внутри).
