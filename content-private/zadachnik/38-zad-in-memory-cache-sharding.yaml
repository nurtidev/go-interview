# приватный тренажёр, банк вопросов по грейдам, личное использование
slug: zad-in-memory-cache-sharding
section: concurrency
title: "In-memory cache: от Mutex к шардированию"
difficulty: staff
tags: [cache, mutex, sharding]
question_md: |
  Нужно написать простую библиотеку in-memory cache. Для простоты считаем,
  что у нас бесконечная память и не нужно задумываться об удалении ключей.
  Реализация должна удовлетворять интерфейсу:

  ```go
  type Cache interface {
      Set(k, v string)
      Get(k string) (v string, ok bool)
  }
  ```
answer_levels:
  - level: middle
    text_md: |
      Базовое решение — «в лоб» с `sync.Mutex`/`sync.RWMutex`, без
      шардирования, с правильно инициализированной map в конструкторе.
      Хороший кандидат на этом уровне уже может подсветить проблемы такого
      решения: переполнение памяти (кеш растёт бесконечно), дублирование
      памяти из-за нескольких процессов/инстансов сервиса, отсутствие
      механизма инвалидации кеша — ключи будут жить вечно.
  - level: senior
    text_md: |
      Более уверенный кандидат расскажет про различие `sync.Mutex` и
      `sync.RWMutex` (последний позволяет параллельное чтение и подходит,
      когда чтений сильно больше записей), решит задачу с шардированием и
      расскажет про алгоритмы хеширования — либо напишет свою реализацию,
      либо возьмёт вызов из stdlib (например, `hash/fnv` или `hash/maphash`).

      Если для решения использовался просто `sync.RWMutex` без
      шардирования — при большом количестве конкурентных запросов растёт
      lock contention: RWMutex позволяет параллельные чтения, но пишущая
      горутина требует эксклюзивного доступа и блокирует **всех** читателей
      на время записи — при высоком RPS любая запись тормозит все
      параллельные чтения.
  - level: deep
    text_md: |
      Решение — шардировать данные: разбить кеш на несколько независимых
      частей, каждая со своим отдельным мьютексом, и выбирать нужный шард
      хешированием ключа. Число шардов должно быть не меньше числа
      потоков, использующих кеш, а лучше — больше и кратно этому значению
      (чтобы конкурирующие горутины реже попадали в один и тот же шард).

      На самом продвинутом уровне обсуждают: плюсы/минусы такого решения в
      сравнении с внешним кешем вроде memcached (in-process cache быстрее —
      нет сетевого round trip, но не шарится между инстансами сервиса и
      теряется при рестарте); нужно ли кешировать ответы с ошибками или
      отсутствие данных (негативное кеширование — иногда нужно, чтобы не
      долбить backend повторными запросами за несуществующими данными);
      что лучше — LRU или TTL (LRU ограничивает объём независимо от
      времени, TTL — гарантирует свежесть данных, часто нужны оба сразу);
      когда оправдано централизованное (единое, разделяемое между
      инстансами) кеширование против распределённого локального; и есть
      ли смысл в кеше, который не помещается в память целиком и частично
      сохраняется на диск (обычно нет, если цель именно низкая задержка —
      тогда как раз лучше уменьшить объём или перейти на специализированное
      решение).

      Отдельный частный случай — если заранее известно, что ключей мало и
      они идут подряд (например, от 1 до 10000 и никаких других не бывает),
      можно сделать кеш ещё быстрее, используя заранее выделенный слайс
      вместо map — прямой доступ по индексу без хеширования и без
      накладных расходов map.
follow_ups:
  - "Если кандидат написал map + sync.Mutex — можно ли найти решение лучше?"
  - "В каких случаях sync.RWMutex будет работать медленно, и как это решить шардированием?"
  - "Сколько шардов нужно делать?"
  - "Можно ли сделать ещё более быстрый кеш, если ключи заранее известны и идут подряд?"
