# приватный тренажёр, банк вопросов по грейдам, личное использование
slug: zad-rest-vs-rpc
section: platform
title: "REST vs RPC: в чём разница подходов"
difficulty: senior
tags: [rest, rpc, http]
question_md: |
  В чём разница между REST и RPC подходами? Обязательно ли делать REST
  поверх HTTP? А RPC? Как RPC-запрос можно переложить на HTTP-запрос? А
  как это сделать, используя только TCP?
answer_levels:
  - level: middle
    text_md: |
      REST строится вокруг ресурсов и операций над ними (`GET`, `PUT`,
      `DELETE` и т.д.) — API описывает состояние сущностей и действия над
      ними в терминах HTTP-методов. RPC — прямой вызов методов сервиса,
      API описывает не ресурсы, а вызываемые процедуры/функции.
  - level: senior
    text_md: |
      REST обязательно делать поверх HTTP — сама идея REST опирается на
      семантику HTTP-методов, кодов состояния и кеширования. RPC же не
      обязательно делать поверх HTTP — можно делать поверх чего угодно
      (TCP напрямую, поверх очереди сообщений и т.д.), поскольку суть RPC —
      просто вызов удалённой процедуры, а транспорт — деталь реализации.
  - level: deep
    text_md: |
      Переложить RPC-запрос на HTTP можно, передавая имя сервиса и метода в
      URL или в заголовке (например, `POST /ServiceName/MethodName` с
      сериализованными аргументами в теле — именно так устроен gRPC поверх
      HTTP/2, или JSON-RPC поверх HTTP, где имя метода едет в теле JSON, а
      URL один и тот же для всех вызовов). Используя только TCP без HTTP —
      нужно самим определить бинарный или текстовый протокол кадрирования
      сообщений (framing): например, длина сообщения + имя метода +
      сериализованные аргументы, отправляемые последовательно по
      установленному TCP-соединению, без накладных расходов на
      HTTP-заголовки — именно так устроены многие внутренние RPC-протоколы
      до появления gRPC/HTTP2 как стандарта.
