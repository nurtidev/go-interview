# приватный тренажёр, банк вопросов по грейдам, личное использование
slug: zad-goroutines-vs-threads-basic
section: concurrency
title: "Горутины vs потоки: базовое сравнение и стек"
difficulty: middle
tags: [goroutine, thread, scheduler]
question_md: |
  Чем горутины отличаются от потоков? Что можно сказать про стек горутины
  и стек потока? Сколько можно создать горутин? Что такое GOMAXPROCS?
answer_levels:
  - level: middle
    text_md: |
      Горутины гораздо более легковесны и требуют меньше памяти, поэтому
      их можно создать больше. Горутины шедулятся рантаймом языка в
      юзерспейсе, в то время как потоки шедулятся операционной системой в
      кернелспейсе. Из этого следует также и меньшее количество
      переключений контекста в случае использования горутин.
  - level: senior
    text_md: |
      Изначально у горутины небольшой стек, который может расти до 1 ГБ
      на 64-битных ОС и до 256 МБ на 32-битных системах. У потока же
      изначально большой стек, который не может динамически увеличиваться.
      Количество горутин не ограничено — можно создавать столько, на
      сколько хватит памяти (в отличие от потоков ОС, которых на практике
      держат разумно немного — десятки-сотни).
  - level: deep
    text_md: |
      GOMAXPROCS — переменная, ограничивающая количество потоков ОС,
      используемых для одновременного исполнения Go-кода (горутин).
      Именно за счёт того, что горутины дешёвы в создании (не требуют
      системного вызова, стартуют с маленьким растущим стеком) и
      переключаются рантаймом в user space без входа в ядро, а
      GOMAXPROCS позволяет держать относительно небольшое число реальных
      потоков ОС, — Go-программа может комфортно поддерживать сотни тысяч
      одновременно живых горутин, тогда как аналогичное число потоков ОС
      исчерпало бы память и упёрлось в стоимость переключения контекста
      ядром.
