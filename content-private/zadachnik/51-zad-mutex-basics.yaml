# приватный тренажёр, банк вопросов по грейдам, личное использование
slug: zad-mutex-basics
section: concurrency
title: "Mutex: зачем нужен и чем отличается от RWMutex"
difficulty: senior
tags: [mutex, rwmutex, concurrency]
question_md: |
  Что такое mutex и зачем он нужен? Чем отличается RWMutex от Mutex?
answer_levels:
  - level: middle
    text_md: |
      Mutex — примитив синхронизации, который нужен для эксклюзивного
      доступа к какому-то ресурсу. Если другому потоку (горутине) нужен
      доступ к ресурсу, пока он занят, он блокируется до тех пор, пока
      текущий владелец не освободит блокировку.
  - level: senior
    text_md: |
      Хороший кандидат может рассказать, как устроен mutex «под капотом»
      (быстрый путь через atomic-операцию в отсутствие конкуренции, и
      обращение к планировщику/ОС для усыпления горутины при реальной
      конкуренции), и знает про `RWMutex` и его разницу с обычным `Mutex`.
  - level: deep
    text_md: |
      `RWMutex` нужен в случае, когда есть горутины, которым требуется
      доступ на чтение ресурса, но не требуется запись, — тогда читать
      может сразу много горутин одновременно (`RLock`), в отличие от
      обычного `Mutex`, который сериализует вообще всех, включая
      читателей. Запись (`Lock`) при этом по-прежнему требует
      эксклюзивного доступа и блокирует всех — и читателей, и других
      писателей. Такой режим выгоден только при существенном перевесе
      чтений над записями: при частой записи `RWMutex` может проигрывать
      обычному `Mutex` из-за более сложной внутренней бухгалтерии
      (отдельный подсчёт читателей и писателей).
follow_ups:
  - "Чем отличается RWMutex от Mutex?"
  - "В каких сценариях RWMutex может оказаться медленнее обычного Mutex?"
