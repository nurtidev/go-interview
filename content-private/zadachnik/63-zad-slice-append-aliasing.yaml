# приватный тренажёр, банк вопросов по грейдам, личное использование
slug: zad-slice-append-aliasing
section: go-internals
title: "Два append к одному слайсу: перезапись через общий массив"
difficulty: senior
tags: [slice, append, aliasing]
question_md: |
  Что выведет программа?

  ```go
  func a() {
      x := []int{}
      x = append(x, 0)
      x = append(x, 1)
      x = append(x, 2)
      y := append(x, 3)
      z := append(x, 4)
      fmt.Println(y, z)
  }

  func main() {
      a()
  }
  ```
answer_levels:
  - level: middle
    text_md: |
      Программа выведет `[0 1 2 4] [0 1 2 4]` — оба слайса `y` и `z`
      показывают одно и то же значение `4` на четвёртой позиции, хотя `y`
      создавался через `append(x, 3)`, а `z` — через `append(x, 4)`.
  - level: senior
    text_md: |
      Разбор роста `cap` по шагам (стандартная стратегия удвоения для
      маленьких слайсов): `append(x, 0)` из пустого слайса даёт
      `len=1, cap=1`; `append(x, 1)` требует 2 элемента при `cap=1` —
      реаллокация, новая `cap=2`; `append(x, 2)` требует 3 элемента при
      `cap=2` — снова реаллокация, новая `cap=4` (не 3!). То есть **после
      трёх последовательных `append` `x` имеет `len == 3`, а `cap == 4`** —
      остаётся один свободный слот в нижележащем массиве, который `len`
      не занимает, но `cap` уже зарезервировал.
  - level: deep
    text_md: |
      Именно наличие свободного слота (`cap(x) == 4 > len(x) == 3`) и есть
      причина неожиданного результата: и `y := append(x, 3)`, и
      `z := append(x, 4)` вызываются от одного и того же `x` — оба видят
      место в существующем массиве, поэтому **ни один из них не
      реаллоцирует** новый массив, оба просто пишут значение в свободный
      слот по индексу 3 **одного и того же** нижележащего массива и
      возвращают новый заголовок слайса (`len=4, cap=4`), указывающий на
      этот же массив. Порядок вызовов в выражении `y := append(x, 3); z :=
      append(x, 4)` строго последовательный (не конкурентный), поэтому
      сначала по индексу 3 оказывается `3` (от `y`), а сразу вслед за этим
      `z` перезаписывает тот же индекс значением `4` — итоговое содержимое
      массива на индексе 3 становится `4`, и поскольку `y` и `z` указывают
      на один и тот же (не реаллоцированный) массив, оба печатают
      `[0 1 2 4]`. Мораль: два `append` к одному и тому же слайсу, у
      которого `cap` больше `len` (запас ещё не исчерпан), — классический
      источник трудноуловимого бага через aliasing нижележащего массива;
      предсказывать результат такого кода нужно, зная фактическое
      значение `cap(x)`, а не только `len(x)`.
follow_ups:
  - "Как проверить фактическое значение cap(x) в этой точке программы, чтобы предсказать поведение?"
  - "Как избежать такой перезаписи, если оба append к x действительно нужны в коде?"
