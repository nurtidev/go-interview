# приватный тренажёр, банк вопросов по грейдам, личное использование
slug: zad-slice-internals-basic
section: go-internals
title: "Слайс: устройство, cap, безопасное копирование"
difficulty: senior
tags: [slice, go-internals, memory]
question_md: |
  Что такое слайс? Как он устроен? На что влияет параметр cap(acity)?
  Какие способы безопасного копирования слайсов знаете? Как происходит
  выделение памяти при росте слайса через append? Когда сборщик мусора
  удалит массив под слайсом? Какие особенности получения нового среза от
  существующего слайса? Чем опасно создание через make слайса с явно
  указанными len и cap?
answer_levels:
  - level: middle
    text_md: |
      Слайс — абстракция, построенная на основе массива: часть массива от
      0 до N элемента. От массива слайс отличает то, что это не массив, а
      структура, содержащая ссылку на часть массива и способная менять
      свой размер и динамически выделять память. Внутри слайс представляет
      собой структуру вида:

      ```go
      type slice struct {
          array unsafe.Pointer
          len   int
          cap   int
      }
      ```

      где `len` (length) — текущая длина слайса; `cap` (capacity) — длина
      внутреннего массива, под который выделена память; `array` — ссылка
      на сам массив с данными.
  - level: senior
    text_md: |
      `cap` — ключевой параметр для выделения памяти, влияет на
      производительность вставки: если вместимость в момент определения
      была задана недостаточной, вставка в слайс приведёт к частому
      выделению памяти по мере добавления новых элементов. В идеале
      `capacity` слайса в момент создания должна быть максимально близкой к
      плановому количеству элементов.

      Способы безопасного копирования слайсов: через функцию `copy()`;
      либо присвоить возвращаемое `append()` значение слайса новой
      переменной в случае добавления элемента при `len == cap` (то есть не
      полагаться на то, что старая переменная останется указывать на те
      же данные — после реаллокации это уже другой массив).

      Слайсинг (`s[a:b]`) не производит копирование данных: создаётся
      новое значение слайса (новый заголовок — `array`, `len`, `cap`),
      указывающее на исходный массив, без копирования его содержимого.
  - level: deep
    text_md: |
      При размере слайса менее 1024 элементов размер выделяемой памяти при
      `append` увеличивается вдвое; при размере среза больше 1024 элементов
      срез увеличивается примерно на четверть текущего размера. Вставка в
      слайс сверх cap имеет серьёзные последствия для памяти: при
      увеличении capacity массив копируется в новый, и размер выделенной
      памяти растёт по своей внутренней логике, лишь отчасти связанной с
      реально требуемой ёмкостью.

      Массив под слайсом будет удалён сборщиком мусора только после того,
      как не останется ни одного слайса, ссылающегося на элементы этого
      массива, — это одна из причин, почему маленький слайс, полученный
      как срез огромного массива, может незаметно удерживать в памяти весь
      этот огромный массив, пока жив хотя бы один такой мелкий слайс.

      Отдельная ловушка — создание через `make` слайса с явно указанными
      `len` и `cap`: при этом будет выделена память под `cap`, и
      дополнительно инициализированы значениями по умолчанию (для типа
      элементов) первые `len` элементов массива. В дальнейшем эти
      элементы участвуют в итерировании и являются реальными («живыми»)
      значениями массива — если про это забыть и использовать `append`
      вместо прямого присваивания по индексу, ожидая, что слайс «пуст»,
      можно получить лишние нулевые элементы в начале и исказить данные.
