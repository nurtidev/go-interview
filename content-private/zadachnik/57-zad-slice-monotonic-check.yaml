# приватный тренажёр, банк вопросов по грейдам, личное использование
slug: zad-slice-monotonic-check
section: algorithms
title: "Проверка слайса на монотонность"
difficulty: middle
tags: [slice, algorithms, screening]
question_md: |
  Является ли слайс монотонным? Монотонная функция — функция одной
  переменной, определённая на некотором подмножестве действительных чисел,
  которая либо везде (на области своего определения) не убывает, либо
  везде не возрастает.

  ```
  {1,7} - true
  {1,1} - true
  {3,3,1} - true
  {9,5,1} - true
  {23,5,23} - false
  ```
answer_levels:
  - level: middle
    text_md: |
      Идея решения — за один проход одновременно проверять, не нарушается
      ли неубывание и не нарушается ли невозрастание; слайс монотонен,
      если хотя бы одно из двух условий не нарушилось ни разу за весь
      проход.
  - level: senior
    text_md: |
      Реализация за O(n) с O(1) дополнительной памяти:

      ```go
      func isMonotonic(s []int) bool {
          isUp, isDown := true, true
          for i := 1; i < len(s); i++ {
              isDown = isDown && s[i-1] >= s[i]
              isUp = isUp && s[i-1] <= s[i]
          }
          return isUp || isDown
      }
      ```
  - level: deep
    text_md: |
      Как только `isUp` и `isDown` оба стали `false`, дальнейшие итерации
      уже не могут изменить итоговый ответ — можно добавить ранний выход
      (`if !isUp && !isDown { return false }`) как микро-оптимизацию для
      длинных немонотонных слайсов, хотя асимптотику это не меняет. Слайсы
      длины 0 и 1 корректно обрабатываются и без явной отдельной проверки:
      цикл просто не выполнит ни одной итерации, и `isUp`/`isDown` останутся
      `true`, что верно — слайс из 0 или 1 элемента монотонен по определению
      (нет пар для нарушения условия).
follow_ups:
  - "Как обработать пустой слайс и слайс из одного элемента — нужна ли отдельная проверка?"
  - "Можно ли досрочно прервать цикл, если монотонность уже точно нарушена в обе стороны?"
