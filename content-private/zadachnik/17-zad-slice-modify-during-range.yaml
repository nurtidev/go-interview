# приватный тренажёр, банк вопросов по грейдам, личное использование
slug: zad-slice-modify-during-range
section: go-internals
title: "Modifying a slice during range iteration"
difficulty: senior
tags: [slice, range, go-internals]
question_md: |
  Что выведет этот код, и почему?

  ```go
  package main
  import "fmt"
  func main() {
  lst := []string{"a", "b", "c", "d"}
  for k, v := range lst {
  if k == 0 {
  lst = []string{"aa", "bb", "cc", "dd"}
  }
  fmt.Println(v)
  }
  }
  ```
answer_levels:
  - level: middle
    text_md: |
      Выведет:
      ```
      a
      b
      c
      d
      ```
  - level: senior
    text_md: |
      Это задача даже не на специфику работы оператора `range`, а на знание
      одного из основных принципов языка — everything in Go is passed by
      value. Слайс по сути является структурой из трёх полей — ссылка на
      массив, `len` и `cap`. При вызове `range` эта структура **копируется**
      (ровно так же, как при вызове функции), а вот массив, на который она
      ссылается, — не копируется. Присваивая переменной `lst` новое
      значение внутри цикла, мы меняем только локальную переменную `lst`
      (указывающую теперь на новый массив), но `range` уже держит свою
      собственную копию заголовка слайса — старую ссылку на старый массив,
      старые `len`/`cap` — и продолжает итерироваться по нему, не замечая
      переприсваивания `lst`.
  - level: deep
    text_md: |
      А вот если менять не саму переменную `lst`, а значения **внутри**
      исходного нижележащего массива, `range` эти изменения увидит, потому
      что итерируется по тому же самому массиву в памяти:

      ```go
      func main() {
      lst := []string{"a", "b", "c", "d"}
      for k, v := range lst {
      if k == 0 {
      lst[3] = "z"
      }
      fmt.Println(v)
      }
      }
      ```

      Выведет:
      ```
      a
      b
      c
      z
      ```

      Разница принципиальна: `lst = []string{...}` меняет **заголовок**
      переменной `lst` (указатель на новый массив) — `range` этого не
      видит, поскольку уже скопировал старый заголовок себе. А `lst[3] = ...`
      меняет **содержимое** массива, на который указывают одновременно и
      `lst`, и копия заголовка внутри `range`, — оба видят одни и те же
      данные.
follow_ups:
  - "Что изменится, если вместо lst = []string{...} внутри цикла менять lst[3] напрямую?"
  - "Копирует ли range сам массив данных или только заголовок слайса?"
