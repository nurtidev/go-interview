# приватный тренажёр, банк вопросов по грейдам, личное использование
slug: zad-unique-random-numbers
section: algorithms
title: "Генерация N уникальных случайных чисел"
difficulty: middle
tags: [algorithms, map, random]
question_md: |
  Требуется реализовать функцию uniqRandn, которая генерирует слайс длины
  n уникальных, случайных чисел.

  ```go
  import (
      "fmt"
      "math/rand"
  )
  func main() {
      fmt.Println(uniqRandn(10))
  }
  func uniqRandn(n int) []int {
      //...
  }
  ```
answer_levels:
  - level: middle
    text_md: |
      Идея — генерировать случайные числа в цикле и складывать их в
      результат, отбрасывая уже встречавшиеся; для быстрой проверки
      «встречалось ли уже это число» нужна вспомогательная структура с
      поиском за O(1) — множество (в Go эмулируется как `map[int]struct{}`).
  - level: senior
    text_md: |
      ```go
      func uniqRandn(n int) []int {
          res, resMap := make([]int, 0, n), make(map[int]struct{}, n)
          for len(res) < n {
              val := rand.Int()
              if _, ok := resMap[val]; ok {
                  continue
              }
              res = append(res, val)
              resMap[val] = struct{}{}
          }
          return res
      }
      ```
  - level: deep
    text_md: |
      `struct{}{}` в качестве значения map — идиоматичный способ
      реализовать множество (set) в Go: пустая структура не занимает
      памяти под данные (в отличие от, например, `map[int]bool`, где
      каждое значение `bool` всё же занимает байт), а нужна только сама
      операция проверки наличия ключа. Цикл `for len(res) < n` в теории
      не гарантированно завершается за конечное число шагов (если бы
      диапазон случайных чисел был очень маленьким относительно `n`, цикл
      мог бы крутиться долго из-за постоянных коллизий) — но для
      `rand.Int()`, возвращающего число из диапазона `int` (практически
      2^63 значений на 64-битных системах), вероятность коллизии при
      разумных `n` пренебрежимо мала, и на практике цикл завершается почти
      сразу. При очень больших `n`, сравнимых с диапазоном возможных
      значений, такой подход деградирует — там уместнее генерировать
      перестановку всего диапазона (`rand.Perm`) и брать первые `n`
      элементов.
follow_ups:
  - "Почему struct{}{} используется как значение вместо bool при реализации множества?"
  - "Что произойдёт с производительностью этого решения, если n приближается к размеру диапазона случайных чисел?"
