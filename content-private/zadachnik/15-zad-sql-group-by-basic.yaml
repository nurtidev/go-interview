# приватный тренажёр, банк вопросов по грейдам, личное использование
slug: zad-sql-group-by-basic
section: platform
title: "SQL: подсчёт заказов по пользователю с фильтром и сортировкой"
difficulty: middle
tags: [sql, group-by]
question_md: |
  Дана таблица «orders»:

  ```
  +-----+-----------+------------------------+--------------+
  |  id |  user_id  |             created_at |  price_total |
  +-----+-----------+------------------------+--------------+
  |   1 |       111 |    2024-01-01 10:00:00 |        2 000 |
  |   2 |       222 |    2024-01-02 10:00:00 |          100 |
  |   3 |       111 |    2024-04-01 10:00:00 |       20 000 |
  |   4 |       222 |    2024-05-01 10:00:00 |        5 000 |
  |   5 |       333 |    2024-05-02 10:00:00 |       10 000 |
  +-----+-----------+------------------------+--------------+
  ```

  Напишите SQL-запрос, который вернёт количество заказов по каждому
  пользователю с `price_total >= 1000`, отсортированному по количеству
  заказов в обратном порядке:

  ```
  +----------+-------------+
  |  user_id | order_count |
  +----------+-------------+
  |      111 |           2 |
  |      222 |           1 |
  |      333 |           1 |
  +----------+-------------+
  ```
answer_levels:
  - level: middle
    text_md: |
      Если с группировкой не справляется — можно сначала попросить просто
      выбрать заказы с `price_total >= 1000`, чтобы убедиться, что кандидат
      вообще понимает, что такое SQL и `WHERE`.
  - level: senior
    text_md: |
      Полный ответ — фильтрация по цене, группировка по пользователю,
      подсчёт и сортировка по количеству:

      ```sql
      SELECT user_id, COUNT(*) AS order_count
      FROM orders
      WHERE price_total >= 1000
      GROUP BY user_id
      ORDER BY order_count DESC
      ```
  - level: deep
    text_md: |
      Важный порядок выполнения, который стоит проговорить: `WHERE`
      фильтрует строки **до** группировки (значит, отфильтрованные заказы
      меньше 1000 вообще не попадают в подсчёт), `GROUP BY` схлопывает
      оставшиеся строки по `user_id`, и только после этого `COUNT(*)`
      считает строки внутри каждой группы. Если бы фильтр нужно было
      применить **после** агрегации (например, «пользователи, у которых
      больше N заказов»), потребовался бы `HAVING`, а не `WHERE` — `WHERE`
      не может ссылаться на результат агрегатной функции, потому что на
      его этапе агрегация ещё не выполнена.
follow_ups:
