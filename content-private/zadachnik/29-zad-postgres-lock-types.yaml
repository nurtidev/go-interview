# приватный тренажёр, банк вопросов по грейдам, личное использование
slug: zad-postgres-lock-types
section: platform
title: "Типы блокировок в PostgreSQL: таблица, строка, advisory locks"
difficulty: senior
tags: [postgres, locks]
question_md: |
  Какие типы локов (блокировок) есть в PostgreSQL? Кто берёт эти локи?
answer_levels:
  - level: middle
    text_md: |
      Три основных типа: лок на таблицу, лок на строку (запись), и
      пользовательские (рекомендательные, advisory) локи.
  - level: senior
    text_md: |
      Локи на таблицу берут стандартные команды SQL (`UPDATE`, `DELETE`,
      `SELECT`, `ALTER TABLE` и т.д.). Например, `SELECT` берёт лок на
      таблицу типа `ACCESS SHARE`, который конфликтует, например, с самым
      строгим `ACCESS EXCLUSIVE` (который берёт, в частности,
      `ALTER TABLE`). Локи на строки в таблице берут стандартные команды
      SQL, которые меняют данные конкретных записей. Например, есть тип
      блокировки `FOR UPDATE`, который конфликтует сам с собой — вторая
      транзакция, пытающаяся взять `FOR UPDATE` на ту же строку, будет
      ждать первую. Этот же тип лока можно указывать прямо у оператора
      `SELECT`: `SELECT * FROM t1 FOR UPDATE NOWAIT` (или `SKIP LOCKED`).
  - level: deep
    text_md: |
      Пользовательские (advisory) локи можно брать, когда нужен общий
      ресурс для координации нескольких приложений и нет возможности
      разделить его через обычные механизмы инфраструктуры (например,
      распределённая блокировка на уровне логики приложения — «только один
      воркер сейчас обрабатывает эту задачу»). В отличие от локов на
      таблицу/строку, advisory locks не привязаны к каким-либо данным —
      это просто числовой идентификатор, о смысле которого договаривается
      само приложение, а PostgreSQL лишь предоставляет примитив
      блокировки (`pg_advisory_lock`/`pg_try_advisory_lock`) поверх этого
      идентификатора.
