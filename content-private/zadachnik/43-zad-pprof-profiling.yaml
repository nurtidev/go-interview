# приватный тренажёр, банк вопросов по грейдам, личное использование
slug: zad-pprof-profiling
section: go-internals
title: "pprof: семплирующий профайлер, оверхед, trace"
difficulty: staff
tags: [pprof, profiling, gc]
question_md: |
  pprof — что это такое и зачем нужно? Как можно снять профили? Что такое
  семплирующий профайлер? Есть ли оверхед от использования pprof? Что такое
  trace и чем он отличается от других профилей?
answer_levels:
  - level: middle
    text_md: |
      `pprof` — инструмент для снятия профилей выполнения программы на Go.
      Базовое понимание — «нужно для того, чтобы снять профили» (например,
      по CPU или памяти), без детального опыта работы с флагами и картинками
      профилей.
  - level: senior
    text_md: |
      Снять профили можно, используя программный API, либо подключив пакет
      `net/http/pprof`, который поднимает HTTP-эндпоинты для снятия
      профилей прямо с работающего сервиса. Более опытный кандидат назовёт
      флаги консольной команды `go tool pprof` и приведёт пример из
      реальной практики использования (найденная и исправленная утечка
      памяти, горячая функция по CPU и т.д.), а также сможет на практике
      прочитать граф вызовов или флеймграф, построенные `pprof`.

      Оверхед от использования `pprof` не одинаков для разных типов
      профилей: для heap, alloc, mutex, block — оверхед минимальный, эти
      данные по сути собираются рантаймом всегда; профиль CPU собирается
      только по явному запросу и добавляет заметный оверхед — конкретные
      цифры нужно замерять для конкретного приложения, а не полагаться на
      общее правило.
  - level: deep
    text_md: |
      Семплирующий профайлер сохраняет не каждое событие, а каждое N-ное —
      в случае CPU-профайлера это значит, что стектрейсы собираются с
      сэмплированием (через определённые интервалы, а не при каждом вызове
      функции), что и объясняет разницу в скорости снятия разных профилей:
      профиль по heap/alloc собирается практически мгновенно, потому что
      рантайм и так постоянно ведёт эту статистику по мере аллокаций, а вот
      CPU-профиль нужно собирать какое-то время (например, 30 секунд),
      чтобы набрать статистически значимое число сэмплов стека вызовов.

      `trace` — отдельный от обычных профилей инструмент, который
      предоставляет намного более подробную информацию о выполнении
      приложения: создание/блокировка/разблокировка горутин, системные
      вызовы, работа сборщика мусора, размер `heap`'а, количество потоков и
      горутин во времени. Именно из-за такой детализации `trace` добавляет
      больше оверхеда, чем остальные профили, и его обычно снимают точечно,
      на короткий период, а не постоянно в проде. На самом продвинутом
      уровне ожидается понимание внутреннего устройства сборки мусора Go
      (например, трёхцветный concurrent mark-and-sweep с write barrier —
      см. отдельный вопрос про garbage collection).
