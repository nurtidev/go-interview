slug: top-authors
kind: sql
title: "Top authors by post count"
difficulty: middle
tags: [group-by, aggregation]
statement_md: |
  Return each author name and how many posts they wrote, ordered by name.
starter_code: |
  SELECT name, COUNT(*) AS total
  FROM authors a
  JOIN posts p ON p.author_id = a.id
  GROUP BY a.id
  ORDER BY name;
hints:
  - "JOIN authors and posts."
  - "GROUP BY the author."
solution_md: |
  ```sql
  SELECT a.name, COUNT(*) AS total
  FROM authors a
  JOIN posts p ON p.author_id = a.id
  GROUP BY a.id
  ORDER BY a.name;
  ```
schema_sql: |
  CREATE TABLE authors (id INTEGER PRIMARY KEY, name TEXT);
  CREATE TABLE posts (id INTEGER PRIMARY KEY, author_id INTEGER);
seed_sql: |
  INSERT INTO authors (id, name) VALUES (1, 'Alice'), (2, 'Bob');
  INSERT INTO posts (id, author_id) VALUES (1, 1), (2, 1), (3, 1), (4, 2);
expected:
  columns: [name, total]
  rows:
    - ["Alice", 3]
    - ["Bob", 1]
  order_matters: true
