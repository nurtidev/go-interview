slug: sum-slice
kind: go
title: "Sum a slice"
difficulty: middle
tags: [slices, basics]
statement_md: |
  Implement `Sum` that returns the sum of all ints in the slice.
starter_code: |
  package main

  func Sum(xs []int) int {
      return 0
  }

  func main() {}
hints:
  - "Iterate with range."
  - "Accumulate into a total."
solution_md: |
  ```go
  func Sum(xs []int) int {
      total := 0
      for _, x := range xs {
          total += x
      }
      return total
  }
  ```
time_limit_sec: 5
race: false
test_code: |
  package main

  import "testing"

  func TestSum(t *testing.T) {
      if got := Sum([]int{1, 2, 3}); got != 6 {
          t.Fatalf("Sum = %d, want 6", got)
      }
  }
