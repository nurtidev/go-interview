slug: running-total-window
kind: sql
title: "Нарастающий итог по дням"
difficulty: senior
tags: [window-function, running-total, order-by]
statement_md: |
  Есть таблица дневной выручки `daily_sales` со столбцами `day` (дата в формате
  `YYYY-MM-DD`) и `amount` (выручка за день). Посчитайте **нарастающий итог**
  (running total) выручки по дням.

  Верните три столбца: `day`, `amount` и `running_total` — сумму `amount` от
  самого раннего дня включительно до текущего. Отсортируйте по `day` по
  возрастанию. Считайте, что даты уникальны.
starter_code: |
  -- Верните day, amount и нарастающий итог running_total, отсортированный по day.
  SELECT ...
hints:
  - "Нарастающий итог — это сумма всех строк от начала до текущей включительно. Обычный GROUP BY так не умеет: он схлопывает строки, а нам нужно сохранить каждую строку и добавить к ней накопленную сумму."
  - "Нужна оконная функция: агрегат, вычисляемый по 'окну' строк без их схлопывания. Синтаксис — SUM(amount) OVER (...)."
  - "Добавьте в окно упорядочивание: SUM(amount) OVER (ORDER BY day). С ORDER BY внутри OVER рамка по умолчанию — от начала до текущей строки, что и даёт нарастающий итог."
solution_md: |
  ### Идея

  Нарастающий итог сохраняет каждую исходную строку и добавляет к ней накопленную
  сумму — для этого нужна оконная функция, а не `GROUP BY`. Запись
  `SUM(amount) OVER (ORDER BY day)` вычисляет сумму по «окну» строк: при наличии
  `ORDER BY` внутри `OVER` рамка по умолчанию — `RANGE BETWEEN UNBOUNDED
  PRECEDING AND CURRENT ROW`, то есть от первой строки до текущей включительно.

  ### Эталонный запрос

  ```sql
  SELECT day,
         amount,
         SUM(amount) OVER (ORDER BY day) AS running_total
  FROM daily_sales
  ORDER BY day;
  ```

  ### Типичные ошибки на интервью

  - Использовать `GROUP BY day` — строки схлопнутся, накопленной суммы не получится.
  - Забыть `ORDER BY` внутри `OVER (...)` — тогда сумма считается по всему набору и в каждой строке будет одинаковый итог.
  - Полагаться на неявный порядок вывода — оконное упорядочивание не гарантирует порядок строк результата, поэтому нужен внешний `ORDER BY day`.
  - При неуникальных датах помнить о разнице `RANGE` и `ROWS`: `RANGE` суммирует все строки с равным `day` в один шаг (здесь даты уникальны, поэтому не важно).
schema_sql: |
  CREATE TABLE daily_sales (
    day    TEXT NOT NULL,
    amount INTEGER NOT NULL
  );
