slug: concurrent-metrics-counter
kind: go
title: "Конкурентный счётчик метрик"
difficulty: senior
tags: [atomic, concurrency, metrics]
statement_md: |
  Реализуйте потокобезопасный набор именованных счётчиков (запросы, ошибки,
  байты). Инкремент вызывается из тысяч горутин, поэтому горячий путь должен
  обходиться без блокировки всей структуры.

  ```go
  func NewMetrics() *Metrics
  func (m *Metrics) Inc(name string)
  func (m *Metrics) Add(name string, delta int64)
  func (m *Metrics) Get(name string) int64
  func (m *Metrics) Snapshot() map[string]int64
  ```

  Требования:

  - `Inc`/`Add` атомарно меняют счётчик; при первом обращении к имени счётчик
    создаётся.
  - `Get` возвращает текущее значение (`0`, если счётчика нет).
  - `Snapshot` отдаёт согласованный снимок всех счётчиков в новый map.
  - Ни одно обновление не теряется при конкурентном доступе (проверяется под
    `-race`).
