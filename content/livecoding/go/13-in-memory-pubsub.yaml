slug: in-memory-pubsub
kind: go
title: "In-memory Pub/Sub"
difficulty: senior
tags: [pubsub, channels, concurrency]
statement_md: |
  Реализуйте внутреннюю шину событий: одни части сервиса публикуют сообщения по
  топикам, другие подписываются. Медленный подписчик не должен блокировать
  доставку остальным.

  ```go
  func NewPubSub(buffer int) *PubSub
  func (ps *PubSub) Subscribe(topic string) <-chan string
  func (ps *PubSub) Publish(topic, msg string)
  func (ps *PubSub) Unsubscribe(topic string, ch <-chan string)
  func (ps *PubSub) Close()
  ```

  Требования:

  - `Subscribe` возвращает канал (с буфером `buffer`), в который приходят сообщения
    топика.
  - `Publish` рассылает сообщение всем подписчикам топика и **не блокируется** на
    медленном подписчике: если его буфер полон — сообщение для него дропается.
  - `Unsubscribe` удаляет подписчика и закрывает его канал.
  - `Close` закрывает все каналы; после него `Subscribe` отдаёт уже закрытый канал.
  - Безопасен при конкурентных Publish/Subscribe/Unsubscribe (проверяется под
    `-race`).
