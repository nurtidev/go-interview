hints:
  - "Пока интервалы идут в произвольном порядке, пересечения искать тяжело. Что если сначала их упорядочить?"
  - "Отсортируйте интервалы по левой границе (sort.Slice). После этого достаточно одного прохода: сравнивайте текущий интервал с последним добавленным в результат."
  - "Если начало текущего интервала <= конца последнего в результате — они пересекаются, расширьте конец последнего до max(last.end, cur.end). Иначе добавьте текущий как новый интервал."
solution_md: |
  ### Идея

  После сортировки по левой границе пересекающиеся интервалы стоят рядом.
  Идём слева направо и держим последний интервал результата. Если начало
  очередного интервала не больше конца последнего — они пересекаются (или
  касаются), поэтому просто расширяем конец последнего до максимума из двух
  концов. Иначе интервал не пересекается с предыдущими — добавляем его как
  новый.

  ### Эталонное решение

  ```go
  import "sort"

  func MergeIntervals(intervals [][]int) [][]int {
      if len(intervals) == 0 {
          return [][]int{}
      }
      sort.Slice(intervals, func(i, j int) bool {
          return intervals[i][0] < intervals[j][0]
      })
      res := [][]int{{intervals[0][0], intervals[0][1]}}
      for _, in := range intervals[1:] {
          last := res[len(res)-1]
          if in[0] <= last[1] {
              if in[1] > last[1] {
                  last[1] = in[1]
              }
          } else {
              res = append(res, []int{in[0], in[1]})
          }
      }
      return res
  }
  ```

  Сложность: время `O(n log n)` из-за сортировки, память `O(n)` на результат.

  ### Типичные ошибки на интервью

  - Возвращать `nil` вместо пустого непустого слайса на пустом входе (провал по сравнению с `[][]int{}`).
  - Забыть про касание границ (`<` вместо `<=`) — интервалы `[1,4]` и `[4,5]` не сольются.
  - При слиянии писать `last[1] = in[1]` без `max` — можно укоротить интервал, если вложенный `in` короче.
  - Модифицировать `last` как копию, а не как элемент результата (в Go элемент `res[i]` — слайс, ссылается на общий массив, поэтому здесь мутация работает).
time_limit_sec: 10
race: false
test_code: |
  package main

  import (
      "reflect"
      "testing"
  )

  func TestMergeIntervals(t *testing.T) {
      cases := []struct {
          name string
          in   [][]int
          want [][]int
      }{
          {"empty", [][]int{}, [][]int{}},
          {"single", [][]int{{1, 4}}, [][]int{{1, 4}}},
          {"overlap", [][]int{{1, 3}, {2, 6}, {8, 10}, {15, 18}}, [][]int{{1, 6}, {8, 10}, {15, 18}}},
          {"touching", [][]int{{1, 4}, {4, 5}}, [][]int{{1, 5}}},
          {"unsorted", [][]int{{8, 10}, {1, 3}, {2, 6}, {15, 18}}, [][]int{{1, 6}, {8, 10}, {15, 18}}},
          {"contained", [][]int{{1, 10}, {2, 3}, {4, 5}}, [][]int{{1, 10}}},
          {"no overlap", [][]int{{1, 2}, {3, 4}, {5, 6}}, [][]int{{1, 2}, {3, 4}, {5, 6}}},
          {"duplicates", [][]int{{1, 4}, {1, 4}}, [][]int{{1, 4}}},
      }
      for _, tc := range cases {
          t.Run(tc.name, func(t *testing.T) {
              got := MergeIntervals(tc.in)
              if !reflect.DeepEqual(got, tc.want) {
                  t.Fatalf("MergeIntervals(%v) = %v, want %v", tc.in, got, tc.want)
              }
          })
      }
  }
