slug: merge-intervals
kind: go
title: "Merge Intervals"
difficulty: middle
tags: [intervals, sorting]
statement_md: |
  Дан набор интервалов `intervals`, где `intervals[i] = []int{start, end}`.
  Объедините все пересекающиеся интервалы и верните список непересекающихся
  интервалов, покрывающих те же точки. Результат должен быть отсортирован по
  левой границе.

  Два интервала считаются пересекающимися и в случае касания: `[1,4]` и `[4,5]`
  дают `[1,5]`.

  Сигнатура:

  ```go
  func MergeIntervals(intervals [][]int) [][]int
  ```

  Примеры:

  - `MergeIntervals([[1,3],[2,6],[8,10],[15,18]])` → `[[1,6],[8,10],[15,18]]`
  - `MergeIntervals([[1,4],[4,5]])` → `[[1,5]]`
  - `MergeIntervals([])` → `[]`

  Ограничения: `0 <= len(intervals) <= 10^4`, `start <= end`. Порядок входных
  интервалов произвольный.
