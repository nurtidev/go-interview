slug: merge-channels
kind: go
title: "Merge Channels (fan-in)"
difficulty: staff
tags: [concurrency, channels, fan-in]
statement_md: |
  Реализуйте fan-in: функцию, которая сливает значения из нескольких входных
  каналов в один выходной.

  ```go
  func Merge(chs ...<-chan int) <-chan int
  ```

  Требования:

  - Все значения из всех входных каналов должны попасть в выходной канал
    (ничего не теряется и не дублируется).
  - Выходной канал должен быть **закрыт** ровно после того, как закрыты все
    входные каналы и переданы все значения. Иначе потребитель, читающий через
    `for v := range out`, зависнет навсегда.
  - Порядок значений в выходном канале не важен.
  - `Merge()` без аргументов возвращает немедленно закрытый канал.

  Решение проверяется под `-race`.
