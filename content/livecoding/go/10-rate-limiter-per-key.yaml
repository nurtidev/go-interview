slug: rate-limiter-per-key
kind: go
title: "Rate limiter по ключу (скользящее окно)"
difficulty: senior
tags: [rate-limiter, sliding-window, concurrency]
statement_md: |
  Реализуйте потокобезопасный ограничитель частоты с **отдельным лимитом на
  каждый ключ** (например, per-IP или per-API-token). Алгоритм — скользящее окно:
  за любой промежуток длиной `window` для одного ключа допускается не более
  `limit` запросов.

  ```go
  func NewSlidingWindowLimiter(limit int, window time.Duration) *SlidingWindowLimiter
  func (l *SlidingWindowLimiter) Allow(key string, now time.Time) bool
  ```

  Требования:

  - `Allow(key, now)` возвращает `true`, если с учётом уже пропущенных запросов в
    окне `(now-window, now]` лимит для `key` не превышен, и «занимает» слот; иначе
    `false`.
  - Разные ключи независимы.
  - Время подаётся параметром `now` (удобно тестировать без `time.Sleep`).
  - Вызовы конкурентны (проверяется под `-race`).

  Постановка отличается от классического token bucket: здесь именно журнал отметок
  времени в скользящем окне, отдельный для каждого ключа.
