slug: ring-buffer
kind: go
title: "Ring Buffer (кольцевой буфер)"
difficulty: middle
tags: [ring-buffer, data-structures, concurrency]
statement_md: |
  Реализуйте потокобезопасный кольцевой буфер фиксированной ёмкости, который
  хранит последние `size` добавленных элементов. Такой буфер держат, чтобы иметь
  «хвост» последних событий (например, N последних записей перед сбоем).

  ```go
  func NewRingBuffer[T any](size int) *RingBuffer[T]
  func (r *RingBuffer[T]) Push(v T)      // добавить элемент
  func (r *RingBuffer[T]) Snapshot() []T // копия элементов от старого к новому
  func (r *RingBuffer[T]) Len() int      // текущее число элементов
  ```

  Требования:

  - `Push` при заполненном буфере перезаписывает самый старый элемент.
  - `Snapshot` возвращает **новый** слайс с элементами в порядке от старого к
    новому; на пустом буфере — пустой слайс.
  - Методы вызываются из нескольких горутин одновременно, доступ к внутреннему
    состоянию должен быть безопасным (проверяется под `-race`).

  Пример: в буфер ёмкости 5 кладём 1..8 → `Snapshot()` вернёт `[4 5 6 7 8]`.
