hints:
  - "Chain — это сворачивание списка: чтобы первый middleware оказался снаружи, применяйте их с конца к началу (for i := len-1; i >= 0; i--)."
  - "http.ResponseWriter не отдаёт записанный статус обратно. Заведите обёртку над ним, которая перехватывает WriteHeader(code) и запоминает код; по умолчанию считайте статус 200."
  - "Неявный 200 возникает, когда хендлер сразу пишет тело без WriteHeader. Перехватите и первый Write: если статус ещё не зафиксирован — это 200. Для request id используйте типизированный ключ контекста, чтобы избежать коллизий."
solution_md: |
  ### Идея

  `Chain` компонует функции `func(http.Handler) http.Handler`. Чтобы первый
  переданный middleware выполнялся первым (был внешней обёрткой), сворачиваем
  список с конца: `Chain(h, a, b, c)` даёт `a(b(c(h)))`.

  `RequestID` читает входящий `X-Request-ID`, при отсутствии генерирует новый
  (16 случайных байт в hex), проставляет его в заголовок ответа и в контекст
  через типизированный ключ (`contextKey`) — так значение не столкнётся с ключами
  других пакетов.

  Статус-код перехватываем обёрткой над `ResponseWriter`: стандартный writer не
  возвращает код наружу, поэтому переопределяем `WriteHeader` (запоминаем код) и
  `Write` (первый вызов без явного `WriteHeader` означает статус `200`). Флаг
  `written` защищает от повторной фиксации.

  ### Эталонное решение

  ```go
  import (
      "context"
      "crypto/rand"
      "encoding/hex"
      "net/http"
  )

  type Middleware func(http.Handler) http.Handler

  // Chain(h, a, b, c) => a(b(c(h))): первый middleware оборачивает снаружи и
  // выполняется первым.
  func Chain(h http.Handler, mws ...Middleware) http.Handler {
      for i := len(mws) - 1; i >= 0; i-- {
          h = mws[i](h)
      }
      return h
  }

  type contextKey string

  const RequestIDKey contextKey = "request_id"

  func newRequestID() string {
      b := make([]byte, 16)
      _, _ = rand.Read(b)
      return hex.EncodeToString(b)
  }

  // RequestID переиспользует входящий X-Request-ID или генерирует новый,
  // кладёт его в контекст и в заголовок ответа.
  func RequestID() Middleware {
      return func(next http.Handler) http.Handler {
          return http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {
              id := r.Header.Get("X-Request-ID")
              if id == "" {
                  id = newRequestID()
              }
              w.Header().Set("X-Request-ID", id)
              ctx := context.WithValue(r.Context(), RequestIDKey, id)
              next.ServeHTTP(w, r.WithContext(ctx))
          })
      }
  }

  type statusRecorder struct {
      http.ResponseWriter
      status  int
      written bool
  }

  func (s *statusRecorder) WriteHeader(code int) {
      if !s.written {
          s.status = code
          s.written = true
      }
      s.ResponseWriter.WriteHeader(code)
  }

  func (s *statusRecorder) Write(b []byte) (int, error) {
      if !s.written {
          s.status = http.StatusOK
          s.written = true
      }
      return s.ResponseWriter.Write(b)
  }

  // CaptureStatus записывает итоговый статус-код ответа в *out, учитывая
  // неявный 200, когда обработчик не вызвал WriteHeader.
  func CaptureStatus(out *int) Middleware {
      return func(next http.Handler) http.Handler {
          return http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {
              rec := &statusRecorder{ResponseWriter: w, status: http.StatusOK}
              next.ServeHTTP(rec, r)
              *out = rec.status
          })
      }
  }
  ```

  Сложность: Оверхед на запрос — `O(число middleware)`; дополнительная память — обёртка над `ResponseWriter`.

  ### Типичные ошибки на интервью

  - Сворачивать middleware в прямом порядке — тогда «первый» окажется ближе всех к хендлеру, а не снаружи.
  - Считать статус только по WriteHeader и потерять неявный 200, когда хендлер сразу пишет тело.
  - Класть значения в контекст по строковому ключу — риск коллизии с другими пакетами; нужен собственный тип ключа.
  - Мутировать исходный *http.Request вместо r.WithContext(...).
time_limit_sec: 15
race: false
test_code: |
  package main

  import (
      "net/http"
      "net/http/httptest"
      "testing"
  )

  func tag(order *[]string, name string) Middleware {
      return func(next http.Handler) http.Handler {
          return http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {
              *order = append(*order, name)
              next.ServeHTTP(w, r)
          })
      }
  }

  func TestChainOrder(t *testing.T) {
      var order []string
      h := Chain(
          http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {
              order = append(order, "handler")
          }),
          tag(&order, "a"),
          tag(&order, "b"),
          tag(&order, "c"),
      )
      h.ServeHTTP(httptest.NewRecorder(), httptest.NewRequest(http.MethodGet, "/", nil))

      want := []string{"a", "b", "c", "handler"}
      if len(order) != len(want) {
          t.Fatalf("order = %v, want %v", order, want)
      }
      for i := range want {
          if order[i] != want[i] {
              t.Fatalf("order = %v, want %v", order, want)
          }
      }
  }

  func TestCaptureStatusExplicit(t *testing.T) {
      var status int
      h := Chain(
          http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {
              http.Error(w, "nope", http.StatusNotFound)
          }),
          CaptureStatus(&status),
      )
      rr := httptest.NewRecorder()
      h.ServeHTTP(rr, httptest.NewRequest(http.MethodGet, "/", nil))
      if status != http.StatusNotFound {
          t.Fatalf("captured status = %d, want %d", status, http.StatusNotFound)
      }
  }

  func TestCaptureStatusImplicitOK(t *testing.T) {
      var status int
      h := Chain(
          http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {
              _, _ = w.Write([]byte("ok")) // без явного WriteHeader => 200
          }),
          CaptureStatus(&status),
      )
      rr := httptest.NewRecorder()
      h.ServeHTTP(rr, httptest.NewRequest(http.MethodGet, "/", nil))
      if status != http.StatusOK {
          t.Fatalf("captured status = %d, want %d", status, http.StatusOK)
      }
  }

  func TestRequestIDGenerated(t *testing.T) {
      var seen string
      h := Chain(
          http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {
              if v, ok := r.Context().Value(RequestIDKey).(string); ok {
                  seen = v
              }
          }),
          RequestID(),
      )
      rr := httptest.NewRecorder()
      h.ServeHTTP(rr, httptest.NewRequest(http.MethodGet, "/", nil))
      if seen == "" {
          t.Fatalf("request id not present in context")
      }
      if got := rr.Header().Get("X-Request-ID"); got != seen {
          t.Fatalf("response header X-Request-ID = %q, want %q", got, seen)
      }
  }

  func TestRequestIDPreservesIncoming(t *testing.T) {
      var seen string
      h := Chain(
          http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {
              seen, _ = r.Context().Value(RequestIDKey).(string)
          }),
          RequestID(),
      )
      req := httptest.NewRequest(http.MethodGet, "/", nil)
      req.Header.Set("X-Request-ID", "incoming-123")
      rr := httptest.NewRecorder()
      h.ServeHTTP(rr, req)
      if seen != "incoming-123" {
          t.Fatalf("context request id = %q, want incoming-123", seen)
      }
      if got := rr.Header().Get("X-Request-ID"); got != "incoming-123" {
          t.Fatalf("response header = %q, want incoming-123", got)
      }
  }
