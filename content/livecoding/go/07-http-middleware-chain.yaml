slug: http-middleware-chain
kind: go
title: "Цепочка HTTP middleware"
difficulty: middle
tags: [http, middleware, composition]
statement_md: |
  Реализуйте компоновку HTTP middleware и два middleware поверх `net/http`.

  ```go
  type Middleware func(http.Handler) http.Handler

  func Chain(h http.Handler, mws ...Middleware) http.Handler
  func RequestID() Middleware
  func CaptureStatus(out *int) Middleware
  ```

  Требования:

  - `Chain(h, a, b, c)` возвращает обработчик, где `a` — самый внешний и
    выполняется первым: порядок обёрток `a → b → c → h`.
  - `RequestID`: если во входящем запросе есть заголовок `X-Request-ID` —
    переиспользует его, иначе генерирует новый идентификатор; кладёт значение в
    `context` запроса под ключ `RequestIDKey` и в заголовок ответа `X-Request-ID`.
  - `CaptureStatus(out)`: после обработки записывает в `*out` итоговый статус-код
    ответа, включая **неявный** `200`, когда хендлер не звал `WriteHeader`.

  Разрешена только стандартная библиотека.
