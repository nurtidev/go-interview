slug: idempotent-payment-handler
kind: go
title: "Идемпотентный обработчик платежа"
difficulty: staff
tags: [idempotency, concurrency, fintech, singleflight]
statement_md: |
  Клиент может повторить запрос на оплату при сетевой ошибке. Реализуйте
  обработчик, который по ключу идемпотентности выполняет платёж **ровно один
  раз**, даже если несколько запросов с одним ключом пришли одновременно.

  ```go
  type PaymentResult struct {
      TransactionID string
      Status        string
  }

  func NewPaymentProcessor(charge func(key string, amount int64) (PaymentResult, error)) *PaymentProcessor
  func (p *PaymentProcessor) Pay(idempotencyKey string, amount int64) (PaymentResult, error)
  ```

  Требования:

  - Для одного `idempotencyKey` «дорогая» операция `charge` (списание у внешнего
    провайдера) вызывается **не более одного раза**.
  - Конкурентные дубликаты с тем же ключом ждут результат «лидера» и получают тот
    же `PaymentResult`.
  - Успешный результат кэшируется: последующие вызовы с тем же ключом возвращают
    его, не вызывая `charge`.
  - Ошибка **не кэшируется**: повторный запрос после ошибки пробует `charge`
    заново (сбои платежа должны быть повторяемы).
  - Безопасен при конкурентных вызовах (проверяется под `-race`).

  Хранилище здесь in-memory; в проде это была бы БД/Redis, а `charge` — вызов
  платёжного провайдера.
