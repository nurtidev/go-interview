slug: circuit-breaker
kind: go
title: "Circuit Breaker"
difficulty: senior
tags: [circuit-breaker, resilience, state-machine]
statement_md: |
  Внешняя зависимость периодически падает. Реализуйте Circuit Breaker, чтобы не
  ждать таймаут на каждом вызове, а быстро отдавать ошибку, пока сервис лежит.

  Состояния:

  - `Closed` — пропускаем вызовы, считаем подряд идущие ошибки.
  - `Open` — сразу возвращаем `ErrCircuitOpen` (fast fail), не вызывая функцию.
  - `HalfOpen` — по истечении `resetTimeout` пропускаем один пробный вызов.

  ```go
  func NewCircuitBreaker(maxFailures int, resetTimeout time.Duration) *CircuitBreaker
  func (cb *CircuitBreaker) Execute(fn func() error) error
  func (cb *CircuitBreaker) State() State  // StateClosed | StateOpen | StateHalfOpen
  ```

  Требования:

  - После `maxFailures` подряд ошибок цепь размыкается (`Open`).
  - В `Open` вызовы не доходят до `fn`, возвращается `ErrCircuitOpen`.
  - Через `resetTimeout` брейкер переходит в `HalfOpen` и пропускает один пробный
    вызов: успех → `Closed`, ошибка → снова `Open`.
  - Безопасен при конкурентных вызовах (проверяется под `-race`).
