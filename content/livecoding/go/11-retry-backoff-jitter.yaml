slug: retry-backoff-jitter
kind: go
title: "Retry с экспоненциальным backoff и джиттером"
difficulty: senior
tags: [retry, backoff, resilience]
statement_md: |
  Реализуйте обёртку с повторами для ненадёжного вызова (например, внешнего
  платёжного провайдера). Повторы не должны «добивать» деградировавший сервис.

  ```go
  type RetryableFunc func(ctx context.Context) error

  type NonRetryableError struct{ Err error }
  func (e *NonRetryableError) Error() string { return e.Err.Error() }
  func (e *NonRetryableError) Unwrap() error { return e.Err }

  func Retry(ctx context.Context, maxAttempts int, baseDelay time.Duration, fn RetryableFunc) error
  ```

  Требования:

  - Не более `maxAttempts` попыток; при первом успехе — сразу `nil`.
  - Задержка между попытками растёт экспоненциально: `baseDelay`, `2*baseDelay`,
    `4*baseDelay`, … c джиттером ±20 %, чтобы избежать thundering herd.
  - Если ошибка — `*NonRetryableError` (бизнес-ошибка), повтор не делается.
  - Ожидание между попытками прерывается при отмене `ctx`.
  - После исчерпания попыток возвращается последняя ошибка, обёрнутая так, чтобы
    работал `errors.Is/As`.
