slug: worker-pool-limits
kind: go
title: "Worker Pool с ограничением параллелизма"
difficulty: senior
tags: [concurrency, goroutines, channels]
statement_md: |
  Реализуйте пул воркеров, который выполняет набор задач с ограничением на число
  одновременно работающих горутин и возвращает результаты **в том же порядке**,
  что и входные задачи.

  ```go
  func RunPool(jobs []func() int, workers int) []int
  ```

  Требования:

  - Каждая задача `jobs[i]` вызывается ровно один раз; её результат кладётся в
    `result[i]` (порядок результатов совпадает с порядком задач, независимо от
    того, какой воркер и когда её выполнил).
  - Одновременно должно работать не более `workers` горутин.
  - Функция блокируется до завершения всех задач и возвращает слайс длины
    `len(jobs)`.
  - Считайте `workers >= 1`; на пустом входе верните пустой (ненулевой длины 0)
    слайс.

  Решение проверяется под `-race`, поэтому доступ к общим данным должен быть
  корректным.
