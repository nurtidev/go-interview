slug: lru-cache
kind: go
title: "LRU Cache"
difficulty: senior
tags: [cache, hashmap, linked-list]
statement_md: |
  Реализуйте кэш с вытеснением по правилу Least Recently Used (LRU) фиксированной
  ёмкости. Обе операции должны работать за `O(1)` в среднем.

  Нужны:

  ```go
  func Constructor(capacity int) LRUCache
  func (c *LRUCache) Get(key int) int      // значение по ключу или -1, если ключа нет
  func (c *LRUCache) Put(key, value int)   // вставка/обновление; при переполнении вытесняет LRU
  ```

  Правила:

  - `Get` по существующему ключу возвращает значение и делает ключ самым свежим.
  - `Put` вставляет новую пару или обновляет значение существующего ключа
    (обновление тоже делает ключ самым свежим).
  - Если после вставки нового ключа размер превысит `capacity`, вытесняется
    ключ, к которому дольше всего не обращались.

  Пример: для `Constructor(2)` последовательность
  `Put(1,1); Put(2,2); Get(1)->1; Put(3,3) // вытесняет 2; Get(2)->-1`.
