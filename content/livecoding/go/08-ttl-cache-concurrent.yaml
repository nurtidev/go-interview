slug: ttl-cache-concurrent
kind: go
title: "TTL-кэш с конкурентным доступом"
difficulty: senior
tags: [cache, ttl, concurrency, generics]
statement_md: |
  Реализуйте потокобезопасный in-memory кэш, где каждая запись живёт заданное
  время (TTL) и после истечения не возвращается. Такой кэш нужен, например, для
  результатов резолвинга или ответов внешнего API.

  ```go
  func NewTTLCache[K comparable, V any](cleanupInterval time.Duration) *TTLCache[K, V]
  func (c *TTLCache[K, V]) Set(key K, value V, ttl time.Duration)
  func (c *TTLCache[K, V]) Get(key K) (V, bool)
  func (c *TTLCache[K, V]) Delete(key K)
  func (c *TTLCache[K, V]) Len() int
  func (c *TTLCache[K, V]) Stop()
  ```

  Требования:

  - `Get` возвращает `(value, true)`, только если ключ есть и не истёк; иначе
    `(zero, false)`.
  - `Set` перезаписывает значение и продлевает срок жизни.
  - При `cleanupInterval > 0` запускается фоновая горутина, периодически удаляющая
    истёкшие записи; `Stop` её останавливает (повторный вызов безопасен).
  - Все методы вызываются конкурентно (проверяется под `-race`).
