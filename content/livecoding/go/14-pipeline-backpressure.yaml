slug: pipeline-backpressure
kind: go
title: "Pipeline с backpressure"
difficulty: staff
tags: [pipeline, backpressure, channels, context]
statement_md: |
  Реализуйте двухэтапный конвейер: этап-продюсер трансформирует входные значения,
  этап-потребитель их принимает. Если потребитель медленный, продюсер должен
  замедлиться (backpressure), а не копить результаты в неограниченной памяти.

  ```go
  type Stage func(ctx context.Context, in int) (int, error)

  func RunPipeline(ctx context.Context, inputs []int, buffer int,
      transform Stage, consume func(int) error) error
  ```

  Требования:

  - Каждый вход проходит `transform`, результат передаётся в `consume` в исходном
    порядке.
  - Между этапами — канал ёмкости `buffer`: при медленном `consume` продюсер
    блокируется на отправке (backpressure), а не уходит в отрыв.
  - Первая же ошибка `transform` или `consume` останавливает конвейер и
    возвращается наружу; при отмене `ctx` возвращается его ошибка.
  - Этапы работают конкурентно; горутины не текут (проверяется под `-race`).
