  Fan-in (merge) собирает несколько каналов в один. Классика — `sync.WaitGroup`: на каждый вход по горутине, копирующей его в общий `out`, и отдельная горутина, закрывающая `out` после `wg.Wait()`.

  ```go
  func merge(cs ...<-chan int) <-chan int {
      out := make(chan int)
      var wg sync.WaitGroup
      wg.Add(len(cs))
      for _, c := range cs {
          go func(c <-chan int) {
              defer wg.Done()
              for v := range c {
                  out <- v
              }
          }(c)
      }
      go func() { wg.Wait(); close(out) }()
      return out
  }
  ```

  На практике fan-out редко делают неограниченным: N выбирают по числу ядер или по внешнему лимиту (например, числу соединений к БД), иначе тысячи горутин задавят планировщик и downstream-стадию. Это уже worker pool — тот же fan-out, но с фиксированным N и, часто, буферизованным входным каналом-очередью.

  ## Отмена через закрытие done

  Проблема: если потребитель ушёл раньше (нашёл ответ, случилась ошибка), стадии-писатели зависнут на `out <- v`, потому что читателя больше нет, — и горутины утекут. Решение — общий сигнал отмены: канал `done` (или `ctx.Done()`), который закрывают один раз, а все стадии слушают в `select`.

  <svg viewBox="0 0 720 202" role="img" aria-label="Распространение отмены: закрытие канала done широковещательно будит все стадии, каждая выходит из select">
