  Так стадии соединяются в конвейер: `for r := range sq(gen(2, 3, 4)) { ... }`. Направленные типы (`<-chan`, `chan<-`) не дают случайно нарушить направление потока.

  ## Fan-out и fan-in

  Если стадия — узкое место, её распараллеливают: несколько воркеров читают из одного и того же входного канала (fan-out), а их выходы объединяют обратно в один (fan-in). Каналы Go делают fan-out тривиальным: N горутин, читающих из одного канала, сами разбирают элементы без явного локинга.

