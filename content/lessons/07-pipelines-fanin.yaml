title: "Конвейеры: pipeline, fan-out и fan-in"
minutes: 8
tags: [pipeline, fan-in, channels]
body_md: |
  ## Зачем это знать

  Конвейеры (pipelines) — любимая тема live-coding по конкурентности: «сделайте пайплайн из стадий», «распараллельте тяжёлую стадию», «смёржите N каналов в один», «не допустите утечки горутин при раннем выходе». За этими задачами стоят три кирпича — pipeline, fan-out и fan-in — плюс дисциплина владения каналами и распространения отмены. Разберём их так, чтобы на собеседовании вы не только написали рабочий merge, но и объяснили, кто закрывает каналы и почему горутины не текут.

  ## Pipeline из стадий

  Pipeline — цепочка стадий, соединённых каналами. Каждая стадия читает из входного канала, обрабатывает элемент, пишет в выходной. Первая стадия — generator, у неё нет входа, только выход. Правило владения: канал закрывает тот, кто в него пишет, — обычно через `defer close(out)`.

  ```go
  func gen(nums ...int) <-chan int {
      out := make(chan int)
      go func() {
          defer close(out)
          for _, n := range nums {
              out <- n
          }
      }()
      return out
  }

  func sq(in <-chan int) <-chan int {
      out := make(chan int)
      go func() {
          defer close(out)
          for n := range in {
              out <- n * n
          }
      }()
      return out
  }
  ```

