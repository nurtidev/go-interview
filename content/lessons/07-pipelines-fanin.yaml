      <rect x="486" y="110" width="210" height="56" rx="6" fill="#E6F2F3" stroke="#0D7680"/>
      <text x="591" y="143" text-anchor="middle">select: out&lt;-v | &lt;-done</text>
    </g>
    <text x="30" y="192" font-family="system-ui, sans-serif" font-size="13" fill="#757575">close(done) будит всех читателей разом → каждая стадия выходит из select</text>
  </svg>

  Закрытый канал немедленно разблокирует всех, кто из него читает, — это и есть широковещательный сигнал «стоп». Каждая стадия оборачивает отправку в `select`:

  ```go
  select {
  case out <- v:
  case <-done:
      return       // отмена — выходим, не блокируясь
  }
  ```

  С `context` тот же приём: `ctx.Done()` вместо `done`, а отмену инициирует `cancel()`. Важно вызвать `cancel()` (обычно `defer cancel()`) даже на успешном пути, иначе контекст и его горутины подтекут.

  ## Типичные заблуждения

  - «Каналы закрывает получатель» — нет, закрывает писатель или владелец; закрыть канал со стороны читателя или дважды — паника.
  - «Достаточно запустить горутины, они сами завершатся» — нет: писатель без читателя блокируется навсегда, это и есть утечка; нужен `done`/`ctx`.
  - «Fan-out требует мьютексов» — нет, конкурентное чтение из одного канала безопасно, распределение делает рантайм.
  - «`merge` можно закрыть просто `close(out)` в конце» — только после `wg.Wait()` из отдельной горутины; иначе закроете, пока кто-то ещё пишет (паника).
  - «`context` можно не отменять на success» — нужно всегда `defer cancel()`, иначе утечка.

  ## Что отвечать на собеседовании

  - Pipeline — стадии, соединённые каналами; писатель владеет выходным каналом и закрывает его через `defer close(out)`.
  - Fan-out — N воркеров на один вход (без локов), fan-in — merge выходов через `WaitGroup` + закрытие `out` после `Wait`.
  - Отмену пробрасывают закрытием `done`/`ctx.Done()`: закрытый канал будит всех читателей разом; отправку всегда оборачивают в `select` с `<-done`.
  - Против утечек: на каждый `out <- v` — ветка отмены в `select`, и обязательный `defer cancel()` для `context`.
