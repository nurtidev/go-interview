  ## Блокировка на пустом канале

  Что происходит, когда горутина читает из пустого канала, а отправителя нет? Она не крутится в цикле и не жжёт CPU — она **паркуется**. Рантайм создаёт для неё `sudog`, ставит его в `recvq`, вызывает `gopark`, и планировщик снимает горутину с потока, отдавая M другой работе. Когда придёт отправитель, он найдёт этот sudog, положит значение и вызовет `goready` — горутина вернётся в очередь готовых.

  <svg viewBox="0 0 720 190" role="img" aria-label="Блокировка на пустом канале: получатель встаёт в recvq и паркуется, позже отправитель кладёт значение и будит его">
