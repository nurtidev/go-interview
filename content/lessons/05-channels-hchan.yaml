  Каждая заблокированная горутина оборачивается в `sudog` — обёртку с указателем на саму G, на элемент данных и на соседа в очереди. Именно из sudog-ов складываются `sendq` и `recvq`.

  ## Отправка и приём: прямая передача

  Логика `ch <- v` в порядке приоритета:

  1. Если в `recvq` уже кто-то ждёт — данные копируются **напрямую в стек получателя**, минуя буфер, и получатель будится. Это `sendDirect`: быстрый путь без промежуточного копирования в кольцо.
  2. Иначе, если в буфере есть место — кладём в `buf[sendx]`, двигаем индекс.
  3. Иначе — заворачиваем горутину в `sudog`, ставим в `sendq` и паркуем (`gopark`).

  Приём `<-ch` симметричен. Прямая передача — важная деталь: для небуферизованного канала это единственный путь, поэтому он всегда синхронный, всегда точка рандеву двух горутин.

