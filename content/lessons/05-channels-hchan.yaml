  <marker id="s53" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
  <path d="M0 0 L10 5 L0 10 Z" fill="#0D7680"/>
  </marker>
  </defs>
