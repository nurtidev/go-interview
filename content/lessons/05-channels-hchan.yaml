topic: go-internals
title: "Каналы изнутри: hchan"
minutes: 8
tags: [channel, runtime, concurrency]
body_md: |
  ## Зачем это знать

  Каналы — это лицо конкурентности в Go, но на собеседовании их редко спрашивают «в лоб». Обычно копают глубже: почему небуферизованный канал синхронный, что физически происходит при `ch <- v`, почему запись в закрытый канал паникует, зачем каналу `nil` внутри `select`. За всеми этими вопросами стоит одна структура рантайма — `hchan`. Как только вы её представляете, каналы перестают быть магией: становится очевидно, где горутина блокируется, где копируются данные и какие happens-before гарантии вы получаете. Это же знание помогает отвечать на «канал или мьютекс?» — вопрос, который любят на senior/staff.

  ## Что такое hchan

  Канал в рантайме — это структура `hchan` под общим мьютексом. Её ключевые поля:

  - `buf` — кольцевой буфер под элементы (только у буферизованных каналов);
  - `qcount` — сколько элементов сейчас в буфере, `dataqsiz` — его ёмкость;
  - `sendx` / `recvx` — индексы записи и чтения в кольце;
  - `sendq` / `recvq` — две очереди заблокированных горутин;
  - `lock` — мьютекс, защищающий всю структуру.

