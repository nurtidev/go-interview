  <text x="360" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#757575">пока горутина спит, CPU не тратится — это не busy-wait</text>
  </svg>

  Закрытие `close(ch)` выставляет флаг `closed` под локом и будит **все** горутины из обеих очередей: получатели забирают нулевое значение и `ok=false`, а вот отправители из `sendq` — паникуют. Отсюда прод-правило: «канал закрывает только отправитель, и только один». Двойной `close` и `close(nil)` тоже паникуют. Отдельный случай — `nil`-канал: и отправка, и приём блокируются навсегда, что полезно в `select`, чтобы динамически «выключить» ветку, присвоив каналу `nil`.

  ## select и happens-before

  Та же механика sudog объясняет `select`. Когда горутина ждёт сразу на нескольких каналах, для каждого канала создаётся отдельный `sudog`, и они ставятся во все соответствующие очереди. Как только одна из операций становится готова, горутина будится, а остальные её sudog-и снимаются из очередей. Порядок проверки case-ов рандомизирован — это защита от голодания, чтобы один всегда-готовый канал не забивал остальные. Ветка `default` даёт неблокирующую попытку: если ни один канал не готов прямо сейчас, `select` не паркуется, а сразу идёт в `default`.

  Наконец, канал — это не только труба для данных, но и средство синхронизации памяти. Гарантии happens-before: отправка в канал happens-before завершения соответствующего приёма; для небуферизованного канала приём happens-before завершения отправки; а закрытие канала happens-before приёма нулевого значения, вызванного этим закрытием. Именно поэтому «передал данные через канал» автоматически означает «сделал их видимыми принимающей горутине» — без дополнительных мьютексов.

  ## Типичные заблуждения

  - **«Горутина на пустом канале крутится в цикле».** Нет, она паркуется и не потребляет CPU до пробуждения.
  - **«Данные всегда идут через буфер».** Нет: при готовом получателе работает прямая передача в его стек, минуя `buf`; у небуферизованного канала это единственный путь.
  - **«От записи в закрытый канал можно защититься проверкой `if !closed`».** Нет — между проверкой и записью канал может закрыться, это TOCTOU-гонка. Защита — единоличное владение отправителя и отдельный `done`-канал в `select`.
  - **«Канал всегда лучше мьютекса».** На горячем пути канал дороже: парковка/пробуждение горутин и лок. Для простого счётчика или флага берут atomic; канал — когда нужна именно передача владения или сигнализация.

  ## Что отвечать на собеседовании

  - Назовите поля `hchan`: кольцевой `buf` с `sendx`/`recvx`, `qcount`/`dataqsiz`, две очереди `sendq`/`recvq` из `sudog` и общий `lock`.
  - Опишите три ветки отправки, выделив **прямую передачу** (`sendDirect`) — это объясняет, почему небуферизованный канал синхронный.
  - Скажите, что блокировка — это `gopark`/`goready`, а не busy-wait; горутина снимается с потока.
  - Разберите семантику `close` (будит всех, отправители паникуют) и `nil`-канала в `select`, и упомяните happens-before: отправка happens-before завершения приёма.
