  ## Что делает Go-сервер: от Accept до handler

  На входе `net/http` держит `net.Listener` и в цикле вызывает `Accept()`. Каждое принятое соединение уходит в отдельную горутину — `go c.serve()`. Это и есть модель «горутина на соединение»: тысячи одновременных клиентов — тысячи дешёвых горутин, а не тысячи потоков ОС.

  Внутри `serve` горутина читает байты из сокета, парсит строку запроса и заголовки в `*http.Request`, затем `ServeMux` (роутер) по пути выбирает нужный обработчик и вызывает `handler(w, r)`. Ответ пишется в тот же `conn`.

  Ключевой момент — что происходит, когда данных в сокете ещё нет. Горутина не крутит поток вхолостую и не блокирует поток ОС: рантайм регистрирует дескриптор в epoll (netpoller) и паркует горутину. Поток M освобождается и выполняет другие горутины. Когда пакет придёт, netpoller разбудит именно эту горутину. Поэтому Go держит десятки тысяч медленных соединений на горстке потоков — блокирующий с виду `conn.Read()` на самом деле неблокирующий для планировщика.

