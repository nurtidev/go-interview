title: "Путь HTTP-запроса: от TCP до хендлера"
minutes: 8
tags: [networking, http, tcp, tls]
body_md: |
  ## Зачем это знать

  `http.ListenAndServe(":8080", handler)` — три слова, за которыми прячется целый стек: TCP-сегменты, TLS-рукопожатие, системные вызовы, планировщик Go и, наконец, ваш хендлер. На senior/staff-собеседовании любят «пройти» этот путь целиком: по ответу видно, понимаете ли вы, где рождается latency, почему keep-alive экономит время, откуда берётся «too many open files» и чем HTTP/2 лучше под нагрузкой. Разобравшись один раз, вы перестаёте гадать, когда сервис упирается в лимит соединений, а когда — в CPU.

  ## TCP-рукопожатие, а поверх — TLS

  Прежде чем уйдёт хоть один байт HTTP, стороны должны договориться. Но ещё раньше клиент превращает имя хоста в IP через DNS-запрос (обычно UDP) — это тоже round-trip, который прячется за кэшированием и всплывает в latency в основном на «холодных» вызовах. Дальше TCP делает three-way handshake: клиент шлёт SYN со своим начальным номером последовательности, сервер отвечает SYN-ACK, клиент подтверждает ACK. Только теперь соединение установлено — это минимум один round-trip (RTT) чистой задержки, ещё до запроса.

  Если это HTTPS, поверх TCP надстраивается TLS. Клиент шлёт ClientHello (версии, шифронаборы), сервер — ServerHello с сертификатом, стороны согласуют ключи и обе отправляют Finished. В TLS 1.2 это ещё 2 RTT, в TLS 1.3 — уже 1 RTT, а при 0-RTT resumption — почти даром. Вот почему «холодное» HTTPS-соединение дорогое, а keep-alive и переиспользование соединений так важны: рукопожатие платится один раз на много запросов.

