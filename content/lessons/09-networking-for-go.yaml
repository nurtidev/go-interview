  ## Типичные заблуждения

  - **«Go под каждый запрос создаёт поток».** Нет: под каждое соединение — горутину, а горутины мультиплексируются на несколько потоков через netpoller.
  - **«TLS-рукопожатие — это часть TCP».** Нет, это отдельный слой поверх уже установленного TCP; их RTT складываются.
  - **«HTTP/2 быстрее, потому что открывает несколько соединений».** Наоборот: одно соединение, много потоков внутри него.
  - **«`conn.Read` блокирует поток».** Для программиста — да, для рантайма — нет: горутина паркуется, поток свободен.
  - **«keep-alive — микрооптимизация».** На HTTPS переиспользование соединения экономит целые RTT рукопожатий на каждом запросе.

  ## Что отвечать на собеседовании

  - Пройдите путь по слоям: **TCP handshake** (SYN/SYN-ACK/ACK) → **TLS** (ClientHello/ServerHello/ключи) → **HTTP-запрос** → `handler`.
  - Скажите про модель **«горутина на соединение»** и **netpoller**: почему Go держит десятки тысяч соединений дёшево, не блокируя потоки.
  - Объясните **head-of-line blocking** в HTTP/1.1 и **мультиплексирование потоков** в HTTP/2 (и что это по-прежнему одно TCP-соединение).
  - Упомяните стоимость рукопожатий в **RTT** и роль **keep-alive / TLS 1.3** — это показывает, что вы думаете о latency, а не только о фичах протокола.
