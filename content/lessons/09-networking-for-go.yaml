  Отсюда два практических следствия. Во-первых, каждое соединение — это открытый файловый дескриптор, а их число ограничено `ulimit -n`; под нагрузкой ошибка «too many open files» означает, что вы упёрлись в лимит дескрипторов, а не в CPU. Во-вторых, без таймаутов медленный или зависший клиент вечно держит горутину и дескриптор — поэтому в проде всегда задают `ReadHeaderTimeout`, `ReadTimeout`, `WriteTimeout` и `IdleTimeout`, а долгие операции в хендлере отменяют через `r.Context()`, который закрывается, когда клиент отвалился.

  ## HTTP/1.1 против HTTP/2

  В HTTP/1.1 на одном соединении запросы идут по очереди: следующий ответ не начнётся, пока не завершился предыдущий — это head-of-line blocking. Браузеры обходят проблему, открывая ~6 параллельных соединений на хост, но каждое соединение — это отдельный TCP+TLS handshake и своя память на сервере.

  HTTP/2 решает это мультиплексированием: одно TCP-соединение несёт много логических потоков (streams), а данные режутся на бинарные фреймы, которые чередуются. Три запроса едут «параллельно» по одному сокету, без гонки за соединения. Плюс сжатие заголовков (HPACK) и server push. Важная тонкость: HTTP/2 всё ещё поверх одного TCP, поэтому потерянный пакет тормозит все потоки сразу (head-of-line на уровне TCP) — это уже лечит HTTP/3 поверх QUIC/UDP.

