topic: go-internals
title: "GC: трёхцветная маркировка"
minutes: 9
tags: [gc, runtime, memory]
body_md: |
  ## Зачем это знать

  Сборщик мусора в Go даёт то, чего у C нет, — память освобождается сама, — и при этом держит паузы меньше миллисекунды. На собеседовании staff-уровня почти наверняка спросят: как GC работает конкурентно с программой и при этом ничего не теряет? Ответ упирается в трёхцветную маркировку и write barrier. Тема всплывает и на практике: когда сервис упирается в latency-хвосты, растёт по памяти или ловит OOM в контейнере — без понимания того, что запускает GC и что его тормозит, вы будете крутить `GOGC` наугад. Разберём модель так, чтобы вы могли объяснить и инвариант, и почему в Go 1.8 паузы упали в разы.

  ## Три цвета

  GC в Go — конкурентный, mark-and-sweep, **не перемещающий** и **не поколенческий**. В основе — разбиение объектов на три множества:

  - **белые** — ещё не достигнутые, кандидаты на удаление;
  - **серые** — достигнутые, но их ссылки ещё не просканированы (фронт волны);
  - **чёрные** — достигнутые и полностью просканированные.

