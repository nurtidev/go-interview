  Начинают с корней — стеков горутин и глобальных переменных: они становятся серыми. Пока есть серые объекты, берём один, красим в чёрный, а все белые, на которые он ссылается, — в серые. Когда серых не осталось, волна дошла до края: все оставшиеся белые объекты недостижимы, их память освобождается фазой sweep.

  Важная деталь реализации: сами «цвета» не хранятся в объекте. Они живут в отдельных mark-битах в метаданных span-а, а «серый» физически означает «лежит в очереди на сканирование» (`gcWork` — per-P буферы, чтобы маркировка масштабировалась без общего лока). Сканируя объект, GC по карте указателей его типа обходит только слова-указатели, а не весь объект целиком, — это и есть та работа, которую выполняет фон маркировки.

  ## Фазы цикла и паузы

  Конкурентность — главная фишка и главная сложность. Практически вся маркировка идёт параллельно с программой (мутатором); под Stop-The-World остаются лишь короткие служебные отрезки.

