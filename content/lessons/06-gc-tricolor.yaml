  </svg>

  Порядок такой: (1) короткий **STW mark setup** — включается write barrier; (2) **concurrent mark** — маркировка вместе с мутатором; (3) короткий **STW mark termination** — завершение и выключение барьера; (4) **concurrent sweep** — ленивое освобождение. Момент старта подбирает pacer, ориентируясь на `GOGC` (по умолчанию 100 — новый цикл, когда куча вырастет вдвое относительно живой). Если мутатор аллоцирует быстрее, чем GC маркирует, включаются **GC assists**: аллоцирующая горутина обязана «отработать долг», помогая маркировке, — это притормаживает того, кто мусорит.

  ## Зачем нужен write barrier

  Вот тонкое место. Пока GC красит объекты, мутатор продолжает переставлять указатели — и может сломать разметку. Опасный сценарий: мутатор записывает ссылку с уже **чёрного** объекта на **белый**, а единственную серую ссылку на этот белый одновременно стирает. Белый останется белым, GC сочтёт его мусором — и соберёт живой объект. Это нарушение **strong tricolor invariant**: «ни один чёрный объект не ссылается напрямую на белый».

