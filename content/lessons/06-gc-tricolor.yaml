  <text x="360" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#757575">барьер — код, вставленный компилятором вокруг записи указателей на время марки</text>
  </svg>

  Чтобы инвариант держался, компилятор на время маркировки вставляет вокруг присваиваний указателей **write barrier**. С Go 1.8 это **hybrid write barrier** (Dijkstra + Yuasa): при записи он затемняет и старое, и новое значение указателя. Главный выигрыш — стало **не нужно пересканировать стеки** под STW в конце цикла. Раньше именно повторное сканирование всех стеков было главным источником длинных пауз; убрав его, Go получил суб-миллисекундные STW. Это и есть та веха 1.8, о которой любят спрашивать.

  Ещё два рычага. `GOGC` управляет частотой: больше — реже GC и больше память, меньше — наоборот; `GOGC=off` выключает сборку. `GOMEMLIMIT` (Go 1.19) — мягкий потолок памяти: по мере приближения к лимиту GC работает чаще, помогая избегать OOM в контейнерах. Но лимит мягкий: если живых данных больше лимита, начинается **GC death spiral** — GC крутится почти непрерывно, а мутатор тонет в assist'ах.

  ## Типичные заблуждения

  - **«GC в Go перемещающий/компактящий».** Нет — объекты не двигаются, поэтому адреса стабильны (важно для cgo и `unsafe`), зато есть фрагментация.
  - **«GC поколенческий».** Нет: escape analysis и дешёвый стек уже отсеивают короткоживущие объекты, и поколения не окупались.
  - **«Write barrier — на чтение».** Нет, барьер на **запись** указателей и работает только во время фазы маркировки.
  - **«`GOMEMLIMIT` гарантирует, что процесс не превысит память».** Нет, это soft limit — рантайм скорее допустит превышение, чем остановит прогресс.

  ## Что отвечать на собеседовании

  - Определите три цвета и правило перехода, обязательно назвав **strong tricolor invariant** и то, что серый — это «в очереди на сканирование».
  - Объясните, зачем нужен **write barrier**: без него конкурентный мутатор может «спрятать» живой белый объект от сборщика.
  - Назовите **hybrid write barrier (1.8)** и его эффект — отказ от повторного сканирования стеков и суб-миллисекундные паузы.
  - Разведите `GOGC` (частота по росту кучи) и `GOMEMLIMIT` (мягкий потолок), упомяните GC assists и риск death spiral — это уровень staff.
