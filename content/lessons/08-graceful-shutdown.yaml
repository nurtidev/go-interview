  Возврат `stop()` вторым вызовом снимает перехват сигналов — тогда повторный Ctrl+C убьёт подвисший процесс принудительно. Для нескольких компонентов (HTTP + gRPC + воркеры) удобен `errgroup`: одна горутина `g.Go` ждёт `ctx.Done()` и вызывает `Shutdown`, другие держат `ListenAndServe` и цикл консьюмера, а `g.Wait()` собирает общий итог и первую ошибку. Так все части останавливаются от одного сигнала и не разъезжаются в разнобой.

  ## Шаг нулевой: снять трафик заранее

  На проде у последовательности есть скрытый нулевой шаг — увести с пода трафик **до** того, как начнётся дренаж. В Kubernetes SIGTERM и удаление из endpoints происходят почти одновременно, но новая маршрутизация расходится по kube-proxy и балансировщикам не мгновенно. Если сразу дёрнуть `Shutdown`, часть уже отправленных запросов прилетит в закрывающийся под и получит отказ. Поэтому сначала readiness-проба должна начать отдавать «не готов», а `preStop`-хук с небольшой паузой (несколько секунд) даёт балансировщику время переключиться. Важно и то, чтобы `terminationGracePeriodSeconds` был заведомо больше вашего shutdown timeout, иначе оркестратор пришлёт SIGKILL прямо посреди дренажа и всё старание пропадёт.

  Дренаж — это не только HTTP. Консьюмеры очередей и фоновые джобы тоже надо останавливать корректно: перестать забирать новые сообщения, дать доработать взятым, подтвердить (ack) успешные и только потом закрыть соединение с брокером. Тот же принцип, что и с БД: инфраструктурные ресурсы закрываются последними, когда все, кто ими пользовался, уже завершились.

  ## Типичные заблуждения

  - **«`Shutdown` закрывает вообще всё».** Нет: он не трогает hijacked-соединения (WebSocket, `http.Hijacker`) и не прерывает уже запущенные хендлеры — только ждёт их. Стриминг (SSE, long polling) и WebSocket надо завершать вручную по сигналу отмены.
  - **«Порядок закрытия неважен».** Важен: закрыть БД до `Shutdown` — значит уронить активные запросы. Ресурсы закрывают **после** дренажа.
  - **«В Kubernetes достаточно поймать SIGTERM».** SIGTERM приходит одновременно с удалением из endpoints, но балансировщик узнаёт об этом не мгновенно; нужен `preStop`-хук и `terminationGracePeriodSeconds` больше, чем shutdown timeout, иначе часть трафика придёт уже в закрывающийся под.
  - **«Один контекст на всё».** Сигнальный контекст и таймаут дренажа — разные сущности с разными задачами.

  ## Что отвечать на собеседовании

  - Опишите четыре шага: **сигнал → стоп приёма → дренаж под таймаутом → закрытие ресурсов**, и обязательно — правильный порядок (ресурсы последними).
  - Покажите идиому `signal.NotifyContext` + `srv.Shutdown(ctxWithTimeout)` + `Close` как аварийный fallback по дедлайну.
  - Объясните два контекста: сигнальный (триггер) и таймаут дренажа, и зачем повторный `stop()`.
  - Назовите, чего `Shutdown` не делает (WebSocket/hijacked/активные хендлеры), и увяжите таймаут с `terminationGracePeriodSeconds`/`preStop` в Kubernetes — это выводит ответ на senior-уровень.
