slug: graceful-shutdown
topic: concurrency
title: "Graceful shutdown сервиса"
minutes: 8
tags: [shutdown, context, http]
body_md: |
  ## Зачем это знать

  В облаке процесс не живёт вечно: оркестратор в любой момент присылает SIGTERM — при деплое, масштабировании, эвикте ноды. Если сервис на этот сигнал просто падает, то рвутся запросы в полёте, не докатываются транзакции, теряются сообщения из очереди. Graceful shutdown — это умение остановиться аккуратно: перестать принимать новое, дать текущему доработать и только потом выйти. На собеседовании по concurrency это любимый практический вопрос — он проверяет и знание `context`, и понимание порядка остановки ресурсов, и внимание к деталям вроде «что `Shutdown` НЕ закрывает». Ошибка в порядке закрытия — классическая причина ошибок «в полёте» на проде.

  ## Последовательность остановки

  Корректная остановка — это конвейер из четырёх шагов, а не одно действие. Сигнал ОС ловят через `signal.NotifyContext`, который отменяет контекст при SIGINT/SIGTERM. Дальше — остановка приёма, дренаж активных запросов под дедлайном и закрытие ресурсов.

