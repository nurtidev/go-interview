  У `http.Server` для этого есть `Shutdown(ctx)`: он закрывает слушающие сокеты, перестаёт принимать новые соединения, закрывает idle keep-alive и **ждёт**, пока активные хендлеры сами вернутся, — но не дольше, чем позволит переданный контекст. Отсюда идиома:

  ```go
  ctx, stop := signal.NotifyContext(context.Background(),
      syscall.SIGINT, syscall.SIGTERM)
  defer stop()

  go func() {
      if err := srv.ListenAndServe(); err != nil &&
          !errors.Is(err, http.ErrServerClosed) {
          log.Fatalf("listen: %v", err)
      }
  }()

  <-ctx.Done() // пришёл сигнал
  stop()       // вернуть сигналы дефолту: второй Ctrl+C убьёт зависший процесс

  shCtx, cancel := context.WithTimeout(context.Background(), 15*time.Second)
  defer cancel()
  if err := srv.Shutdown(shCtx); err != nil {
      _ = srv.Close() // дедлайн истёк — рвём остаток жёстко
  }
  closeDB() // ПОСЛЕ Shutdown, не до
  ```

  Разница между `Shutdown` и `Close` принципиальна: `Shutdown` дожидается запросов, `Close` немедленно рвёт все соединения — это аварийный путь по истечении дедлайна. Внутри `Shutdown` помечает сервер закрытым (новые `Accept` получают `ErrServerClosed`), закрывает listeners, а затем в цикле опрашивает число активных соединений с нарастающей паузой (до ~500 мс между опросами), пока их не станет ноль или не истечёт контекст. Поэтому дедлайн shutdown разумно согласовать с самым долгим ожидаемым запросом: слишком короткий оборвёт легитимные ответы, слишком длинный — задержит выкатку.

  ## Жизненный цикл контекстов

  За остановкой стоят два разных контекста, и путать их — частая ошибка. Первый рождается из сигнала (`NotifyContext`) и служит триггером «пора останавливаться». Второй — это дедлайн дренажа (`WithTimeout`), он ограничивает, сколько мы готовы ждать активные запросы. Отмена расходится по дереву: родительский контекст запроса пробрасывается в хендлеры, и когда сервер закрывается, зависимые операции получают сигнал через `ctx.Done()`.

