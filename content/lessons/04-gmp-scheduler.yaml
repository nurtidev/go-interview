  <line x1="472" y1="164" x2="508" y2="164" stroke="#757575" marker-end="url(#s43)"/>
  <text x="30" y="222" font-family="system-ui, sans-serif" font-size="12" fill="#757575">возврат: exitsyscall пытается вернуть P; если не вышло — G в очередь, M0 паркуется</text>
  </svg>

  Для сетевого и файлового I/O работает ещё изящнее: дескриптор регистрируется в epoll/kqueue через **netpoller**, горутина паркуется, а M вообще не блокируется. Готовые события netpoller позже возвращает планировщику. За «застрявшими» потоками присматривает фоновый монитор **sysmon**: он отбирает P у M, зависших в долгом syscall (`retake`), и умеет прерывать горутины, работающие дольше ~10 мс.

  Про прерывание: с Go 1.14 действует **асинхронная преемпция**. Раньше горутину можно было снять только в safe-point (в точке вызова функции), поэтому горячий `for {}` без вызовов мог намертво повесить GC. Теперь sysmon шлёт потоку сигнал `SIGURG`, и обработчик останавливает даже tight loop.

  ## Типичные заблуждения

  - **«Горутина — это поток».** Нет: горутины мультиплексируются на небольшое число M. Поток дорог (мегабайты стека, планирование ядром), горутина дешева (~2 КБ, планирование в user space).
  - **«`GOMAXPROCS` — это лимит на число горутин».** Нет, это число P, то есть предел параллельно исполняемого Go-кода. Горутин при этом миллионы.
  - **«Блокирующий syscall останавливает всю программу».** Нет — благодаря handoff освободившийся P продолжает работать на другом M.
  - **«Планировщик справедливый».** Он throughput-ориентированный, не строго справедливый и не приоритетный; `runnext` даёт свежей горутине фору.

  ## Что отвечать на собеседовании

  - Опишите триаду: **G** — горутина, **M** — поток ОС, **P** — контекст с локальной очередью; для исполнения Go-кода M нужен P, число P = `GOMAXPROCS`.
  - Объясните две очереди и **work stealing**: локальная runq без локов + глобальная; пустой P добирает работу из global runq, netpoller и крадёт у соседей.
  - Расскажите про **handoff** при блокирующем syscall и про **netpoller**, чтобы показать, почему ядра не простаивают на I/O.
  - Упомяните **async preemption (1.14)** и `SIGURG` как ответ на вопрос про зависающий `for {}` — это отличает senior от staff.
