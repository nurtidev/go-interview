  ## Блокирующий syscall и handoff

  Самая тонкая часть — что происходит при блокирующем системном вызове. Если бы M просто завис в ядре вместе со своим P, то один зависший `read()` вычёркивал бы из работы целое ядро. Поэтому перед входом в syscall вызывается `entersyscall`, который **отвязывает P от M** (handoff). Освободившийся P может тут же подхватить другой (или новый) M и продолжить выполнять готовые горутины из очереди, пока M0 висит в ядре.

  <svg viewBox="0 0 720 250" role="img" aria-label="Handoff при блокирующем syscall: M с горутиной уходит в ядро, а P отвязывается и подхватывается свободным потоком M2">
