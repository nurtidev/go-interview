title: "Планировщик Go: G, M, P"
minutes: 9
tags: [runtime, scheduler, goroutine]
body_md: |
  ## Зачем это знать

  Go позволяет запустить миллион горутин одной строкой `go f()`, и это действительно работает — потому что за горутинами стоит собственный планировщик в user space. На senior/staff-собеседовании вопрос «как устроен планировщик» звучит почти всегда: по ответу видно, понимаете ли вы, почему горутина дешевле потока, что происходит при блокировке и почему `GOMAXPROCS` ограничивает параллелизм, но не количество горутин. Тема всплывает и косвенно — когда спрашивают про утечки горутин, про latency-хвосты под нагрузкой или «почему сервис не масштабируется на все ядра». Разобравшись один раз в модели G-M-P, вы перестаёте отвечать на эти вопросы наугад.

  ## Три сущности: G, M, P

  Планировщик оперирует тремя объектами:

  - **G** (goroutine) — сама горутина: её стек, счётчик команд, состояние. Это дешёвая структура; стек стартует всего с ~2 КБ и растёт по мере надобности.
  - **M** (machine) — поток ОС, который реально исполняет машинный код. Только M умеет «крутить» процессор.
  - **P** (processor) — логический процессор, контекст исполнения. Именно P даёт M право выполнять Go-код и хранит **локальную очередь** готовых горутин.

  Ключевое правило: чтобы M исполнял Go-код, ему нужен P. Число P фиксировано и равно `GOMAXPROCS` (по умолчанию — число ядер). Значит, одновременно исполняется не больше `GOMAXPROCS` горутин, но самих горутин может быть миллионы — планировщик мультиплексирует их на потоки.

