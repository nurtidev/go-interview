  Новая горутина обычно попадает в локальную очередь текущего P — это дёшево и без блокировок. Локальная очередь фиксированного размера (256 слотов) плюс отдельный слот `runnext` для «самой свежей» горутины (LIFO-оптимизация: только что созданная горутина запустится почти сразу, это улучшает локальность кэша). Если локальная очередь переполнилась — половина её горутин уезжает в **глобальную очередь** (global runq), общий пул, доступ к которому уже требует лока.

  Почему горутина настолько дешёвая? Её стек стартует всего с ~2 КБ и растёт по мере надобности: пролог каждой функции сравнивает указатель стека с границей, и при нехватке `morestack` вызывает `copystack` — выделяет вдвое больший стек, копирует туда кадры и правит указатели. Поэтому можно держать миллионы горутин, не резервируя мегабайты на каждую, как для потока ОС.

  ## Work stealing: почему ядра не простаивают

  Что делать P, у которого кончились свои горутины? Он не засыпает сразу. Сначала заглядывает в глобальную очередь и в netpoller (готовые сетевые события), а если и там пусто — **крадёт половину** горутин у случайного другого P. Это и есть work stealing: балансировка нагрузки без центрального диспетчера, каждый P сам добирает себе работу.

