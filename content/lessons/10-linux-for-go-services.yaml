title: "Linux глазами Go-сервиса"
minutes: 9
tags: [linux, runtime, cgroups, epoll]
body_md: |
  ## Зачем это знать

  Go-сервис не живёт в вакууме — он процесс в Linux, и всё, что даёт язык (горутины, GC, netpoller), в итоге ложится на примитивы ядра: потоки, системные вызовы, epoll, cgroups. На staff-собеседовании проверяют именно этот стык: почему `GOMAXPROCS` в контейнере надо настраивать, куда «уходит» горутина при `conn.Read`, почему OOM-killer убивает под, хотя в Go есть сборщик мусора. Кто видит границу «рантайм ↔ ядро», тот диагностирует проблемы в проде, а не гадает по логам.

  ## Процесс, потоки, горутины: модель M:N

  Для ядра ваш сервис — один процесс: один PID, одно виртуальное адресное пространство. Внутри процесс запускает несколько потоков ОС (в терминах Go — M). Планирует эти потоки по ядрам само ядро Linux, вытесняюще (preemptive).

  Горутины ядро не видит вообще. Их планирует рантайм Go в user space, мультиплексируя тысячи горутин на небольшое число потоков — это модель **M:N** (N горутин на M потоков). Поэтому переключение горутины дешёвое (без перехода в ядро, только смена регистров и стека), а переключение потока дорогое (системный вызов, работа планировщика ядра, сброс кэшей). Число потоков, одновременно исполняющих Go-код, ограничено `GOMAXPROCS`.

