  ## Типичные заблуждения

  - **«Горутина — это лёгкий поток ОС».** Нет, ядро о ней не знает; это структура рантайма, планируемая в user space поверх потоков.
  - **«В контейнере Go сам видит лимит CPU».** По умолчанию до Go 1.25 — нет: видит ядра хоста, отсюда неверный `GOMAXPROCS`.
  - **«Есть GC — значит OOM невозможен».** Возможен: без `GOMEMLIMIT` куча может перерасти cgroup-лимит, и под убьёт OOM-killer.
  - **«`conn.Read` блокирует поток ОС».** Нет: горутина паркуется через netpoller, поток свободен для других горутин.
  - **«Контейнер — это лёгкая виртуалка».** Нет, это обычный процесс ядра хоста, ограниченный cgroups и изолированный namespaces.

  ## Что отвечать на собеседовании

  - Разложите три уровня: **процесс** (PID, адресное пространство) → **потоки ОС M** (планирует ядро) → **горутины** (планирует рантайм, модель M:N) и почему переключение горутины дешевле переключения потока.
  - Объясните **netpoller**: сокет в epoll, `gopark` горутины, `epoll_wait` и `goready` — как Go держит тысячи соединений без потока на каждое.
  - Про контейнер: **namespaces** (видимость) против **cgroups** (лимиты); ловушка `GOMAXPROCS` = ядра хоста и фикс `automaxprocs`/`GOMAXPROCS`, плюс `GOMEMLIMIT` против OOM.
  - Свяжите с прод-симптомами: троттлинг и latency-хвосты — часто неверный `GOMAXPROCS`; внезапный OOM-kill — отсутствие `GOMEMLIMIT`.
