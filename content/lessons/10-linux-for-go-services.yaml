  Оговорка: через netpoller проходит сетевой I/O, но не всё. Обычные файловые операции и блокирующие системные вызовы (а также вызовы в C через cgo) реально блокируют поток. Рантайм это замечает и, чтобы `GOMAXPROCS` логических процессоров не простаивали, поднимает дополнительные потоки M. Поэтому в `/proc/<pid>/status` (поле `Threads`) потоков нередко больше, чем `GOMAXPROCS`, — это нормально, но лавина блокирующих вызовов может расплодить тысячи потоков (жёсткий предел — `runtime/debug.SetMaxThreads`, по умолчанию 10000).

  ## Контейнер — это не виртуалка: cgroups и namespaces

  Контейнер — это тот же процесс на том же ядре хоста, просто с двумя ограничениями. **Namespaces** дают изоляцию видимости: свой PID (внутри процесс — PID 1), свой сетевой стек, своя файловая система — процесс «думает», что он один в системе. **Cgroups** дают лимиты ресурсов: сколько CPU (quota) и памяти можно.

  И тут классическая ловушка. Go-рантайм при старте определяет `GOMAXPROCS` через системный вызов `sched_getaffinity` — а тот возвращает ядра хоста, не cgroup-квоту. На 16-ядерном хосте с квотой в 2 ядра рантайм по умолчанию поставит `GOMAXPROCS=16`: лишние потоки, борьба за 2 реальных ядра, CPU-троттлинг и рост latency-хвостов. Фикс — библиотека `automaxprocs` (читает cgroup-квоту) или явный `GOMAXPROCS`. С Go 1.25 рантайм умеет учитывать cgroup-лимит сам, но на многих продах ещё живёт старое поведение — знать про это обязательно.

  Симметрично по памяти: GC не знает про `memory.limit` из cgroup и может раздуть кучу до OOM-kill. Лечится `GOMEMLIMIT` — мягким лимитом, при приближении к которому GC работает агрессивнее. Ставьте его чуть ниже cgroup-лимита (примерно 90%).

