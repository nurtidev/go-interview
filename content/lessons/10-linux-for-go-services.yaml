  ## epoll и netpoller: как горутина спит на сокете

  Самое частое «магическое» место — сетевой I/O. Когда горутина делает `conn.Read()`, а данных в сокете нет, наивная реализация заблокировала бы поток в системном вызове. Go так не делает.

  Рантайм переводит сокет в неблокирующий режим и регистрирует его дескриптор в epoll — это и есть netpoller. Горутина паркуется (`gopark`): снимается с потока, а поток M свободен и берёт другую работу. Когда пакет доходит до сетевой карты и ядро кладёт данные в сокет, epoll помечает дескриптор готовым. Планировщик Go периодически (и при простое) зовёт `epoll_wait`, получает список готовых дескрипторов и делает соответствующие горутины runnable (`goready`). Горутина просыпается, и `Read` возвращает данные — как будто он и не блокировался.

  Итог: блокирующий по виду код держит десятки тысяч соединений на горстке потоков. Именно поэтому «поток на соединение», как в старом C-сервере, в Go не нужен.

