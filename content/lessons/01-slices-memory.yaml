slug: slices-memory
topic: go-internals
title: "Слайс в памяти: ptr/len/cap, рост и общая подложка"
minutes: 8
tags: [memory, slices]
body_md: |
  ## Зачем это знать

  Слайс — самая частая структура данных в Go и любимая тема собеседований: за удобным синтаксисом `s[a:b]` прячется работа с памятью, которую кандидат либо понимает, либо нет. Вопросы «что напечатает этот `append`?», «почему изменение одного слайса поменяло другой?» и «сколько раз здесь произойдёт аллокация?» отделяют тех, кто воспринимает слайс как «динамический массив», от тех, кто видит за ним дескриптор над общей подложкой. Разберёмся, как слайс лежит в памяти, что именно делает `append` и откуда берётся классический баг с шарингом.

  ## Дескриптор над backing array

  Слайс — это не массив. Это маленький дескриптор из трёх машинных слов: указатель на начало данных, длина и ёмкость.

  ```go
  type slice struct {
      array unsafe.Pointer // ptr — начало окна в массиве
      len   int            // сколько элементов доступно
      cap   int            // сколько влезет без реаллокации
  }
  ```

  Сами элементы живут в отдельном непрерывном участке памяти — backing array (подложке). Слайс лишь «окно» в него: `ptr` указывает на первый элемент окна, `len` задаёт границу чтения и записи, `cap` — сколько ещё элементов есть от `ptr` до конца подложки.

