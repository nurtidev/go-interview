  Пока `append` укладывается в `cap`, он пишет прямо в общий массив и меняет то, что видит `s1`. Как только `cap` превышен — происходит реаллокация, `s2` уезжает на новую подложку, и связь рвётся. Из-за этого баг «мерцает»: на маленьких данных он есть, на больших (где случилась реаллокация) исчезает. Защита — трёхиндексный срез `s1[:2:2]`, который ставит `cap == len`, поэтому первый же `append` форсирует копию и не трогает `s1`.

  ## Типичные заблуждения

  - «Слайс копирует данные при `s[a:b]`» — нет, копируется только дескриптор (три слова), данные общие.
  - «`append` всегда возвращает новый массив» — только при нехватке `cap`; иначе он мутирует существующую подложку.
  - «`len` и `cap` — это одно и то же» — `len` это окно, `cap` это запас до конца подложки; разница и порождает баги шаринга.
  - «Передача слайса в функцию копирует элементы» — копируется дескриптор; функция видит те же данные, но её `append` не виден снаружи, если реаллоцировал.

  ## Что отвечать на собеседовании

  - Слайс — дескриптор `{ptr, len, cap}` над backing array; срез создаёт новое окно в ту же память, а не копию.
  - `append` пишет в подложку, пока `len < cap`; при `len == cap` выделяет новый массив и копирует — поэтому результат присваивают обратно.
  - Рост ёмкости амортизированный (≈2x до порога, затем ≈1.25x, плюс округление аллокатором), а не «+1 каждый раз».
  - Общая подложка — источник багов; изолировать под-слайс помогает полный трёхиндексный срез `a[low:high:max]` или явный `copy`.
