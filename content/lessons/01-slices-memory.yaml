  Выражение `s[2:4]` не копирует данные — оно создаёт новый дескриптор с тем же `array` (сдвинутым указателем), новыми `len` и `cap`. Это и есть источник силы и опасности слайсов: срезы дёшевы, но делят память.

  Отдельно про nil-слайс: у него `ptr == nil` и `len == cap == 0`, но `append` к нему работает как обычно — первый же элемент выделит подложку. Поэтому `var s []T` (nil) и `s := []T{}` (пустой, но ненулевой `ptr`) взаимозаменяемы для чтения, `range` и `append`; разница видна лишь при сравнении с `nil` и при JSON-маршалинге (nil даёт `null`, пустой — `[]`).

  ## Что происходит при append

  `append` смотрит на `cap`. Если `len < cap`, для новых элементов есть место прямо в текущей подложке: рантайм пишет их после `len`, увеличивает `len` и возвращает дескриптор на ту же память. Если же `len == cap`, места нет — рантайм выделяет новый, больший массив, копирует туда старые элементы, дописывает новые и возвращает дескриптор с новым `ptr`. Старая подложка живёт, пока на неё кто-то ссылается.

