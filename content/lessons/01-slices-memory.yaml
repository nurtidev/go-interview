  Отсюда железное правило: результат `append` всегда присваивают обратно (`s = append(s, x)`), потому что `ptr` мог измениться. Рост ёмкости не линейный: до Go 1.18 подложка примерно удваивалась до 1024 элементов и росла на ~25% дальше; с 1.18 формула в `growslice` сглажена (порог около 256, плавный переход между 2x и 1.25x), а финальный размер ещё округляется вверх до класса аллокатора через `roundupsize`. Поэтому реальный `cap` часто больше, чем вы просили, — и это нормально.

  ## Ловушка общей подложки

  Самый частый прод-баг со слайсами: под-слайс с запасом ёмкости молча пишет в чужую память.

  ```go
  s1 := []int{1, 2, 3, 4}
  s2 := s1[:2]           // len=2, cap=4 — та же подложка!
  s2 = append(s2, 99)    // len(2) < cap(4): пишет в s1[2]
  // s1 теперь [1 2 99 4] — испортили соседа
  ```

