      <text x="255" y="61" text-anchor="middle">data ●</text>
    </g>
    <text x="105" y="98" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#757575">описание типа</text>
    <text x="30" y="132" font-family="system-ui, sans-serif" font-size="14" fill="#242424">iface — интерфейс с методами: два слова</text>
