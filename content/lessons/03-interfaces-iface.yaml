    </g>
    <path d="M512 150 L556 80" fill="none" stroke="#0D7680" stroke-width="2" marker-end="url(#if-arw2)"/>
    <path d="M512 154 L556 126" fill="none" stroke="#0D7680" stroke-width="2" marker-end="url(#if-arw2)"/>
    <rect x="110" y="150" width="170" height="38" rx="6" fill="#E6F2F3" stroke="#0D7680"/>
    <text x="195" y="174" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#242424">значение (получатель)</text>
    <path d="M174 96 L190 148" fill="none" stroke="#0D7680" stroke-width="2" marker-end="url(#if-arw2)"/>
  </svg>

  Вызов `w.Write(p)` через интерфейс — это динамический диспатч: берём `itab.fun[k]` (адрес нужного метода конкретного типа) и прыгаем туда, передав `data` как получателя. `itab` строится один раз на пару (тип, интерфейс) и кэшируется в глобальной `itabTable`, поэтому повторные вызовы не платят за поиск. В отличие от C++ здесь нет vtable-указателя внутри объекта — таблица живёт «сбоку», в интерфейсном слове.

  Обратная операция — распаковка через type assertion `v, ok := i.(T)`: рантайм сравнивает `_type`/`itab` интерфейса с искомым типом, это дешёвая проверка указателя, а не рефлексия; `type switch` устроен так же — серия сравнений `itab`. Дорогое здесь не сравнение, а упаковка: если в горячем цикле складывать значения в `any`, каждый примитив, не влезающий в слово-указатель, может уехать в кучу — это ловят через `go build -gcflags=-m` (escape-анализ).

  ## Классика: typed nil ≠ nil

  Теперь главная ловушка. Положим в интерфейс типизированный nil-указатель.

  ```go
  type MyError struct{}
  func (e *MyError) Error() string { return "boom" }

  func do() error {
      var e *MyError = nil
      return e            // упаковываем (*MyError)(nil) в error
  }

  func main() {
      err := do()
      fmt.Println(err == nil) // false!
  }
  ```

  <svg viewBox="0 0 720 148" role="img" aria-label="typed nil: интерфейс error с типом MyError и нулевыми данными не равен nil, тогда как интерфейс с обоими нулевыми словами равен nil">
    <text x="30" y="20" font-family="system-ui, sans-serif" font-size="14" fill="#242424">Почему typed nil в error не равен nil</text>
    <text x="30" y="46" font-family="system-ui, sans-serif" font-size="13" fill="#757575">return (*MyError)(nil) как error</text>
    <g font-family="system-ui, sans-serif" font-size="13" fill="#242424">
      <rect x="30" y="54" width="150" height="46" rx="6" fill="#E6F2F3" stroke="#0D7680"/>
      <text x="105" y="82" text-anchor="middle">type = *MyError</text>
      <rect x="180" y="54" width="150" height="46" rx="6" fill="none" stroke="#E6E6E6"/>
      <text x="255" y="82" text-anchor="middle" fill="#757575">data = nil</text>
    </g>
    <text x="30" y="126" font-family="system-ui, sans-serif" font-size="13" fill="#B4552D">err == nil → false (слот типа занят)</text>
    <text x="400" y="46" font-family="system-ui, sans-serif" font-size="13" fill="#757575">var err error = nil</text>
    <g font-family="system-ui, sans-serif" font-size="13" fill="#757575">
      <rect x="400" y="54" width="140" height="46" rx="6" fill="none" stroke="#E6E6E6"/>
      <text x="470" y="82" text-anchor="middle">type = nil</text>
      <rect x="540" y="54" width="140" height="46" rx="6" fill="none" stroke="#E6E6E6"/>
      <text x="610" y="82" text-anchor="middle">data = nil</text>
    </g>
    <text x="400" y="126" font-family="system-ui, sans-serif" font-size="13" fill="#0D7680">err == nil → true (оба слова нули)</text>
  </svg>

  `err` сравнивается с `nil` как `false`, потому что первое слово интерфейса не пустое: тип `*MyError` записан, хотя `data` действительно нулевой. Интерфейс считается nil только когда оба слова нули, а здесь занят слот типа. Отсюда правило: никогда не возвращайте конкретный типизированный указатель в переменную типа `error` — возвращайте `nil` явным литералом или интерфейс. Особенно коварно это выглядит с именованным возвращаемым значением и `defer`, где легко случайно вернуть typed nil.

  ## Типичные заблуждения

  - «Интерфейс это указатель на объект» — нет, это два слова: (тип/itab, data).
  - «`eface` и `iface` — синонимы» — `eface` у пустого интерфейса (`_type`, data), `iface` у интерфейса с методами (`itab`, data).
  - «Если переменная-указатель nil, то и интерфейс с ней nil» — нет: слот типа занят, интерфейс не равен `nil`.
  - «Вызов метода через интерфейс бесплатен» — есть косвенность через `itab.fun` (динамический диспатч), плюс упаковка может аллоцировать.
  - «`itab` строится на каждый вызов» — строится один раз на пару (тип, интерфейс) и кэшируется.

  ## Что отвечать на собеседовании

  - Интерфейс — два слова. `eface` = (`_type`, data) для `any`; `iface` = (`itab`, data) для интерфейса с методами.
  - `itab` кэширует пару (конкретный тип, интерфейс) и хранит `fun` — таблицу адресов методов; вызов идёт через неё (динамический диспатч), таблица кэшируется в `itabTable`.
  - Интерфейс равен `nil` только когда оба слова нулевые; typed nil (тип есть, data = nil) даёт `i == nil → false`.
  - Упаковка значения в интерфейс может вызвать аллокацию (escape в кучу); поэтому в горячем коде за интерфейсами следят через escape-анализ.
