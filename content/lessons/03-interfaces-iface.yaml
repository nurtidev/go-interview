  </svg>

  Второе слово всегда `data` — указатель на значение. Если значение больше указателя или его адрес «убегает» в интерфейс, оно переезжает в кучу (упаковка = потенциальная аллокация); мелкие значения рантайм иногда умеет не аллоцировать. Ключевой момент для ловушек: интерфейс равен `nil`, только когда оба слова нулевые.

  ## itab и динамический диспатч

  `itab` — это кэш связки «конкретный тип + интерфейс». Внутри: указатель на описание интерфейса, указатель на `_type` конкретного типа, хеш и главное — массив `fun` с адресами методов конкретного типа, разложенных в порядке методов интерфейса.

  <svg viewBox="0 0 720 200" role="img" aria-label="Структура iface: слово указывает на itab и data; itab хранит тип и массив fun с адресами методов, через который идёт динамический диспатч">
