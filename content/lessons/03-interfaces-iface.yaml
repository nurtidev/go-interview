slug: interfaces-iface
topic: go-internals
title: "Интерфейсы: iface, eface и typed nil"
minutes: 8
tags: [interface, iface, nil]
body_md: |
  ## Зачем это знать

  Интерфейсы — место, где Go-собеседование любит ловить на деталях. «Что такое eface и iface?», «почему typed nil не равен nil?», «когда упаковка в интерфейс аллоцирует?», «как работает динамический вызов метода?» — все эти вопросы про одно: интерфейс в рантайме это не «объект», а пара из двух машинных слов. Кто это понимает, у того и знаменитая ловушка с nil-указателем в `error` перестаёт быть магией. Разберём обе формы интерфейса, таблицу методов и главный трюк с typed nil.

  ## Два слова: eface и iface

  Любой интерфейс в памяти — ровно два указателя. Разница в первом слове. Пустой интерфейс `interface{}` (он же `any`) — это `eface`: первое слово — указатель на `_type` (полное описание конкретного типа), второе — `data` (указатель на сами данные). Непустой интерфейс с методами — это `iface`: первое слово — указатель на `itab`, второе — тот же `data`.

  <svg viewBox="0 0 720 200" role="img" aria-label="Два слова интерфейса: eface хранит указатель на тип и данные, iface — указатель на itab и данные; второе слово в обоих указывает на значение">
    <defs>
      <marker id="if-arw1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
        <path d="M0 0 L10 5 L0 10 z" fill="#0D7680"/>
      </marker>
    </defs>
    <text x="30" y="22" font-family="system-ui, sans-serif" font-size="14" fill="#242424">eface — interface{} (any): два слова</text>
    <g font-family="system-ui, sans-serif" font-size="14" fill="#242424">
      <rect x="30" y="32" width="150" height="48" rx="6" fill="#E6F2F3" stroke="#0D7680"/>
