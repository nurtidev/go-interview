    <text x="400" y="54" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#757575">itab (кэш: конкретный тип + интерфейс)</text>
    <g font-family="system-ui, sans-serif" font-size="13" fill="#242424">
      <text x="304" y="82">inter — тип интерфейса</text>
      <text x="304" y="106">_type — конкретный тип</text>
      <text x="304" y="130">hash</text>
      <text x="304" y="156" fill="#0D7680">fun[k] → адреса методов ●</text>
    </g>
    <g font-family="system-ui, sans-serif" font-size="13" fill="#242424">
      <rect x="560" y="60" width="140" height="34" rx="6" fill="#E6F2F3" stroke="#0D7680"/>
      <text x="630" y="82" text-anchor="middle">(*T).Write</text>
      <rect x="560" y="108" width="140" height="34" rx="6" fill="#E6F2F3" stroke="#0D7680"/>
