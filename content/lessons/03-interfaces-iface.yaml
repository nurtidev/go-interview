      <rect x="180" y="142" width="150" height="48" rx="6" fill="#E6F2F3" stroke="#0D7680"/>
      <text x="255" y="171" text-anchor="middle">data ●</text>
    </g>
    <rect x="470" y="78" width="200" height="66" rx="6" fill="#E6F2F3" stroke="#0D7680"/>
