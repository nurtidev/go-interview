    <text x="570" y="128" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#757575">в куче или на стеке</text>
    <path d="M332 56 L466 100" fill="none" stroke="#0D7680" stroke-width="2" marker-end="url(#if-arw1)"/>
