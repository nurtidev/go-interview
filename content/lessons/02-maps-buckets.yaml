slug: maps-buckets
topic: go-internals
title: "Map изнутри: от bucket'ов к Swiss tables"
minutes: 8
tags: [map, buckets, runtime]
body_md: |
  ## Зачем это знать

  `map` — вторая после слайса структура, которую на собеседовании просят «разобрать изнутри». За вопросом «как устроена map» тянется хвост: почему порядок итерации случайный, почему `&m[k]` не компилируется, что происходит при росте и — с 2025 года — что поменялось в Go 1.24, где классические bucket'ы заменили на Swiss tables. Ответ «это хеш-таблица» засчитывают за junior; senior обязан показать устройство памяти и механику роста. Разберём обе реализации: классическую (её всё ещё полезно понимать) и новую.

  ## Классика: hmap и бакеты (до Go 1.24)

  `map` — это указатель на заголовок `hmap`. В нём лежат `count` (его возвращает `len`), `B` (число бакетов равно `2^B`), указатель `buckets` на массив бакетов, `oldbuckets` для роста и `hash0` — seed, из-за которого хеши, а значит и порядок, меняются от запуска к запуску.

  Каждый бакет — это `bmap` на 8 пар ключ-значение. Важная деталь раскладки: сначала идёт массив из 8 `tophash` (по одному байту), потом 8 ключей подряд, потом 8 значений подряд — не парами. Раздельные группы экономят padding: между `int64`-ключом и `bool`-значением не пришлось бы вставлять выравнивание. `tophash[i]` хранит старший байт хеша ключа — по нему быстро отсеивают слоты, не сравнивая ключи целиком, а также кодируют служебные состояния (пустой, эвакуированный).

