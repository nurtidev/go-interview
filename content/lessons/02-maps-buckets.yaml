  Пока идёт рост, чтение обязано смотреть и в старый, и в новый массив. Каждый старый бакет при эвакуации расщепляется на два «направления» X и Y — по старшему из новых бит хеша решается, в какую половину нового массива поедет ключ. Есть и особый случай `sameSizeGrow`: если бакетов много, но они забиты overflow-цепочками после массовых удалений, map «переупаковывается» в тот же размер, уплотняя данные без роста.

  ## Go 1.24: Swiss tables

  В Go 1.24 реализацию `map` заменили на Swiss table — это открытая адресация вместо цепочек overflow. Данные лежат группами по 8 слотов (`abi.SwissMapGroupSlots = 8`), и у каждой группы есть одно 8-байтное (64-битное) control-слово: по одному байту-контроллеру на слот. В байте — 7 бит хеша плюс бит статуса (занят/пуст/удалён).

