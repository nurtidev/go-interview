  Ключ ищется так: младшие `B` бит хеша выбирают номер бакета, старший байт кладётся или сравнивается в `tophash`. Если все 8 слотов заняты — к бакету подцепляется overflow-бакет (связный список). Отсюда правило: `&m[k]` запрещён компилятором, потому что при росте значение физически переезжает в другую память, и адрес мгновенно бы протух.

  ## Рост и инкрементальная эвакуация

  Когда среднее заполнение превышает load factor 6.5 (`count > 6.5 · 2^B`), число бакетов удваивается. Но копирования «всё сразу» не происходит — это дало бы неприемлемые паузы на больших map. Вместо этого старый массив переезжает в `oldbuckets`, выделяется новый вдвое больший `buckets`, а сама эвакуация инкрементальная: при каждой записи или удалении `growWork` перевозит один-два старых бакета в новый.

