    <text x="30" y="188" font-family="system-ui, sans-serif" font-size="13" fill="#0D7680">SWAR: одно сравнение 64-битного слова проверяет все 8 слотов сразу</text>
  </svg>

  Фокус в том, как ищут по группе. Вместо цикла по 8 слотам берут 64-битное control-слово и параллельно проверяют все 8 байт сразу — приёмом SWAR (SIMD within a register): битовые трюки над одним словом, а не настоящие SIMD-инструкции. Важно не переврать на собеседовании: вариант с 16 слотами и SSE — это оригинальный abseil на C++, которого в Go-порте нет; в Go именно 8 слотов и 64-битное слово. Результат — быстрее доступ и меньше памяти на больших map при полностью сохранённой семантике языка: порядок по-прежнему случайный, значения не адресуемы, потокобезопасности нет.

  ## Типичные заблуждения

  - «В бакете ключи и значения лежат парами» — нет, отдельными группами (8 ключей, потом 8 значений) ради выравнивания.
  - «При росте map копируется целиком за один раз» — эвакуация инкрементальная, размазана по последующим записям и удалениям.
  - «Порядок итерации случаен из-за хеша» — не только: `range` дополнительно стартует со случайного бакета и смещения, это осознанная защита от того, чтобы на порядок закладывались.
  - «Go 1.24 использует 16-слотные группы и SSE, как в abseil» — нет, в Go-порте 8 слотов и SWAR над 64-битным словом.
  - «`map` можно читать из нескольких горутин с параллельной записью» — нет: рантайм ловит это флагом и роняет процесс `fatal error`, которую нельзя перехватить `recover`.

  ## Что отвечать на собеседовании

  - Классика: `hmap` + массив бакетов по 8 слотов; `tophash` (старший байт хеша) для быстрого отсева; переполнение — overflow-бакеты.
  - Рост при load factor 6.5 удваивает число бакетов, эвакуация инкрементальная через `growWork`, с расщеплением на направления X/Y.
  - Значения не адресуемы (`&m[k]` не компилируется), потому что при эвакуации переезжают; порядок итерации намеренно случаен.
  - Go 1.24: Swiss table, группы по 8 слотов и 64-битное control-слово, поиск через SWAR; семантика языка не изменилась. Для конкурентного доступа — `sync.Map` или `map` под `RWMutex`.
