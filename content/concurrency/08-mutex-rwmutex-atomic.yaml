slug: mutex-rwmutex-atomic
section: concurrency
title: "Mutex vs RWMutex vs atomic: когда что"
tags: [sync, atomic]
difficulty: senior
question_md: |
  Когда выбирать `sync.Mutex`, `sync.RWMutex` и `sync/atomic`? Расскажите про
  режимы работы `Mutex` (normal/starvation), про цену `RWMutex` и writer
  starvation, про lock-free счётчики на atomic, а также как работает детектор
  гонок `-race` и что такое false sharing.
answer_levels:
  - level: middle
    text_md: |
      `sync.Mutex` — взаимное исключение: одна горутина в критической секции.
      `sync.RWMutex` разделяет блокировку на чтение (много читателей одновременно)
      и запись (эксклюзивно) — выгоден, когда читают гораздо чаще, чем пишут.
      `sync/atomic` даёт атомарные операции над одним словом (счётчики, флаги,
      указатели) без блокировки — это дешевле мьютекса для простых случаев вроде
      инкремента. Правило: одно число/флаг — `atomic`; несколько связанных полей
      или сложный инвариант — `Mutex`; много чтений и мало записей на большой
      критической секции — `RWMutex`. Всегда защищайте `defer mu.Unlock()`.
  - level: senior
    text_md: |
      `sync.Mutex` с Go 1.9 имеет два режима. Normal mode: ожидающие в очереди
      FIFO, но проснувшийся конкурирует с новыми горутинами, которые уже крутятся
      на CPU (barging) — это быстро, но при невезении хвост очереди голодает.
      Starvation mode включается, если горутина не может забрать лок дольше 1ms:
      тогда лок передаётся напрямую (handoff) первому в очереди, barging
      запрещён — честность ценой пропускной способности. Переключение
      автоматическое.

      `RWMutex` дороже, чем кажется: `RLock`/`RUnlock` трогают атомарный счётчик
      читателей, а `Lock` писателя должен дождаться всех читателей. При низкой
      contention `RWMutex` медленнее обычного `Mutex` из-за большего числа
      атомарных операций и большего размера структуры. Есть риск writer
      starvation — реализация Go резервирует место писателю (новые читатели после
      заявки писателя блокируются), но при плотном потоке читателей задержки
      писателя всё равно велики.

      `atomic` для lock-free счётчиков и флагов. С Go 1.19 есть типы-обёртки
      `atomic.Int64`, `atomic.Bool`, `atomic.Pointer[T]` — они безопаснее «сырых»
      функций и не дают забыть про выравнивание:

      ```go
      type Counter struct{ n atomic.Int64 }

      func (c *Counter) Inc()       { c.n.Add(1) }
      func (c *Counter) Load() int64 { return c.n.Load() }

      // CAS: сложить только если ещё не превысили лимит
      func (c *Counter) TryInc(limit int64) bool {
          for {
              cur := c.n.Load()
              if cur >= limit {
                  return false
              }
              if c.n.CompareAndSwap(cur, cur+1) {
                  return true
              }
          }
      }
      ```

      `atomic` выигрывает у mutex, когда защищается ровно одно слово и операция
      короткая; как только нужно атомарно менять несколько полей — берите mutex,
      иначе получите рассинхрон.
  - level: deep
    text_md: |
      Внутри `Mutex` — поле `state` (биты: locked, woken, starving, счётчик
      waiters) и семафор `sema`. Быстрый путь — один `CompareAndSwap` без
      системных вызовов. Медленный — `lockSlow` со спином (`runtime_canSpin`:
      несколько итераций active spin на многоядерке, если лок вот-вот
      освободится) и парковкой через `runtime_SemacquireMutex`. Порог starvation
      — константа `starvationThresholdNs = 1e6` (1ms). В starvation mode
      `runtime_Semrelease` вызывается с `handoff=true`, передавая лок напрямую.

      Детектор гонок (`-race`) построен на ThreadSanitizer: инструментируется
      каждый доступ к памяти, ведётся shadow memory и векторные часы
      (happens-before). Он ловит только реально исполненные в этом прогоне гонки —
      это динамический, а не статический анализ; отсутствие срабатываний не
      доказывает отсутствие гонок. Оверхед — примерно 5-10x по CPU и большой рост
      памяти, поэтому `-race` гоняют в CI/тестах, а не в проде под нагрузкой.

      False sharing: две независимые переменные в одной кэш-линии (64 байта) —
      запись в одну инвалидирует линию для другого ядра, и атомики/счётчики
      неожиданно тормозят под contention. Лечится паддингом до размера линии
      (`_ [64]byte` между полями) или размещением per-P/per-CPU данных, как это
      делает `sync.Pool`. Про memory model: с Go 1.19 официально зафиксировано,
      что `atomic`-операции ведут себя как sequentially consistent
      (последовательно-согласованные), что даёт строгие happens-before гарантии
      между парой store/load одной переменной — но не превращает отдельные
      atomic-обновления разных переменных в единую транзакцию.
