slug: waitgroup-loopvar-pitfalls
section: concurrency
title: "Ловушки WaitGroup и переменной цикла в горутинах"
tags: [goroutine, waitgroup]
difficulty: middle
question_md: |
  `sync.WaitGroup` — базовый примитив для ожидания группы горутин. Расскажите,
  как правильно им пользоваться: где вызывать `Add`, `Done`, `Wait`, какие
  ошибки приводят к панике или гонке. Отдельно разберите классическую ловушку
  захвата переменной цикла в горутине и что изменилось в Go 1.22.
answer_levels:
  - level: middle
    text_md: |
      `sync.WaitGroup` — это счётчик незавершённых задач. `Add(n)` увеличивает
      счётчик, `Done()` уменьшает на единицу, `Wait()` блокируется, пока счётчик
      не станет нулём. Главное правило: `Add` вызывается в родительской горутине
      **до** запуска дочерней, а не внутри неё, иначе `Wait` может увидеть нуль и
      выйти раньше, чем горутина реально стартовала. Внутри горутины ставят
      `defer wg.Done()`, чтобы декремент случился даже при раннем `return` или
      панике. Забытый `Add` приводит к раннему завершению `Wait`; лишний `Done`
      уводит счётчик в минус и вызывает панику `sync: negative WaitGroup counter`.

      Вторая ловушка — переменная цикла. До Go 1.22 переменная `i` в `for i := ...`
      была одна на все итерации, и все горутины видели её последнее значение.
      Фикс — переобъявить `i := i` внутри тела или передать значение параметром
      горутины. С Go 1.22 переменная цикла создаётся заново на каждой итерации,
      и эта ошибка больше не воспроизводится.
  - level: senior
    text_md: |
      Механика: `WaitGroup` хранит счётчик и число ожидающих в одном
      atomic-слове (state) плюс семафор для пробуждения ждущих. `Add`
      атомарно меняет счётчик; когда он доходит до нуля, все заблокированные в
      `Wait` пробуждаются через `runtime_Semrelease`. Отсюда требование
      вызывать `Add` до `go`: если `Add(1)` выполнить внутри горутины, между
      `go f()` и фактическим выполнением `Add` планировщик может отдать
      управление родителю, тот дойдёт до `Wait`, увидит нуль и продолжит — гонка
      и потерянное ожидание, которую поймает `-race`.

      `WaitGroup` нельзя копировать после первого использования: он содержит
      `noCopy`, и `go vet` (`copylocks`) выдаёт предупреждение. Передавайте его
      только по указателю. Типичный корректный шаблон:

      ```go
      func process(items []Item) {
          var wg sync.WaitGroup
          for _, it := range items {
              wg.Add(1)
              go func(it Item) {
                  defer wg.Done()
                  handle(it)
              }(it)
          }
          wg.Wait()
      }
      ```

      Крайние случаи: если горутина может паниковать, `defer wg.Done()`
      гарантирует декремент, но паника всё равно уронит процесс — оборачивайте
      тело в `recover`, если это допустимо. Нельзя переиспользовать `WaitGroup`
      с новыми `Add`, пока не все `Wait` вернулись (гонка reuse). Для повторного
      использования дождитесь полного `Wait`, затем начинайте новый цикл.
  - level: deep
    text_md: |
      На уровне рантайма (`src/sync/waitgroup.go`) состояние до Go 1.20 хранилось
      в 12 байтах с ручным выравниванием под 64-битный atomic на 32-битных
      платформах. С Go 1.20 внутри лежит `atomic.Uint64 state` (старшие 32 бита —
      счётчик, младшие — число waiters) и `atomic.Uint32 sema`. `Add` делает
      `state.Add(uint64(delta) << 32)`; если результат счётчика отрицателен —
      немедленная паника. Есть встроенные проверки на «Add конкурентно с Wait» и
      на положительный delta при ненулевом числе waiters — это ловит переиспользование.

      Про переменную цикла: до Go 1.22 спецификация определяла область видимости
      переменной `for`-клаузы на весь цикл (одна ячейка памяти). В Go 1.22
      (предложение `loopvar`, включённое через `go 1.22` в go.mod) семантика
      изменена — на каждой итерации создаётся новый экземпляр переменной, поэтому
      замыкание захватывает своё значение. Изменение управляется версией языка в
      `go.mod`: модуль с `go 1.21` сохраняет старое поведение даже на компиляторе
      1.22+. Инструмент диагностики — `go vet -loopclosure` (в 1.22 он перестроен
      с учётом новой семантики). До миграции самый надёжный приём — передавать
      значение аргументом горутины, он работает одинаково в обеих версиях.

      Смежная тема: `errgroup.Group` из `golang.org/x/sync` инкапсулирует
      `WaitGroup` + сбор первой ошибки + `context` cancel и снимает большинство
      ручных ошибок с `Add`/`Done`, поэтому в проде для «запустить N и дождаться»
      обычно берут именно его.
