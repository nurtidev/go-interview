slug: sync-cond
section: concurrency
title: "sync.Cond: зачем при каналах, Wait/Signal/Broadcast и цикл проверки"
difficulty: senior
tags: [sync, cond]
question_md: |
  Зачем нужен `sync.Cond`, если в Go есть каналы? Как работают `Wait`, `Signal`, `Broadcast`, почему `Wait` обязан вызываться в цикле проверки условия и под залоченным мьютексом? Как `Cond` устроен внутри (notifyList) и когда канал всё-таки лучше?
answer_levels:
  - level: middle
    text_md: |
      `sync.Cond` — condition variable: механизм, где одни горутины ждут наступления некоторого условия, а другие сигналят, что условие могло измениться. Создаётся поверх мьютекса:

      ```go
      c := sync.NewCond(&sync.Mutex{})
      ```

      Три метода:
      - `Wait()` — атомарно освобождает мьютекс и усыпляет горутину; при пробуждении снова захватывает мьютекс перед возвратом.
      - `Signal()` — будит **одну** ждущую горутину (если есть).
      - `Broadcast()` — будит **все** ждущие.

      Канонический шаблон — ждать в цикле, проверяя условие:

      ```go
      c.L.Lock()
      for !condition() { // именно for, не if!
          c.Wait()
      }
      // здесь condition() истинно и мьютекс залочен
      c.L.Unlock()
      ```

      А та сторона, что меняет состояние, делает это под тем же мьютексом и вызывает `Signal`/`Broadcast`:

      ```go
      c.L.Lock()
      state = ready
      c.L.Unlock()
      c.Broadcast()
      ```

      Типовой случай — ограниченная очередь/пул, где потребители ждут появления элемента, а производители будят их.
  - level: senior
    text_md: |
      **Почему обязательно `for`, а не `if`.** `Wait` не гарантирует, что при пробуждении условие истинно. Причины: (1) `Broadcast` будит всех, но элемент достанется только одному — остальные должны перепроверить и снова уснуть; (2) между пробуждением и повторным захватом мьютекса другая горутина могла «увести» состояние; (3) возможны spurious-подобные ситуации при конкуренции за мьютекс. Поэтому условие всегда перечитывается в цикле — это инвариант корректного использования condvar в любом языке.

      **Почему под мьютексом.** `Wait` требует, чтобы вызывающая горутина держала `c.L`. Он атомарно (с точки зрения других участников) кладёт горутину в очередь ожидания и отпускает мьютекс — это закрывает окно гонки «проверил условие → но не успел уснуть → сигнал прошёл мимо → уснул навсегда» (lost wakeup). Меняющая сторона тоже обязана менять состояние под мьютексом; сам `Signal`/`Broadcast` можно звать и вне лока, но состояние — под локом.

      **Signal vs Broadcast.** `Signal` — когда разбуженная горутина точно сможет обработать (одна единица работы → один потребитель). `Broadcast` — когда изменилось «глобальное» условие, которое может касаться многих (например `closed = true`, или снятие паузы у всех воркеров). Ошибка `Signal` там, где нужен `Broadcast`, ведёт к тому, что часть горутин так и спит.

      ```go
      // ограниченный буфер: producer будит одного потребителя
      func (q *Queue) Push(v int) {
          q.c.L.Lock()
          for len(q.buf) == q.cap { // ждём место
              q.notFull.Wait()
          }
          q.buf = append(q.buf, v)
          q.c.L.Unlock()
          q.notEmpty.Signal() // появился элемент — будим одного
      }
      ```

      **Когда Cond, когда канал.** Каналы в Go идиоматичнее и покрывают большинство задач «передать значение / сигнал». `sync.Cond` выигрывает в узком классе: **много ждущих одного изменяемого разделяемого состояния, где нужен именно Broadcast** (снять с паузы сразу N воркеров, «состояние стало X» для всех). Каналом «разбудить всех разом» моделируется только трюком с закрытием канала (`close(ch)` будит всех читателей) — и это, кстати, часто лучший инструмент для одноразового broadcast-события. `Cond` же уместен для повторяющихся сигналов по мутабельному состоянию.
  - level: deep
    text_md: |
      **Внутреннее устройство.** `sync.Cond` содержит `L Locker`, встроенный `notifyList` и `copyChecker` + `noCopy`. `notifyList` (в `runtime`) — это интрузивная очередь ожидающих горутин с двумя счётчиками-тикетами: `wait` (номер, выдаваемый входящему в ожидание) и `notify` (номер, до которого уже разбудили). `Wait` под капотом:

      1. `runtime_notifyListAdd` — атомарно берёт себе тикет `t = wait++` (ещё держа мьютекс);
      2. отпускает `c.L`;
      3. `runtime_notifyListWait(t)` — паркует горутину, связывая её с тикетом;
      4. по пробуждении — снова `c.L.Lock()` и возврат.

      `Signal` вызывает `runtime_notifyListNotifyOne` (будит одну горутину с наименьшим неразбуженным тикетом), `Broadcast` — `runtime_notifyListNotifyAll` (продвигает `notify` до `wait` и будит всех). Схема с тикетами гарантирует, что сигнал, пришедший *после* того как горутина взяла тикет, но *до* парковки, не будет потерян — это и есть защита от lost wakeup на уровне рантайма.

      `copyChecker` ловит копирование `Cond` после использования (копия ломает `notifyList`), поэтому `Cond` всегда передают указателем; `go vet` тоже ругается на копирование структур с `noCopy`.

      **Почему многие избегают Cond.** У `sync.Cond` неудобная эргономика: он не интегрируется с `select` и `context` — нельзя «ждать условие ИЛИ отмену контекста» в одном месте. Из-за этого graceful shutdown с `Cond` требует ручного трюка: хранить флаг `closed`, при отмене выставлять его под локом и звать `Broadcast`, а в цикле ожидания дополнительно проверять `closed` и возвращаться. Каналы это делают естественно через `select { case <-ch: ...; case <-ctx.Done(): ... }`. Именно поэтому в идиоматичном Go `Cond` встречается редко — в основном в высокопроизводительных примитивах и структурах данных (например, внутри некоторых пулов/очередей), а прикладной код почти всегда обходится каналами и `context`. Обсуждалось даже предложение задепрекейтить `sync.Cond`, но его оставили ради этих нишевых сценариев с массовым `Broadcast` по мутабельному состоянию.
