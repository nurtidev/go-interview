slug: merge-n-channels-first-k
section: concurrency
title: "Merge N каналов и первые K результатов"
tags: [channel, patterns]
difficulty: staff
question_md: |
  Как объединить (merge) динамическое число N каналов в один? Как получить первые
  K результатов и отменить остальные, не оставив утёкших горутин? Покажите вариант
  через `WaitGroup`/`errgroup` и через `reflect.Select`, а также паттерн «первый
  успешный».
answer_levels:
  - level: middle
    text_md: |
      Merge N каналов — это fan-in: на каждый входной канал запускаем горутину,
      которая перекладывает его элементы в общий `out`; после того как все входы
      исчерпаны, `out` закрывают (координация через `sync.WaitGroup` + отдельная
      горутина `wg.Wait(); close(out)`). Чтобы взять только первые K результатов,
      читаем `out` в цикле K раз и затем отменяем `context`, чтобы остальные
      горутины завершились. Главный риск — утечка горутин: если мы перестали
      читать `out`, а продюсеры блокируются на отправке, они зависнут. Поэтому
      отправка в `out` должна слушать `ctx.Done()` или `out` должен быть
      буферизованным под остаток.
  - level: senior
    text_md: |
      Идиоматичный merge N каналов — через `WaitGroup`, где каждая отправка
      слушает отмену; сбор первых K — читаем `out` ровно K раз и вызываем
      `cancel()`.

      ```go
      package main

      import (
          "context"
          "fmt"
          "sync"
      )

      func merge[T any](ctx context.Context, chans ...<-chan T) <-chan T {
          out := make(chan T)
          var wg sync.WaitGroup
          wg.Add(len(chans))
          for _, c := range chans {
              go func(c <-chan T) {
                  defer wg.Done()
                  for v := range c {
                      select {
                      case out <- v:
                      case <-ctx.Done():
                          return
                      }
                  }
              }(c)
          }
          go func() { wg.Wait(); close(out) }()
          return out
      }

      // FirstK читает первые k значений и отменяет остальных производителей.
      func FirstK[T any](ctx context.Context, k int, chans ...<-chan T) []T {
          ctx, cancel := context.WithCancel(ctx)
          defer cancel() // отменяем оставшихся при выходе

          merged := merge(ctx, chans...)
          out := make([]T, 0, k)
          for v := range merged {
              out = append(out, v)
              if len(out) == k {
                  return out // defer cancel() освободит продюсеров
              }
          }
          return out // каналов оказалось меньше k
      }

      func main() {
          ch := make(chan int, 3)
          ch <- 1
          ch <- 2
          ch <- 3
          close(ch)
          got := FirstK(context.Background(), 2, ch)
          fmt.Println(got) // [1 2]
      }
      ```

      Когда число каналов известно только в рантайме и хочется один `select`
      сразу по всем — `reflect.Select`:

      ```go
      import "reflect"

      func mergeReflect[T any](chans []<-chan T) <-chan T {
          out := make(chan T)
          go func() {
              defer close(out)
              cases := make([]reflect.SelectCase, len(chans))
              for i, c := range chans {
                  cases[i] = reflect.SelectCase{
                      Dir:  reflect.SelectRecv,
                      Chan: reflect.ValueOf(c),
                  }
              }
              for len(cases) > 0 {
                  i, v, ok := reflect.Select(cases)
                  if !ok { // канал закрыт — убираем его из набора
                      cases = append(cases[:i], cases[i+1:]...)
                      continue
                  }
                  out <- v.Interface().(T)
              }
          }()
          return out
      }
      ```

      `reflect.Select` дороже статического `select` (аллокации, отражение) и
      теряет типобезопасность, зато работает с произвольным N без запуска
      горутины на канал. Паттерн «первый успешный» — частный случай K=1: это по
      сути `errgroup` с отменой контекста после первого не-ошибочного результата.
  - level: deep
    text_md: |
      Утечка горутин в «первых K» — самая тонкая часть. Если `merge` пишет в
      небуферизованный `out` без `ctx.Done()` в `select`, то после возврата из
      `FirstK` продюсеры, у которых ещё были данные, навсегда зависнут на
      `out <- v`. Отсюда два обязательных элемента: (1) отправка в `out`
      обёрнута в `select` с отменой; (2) `cancel()` вызывается через `defer`,
      чтобы сработать на любом пути выхода. Альтернатива — буферизовать `out` под
      максимально возможный остаток, но это память впустую и не спасает при
      бесконечных источниках; `context` универсальнее.

      Про `reflect.Select`: под капотом он строит те же `scase`, что и обычный
      `select`, но динамически из среза `SelectCase`, и вызывает
      `runtime.reflect_rselect`. Есть предел — исторически число case ограничено
      (около 65536), и каждый вызов аллоцирует; в горячем пути это заметно. Для
      очень большого N дешевле рекурсивный merge деревом (`merge(merge(a,b),
      merge(c,d))`) или классический fan-in на горутинах — O(N) горутин, но без
      отражения и с сохранением типов через дженерики (Go 1.18+), что и делает
      generic-версию выше предпочтительной по умолчанию.

      «Первый успешный» правильно строить на `errgroup.WithContext`: каждая
      попытка в `g.Go`, первая успешная кладёт результат в буферизованный канал
      ёмкости 1 (`select { case res <- v: default: }`, чтобы не залипнуть, если
      уже кто-то записал) и вызывает отмену; `g.Wait()` дожидается остальных,
      которые видят `ctx.Done()` и выходят. Тонкость: результат-канал должен быть
      буферизованным (или отправка неблокирующей), иначе проигравшие горутины,
      пытаясь записать «свой» результат, зависнут после того, как читатель уже
      ушёл с первым ответом — это тот же класс утечки. Ещё нюанс: `errgroup`
      возвращает только первую ошибку, поэтому для «первого успеха» логику
      успеха/ошибки инвертируют вручную либо используют отдельный канал успеха и
      трактуют исчерпание всех попыток как общий провал.
follow_ups:
