slug: goroutine-deadlocks
section: concurrency
title: "Дедлоки горутин: сценарии, lock ordering, обнаружение и защита"
difficulty: senior
tags: [deadlock, goroutines]
question_md: |
  Сначала кратко: чем concurrency отличается от parallelism? Затем главное — какие бывают классические дедлоки горутин (взаимные блокировки, забытый Unlock, канал без читателя), что такое lock ordering, как рантайм Go детектит «all goroutines are asleep» и как снять goroutine dump через pprof? Как защищаться от дедлоков в проде?
answer_levels:
  - level: middle
    text_md: |
      **Concurrency vs parallelism (вводное).** Concurrency — про *структуру*: программа разбита на независимо продвигающиеся задачи (горутины), которые могут чередоваться даже на одном ядре. Parallelism — про *исполнение*: несколько задач физически работают одновременно на разных ядрах. Го-фраза Роба Пайка: «concurrency is about dealing with lots of things at once, parallelism is about doing lots of things at once». `GOMAXPROCS` задаёт степень реального параллелизма; concurrency же есть и при `GOMAXPROCS=1`.

      **Классические дедлоки.**

      1. *Канал без читателя/писателя.* Запись в небуферизованный канал блокируется, пока кто-то не читает; если читателя нет — навсегда.

      ```go
      func main() {
          ch := make(chan int)
          ch <- 1 // блокировка навсегда: некому читать
          // fatal error: all goroutines are asleep - deadlock!
      }
      ```

      2. *Забытый Unlock.* Взяли мьютекс и не отпустили (например, вышли по `return` до `Unlock`) — все следующие `Lock` виснут. Лечится `defer mu.Unlock()` сразу после `Lock`.

      3. *WaitGroup, который никогда не досчитает.* `wg.Wait()` виснет, если `wg.Done()` не был вызван нужное число раз (забыли `Done`, или горутина упала до него).

      Правило гигиены: захватил ресурс — сразу планируй освобождение (`defer`), у каждого канала есть понятный владелец, который его закрывает.
  - level: senior
    text_md: |
      **Взаимная блокировка двух мьютексов (lock ordering).** Классика: две горутины берут два мьютекса в разном порядке.

      ```go
      // Горутина 1: Lock(A) → Lock(B)
      // Горутина 2: Lock(B) → Lock(A)
      // Если обе успели взять первый лок — обе ждут второй вечно.
      ```

      Лекарство — **консистентный порядок захвата**: во всём коде всегда берём A раньше B (например, упорядочиваем по адресу/ID ресурса). Для перевода денег между счетами `id1`/`id2` — лочим сначала меньший id:

      ```go
      func transfer(a, b *Account, sum int) {
          first, second := a, b
          if a.id > b.id {
              first, second = b, a // единый порядок для всех
          }
          first.mu.Lock()
          defer first.mu.Unlock()
          second.mu.Lock()
          defer second.mu.Unlock()
          // ... перевод
      }
      ```

      **Прочие сценарии.** Двусторонний обмен по небуферизованным каналам (обе горутины пишут, прежде чем читать); `Wait` на `sync.WaitGroup` внутри горутины, которую сам же `Wait` должен дождаться; повторный `Lock` не-рекурсивного `sync.Mutex` в одной горутине (Go-мьютекс не reentrant — самоблокировка); чтение из канала, который забыли закрыть, в `range ch`.

      **Как Go детектит дедлок.** Рантайм отслеживает число активных (не заблокированных) горутин. Если **все** горутины заблокированы на синхронизации (каналы, мьютексы, WaitGroup) и ни одна не может продвинуться, планировщик печатает `fatal error: all goroutines are asleep - deadlock!` и падает. Важнейшее ограничение: детектор ловит только **глобальный** дедлок всей программы. **Частичный дедлок** — когда 2 горутины из тысячи висят, а остальные (в т.ч. HTTP-сервер) работают — рантайм НЕ поймает: программа продолжит жить, но с утечкой заблокированных горутин. Ещё детектор не срабатывает, если хоть одна горутина крутит busy-loop или спит на `time.Sleep`/сетевом I/O — с точки зрения рантайма она «жива».
  - level: deep
    text_md: |
      **Обнаружение в проде.** Раз рантайм ловит только полный дедлок, реальные висящие горутины ищут через **goroutine dump**:

      - `import _ "net/http/pprof"` открывает `/debug/pprof/goroutine`; `go tool pprof http://host/debug/pprof/goroutine` или `?debug=2` даёт стеки всех горутин с их состоянием (`chan receive`, `sync.Mutex.Lock`, `semacquire`) и **как долго** горутина в этом состоянии.
      - `SIGQUIT` (Ctrl+\ или `kill -QUIT`) печатает полный dump всех горутин в stderr — быстрый способ снять состояние с зависшего процесса.
      - `runtime.NumGoroutine()` как метрика: монотонно растущее число горутин — верный признак утечки/частичного дедлока (горутины блокируются и не завершаются).

      В дампе дедлок виден как группы горутин, взаимно ждущих на `sync.Mutex.Lock`/`chan send`, чьи стеки указывают на разный порядок захвата. `pprof` с меткой `[X minutes]` рядом с состоянием сразу показывает залипшие надолго горутины.

      **Инструменты и защита.**

      1. `go test -race` — детектор гонок; сам дедлоки не находит, но выявляет незащищённый доступ, который часто соседствует с ошибками блокировок.
      2. `go vet` (`copylocks`) — ловит копирование структур с мьютексами (копия мьютекса → рассинхрон блокировок → зависания).
      3. **Таймауты и context везде.** Блокирующую операцию оборачивают в `select` с `ctx.Done()`/`time.After`, чтобы висящая горутина умирала, а не копилась:

      ```go
      select {
      case ch <- v:
      case <-ctx.Done():
          return ctx.Err() // не виснем навсегда
      }
      ```

      4. `context.WithTimeout` на все внешние вызовы и на этапы pipeline.
      5. Внешние детекторы: `go.uber.org/goleak` в тестах ловит горутины, пережившие тест; линтеры и утилиты типа dingo-hunter/deadlock-детекторов для статического/динамического анализа порядка локов.

      **Профилактика на уровне дизайна.** (1) Единый порядок захвата мьютексов, задокументированный и по возможности проверяемый; лучше — не держать два лока одновременно вовсе (разбить критическую секцию). (2) Чёткое владение каналами: закрывает тот, кто пишет, и только он; не писать в канал, из которого никто гарантированно не читает. (3) Не звать внешний/блокирующий код под мьютексом (RPC, ожидание канала под локом — прямой путь к взаимоблокировке). (4) Предпочитать более крупные, но простые критические секции мелким переплетённым локам. (5) `sync.Mutex` не реентерабелен — рекурсивный захват в одной горутине повесит её; если тянет к рекурсивному локу, значит нужно перепроектировать (вынести незалоченный внутренний метод).
