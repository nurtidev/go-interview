slug: channels-buffered-ownership
section: concurrency
title: "Буферизованные и небуферизованные каналы, владение"
tags: [channel, patterns]
difficulty: middle
question_md: |
  В чём разница между буферизованным и небуферизованным каналом? Кто и когда
  должен закрывать канал? Что происходит при отправке в закрытый канал и чтении
  из него? Опишите идиому «владения» каналом и роль направленных и nil-каналов.
answer_levels:
  - level: middle
    text_md: |
      Небуферизованный канал (`make(chan T)`) — синхронный rendezvous: отправка
      блокируется, пока другая горутина не начнёт приём, и наоборот. Он
      гарантирует, что передача произошла «рука в руку». Буферизованный
      (`make(chan T, n)`) хранит до `n` элементов: отправка не блокируется, пока
      есть место, приём — пока есть элементы; при полном буфере отправитель ждёт,
      при пустом — получатель.

      Закрывать канал должен только владелец-отправитель, и никогда получатель.
      `close` — это сигнал «данных больше не будет». `range` по каналу читает до
      закрытия. Отправка в закрытый канал вызывает панику `send on closed
      channel`; чтение из закрытого возвращает нулевое значение и `ok == false`
      (`v, ok := <-ch`). Направленные типы `chan<- T` (только отправка) и
      `<-chan T` (только приём) в сигнатурах фиксируют роль и не дают закрыть
      канал не тому, кому нельзя.
  - level: senior
    text_md: |
      Идиома владения: тот, кто пишет в канал, тот его и закрывает — это
      исключает двойное закрытие и панику. Если писателей несколько, никто из них
      не закрывает канал в одиночку; координацию делают через `sync.WaitGroup`
      (закрыть после `Wait`) или отдельный done-канал/`context`.

      Типовой шаблон «генератор владеет и закрывает»:

      ```go
      func gen(nums ...int) <-chan int {
          out := make(chan int)
          go func() {
              defer close(out) // владелец закрывает
              for _, n := range nums {
                  out <- n
              }
          }()
          return out // отдаём как receive-only
      }
      ```

      Тонкости: `nil`-канал в `select` навсегда отключает ветку — приём и
      отправка на `nil`-канал блокируются вечно; этим динамически «выключают»
      источник, присвоив переменной канала `nil`. Закрытый канал в `select`
      всегда «готов» на приём, поэтому забытый `nil` после закрытия вызывает
      busy-loop. Буфер — это не про производительность «на всякий случай»: лишний
      буфер маскирует backpressure и прячет дедлоки. Размер буфера выбирают
      осознанно: `1` для сигнала «сделай и не жди», `N` под конкретный batch,
      небуферизованный — когда нужна строгая синхронизация и гарантия доставки.
  - level: deep
    text_md: |
      Внутри канал — это `hchan` (`src/runtime/chan.go`): кольцевой буфер
      `buf`, индексы `sendx`/`recvx`, счётчик `qcount`, флаг `closed`, `lock`
      (обычный mutex, не спинлок) и две очереди ожидающих — `sendq` и `recvq`
      из `sudog`. Небуферизованная передача идёт напрямую из стека отправителя в
      стек получателя (`sendDirect`) минуя буфер — это единственное место, где
      рантайм пишет в стек другой горутины, поэтому есть особая работа с write
      barrier. Отправка/приём захватывают `lock`; при готовом партнёре горутина
      снимается с очереди и помечается `goready`.

      `close` под локом выставляет `closed=1`, будит всех в `recvq` (они получат
      нулевое значение) и всех в `sendq` (они паникуют). Отсюда: паника при
      `send on closed` и корректный `ok=false` при приёме. Приём из закрытого
      непустого буфера сначала отдаёт оставшиеся элементы и только потом
      `ok=false` — `range` дочитывает буфер до конца.

      Happens-before гарантии из memory model: отправка happens-before
      завершения соответствующего приёма; закрытие канала happens-before приёма,
      вернувшего `ok=false`. Это и делает канал средством синхронизации, а не
      только передачи данных. По эволюции: до Go 1.14 не было асинхронной
      вытеснимости, и busy-loop на закрытом канале мог держать P; сейчас
      preemption сигнальная, но логическая ошибка (100% CPU на «готовом» канале)
      осталась — лечится обнулением канала в `select`.
