slug: select-patterns-timeout
section: concurrency
title: "select: таймауты, default, приоритеты"
tags: [select, channel]
difficulty: senior
question_md: |
  Как работает `select`, если готовы несколько веток? Как сделать неблокирующую
  операцию, таймаут и приоритет одной ветки над другой? В чём ловушка `time.After`
  в горячем цикле и что изменилось с таймерами в Go 1.23?
answer_levels:
  - level: middle
    text_md: |
      `select` ждёт, пока станет готова хотя бы одна из веток `case`. Если готовы
      сразу несколько, выбирается случайная равновероятно — это защита от
      голодания. Ветка `default` делает операцию неблокирующей: если ни один
      `case` не готов немедленно, выполняется `default`. Таймаут задают через
      `case <-time.After(d)`. Пустой `select{}` блокируется навсегда. Отмену
      обычно вешают на `case <-ctx.Done()`. Классический каркас — `for`-`select`:
      цикл, внутри `select` с ветками данных, таймаута и отмены.
  - level: senior
    text_md: |
      Равновероятный выбор реализован псевдослучайной перестановкой порядка
      опроса `case` — нельзя закладываться на порядок объявления. Приоритет одной
      ветки над другой делают вложенным `select` с `default`: сначала пробуют
      приоритетный канал неблокирующе, и только если он пуст — общий `select`.

      ```go
      // высокий приоритет у high перед low
      for {
          select {
          case <-ctx.Done():
              return
          case v := <-high:
              handle(v)
          default:
              select {
              case <-ctx.Done():
                  return
              case v := <-high:
                  handle(v)
              case v := <-low:
                  handle(v)
              }
          }
      }
      ```

      Главная ловушка — `time.After` в цикле. Каждый вызов создаёт новый `Timer`,
      и до Go 1.23 этот таймер жил до момента срабатывания, даже если ветка не
      выбрана: в горячем `for`-`select` это накапливает таймеры и мусор. Правильно
      — переиспользовать `time.NewTimer` + `Stop`/`Reset`:

      ```go
      t := time.NewTimer(d)
      defer t.Stop()
      for {
          if !t.Stop() { // осушаем перед Reset
              select { case <-t.C: default: }
          }
          t.Reset(d)
          select {
          case v := <-in:
              process(v)
          case <-t.C:
              return // таймаут бездействия
          }
      }
      ```
  - level: deep
    text_md: |
      `select` компилируется не в цикл `if`, а в вызов `runtime.selectgo`
      (`src/runtime/select.go`). Он формирует массив `scase`, генерирует две
      перестановки — `pollorder` (случайный порядок опроса, отсюда честность) и
      `lockorder` (по адресу канала, чтобы избежать deadlock при захвате
      нескольких локов). Проходит каналы: если есть готовый — выполняет обмен;
      иначе ставит горутину в очереди всех каналов через `sudog` и паркует. При
      пробуждении снимает себя с прочих очередей. `default` — это `scase` без
      канала: если после первого прохода никто не готов, берётся он. Пустой
      `select{}` компилятор превращает в `block()` — вечная парковка.

      Про таймеры и Go 1.23: раньше таймеры жили в отдельных «timer heaps» на
      каждом P, и `time.After` держал ссылку в куче до срабатывания — недостижимый
      с точки зрения программы таймер всё равно не собирался GC до дедлайна.
      В Go 1.23 таймеры перепроектированы: реализация переехала ближе к рантайму,
      и таймер, на канал которого больше никто не ссылается, может быть собран GC
      немедленно, а `t.C` стал небуферизованным (раньше буфер 1), что убрало класс
      багов с «протухшим» значением после `Reset`. Практический вывод: в 1.23+
      `time.After` в цикле менее опасен по памяти, но идиома `NewTimer`+`Reset`
      всё равно предпочтительна ради явного контроля и совместимости со старыми
      версиями. Тонкость `Reset`: по документации канал таймера нужно осушить
      перед `Reset`, если `Stop` вернул `false`, иначе можно словить устаревший
      тик; в 1.23 это упрощено, но безопасный шаблон осушения остаётся идиомой.
