slug: sync-once-pool-map
section: concurrency
title: "sync.Once, sync.Pool и sync.Map: устройство и применение"
tags: [sync, pool]
difficulty: senior
question_md: |
  Разберите три примитива: `sync.Once` (в том числе `OnceFunc`/`OnceValue` из Go
  1.21), `sync.Pool` (per-P пулы, victim cache, отношение к GC) и `sync.Map`
  (read/dirty). Как каждый устроен внутри и когда его стоит применять, а когда
  лучше обычная map под mutex?
answer_levels:
  - level: middle
    text_md: |
      `sync.Once` гарантирует, что функция выполнится ровно один раз, даже при
      конкурентных вызовах `Do(f)` — типичная ленивая инициализация синглтона.
      `sync.Pool` — пул переиспользуемых временных объектов (например, буферов):
      `Get` берёт из пула или создаёт новый, `Put` возвращает; снижает нагрузку
      на аллокатор и GC. `sync.Map` — конкурентная map без внешней блокировки,
      оптимизированная под сценарии «пишем один раз, читаем много» или когда
      разные горутины работают с непересекающимися ключами. В остальных случаях
      обычная `map` под `sync.Mutex`/`RWMutex` проще и часто быстрее.
  - level: senior
    text_md: |
      `sync.Once` — атомарный флаг `done` (быстрый путь `if o.done.Load() == 0`)
      плюс `Mutex` для медленного пути, где под локом повторно проверяется `done`
      (double-checked locking) и вызывается `f`. Важно: `done` выставляется через
      `defer` даже если `f` паникует, — повторный `Do` уже не выполнит `f`. С Go
      1.21 есть `sync.OnceFunc`, `sync.OnceValue[T]`, `sync.OnceValues[T1,T2]` —
      удобные обёртки, возвращающие мемоизированную функцию:

      ```go
      var loadConfig = sync.OnceValue(func() Config {
          return readConfigFromDisk() // выполнится при первом вызове
      })
      // далее в коде: cfg := loadConfig() — дальнейшие вызовы отдают кэш
      ```

      `sync.Pool` держит per-P локальные списки (`poolLocal`), поэтому `Get`/`Put`
      в норме идут без контеншена и почти без синхронизации. Ключевое свойство:
      пул очищается сборщиком мусора. С Go 1.13 добавлен victim cache — при GC
      текущие объекты переезжают в «victim», и только следующий GC их выбросит,
      что сглаживает провалы после сборки. Вывод: `Pool` годится для временных,
      легко воссоздаваемых объектов (байтовые буферы, `bytes.Buffer`), но не для
      долгоживущих или дорогих/ценных ресурсов (соединения) — их в любой момент
      может забрать GC.

      ```go
      var bufPool = sync.Pool{New: func() any { return new(bytes.Buffer) }}

      func render(w io.Writer) {
          b := bufPool.Get().(*bytes.Buffer)
          b.Reset()             // обязательно чистим перед использованием
          defer bufPool.Put(b)  // и возвращаем
          b.WriteString("...")
          w.Write(b.Bytes())
      }
      ```

      `sync.Map` внутри — атомарный `read` (почти неизменяемый снимок,
      читается без лока) и `dirty` под `Mutex`. Промахи по `read` считаются, и
      после порога `dirty` повышается в `read`. Выгодна при append-only или когда
      ключи слабо пересекаются между горутинами; при активной смеси
      чтения/записи одних и тех же ключей обычная map + `RWMutex` быстрее.
  - level: deep
    text_md: |
      `Once`: раньше `done` был `uint32` с `atomic.LoadUint32`; в актуальных
      версиях — `atomic.Uint32`/`atomic.Bool`. Быстрый путь — одна атомарная
      загрузка без барьеров дороже необходимого, поэтому `Do` inline-ится, а
      медленный путь вынесен в `doSlow`, чтобы не раздувать горячий код.
      Гарантия memory model: возврат из `Do` happens-before любого последующего
      `Do`, значит все записи внутри `f` видны после первого `Do` — на этом
      строится безопасная ленивая инициализация.

      `Pool`: структура — массив `poolLocal` по числу P (индекс через `pid` из
      `runtime_procPin`, отключающего вытеснение на время доступа). Каждый
      `poolLocal` имеет `private` (один объект без синхронизации) и shared —
      lock-free двустороннюю очередь (`poolChain`): владелец-P работает с одного
      конца, воры (steal) с других P — с другого. `poolCleanup` регистрируется
      рантаймом и вызывается в начале mark-фазы GC (STW): shared текущих пулов
      уезжает в `victim`, старый `victim` обнуляется. Отсюда цикл жизни объекта —
      максимум два GC. Именно поэтому нельзя закладываться на сохранность и число
      объектов в пуле. `sync.Pool` — один из немногих потребителей per-P хранения
      в стандартной библиотеке, и он же иллюстрация борьбы с false sharing через
      локальность.

      `sync.Map`: `read` — это `readOnly{ m map[K]*entry; amended bool }`,
      загружаемый атомарно. `entry` хранит `*value` с тремя состояниями: живое,
      `nil` (удалено, но ещё в read) и `expunged` (вычищено в dirty). Удаление —
      логическое (пометка), физическое вытеснение происходит при пересборке
      dirty. Счётчик `misses`: когда промахи по read достигают размера dirty,
      dirty становится новым read, а dirty обнуляется (amortized O(1) на
      операцию). Это объясняет асимптотику: read-heavy почти бесплатно, но
      write-heavy запускает частые пересборки и проигрывает `RWMutex`. Дженериковой
      `sync.Map[K,V]` в stdlib нет по сей день — API остаётся `any`; типобезопасные
      обёртки пишут поверх или берут сторонние конкурентные map (например,
      шардированные).
