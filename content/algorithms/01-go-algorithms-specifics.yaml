slug: go-algorithms-specifics
section: algorithms
title: "Специфика решения алгоритмов на Go"
difficulty: middle
tags: [leetcode, idioms]
question_md: |
  Какие особенности языка Go важно учитывать при решении алгоритмических задач в стиле LeetCode? Разберите работу со строками (руны и байты), эффективную конкатенацию, сортировку, кучу, встроенные `min`/`max`, слайс как стек, `map` как множество и арифметику с отрицательными числами.
answer_levels:
  - level: middle
    text_md: |
      В Go строка — неизменяемая последовательность байт UTF-8; `range` по строке возвращает руны, а индексация `s[i]` — байты, поэтому `len(s)` считает байты, а не символы. Конкатенация в цикле через `+=` создаёт новую строку на каждой итерации — это O(n^2); идиоматичный способ — `strings.Builder` с `WriteString`, работающий амортизированно за O(n). Для сортировки есть `sort.Ints`/`sort.Strings` для примитивов, `sort.Slice` с компаратором для структур, а с Go 1.21 — обобщённый пакет `slices` (`slices.Sort`, `slices.SortFunc`), не использующий reflection. Приоритетная очередь строится через интерфейс `container/heap.Interface`: пакет умеет только переставлять элементы вашего слайса, а хранение и сравнение — ваша ответственность.

      С Go 1.21 добавлены builtin `min`/`max` для любых упорядочиваемых типов — раньше их писали руками или брали стартовые значения из `math.MaxInt`/`math.MinInt`. Слайс удобно использовать как стек (`append`/`s = s[:len(s)-1]`), а множество — как `map[T]struct{}`, где пустая структура не расходует память на значение. И важная ловушка: деление и остаток в Go округляются к нулю, а не к минус бесконечности, так что `-7 / 2 == -3` и `-7 % 2 == -1`, в отличие, например, от Python.
  - level: senior
    text_md: |
      На собеседовании уровня senior важно не просто знать эти факты, а объяснять cost model. Рассмотрим итерацию по строке:

      ```go
      s := "привет"
      for i, r := range s {
          fmt.Println(i, r) // i — байтовое смещение, r — rune (int32)
      }
      fmt.Println(len(s))                    // 12 байт (6 букв * 2 байта в UTF-8)
      fmt.Println(utf8.RuneCountInString(s)) // 6 рун
      ```

      Если задача требует случайного доступа к «символам» (палиндромы, обратный порядок) для не-ASCII строк, `s[i]` не годится — нужно сначала `r := []rune(s)`, что даёт O(n) копирование и отдельную аллокацию, после чего доступ по индексу уже корректен, но обратная сборка строки `string(r)` — это ещё одна аллокация и повторная UTF-8-кодировка.

      Для конкатенации в цикле:

      ```go
      var b strings.Builder
      b.Grow(n) // если размер известен — одна аллокация вместо серии реаллокаций
      for _, w := range words {
          b.WriteString(w)
          b.WriteByte(' ')
      }
      result := b.String() // без лишнего копирования
      ```

      `+=` в цикле из n строк даёт O(n^2) суммарно, потому что каждая конкатенация копирует всё, что накоплено; `Builder` растит внутренний `[]byte` по той же схеме, что и `append`, так что суммарная работа амортизированно линейна.

      Сортировка и куча:

      ```go
      type byFreq []Item
      func (a byFreq) Len() int           { return len(a) }
      func (a byFreq) Less(i, j int) bool { return a[i].Count < a[j].Count } // min-heap
      func (a byFreq) Swap(i, j int)      { a[i], a[j] = a[j], a[i] }

      func (a *byFreq) Push(x any) { *a = append(*a, x.(Item)) }
      func (a *byFreq) Pop() any {
          old := *a
          n := len(old)
          item := old[n-1]
          *a = old[:n-1]
          return item
      }
      ```

      Ключевая ловушка: `Push`/`Pop` у типа вызывать напрямую нельзя — они вызываются только через `heap.Push(&h, x)`/`heap.Pop(&h)`, которые дополнительно восстанавливают heap-инвариант через sift-up/sift-down. Прямой вызов `h.Pop()` не трогает кучу и просто отрезает последний элемент слайса.

      С Go 1.21 обобщённые `slices.Sort`/`slices.SortFunc` избавляют от boxing через `any` и reflection, которые есть внутри `sort.Slice` — на больших срезах структур разница в скорости заметна. Аналогично `min`/`max` — builtin работает по constraint `cmp.Ordered` (числа, строки), но не по кастомным компараторам; для сложных типов всё равно нужен ручной код или `slices.MaxFunc`.

      Стек и множество:

      ```go
      stack := make([]int, 0, n) // предвыделение — без этого append реаллоцирует и копирует несколько раз
      stack = append(stack, x)
      top := stack[len(stack)-1]
      stack = stack[:len(stack)-1]

      seen := make(map[int]struct{}, n)
      seen[x] = struct{}{}
      _, ok := seen[x]
      ```

      Наконец, арифметика: `-7 / 2 == -3` и `-7 % 2 == -1` — Go всегда округляет деление к нулю и следует правилу `a == (a/b)*b + a%b`, так что знак остатка совпадает со знаком делимого. Это критично в задачах на модульную арифметику (кольцевой буфер, hash mod): наивный `idx % n` для отрицательного `idx` даст отрицательный результат, и нужно нормализовать через `((idx % n) + n) % n`.
  - level: deep
    text_md: |
      Несколько тонкостей, которые проверяют на staff-уровне.

      `strings.Builder` устроен как обёртка над `[]byte` с запретом копирования (внутренняя проверка `copyCheck` паникует, если `Builder` скопирован по значению после первой записи). Метод `String()` не копирует байты — использует unsafe-приведение внутреннего буфера к строке, то есть возвращаемая строка технически делит память с внутренним буфером, но так как `Builder` больше не мутируется после чтения в идиоматичном коде, это безопасно. Рост буфера подчиняется той же кривой, что и `growslice` для обычных слайсов (плавный переход от 2x к 1.25x с округлением до size class аллокатора), поэтому `Grow(n)` до цикла даёт одну аллокацию точного (или чуть большего, из-за округления) размера вместо нескольких копирований.

      Конвертация `[]rune(s)` и обратно `string(rs)` — не бесплатная операция: обе делают полный проход по строке с UTF-8-декодированием/кодированием и отдельную аллокацию на куче (переменная «сбегает» в кучу для escape-анализа), что важно для профилирования. Для задач вида «палиндром с учётом юникода» это неизбежная плата, но для чисто ASCII-строк дешевле работать напрямую с байтами (`s[i]`), не декодируя UTF-8.

      `sort.Slice` под капотом использует `reflect.Swapper` и хранит компаратор как замыкание `func(i, j int) bool` — замыкание почти всегда аллоцируется в куче, а `Swap` идёт через reflection над `interface{}`, что медленнее прямого свопа конкретного типа. `slices.Sort`/`slices.SortFunc` (Go 1.21+) работают на конкретном типе через generics без reflection и с Go 1.19 используют pattern-defeating quicksort (pdqsort) — гибрид, защищённый от квадратичного поведения на «состязательных» входах и переключающийся на heapsort при превышении лимита рекурсии, что гарантирует worst-case O(n log n).

      Для `container/heap`: `heap.Init` строит кучу за O(n) (bottom-up heapify через sift-down от середины к началу), а не O(n log n), как может показаться из наивного «n раз вставить» подхода; `Push`/`Pop` — каждый O(log n) из-за sift-up/sift-down. Builtin `min`/`max` компилируются как интринсики без вызова функции; для float есть отдельная тонкость — если один из аргументов NaN, результат `min`/`max` тоже NaN независимо от порядка, согласно спецификации.

      Отдельная ловушка с отрицательными числами: `math.MinInt / -1` не паникует — из-за two's complement результат тихо переполняется обратно в `math.MinInt`. Целочисленное деление на литеральный `0` — ошибка компиляции, деление на переменную `0` — паника в runtime (`integer divide by zero`), тогда как для `float64` деление на `0.0` даёт `+Inf`/`-Inf`/`NaN` без паники — если в задаче встречаются оба пути, это частая причина падения на edge-кейсе.

      И последнее: порядок обхода `map` в Go рантайм намеренно рандомизирует (случайный seed и стартовый бакет), поэтому `map[T]struct{}` как множество никогда не даёт детерминированного порядка перечисления — если тест ожидает стабильный вывод, ключи нужно собрать в слайс и отдельно отсортировать (`slices.Sort`). Это не баг, а осознанное решение авторов языка против случайной зависимости кода от порядка хеш-таблицы.
