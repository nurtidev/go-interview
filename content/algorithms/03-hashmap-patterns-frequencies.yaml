slug: hashmap-patterns-frequencies
section: algorithms
title: "Паттерны с hash map: частоты и префиксные суммы"
difficulty: middle
tags: [hashmap, prefix-sum]
question_md: |
  Какие типовые паттерны решаются через hash map в алгоритмических задачах: подсчёт частот, two-sum, префиксные суммы для подсчёта подмассивов с заданной суммой, группировка анаграмм? Приведите Go-реализацию two-sum и «subarray sum equals K».
answer_levels:
  - level: middle
    text_md: |
      Hash map (`map` в Go) — рабочая лошадка для задач, где нужен быстрый (O(1) в среднем) поиск «встречали ли мы это значение раньше» и что с ним было связано. Самый частый паттерн — подсчёт частот: `counts := make(map[rune]int); counts[c]++` — используется в задачах про анаграммы, дубликаты, мажоритарный элемент. Two-sum решается за один проход: для каждого числа `x` проверяем, есть ли в map `target - x`, если нет — кладём `x → index` и идём дальше; так пара находится за O(n) вместо O(n^2) с вложенным циклом.

      Префиксные суммы в паре с map решают задачи «количество подмассивов с суммой K»: считаем running prefix sum `sum`, и на каждом шаге ищем в map, сколько раз встречалась `sum - K` — это и есть число подмассивов, заканчивающихся в текущей точке с нужной суммой; сам текущий `sum` тоже добавляется в map для будущих шагов. Группировка анаграмм делается через map, где ключ — «подпись» строки (отсортированные буквы или частотный вектор), а значение — слайс исходных строк с такой подписью. Множество — это `map[T]struct{}`, где важен только факт наличия ключа. И важно помнить: итерация по `map` в Go не гарантирует порядок (он специально рандомизирован), поэтому для детерминированного вывода ключи собирают в слайс и сортируют отдельно, например через `slices.Sort`.
  - level: senior
    text_md: |
      Полный рабочий шаблон two-sum:

      ```go
      func twoSum(nums []int, target int) []int {
          seen := make(map[int]int, len(nums)) // value -> index
          for i, x := range nums {
              if j, ok := seen[target-x]; ok {
                  return []int{j, i}
              }
              seen[x] = i
          }
          return nil // по условию задачи гарантируется решение, но защититься стоит
      }
      ```

      Время — O(n), память — O(n) на map. Ключевая деталь порядка операций: сначала проверяем `target-x` в уже накопленном map, потом кладём `x`, а не наоборот — иначе для `target == 2*x` элемент мог бы «найти сам себя» на том же индексе. Edge cases: дубликаты значений (map хранит последний виденный индекс для значения); отрицательные числа обрабатываются без изменений, так как map по `int` работает одинаково для любого знака.

      Subarray sum equals K — классика на префиксные суммы:

      ```go
      func subarraySum(nums []int, k int) int {
          prefixCount := map[int]int{0: 1} // пустой префикс с суммой 0 встретился 1 раз
          sum, result := 0, 0
          for _, x := range nums {
              sum += x
              result += prefixCount[sum-k] // сколько префиксов дают нужную сумму, если их вычесть
              prefixCount[sum]++
          }
          return result
      }
      ```

      Инициализация `prefixCount[0] = 1` — необходимое условие корректности: она покрывает случай, когда подмассив с суммой K начинается с самого начала массива (пустой префикс). Без неё такие подмассивы теряются. Сложность — O(n) времени и O(n) памяти в худшем случае (все префиксные суммы разные). Доступ `prefixCount[sum-k]` для отсутствующего ключа возвращает нулевое значение типа (здесь `0`), это не паника и не отдельная ветка — упрощает код по сравнению с языками, требующими явной проверки на `nil`/`KeyError`.

      Группировка анаграмм с полным шаблоном:

      ```go
      func groupAnagrams(strs []string) [][]string {
          groups := make(map[[26]byte][]string, len(strs))
          for _, s := range strs {
              var sig [26]byte
              for i := 0; i < len(s); i++ {
                  sig[s[i]-'a']++
              }
              groups[sig] = append(groups[sig], s)
          }
          result := make([][]string, 0, len(groups))
          for _, g := range groups {
              result = append(result, g)
          }
          return result
      }
      ```

      Здесь ключ map — не отсортированная строка, а массив фиксированного размера `[26]byte` — массивы в Go сравнимы и хешируемы, если сравнимы их элементы, поэтому подходят как ключ без явной сортировки строки (O(n) построение подписи вместо O(n log n) сортировки на каждую строку).
  - level: deep
    text_md: |
      На собеседовании senior/staff часто просят объяснить, почему map даёт именно «O(1) в среднем», а не всегда. Go map — hash table с бакетами (`runtime.hmap`/`bmap`), каждый бакет хранит до 8 пар «ключ-значение» плюс overflow-бакеты при коллизиях; сложность операции в среднем O(1), но в худшем случае (много коллизий одного бакета) может деградировать до O(k) для k элементов в переполненной цепочке — на практике редкость благодаря тому, что Go рандомизирует seed хеш-функции при старте программы (защита от hash-flooding атак). Стоимость самой хеш-функции растёт с размером ключа: для `int` — несколько ALU-инструкций (aeshash на amd64/arm64 с AES-NI, иначе fallback на memhash), а для `string` или `[26]byte` — хеширование пропорционально длине ключа. Отсюда практический вывод для анаграмм: подпись как массив частот `[26]byte` (фиксированная длина) хешируется быстрее и предсказуемее, чем подпись как отсортированная строка длиной n, хотя построение самой подписи одинаково по порядку O(n) в обоих случаях — выигрыш именно в конструкции ключа как значения фиксированного размера.

      Важная тонкость типов: массив `[26]byte` — сравнимый тип (comparable), поэтому годится как ключ map «из коробки»; слайс `[]byte` — не сравнимый, использовать как ключ нельзя (ошибка компиляции), поэтому либо конвертируют в `string(slice)` (одна аллокация и копирование), либо, как в шаблоне выше, используют массив. Для алфавитов за пределами `a-z` (юникод, смешанный регистр) трюк с `[26]byte` не работает вообще — нужен `map[rune]int` внутри подписи или сортировка рун, и тогда придётся вернуться к строковому ключу со всеми издержками кодирования.

      Ещё один нюанс — предварительный размер map. `make(map[K]V, n)` передаёт runtime подсказку об ожидаемом числе элементов, что позволяет сразу выделить нужное число бакетов и избежать серии инкрементальных рехешей при заполнении за пределы load factor (~6.5 элементов на бакет) — на горячем пути алгоритмической задачи с известным `len(nums)` это прямая экономия аллокаций, аналогично `make([]T, 0, n)` для слайсов.

      По поводу prefix sum: суммы должны считаться в типе, который не переполнится — для больших значений и длинных массивов накопленная сумма легко выходит за пределы `int32`, и Go не защитит от этого автоматически (целочисленное переполнение — тихое, wraps по модулю без паники), поэтому аккумулятор `sum` стоит явно объявлять как `int`/`int64` независимо от типа элементов входного слайса — частая причина неверного ответа именно на «больших» тестах, которую сложно поймать на маленьких примерах.
