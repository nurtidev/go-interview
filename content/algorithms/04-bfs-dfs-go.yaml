slug: bfs-dfs-go
section: algorithms
title: "BFS и DFS на Go: очередь, стек, ловушки"
difficulty: middle
tags: [bfs, dfs]
question_md: |
  Как реализовать BFS и DFS на Go для графа и для сетки (grid)? Разберите очередь на слайсе, обход по уровням, рекурсивный и итеративный DFS, представление графа и ловушки с visited-множеством.
answer_levels:
  - level: middle
    text_md: |
      BFS обходит граф «по слоям» от стартовой вершины и на слайсе Go обычно реализуется как очередь: `queue := []int{start}`, на каждой итерации берём `queue[0]`, обрабатываем и добавляем соседей в конец, а голову убираем через `queue = queue[1:]`. Обязательно нужен `visited` — `map[int]bool` или `[]bool` по числу вершин — без него граф с циклами вызовет бесконечный обход; помечать вершину как посещённую нужно в момент постановки в очередь, а не в момент обработки, иначе одна и та же вершина может попасть в очередь несколько раз через разных соседей.

      Обход по уровням делается фиксацией `levelSize := len(queue)` перед внутренним циклом — тогда ровно `levelSize` элементов текущего слоя обрабатываются, а всё, что добавится в процессе, относится уже к следующему слою. DFS можно писать рекурсивно — просто и читаемо, но используется стек вызовов, и для очень глубоких графов есть риск исчерпать стек goroutine; либо итеративно — с явным слайсом-стеком, где `push` — `append`, а `pop` — взятие последнего элемента и `stack = stack[:len(stack)-1]`. Граф обычно хранится как `map[int][]int` (список смежности, гибко для разреженных графов) либо как матрица смежности (быстрый доступ, но O(V^2) памяти). Для сеток соседей задают через слайс направлений `dirs := [][2]int{{0,1},{0,-1},{1,0},{-1,0}}` и проверяют границы перед добавлением в очередь/стек.
  - level: senior
    text_md: |
      Полный шаблон BFS с обходом по уровням на графе-списке смежности:

      ```go
      func bfsLevels(graph map[int][]int, start int) [][]int {
          visited := map[int]bool{start: true}
          queue := []int{start}
          var levels [][]int

          for len(queue) > 0 {
              levelSize := len(queue)
              level := make([]int, 0, levelSize)
              for i := 0; i < levelSize; i++ {
                  node := queue[0]
                  queue = queue[1:]
                  level = append(level, node)
                  for _, next := range graph[node] {
                      if !visited[next] {
                          visited[next] = true // помечаем при постановке в очередь
                          queue = append(queue, next)
                      }
                  }
              }
              levels = append(levels, level)
          }
          return levels
      }
      ```

      Сложность — O(V + E): каждая вершина попадает в очередь один раз (за счёт `visited`), каждое ребро просматривается один или два раза (в зависимости от направленности графа). `queue = queue[1:]` работает, но не освобождает память под уже пройденную голову — базовый указатель слайса просто сдвигается, а исходный backing array живёт, пока жив хоть один слайс на него; для очень большого графа практичнее держать индекс головы (`head int`, `queue[head]`, `head++`) и не трогать сам слайс, либо периодически «сбрасывать» его в новый через `copy`.

      DFS — рекурсивный вариант:

      ```go
      func dfsRecursive(graph map[int][]int, node int, visited map[int]bool, order *[]int) {
          if visited[node] {
              return
          }
          visited[node] = true
          *order = append(*order, node)
          for _, next := range graph[node] {
              dfsRecursive(graph, next, visited, order)
          }
      }
      ```

      И итеративный, с явным стеком на слайсе — важно, что проверка `visited` здесь обычно делается при извлечении из стека, а не при постановке, потому что одна и та же вершина может быть положена в стек несколько раз через разных предков до того, как будет обработана:

      ```go
      func dfsIterative(graph map[int][]int, start int) []int {
          visited := make(map[int]bool)
          stack := []int{start}
          var order []int

          for len(stack) > 0 {
              node := stack[len(stack)-1]
              stack = stack[:len(stack)-1]
              if visited[node] {
                  continue
              }
              visited[node] = true
              order = append(order, node)
              for _, next := range graph[node] {
                  stack = append(stack, next)
              }
          }
          return order
      }
      ```

      Оба варианта DFS — O(V + E). Ключевая ловушка рекурсивного DFS — переполнение стека вызовов goroutine на очень глубоких графах: стек goroutine растёт динамически (начиная с 2 КБ, до предела в районе 1 ГБ по умолчанию), так что на практике лимит выше, чем в языках с фиксированным стеком, но при большой глубине рекурсии стоит переключаться на итеративный вариант. Для сетки (обход острова в матрице) шаблон аналогичен, но соседей генерируют через `dirs` и явно проверяют границы `0 <= nr && nr < rows && 0 <= nc && nc < cols`, обычно совмещая с `visited` через отдельную матрицу `[][]bool` того же размера, что и сетка — это быстрее map по паре координат.
  - level: deep
    text_md: |
      Несколько мест, где поверхностное знание BFS/DFS ломается на практике.

      Во-первых, `queue = queue[1:]` — O(1) операция (сдвиг указателя и уменьшение `len`/`cap`), но она не освобождает память: весь backing array живёт, пока жив хоть один слайс, ссылающийся на него. Для BFS с миллионами вершин это может означать, что весь массив очереди удерживается в памяти до конца обхода. Практичное решение — держать индекс головы (`head`) и не двигать сам слайс, лишь изредка «сжимать» его, когда `head` становится сравним с `len(queue)`, — тогда GC освобождает пройденную часть.

      Во-вторых, тайминг постановки `visited` принципиально разный для BFS и DFS, и это не стилистический выбор. В BFS вершина обязана помечаться как посещённая в момент постановки в очередь, а не при обработке — иначе одна и та же вершина попадёт в очередь много раз через разных соседей, и в худшем случае (плотный граф) очередь раздуется до O(E) вместо O(V). Для DFS на стеке — наоборот, помечать обычно приходится при извлечении (`pop`), потому что вершина может быть многократно добавлена в стек разными предками до первой обработки; если пометить `visited` при `push`, можно упустить корректный порядок обхода в некоторых постановках задачи. Если важна экономия памяти стека, можно дополнительно проверять `visited` и перед `push`, сокращая число дублей — компромисс между лишней проверкой и размером стека.

      В-третьих, доказательство того, что BFS находит кратчайший путь в невзвешенном графе, опирается на инвариантность по слоям: если вершина `v` находится на расстоянии `d` от старта, она гарантированно окажется добавлена в очередь при обработке слоя `d-1` (индукция по `d`) — то есть уровень, на котором вершина впервые встречена, и есть кратчайшее расстояние. Для графов со смешанными весами {0, 1} это обобщается до 0-1 BFS с deque (`container/list` или двусторонний слайс): рёбра веса 0 кладут в начало, веса 1 — в конец, что даёт корректный порядок без полноценного Dijkstra с кучей.

      В-четвёртых, про рекурсивный DFS и стек goroutine: Go выделяет стек динамически, начиная с 2 КБ (`_StackMin = 2048`, так начиная с Go 1.4; в Go 1.2–1.3 стартовый размер был 8 КБ), и при переполнении текущего размера рантайм делает stack growth — копирует весь текущий стек в новый, больший, с корректировкой всех указателей на стеке (стек Go — «перемещаемый», в отличие от потоков ОС с фиксированным или mmap-growable стеком без copying). Копирование стека — операция O(текущий размер стека) и происходит амортизированно нечасто, но при очень глубокой рекурсии может стать заметной паузой, а в редких случаях патологической глубины — привести к панике превышения лимита стека. Итеративный DFS с явным слайсом-стеком избегает этой картины полностью, потому что рост слайса — это `growslice`, тот же механизм, что и у обычных данных, без специфики call-stack.
