slug: two-pointers-sliding-window
section: algorithms
title: "Two pointers и sliding window: шаблоны на Go"
difficulty: senior
tags: [two-pointers, sliding-window]
question_md: |
  Опишите паттерны two pointers и sliding window: как выбрать между fast/slow и left/right указателями, как устроено sliding window фиксированного и переменного размера, и приведите Go-реализацию задач «longest substring without repeating characters» и «minimum window substring».
answer_levels:
  - level: middle
    text_md: |
      Two pointers — техника, где два индекса двигаются по структуре данных навстречу друг другу или в одном направлении, чтобы избежать вложенного цикла O(n^2). Классический пример — поиск пары с заданной суммой в отсортированном массиве: `left` с начала, `right` с конца; если сумма меньше цели — двигаем `left` вправо, если больше — `right` влево, если равна — нашли ответ; это O(n), так как каждый указатель проходит массив не более одного раза. Вариант fast/slow (черепаха и заяц) двигает два указателя с разной скоростью по связному списку: `slow` на один шаг, `fast` на два — так находят середину списка или обнаруживают цикл (алгоритм Флойда).

      Sliding window — частный случай two pointers, где `left` и `right` образуют границы «окна» подмассива/подстроки: `right` расширяет окно, а когда условие нарушается, `left` сжимает окно слева, пока условие снова не выполнится, и на каждом шаге обновляется ответ. Для окна переменного размера часто нужен вспомогательный `map[byte]int` с частотами символов внутри окна. Главные ловушки — границы: не забыть уменьшить счётчик при сдвиге `left`, а также условие `right < len(s)` против `right <= len(s)-k` для окна фиксированного размера `k`.
  - level: senior
    text_md: |
      Разберём variable-size sliding window на классической задаче — самая длинная подстрока без повторяющихся символов:

      ```go
      func lengthOfLongestSubstring(s string) int {
          lastSeen := make(map[byte]int, len(s))
          best, left := 0, 0
          for right := 0; right < len(s); right++ {
              c := s[right]
              if idx, ok := lastSeen[c]; ok && idx >= left {
                  left = idx + 1 // прыгаем left сразу за предыдущее вхождение
              }
              lastSeen[c] = right
              if w := right - left + 1; w > best {
                  best = w
              }
          }
          return best
      }
      ```

      Это O(n) по времени (каждый индекс посещается один раз как `right`, `left` двигается только вперёд) и O(min(n, alphabet)) по памяти на карту. Важная деталь: сравнение `idx >= left` обязательно — без него `left` может «прыгнуть назад», если предыдущее вхождение символа было до текущего окна. Здесь итерация идёт по байтам (`s[right]`), что корректно для ASCII; если алфавит включает многобайтовые UTF-8 руны, нужно переключаться на `[]rune(s)` и `map[rune]int`, иначе `right - left + 1` посчитает длину в байтах, а не в символах.

      Теперь минимальное окно, покрывающее все символы шаблона — «minimum window substring», классика на fixed-target frequency window:

      ```go
      func minWindow(s, t string) string {
          need := make(map[byte]int)
          for i := 0; i < len(t); i++ {
              need[t[i]]++
          }
          window := make(map[byte]int)
          required := len(need) // сколько уникальных символов нужно покрыть полностью
          formed := 0
          left := 0
          bestLen, bestLeft := -1, 0

          for right := 0; right < len(s); right++ {
              c := s[right]
              window[c]++
              if cnt, ok := need[c]; ok && window[c] == cnt {
                  formed++
              }
              for formed == required {
                  if bestLen == -1 || right-left+1 < bestLen {
                      bestLen = right - left + 1
                      bestLeft = left
                  }
                  lc := s[left]
                  window[lc]--
                  if cnt, ok := need[lc]; ok && window[lc] < cnt {
                      formed--
                  }
                  left++
              }
          }
          if bestLen == -1 {
              return ""
          }
          return s[bestLeft : bestLeft+bestLen]
      }
      ```

      Сложность — O(|s| + |t|): внешний цикл по `right` — O(|s|), внутренний цикл сжатия по `left` суммарно тоже не больше |s| итераций за весь проход (классический амортизированный аргумент «два указателя, каждый двигается вперёд и в сумме не более 2n шагов»), плюс O(|t|) на построение `need`. Edge cases: `t` длиннее `s` — сразу нет ответа (`bestLen` остаётся -1); повторяющиеся символы в `t` формируются через сравнение счётчика `window[c] == cnt`, а не просто наличие ключа; пустой `t` стоит явно проверить и вернуть `""`. Для окна фиксированного размера `k` шаблон проще: набираем первые `k` элементов, затем на каждом шаге `right` одновременно вычитаем элемент, выходящий слева, без вложенного цикла сжатия — это O(n) с одним проходом.
  - level: deep
    text_md: |
      Несколько вещей, которые отличают уверенное владение паттерном от шаблонного знания.

      Во-первых, доказательство амортизированной сложности не сводится к «выглядит как O(n)»: указатель `left` в обеих задачах выше — монотонно неубывающая функция от `right` (никогда не двигается назад), и суммарное число его продвижений за весь проход ограничено `len(s)`, поэтому суммарная работа внутреннего цикла по всем итерациям `right` — тоже O(n), а не O(n) на каждый шаг `right` (что дало бы O(n^2)). Это стандартный аргумент telescoping/amortized analysis, и его стоит явно проговаривать на собеседовании.

      Во-вторых, для ASCII-алфавита map — не самый эффективный контейнер: `map[byte]int` требует хеширования и boxing на каждой операции, тогда как массив фиксированного размера `[128]int` или `[256]int` индексируется напрямую, не аллоцирует на куче при объявлении как локальной переменной (если не escape-ит) и даёт лучшую cache locality. На staff-уровне ожидается переход от `lastSeen := make(map[byte]int)` к `var lastSeen [256]int` с сентинелом -1 вместо `ok`-проверки — заметная экономия constant factor в hot path.

      В-третьих, инкрементальное обновление счётчика внутри окна («вычесть уходящий элемент, добавить новый») — не просто оптимизация, а необходимое условие достижения O(n): наивная альтернатива — пересчитывать состояние окна с нуля при каждом сдвиге — превращает алгоритм в O(n*k) или O(n^2). Именно инкрементальность и есть суть sliding window как техники, а не просто «два индекса».

      В-четвёртых, про fast/slow (алгоритм Флойда): корректность того, что указатели встретятся именно внутри цикла, и что после встречи один указатель, поставленный в `head`, встретится со `slow` ровно в точке начала цикла, — следствие модульной арифметики: если длина «хвоста» до цикла — μ, длина цикла — λ, то к моменту встречи можно показать, что сдвиг между указателями кратен λ, откуда сброс одного указателя в `head` и синхронное движение обоих на 1 шаг приводит к встрече ровно в точке входа в цикл. На собеседовании достаточно уметь быстро восстановить этот вывод, а не заучивать его.

      В-пятых, есть класс задач, где двух указателей недостаточно и нужен monotonic deque — «sliding window maximum», где максимум окна поддерживается не пересчётом, а очередью индексов с невозрастающими значениями:

      ```go
      func maxSlidingWindow(nums []int, k int) []int {
          deque := make([]int, 0, len(nums)) // храним индексы
          res := make([]int, 0, len(nums)-k+1)
          for i, v := range nums {
              for len(deque) > 0 && nums[deque[len(deque)-1]] <= v {
                  deque = deque[:len(deque)-1] // выкидываем то, что уже не может быть максимумом
              }
              deque = append(deque, i)
              if deque[0] <= i-k {
                  deque = deque[1:] // индекс выпал из окна слева
              }
              if i >= k-1 {
                  res = append(res, nums[deque[0]])
              }
          }
          return res
      }
      ```

      Здесь `deque = deque[1:]` не освобождает память под уже прошедшие элементы (тот же нюанс, что и с обычной очередью на слайсе), поэтому для очень длинных входов иногда предпочитают индекс-голову вместо укорачивания слайса. И последнее по границам: в задачах на сумму окна с большими числами (переполнение `int32` при накоплении сумм) стоит явно считать в `int64`/`int`, а не полагаться на тип входного слайса — частая причина «тихого» неверного ответа именно на грани диапазона.
