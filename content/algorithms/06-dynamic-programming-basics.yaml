slug: dynamic-programming-basics
section: algorithms
title: "Динамическое программирование: 1D и 2D шаблоны на Go"
difficulty: senior
tags: [dp, patterns]
question_md: |
  Как определить состояние и переход в динамическом программировании? Разберите 1D DP (climbing stairs / house robber) с оптимизацией памяти до O(1), 2D DP (LCS / edit distance / уникальные пути в сетке) с аллокацией таблицы, а также top-down мемоизацию против bottom-up и типичные ловушки инициализации границ.
answer_levels:
  - level: middle
    text_md: |
      Динамическое программирование сводится к четырём вопросам: что такое состояние (какие параметры однозначно определяют подзадачу), какой переход между состояниями, что является базовым случаем (граничные значения, задаваемые явно), и в каком порядке вычислять состояния, чтобы к моменту перехода нужные предыдущие значения уже были готовы. Классический пример 1D DP — climbing stairs: `dp[i] = dp[i-1] + dp[i-2]`, с базой `dp[0] = 1, dp[1] = 1`; house robber добавляет выбор «взять или не взять текущий элемент»: `dp[i] = max(dp[i-1], dp[i-2] + nums[i])`. Поскольку переход зависит только от двух предыдущих значений, память можно ужать с O(n) до O(1), храня не весь массив `dp`, а две «скользящие» переменные.

      2D DP нужен, когда состояние описывается парой параметров — например, LCS (longest common subsequence) или edit distance, где `dp[i][j]` зависит от `dp[i-1][j]`, `dp[i][j-1]`, `dp[i-1][j-1]`; таблица аллоцируется как `[][]int` через цикл `make` (Go не умеет true 2D-массивы с одной аллокацией без ручной работы с плоским слайсом). Top-down мемоизация — та же рекурсия, что и наивное решение, но с кэшированием уже посчитанных состояний (массив с сентинелом -1 или `map[int]int`), а bottom-up — итеративное заполнение таблицы в правильном порядке без рекурсии и без риска переполнения стека. Частая ловушка — неверная инициализация границ: например, `dp[0][j]`/`dp[i][0]` в edit distance должны отражать «превратить пустую строку в префикс длины j», а не быть занулены по умолчанию.
  - level: senior
    text_md: |
      1D DP с оптимизацией памяти до O(1):

      ```go
      func climbStairs(n int) int {
          if n <= 2 {
              return n
          }
          prev2, prev1 := 1, 2 // dp[1], dp[2]
          for i := 3; i <= n; i++ {
              prev2, prev1 = prev1, prev1+prev2
          }
          return prev1
      }

      func rob(nums []int) int {
          takePrev, skipPrev := 0, 0 // takePrev = dp[i-1], skipPrev = dp[i-2]
          for _, x := range nums {
              cur := max(takePrev, skipPrev+x) // builtin max, Go 1.21+
              skipPrev, takePrev = takePrev, cur
          }
          return takePrev
      }
      ```

      Оба — O(n) времени, O(1) памяти. Edge cases: `climbStairs` явно обрабатывает `n <= 2`, чтобы не индексировать несуществующие `dp[0]`/`dp[-1]`; `rob` на пустом `nums` просто не входит в цикл и возвращает 0 — корректная база без отдельной проверки.

      2D DP — edit distance с полноценной таблицей:

      ```go
      func minDistance(word1, word2 string) int {
          n, m := len(word1), len(word2)
          dp := make([][]int, n+1)
          for i := range dp {
              dp[i] = make([]int, m+1) // каждая строка — отдельная аллокация
              dp[i][0] = i             // превратить word1[:i] в "" — i удалений
          }
          for j := 0; j <= m; j++ {
              dp[0][j] = j // превратить "" в word2[:j] — j вставок
          }

          for i := 1; i <= n; i++ {
              for j := 1; j <= m; j++ {
                  if word1[i-1] == word2[j-1] {
                      dp[i][j] = dp[i-1][j-1]
                  } else {
                      dp[i][j] = 1 + min(dp[i-1][j-1], dp[i-1][j], dp[i][j-1]) // builtin min, вариадический с Go 1.21
                  }
              }
          }
          return dp[n][m]
      }
      ```

      Сложность — O(n*m) времени и памяти. Пустые строки (n=0 или m=0) обрабатываются естественно базовыми строкой/столбцом. Готовая senior-оптимизация: поскольку строка `dp[i]` зависит только от `dp[i-1]` и уже посчитанной части `dp[i]`, таблицу можно свести к двум строкам длиной `m+1` (`prev`, `curr`), что даёт O(m) памяти вместо O(n*m) — прямое обобщение трюка «две переменные вместо массива» из 1D на 2D случай.

      Top-down мемоизация для той же задачи выглядит как обычная рекурсия по `(i, j)` с кэшем `memo [][]int`, инициализированным значением -1 («не вычислено»), и проверкой `if memo[i][j] != -1 { return memo[i][j] }` перед вычислением — она удобна, когда не все состояния из полной таблицы реально достижимы (например, при дополнительных ограничениях), но платит за это накладными расходами рекурсии и риском переполнения стека на больших `n`, тогда как bottom-up гарантированно проходит по всем состояниям в фиксированном порядке без рекурсии.
  - level: deep
    text_md: |
      Несколько вещей, которые проверяют на staff-уровне за пределами «переход посчитан верно».

      Аллокации таблицы. `dp := make([][]int, n+1)` с последующим `dp[i] = make([]int, m+1)` в цикле — это n+1 отдельных объектов в куче, каждый со своим заголовком слайса и отдельной областью памяти; для больших n это заметное давление на GC и плохая cache locality (переход между строками — переход между несмежными участками памяти). Идиоматичная оптимизация — «расплющить» таблицу в один слайс: `flat := make([]int, (n+1)*(m+1))` и адресация `flat[i*(m+1)+j]` — одна аллокация, последовательный доступ по строкам полностью cache-friendly, и это стандартная практика не только в интервью, но и в проде.

      Пространственная оптимизация 2D → O(min(n, m)). Поскольку `dp[i][j]` в edit distance/LCS зависит только от предыдущей строки и текущей строки в процессе заполнения, всю таблицу можно заменить двумя строками-слайсами длиной `m+1`, которые переиспользуются (`prev, curr = curr, prev`), что даёт O(m) памяти вместо O(n*m). Более того, если `m > n`, стоит явно поменять `word1`/`word2` местами перед вычислением, чтобы более короткая строка определяла ширину строки-буфера — тогда память O(min(n, m)) безусловно, а не только при удачном соотношении входов.

      Top-down мемоизация — ловушка с сентинелом. Массив `memo` с сентинелом -1 («ещё не вычислено») работает только если -1 не может быть валидным ответом задачи; если ответ может быть отрицательным (DP на минимальную сумму со штрафами), сентинел -1 совпадёт с настоящим ответом и мемоизация тихо «перезапустит» вычисление или, хуже, вернёт неверное значение как будто закэшированное. Правильное решение — отдельный `computed []bool` рядом с `memo []int`, либо `map[int]int` (нет проблемы с сентинелом, но каждый доступ — хеширование и накладные расходы при большом числе состояний по сравнению с прямой индексацией массива). Рекурсивная мемоизация тоже расходует call-стек, как обычная рекурсия — на глубоких графах состояний это тот же риск, что и в DFS, и на очень больших n предпочтительнее bottom-up.

      Порядок вычисления — не техническая деталь, а часть корректности алгоритма. В 2D DP вложенные циклы должны идти в порядке, согласованном с направлением зависимостей: если `dp[i][j]` зависит от `dp[i][j-1]` и `dp[i-1][j]`, оба индекса должны расти в порядке возрастания, и любая перестановка даст использование ещё не посчитанных (нулевых по умолчанию в Go) значений — баг, который не паникует и не падает, а просто тихо возвращает неверный числовой ответ, что делает его особенно неприятным при отладке.

      И последнее — умение доказать, что задача действительно требует DP, а не решается greedy. Классический пример — house robber: жадный выбор «брать любой локально более выгодный дом» не работает, потому что решение о доме `i` влияет на допустимость выбора дома `i+1`, а не только на текущую сумму; формальное отличие DP от greedy — наличие overlapping subproblems и отсутствие свойства «жадный локальный выбор всегда безопасен» (exchange argument здесь не проходит). Умение явно проговорить контрпример (`nums = [2, 1, 1, 2]`, где жадное «взять первый большой» даёт хуже, чем пропустить его) отличает уверенный разбор от заученного шаблона.
