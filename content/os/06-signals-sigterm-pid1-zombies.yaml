slug: signals-sigterm-pid1-zombies
section: os
title: "Сигналы: SIGTERM/SIGKILL/SIGSTOP, обработка в Go, зомби и PID 1"
difficulty: senior
tags: [os, signals, containers]
question_md: |
  Чем отличаются SIGTERM, SIGKILL и SIGSTOP? Как правильно ловить сигналы в Go (`os/signal`) для graceful shutdown? Что такое зомби-процессы и почему запуск Go-сервиса как PID 1 в контейнере может сломать и обработку сигналов, и уборку зомби?
answer_levels:
  - level: middle
    text_md: |
      Сигнал — это асинхронное уведомление процессу от ядра или другого процесса. Ключевые:

      - **SIGTERM (15)** — вежливая просьба завершиться. Процесс **может её перехватить** и корректно закрыться: дообработать запросы, закрыть соединения, сбросить буферы. Это стандартный сигнал остановки (`kill`, `docker stop`, Kubernetes).
      - **SIGINT (2)** — Ctrl+C в терминале; тоже перехватывается.
      - **SIGKILL (9)** — немедленное убийство ядром. **Перехватить или проигнорировать нельзя** — процесс просто исчезает, без шанса на cleanup.
      - **SIGSTOP (19)** — приостановка процесса ядром; **тоже неперехватываемая** (в отличие от SIGTSTP, Ctrl+Z). Возобновление — `SIGCONT`. Процесс не завершается, а «замораживается».

      Правило: SIGTERM даёт шанс на **graceful shutdown**, SIGKILL/SIGSTOP — нет. Поэтому оркестраторы сначала шлют SIGTERM и лишь по таймауту — SIGKILL.
  - level: senior
    text_md: |
      **Обработка в Go через `os/signal`:**
      ```go
      ctx, stop := signal.NotifyContext(context.Background(),
          syscall.SIGTERM, syscall.SIGINT)
      defer stop()

      srv := &http.Server{Addr: ":8080"}
      go func() {
          if err := srv.ListenAndServe(); err != http.ErrServerClosed {
              log.Fatal(err)
          }
      }()

      <-ctx.Done()                        // пришёл SIGTERM/SIGINT
      shutdownCtx, cancel := context.WithTimeout(context.Background(), 30*time.Second)
      defer cancel()
      srv.Shutdown(shutdownCtx)           // перестаём принимать новое, ждём активные запросы
      ```
      `signal.NotifyContext` (Go 1.16+) — идиоматичный способ; раньше делали `signal.Notify(ch, ...)` с буферизированным каналом (буфер обязателен — иначе сигнал, пришедший до готовности получателя, теряется).

      **Что важно знать про сигналы в Go:**
      - Рантайм сам использует несколько сигналов: **`SIGURG`** — для асинхронной преемпции горутин (с Go 1.14), **`SIGPROF`** — для профайлера. Их не надо трогать.
      - **`SIGQUIT` (3)** по умолчанию заставляет Go вывести стеки **всех** горутин и упасть — незаменимо для диагностики зависаний (`kill -QUIT <pid>`).
      - **`SIGPIPE`**: запись в закрытый сокет/pipe. Go гасит его для обычных соединений (`Write` вернёт ошибку), но для FD 1/2 ведёт себя иначе.

      **Kubernetes-контекст:** при удалении пода K8s шлёт **SIGTERM**, ждёт `terminationGracePeriodSeconds` (по умолчанию 30 с) и только затем — **SIGKILL**. Значит `terminationGracePeriodSeconds` должен быть больше, чем самый долгий запрос + время на `Shutdown`, иначе активные запросы обрубит SIGKILL.
  - level: deep
    text_md: |
      **Зомби-процессы.** Когда дочерний процесс завершается, ядро не удаляет его сразу: остаётся запись в таблице процессов (состояние `Z`, `<defunct>`) с кодом выхода, пока родитель не заберёт его через `wait()`/`waitpid()` (**reaping**). Не забрал — накапливаются зомби, забивая таблицу процессов (лимит PID). Зомби нельзя «убить» (он уже мёртв) — его нужно **сжать (reap)**. Если родитель умирает раньше ребёнка, сирота **переусыновляется PID 1**, который обязан его в итоге reap-нуть.

      **Проблема PID 1 в контейнерах.** Внутри `pid`-namespace главный процесс контейнера становится **PID 1** — а у PID 1 в Linux особая семантика:

      1. **Сигналы по умолчанию игнорируются.** Ядро **не** применяет к PID 1 дефолтные действия для сигналов, у которых нет установленного обработчика. Если ваш Go-бинарник — PID 1 и вы **не** повесили handler на SIGTERM (`signal.Notify`), то `docker stop`/K8s-SIGTERM **ничего не сделает** — процесс проигнорирует сигнал, оркестратор прождёт grace period и прибьёт его SIGKILL. Отсюда «почему мой сервис 30 секунд не останавливается». Go-сервис, который явно ловит SIGTERM, эту проблему снимает.
      2. **Reaping сирот.** Все осиротевшие процессы в контейнере переусыновляются к PID 1. Если PID 1 их не reap-ит, контейнер копит зомби. Обычное Go-приложение, которое не порождает дочерних процессов, зомби не создаёт; но если оно вызывает `os/exec` (шеллы, конвертеры, `git` и т.п.) и неаккуратно ждёт их — зомби появятся, а как PID 1 оно ещё и получит чужих сирот.

      **Решения:**
      - запускать лёгкий init-процесс как PID 1: `tini`/`dumb-init`, или флаг `docker run --init` (podman аналогично) — он форвардит сигналы дочернему и reap-ит зомби;
      - в Kubernetes использовать `shareProcessNamespace` осознанно и/или образы с init;
      - если Go-приложение **должно** быть PID 1 и порождает детей — обязательно ловить SIGTERM **и** корректно `Wait()`-ить каждого ребёнка (иначе reaping не произойдёт).

      **Тонкости для staff:**
      - `exec`-форма `ENTRYPOINT ["/app"]` в Dockerfile запускает бинарник как PID 1 **напрямую**; shell-форма (`ENTRYPOINT /app`) оборачивает его в `/bin/sh -c`, и тогда PID 1 — это shell, который **не форвардит** SIGTERM ребёнку — двойная ловушка.
      - Маска сигналов и обработчики **сбрасываются/наследуются** при `exec`; горутина-обработчик в Go — это на самом деле рантайм, ловящий сигнал в специальном потоке и рассылающий его в канал.
      - SIGKILL/SIGSTOP невозможно перехватить именно потому, что это гарантированные для ядра рычаги управления любым процессом.
