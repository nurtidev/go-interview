slug: cgroups-namespaces-containers
section: os
title: "cgroups и namespaces: что на самом деле такое контейнер"
difficulty: senior
tags: [os, containers, cgroups]
question_md: |
  Из чего состоит контейнер на уровне ядра Linux? Чем namespaces отличаются от cgroups и за что отвечает каждый? Как cgroup-лимиты CPU и памяти механически влияют на процесс (throttling, OOM) — и как это связано с настройкой Go-рантайма?
answer_levels:
  - level: middle
    text_md: |
      Контейнер — это **не** отдельная сущность ядра, а обычный процесс Linux, вокруг которого собрали несколько изолирующих и ограничивающих механизмов. Два кита:

      - **namespaces (пространства имён)** — *изоляция видимости*. Каждый namespace ограничивает, что процесс «видит»: своё дерево процессов, свою сеть, свою файловую систему. Процесс в контейнере думает, что он один в системе.
      - **cgroups (control groups)** — *ограничение ресурсов*. Сколько CPU, памяти, disk I/O процесс может потребить.

      Грубо: namespaces отвечают на вопрос «что я вижу», cgroups — «сколько мне можно». Контейнер = процесс(ы) в наборе namespaces + cgroup для лимитов + отдельная корневая ФС (образ через overlayfs) + профили безопасности (capabilities, seccomp). Docker/containerd/runc — лишь удобный фронтенд, который дёргает эти примитивы ядра.

      Связь с Go: cgroup-лимит CPU напрямую влияет на то, каким должен быть `GOMAXPROCS`, а лимит памяти — на `GOMEMLIMIT`. Отдельно эту практику разбирает вопрос про деплой Go-сервиса (`docker-deploy-go-automaxprocs`); здесь фокус — механика самого ядра.
  - level: senior
    text_md: |
      **Namespaces** создаются флагами `clone()`/`unshare()`/`setns()`:

      | Namespace | Что изолирует |
      |-----------|---------------|
      | `pid` | Дерево процессов; PID 1 внутри ≠ PID 1 хоста |
      | `net` | Сетевые интерфейсы, порты, таблицы маршрутизации |
      | `mnt` | Точки монтирования, вид файловой системы |
      | `uts` | hostname / domainname |
      | `ipc` | System V IPC, POSIX message queues |
      | `user` | Маппинг UID/GID (root в контейнере = непривилегированный на хосте) |
      | `cgroup` | Корень иерархии cgroup |
      | `time` | Смещение системного времени (Linux 5.6) |

      **cgroups v2** (единая иерархия, вытеснила v1) задают лимиты через файлы в `/sys/fs/cgroup`:
      - **CPU**: `cpu.max` в формате `"<quota> <period>"`, например `50000 100000` = 0.5 ядра (50 мс CPU на каждые 100 мс реального времени). Механика — **CFS bandwidth control**: когда группа исчерпала квоту в текущем периоде, ядро **throttles** — приостанавливает все её задачи до начала следующего периода. Процесс жив, но «замирает»; счётчик виден в `cpu.stat` (`nr_throttled`, `throttled_usec`).
      - **Память**: `memory.max` — жёсткий потолок. При превышении срабатывает cgroup **OOM-killer**, отправляющий `SIGKILL` (события в `memory.events`, поле `oom_kill`). `memory.high` — мягкий порог: ядро начинает активно давить (reclaim/throttle аллокаций), но не убивает.

      Принципиальная разница поведения: **превысил CPU-лимит → throttling** (latency растёт, процесс жив); **превысил memory-лимит → OOM-kill** (`SIGKILL`, без шанса на graceful shutdown, под перезапускается).
  - level: deep
    text_md: |
      **Почему это критично для Go-рантайма (механика, без дублирования деплой-вопроса).**

      *CPU.* Go-рантайм до версии 1.25 определял `GOMAXPROCS` по числу логических ядер, видимых через `sched_getaffinity`/`NumCPU`, а не по cgroup-квоте. На ноде с 32 ядрами и лимитом `cpu.max = 50000 100000` (0.5 ядра) рантайм поднимал 32 P и создавал 32 готовых к работе потока, которые конкурировали за пол-ядра. Итог — постоянный **CFS throttling**: как только суммарное потребление за период превышало квоту, ядро замораживало процесс до следующего периода, что бьёт по p99 latency даже при невысоком среднем CPU. С **Go 1.25** рантайм стал cgroup-aware и читает `cpu.max` сам; на более старых версиях эту роль играет `go.uber.org/automaxprocs`.

      *Память.* cgroup memory-контроллер считает **RSS + page cache + прочее** группы. Go отдаёт освобождённую память ядру через `madvise` — и если это `MADV_FREE` (ленивое освобождение), страницы **всё ещё числятся** за cgroup, пока не наступит давление; в контейнере это выглядит как «память не отдаётся» и повышает риск упереться в `memory.max`. `GOMEMLIMIT` заставляет GC работать агрессивнее до достижения лимита, чтобы опередить cgroup-OOM.

      **Тонкости для staff:**
      - `/proc/self/cgroup` и `/sys/fs/cgroup/...` — как процесс изнутри узнаёт свои лимиты; библиотеки-парсеры именно это и читают.
      - cgroup v1 и v2 имеют **разные пути и форматы** (`cpu.cfs_quota_us`/`cpu.cfs_period_us` в v1 против `cpu.max` в v2) — код автонастройки должен уметь оба.
      - `pids.max` в cgroup ограничивает число процессов/потоков — Go-сервис с утечкой M может упереться в него и упасть на `clone`.
      - Внутри `pid` namespace главный процесс становится **PID 1** со всеми последствиями (reaping зомби, особая обработка сигналов) — это отдельная тема про сигналы и PID 1.
