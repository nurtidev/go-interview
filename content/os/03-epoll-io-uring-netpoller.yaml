slug: epoll-io-uring-netpoller
section: os
title: "epoll (LT/ET) vs io_uring и как устроен netpoller Go"
difficulty: senior
tags: [os, epoll, netpoller]
question_md: |
  Как работает epoll и чем level-triggered отличается от edge-triggered? Чем io_uring принципиально лучше epoll? И как рантайм Go использует epoll в своём netpoller, чтобы держать сотни тысяч горутин на нескольких потоках?
answer_levels:
  - level: middle
    text_md: |
      Проблема `select`/`poll`: на каждый вызов приложение передаёт в ядро **весь** список дескрипторов, и ядро проверяет их все — O(n) на каждой итерации. При 10k+ соединений это неприемлемо.

      **epoll** решает это: дескрипторы регистрируются **один раз**, а ядро само уведомляет только о тех, что стали готовы — O(1) на событие. Три вызова:
      - `epoll_create` — создать epoll-инстанс (сам возвращает дескриптор);
      - `epoll_ctl(ADD/MOD/DEL)` — зарегистрировать/изменить/убрать дескриптор и интересующие события (`EPOLLIN`, `EPOLLOUT`, ...);
      - `epoll_wait` — заблокироваться и получить список готовых дескрипторов.

      Именно на epoll (Linux) / kqueue (BSD, macOS) / IOCP (Windows) построен **netpoller** Go: когда горутина читает из сокета, а данных нет, она не блокирует поток ОС — рантайм паркует её и регистрирует дескриптор в epoll. Поэтому Go держит огромное число сетевых горутин на небольшом числе потоков.
  - level: senior
    text_md: |
      **Level-Triggered (LT) vs Edge-Triggered (ET).**
      - **LT** (по умолчанию): `epoll_wait` возвращает дескриптор, **пока** в буфере есть данные. Можно прочитать частично и вернуться позже — снова уведомит. Проще и безопаснее, но чуть «болтливее».
      - **ET** (`EPOLLET`): уведомляет только на **переход** состояния — когда пришли **новые** данные. Если не вычитать буфер до конца, повторного уведомления не будет и данные «зависнут». Поэтому с ET обязателен неблокирующий сокет и чтение в цикле до `EAGAIN`. ET снижает число пробуждений — важно на очень высокой нагрузке.

      **io_uring (Linux 5.1+)** — принципиально другая модель. epoll — это **readiness-based** (уведомляет о готовности, саму операцию `read`/`write` ты всё равно делаешь отдельным syscall). io_uring — **completion-based**: две кольцевые очереди в разделяемой с ядром памяти — SQ (submission) и CQ (completion). Приложение кладёт запросы (read, write, accept, fsync...) в SQ, ядро исполняет их асинхронно и пишет результаты в CQ. Преимущества:
      - **батчинг** — десятки операций отправляются одним `io_uring_enter` (а с `SQPOLL` ядро само опрашивает очередь — почти без syscalls);
      - работает для **обычных файлов/диска**, где epoll бесполезен (файл всегда «готов», но `read` может блокировать);
      - меньше копирований и переходов в ядро.

      Плата — сложность API и историческая череда security-проблем (io_uring отключают в некоторых окружениях по политике безопасности).
  - level: deep
    text_md: |
      **Устройство netpoller Go.** Все сетевые сокеты Go переводит в неблокирующий режим и регистрирует в epoll в **edge-triggered** режиме (`EPOLLET`, плюс `EPOLLIN|EPOLLOUT|EPOLLRDHUP`). Каждый `netFD` хранит два указателя-«семафора» на горутины, ждущие чтения и записи (`pollDesc`). Сценарий:

      1. Горутина вызывает `conn.Read()`. Внутри — неблокирующий `read`; при `EAGAIN` рантайм вызывает `gopark`, паркуя горутину, и запоминает её в `pollDesc`. Поток ОС (M) при этом свободен и исполняет другие горутины.
      2. Планировщик периодически дёргает `netpoll()` — неблокирующий (в `findrunnable`, при work stealing) или блокирующий `epoll_wait` (в sysmon / когда работы больше нет).
      3. Как только epoll сообщает о готовности дескриптора, `netpoll` возвращает список припаркованных на нём горутин, и планировщик (`goready`) ставит их обратно в runqueue.

      Почему именно ET: рантайм сам управляет циклом чтения до `EAGAIN` и не хочет лишних пробуждений на каждый вызов `epoll_wait` — edge-triggered даёт минимум событий. LT здесь был бы избыточен.

      **io_uring в Go.** Стандартный рантайм io_uring **не использует** (по состоянию на 2024–2025) — netpoller остаётся на epoll/kqueue/IOCP. Причины: кроссплатформенность, зрелость, security-соображения. Экспериментальные обёртки (например, `giouring`) позволяют звать io_uring из Go напрямую, в обход рантайма, для storage-I/O — но это вне стандартной модели горутин.

      **Тонкости для staff:**
      - Дисковый файловый I/O в Go **не** проходит через netpoller (обычные файлы не epoll-able) — `os.File.Read` для регулярного файла делает блокирующий syscall и «занимает» поток ОС; именно поэтому тяжёлый файловый I/O может неожиданно раздувать число M.
      - `epoll_wait` в sysmon — часть механизма, не дающего программе «уснуть», когда все горутины ждут сети.
      - Таймеры и `context` deadlines интегрированы с netpoller через параметр таймаута `epoll_wait`.
