slug: virtual-memory-paging-tlb
section: os
title: "Виртуальная память: page table, TLB, page fault и как это видит Go"
difficulty: senior
tags: [os, memory, runtime]
question_md: |
  Как устроена виртуальная память: страницы, page table, TLB, page fault? Чем отличается minor от major fault? И как это использует рантайм Go — mmap-арены, возврат памяти через madvise, `GOMEMLIMIT`?
answer_levels:
  - level: middle
    text_md: |
      Каждый процесс работает не с физической памятью напрямую, а со своим **виртуальным адресным пространством**. Аппаратный блок **MMU** транслирует виртуальный адрес в физический через **page table** (таблицу страниц). Память нарезана на **страницы** по 4 КБ; трансляция идёт постранично.

      Зачем это нужно:
      - **Изоляция** — процессы не видят память друг друга.
      - **Оверкоммит** — можно «пообещать» больше памяти, чем есть RAM; неиспользуемое лежит на диске (swap) или ещё не выделено физически.
      - **Ленивое выделение** — физическая страница даётся только при первом обращении.

      **Page fault** — прерывание, когда обращаемся к виртуальному адресу, для которого нет валидной физической страницы. Ядро его обрабатывает: выделяет/подгружает страницу и возобновляет выполнение. Если адрес действительно невалиден — процесс получает `SIGSEGV`.

      **TLB (Translation Lookaside Buffer)** — маленький кэш недавних трансляций внутри CPU. Попадание в TLB — ~1 нс, промах — дорогой обход page table. При переключении на другой процесс TLB частично сбрасывается, поэтому переключение процессов дороже.
  - level: senior
    text_md: |
      **Многоуровневая трансляция.** На x86_64 адрес разбит на индексы четырёх (или пяти при LA57) уровней таблицы: PGD→PUD→PMD→PTE, плюс смещение внутри страницы (12 бит для 4 КБ). Корень таблицы текущего процесса — в регистре `CR3`. При **TLB miss** MMU аппаратно проходит все уровни (page-table walk) — до 4 обращений к памяти на одну трансляцию, поэтому TLB критичен для производительности. В PTE, помимо номера физического фрейма, лежат флаги: Present, Writable, User/Supervisor, Accessed, Dirty, NX (No-Execute).

      **Виды page fault:**
      - **Minor (soft) fault** — страница уже в RAM, но не смаплена в этот PTE: первое обращение к анонимной памяти, copy-on-write после `fork`, первый доступ к разделяемой библиотеке. Стоит ~микросекунды (только обновить PTE).
      - **Major (hard) fault** — нужен диск: страница в swap или это file-backed `mmap`, которую ещё не подгрузили. Стоит миллисекунды (HDD) или доли миллисекунды (SSD). Много major faults = система свопит, latency взрывается.

      **Переключение контекста и TLB.** Смена `CR3` инвалидирует TLB. **PCID (x86) / ASID (ARM)** позволяют помечать записи TLB идентификатором адресного пространства и не делать полный flush. **KPTI** (защита от Meltdown) разводит page table ядра и user-space, добавляя стоимость на каждом syscall.

      **Как это видит Go.** Рантайм не работает страницами напрямую — он резервирует крупные регионы адресного пространства у ОС через `mmap(MAP_ANONYMOUS)` **аренами** (на 64-бит арена = 64 МБ) и дальше сам нарезает их своим аллокатором (mcache/mcentral/mheap). Резервирование ≠ коммит: физические страницы появляются лениво, через minor page faults при первом обращении — поэтому виртуальный размер (VSZ) у Go-процесса всегда сильно больше реального RSS.
  - level: deep
    text_md: |
      **Возврат памяти ОС через madvise.** Когда GC освобождает объекты, Go не сразу отдаёт страницы ядру, а помечает их через `madvise`:
      - `MADV_FREE` — «эти страницы можно забрать, но не срочно»: ядро освободит их **лениво**, только при нехватке памяти. RSS при этом **не падает сразу** — страницы всё ещё числятся за процессом, пока не наступит давление. Быстро, но путает мониторинг и может выглядеть как «утечка».
      - `MADV_DONTNEED` — «страницы больше не нужны прямо сейчас»: RSS падает быстро, но следующее обращение вызовет minor fault и обнуление страницы (дороже по CPU).

      Историческая эволюция важна на собесе: Go 1.12–1.15 по умолчанию использовал `MADV_FREE` на Linux (быстрее, но RSS «залипал»); с **Go 1.16** дефолт вернули на `MADV_DONTNEED`, чтобы RSS честно уменьшался и мониторинг/OOM-killer видели реальную картину. Переключить обратно можно через `GODEBUG=madvdontneed=0`.

      **GOMEMLIMIT и виртуальная память.** `GOMEMLIMIT` (Go 1.19) — soft-лимит суммарной памяти рантайма. Он не управляет пейджингом напрямую, а заставляет **GC работать чаще** по мере приближения к лимиту, чтобы живой набор + мусор не превысили потолок и ядро не убило процесс OOM-киллером. Полезен в контейнерах с фиксированным `memory.max`; ставят обычно 80–90% лимита, оставляя запас на off-heap (стеки горутин, метаданные GC, сам mmap). Риск — GC death spiral, если живых данных больше лимита.

      **Прочие тонкости для staff:**
      - **Huge pages (2 МБ)** резко снижают TLB miss на больших кучах: одна запись TLB покрывает 2 МБ вместо 4 КБ. THP (Transparent Huge Pages) в режиме `madvise` Go может использовать для арен, но `always`-режим THP иногда даёт latency-спайки от `khugepaged` — для latency-sensitive сервисов THP часто выключают.
      - **guard page** (`PROT_NONE`) ловит переполнение стека потока; у горутин рост стека организован иначе — через copy-on-grow, а не через mmap.
      - `mmap` file-backed даёт zero-copy чтение, но таит `SIGBUS`, если файл усечь после маппинга.
