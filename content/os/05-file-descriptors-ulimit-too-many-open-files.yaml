slug: file-descriptors-ulimit-too-many-open-files
section: os
title: "Файловые дескрипторы, ulimit и «too many open files» в Go"
difficulty: middle
tags: [os, file-descriptors, reliability]
question_md: |
  Что такое файловый дескриптор и какие бывают лимиты на их число? Почему Go-сервис под нагрузкой падает с ошибкой «too many open files», как это диагностировать и чинить — и что Go-рантайм делает с лимитом дескрипторов сам?
answer_levels:
  - level: middle
    text_md: |
      **File descriptor (FD)** — небольшое целое число, которое ядро выдаёт процессу при открытии любого ресурса. В Linux «всё есть файл»: обычный файл, TCP-сокет, pipe, `eventfd`, `epoll`-инстанс, `timerfd` — всё это дескрипторы. FD 0/1/2 — stdin/stdout/stderr, дальше 3+.

      Дескрипторы **не бесконечны**. Лимит на процесс — `RLIMIT_NOFILE`, у него два значения:
      - **soft limit** (`ulimit -n`) — текущий действующий предел; по историческому дефолту часто 1024;
      - **hard limit** (`ulimit -Hn`) — потолок, до которого непривилегированный процесс может поднять soft.

      Каждое TCP-соединение — это один FD. При дефолтном лимите 1024 сервис, обслуживающий тысячи соединений, упирается в потолок, и любой `open`/`accept`/`Dial` начинает возвращать ошибку **`too many open files`** (errno `EMFILE`). В Go эта ошибка вылезает из `net.Dial`, `os.Open`, `http`-клиента и т.д.
  - level: senior
    text_md: |
      **Три уровня лимитов:**
      - на процесс — `RLIMIT_NOFILE` (soft/hard), виден в `/proc/<pid>/limits`;
      - на систему целиком — `fs.file-max` (все открытые файлы во всей ОС);
      - потолок значения soft-лимита — `fs.nr_open`.

      Соответственно две разные ошибки: **`EMFILE`** — «too many open files» (процесс исчерпал свой `RLIMIT_NOFILE`); **`ENFILE`** — «too many open files in system» (упёрлись в системный `fs.file-max`). Первая встречается на порядок чаще.

      **Типичные причины утечки FD в Go-сервисах:**
      - не закрыт `resp.Body` у `http.Response` — соединение не возвращается в пул и держит FD;
      - не закрыт `sql.Rows` или сам запрос — держит соединение из пула;
      - создаётся **новый** `http.Client`/`http.Transport` на каждый запрос вместо переиспользования — пулы не шарятся, растёт число сокетов;
      - неограниченный параллелизм (горутина + соединение на каждый входящий элемент без worker pool);
      - забытый `defer f.Close()` / `defer conn.Close()`.

      **Диагностика:**
      ```bash
      cat /proc/<pid>/limits | grep 'open files'   # текущие soft/hard
      ls /proc/<pid>/fd | wc -l                      # сколько открыто сейчас
      lsof -p <pid> | wc -l                          # то же, с деталями
      ss -tanp | grep <pid>                          # сокеты процесса и их состояния
      ```
      Если среди FD растёт число сокетов в `CLOSE_WAIT` — почти наверняка не закрывают тело ответа/соединение.

      **Починка:** поднять лимит там, где реально нужно много соединений (`LimitNOFILE=` в systemd-юните, `securityContext`/настройки ноды в Kubernetes, `ulimit -n` в шелле), и — главное — устранить утечку: `defer resp.Body.Close()`, `defer rows.Close()`, один переиспользуемый `http.Client` с настроенными `MaxIdleConns`/`MaxIdleConnsPerHost`, worker pool для ограничения параллелизма.
  - level: deep
    text_md: |
      **Что Go делает с лимитом сам.** Начиная с **Go 1.19**, рантайм на Unix при старте автоматически поднимает soft-лимит `RLIMIT_NOFILE` до hard-лимита — чтобы снять историческое ограничение в 1024 и не заставлять каждый сервис вручную звать `setrlimit`. При этом для запускаемых **дочерних** процессов (`os/exec`) Go восстанавливает исходный soft-лимит — потому что некоторые старые программы используют `select()`, который ломается при FD ≥ 1024 (`FD_SETSIZE`). Знать это полезно: «а почему у меня уже 1M лимит, хотя я ничего не настраивал» — это рантайм Go.

      Прочитать/поднять лимит из кода:
      ```go
      import "golang.org/x/sys/unix"

      var rl unix.Rlimit
      unix.Getrlimit(unix.RLIMIT_NOFILE, &rl)      // rl.Cur — soft, rl.Max — hard
      rl.Cur = rl.Max
      unix.Setrlimit(unix.RLIMIT_NOFILE, &rl)      // поднять soft до hard
      ```

      **Тонкости для staff/senior:**
      - `epoll`-инстанс, который держит netpoller, — это тоже FD; при десятках тысяч соединений накладные FD (epoll, pipe для wakeup) невелики, но существуют.
      - FD наследуются при `fork`/`exec`, если не выставлен флаг **`O_CLOEXEC`**. Go по умолчанию открывает файлы и сокеты с `O_CLOEXEC`, чтобы утечки дескрипторов не «протекали» в дочерние процессы, — это защита от классической уязвимости, когда потомок наследует чужой сокет.
      - В контейнере лимит может быть ещё и урезан рантаймом контейнера (`--ulimit nofile=...` в Docker), поэтому «на ноде 1M, а в поде 1024» — реальная ловушка.
      - `CLOSE_WAIT`-накопление ≠ проблема лимита ядра: это баг приложения (не читаем/не закрываем соединение), который лишь **проявляется** как исчерпание FD.
