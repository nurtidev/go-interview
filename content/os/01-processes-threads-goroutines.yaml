slug: processes-threads-goroutines
section: os
title: "Процессы vs потоки vs горутины: контекст-свитч и стоимость"
difficulty: senior
tags: [os, scheduler, goroutine]
question_md: |
  В чём разница между процессом, потоком ОС и горутиной? Что происходит при переключении контекста в каждом случае и почему оно стоит по-разному? Почему горутины дёшевы и как это связано с моделью планирования Go?
answer_levels:
  - level: middle
    text_md: |
      Три уровня единиц выполнения, от тяжёлого к лёгкому:

      - **Процесс** — изолированная единица с собственным виртуальным адресным пространством, таблицей файловых дескрипторов, PID. Создаётся через `fork()`+`exec()`. Падение одного процесса не рушит другие.
      - **Поток ОС (thread)** — единица выполнения внутри процесса. Потоки одного процесса разделяют адресное пространство, дескрипторы и глобальные данные, но у каждого свой стек, регистры и счётчик команд (PC). На Linux поток — это `task_struct`, создаётся через `clone()`; библиотека `pthreads` (NPTL) даёт модель 1:1 (один поток пользователя = один поток ядра). Планирует потоки само ядро (CFS).
      - **Горутина** — единица выполнения внутри Go-рантайма. Планирует их не ядро, а планировщик Go в user-space, мультиплексируя **много** горутин на **немного** потоков ОС (модель M:N). Стек горутины стартует с ~2 КБ и растёт по мере надобности.

      Ключевая мысль: поток дешевле процесса (нет отдельного адресного пространства), а горутина дешевле потока (нет системного вызова на создание, крошечный стек, переключение без участия ядра). Поэтому потоков в сервисе держат десятки-сотни, а горутин — легко сотни тысяч.
  - level: senior
    text_md: |
      **Что такое переключение контекста и почему стоимость разная.**

      *Переключение процессов*: ядро сохраняет регистры и состояние текущего процесса, меняет активную таблицу страниц (запись в регистр `CR3` на x86_64), что влечёт **сброс TLB** (кэша трансляций виртуальный→физический адрес). После этого первые обращения к памяти идут через дорогой page-table walk (TLB miss). Плюс кэши L1/L2 частично «холодные». Прямая стоимость ~1–5 мкс, но косвенная (промахи кэша/TLB) может быть в разы больше. Современные CPU смягчают это через **PCID/ASID** — TLB помечает записи идентификатором адресного пространства, поэтому полный flush не всегда нужен.

      *Переключение потоков одного процесса*: адресное пространство то же, `CR3` не меняется — TLB и большая часть кэшей остаются валидными. Но это всё ещё переключение через ядро: вход в kernel mode, работа планировщика, сохранение/восстановление полного набора регистров, смена kernel-стека. Порядок ~1–2 мкс.

      *Переключение горутин*: происходит целиком в user-space, без syscall и без смены режима процессора. Рантайм сохраняет минимум (PC, SP, несколько регистров) в структуру `g` и переключается на другую готовую `g`. TLB не трогается. Стоимость — десятки–двести наносекунд. Переключение случается в кооперативных safe-point (вызов функции, операция с каналом, блокирующий вызов) и, с Go 1.14, асинхронно по сигналу `SIGURG`.

      **Почему горутины дёшевы:**
      1. *Создание* — не syscall: рантайм лишь выделяет структуру `g` и стартовый стек ~2 КБ и кладёт горутину в локальную runqueue текущего P. Создание же потока (`clone`) — это системный вызов, аллокация kernel-стека и `task_struct`.
      2. *Память* — стек горутины растёт динамически (copy-on-grow), тогда как поток резервирует большой стек (на Linux по умолчанию до 8 МБ виртуального адресного пространства на поток, `ulimit -s`).
      3. *Планирование* — в user-space, без перехода в ядро; блокировка на канале/сети не блокирует поток ОС (см. netpoller).
  - level: deep
    text_md: |
      **Модель GMP и почему M:N даёт дешёвый I/O.** Планировщик Go оперирует тремя сущностями: G (горутина), M (поток ОС, `machine`), P (логический процессор — контекст с локальной очередью, число задаётся `GOMAXPROCS`). Чтобы исполнять Go-код, M должен держать P. Горутин может быть миллион, но одновременно исполняется не больше `GOMAXPROCS` штук. Детали планировщика (work stealing, `runnext`, sysmon, async preemption) вынесены в отдельный вопрос про GMP — здесь важна граница с ОС.

      Когда горутина уходит в **блокирующий syscall**, рантайм делает handoff: отвязывает P от заблокированного M, чтобы другой M мог продолжить исполнять горутины на этом P, пока первый M висит в ядре. Так один «застрявший» поток не блокирует весь параллелизм. При сетевом I/O вместо блокировки поток не тратится вообще — дескриптор регистрируется в epoll/kqueue, горутина паркуется, M свободен (netpoller — отдельная тема).

      **Тонкости для staff:**
      - Горутины **не вытесняются по таймеру честно**, как потоки в CFS. Планировщик Go оптимизирован под throughput, а не под справедливость/приоритеты; до Go 1.14 tight loop без вызовов функций вообще нельзя было прервать.
      - `runtime.LockOSThread` жёстко привязывает G к M — нужно для cgo-библиотек с thread-local state (OpenGL, некоторые GUI). При этом теряется дешевизна миграции.
      - cgo-вызов для планировщика выглядит как syscall (тот же механизм entersyscall/exitsyscall), поэтому активный cgo может «съедать» потоки и требовать больше M.
      - Число потоков ОС не равно `GOMAXPROCS`: рантайм создаёт дополнительные M под блокирующие syscalls, ограничивая их числом `runtime/debug.SetMaxThreads` (по умолчанию 10000). Утечка блокирующих потоков — реальная авария в проде.
      - Стоимость создания: `pthread_create` — единицы–десятки микросекунд; создание горутины — сотни наносекунд, на два-три порядка дешевле.
