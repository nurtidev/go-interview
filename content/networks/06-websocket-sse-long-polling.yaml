slug: websocket-sse-long-polling
section: networks
title: "WebSocket vs SSE vs long polling: выбор для реального времени в Go"
difficulty: senior
tags: [websocket, sse, realtime]
question_md: |
  Чем отличаются long polling, Server-Sent Events и WebSocket, как выбрать
  между ними под задачу реального времени, и какая тут Go-специфика —
  модель «горутина на соединение», netpoller и ловушки с таймаутами сервера?
answer_levels:
  - level: middle
    text_md: |
      Три способа доставлять обновления клиенту почти в реальном времени.

      Long polling: клиент делает обычный HTTP-запрос, сервер держит его
      открытым, пока не появится событие (или не выйдет таймаут), отвечает,
      и клиент тут же шлёт новый запрос. Работает вообще везде (это просто
      HTTP), но дорого: полный набор заголовков на каждый цикл и «дыры» в
      доставке между ответом и новым запросом.

      SSE (Server-Sent Events): одно долгоживущее HTTP-соединение, по
      которому сервер стримит события в одну сторону (server → client),
      формат текстовый (`text/event-stream`). В браузере встроен
      `EventSource` с автоматическим переподключением и `Last-Event-ID`
      для докачки пропущенного. Минусы: только текст и только
      однонаправленно (от клиента к серверу — отдельными запросами).

      WebSocket: полнодуплексное соединение поверх TCP, начинается с
      HTTP-запроса `Upgrade` (ответ `101 Switching Protocols`), после чего
      это уже не HTTP — двусторонний обмен бинарными или текстовыми
      фреймами с минимальным overhead. Автопереподключения из коробки нет.

      Выбор: только push от сервера (лента, нотификации, прогресс) → SSE,
      он проще всего; нужен двусторонний низколатентный обмен (чат, игры,
      совместное редактирование) → WebSocket; нужен максимально
      совместимый fallback → long polling.
  - level: senior
    text_md: |
      Практические различия, которые решают выбор. SSE переиспользует
      обычную HTTP-инфраструктуру (прокси, балансировщики, авторизацию по
      заголовкам/cookie), тривиально проходит через L7-прокси и умеет
      переподключаться сам — поэтому для «сервер пушит события клиенту» это
      часто лучший дефолт. WebSocket мощнее (дуплекс, бинарь), но после
      `Upgrade` перестаёт быть HTTP, и вся промежуточная инфраструктура
      (прокси, LB, WAF) должна явно уметь проксировать WebSocket, иначе
      соединение рвётся; плюс sticky sessions практически обязательны —
      соединение живёт на конкретном инстансе.

      Go-специфика — модель «горутина на соединение». Каждое живое
      SSE/WebSocket-соединение обслуживается как минимум одной горутиной.
      Здесь выручает netpoller: заблокированные на сетевом I/O горутины
      паркуются на epoll/kqueue и не занимают OS-поток, поэтому Go дёшево
      держит десятки-сотни тысяч в основном простаивающих соединений — это
      его сильная сторона для realtime. Но «дёшево» не значит «бесплатно»:
      память под стек горутины (от ~2 КБ и растёт), буферы чтения/записи и
      прикладное состояние на соединение — при миллионе коннектов это уже
      гигабайты, и упираешься в лимит файловых дескрипторов и в GC-давление.

      SSE в Go пишется руками почти без библиотек — это `http.Flusher` в
      цикле, и обязательно слушать `ctx.Done()`, чтобы не течь горутинами,
      когда клиент отвалился:

      ```go
      func sse(w http.ResponseWriter, r *http.Request) {
          w.Header().Set("Content-Type", "text/event-stream")
          fl, ok := w.(http.Flusher)
          if !ok { http.Error(w, "no flush", 500); return }
          for {
              select {
              case <-r.Context().Done():
                  return // клиент ушёл — прекращаем
              case ev := <-events:
                  fmt.Fprintf(w, "data: %s\n\n", ev)
                  fl.Flush()
              }
          }
      }
      ```

      Для WebSocket берут `nhooyr.io/websocket` (ныне `coder/websocket`)
      или `gorilla/websocket`.
  - level: deep
    text_md: |
      Ловушка, на которой заваливаются: таймауты `http.Server` убивают
      долгоживущие стримы. `WriteTimeout` — это дедлайн на всю запись
      ответа; для SSE, который пишет часами, он оборвёт соединение. Значит
      для SSE-эндпоинтов `WriteTimeout` надо ставить 0 (или выносить их на
      отдельный сервер с другими таймаутами), а «защиту от зависших»
      реализовывать через `ctx`/heartbeat, а не через глобальный
      `WriteTimeout`. Для WebSocket ситуация иная: после `Upgrade`
      соединение обычно hijack'ается, и таймауты `http.Server` к нему
      больше не применяются штатно — вместо них дедлайны ставят прямо на
      соединении (`SetReadDeadline`/`SetWriteDeadline`) вокруг каждого
      чтения/записи, обычно связкой ping/pong для детекта мёртвых
      клиентов.

      Backpressure и медленные клиенты — вторая большая тема. Если клиент
      читает медленнее, чем вы пишете, TCP-буфер и window заполнятся, и
      `Write`/`Flush` начнёт блокировать вашу горутину-писателя. Без учёта
      этого один медленный потребитель может застопорить рассылку или
      раздуть буферы. Правильный паттерн — писать в соединение через
      per-connection канал с ограниченным буфером и дропать/отключать
      клиента, который не успевает (slow consumer), а не копить
      неограниченно в памяти.

      Про масштаб и heartbeat: и WebSocket, и SSE требуют
      keepalive-пингов (WS ping/pong; SSE — комментарии-строки `:
      keepalive`), потому что промежуточные NAT/прокси убивают
      «молчащие» соединения по idle-таймауту (см. отдельный вопрос про
      NAT и conntrack). А при горизонтальном масштабировании появляется
      задача fan-out между инстансами: событие пришло на инстанс A, а
      подписчик держит соединение к инстансу B — нужен общий брокер
      (Redis Pub/Sub, Kafka, NATS), чтобы доставить событие на нужный
      инстанс.
