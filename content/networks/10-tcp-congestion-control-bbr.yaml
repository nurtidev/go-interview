slug: tcp-congestion-control-bbr
section: networks
title: "TCP congestion control: slow start, CUBIC vs BBR"
difficulty: staff
tags: [tcp, congestion-control, bbr]
question_md: |
  Как работает управление перегрузкой в TCP (slow start, congestion
  avoidance, AIMD, реакция на потери), чем CUBIC отличается от BBR, и когда
  переход на BBR реально помогает? Что из этого в руках backend-разработчика?
answer_levels:
  - level: middle
    text_md: |
      Без congestion control отправитель залил бы сеть пакетами, роутеры
      начали бы их дропать, и сеть свалилась бы в congestion collapse. TCP
      это предотвращает, динамически управляя congestion window (CWND) —
      сколько байт можно держать «в полёте» (отправлено, но ещё не
      подтверждено ACK). Реальный лимит скорости — `min(CWND, RWND)`, где
      RWND — окно приёма получателя (flow control).

      Фазы классического алгоритма:

      - Slow start: CWND стартует с небольшого initial window (по RFC 6928
        — около 10 MSS) и удваивается каждый RTT — экспоненциальный рост,
        пока не достигнет порога `ssthresh` или не случится потеря.
      - Congestion avoidance: после `ssthresh` рост линейный, +1 MSS за
        RTT (аддитивно), чтобы аккуратно нащупать потолок.

      Это и есть AIMD (Additive Increase, Multiplicative Decrease):
      прибавляем понемногу, а при потере — режем окно вдвое. Реакция на
      потерю зависит от того, как её обнаружили: три дублирующихся ACK →
      fast retransmit + fast recovery (окно вдвое, остаёмся в congestion
      avoidance), а вот RTO-таймаут (ACK вообще не пришёл) трактуется как
      серьёзная беда: CWND сбрасывается почти в ноль и slow start
      начинается заново — это гораздо разрушительнее для throughput.
  - level: senior
    text_md: |
      CUBIC (дефолт в Linux уже много лет) — эволюция AIMD для каналов с
      большим BDP (Bandwidth-Delay Product = пропускная × RTT). Проблема
      классического линейного роста: на «толстом длинном» канале
      (например, трансконтинентальный 10 Гбит/с × 150мс RTT) после потери
      окну нужны десятки секунд, чтобы аддитивно разогнаться обратно.
      CUBIC делает рост CWND кубической функцией времени с последней
      потери и, что важно, RTT-независимой: он быстро восстанавливается до
      уровня, где была потеря (`Wmax`), осторожно проходит около него и
      затем снова наращивает. RTT-независимость даёт более честное
      распределение между потоками с разными задержками. Но CUBIC остаётся
      **loss-based**: сигнал перегрузки для него — это потеря пакета.

      Отсюда две слабости loss-based подхода, которые и мотивировали BBR:

      - Bufferbloat: современные роутеры имеют огромные буферы, поэтому
        под нагрузкой пакеты не дропаются, а копятся в очередях — latency
        растёт до сотен мс, а CUBIC, не видя потерь, продолжает наращивать
        окно, только усугубляя задержку.
      - Потери не от перегрузки: на Wi-Fi и мобильных каналах пакеты
        теряются из-за радиопомех, а не из-за congestion; loss-based
        алгоритм ошибочно режет окно и обваливает throughput.
  - level: deep
    text_md: |
      BBR (Bottleneck Bandwidth and RTT, Google, 2016) — принципиально
      другая парадигма: он не ждёт потерь, а строит модель канала,
      непрерывно оценивая две величины — BtlBw (пропускная способность
      узкого места) и RTprop (минимальный RTT, то есть без очередей), — и
      держит объём данных в полёте около BDP = BtlBw × RTprop. Так он
      нагружает канал по максимуму, не переполняя буферы, поэтому даёт и
      высокий throughput, и низкую latency. Фазы BBR: STARTUP
      (экспоненциальный разгон, пока растёт BtlBw), DRAIN (слить
      набежавшую очередь), PROBE_BW (рабочий режим — периодически пробует
      прибавить, чтобы нащупать рост полосы) и PROBE_RTT (изредка снижает
      нагрузку, чтобы честно измерить RTprop без очередей).

      Где BBR реально выигрывает: высокий BDP (межрегиональный/межДЦ
      трафик, CDN), каналы с потерями не от перегрузки (мобильные) — там
      прирост throughput и снижение хвостовых задержек могут быть
      кратными; поэтому его выкатили Google (YouTube), Cloudflare, Spotify.
      Важная оговорка честности: BBRv1 при сосуществовании с CUBIC-потоками
      мог вести себя нечестно (перетягивать полосу или, наоборот,
      недобирать в некоторых режимах) — над fairness работали в BBRv2/v3,
      и это ровно тот нюанс, который отличает «слышал про BBR» от
      «понимаю компромиссы».

      Что здесь в руках backend-разработчика — важная граница. Выбор
      алгоритма congestion control — это в основном настройка ОС, а не
      приложения: `sysctl net.ipv4.tcp_congestion_control=bbr` (плюс
      `net.core.default_qdisc=fq`, который BBR требует для пейсинга),
      Linux 4.9+. Прикладной Go-код congestion control per-socket штатно
      не меняет; при большой нужде это делают через `Dialer.Control` и
      `setsockopt(TCP_CONGESTION)` на файловом дескрипторе — но это
      экзотика. Что действительно стоит уметь на уровне сокета — тюнить
      буферы под высокий BDP (`SO_SNDBUF`/`SO_RCVBUF`, чтобы окно вообще
      могло дорасти до BDP) и отключать Nagle через `TCP_NODELAY` для
      RPC/интерактивного трафика (Go в `net/http` и gRPC ставит его сам).
      Итоговая staff-мысль: congestion control объясняет «почему одинаковый
      сервис по throughput ведёт себя по-разному на локальном и на
      кросс-региональном канале», и лечится это в первую очередь на уровне
      инфраструктуры/ядра (BBR, fq, размеры буферов), а не переписыванием
      приложения.
