slug: tcp-udp-handshake-timewait
section: networks
title: "TCP vs UDP, 3-way handshake и ловушка TIME_WAIT"
difficulty: middle
tags: [tcp, udp, time-wait]
question_md: |
  Чем принципиально отличаются TCP и UDP, как проходит установка и закрытие
  TCP-соединения, и почему на нагруженном сервисе накапливаются соединения в
  состоянии TIME_WAIT — чем это грозит и как с этим бороться?
answer_levels:
  - level: middle
    text_md: |
      TCP — надёжный протокол с установлением соединения: он гарантирует
      доставку и порядок байтов, реализует flow control (не заваливает
      получателя данными быстрее, чем тот успевает читать) и congestion
      control (адаптируется к пропускной способности сети). UDP —
      connectionless: никаких гарантий доставки и порядка, нет retransmit,
      меньше overhead и задержки. Отсюда и выбор: TCP для HTTP, gRPC, БД,
      где важна целостность; UDP для DNS, видео/аудио-стриминга, игр и
      VoIP, где потеря отдельного пакета терпима, а лишняя задержка на
      подтверждения — нет (QUIC/HTTP/3 строится поверх UDP как раз чтобы
      реализовать надёжность в user space без TCP-ограничений).

      Установка TCP — 3-way handshake:

      ```
      Client                         Server
        | ---------- SYN --------->  |   seq=x
        | <------- SYN-ACK --------  |   seq=y, ack=x+1
        | ---------- ACK --------->  |   ack=y+1
        |         ESTABLISHED        |
      ```

      Обмен SYN/SYN-ACK/ACK нужен, чтобы обе стороны согласовали
      начальные sequence numbers и подтвердили готовность. Закрытие —
      4-way handshake: каждая сторона отправляет свой `FIN` и получает на
      него `ACK` (полудуплексное закрытие — направления закрываются
      независимо). Сторона, которая инициировала закрытие первой (послала
      первый `FIN`, active close), после этого попадает в состояние
      TIME_WAIT и висит там некоторое время, прежде чем окончательно
      освободить сокет.
  - level: senior
    text_md: |
      TIME_WAIT — это не баг, а обязательная фаза протокола на стороне,
      выполнившей active close. Она решает две задачи: (1) гарантирует,
      что последний `ACK` дошёл — если он потерялся, удалённая сторона
      повторит `FIN`, и мы должны ещё быть живы, чтобы ответить; (2)
      «выдерживает» старые дублированные сегменты предыдущего соединения,
      чтобы они не были ошибочно приняты новым соединением с тем же
      4-tuple (src ip:port, dst ip:port). Длительность — 2*MSL (Maximum
      Segment Lifetime); в Linux это захардкоженные 60 секунд.

      Ключевой момент для собеседования — на какой стороне копится
      TIME_WAIT. Он копится там, где закрывают соединение первыми. Если
      ваш сервис активно ходит наружу (в другой микросервис, в БД, в
      сторонний API) короткоживущими соединениями и сам их закрывает —
      TIME_WAIT накапливается у вас как у клиента, и каждый такой сокет
      на 60 секунд удерживает эфемерный порт из диапазона исходящих
      портов (в Linux по умолчанию ~28 тысяч: 32768–60999). При высоком
      RPS к одному backend это приводит к исчерпанию портов и ошибке
      `cannot assign requested address` (EADDRNOTAVAIL) — сервис
      «внезапно» перестаёт устанавливать новые соединения.

      Правильное лечение — не плодить короткоживущие соединения, а
      переиспользовать их через keep-alive и пул. В Go для HTTP это
      `http.Transport` с настроенными `MaxIdleConnsPerHost` (см. вопрос
      про пулы) и обязательным дочитыванием и закрытием тела ответа,
      чтобы соединение вернулось в пул, а не закрылось:

      ```go
      resp, err := client.Do(req)
      if err != nil {
          return err
      }
      defer resp.Body.Close()
      // без этого соединение не переиспользуется и уйдёт в TIME_WAIT
      io.Copy(io.Discard, resp.Body)
      ```
  - level: deep
    text_md: |
      Тонкости, которые отличают «читал статью» от «разбирал в проде».

      Не путать TIME_WAIT с CLOSE_WAIT. TIME_WAIT — нормальное состояние
      активного закрывающего, оно само рассосётся за 60с. А вот большое
      число CLOSE_WAIT — это почти всегда ваш баг: удалённая сторона
      прислала `FIN`, а ваше приложение не вызвало `Close()` на
      соединении (забыли закрыть `resp.Body`, `net.Conn`, утёк дескриптор).
      CLOSE_WAIT сам не уйдёт и течёт до исчерпания файловых дескрипторов.

      Про тюнинг ядра важно знать, что можно, а что нельзя. `tcp_tw_reuse`
      позволяет переиспользовать сокеты в TIME_WAIT для новых *исходящих*
      соединений и безопасен при включённых TCP timestamps — это валидная
      мера для клиента с большим fan-out. А вот `tcp_tw_recycle` —
      ловушка: он ломал соединения от клиентов за NAT (общий публичный IP
      с рассинхронизированными timestamps) и был полностью удалён из ядра
      в Linux 4.12, поэтому советовать его на собеседовании — красный
      флаг. `SO_REUSEADDR` — это про другое: он позволяет серверу заново
      забиндиться на порт, где ещё висят TIME_WAIT-сокеты (актуально при
      быстром рестарте listener'а), а не решает исчерпание эфемерных
      портов у клиента.

      Со стороны сервера (принимающего входящие) TIME_WAIT обычно менее
      болезненный: сокеты привязаны к одному listen-порту, а варьируется
      клиентский конец 4-tuple, так что порты не «кончаются» так же, как у
      исходящего клиента, — но таблица сокетов и память всё равно растут.
      Диагностика — `ss -s` и `ss -tan state time-wait | wc -l`. И общий
      системный вывод: если у сервиса взрывообразно растёт TIME_WAIT,
      сначала ищут не sysctl-тюнинг, а то место в коде, где создаются
      одноразовые соединения вместо переиспользования пула (типовая
      причина в Go — новый `http.Client`/`Transport` на каждый запрос или
      недочитанный `Body`).
