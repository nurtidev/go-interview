slug: dns-resolution-go-resolver
section: networks
title: "DNS: резолвинг, записи, TTL и ловушки резолвера в Go"
difficulty: senior
tags: [dns, ttl, net-resolver]
question_md: |
  Как работает DNS-резолвинг, какие бывают записи и зачем TTL, и какие
  специфические ловушки поджидают в Go: чем cgo-резолвер отличается от
  чистого Go-резолвера и почему сервис продолжает ходить на «старый» IP?
answer_levels:
  - level: middle
    text_md: |
      DNS — распределённая система, переводящая доменные имена в IP.
      Резолвинг рекурсивный: приложение спрашивает stub-резолвер ОС, тот
      идёт к recursive resolver (провайдер или, например, 8.8.8.8), а он,
      если нет в кэше, обходит иерархию: root-серверы → TLD-сервер (.com)
      → authoritative-сервер зоны, который и отдаёт финальный ответ. Каждый
      уровень кэширует ответ на время TTL, чтобы не бегать по всей цепочке
      на каждый запрос.

      Основные типы записей: `A` (имя → IPv4), `AAAA` (→ IPv6), `CNAME`
      (алиас на другое имя), `MX` (почтовые серверы), `TXT` (произвольный
      текст — SPF, верификации), `NS` (какие серверы authoritative для
      зоны), `SRV` (сервис + порт), `PTR` (обратный резолвинг IP → имя),
      `SOA` (метаданные зоны). TTL — это компромисс: большой TTL снижает
      нагрузку и задержки, но замедляет распространение изменений (при
      смене IP старый адрес живёт в кэшах до истечения TTL); маленький TTL
      даёт быстрое переключение ценой большего числа запросов. DNS обычно
      работает по UDP на порту 53, а при больших ответах (или зонных
      трансферах) переключается на TCP.
  - level: senior
    text_md: |
      Главная Go-специфика — у стандартной библиотеки два резолвера, и они
      ведут себя по-разному. Cgo-резолвер вызывает системный
      `getaddrinfo` (libc): он честно учитывает `/etc/nsswitch.conf` и все
      его источники (mDNS, sssd, LDAP-плагины и т.п.). Чистый Go-резолвер
      сам читает `/etc/resolv.conf` и `/etc/hosts` и отправляет
      DNS-запросы напрямую. Go по умолчанию предпочитает чистый Go-резолвер,
      но переключается на cgo, если в конфигурации есть то, что pure-Go не
      умеет корректно обработать. Выбор форсируется через
      `GODEBUG=netdns=go` / `netdns=cgo` или `Resolver{PreferGo: true}`.

      Почему это важно на практике:

      - Cgo-резолвер блокирует настоящий OS-поток на время `getaddrinfo`
        (вызов нельзя прервать и он не дружит с `context`), поэтому под
        всплеском медленных lookup'ов растёт число потоков рантайма, а
        отмена по таймауту фактически не работает. Чистый Go-резолвер
        неблокирующий: запросы идут через netpoller как обычный сетевой
        I/O, отменяются по `context` и не съедают потоки.
      - Зато pure-Go может не увидеть экзотические NSS-источники, которые
        видит libc, — иногда именно поэтому «в контейнере имя резолвится,
        а с хоста нет» или наоборот.

      Практика — задавать таймаут через `context` и, при необходимости,
      кастомный резолвер:

      ```go
      r := &net.Resolver{
          PreferGo: true, // неблокирующий, уважает ctx
          Dial: func(ctx context.Context, network, addr string) (net.Conn, error) {
              d := net.Dialer{Timeout: 2 * time.Second}
              return d.DialContext(ctx, "udp", "8.8.8.8:53")
          },
      }
      ctx, cancel := context.WithTimeout(ctx, 2*time.Second)
      defer cancel()
      ips, err := r.LookupHost(ctx, "api.example.com")
      ```
  - level: deep
    text_md: |
      Самая коварная ловушка: стандартная библиотека Go не кэширует DNS на
      стороне клиента вообще (кэширование — это забота ОС/cgo/recursive
      resolver). Из этого следует парадокс, ломающий деплои. Резолв
      происходит один раз — при установке TCP-соединения. Дальше
      `http.Transport` держит это соединение живым по keep-alive и
      переиспользует его, вообще не делая новых lookup'ов. Поэтому если за
      DNS-именем стоит балансировщик или сервис, который сменил набор IP
      (rolling deploy, failover, autoscaling), долгоживущий клиент будет
      продолжать долбить в старый, уже мёртвый или выведенный IP, пока
      соединение не порвётся, — TTL тут не спасает, потому что повторного
      резолва просто не происходит.

      Лечится это не «уменьшить TTL», а на уровне жизненного цикла
      соединений: ограничить возраст соединений, чтобы они периодически
      пересоздавались и заново резолвили. В Go нет прямого
      `ConnMaxLifetime` на `http.Transport`, поэтому применяют либо
      `MaxConnsPerHost` + периодический `CloseIdleConnections()`, либо
      кастомный `DialContext`, который сам резолвит и ротирует IP, либо
      делегируют балансировку service mesh / клиентскому балансировщику
      (как gRPC с DNS-resolver'ом и политикой round_robin, который
      периодически перечитывает записи).

      Ещё пара нюансов уровня staff. IPv4/IPv6 и happy eyeballs: Go-диалер
      при `tcp` делает `A` и `AAAA` параллельно и racing-подключение,
      поэтому кривой AAAA-ответ или IPv6-маршрут может незаметно добавлять
      задержку. И CNAME-цепочки: `LookupHost` вернёт итоговые адреса, но
      если вам нужны именно канонические имена или конкретный тип записи —
      есть `LookupCNAME`, `LookupIP` с сетевым параметром (`ip4`/`ip6`) и
      `LookupSRV`, а не только универсальный `LookupHost`.
