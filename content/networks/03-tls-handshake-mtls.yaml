slug: tls-handshake-mtls
section: networks
title: "TLS: handshake, сертификаты и mTLS (crypto/tls)"
difficulty: senior
tags: [tls, mtls, crypto-tls]
question_md: |
  Как проходит TLS-handshake (и чем 1.3 лучше 1.2), как клиент проверяет
  сертификат сервера, что добавляет mTLS и как всё это настраивается в Go
  через `crypto/tls`?
answer_levels:
  - level: middle
    text_md: |
      TLS даёт три вещи: шифрование (перехваченный трафик нечитаем),
      аутентификацию (сертификат подтверждает, что вы говорите именно с
      тем сервером) и целостность (данные не подменены в пути). HTTPS —
      это HTTP поверх TLS поверх TCP.

      Handshake в TLS 1.3 укладывается в 1 RTT: клиент шлёт `ClientHello`
      со списком поддерживаемых алгоритмов и своим `key_share`, сервер
      отвечает `ServerHello` с выбранным алгоритмом и своим `key_share`, и
      уже зашифрованными — сертификат, `CertificateVerify` (подпись,
      доказывающая владение приватным ключом) и `Finished`. Обе стороны
      через ECDH (обычно X25519) выводят общий симметричный ключ, которым
      дальше шифруется весь трафик AEAD-шифром (AES-GCM или
      ChaCha20-Poly1305). TLS 1.2 требовал 2 RTT и имел больше «ручек» для
      небезопасных конфигураций; 1.3 выкинул устаревшие шифры и статический
      RSA key exchange, поэтому он и быстрее, и безопаснее.

      Проверка сертификата на клиенте: сертификат сервера подписан
      промежуточным CA, тот — корневым; клиент строит цепочку до корня,
      которому доверяет (системное хранилище), проверяет срок действия и
      что имя хоста совпадает с SAN сертификата.
  - level: senior
    text_md: |
      mTLS (mutual TLS) — это когда не только сервер предъявляет
      сертификат клиенту, но и клиент серверу, и сервер его проверяет.
      Обычная HTTPS-аутентификация односторонняя (мы верим серверу, а он
      нас пускает по токену/паролю уже поверх TLS); mTLS делает
      аутентификацию криптографической и двусторонней, поэтому это база
      для zero-trust и service mesh (Istio, Linkerd): каждый сервис имеет
      свой сертификат, и вызовы между сервисами взаимно аутентифицируются
      на транспортном уровне.

      В Go всё крутится вокруг `tls.Config`. На сервере для mTLS задают
      `ClientAuth: tls.RequireAndVerifyClientCert` и пул доверенных CA в
      `ClientCAs`; на клиенте — свой `Certificates` и корневые CA в
      `RootCAs`:

      ```go
      // сервер: требуем и проверяем клиентский сертификат
      srv := &http.Server{
          Addr: ":8443",
          TLSConfig: &tls.Config{
              MinVersion: tls.VersionTLS13,
              ClientAuth: tls.RequireAndVerifyClientCert,
              ClientCAs:  clientCAPool,
          },
      }

      // клиент: предъявляем свой сертификат
      tr := &http.Transport{
          TLSClientConfig: &tls.Config{
              Certificates: []tls.Certificate{clientCert},
              RootCAs:      rootCAPool,
              MinVersion:   tls.VersionTLS13,
          },
      }
      ```

      Значения `ClientAuth` образуют лесенку: `NoClientCert`,
      `RequestClientCert`, `RequireAnyClientCert`, `VerifyClientCertIfGiven`,
      `RequireAndVerifyClientCert` — для настоящего mTLS нужен именно
      последний, иначе сертификат либо не запрашивается, либо не
      проверяется по CA. `MinVersion` стоит явно поднимать до 1.2/1.3:
      по историческим причинам стоит перестраховываться, а не полагаться
      на дефолт.
  - level: deep
    text_md: |
      SNI (Server Name Indication) — расширение, где клиент в `ClientHello`
      указывает запрашиваемое имя хоста *до* получения сертификата, чтобы
      сервер на одном IP мог выбрать нужный из нескольких сертификатов
      (виртуальный хостинг для HTTPS). В Go это поле `ServerName` в
      `tls.Config`, а на сервере — колбэк `GetCertificate`, выбирающий
      сертификат по SNI. Тонкость: в TLS 1.3 сам сертификат уже
      зашифрован, но SNI в `ClientHello` по-прежнему в открытом виде
      (Encrypted Client Hello это решает, но развёрнут не везде), поэтому
      «TLS полностью скрывает, к какому хосту вы идёте» — неверно.

      Про 0-RTT resumption: TLS 1.3 умеет возобновлять сессию по
      session ticket / PSK и слать early data за 0 RTT — но это открывает
      replay-атаку (перехваченные ранние данные можно переслать), поэтому
      0-RTT безопасен только для идемпотентных запросов. Ловушка Go:
      клиентский session resumption по умолчанию ВЫКЛЮЧЕН — `net/http`
      не ставит `ClientSessionCache`, и пока он nil, session tickets на
      клиенте не работают; чтобы новые соединения поднимались по
      сокращённому handshake, нужно явно задать
      `TLSClientConfig.ClientSessionCache = tls.NewLRUClientSessionCache(...)`.
      Не путать с keep-alive: переиспользование живого соединения из пула —
      это вообще без handshake, resumption нужен именно для новых соединений.

      Опасные ручки, которые надо уметь называть. `InsecureSkipVerify: true`
      полностью отключает проверку цепочки и имени — это отключение
      аутентификации, не просто «self-signed разрешён», и в проде
      недопустимо; для собственных CA правильный путь — добавить их в
      `RootCAs`, а не выключать проверку. Для нестандартной валидации
      (pinning, проверка по своим правилам) есть колбэки
      `VerifyPeerCertificate` и `VerifyConnection`, которые вызываются
      после стандартной проверки (или вместо неё, если её отключили).
      Отзыв сертификатов (CRL/OCSP) стандартный Go-клиент по умолчанию не
      проверяет — на это часто ловят на staff-собеседовании: если модель
      угроз требует реакции на скомпрометированные сертификаты, отзыв
      нужно организовывать отдельно (OCSP stapling на сервере, короткие
      сроки жизни сертификатов как в SPIFFE/mesh).
