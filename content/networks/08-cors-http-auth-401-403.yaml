slug: cors-http-auth-401-403
section: networks
title: "CORS и аутентификация в HTTP: 401 vs 403, preflight, куки vs токены"
difficulty: middle
tags: [cors, auth, http-status]
question_md: |
  Что такое CORS и preflight-запрос, в чём разница между 401 и 403, и как
  выбирать между куками и токенами для аутентификации — с их рисками (CSRF,
  XSS)?
answer_levels:
  - level: middle
    text_md: |
      CORS (Cross-Origin Resource Sharing) — механизм, которым сервер
      разрешает браузеру делать запросы с другого origin (схема + домен +
      порт). По умолчанию действует same-origin policy: JS со страницы
      `a.com` не может читать ответ от `api.b.com`, пока сервер явно не
      разрешит это заголовками `Access-Control-Allow-Origin` и, при
      необходимости, `Access-Control-Allow-Methods` / `-Headers`. Важно:
      CORS — это ограничение *браузера*, а не защита сервера; curl или
      бэкенд-клиент CORS игнорируют, поэтому нельзя полагаться на него как
      на авторизацию.

      Preflight — предварительный запрос `OPTIONS`, который браузер шлёт
      *сам* перед «непростым» запросом, чтобы спросить разрешение. Простые
      запросы (GET/POST/HEAD с «простыми» заголовками и обычным
      Content-Type) идут без preflight; а вот кастомный заголовок
      (вручную выставленный `Authorization` — всегда, любые `X-...`), метод
      PUT/DELETE/PATCH или `Content-Type: application/json` делают запрос
      «непростым» → сначала `OPTIONS`, и только если сервер ответил
      нужными `Access-Control-*`, браузер отправит основной запрос.
      `Access-Control-Max-Age` кэширует результат preflight.

      401 vs 403: `401 Unauthorized` — «я не знаю, кто ты»: нет или
      невалидны учётные данные (нет/протух токен). `403 Forbidden` — «я
      знаю, кто ты, но тебе сюда нельзя»: аутентификация прошла, а прав на
      ресурс нет.
  - level: senior
    text_md: |
      Детали, которые отличают заученное от понятого. При 401 сервер по
      спецификации должен вернуть заголовок `WWW-Authenticate` с указанием
      схемы (`Bearer`, `Basic`) — это часть контракта, а не просто код.
      Семантически 401 — «повтори с валидными credentials, это может
      помочь», 403 — «повтор не поможет, прав нет». На практике иногда
      осознанно отдают `404` вместо `403`, чтобы не подтверждать само
      существование ресурса неавторизованному пользователю (не сливать
      информацию).

      Куки vs токены — это про то, как переносится идентификатор сессии, и
      про разные модели угроз.

      - Сессионные куки браузер прикрепляет к запросам *автоматически*.
        Это удобно, но именно поэтому уязвимо к CSRF: чужой сайт может
        инициировать запрос к вашему API, и браузер сам приложит куку.
        Защита — атрибут `SameSite` (`Lax`/`Strict`), CSRF-токены, а также
        `HttpOnly` (кука недоступна из JS → защита от кражи через XSS) и
        `Secure` (только по HTTPS).
      - Bearer-токены (JWT и пр.) кладут в заголовок `Authorization`
        вручную. Браузер их сам не прикрепляет → CSRF по умолчанию не
        грозит. Но хранить их приходится в доступном из JS месте
        (localStorage), а значит при XSS их могут украсть; и отзыв
        stateless-JWT сложнее (он валиден до истечения, если не строить
        отдельный blacklist / короткие TTL + refresh).

      В Go это `http.StatusUnauthorized` (401) и `http.StatusForbidden`
      (403), а CORS обычно вешают middleware, аккуратно обрабатывая
      `OPTIONS` (ответить нужными заголовками и 204, не пропуская дальше в
      бизнес-логику).
  - level: deep
    text_md: |
      Связка CORS + credentials — источник тонких багов. Если фронтенд
      шлёт запрос с куками/кредами (`fetch(..., {credentials: 'include'})`),
      сервер обязан вернуть `Access-Control-Allow-Credentials: true`, и
      при этом `Access-Control-Allow-Origin` **не может** быть `*` — только
      конкретный origin (спецификация запрещает wildcard вместе с
      credentials). Значит нужно эхо-отражать разрешённый origin из списка,
      добавлять `Vary: Origin` (иначе кэш/CDN отдаст ответ с чужим
      разрешённым origin), и то же самое для preflight. Частый симптом
      «в Postman работает, в браузере нет» — ровно про это: Postman не
      браузер и CORS не применяет.

      Про `SameSite` и современные дефолты: браузеры перешли к
      `SameSite=Lax` по умолчанию, что само по себе гасит значительную
      часть CSRF на «непростых» межсайтовых запросах, но для сценариев
      «кука должна ходить с чужого origin» (встраивание, кросс-доменные
      SPA) приходится ставить `SameSite=None; Secure`, и тогда защита от
      CSRF снова целиком на вас (CSRF-токены). Отсюда практический выбор:
      для «сайт + его же API на том же родительском домене» удобнее и
      безопаснее сессионные куки (`HttpOnly`, `SameSite`), а для «публичный
      API, мобилки, третьесторонние клиенты» — bearer-токены, потому что
      куки туда просто не вписываются.

      И граница ответственности: preflight и CORS ничего не *авторизуют* —
      они лишь регулируют, отдаст ли браузер ответ скрипту. Настоящая
      авторизация (проверка токена/сессии и прав) выполняется на сервере
      для *каждого* запроса, включая те, что прошли CORS. Путать «CORS
      разрешил» с «пользователь имеет доступ» — концептуальная ошибка,
      которую и проверяют вопросом про 401/403 поверх CORS.
