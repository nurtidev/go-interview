slug: http-keepalive-connection-pool
section: networks
title: "Keep-alive и пулы соединений в net/http: Transport и незакрытый Body"
difficulty: senior
tags: [net-http, transport, keep-alive]
question_md: |
  Как устроен пул соединений в `http.Transport`, что означают `MaxIdleConns`,
  `MaxIdleConnsPerHost` и `IdleConnTimeout`, и почему незакрытый (или
  недочитанный) `resp.Body` — классическая причина завала сервиса?
answer_levels:
  - level: middle
    text_md: |
      HTTP keep-alive — это переиспользование TCP-соединения под несколько
      запросов вместо нового handshake (а с HTTPS ещё и TLS-handshake) на
      каждый запрос. В Go этим заведует `http.Transport` внутри
      `http.Client`: он держит пул простаивающих (idle) соединений и
      выдаёт их под новые запросы к тому же хосту.

      Ключевые параметры пула:

      - `MaxIdleConns` — сколько всего idle-соединений держать по всем
        хостам (в `DefaultTransport` — 100).
      - `MaxIdleConnsPerHost` — сколько idle-соединений на один хост; по
        умолчанию всего 2, и это частый источник проблем (ниже).
      - `MaxConnsPerHost` — жёсткий предел на общее число соединений к
        хосту (0 = без лимита), запросы сверх лимита ждут.
      - `IdleConnTimeout` — как долго держать простаивающее соединение,
        прежде чем закрыть (в `DefaultTransport` — 90с).

      Абсолютно обязательное правило: всегда закрывать `resp.Body`
      (`defer resp.Body.Close()`) после проверки ошибки `Do`/`Get`. Без
      этого соединение и связанная с ним горутина не освобождаются —
      получаете утечку соединений и дескрипторов.
  - level: senior
    text_md: |
      Тонкость, на которой заваливаются: чтобы keep-alive соединение
      *вернулось в пул и переиспользовалось*, тело ответа нужно не только
      закрыть, но и **дочитать до конца (EOF)**. Если вы прочитали только
      часть тела и вызвали `Close()`, Transport не может «доиграть» ответ
      по этому соединению и вынужден его закрыть, а не вернуть в пул — то
      есть keep-alive не работает, на каждый запрос открывается новое
      соединение, растут TIME_WAIT и расход эфемерных портов. Поэтому
      канонический паттерн — слить остаток в `io.Discard` и закрыть:

      ```go
      resp, err := client.Do(req)
      if err != nil {
          return err
      }
      defer resp.Body.Close()
      // ... прочитали, что нужно ...
      io.Copy(io.Discard, resp.Body) // дочитать, чтобы соединение вернулось в пул
      ```

      Второй классический завал — дефолтный `MaxIdleConnsPerHost = 2`. Если
      сервис-агрегатор шлёт сотни параллельных запросов к одному backend,
      в пуле оседает только 2 idle-соединения, а остальные после ответа
      закрываются (их некуда положить). Получается постоянная
      churn'а: открыли-закрыли-открыли, куча TIME_WAIT, лишние
      TCP/TLS-handshake'и и рост latency под нагрузкой. Лечение — поднять
      `MaxIdleConnsPerHost` (и при необходимости `MaxIdleConns`) под ваш
      профиль конкурентности:

      ```go
      tr := &http.Transport{
          MaxIdleConns:        200,
          MaxIdleConnsPerHost: 100, // вместо дефолтных 2
          IdleConnTimeout:     90 * time.Second,
      }
      client := &http.Client{Transport: tr, Timeout: 10 * time.Second}
      ```
  - level: deep
    text_md: |
      Анти-паттерн уровня «уронил прод»: создавать новый `http.Client` или
      `http.Transport` на каждый запрос. Пул живёт внутри `Transport`,
      поэтому новый Transport на каждый вызов = пул из одного соединения,
      который тут же выбрасывается, = нулевое переиспользование, лавина
      новых соединений и утечка (старые Transport'ы с idle-соединениями не
      закрываются сами — нужен `CloseIdleConnections`). Правило:
      `Client`/`Transport` создаётся один раз и переиспользуется (они
      потокобезопасны). `http.DefaultClient` тоже переиспользуется, но у
      него нет `Timeout` — использовать его для внешних вызовов без своего
      таймаута опасно: один зависший сервер держит горутину и соединение
      бесконечно.

      Про таймауты полезно различать уровни. `Client.Timeout` — общий
      дедлайн на весь запрос, включая чтение тела (для стриминга больших
      тел он не подходит — оборвёт на середине). Точнее — через
      `Transport`: `DialContext` timeout (установка TCP),
      `TLSHandshakeTimeout`, `ResponseHeaderTimeout` (ждём только
      заголовки), `ExpectContinueTimeout`, плюс `context` на самом запросе
      через `http.NewRequestWithContext`. Для долгих ответов ставят
      таймаут на соединение/заголовки, а не общий `Client.Timeout`.

      И взаимодействие пула с DNS и балансировкой (пересекается с
      соседними вопросами): keep-alive-соединения не ре-резолвят DNS и
      «прилипают» к IP, на который законнектились, поэтому при смене IP
      backend старые соединения продолжают идти на мёртвый адрес. У
      `http.Transport` нет `ConnMaxLifetime`, поэтому ротацию соединений
      организуют вручную (`MaxConnsPerHost` + периодический
      `CloseIdleConnections`, кастомный `DialContext`, либо внешний
      балансировщик/service mesh). А `MaxConnsPerHost` при исчерпании
      лимита начинает *блокировать* новые запросы в ожидании свободного
      соединения — это может маскироваться под «сервис тормозит», хотя на
      деле упёрлись в потолок пула.
