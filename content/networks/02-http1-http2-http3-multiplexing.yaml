slug: http1-http2-http3-multiplexing
section: networks
title: "HTTP/1.1 vs HTTP/2 vs HTTP/3: мультиплексирование и head-of-line blocking"
difficulty: senior
tags: [http2, http3, quic]
question_md: |
  Как эволюционировал HTTP от 1.1 к 2 и 3: что такое мультиплексирование,
  на каком уровне остаётся head-of-line blocking в каждой версии, и как QUIC
  меняет картину? Что из этого поддерживает стандартная библиотека Go?
answer_levels:
  - level: middle
    text_md: |
      HTTP/1.1 — текстовый протокол, по одному соединению обрабатывается
      один запрос за раз. Pipelining в спецификации есть, но на практике
      сломан и отключён, поэтому браузеры открывают до ~6 параллельных
      TCP-соединений на хост, чтобы грузить ресурсы одновременно.
      Keep-alive позволяет переиспользовать соединение под несколько
      последовательных запросов.

      HTTP/2 — бинарный протокол с фреймами. Главная фича —
      мультиплексирование: множество логических потоков (streams) живут в
      одном TCP-соединении одновременно и независимо, без необходимости
      держать пул из шести соединений. Добавились сжатие заголовков HPACK
      (заголовки повторяются от запроса к запросу — их выгодно сжимать) и
      server push (сервер мог отправить ресурс до запроса — на практике
      оказался бесполезным и фактически похоронен, Chrome его убрал).

      HTTP/3 — это HTTP поверх QUIC, а QUIC работает поверх UDP, а не TCP.
      Ключевая мотивация — убрать head-of-line blocking на транспортном
      уровне (о нём ниже), ускорить установку соединения (TLS 1.3 встроен,
      0-RTT для повторных подключений) и пережить смену IP (connection
      migration — удобно для мобильных клиентов, переключающихся Wi-Fi/LTE).
  - level: senior
    text_md: |
      Head-of-line (HOL) blocking полезно разобрать по уровням, потому что
      это и есть суть перехода 2 → 3.

      В HTTP/1.1 HOL-блокировка на уровне приложения: в одном соединении
      запросы идут строго по очереди, медленный запрос задерживает все
      последующие.

      HTTP/2 убрал HOL на уровне приложения мультиплексированием — потоки
      логически независимы. Но остался HOL на уровне транспорта (TCP): TCP
      гарантирует строго упорядоченную доставку байтов, и если теряется
      один сегмент, ядро задерживает выдачу *всех* последующих байтов до
      его ретрансмита — то есть один потерянный пакет тормозит вообще все
      мультиплексированные потоки этого соединения. На хорошем канале
      HTTP/2 отлично, на канале с потерями (мобильный, дальний) выигрыш
      частично съедается.

      QUIC решает это тем, что реализует потоки в user space поверх UDP и
      знает границы потоков: потеря пакета одного потока не блокирует
      выдачу данных других потоков (каждый stream упорядочен независимо).
      Внутри одного потока порядок по-прежнему гарантируется. HPACK в
      HTTP/2 сам был источником HOL при сжатии заголовков (общая таблица,
      синхронизируемая по упорядоченному потоку) — в HTTP/3 его заменили
      на QPACK, спроектированный так, чтобы не создавать этой зависимости.

      Про Go: `net/http` из коробки говорит на HTTP/2, если соединение
      идёт по TLS и ALPN согласовал `h2` — отдельно ничего включать не
      надо, и сервер, и клиент делают это автоматически. Cleartext HTTP/2
      (h2c) требует явной настройки через `golang.org/x/net/http2/h2c`.
      А вот HTTP/3 в стандартную `net/http` (на момент актуальных релизов)
      не входит — для него берут стороннюю библиотеку `quic-go`
      (`github.com/quic-go/quic-go` и её `http3`-транспорт).
  - level: deep
    text_md: |
      Несколько нюансов, где упрощённая картина ломается.

      «HTTP/2 всегда быстрее» — неверно. Из-за единственного TCP-соединения
      HTTP/2 при потерях может проигрывать шести независимым соединениям
      HTTP/1.1: там потеря бьёт только по одному из шести, а в HTTP/2 —
      по всему. Поэтому реальный выигрыш HTTP/2 зависит от качества канала
      и профиля нагрузки, а не абсолютен.

      Мультиплексирование и балансировка. Для L4-балансировщика одно
      HTTP/2-соединение — это одна TCP-сессия, приклеенная к одному
      backend, и все мультиплексированные потоки идут на один и тот же
      инстанс. Это создаёт перекос нагрузки: долгоживущие HTTP/2/gRPC
      соединения «залипают» на первый выбранный backend, и при scale-out
      новые инстансы не получают трафик. Балансировать по-настоящему
      per-request можно только на L7 (или периодически рвать соединения /
      использовать `MAX_CONCURRENT_STREAMS` и переустановку). Это частая
      боль gRPC-инфраструктуры.

      Про 0-RTT в HTTP/3/TLS 1.3: он ускоряет повторные подключения, но
      early data подвержена replay-атаке (злоумышленник может переслать
      перехваченный ранний запрос), поэтому 0-RTT допустим только для
      идемпотентных операций — не для платежей и не для не-идемпотентных
      мутаций.

      И про инфраструктурную зрелость: HTTP/3 идёт по UDP, а многие
      корпоративные firewall/NAT/middlebox либо дропают, либо
      деприоритизируют UDP на 443, поэтому клиенты применяют happy-eyeballs
      вроде `Alt-Svc` — начинают по HTTP/2/TCP и мигрируют на HTTP/3, если
      он доступен. То есть HTTP/3 обычно не «замена», а дополнение с
      fallback на TCP-версии.
