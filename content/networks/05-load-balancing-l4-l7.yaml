slug: load-balancing-l4-l7
section: networks
title: "Балансировщики L4 vs L7: алгоритмы, health checks, sticky sessions"
difficulty: middle
tags: [load-balancing, l4-l7, health-checks]
question_md: |
  Чем L4-балансировщик отличается от L7, какие бывают алгоритмы
  распределения и виды health-check'ов, что такое sticky sessions и какие
  у них подводные камни?
answer_levels:
  - level: middle
    text_md: |
      Разница в том, на каком уровне модели балансировщик принимает
      решение. L4-балансировщик работает на транспортном уровне: видит
      только IP и порт, форвардит TCP/UDP-соединение целиком, не заглядывая
      в содержимое. Он быстрый, протокол-агностичный (может балансировать
      что угодно, не только HTTP), но не умеет маршрутизировать по URL,
      заголовку или cookie. L7-балансировщик разбирает прикладной протокол
      (HTTP): может роутить по пути/хосту/заголовку, терминировать TLS,
      делать ретраи, буферизацию, content-based routing — но это дороже по
      CPU, потому что нужно парсить каждый запрос.

      Алгоритмы распределения: round robin (по кругу), weighted round robin
      (с весами под разную мощность инстансов), least connections (на
      наименее загруженный по числу активных соединений), IP hash /
      consistent hashing (запросы от одного клиента идут на один backend),
      random и его улучшение power of two choices (выбрать двух случайных,
      отдать менее загруженному). Health checks бывают активные (сам
      балансировщик периодически стучится в `/health` и выводит упавший
      инстанс из ротации) и пассивные (наблюдает за реальным трафиком —
      растут ошибки/таймауты на backend, значит убираем его). Sticky
      sessions — «прилипание» клиента к одному backend (по cookie на L7 или
      по хешу IP на L4), нужно, когда на инстансе лежит сессионное
      состояние.
  - level: senior
    text_md: |
      Про health checks важно понимать разницу между liveness и readiness.
      `/health` не должен просто возвращать 200 всегда — иначе балансировщик
      будет слать трафик на инстанс, который поднялся, но ещё не прогрел
      кэш/пул соединений к БД, или наоборот на тот, у которого отвалилась
      критичная зависимость. Отсюда разделение: liveness (процесс жив,
      перезапускать?) и readiness (готов принимать трафик прямо сейчас?).
      Слишком агрессивный health-check с коротким интервалом сам создаёт
      нагрузку и может выбить здоровый, но временно медленный инстанс,
      усугубив каскад; поэтому нужны разумные пороги (сколько подряд
      неудач → out) и гистерезис на возврат.

      Sticky sessions — это компромисс с ценой. Приклеивание ломает
      равномерность распределения (горячий клиент перегружает свой backend),
      а на scale-in/scale-out или падении инстанса «прилипшие» сессии
      теряются, что для пользователя выглядит как разлогин или потеря
      корзины. Поэтому современный подход — делать сервисы stateless, а
      состояние выносить в общий стор (Redis/БД), и тогда балансировать
      можно свободно любым инстансом. Если состояние всё же локально
      (например, WebSocket-соединение по своей природе привязано к одному
      инстансу), sticky становится вынужденным, и это надо закладывать в
      дизайн.

      В Go L7-прокси/балансировщик легко собрать на
      `net/http/httputil.ReverseProxy` (роутинг, ретраи, переписывание
      заголовков), но продакшн-балансировку обычно делают инфраструктурой
      (Envoy, nginx, HAProxy, облачные ALB/NLB), а не в коде приложения.
  - level: deep
    text_md: |
      Тонкость, которую любят на staff: как балансировка ломается на
      мультиплексированных протоколах. L4-балансировщик оперирует
      TCP-соединениями, а одно HTTP/2- или gRPC-соединение долгоживущее и
      несёт множество запросов-потоков. L4 приклеит всё это соединение к
      одному backend, поэтому per-request распределения не будет: клиент,
      открывший соединение к инстансу A, будет слать на A все свои сотни
      RPS, а поднятые автоскейлером новые инстансы останутся без трафика.
      Реально балансировать gRPC/HTTP2 можно либо на L7 (который
      распределяет отдельные потоки/запросы), либо client-side
      балансировкой (клиент сам держит соединения ко всем backend и
      раскидывает вызовы), либо ограничивая жизнь соединений, чтобы они
      периодически переустанавливались через LB.

      Про алгоритмы под задержку: least connections и power of two choices
      обычно устойчивее round robin к разнородной нагрузке и «медленным»
      инстансам, потому что учитывают текущую занятость, а не раздают
      слепо по кругу; round robin хорош при однородных запросах и инстансах.

      И про топологию терминации TLS. L7-балансировщик обычно
      терминирует TLS на себе (видит plaintext HTTP, может роутить по пути)
      — но тогда трафик внутри периметра идёт незашифрованным, если не
      настроить re-encryption до backend. L4 может пробрасывать TLS насквозь
      (passthrough) до backend, сохраняя end-to-end шифрование и mTLS, но
      теряя возможность роутить по HTTP-содержимому. Выбор L4 vs L7 — это в
      том числе выбор, где заканчивается TLS и кто видит открытый трафик.
