slug: channel-internals-hchan
section: go-internals
title: "Каналы изнутри: hchan, sendq/recvq, блокировки"
difficulty: senior
tags: [channel, runtime, concurrency]
question_md: |
  Как устроен канал в рантайме (`hchan`)? Что происходит при отправке, приёме, закрытии? Что такое прямая передача получателю, как ведут себя nil- и закрытый канал, и какие happens-before гарантии даёт канал?
answer_levels:
  - level: middle
    text_md: |
      Канал в рантайме — это структура `hchan`. Ключевые поля: `buf` — кольцевой буфер (для буферизованных каналов), `qcount` — сколько элементов сейчас в буфере, `dataqsiz` — ёмкость буфера, `sendx`/`recvx` — индексы записи/чтения в кольце, `lock` — мьютекс, и две очереди ожидающих горутин: `sendq` (заблокированные на отправке) и `recvq` (заблокированные на приёме).

      Отправка `ch <- v`: если есть буфер и место — кладём в буфер; если буфера нет или он полон — горутина блокируется и встаёт в `sendq`. Приём `<-ch`: если в буфере есть данные — берём; иначе блокируемся в `recvq`. Закрытие `close(ch)`: помечает канал закрытым и будит всех ожидающих. Отправка в закрытый канал — паника; приём из закрытого — сразу возвращает нулевое значение и `ok=false`. Операции с `nil`-каналом блокируются навсегда.
  - level: senior
    text_md: |
      Разберём точнее, включая ключевую оптимизацию — прямую передачу.

      Каждая заблокированная горутина оборачивается в `sudog` (у неё есть указатель на G, на элемент данных, и она связывается в очередь). При **отправке**:

      1. Если в `recvq` есть ожидающий получатель — данные копируются **напрямую в стек получателя** (`memmove` в его переменную), минуя буфер, и получатель будится. Это `send` из `runtime/chan.go` через `sendDirect`. Быстрый путь, без промежуточного копирования в кольцо.
      2. Иначе, если в буфере есть место — копируем в `buf[sendx]`, двигаем `sendx`.
      3. Иначе — заворачиваем горутину в `sudog`, ставим в `sendq` и паркуем (`gopark`).

      При **приёме** симметрично: если есть ожидающий отправитель — забираем данные (из буфера у буферизованного, либо напрямую от отправителя у небуферизованного) и будим его.

      **Закрытие** выставляет `closed=1` под локом и будит **все** горутины из обеих очередей: получатели получат нулевое значение и `ok=false`, отправители — паникуют. Двойной `close` или `close(nil)` — паника. Отсюда идиома «закрывает только отправитель, и только один».

      **nil-канал** блокирует и на отправке, и на приёме навсегда — это полезно в `select`, чтобы динамически «выключать» ветку, присвоив каналу `nil`.

      Пример корректных паттернов:

      ```go
      // graceful shutdown через закрытие
      done := make(chan struct{})
      go func() {
          for {
              select {
              case <-done:
                  return
              case v := <-work:
                  process(v)
              }
          }
      }()
      close(done) // будит все select'ы на <-done
      ```

      В `select` горутина может ждать сразу на нескольких каналах: для каждого канала создаётся `sudog`, они ставятся во все очереди; когда одна из операций готова, остальные `sudog` снимаются. Порядок проверки case'ов рандомизирован, чтобы избежать голодания.

      **Happens-before**: отправка в канал happens-before завершения соответствующего приёма. Для небуферизованного канала приём happens-before завершения отправки. Закрытие канала happens-before приёма нулевого значения, вызванного закрытием. Это делает канал средством не только передачи данных, но и синхронизации памяти.
  - level: deep
    text_md: |
      Исходники — `runtime/chan.go`. `hchan` также хранит `elemtype *_type` (для write barrier и корректного копирования) и `elemsize`. Буфер `buf` располагается непосредственно за структурой одним аллоком (для каналов элементов без указателей `buf` и `hchan` аллоцируются вместе, и GC не сканирует буфер). Лок — это `runtime.mutex`, не `sync.Mutex`.

      `sendDirect`/`recvDirect` копируют данные напрямую между стеками горутин — это единственное место, где одна горутина пишет в стек другой, поэтому там обязателен write barrier (`typedmemmove`), ведь конкурентный GC может сканировать целевой стек. Разбуженная горутина не копирует данные сама — их уже положил «будильник», и после `goready` она просто продолжает с готовым значением в `sudog.elem`.

      Про производительность: небуферизованный канал — это точка рандеву, всегда с переключением контекста (park/unpark) и захватом лока. Буферизованный канал в неконтендящем случае — просто copy под локом. На горячем пути каналы дороже, чем `sync.Mutex` или атомики, из-за парковки горутин и работы планировщика; поэтому для простого счётчика/флага выбирают атомик, а канал — когда нужна именно передача владения данными или сигнализация. `select` с default даёт неблокирующую попытку.

      Тонкости-ловушки: паника «send on closed channel» — частый прод-инцидент при гонке «закрытие vs отправка»; решается тем, что владелец-отправитель единолично управляет жизненным циклом, а для сигнала «стоп» используют отдельный `done`-канал, читаемый в select. Запись в закрытый канал нельзя защитить проверкой `if !closed`, потому что между проверкой и записью канал может закрыться — это TOCTOU-гонка. `for v := range ch` завершается ровно при закрытии канала и опустошении буфера. Эволюция реализации была стабильной, но в разных версиях менялись детали lock-free быстрых путей и обработка `select` (в старых версиях select компилировался в вызовы `selectgo` с сортировкой каналов по адресу для избежания дедлока при захвате локов).
