slug: interface-iface-eface-nil
section: go-internals
title: "Интерфейсы изнутри: iface, eface и nil-интерфейс"
difficulty: senior
tags: [interface, runtime, nil]
question_md: |
  Как интерфейс устроен в рантайме (`iface`, `eface`, `itab`)? Почему «typed nil» в интерфейсе не равен `nil`? Когда упаковка значения в интерфейс приводит к аллокации и как работает динамический диспатч?
answer_levels:
  - level: middle
    text_md: |
      Интерфейс в Go — это пара из двух слов. Пустой интерфейс `interface{}` (он же `any`) в рантайме — это `eface`: указатель на информацию о типе (`_type`) и указатель на данные (`data`). Непустой интерфейс с методами — это `iface`: указатель на `itab` (таблица типа+интерфейса с методами) и указатель на данные.

      Интерфейс равен `nil`, только если **оба** слова нулевые — и тип, и данные. Отсюда знаменитая ловушка: если положить в интерфейс типизированный nil-указатель, тип уже не пустой, и сравнение с `nil` даёт `false`:

      ```go
      var p *int = nil
      var i interface{} = p
      fmt.Println(i == nil) // false! тип = *int, данные = nil
      ```

      Метод у интерфейса вызывается через таблицу методов в `itab` — это и есть динамический диспатч.
  - level: senior
    text_md: |
      Разберём структуры и главную ловушку.

      `eface` = `{ *_type; data unsafe.Pointer }`. `iface` = `{ *itab; data unsafe.Pointer }`. `itab` кэширует связку «конкретный тип + интерфейс» и содержит: указатель на интерфейс, указатель на `_type` конкретного типа, хеш и главное — массив `fun` с адресами методов конкретного типа в порядке методов интерфейса. `itab` строится один раз на пару (тип, интерфейс) и кэшируется в глобальной хеш-таблице `itabTable`.

      Классический завал на собеседовании — возврат typed nil как ошибки:

      ```go
      type MyError struct{}
      func (e *MyError) Error() string { return "boom" }

      func do() error {
          var e *MyError = nil
          return e            // кладём (*MyError)(nil) в error
      }

      func main() {
          if err := do(); err != nil {
              fmt.Println("сработает!", err == nil) // сработает! false
          }
      }
      ```

      Хотя `data` нулевой, `itab` не нулевой (тип `*MyError`), поэтому `err != nil` истинно. Правильно — возвращать литеральный `nil` из функции с типом возврата `error`, а не типизированный nil-указатель.

      Сравнение интерфейсов сравнивает пару (тип, значение). Если динамические типы разные — не равны. Если типы одинаковые и **несравнимы** (срез, map, функция) — сравнение вызывает панику `runtime error: comparing uncomparable type`:

      ```go
      var a, b interface{} = []int{1}, []int{1}
      _ = a == b // panic: comparing uncomparable type []int
      ```

      Про аллокации: упаковка значения в интерфейс кладёт указатель в `data`. Если значение больше слова или не помещается по значению, оно уходит на кучу (escape), и это стоит аллокации. Мелкие целые оптимизированы: рантайм держит статический массив `staticuint64s` для маленьких значений, так что `interface{}(byte(5))` не аллоцирует. `fmt.Println(x)` почти всегда заставляет `x` escape-нуться в кучу именно из-за упаковки в `interface{}`.

      Method set: у типа `T` в интерфейс попадают методы с value-receiver; у `*T` — и value-, и pointer-receiver. Поэтому значение (не указатель) с методами на `*T` не удовлетворяет интерфейсу:

      ```go
      type S struct{}
      func (s *S) M() {}
      var _ I = S{}  // ошибка: M имеет pointer receiver
      var _ I = &S{} // ок
      ```
  - level: deep
    text_md: |
      В исходниках это `runtime/iface.go` и `runtime/runtime2.go`. `itab.fun` — это `[1]uintptr` в объявлении, но реально массив переменной длины; `fun[0] == 0` служит маркером, что тип не реализует интерфейс (используется в проверках при type assertion `i.(I)`). Построение `itab` при первом использовании идёт через `getitab`, результат кладётся в `itabTable` (open-addressing хеш), рост которой защищён `itabLock`.

      Динамический диспатч: вызов `i.M()` компилируется в загрузку `itab.fun[k]` (где k — индекс метода) и косвенный вызов по этому адресу. Это дороже прямого вызова: лишняя загрузка + невозможность инлайна, плюс промах предсказателя ветвлений на непредсказуемых типах. Компилятор умеет девиртуализировать вызов, если конкретный тип известен статически (`devirtualization` в SSA), превращая интерфейсный вызов в прямой и открывая инлайн.

      Type assertion `v, ok := i.(T)` для конкретного типа сравнивает `_type` напрямую (быстро); для интерфейса `i.(I)` — ищет/строит `itab`. Type switch кэширует itab по ветвям.

      Эволюция: до Go 1.4 `data` мог хранить мелкие значения инлайн прямо в слове интерфейса (не всегда указатель). После перехода на точный (precise) GC в 1.4 интерфейс всегда хранит в `data` указатель — это упростило сканирование кучи сборщиком, ценой того, что теперь любое непустое неуказательное значение при упаковке уходит в кучу (кроме оптимизированных мелких целых). Знание этого объясняет, почему боксинг в интерфейс — реальный источник аллокаций в горячем коде и почему дженерики (Go 1.18) с их мономорфизацией/стенсилингом иногда позволяют этих аллокаций избежать.
