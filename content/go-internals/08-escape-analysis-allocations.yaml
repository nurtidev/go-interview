slug: escape-analysis-allocations
section: go-internals
title: "Escape analysis: стек vs куча"
difficulty: senior
tags: [compiler, memory, performance]
question_md: |
  Что такое escape analysis? Как компилятор решает, разместить значение на стеке или в куче? Назовите типичные причины escape и объясните, как читать вывод `-gcflags=-m`. Как inlining, `sync.Pool` и преаллокация влияют на давление на память?
answer_levels:
  - level: middle
    text_md: |
      Escape analysis — это анализ, который компилятор Go выполняет **на этапе компиляции**, чтобы решить, «убегает» ли значение из области видимости функции. Если значение не покидает функцию, его можно разместить на **стеке**; если может пережить возврат функции — оно «escape-ится» в **кучу** (heap).

      Стек дешевле: память освобождается автоматически при возврате из функции, GC её не трогает, аллокация — просто сдвиг указателя стека. Куча дороже: за объектами следит сборщик мусора, что создаёт нагрузку. Поэтому чем меньше значений уходит в кучу, тем меньше работы у GC и быстрее программа.

      Классический пример escape — возврат указателя на локальную переменную: раз на неё будет ссылка после выхода из функции, компилятор обязан положить её в кучу. Посмотреть решения компилятора можно командой `go build -gcflags=-m`.
  - level: senior
    text_md: |
      В отличие от C, в Go можно безопасно вернуть указатель на локальную переменную — компилятор сам переместит её в кучу. Разработчик не управляет размещением напрямую, но управляет им косвенно, через стиль кода.

      Типичные причины escape:
      - **возврат указателя** на локальную переменную;
      - **упаковка в `interface{}`** — например, аргументы `fmt.Println` почти всегда escape-ятся, потому что боксинг в интерфейс требует, чтобы значение было адресуемо в куче;
      - **замыкание захватывает переменную по ссылке**, и само замыкание живёт дольше функции;
      - **слишком большой объект** — большие массивы/структуры компилятор кладёт в кучу, чтобы не раздувать стек;
      - **размер неизвестен на этапе компиляции** — например, `make([]T, n)` с динамическим `n`, или слайс, растущий через `append`;
      - **сохранение указателя в поле структуры/глобале/канале**, живущем дольше функции.

      Читаем `-gcflags=-m`:

      ```go
      func newInt() *int {
          x := 42
          return &x
      }
      ```
      ```
      $ go build -gcflags='-m' main.go
      ./main.go:2:2: moved to heap: x
      ```

      Ключевые фразы: `moved to heap: x` — переменная уехала в кучу; `escapes to heap` — значение/аргумент escape-ится; `does not escape` — осталось на стеке; `inlining call to f` — вызов заинлайнен. Двойной `-m -m` даёт подробное объяснение цепочки.

      **Inlining** сильно связан с escape: когда компилятор инлайнит функцию в вызывающую, тело оказывается в контексте вызова, и часто выясняется, что значение не escape-ится (например, указатель, который «убегал» только через границу вызова). Поэтому мелкие функции без escape дают двойную выгоду. Инлайну мешают: слишком большое тело (budget), `defer` в старых версиях, рекурсия, вызовы через интерфейс.

      Снижение давления на память:
      - **`sync.Pool`** — переиспользование объектов между запросами (например, буферов), чтобы не аллоцировать каждый раз; объекты живут между GC-циклами (частично очищаются на GC);
      - **преаллокация** — `make([]T, 0, n)` заранее задаёт `cap`, устраняя серию реаллокаций при `append`;
      - **передача по значению** мелких структур вместо указателя иногда убирает escape.

      ```go
      var bufPool = sync.Pool{New: func() any { return new(bytes.Buffer) }}

      func handle() {
          b := bufPool.Get().(*bytes.Buffer)
          b.Reset()
          defer bufPool.Put(b)
          // ... используем b, не аллоцируя новый буфер
      }
      ```
  - level: deep
    text_md: |
      Escape analysis в Go — это data-flow анализ на графе SSA/AST в компиляторе (`cmd/compile/internal/escape`). Он строит граф «утечек»: узлы — значения/переменные, рёбра — присваивания и взятия адреса. Значение escape-ится, если из него есть путь до «стока», переживающего кадр (возврат, глобал, куча, канал, интерфейс с указателем внутри). Анализ **консервативен**: если он не может доказать, что значение НЕ убегает, оно уходит в кучу (ложноположительные escape допустимы, ложноотрицательные — нет, иначе была бы память-баг).

      Тонкости, которые спрашивают на staff:
      - Escape analysis **межпроцедурный, но ограниченный**: он использует «escape summary» вызываемых функций (какие параметры утекают в результат/кучу), закодированные в тегах. Поэтому небольшие leaf-функции анализируются точнее; вызов через интерфейс непрозрачен — компилятор считает, что аргумент escape-ится.
      - `make([]T, n)` с константным малым `n` может остаться на стеке; с переменным `n` или большим размером — уходит в кучу (порог ~`maxstacksize`, и есть эвристика по размеру).
      - Есть паттерн «self-assignment»/reslice, который компилятор распознаёт, чтобы не считать escape (`s = s[:0]`).
      - Замыкание: если захваченная переменная модифицируется и замыкание живёт дольше — переменная выносится в heap-объект (closure struct). Если замыкание вызывается сразу и не сохраняется — может остаться на стеке.

      Про `sync.Pool` внутри: это per-P локальные пулы (`poolLocal`) с primary/victim кэшем. На каждом GC содержимое сдвигается в victim и очищается на следующем цикле — поэтому Pool не гарантирует, что объект переживёт GC, и не годится для долгоживущего кэша с фиксированным размером. Основная его ценность — сгладить всплески аллокаций одинаковых короткоживущих объектов (буферы в HTTP-хендлерах, encoding/json). Неправильное использование (класть в Pool объекты разного размера, забыть Reset) — источник багов и роста памяти.

      Эволюция: анализ постоянно улучшается от версии к версии (новый escape-проход появился в Go 1.13, заметно точнее старого). Инлайнинг тоже эволюционировал: mid-stack inlining (1.10+) и с Go 1.20+ инлайнинг функций с `defer`/циклами, что вторично улучшает escape. Практический вывод для собеса: не гадать, а профилировать — `go build -gcflags=-m`, `go test -bench -benchmem`, `pprof` с `-alloc_space`/`-inuse_space`.
