slug: strings-runes-bytes-utf8
section: go-internals
title: "Строки, руны, байты и UTF-8 в Go"
difficulty: middle
tags: [strings, unicode, memory]
question_md: |
  Чем отличаются `string`, `[]byte` и `[]rune` в Go? Что возвращает `len(s)` и что даёт `range` по строке? Как обрабатывается невалидный UTF-8 и какие конверсии вызывают аллокации?
answer_levels:
  - level: middle
    text_md: |
      `string` в Go — это неизменяемая последовательность байтов. Внутри это дескриптор из указателя на байты и длины (`ptr`, `len`), без ёмкости. `len(s)` возвращает число **байтов**, а не символов. Строки в Go по соглашению хранятся в UTF-8.

      `rune` — это `int32` (псевдоним `int32`), одна кодовая точка Unicode. `byte` — псевдоним `uint8`, один байт. При `range` по строке Go декодирует UTF-8 и на каждой итерации даёт байтовый индекс начала символа и саму руну:

      ```go
      for i, r := range "héй" {
          fmt.Printf("%d: %c\n", i, r) // индексы 0,1,3 — не подряд!
      }
      ```

      Чтобы получить число символов, а не байтов, используют `utf8.RuneCountInString(s)` или `len([]rune(s))`. Конверсии `[]byte(s)` и `string(b)` обычно копируют данные, потому что строка неизменяема, а слайс — нет.
  - level: senior
    text_md: |
      Важно различать три вещи: байты (физическое представление), руны (кодовые точки), и то, что видит range.

      `range` по строке декодирует UTF-8 посимвольно. Если встречается невалидная последовательность, руной становится `utf8.RuneError` (U+FFFD, «replacement character»), а индекс продвигается на 1 байт. Это же значение вернёт `utf8.DecodeRuneInString` с размером 1. Индекс `i` в `range` — байтовое смещение начала руны, поэтому для многобайтных символов индексы идут не подряд.

      Конверсии и их стоимость:

      ```go
      s := "hello"
      b := []byte(s)     // аллокация + копия: []byte изменяем
      r := []rune(s)     // аллокация: декод UTF-8 в срез int32
      s2 := string(b)    // аллокация + копия обратно
      ```

      `[]rune(s)` разворачивает строку в срез `int32` — по 4 байта на символ, дорого по памяти. Компилятор умеет убирать копию в ряде оптимизированных паттернов: `for i, r := range string`, конкатенация коротких строк, поиск в map по `[]byte`-ключу (`m[string(b)]` не аллоцирует временную строку), сравнение `string(b) == "literal"`. Эти оптимизации важны на горячем пути.

      Для сборки строк по кускам используют `strings.Builder`, который пишет в растущий `[]byte` и отдаёт строку без копии через `unsafe`:

      ```go
      var b strings.Builder
      b.Grow(64)              // преаллокация, меньше реаллокаций
      for i := 0; i < 10; i++ {
          fmt.Fprintf(&b, "%d,", i)
      }
      s := b.String()         // без лишнего копирования
      ```

      Конкатенация через `+` в цикле — антипаттерн: каждая операция создаёт новую строку и копирует всё накопленное (O(n^2)).
  - level: deep
    text_md: |
      На уровне рантайма строка — это `runtime.stringStruct{ str unsafe.Pointer; len int }`, отличается от `slice` отсутствием `cap`. Строковые литералы лежат в read-only секции бинарника, и `ptr` указывает прямо туда — поэтому попытка записи через `unsafe` в литерал даёт segfault.

      `strings.Builder.String()` использует `unsafe.String`/`*(*string)(unsafe.Pointer(&b.buf))` — zero-copy превращение накопленного буфера в строку, при этом Builder запрещает копирование самого себя (`copyCheck` ловит копию через адрес). С Go 1.20 доступны `unsafe.String(ptr, len)` и `unsafe.StringData(s)` — официальный способ строить строку поверх `[]byte` без копии, но с обязательством не мутировать источник (иначе нарушается неизменяемость и возможен UB).

      Про оптимизации компилятора: конверсия `string(b)` внутри `m[string(b)]` распознаётся SSA-проходом и не создаёт heap-строку — сравнение идёт по байтам напрямую. Аналогично `[]byte(s)`, не escape-ящийся и используемый только для чтения, компилятор может разместить на стеке. Проверить можно через `-gcflags=-m`.

      Тонкость про руны: `rune` — это код Unicode, но одна «видимая» графема (например, эмодзи с модификатором или буква с комбинирующим диакритиком) может состоять из нескольких рун. Поэтому `len([]rune(s))` считает кодовые точки, а не графемы; для графем нужен внешний пакет (`golang.org/x/text` или `uniseg`). NFC/NFD-нормализация — частый источник багов сравнения строк, пришедших из разных источников.
