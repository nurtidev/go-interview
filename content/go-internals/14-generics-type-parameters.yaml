slug: generics-type-parameters
section: go-internals
title: "Generics в Go: type parameters, constraints, comparable, ~T и цена"
difficulty: senior
tags: [generics, type-parameters]
question_md: |
  Как работают дженерики в Go (1.18+)? Что такое type parameters и constraints, зачем `comparable` и тильда `~T`, как работает вывод типов (type inference)? Где дженерики уместнее интерфейсов, а где наоборот? Какова цена дженериков в рантайме (stenciling, GC shape, dictionaries) и как они эволюционировали к 1.24?
answer_levels:
  - level: middle
    text_md: |
      Дженерики (Go 1.18) позволяют писать функции и типы, параметризованные типом, без потери типобезопасности и без `interface{}` + приведений.

      ```go
      func Map[T, U any](s []T, f func(T) U) []U {
          r := make([]U, len(s))
          for i, v := range s {
              r[i] = f(v)
          }
          return r
      }

      nums := []int{1, 2, 3}
      strs := Map(nums, func(n int) string { return strconv.Itoa(n) })
      ```

      `[T, U any]` — это **type parameters** с constraint `any` (любой тип). **Constraint** — это интерфейс, ограничивающий множество допустимых типов и разрешённые операции. Стандартные: `any`, `comparable` (типы, которые можно сравнивать `==`/`!=` — нужно для ключей map).

      **Вывод типов**: обычно аргументы типа писать не надо — компилятор выводит их из значений (`Map(nums, ...)`, а не `Map[int, string](nums, ...)`).

      Дженериковые типы:

      ```go
      type Stack[T any] struct{ items []T }

      func (s *Stack[T]) Push(v T) { s.items = append(s.items, v) }
      ```
  - level: senior
    text_md: |
      **Constraints и множества типов.** Constraint — интерфейс, который может перечислять не только методы, но и конкретные типы через union и тильду:

      ```go
      type Number interface {
          ~int | ~int64 | ~float64
      }

      func Sum[T Number](s []T) T {
          var total T
          for _, v := range s {
              total += v // '+' разрешён, потому что все члены Number его поддерживают
          }
          return total
      }
      ```

      `~int` (approximation element) означает «любой тип, чей **underlying type** — `int`», то есть и `type Celsius int` подойдёт. Без тильды (`int`) — только ровно `int`. Union `A | B` — объединение множеств.

      `comparable` — особый constraint: множество всех типов, поддерживающих `==`. Нужен для generic-множеств/кэшей с ключами:

      ```go
      func Unique[T comparable](s []T) []T {
          seen := make(map[T]struct{}, len(s))
          out := s[:0]
          for _, v := range s {
              if _, ok := seen[v]; !ok {
                  seen[v] = struct{}{}
                  out = append(out, v)
              }
          }
          return out
      }
      ```

      **Дженерики vs интерфейсы — где что.** Интерфейс — это про *поведение* (полиморфизм по методам, гетерогенные коллекции, скрытие реализации за границей пакета). Дженерик — про *типобезопасное переиспользование алгоритма* по многим типам с сохранением конкретного типа на выходе. Признаки, что нужен дженерик: контейнер/структура данных (`Stack[T]`, `Set[T]`), функция вида `func([]T, func(T) U) []U`, желание вернуть тот же тип, что пришёл (без `any` и приведений). Признаки, что нужен интерфейс: разные реализации одного поведения (`io.Reader`), нужна гибкость на runtime, точка расширения плагинами. Антипаттерн — параметризовать там, где хватило бы `any` с одним методом: это усложняет сигнатуру без пользы.

      **Ограничения.** Нет методов с собственными type parameters (`func (r Repo) Get[T any]()` запрещён — параметризуется весь тип, а не метод). Нельзя делать type switch по параметру типа напрямую. Constraint с union из типов, не имеющих общих методов, разрешает только операторы, а не вызовы методов.
  - level: deep
    text_md: |
      **Как реализованы в рантайме: GC shape stenciling + dictionaries.** У Go был выбор между полным мономорфизмом (генерировать копию кода под каждый тип, как C++ templates — быстро, но раздувает бинарь и время компиляции) и полной боксингой (одна копия через интерфейсы — медленно). Go выбрал гибрид: **GC shape stenciling**. Компилятор генерирует одну копию кода на каждую уникальную «GC shape» — форму типа с точки зрения сборщика мусора и раскладки в памяти. Все указательные типы (`*T`) имеют одну и ту же GC shape (одно слово-указатель), поэтому `List[*User]` и `List[*Order]` делят одну инстанциацию кода; `map`, `chan`, `func` группируются по underlying-типу, а интерфейсы — отдельная shape из **двух** слов (указатель на itab/тип + указатель на данные), с указателями они копию кода не делят. А `int`, `float64`, крупные структуры получают свои копии.

      Чтобы одна копия кода работала на разных конкретных типах с одинаковой shape, ей передаётся неявный аргумент — **dictionary**: таблица с информацией о конкретном типе (его `runtime._type`, itab'ы для вызовов методов, метаданные). Отсюда практическое следствие: дженерик-код по указательным типам может быть **медленнее** мономорфной копии, потому что вызовы методов идут через dictionary (косвенность, похожая на интерфейсную), а инлайнинг и девиртуализация работают хуже. По value-типам с уникальной shape — ближе к мономорфному коду. Поэтому «переписать всё на дженерики ради скорости» — заблуждение: иногда конкретный код или даже интерфейс окажется быстрее из-за лучшего инлайна.

      **Эволюция версий.**

      - *1.18* — дженерики появились; ранняя реализация, местами медленнее ожидаемого, `comparable` строго про строго-сравнимые типы.
      - *1.20* — `comparable` ослабили: его теперь удовлетворяют и обычные интерфейсные типы, которые сравнимы, но могут паниковать в рантайме (например `any` как ключ). Это развязало руки generic-мапам с интерфейсными ключами.
      - *1.21* — встроенные `min`, `max`, `clear`; в стандартную библиотеку вошли generic-пакеты `slices` и `maps` (`slices.Sort`, `slices.Contains`, `maps.Clone` и т.д.), сделав дженерики повседневным инструментом. Итераторные `maps.Keys`/`maps.Values` появились позже — в 1.23, вместе с range-over-func.
      - *1.22* — range по целым числам; смена семантики loop-переменной (косвенно упрощает generic-циклы).
      - *1.23* — итераторы range-over-func (`iter.Seq[T]`, `iter.Seq2[K,V]`) — дженериковый фундамент для ленивых последовательностей.
      - *1.24* — полноценные **generic type aliases** (`type Set[T comparable] = map[T]struct{}`), которых раньше не было; доводка вывода типов.

      **Тонкости вывода типов.** Инференс идёт по «функциональным» и «constraint» уравнениям: сначала из значений аргументов, затем из ограничений; в сложных случаях (частично заданные параметры, вложенные дженерики) вывод может не сойтись — тогда компилятор требует явные аргументы типа. Практический совет для API: не заставляйте пользователя писать `[int, string]` руками — проектируйте сигнатуру так, чтобы все параметры выводились из обычных аргументов.
