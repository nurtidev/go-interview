slug: slice-internals-growth
section: go-internals
title: "Как устроен слайс изнутри и что происходит при append?"
difficulty: senior
tags: [slice, memory, runtime]
question_md: |
  Опишите внутреннее устройство слайса в Go. Что происходит при вызове `append`, когда и как растёт `cap`? Разберите классические ловушки с общей подложкой.
answer_levels:
  - level: middle
    text_md: |
      Слайс — это дескриптор из трёх полей: указатель на начало данных в базовом массиве (`ptr`), длина `len` и ёмкость `cap`. В рантайме это структура `reflect.SliceHeader` (или `runtime.slice`):

      ```go
      type slice struct {
          array unsafe.Pointer
          len   int
          cap   int
      }
      ```

      Сам слайс — это «окно» в массив, лежащий в куче или на стеке. `append` добавляет элементы после `len`. Если `len < cap`, элемент кладётся в уже выделенную память и `len` увеличивается. Если места нет (`len == cap`), рантайм выделяет новый, больший массив, копирует туда старые элементы и возвращает новый слайс с новым указателем. Поэтому результат `append` всегда нужно присваивать обратно: `s = append(s, x)`. Два слайса могут ссылаться на один массив, и запись через один виден через другой.
  - level: senior
    text_md: |
      Ключевая механика — рост ёмкости и разделяемая подложка.

      Историческая формула роста (до Go 1.18): если требуемая ёмкость больше удвоенной текущей — берём требуемую; иначе, пока `cap < 1024`, удваиваем, а после 1024 растём примерно в 1.25x. С Go 1.18 формула в `growslice` сглажена: порог переключения — 256 элементов, а рост между 2x и 1.25x происходит плавно (`newcap += (newcap + 3*256) / 4`), чтобы не было резкого скачка. Финальный размер ещё и округляется вверх до класса размеров аллокатора через `roundupsize`, поэтому реальный `cap` часто больше ожидаемого.

      Главная ловушка — `append` на подслайсе, у которого есть запас ёмкости:

      ```go
      s1 := []int{1, 2, 3, 4}
      s2 := s1[:2]              // len=2, cap=4 — та же подложка!
      s2 = append(s2, 99)      // пишет в s1[2], реаллокации нет
      // теперь s1 == [1 2 99 4]
      ```

      Пока не превышен `cap`, `append` пишет прямо в общий массив и молча портит соседний слайс. Как только `cap` превышен — происходит реаллокация, и связь рвётся. Это порождает баги, которые «то есть, то нет», в зависимости от объёма данных.

      Защита — трёхиндексный слайс `a[low:high:max]`, ограничивающий `cap` значением `max-low`:

      ```go
      s2 := s1[:2:2]           // cap=2, любой append скопирует
      s2 = append(s2, 99)      // s1 не тронут
      ```

      `copy(dst, src)` копирует `min(len(dst), len(src))` элементов и не аллоцирует. Ещё одна проблема — утечка памяти: подслайс `big[:1]` держит весь большой массив живым, пока жив подслайс. Чтобы отпустить память, копируют нужное в новый слайс, а лишние элементы-указатели обнуляют, иначе GC не соберёт то, на что они ссылаются.
  - level: deep
    text_md: |
      В исходниках рост живёт в `runtime.growslice` (`runtime/slice.go`). Она получает старый слайс, требуемую длину и размер элемента, вычисляет `newcap` и вызывает `roundupsize`, который подгоняет байтовый размер под ближайший size class аллокатора (`runtime/sizeclasses.go`). Именно поэтому `cap` растёт «странными» числами: реальная граница — не элементы, а класс размеров (8, 16, 32, 48, 64, ...). Для типов без указателей (`et.PtrBytes == 0`) память берётся через `mallocgc(..., nil, false)`, и хвост донуляется `memclrNoHeapPointers`; для типов с указателями зануление выполняет сам `mallocgc`, вызванный с `needzero=true`, а перенос старых элементов в новый буфер дополнительно защищён `bulkBarrierPreWriteSrcOnly` под write barrier, чтобы конкурентный GC не потерял объект.

      Эволюция: до Go 1.2 семантика `cap` у подслайса допускала выход за исходный массив, трёхиндексный слайс (`a[low:high:max]`) появился в 1.2 именно для контроля `cap`. В Go 1.18 переписали ветвление роста, убрав ступеньку на 1024 и сделав переход монотонным вокруг порога 256 — это уменьшило разброс аллокаций на средних размерах.

      Тонкость про overlap: `append` использует `memmove`, безопасный при перекрытии, но `copy` между перекрывающимися регионами тоже корректен (тоже `memmove`). При росте слайса указателей рантайм обязан пройти write barrier для новых указателей в куче (bulkBarrierPreWrite), иначе конкурентный GC потеряет объект. На собеседовании часто просят объяснить, почему `s = append(s, s...)` работает корректно даже при реаллокации — потому что источник читается до записи в новый буфер, а при in-place росте `memmove` корректно обрабатывает перекрытие.
