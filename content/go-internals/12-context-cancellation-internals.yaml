slug: context-cancellation-internals
section: go-internals
title: "Как устроен context: отмена и типичные ловушки"
difficulty: middle
tags: [context, cancellation, concurrency]
question_md: |
  Как устроен `context.Context`: интерфейс, `cancelCtx`, `timerCtx`, `valueCtx`? Как распространяется отмена по дереву? Почему обязательно вызывать `cancel`, чем отличаются `Canceled` и `DeadlineExceeded`, и какие есть антипаттерны?
answer_levels:
  - level: middle
    text_md: |
      `context.Context` — интерфейс из четырёх методов:

      ```go
      type Context interface {
          Deadline() (deadline time.Time, ok bool)
          Done() <-chan struct{}
          Err() error
          Value(key any) any
      }
      ```

      `Done()` возвращает канал, который **закрывается** при отмене или истечении дедлайна — на нём слушают в `select`. `Err()` говорит, почему контекст завершён: `context.Canceled` (вызвали cancel) или `context.DeadlineExceeded` (истёк таймаут). `Deadline()` возвращает время дедлайна, если он есть. `Value()` достаёт значение по ключу.

      Контексты образуют дерево: от корня (`context.Background()`) порождают дочерние через `WithCancel`, `WithTimeout`, `WithDeadline`, `WithValue`. Отмена родителя отменяет всех потомков. Контекст всегда передают **первым аргументом** функции (`ctx context.Context`), а не хранят в структуре.
  - level: senior
    text_md: |
      Разберём реализацию и ловушки.

      **cancelCtx.** `WithCancel(parent)` возвращает дочерний контекст и функцию `cancel`. Внутри у `cancelCtx` есть свой `Done`-канал (создаётся лениво) и множество `children`. Вызов `cancel` закрывает `Done`-канал и рекурсивно отменяет всех детей, затем отвязывает себя от родителя. Отмена распространяется **вниз** по дереву.

      **timerCtx.** `WithTimeout(parent, d)` — это `WithDeadline(parent, now+d)`. Внутри `timerCtx` встраивает `cancelCtx` и держит `time.Timer`, который по срабатыванию вызывает cancel с ошибкой `DeadlineExceeded`.

      **valueCtx.** `WithValue(parent, k, v)` хранит одну пару ключ-значение и ссылку на родителя. `Value` идёт **линейно вверх по цепочке** родителей, пока не найдёт ключ — это O(глубины), поэтому context.Value не предназначен для передачи бизнес-параметров, только для request-scoped метаданных (trace ID, auth).

      **Почему обязательно вызывать `cancel`.** `WithCancel`/`WithTimeout` регистрируют дочерний контекст у родителя и (для таймера) создают `time.Timer`. Если не вызвать `cancel`, контекст останется в списке `children` родителя и таймер не освободится — это **утечка** горутин/памяти/таймеров до тех пор, пока не отменится родитель или не истечёт дедлайн. Идиома — сразу `defer cancel()`:

      ```go
      ctx, cancel := context.WithTimeout(parent, 2*time.Second)
      defer cancel() // обязательно, даже если операция успела завершиться

      select {
      case res := <-doAsync(ctx):
          use(res)
      case <-ctx.Done():
          return ctx.Err() // Canceled или DeadlineExceeded
      }
      ```
      `go vet` предупреждает, если результат `cancel` потерян (lostcancel).

      **Антипаттерны:**
      - `context.Value` для бизнес-данных (параметры запроса, зависимости) — вместо явных аргументов. Ключи нетипизированы, поиск линейный, читаемость страдает.
      - хранить `ctx` в поле структуры — контекст должен «течь» через вызовы, а не жить в объекте (исключение — редкие случаи вроде хранения в request-объекте фреймворка).
      - передавать `nil` вместо контекста — надо `context.TODO()`, когда контекст ещё не прокинут.
  - level: deep
    text_md: |
      Исходники — пакет `context` (`src/context/context.go`). Ключевые детали реализации:

      - `cancelCtx.done` — это `atomic.Value`, хранящая `chan struct{}`, создаётся лениво при первом `Done()`. `cancel` закрывает канал и выставляет `err` под мьютексом (`sync.Mutex`), чтобы `Err()` был консистентен с закрытием.
      - `children map[canceler]struct{}` — набор отменяемых потомков. При отмене родитель проходит по детям и вызывает их `cancel(false, err)` (без повторного removeFromParent, т.к. родитель и так очищается).
      - **propagateCancel** решает, как подписать ребёнка на родителя: если ближайший отменяемый предок — это `*cancelCtx`, ребёнок кладётся прямо в его `children` (дёшево). Если родитель — «чужой» кастомный контекст с `Done()`, запускается **отдельная горутина**, которая в `select` ждёт `parent.Done()` или `child.Done()` и ретранслирует отмену. Вот почему невызванный `cancel` может утекать именно горутиной.
      - С Go 1.20 добавлен `context.WithCancelCause` / `context.Cause(ctx)` — отмена с произвольной причиной-ошибкой (её достают через `Cause`), при этом `ctx.Err()` всё равно вернёт `Canceled`. С Go 1.21 добавились `context.WithoutCancel` (наследует значения, но не отмену), `context.AfterFunc` (регистрирует колбэк на завершение контекста) и `WithDeadlineCause`.
      - `Err()` до отмены возвращает `nil`; после — `Canceled` или `DeadlineExceeded`. Эти ошибки сравнивают через `errors.Is`; `DeadlineExceeded` реализует `net.Error` с `Timeout() bool == true`.

      Тонкости для собеса: закрытие `Done()`-канала даёт happens-before гарантию (отмена, сделанная одной горутиной, видна тем, кто читает `Done`), поэтому context — корректное средство синхронизации завершения. Отмена контекста не прерывает выполняющийся код принудительно — она лишь закрывает канал; сам код обязан проверять `ctx.Done()`/`ctx.Err()` в точках ожидания (I/O в stdlib это делает автоматически). Дерево контекстов не хранит обратных «сильных» ссылок сверху вниз на всё поддерево бесконечно: корректный `cancel` вызывает `removeChild`, отвязывая поддерево, чтобы оно собралось GC — ещё одна причина не забывать `cancel`.
