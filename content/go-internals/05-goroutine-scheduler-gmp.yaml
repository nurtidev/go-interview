slug: goroutine-scheduler-gmp
section: go-internals
title: "Как устроен планировщик горутин (GMP)?"
difficulty: senior
tags: [runtime, scheduler, goroutine]
question_md: |
  Опишите модель планировщика Go (G, M, P). Как работает work stealing, что происходит при блокирующем syscall, что делает sysmon и как реализована асинхронная преемпция? Как растёт стек горутины?
answer_levels:
  - level: middle
    text_md: |
      Планировщик Go построен на трёх сущностях — модель GMP:

      - **G** (goroutine) — горутина: стек, счётчик команд, состояние.
      - **M** (machine) — поток ОС, который реально исполняет код.
      - **P** (processor) — логический процессор, контекст для выполнения; содержит локальную очередь готовых горутин.

      Чтобы M мог исполнять Go-код, ему нужен P. Число P задаётся `GOMAXPROCS` (по умолчанию — число доступных ядер). То есть одновременно исполняется не больше `GOMAXPROCS` горутин, но горутин может быть миллионы — они дёшевы (стек стартует с ~2 КБ). Планировщик сам раскидывает готовые горутины по P и мультиплексирует их на потоки. Когда горутина блокируется (например, на syscall или канале), планировщик снимает её и запускает на этом же потоке/P другую готовую.
  - level: senior
    text_md: |
      Каждый P имеет локальную runqueue фиксированного размера (256 слотов) плюс есть глобальная очередь. Новая горутина обычно попадает в локальную очередь текущего P (дёшево, без блокировок). Если локальная переполнена — половина её сбрасывается в глобальную.

      **Work stealing**: если у P закончились свои горутины, он не простаивает — сначала смотрит глобальную очередь и netpoller, затем «крадёт» половину горутин у случайного другого P. Это балансирует нагрузку без центрального диспетчера.

      **Блокирующий syscall**: перед входом вызывается `entersyscall`, который отвязывает P от текущего M (handoff). Освободившийся P может быть подхвачен другим (в т.ч. новым) M, чтобы ядра не простаивали, пока поток висит в ядре. После возврата `exitsyscall` пытается снова захватить P; если не удаётся — горутина ставится в очередь, а M паркуется. Для непокрытых syscall'ов handoff делает sysmon с задержкой.

      **sysmon** — фоновый поток-монитор без P, крутящийся в цикле. Он: делает `retake` (отбирает P у M, застрявших в долгом syscall, и преемптит горутины, работающие дольше ~10 мс), запускает `forcegc` при простое, дёргает `netpoll` для готовых сетевых событий, печатает дедлоки.

      **Асинхронная преемпция** (Go 1.14). До неё преемпция была кооперативной: горутину можно было снять только в safe-point — в точке вызова функции, где рантайм проверяет флаг преемпции (через `morestack`/проверку стека). Из-за этого горячий цикл без вызовов функций (`for {}`) невозможно было прервать — он мог заблокировать GC и другие горутины (`GOMAXPROCS=1`). С 1.14 sysmon шлёт потоку сигнал `SIGURG`, обработчик которого останавливает горутину в асинхронной safe-point. Это позволило прерывать даже tight loop без вызовов.

      **Netpoller**: сетевой и файловый I/O не блокирует поток — дескриптор регистрируется в epoll/kqueue, горутина паркуется, а M свободен. При готовности данных netpoller возвращает список горутин в планировщик.

      **Spinning M**: чтобы снизить задержку старта новой работы, часть M держатся «крутящимися» (spinning), активно ищущими горутины, вместо немедленной парковки — компромисс между латентностью и тратой CPU.
  - level: deep
    text_md: |
      Исходники — `runtime/proc.go`. Структуры G/M/P в `runtime2.go`. Локальная runq — это кольцевой буфер `runq [256]guintptr` плюс `runnext` — слот для одной «самой свежей» горутины (LIFO-оптимизация для паттерна producer/consumer: только что созданная горутина запускается почти сразу, что улучшает локальность кэша). `runnext` крадётся последней и с задержкой, чтобы не разрушать локальность.

      **Стек горутины**: старт 2 КБ (`_StackMin`). Стеки contiguous (непрерывные) с Go 1.3 — раньше были segmented (сегментированные), но их сменили из-за проблемы «hot split»: функция на границе сегмента в цикле постоянно аллоцировала/освобождала сегмент. Теперь при нехватке стека `morestack` вызывает `copystack`: выделяется вдвое больший стек, всё копируется, а указатели на стек корректируются (для этого рантайм знает точную карту указателей кадра — stack maps). Проверка нехватки — пролог функции сравнивает SP с `g.stackguard0`; тот же механизм служит точкой кооперативной преемпции (флаг преемпции выставляется установкой `stackguard0 = stackPreempt`).

      Асинхронная преемпция технически: sysmon вызывает `preemptone` → `preemptM` шлёт `SIGURG`; обработчик `asyncPreempt` проверяет, что горутина в асинхронной safe-point (не в критической секции рантайма, регистры консистентны — это требует точных стек-карт для всех PC, добавленных в 1.14), сохраняет контекст и уводит в планировщик.

      Эволюция планировщика: до Go 1.1 был единый глобальный mutex-lock на runqueue (не масштабировался). В 1.1 Дмитрий Вьюков внедрил work-stealing scheduler с P и локальными очередями — это ключевой сдвиг. В 1.14 добавили async preemption. Отдельная тонкость — `LockOSThread` (жёстко привязывает G к M, нужно для cgo/OpenGL), и обработка cgo-вызовов, которые для планировщика выглядят как syscall. Начиная с Go 1.21+ обсуждался и внедрялся более честный учёт CPU для fair scheduling; на staff-собесе ценят понимание, что Go-планировщик — не строго справедливый и не приоритетный, а throughput-ориентированный.
