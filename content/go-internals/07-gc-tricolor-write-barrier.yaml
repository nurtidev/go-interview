slug: gc-tricolor-write-barrier
section: go-internals
title: "Как работает сборщик мусора в Go (tricolor, write barrier)?"
difficulty: staff
tags: [gc, runtime, memory]
question_md: |
  Опишите сборщик мусора Go: трёхцветная маркировка, hybrid write barrier, фазы GC, GC assists и pacing. Что такое инвариант трёхцветной маркировки, зачем нужен write barrier, как работают GOGC и GOMEMLIMIT?
answer_levels:
  - level: middle
    text_md: |
      GC в Go — конкурентный, mark-and-sweep, не перемещающий (non-moving/non-compacting) и не поколенческий (non-generational). Он работает почти параллельно с программой (мутатором), стараясь минимизировать паузы (STW < 1 мс).

      Трёхцветная маркировка делит объекты на три «цвета»: белые (кандидаты на удаление, ещё не достигнуты), серые (достигнуты, но их ссылки ещё не просканированы) и чёрные (достигнуты и полностью просканированы). Начинают с корней (стеки горутин, глобальные переменные) — они серые. Пока есть серые объекты, берём серый, красим его в чёрный, а все белые объекты, на которые он ссылается, — в серые. Когда серых не осталось, все белые объекты недостижимы и их память освобождается (sweep).

      `GOGC` (по умолчанию 100) управляет частотой сборки: следующая сборка запустится, когда куча вырастет вдвое относительно живой после прошлой.
  - level: senior
    text_md: |
      Углубимся в инвариант и барьер.

      Проблема конкурентной маркировки: мутатор работает одновременно со сборщиком и может переставить указатели так, что чёрный объект начнёт ссылаться на белый, а единственная серая ссылка на этот белый — исчезнет. Тогда живой объект соберут как мусор. Это нарушение **strong tricolor invariant**: «ни один чёрный объект не ссылается напрямую на белый». Есть более слабый вариант — weak invariant.

      Чтобы инвариант держался, при записи указателей включается **write barrier** — код, вставляемый компилятором вокруг присваиваний указателей во время фазы маркировки. С Go 1.8 используется **hybrid write barrier** (комбинация Dijkstra + Yuasa, авторства Остина Клементса): при записи указателя он затемняет (красит в серый) и старое значение указателя (Yuasa, deletion barrier), и новое (Dijkstra, insertion barrier). Это позволило **не пересканировать стеки** в конце маркировки под STW — раньше повторное сканирование всех стеков было главным источником длинных пауз. Благодаря этому STW-паузы сократились до долей миллисекунды.

      Фазы одного цикла:
      1. **STW mark setup** — включение write barrier, подготовка (очень короткая пауза).
      2. **Concurrent mark** — параллельная маркировка вместе с мутатором.
      3. **STW mark termination** — завершение маркировки, выключение барьера (короткая пауза).
      4. **Concurrent sweep** — освобождение белых объектов, идёт лениво параллельно с работой программы.

      **GC assists**: если мутатор аллоцирует быстрее, чем сборщик маркирует, он рискует «убежать». Чтобы этого не было, аллоцирующая горутина обязана «отработать долг» — помочь маркировке пропорционально объёму своих аллокаций (assist). Это создаёт обратную связь: чем агрессивнее аллокации, тем больше горутина помогает GC, что естественно притормаживает мутатор.

      **Pacing**: pacer подбирает момент старта сборки так, чтобы закончить маркировку примерно к достижению целевого размера кучи (по `GOGC`), не допустив перерасхода. `GOGC=100` — триггер по удвоению живой кучи; больше — реже GC и больше память, меньше — чаще GC и меньше память. `GOGC=off` выключает GC.

      `GOMEMLIMIT` (Go 1.19) — soft memory limit: мягкий потолок общей памяти. GC начинает работать чаще по мере приближения к лимиту, даже если по `GOGC` ещё рано. Помогает избегать OOM в контейнерах с фиксированной памятью, но это «мягкий» лимит — рантайм не откажет в аллокации, а лишь усилит давление на GC (риск GC death spiral, если живых данных больше лимита).
  - level: deep
    text_md: |
      Аллокатор (`runtime/malloc.go`) — многоуровневый, по мотивам TCMalloc: `mcache` (per-P, без локов, отсюда берутся мелкие объекты), `mcentral` (общий пул span'ов данного size class), `mheap` (глобальная куча, аллоцирует span'ы у ОС страницами). Объекты делятся на tiny (<16B, объединяются), small (по size classes) и large (напрямую из mheap). Span — непрерывный набор страниц под объекты одного класса. Sweep идёт по span'ам, освобождённые слоты возвращаются в mcentral/mcache.

      Маркировка бит-в-бит: цвета хранятся не в объекте, а в отдельных mark bits (в metadata span'а) и в очереди работы `gcWork` (per-P буферы серых объектов, чтобы маркировка масштабировалась без общего лока). «Серый» — это «в очереди на сканирование». Указательная карта объекта берётся из типа/heap bitmap, чтобы сканировать только слова-указатели.

      Эволюция:
      - **Go 1.5** — переход на конкурентный tri-color mark-and-sweep (до этого был STW parallel mark-and-sweep). Паузы упали с десятков/сотен мс до ~10 мс.
      - **Go 1.6–1.7** — оптимизации, паузы <5 мс.
      - **Go 1.8** — hybrid write barrier, устранение повторного сканирования стеков, суб-миллисекундные паузы. Это ключевая веха.
      - **Go 1.12** — улучшение sweep и возврата памяти ОС (`MADV_FREE`).
      - **Go 1.19** — `GOMEMLIMIT` и переработанный pacer (soft memory limit).

      Тонкости для staff: GC не compacting, поэтому есть фрагментация, но зато адреса объектов стабильны (важно для cgo и `unsafe`). Non-generational — потому что escape analysis и дешёвый стек уже отсеивают короткоживущие объекты до кучи, а write-barrier-стоимость поколенческого GC не окупалась. `runtime.ReadMemStats`, `GODEBUG=gctrace=1`, и `runtime/metrics` — инструменты диагностики. Известная патология — **GC assist death spiral**: живой набор близок к `GOMEMLIMIT`, GC запускается почти непрерывно, мутатор тонет в assist'ах, CPU улетает в GC (защита — рантайм ограничивает долю CPU на GC ~25% и, как крайняя мера, допускает превышение soft limit вместо полной остановки прогресса).
