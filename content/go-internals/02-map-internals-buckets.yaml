slug: map-internals-buckets
section: go-internals
title: "Как устроена map в Go (bmap, эвакуация, overflow)?"
difficulty: senior
tags: [map, runtime, hashtable]
question_md: |
  Опишите внутреннее устройство `map` в Go: структуры `hmap` и `bmap`, что такое tophash, overflow-бакеты и эвакуация. Почему нельзя взять адрес значения по ключу и почему порядок итерации случаен?
answer_levels:
  - level: middle
    text_md: |
      `map` в Go — это хеш-таблица. Заголовок описывается структурой `hmap`, а данные лежат в массиве бакетов. Каждый бакет (`bmap`) хранит до 8 пар ключ-значение. При вставке от ключа считается хеш: младшие биты выбирают номер бакета, старшие 8 бит кладутся в массив `tophash` для быстрого сравнения без полного сравнения ключей.

      Если 8 слотов в бакете заполнены, к нему подцепляется overflow-бакет (связный список). Когда среднее заполнение превышает load factor 6.5, таблица растёт — число бакетов удваивается. `map` не потокобезопасна: одновременные запись и чтение приводят к `fatal error: concurrent map read and map write`. Порядок обхода `range` намеренно случаен, поэтому полагаться на него нельзя. `delete` удаляет элемент, но не уменьшает выделенную память.
  - level: senior
    text_md: |
      Разложим механику подробнее.

      `hmap` хранит `count` (число элементов, его возвращает `len`), `B` (log2 числа бакетов), указатель `buckets`, `oldbuckets` (для роста), `hash0` (seed) и счётчик overflow. Бакет `bmap`: массив из 8 `tophash`, затем 8 ключей подряд, затем 8 значений подряд (ключи и значения хранятся раздельными группами, а не парами — это уменьшает padding), и указатель на overflow. `tophash` также кодирует служебные состояния (пустой слот, эвакуированный и т.д.).

      Рост инкрементальный. При превышении load factor 6.5 (`count > 6.5 * 2^B`) выделяются новые `buckets`, старые переезжают в `oldbuckets`, а `hmap` помечается «растущим». Реального копирования сразу нет: при каждой записи/удалении `growWork` эвакуирует один-два бакета из старого массива в новый. Пока идёт рост, чтения смотрят и в старые, и в новые бакеты. Отдельный случай — `sameSizeGrow`: если бакетов много, но они забиты overflow-цепочками из-за массовых удалений, таблица «переупаковывается» в тот же размер, уплотняя данные.

      Почему `&m[k]` запрещён компилятором:

      ```go
      m := map[string]int{"a": 1}
      p := &m["a"] // ошибка компиляции: cannot take address of m["a"]
      ```

      Значения не адресуемы, потому что при росте и эвакуации они физически переезжают в другую память — указатель мгновенно бы протух. Отсюда же паттерн: чтобы менять поле структуры-значения, хранят `map[K]*V` или перезаписывают значение целиком.

      Случайность итерации реализована так: `range` выбирает случайный стартовый бакет и случайное смещение внутри бакета (`fastrand`). Это сознательное решение команды Go, чтобы разработчики не закладывались на порядок. Конкурентный доступ ловится флагом `hashWriting` в `hmap.flags`: запись выставляет бит, и если читатель/писатель видит его выставленным чужой горутиной — рантайм роняет процесс `fatal error` (это не паника, её нельзя перехватить `recover`).
  - level: deep
    text_md: |
      В исходниках это `runtime/map.go`. `bucketCnt = 8`, порог `loadFactorNum/loadFactorDen = 13/2 = 6.5`. Выбор 6.5 — компромисс из бенчмарков между плотностью (память) и длиной overflow-цепочек (скорость промаха). `tophash` со значениями меньше `minTopHash` (5) зарезервированы под маркеры эвакуации: `evacuatedX`, `evacuatedY`, `evacuatedEmpty`, `emptyRest`, `emptyOne`. При эвакуации бакет делится на два «направления» X и Y (старший бит расширенного хеша решает, в какую половину нового массива попадёт ключ).

      Overflow-бакеты берутся из преаллоцированного пула `hmap.extra`, чтобы не дёргать аллокатор на каждый бакет; для map без указателей в ключах/значениях overflow отслеживаются отдельно, чтобы GC мог их не сканировать. Есть оптимизированные «быстрые» пути (`mapaccess1_fast32/64`, `mapaccess1_faststr`) для частых типов ключей.

      Эволюция: до Go 1.24 использовалась описанная схема с бакетами по 8 и tophash. В Go 1.24 реализацию `map` заменили на Swiss Table (SwissMap) — это открытая адресация, где в Go-порте группа состоит из 8 слотов (`abi.SwissMapGroupSlots = 8`) с одним 8-байтным (64-битным) control-словом на группу; каждый байт-контроллер хранит 7 бит хеша, а параллельный поиск по группе делается через SWAR (SIMD within a register) — битовые трюки над 64-битным словом, а не настоящие SIMD-инструкции. Вариант с 16 слотами и SSE — это оригинальный abseil (C++), которого в Go-порте нет. Это дало заметное ускорение доступа и меньшее потребление памяти на больших map, при сохранении той же семантики языка (случайный порядок, non-adressable значения, отсутствие потокобезопасности). Знание перехода на Swiss table — сильный сигнал на staff-собесе. Для конкурентного доступа язык предлагает `sync.Map` (оптимизирована под read-heavy и disjoint-ключи) или обычную `map` под `sync.RWMutex`.
