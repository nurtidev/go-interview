slug: struct-memory-alignment-padding
section: go-internals
title: "Выравнивание и padding в структурах, false sharing"
difficulty: senior
tags: [memory, struct, performance]
question_md: |
  Как работает выравнивание полей и padding в структурах Go? Почему порядок полей влияет на размер? Что такое `unsafe.Sizeof/Alignof/Offsetof`, пустая структура, false sharing и выравнивание atomic-полей на 32-битных платформах?
answer_levels:
  - level: middle
    text_md: |
      Каждый тип имеет требование выравнивания (alignment): значение должно лежать по адресу, кратному его размеру (обычно). Например, `int64` выравнивается по 8 байт, `int32` — по 4, `byte` — по 1. Чтобы поля структуры были выровнены, компилятор вставляет между ними невидимые байты-заполнители — **padding**.

      Из-за этого **порядок полей влияет на размер структуры**. Классический пример:

      ```go
      type A struct {
          a bool  // 1 байт
          b int64 // нужно выравнивание по 8 → 7 байт padding перед b
          c bool  // 1 байт + padding в конце
      } // итого 24 байта

      type B struct {
          b int64 // 8
          a bool  // 1
          c bool  // 1 + 6 padding в конце
      } // итого 16 байт
      ```

      Просто переставив поля от больших к меньшим, экономим память. Пустая структура `struct{}` занимает **0 байт** — её часто используют как значение в `map[T]struct{}` (множество) или сигнал в `chan struct{}`.
  - level: senior
    text_md: |
      Правила подробнее. Размер структуры всегда кратен её alignment (равному максимальному alignment среди полей) — поэтому padding появляется и в конце (tail padding), чтобы массивы таких структур тоже были выровнены. Осмотреть раскладку помогают функции из `unsafe`:

      ```go
      import "unsafe"
      unsafe.Sizeof(A{})       // полный размер, включая padding
      unsafe.Alignof(A{})      // требование выравнивания
      unsafe.Offsetof(A{}.b)   // смещение поля от начала структуры
      ```
      Эти функции — константы времени компиляции, они не читают память.

      **Практика упаковки:** упорядочивание полей по убыванию размера (int64/pointer → int32 → int16 → bool) обычно минимизирует padding. На горячих структурах, которых миллионы в памяти, это ощутимо экономит RAM и улучшает попадания в кэш. Но не всегда стоит жертвовать читаемостью ради пары байт — оптимизируют то, что реально массово.

      **False sharing.** Кэш процессора работает строками (cache line) обычно по 64 байта. Если два независимых поля, которые пишут разные ядра, попадают в одну строку кэша, то запись одним ядром инвалидирует строку у другого — начинается «пинг-понг» строки между ядрами через протокол когерентности (MESI), и производительность падает, хотя логически данные независимы:

      ```go
      type Counters struct {
          a int64 // ядро 1 пишет сюда
          b int64 // ядро 2 пишет сюда — та же cache line → false sharing
      }
      ```
      Лечение — развести горячие поля по разным строкам padding-заполнителем:

      ```go
      type Counters struct {
          a   int64
          _   [56]byte // добивка до 64 байт
          b   int64
      }
      ```

      **Atomic-выравнивание.** На 32-битных платформах (386, ARM) 64-битные атомарные операции (`atomic.AddInt64` над `*int64`) требуют, чтобы адрес был выровнен по 8 байт; иначе — паника в рантайме. Гарантируется только выравнивание **первого слова** структуры/выделения, поэтому 64-битное atomic-поле кладут первым в структуру. С Go 1.19 проще использовать типы `atomic.Int64`/`atomic.Uint64`, которые сами обеспечивают корректное выравнивание (внутри есть align-хак), и это рекомендуемый способ.
  - level: deep
    text_md: |
      Alignment типов задаётся ABI платформы; в Go он описан в `go/types` и рантайме. Правило: `Alignof(T)` для базовых типов = min(размер, максимальное машинное выравнивание). На amd64 максимальное выравнивание — 8. Для составных типов alignment = максимум по полям/элементам. `int` и `uintptr` — 8 байт на 64-битных, 4 на 32-битных, поэтому раскладка структур платформозависима — нельзя хардкодить смещения.

      Про atomic на 32-bit: официальная гарантия из документации `sync/atomic` (до появления atomic-типов) — «первое слово в выделенной структуре, массиве или слайсе может считаться 64-битно выровненным». То есть выравнивание по 8 не гарантировано для произвольного поля на 32-битной архитектуре, потому что аллокатор там выравнивает по 4. Компилятор с Go 1.19 для новых `atomic.Int64` вставляет ведущее поле-выравниватель (`align64`), решая проблему структурно. Есть исторические баги в популярных библиотеках именно из-за 64-битного atomic-поля не первым в структуре на 32-битном ARM.

      Про cache line: 64 байта — типично для x86-64 и большинства ARM64, но не универсально (бывает 128 на некоторых системах, а Apple M-серии и некоторые серверные ядра используют 128-байтные секторы префетча). Поэтому библиотеки иногда паддят на 128 байт для надёжности. В стандартной библиотеке приём разнесения по cache line используется, например, в `runtime` (per-P структуры) и в некоторых lock-free структурах. `struct{}` имеет `zerobase` — все указатели на нулеразмерные объекты указывают на один общий адрес `runtime.zerobase`, поэтому `&struct{}{} == &struct{}{}` может быть true, но полагаться на это нельзя (спецификация не гарантирует). Тонкость: поле нулевого размера **последним** в структуре всё же получает padding, чтобы взятие его адреса не указывало за пределы аллокации (иначе GC/арифметика указателей могла бы уехать за объект) — это влияет на размер структуры, заканчивающейся на `struct{}`.
