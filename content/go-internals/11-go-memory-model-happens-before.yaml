slug: go-memory-model-happens-before
section: go-internals
title: "Модель памяти Go и happens-before"
difficulty: staff
tags: [memory-model, concurrency, atomic]
question_md: |
  Что такое happens-before в модели памяти Go? Какие операции устанавливают синхронизацию (каналы, mutex, sync.Once, atomic)? Что такое data race и почему это UB? Что изменилось в модели памяти Go 1.19 и почему двойная проверка блокировки (DCLP) без синхронизации сломана?
answer_levels:
  - level: middle
    text_md: |
      Модель памяти Go описывает, при каких условиях запись, сделанная одной горутиной, гарантированно видна другой. Ключевое понятие — **happens-before**: если событие A happens-before события B, то эффекты A (например, записи в память) видны в B.

      Внутри одной горутины порядок соответствует тексту программы (program order / sequenced-before). Между горутинами порядок сам по себе не гарантирован — его нужно устанавливать **синхронизирующими операциями**: запуск горутины (`go`), отправка/приём по каналу, `Lock`/`Unlock` мьютекса, `sync.Once.Do`, атомарные операции из `sync/atomic`, `WaitGroup`.

      Если две горутины обращаются к одной переменной без синхронизации и хотя бы одна пишет — это **data race** (гонка данных). Гонки нужно устранять либо каналами, либо мьютексами, либо атомиками. Инструмент `go run -race` находит гонки во время выполнения.
  - level: senior
    text_md: |
      Happens-before — это частичный порядок над событиями памяти. Правила, которые надо знать:

      - **go-statement**: `go f()` happens-before началом выполнения `f`. Значит, всё, что горутина-родитель записала до `go`, видно в новой горутине.
      - **Канал (буферизованный/небуф.)**: отправка в канал **happens-before** завершения соответствующего приёма. Для небуферизованного канала приём happens-before завершения отправки. `close(ch)` happens-before приёма нулевого значения, вызванного закрытием.
      - **Mutex**: n-й вызов `Unlock` happens-before (n+1)-го `Lock`. Всё, что было под первым локом, видно под следующим.
      - **sync.Once**: возврат из `once.Do(f)` гарантирует, что `f` завершилась и её эффекты видны всем, кто вызывает `Do`.
      - **atomic**: атомарные операции синхронизируют память (об этом ниже).

      **Data race — это undefined behavior.** Это не «прочитаешь старое значение», а именно UB: компилятор и процессор вправе переупорядочивать чтения/записи, кэшировать значения в регистрах, разрывать неатомарные многословные записи. Наблюдаемые эффекты могут быть «невозможными» с точки зрения последовательного рассуждения.

      **Почему DCLP (double-checked locking) без синхронизации сломан:**

      ```go
      // СЛОМАНО: гонка данных
      var instance *Config
      func Get() *Config {
          if instance == nil {          // читаем без синхронизации
              mu.Lock()
              if instance == nil {
                  instance = newConfig() // пишем
              }
              mu.Unlock()
          }
          return instance
      }
      ```
      Проблема: чтение `instance == nil` в быстром пути не синхронизировано с записью под локом. Даже если читатель увидит ненулевой указатель, нет гарантии, что он увидит **проинициализированные поля** объекта — запись указателя и запись полей могут наблюдаться в другом порядке. Правильно — либо `sync.Once`, либо `atomic` для флага/указателя:

      ```go
      var once sync.Once
      var instance *Config
      func Get() *Config {
          once.Do(func() { instance = newConfig() })
          return instance
      }
      ```
  - level: deep
    text_md: |
      Формально модель памяти Go основана на happens-before в стиле работ Lamport и близка к release/acquire-семантике. Событие — чтение или запись конкретной ячейки. Программа корректна («data-race-free»), если для любой пары конфликтующих обращений (одна ячейка, хотя бы одно — запись) существует happens-before между ними. Для DRF-программ гарантируется, что чтение видит либо последнюю по happens-before запись, либо конкурентную — но для корректных программ конкурентных конфликтов нет, поэтому поведение sequentially consistent.

      **Обновление модели памяти в Go 1.19** (Russ Cox). До 2022 официальный документ не специфицировал семантику `sync/atomic`. В Go 1.19 модель формализовали и явно определили, что **атомарные операции `sync/atomic` sequentially consistent**: они образуют единый тотальный порядок, согласованный с happens-before всех горутин. Это сильнее, чем acquire/release в C++ (где есть `memory_order_relaxed`). Тогда же добавили типы `atomic.Int32/Int64/Pointer/Bool` и т.д. как рекомендуемый API. Документ также явно зафиксировал, что Go не даёт гарантий для гонок и что реализация может считать DRF-программы sequentially consistent.

      **Связь с C++ memory model.** C/C++11 предлагает спектр упорядочиваний (relaxed → acquire/release → seq_cst). Go сознательно упростил: обычные обращения к памяти не упорядочены (гонка = UB), а `sync/atomic` — всегда seq_cst, без выбора порядка. Это компромисс безопасности против гибкости: меньше способов выстрелить в ногу, но и меньше возможностей для сверхтонкой оптимизации lock-free структур.

      **Переупорядочивание.** Источников два: компилятор (может переставлять независимые операции, держать значение в регистре) и CPU (out-of-order execution, store buffer; на слабых моделях типа ARM64/POWER — агрессивное переупорядочивание записей). Барьеры/атомики вставляют нужные fence-инструкции под конкретную архитектуру. Именно поэтому «читаю без лока, но же значение простое» — ошибка: на ARM64 запись полей объекта и запись указателя на него могут стать видны другому ядру в обратном порядке без release-барьера. Компилятор Go при этом сам НЕ вставит барьер для обычной (неатомарной) записи. Инструмент `-race` реализует детектор на базе TSan (ThreadSanitizer) — он строит happens-before граф в рантайме через shadow memory; он находит только те гонки, что реально произошли в конкретном прогоне (нет ложных срабатываний, но и нет полноты). На staff-собесе ценят вывод: единственная безопасная стратегия — делать программы data-race-free by design, а не рассчитывать на «атомарность» обычных операций.
