slug: defer-panic-recover
section: go-internals
title: "defer, panic и recover: порядок и производительность"
difficulty: middle
tags: [defer, panic, runtime]
question_md: |
  Как работают `defer`, `panic` и `recover`? В каком порядке выполняются отложенные вызовы, когда вычисляются их аргументы, как `defer` может изменить именованное возвращаемое значение? Что такое open-coded defers и какие есть ловушки с `defer` в цикле?
answer_levels:
  - level: middle
    text_md: |
      `defer` откладывает вызов функции до момента возврата из окружающей функции. Отложенные вызовы выполняются в порядке **LIFO** (стек): последний объявленный `defer` сработает первым. Это удобно для парного освобождения ресурсов — `defer f.Close()`, `defer mu.Unlock()`.

      Важнейшая ловушка: **аргументы deferred-функции вычисляются в момент объявления `defer`, а не в момент выполнения**:

      ```go
      func f() {
          i := 0
          defer fmt.Println(i) // напечатает 0, а не 1
          i++
      }
      ```

      `panic` прерывает нормальное выполнение и начинает раскручивать стек, попутно выполняя все отложенные `defer`. `recover` перехватывает панику и останавливает раскрутку, но работает **только внутри deferred-функции**. Если панику не перехватить, программа падает.
  - level: senior
    text_md: |
      Разберём тонкости, которые проверяют на собесе.

      **Изменение именованного возврата.** Deferred-функция может поменять именованный результат, потому что она выполняется после вычисления `return`, но до фактической передачи значения:

      ```go
      func f() (result int) {
          defer func() { result *= 2 }()
          return 5 // result=5, затем defer делает result=10 → вернётся 10
      }
      ```
      С анонимным (неименованным) результатом такой трюк не работает — менять нечего. Это основа паттерна перехвата ошибок:

      ```go
      func do() (err error) {
          defer func() {
              if r := recover(); r != nil {
                  err = fmt.Errorf("recovered: %v", r)
              }
          }()
          mightPanic()
          return nil
      }
      ```

      **`recover` только в deferred-функции.** Вызов `recover()` в обычном коде (не внутри defer) вернёт `nil` и ничего не перехватит. Перехват работает только на том же уровне стека, где произошла раскрутка.

      **Ловушка `defer` в цикле.** `defer` привязан к возврату **функции**, а не итерации цикла. Открывая ресурсы в цикле, легко накопить тысячи отложенных вызовов, которые сработают только в конце:

      ```go
      func bad(files []string) {
          for _, name := range files {
              f, _ := os.Open(name)
              defer f.Close() // накопится до конца функции — утечка дескрипторов!
          }
      }
      ```
      Решение — вынести тело в отдельную функцию (или закрывать явно):
      ```go
      func good(files []string) {
          for _, name := range files {
              func() {
                  f, _ := os.Open(name)
                  defer f.Close() // закроется в конце каждой итерации
                  // ... работа с f
              }()
          }
      }
      ```

      **Производительность.** До Go 1.13–1.14 каждый `defer` аллоцировал структуру `_defer` в куче и заносил её в связный список — это было заметно дорого. С Go 1.14 появились **open-coded defers**: если число `defer` в функции известно на этапе компиляции и невелико (≤ 8, без defer в цикле), компилятор встраивает их исполнение прямо в код через битовую маску активных defer'ов, и оверхед становится почти нулевым — сравнимым с обычным вызовом.
  - level: deep
    text_md: |
      В рантайме отложенные вызовы описываются структурой `runtime._defer` (`runtime/runtime2.go`), связанной в список через `g._defer` — вершину стека defer'ов текущей горутины. Историческая эволюция трёх поколений:

      1. **До Go 1.13** — каждый `defer` создавал `_defer` в куче (`deferproc`), аргументы копировались в неё; на возврате `deferreturn` шёл по списку. Дорого: аллокация + косвенность.
      2. **Go 1.13** — часть `_defer` стала аллоцироваться на стеке (stack-allocated defer), что убрало heap-аллокацию для многих случаев (~30% ускорение).
      3. **Go 1.14** — **open-coded defers**: компилятор при известном и небольшом числе defer'ов (не в цикле) не создаёт `_defer` вообще. Он резервирует слоты под аргументы, заводит битовую маску `deferBits`, где бит выставляется при достижении соответствующего `defer`, а в эпилоге функции и в code path паники генерируется inline-код, проверяющий биты и вызывающий нужные функции в обратном порядке. Оверхед — единицы наносекунд.

      Важная связь с паникой и стек-трейсами: для корректной раскрутки при панике через open-coded defers рантайму нужна метаинформация — **`funcdata`/FUNCDATA** с описанием open-coded defer'ов, чтобы `gopanic` мог их найти и выполнить, ведь их нет в списке `_defer`. Поэтому паника чуть медленнее, но нормальный путь — быстрый.

      `gopanic` создаёт `runtime._panic`, идёт по defer'ам (сначала open-coded через funcdata, потом связный список), выполняя их; если внутри defer вызывается `recover`, он помечает `_panic.recovered=true`, и раскрутка останавливается — управление возвращается в функцию, объявившую этот defer, через `recovery`/`deferreturn`. Вложенные паники (паника внутри defer во время другой паники) образуют цепочку — трейс покажет обе. `os.Exit` не выполняет defer'ы (в отличие от паники). Тонкость про `runtime.Goexit` — он выполняет все defer'ы, но горутину завершает без запуска main-возврата. На staff-собесе ценят понимание, что open-coded defers «ломаются» (fallback на heap/stack `_defer`) при `defer` внутри цикла или при слишком большом их числе — тогда возвращается старый дорогой путь.
