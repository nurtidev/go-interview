slug: queue-delivery-semantics-outbox
section: system-design
title: "Очереди: exactly-once vs at-least-once, transactional outbox"
difficulty: staff
tags: [kafka, exactly-once]
question_md: |
  Объясните разницу между at-most-once, at-least-once и exactly-once доставкой сообщений. Почему «настоящий» exactly-once через сеть в общем случае недостижим? Как Kafka приближается к exactly-once (idempotent producer, transactions)? Что такое transactional outbox и какую проблему двойной записи (dual write) он решает?
answer_levels:
  - level: middle
    text_md: |
      At-most-once — сообщение может быть потеряно, но никогда не доставляется дважды: продюсер отправил и не проверяет подтверждение, либо консьюмер коммитит offset до обработки. At-least-once — сообщение гарантированно доставляется, но может прийти повторно: продюсер ретраит при отсутствии подтверждения, консьюмер коммитит offset только после обработки, и при падении между обработкой и коммитом сообщение обработается снова после перезапуска. Exactly-once — идеал, при котором сообщение доставляется и обрабатывается ровно один раз без потерь и дублей.

      На практике почти все системы (Kafka, RabbitMQ, SQS) в дефолтной настройке дают at-least-once, потому что это самый безопасный компромисс: лучше обработать дважды и дедуплицировать на своей стороне, чем потерять сообщение молча. At-least-once вместе с идемпотентным обработчиком на стороне консьюмера (повторная обработка того же сообщения не меняет результат) на практике эквивалентен exactly-once с точки зрения бизнес-эффекта, даже если "по проводам" сообщение прошло два раза.
  - level: senior
    text_md: |
      Сетевой exactly-once в чистом виде недостижим из-за fallacies of distributed computing: продюсер не может по таймауту достоверно отличить «сообщение не доставлено» от «доставлено, но ответ потерялся» — в обоих случаях он видит одинаковый таймаут. Единственный безопасный выбор при неопределённости — ретраить, а значит потенциально задублировать. Поэтому exactly-once на практике не про сеть, а про идемпотентность и дедупликацию поверх at-least-once канала.

      Kafka даёт несколько уровней приближения. `acks=all` — продюсер ждёт подтверждения от всех in-sync реплик перед тем как считать запись успешной, защищая от потери данных при падении лидера. Idempotent producer (`enable.idempotence=true`) решает проблему дублей именно от ретраев самого продюсера: каждому продюсеру присваивается Producer ID (PID), и каждое сообщение в партиции нумеруется монотонной sequence number; брокер отслеживает последний принятый (PID, sequence) на партицию и отбрасывает дубликат при повторной отправке того же номера — это убирает дубли на уровне «продюсер → топик», но не решает end-to-end дедупликацию для консьюмера. Kafka transactions идут дальше: позволяют атомарно записать в несколько партиций/топиков и одновременно закоммитить consumer offset — паттерн read-process-write, где приложение читает из input-топика, пишет результат в output-топик и коммитит offset входного топика как часть одной транзакции. Если приложение упадёт до коммита транзакции, при перезапуске оно перечитает те же входные сообщения и повторит запись, но благодаря transactional semantics (`isolation.level=read_committed` у читателей) частично записанные, не закоммиченные данные не видны другим консьюмерам — так достигается exactly-once именно внутри Kafka (Kafka Streams активно этим пользуется).

      Проблема остаётся на границах системы: если консьюмер после обработки сообщения из Kafka пишет результат не в Kafka, а в внешнюю БД или вызывает HTTP API, транзакционные гарантии Kafka туда не дотягиваются — это и есть повод для inbox-паттерна на стороне консьюмера: таблица обработанных message_id с unique constraint, куда пишем в той же транзакции, что и бизнес-эффект, и на входе каждого сообщения проверяем, не обработано ли оно уже.
  - level: deep
    text_md: |
      Симметричная проблема на стороне продюсера — dual write: сервис должен и изменить своё состояние в БД, и опубликовать событие об этом в Kafka, но это две разные системы без общей транзакции. Если сначала закоммитить в БД, а потом упасть до публикации в Kafka — событие потеряно навсегда, при этом данные в БД уже изменены (согласованность нарушена, downstream-системы не узнают об изменении). Если сначала опубликовать в Kafka, а потом упасть до коммита в БД — потребители увидят событие о том, чего не произошло. Ни retry, ни try-catch не спасают, потому что сбой может произойти именно в промежутке между двумя независимыми операциями, и это не решается кодом — это фундаментальное ограничение отсутствия распределённой транзакции между Kafka и произвольной БД.

      Transactional outbox решает это, сводя задачу к одной локальной ACID-транзакции. В той же транзакции, где сервис пишет доменные данные (например, `orders`), он пишет строку в таблицу `outbox` (event_id, aggregate_id, payload, created_at, published=false) — обе записи коммитятся атомарно средствами самой БД, поэтому либо обе применились, либо ни одна. Дальше отдельный процесс — relay (простой polling-воркер, читающий outbox по created_at/published и публикующий в Kafka) или CDC-коннектор (Debezium, читающий binlog/WAL БД и стримящий изменения таблицы outbox прямо в Kafka без нагрузки на БД поллингом) — асинхронно доставляет событие во внешнюю шину. CDC-подход предпочтительнее на масштабе, потому что читает WAL, а не делает поллинг-запросы к таблице, и не создаёт доп. нагрузку на транзакционную БД.

      ```
      BEGIN;
        INSERT INTO orders (id, status, ...) VALUES (...);
        INSERT INTO outbox (id, aggregate_id, type, payload, published)
          VALUES (gen_uuid(), order_id, 'OrderCreated', '{...}', false);
      COMMIT;

      -- Debezium читает WAL таблицы outbox → публикует в Kafka topic "orders.events"
      -- relay/CDC гарантирует at-least-once доставку из outbox в Kafka,
      -- поэтому downstream-консьюмер обязан быть идемпотентным (inbox-паттерн)
      ```

      Важно понимать границы гарантии: outbox даёт exactly-once *эффект* (событие точно будет опубликовано, если транзакция закоммитилась), но сама доставка от relay/CDC до Kafka и дальше до консьюмера остаётся at-least-once — CDC-коннектор может упасть после публикации, но до сохранения своего собственного offset, и при перезапуске переотправит то же событие. Поэтому даже с идеальным outbox на продюсере консьюмер всё равно обязан быть идемпотентным (inbox с unique constraint по event_id) — outbox устраняет dual write, но не устраняет необходимость дедупликации на потребителе, потому что exactly-once по всей цепочке end-to-end не складывается из локальных at-least-once гарантий каждого звена без дедупликации хотя бы в одном месте.

      Практические грабли в проде: outbox-таблица без периодической очистки растёт бесконечно (после публикации нужно либо удалять строку, либо архивировать по TTL); polling relay с наивным `SELECT ... WHERE published=false` без `SKIP LOCKED` создаёт contention при нескольких инстансах relay; при использовании Debezium — миграция схемы outbox-таблицы требует аккуратности, потому что коннектор чувствителен к изменению структуры WAL-событий. Эволюция при росте: единичный сервис с прямым dual write (риск несогласованности, но никто не заметил на малом трафике) → transactional outbox с polling relay, когда несогласованность стала болью → CDC (Debezium) поверх outbox, когда объём событий и число consumers выросли настолько, что polling создаёт заметную нагрузку на БД и задержку публикации.
