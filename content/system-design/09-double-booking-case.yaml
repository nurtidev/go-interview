slug: booking-no-double-sell-saga
section: system-design
title: "Кейс: бронирование без двойных продаж"
difficulty: senior
tags: [booking, concurrency, saga]
question_md: |
  Классический кейс уровня крупной booking-платформы (отели, авиабилеты, билеты на мероприятия). Спроектируйте бронирование так, чтобы один и тот же номер/место на одни и те же даты нельзя было продать дважды, даже когда два пользователя жмут «купить» одновременно на последнюю единицу.

  Масштаб и требования:

  - 500M визитов/месяц, резкие пики на праздники и распродажи.
  - Поиск < 300 мс, оформление брони < 5 сек.
  - Двойная продажа недопустима (строгая консистентность на инвентарь).
  - Для поиска eventual consistency нормальна, для инвентаря/оплаты — нет.
  - Оплата — через внешний платёжный шлюз (без гарантий идемпотентности).

  Спроектируйте: модель инвентаря, механику предотвращения двойной продажи (блокировки/версии/уникальные ключи), временное удержание места на время чекаута (seat/room hold), сагу оплаты с компенсациями, идемпотентность. Отдельно — что писали бы на Go.
answer_levels:
  - level: middle
    text_md: |
      Суть проблемы: два пользователя одновременно бронируют последнюю единицу. Без защиты оба получат подтверждение — это двойная продажа.

      Инвентарь моделируем не как «конкретные номера», а как слоты доступности: строка на (объект, тип, дата) со счётчиком `total` и `reserved`. Базовая атомарная бронь — условный UPDATE, который сам является защитой от гонки:

      ```sql
      UPDATE inventory
      SET reserved = reserved + 1
      WHERE hotel_id = 100 AND room_type = 'standard' AND date = '2026-12-25'
        AND reserved < total;
      -- affected rows = 1 → успели; 0 → мест нет
      ```

      Проверка и инкремент происходят в одном атомарном UPDATE, поэтому двое не могут оба пройти на последней единице — БД сериализует запись строки.

      Временное удержание (hold): пользователь выбрал место и идёт на оплату — придерживаем место на ~15 минут, чтобы за это время его не купил другой. Не подтвердил — hold истекает, место снова доступно.

      Компоненты: Search (проекция в Elasticsearch для быстрого поиска), Inventory Service (source of truth в PostgreSQL), Payment Service (внешний шлюз), Booking-оркестратор (ведёт бронь по шагам), Redis для hold и кэша.
  - level: senior
    text_md: |
      Полное решение — три уровня контроля конкурентности плюс сага для оплаты.

      Контроль конкурентности:

      - Пессимистичная блокировка (`SELECT ... FOR UPDATE`) — надёжно для «горячих» строк (последний номер в новогоднюю ночь): блокируем строку инвентаря, проверяем, обновляем, коммитим. Минус — снижает параллелизм на этой строке.
      - Оптимистичная блокировка (версионирование) — для низкой конкуренции: читаем `version`, обновляем `WHERE version = X`; если `affected_rows = 0` — кто-то успел раньше, делаем retry. Нет блокировок, но нужны повторы при конфликте.
      - Уникальный constraint — последняя линия обороны: `UNIQUE (seat_id, date)` на подтверждённых бронях физически не даст вставить дубль, что бы ни случилось выше.

      На практике комбинируют: атомарный UPDATE/оптимистичная блокировка на обычном инвентаре, пессимистичная — на заведомо горячем, и unique constraint как гарантия корректности в любом случае.

      Seat hold. Redis `SET hold:{seat}:{date} {user_id} NX EX 900` — быстрое удержание на 15 минут, снимает нагрузку с БД и служит UX-слоем. Но важно: истина — в БД. Если Redis упал в момент подтверждения, финальную бронь делаем только через транзакцию БД (`FOR UPDATE` / условный UPDATE). Redis hold — оптимизация, не источник правды.

      Сага оплаты. Бронь это распределённая транзакция через несколько сервисов, общей ACID-транзакции нет. Оркестрируем шаги, каждый с компенсацией:

      1. hold_seat → компенсация release_seat
      2. charge_payment (внешний шлюз) → компенсация refund_payment
      3. create_booking_record (status CONFIRMED) → компенсация mark_failed
      4. send_ticket → компенсации нет (письмо уже ушло), логируем

      Если шаг падает — откатываем выполненные шаги в обратном порядке. Статус брони PENDING виден как «семантическая блокировка», пока сага не завершилась.

      Идемпотентность. Клиент присылает idempotency_key; при ретрае того же запроса возвращаем результат первой операции, а не создаём вторую бронь. Ключ — UNIQUE-колонка в таблице броней.

      Поиск. Elasticsearch как проекция для поиска (full-text + гео + фасеты), синхронизируется из PostgreSQL через CDC (Debezium). PostgreSQL остаётся source of truth.

      На Go естественно ложится оркестратор саги: тип `SagaStep{ Execute, Compensate }`, последовательный прогон с откатом при ошибке; pgx с явными транзакциями и `context` с таймаутами; middleware идемпотентности по ключу.
  - level: deep
    text_md: |
      Почему нельзя «просто транзакцию». Между списанием денег во внешнем шлюзе и записью брони в свою БД нет распределённой транзакции. Если оплата прошла, а запись брони не создалась — деньги списаны без брони; нужна компенсация (refund). Но refund сам асинхронен и может упасть — поэтому саге нужен надёжный слой: события компенсаций через очередь с ретраями, dead-letter, и отдельная сверка (reconciliation job), которая ловит «повисшие» состояния (оплата есть — брони нет) и чинит их либо эскалирует в очередь ручного разбора. Saga даёт eventual consistency, а не мгновенную атомарность, и это нужно проговорить явно.

      Неоднозначность платёжного шлюза. Таймаут при charge не отличает «не списано» от «списано, но ответ потерялся». Единственно безопасно — передавать idempotency_key в сам шлюз (если поддерживает) и/или уметь запросить статус операции по ключу перед повторной попыткой, иначе retry задвоит списание.

      Горячий инвентарь. Последняя единица на пиковую дату собирает всю конкуренцию в одну строку. Варианты: пессимистичная блокировка (простое, но сериализует), или сериализация через очередь на ключ инвентаря — воркеры разбирают заявки на конкретный слот по одной (`SELECT ... FOR UPDATE SKIP LOCKED` для распределения нагрузки между инстансами воркеров без взаимной блокировки). Overbooking иногда делают намеренно (авиакомпании закладывают неявку) — это бизнес-решение поверх технической защиты.

      Утечка удержаний. Брошенные чекауты оставляют «занятый» инвентарь до истечения TTL. TTL в Redis решает часть, но истина в БД: нужна сверка, которая освобождает просроченные PENDING-брони, у которых hold истёк, а оплата не прошла.

      Отказоустойчивость. Redis недоступен — деградируем к прямой работе с БД (медленнее, но корректно): для инвентаря выбираем корректность над доступностью. Падение оркестратора между шагами саги безопасно, если состояние саги персистится (какой шаг выполнен) — при рестарте сага продолжается или компенсируется; поэтому шаги и их статусы пишут в БД (не держат только в памяти процесса).

      Эволюция: одиночный сервис с атомарным UPDATE и unique constraint (хватает на малом трафике) → добавление seat hold в Redis и саги, когда чекаут стал многошаговым с внешней оплатой → сериализация горячих ключей и reconciliation-джоб, когда пики распродаж вскрыли гонки и повисшие оплаты.
