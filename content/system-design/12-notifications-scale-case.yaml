slug: notifications-scale-multichannel
section: system-design
title: "Кейс: система уведомлений на 10M+ пользователей"
difficulty: senior
tags: [notifications, kafka, retry]
question_md: |
  Классический кейс уровня крупного маркетплейса. Спроектируйте систему уведомлений: несколько каналов доставки (push, email, SMS, in-app), шаблоны, приоритеты (транзакционные против маркетинговых), дедупликация, ретраи, ограничение частоты, устойчивость к пикам распродаж.

  Масштаб и требования:

  - 10M+ пользователей, каналы push/email/SMS/in-app через внешних провайдеров.
  - Транзакционные уведомления (код, статус заказа, оплата) критичны и не должны ждать за маркетинговыми рассылками.
  - Массовые маркетинговые рассылки на миллионы пользователей (пики на распродажах).
  - Не слать дубли и не спамить (rate limit на пользователя), уважать предпочтения и отписки.
  - Ретрай при сбое провайдера, доставка «хотя бы раз».

  Спроектируйте: конвейер доставки, разделение приоритетов, дедуп, retry с DLQ, ограничение частоты, абстракцию провайдеров. Отдельно — что писали бы на Go.
answer_levels:
  - level: middle
    text_md: |
      Базовый конвейер: сервисы-источники зовут Notification Service, он кладёт события в Kafka, а канальные воркеры разбирают очередь и шлют через провайдеров.

      ```
      [Источники] → [Notification Service] → [Kafka]
                                                 ↓
                        ┌────────────────────────┼───────────────────┐
                   [Push Worker]           [Email Worker]        [SMS Worker]
                        ↓                       ↓                     ↓
                     [FCM/APNs]             [Email API]           [SMS API]
      ```

      Kafka здесь — буфер, сглаживающий пики (распродажа): всплеск не бьёт напрямую по провайдерам, а копится в очереди и разбирается в устойчивом темпе. Каждый канал — отдельный воркер (consumer group), потому что у каналов разные лимиты, латентность и провайдеры.

      Шаблоны — отдельная таблица (id, канал, тема, тело), чтобы не хардкодить тексты. Предпочтения пользователя (какие каналы включены) уважаем перед отправкой. Базовый дедуп — не слать уведомление с тем же notification_id дважды. Базовый retry — при ошибке провайдера повторить с задержкой.

      Хранение:

      ```sql
      notifications (id, user_id, type, channel, template_id, status, created_at, sent_at)
      templates (id, name, subject, body, channel)
      user_preferences (user_id, channel, enabled, quiet_hours)
      ```
  - level: senior
    text_md: |
      Полное решение — приоритеты, надёжный retry, дедуп и ограничение частоты.

      Приоритеты через отдельные топики. Транзакционные и маркетинговые уведомления нельзя лить в одну очередь: маркетинговая рассылка на миллионы забьёт очередь, и код подтверждения будет ждать за ней (priority inversion). Разводим по разным Kafka-топикам (`notifications.transactional`, `notifications.marketing`) с отдельными пулами воркеров и приоритетом ресурсов у транзакционных — так критичное всегда проходит быстро.

      Retry и DLQ. Провайдеры падают и троттлят. Ошибку классифицируем: временная (5xx, таймаут, rate limit провайдера) — ретраим с экспоненциальным backoff; постоянная (невалидный токен, отписка) — не ретраим, помечаем и выбываем. После N неудачных попыток сообщение уходит в Dead Letter Queue для разбора/отложенного повтора, а не крутится вечно, блокируя партицию.

      Дедупликация. Канал at-least-once (Kafka + ретраи) неизбежно даёт повторы. Дедуп по идемпотентному ключу: храним отправленные notification_id и перед отправкой проверяем — если уже слали, пропускаем. Где хранить — Redis с TTL (быстро, дедуп-окно ограничено) или unique constraint в БД (надёжнее, дороже). Ключ дедупа строим по (user_id, тип события, сущность), чтобы «оплата заказа №123» не ушла дважды.

      Rate limiting на пользователя. Не более N push в час на пользователя — иначе спам и отписки. Счётчик с TTL в Redis на user_id. Уважаем quiet hours (не будим ночью по таймзоне пользователя) и глобальные отписки.

      Абстракция провайдеров. Единый интерфейс канала (Send с общей моделью) и адаптер под каждого провайдера (FCM, APNs, email-провайдер, SMS-провайдер) — так провайдера можно заменить/зарезервировать без переписывания логики. У каждого адаптера — свой rate limiter под лимиты провайдера и circuit breaker.

      Почему Go. Канальные воркеры — consumer groups Kafka, масштабируются числом инстансов/партиций. Внутри воркера — ограниченный параллелизм (semaphore или golang.org/x/time/rate), чтобы уважать лимит провайдера и не словить троттлинг. Circuit breaker вокруг провайдера, structured logging и метрики доставки на каждый канал. Отправка одного сообщения — идемпотентная операция с проверкой дедуп-ключа в начале.
  - level: deep
    text_md: |
      Массовые рассылки. «Отправить 10M маркетинговых push» — это не 10M мгновенных вызовов: провайдер имеет лимит (например, десятки тысяч/сек), поэтому рассылку разворачивают (fan-out) в поток заданий, троттлят под лимит провайдера и растягивают во времени. Полезно сегментировать и приоритизировать внутри маркетинга, а также уметь отменить/приостановить кампанию на полпути (что уже ушло — ушло, остаток из очереди снимаем).

      Дедуп на масштабе. Дедуп-окно и хранилище ключей — компромисс: Redis с TTL дешёв, но при рестарте/вытеснении окно теряется; критичные транзакционные лучше защищать unique constraint в БД. Ключ дедупа должен быть детерминированным от бизнес-события, а не случайным, иначе повтор того же события не отсекётся.

      Деградация провайдера. FCM/SMS-провайдер лёг — circuit breaker размыкает цепь, сообщения не копят таймауты, а уходят в отложенный retry (DLQ с задержкой) или на резервный канал/провайдера (fallback: не дошёл push — шлём SMS для критичного). Важно не устроить retry storm: джиттер на backoff и ограничение параллелизма ретраев.

      Порядок и зависимости. Обычно порядок уведомлений не важен, но есть исключения (OTP должен прийти раньше «добро пожаловать»; «заказ отменён» не должен прийти после «заказ отменён» повторно из-за ретрая). Для критичных цепочек — дедуп по событию и, при необходимости, ключ партиционирования Kafka по user_id, чтобы сообщения одного пользователя обрабатывались по порядку в рамках партиции.

      Трекинг доставки и стоимость. Провайдеры шлют вебхуки (delivered/bounced/opened) — их принимаем и обновляем статус, чтобы не ретраить уже доставленное и чистить невалидные токены. Стоимость каналов разная (SMS дорогой) — политика выбора канала (сначала push, SMS как fallback для критичного) экономит деньги.

      Отказоустойчивость и пики. Kafka поглощает всплеск распродажи, воркеры автоскейлятся по consumer lag, маркетинг троттлится, чтобы не задушить транзакционные и не превысить лимиты провайдеров. Poison message (постоянно падающая на обработке) уходит в DLQ, а не блокирует партицию. At-least-once на всей цепочке компенсируется дедупом хотя бы в одном месте (у воркера перед отправкой).

      Эволюция: один воркер шлёт push синхронно (хватает на малом объёме) → Kafka-буфер, разделение приоритетов и DLQ, когда маркетинг начал задерживать транзакционные и провайдеры стали падать → дедуп, rate limit, fallback-каналы и трекинг доставки, когда объём и стоимость выросли, а спам и дубли стали болью.
