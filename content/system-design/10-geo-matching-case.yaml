slug: geo-matching-ride-hailing
section: system-design
title: "Кейс: гео-матчинг водителей в такси-сервисе"
difficulty: senior
tags: [geo, matching, redis]
question_md: |
  Классический кейс уровня крупного такси-сервиса. Спроектируйте матчинг: пассажир запрашивает поездку A → B, система находит ближайшего свободного водителя и связывает их, попутно показывая машину на карте в реальном времени.

  Масштаб и требования:

  - ~10M поездок в день, ~1M активных водителей, пики утром и вечером.
  - Водитель шлёт геопозицию каждые 3-5 секунд → ~250K обновлений/сек (write-heavy).
  - Матчинг < 5 сек, обновление позиции на карте пассажира каждые 3-5 сек.
  - Точность в сотни метров достаточна.
  - Динамическое ценообразование (surge) по районам.

  Спроектируйте: хранение и индексацию геопозиций (geohash / S2 / H3 / Redis GEO), поиск ближайших водителей, алгоритм матчинга, real-time трекинг, surge pricing. Отдельно — что писали бы на Go и где узкие места.
answer_levels:
  - level: middle
    text_md: |
      Ядро задачи — быстро находить ближайших свободных водителей к пассажиру. Наивный перебор всех водителей с вычислением расстояния не годится. Нужен геоиндекс.

      Идея geohash: карта рекурсивно делится на прямоугольные ячейки, каждая получает строковый код, и пространственная близость даёт общий префикс (соседние ячейки — похожие коды). Тогда «найти рядом» это «искать в моей ячейке и соседних», а не по всей карте. Чем длиннее код, тем мельче ячейка (6 символов ≈ километр, чего для такси достаточно).

      Практичный инструмент — Redis с GEO-командами: `GEOADD drivers:active <lon> <lat> driver:42` обновляет позицию, `GEOSEARCH ... BYRADIUS 3 km ASC COUNT 10` возвращает ближайших. Под капотом Redis GEO — sorted set с геохешем в score.

      Простой матчинг: находим N ближайших, фильтруем только свободных, ранжируем (расстояние + рейтинг), предлагаем поездку ближайшему; не принял за таймаут — предлагаем следующему.

      Компоненты: Location Service (принимает обновления, пишет в Redis GEO), Matching Service (ищет и матчит), Trip Service (поездки в PostgreSQL), Tracking Service (пушит позицию пассажиру по WebSocket), Redis GEO как горячее хранилище позиций.
  - level: senior
    text_md: |
      Полное решение упирается в две вещи: выдержать 250K обновлений/сек и корректно матчить без гонок.

      Хранение геопозиций. Это чистая write-heavy нагрузка (250K/сек) с требованием свежести (< 5 сек) — PostgreSQL без тяжёлого шардирования не тянет. Redis в памяти справляется, шардируем по городам: `drivers:active:{city}` на своём инстансе, матчинг идёт внутри города, так что шардирование естественно. Позиции с TTL — водитель, переставший слать обновления, сам «пропадает» из активных. Параллельно поток позиций уходит в Kafka → ClickHouse для аналитики и истории (не грузим Redis историей).

      Geohash vs S2/H3. Geohash прост, но у него проблема границ: два близких объекта у края ячейки попадают в разные ячейки с непохожими префиксами, поэтому всегда ищем в ячейке + 8 соседних, и при пустоте расширяем радиус. S2 (Google) и H3 (шестиугольники) дают более равномерное покрытие сферы и удобнее с соседями/иерархией — их берут, когда geohash-краевые эффекты и surge по ячейкам становятся заметны. Для MVP хватает Redis GEO/geohash.

      Матчинг без двойного назначения. Между «нашли водителя» и «он принял» водитель не должен быть предложен второму пассажиру. Нужен атомарный переход статуса водителя AVAILABLE → OFFERING (например, Lua-скрипт в Redis или условное обновление), иначе гонка назначит одного водителя двоим. Алгоритм: GEOSEARCH → фильтр свободных → ранжирование по ETA + рейтингу → предложение первому с блокировкой → таймаут/отказ → следующему.

      Real-time трекинг. Водитель шлёт позицию → Location Service пишет в Redis и публикует в Kafka-топик по driver_id → Tracking Service (подписан на топик) пушит по WebSocket пассажиру, который смотрит на эту поездку.

      Surge pricing. По каждой geohash-ячейке считаем demand (активные заказы за последние ~5 минут) и supply (свободные водители); множитель = f(demand/supply). Считаем по ячейке, а не по городу, чтобы цена была локальной.

      Почему Go. Location Service — приём 250K соединений/обновлений в секунду: Go хорош на высококонкурентном I/O, но нельзя писать в Redis на каждое обновление синхронно по одному — коалесцируем (важна только последняя позиция водителя) и пишем батчами через Redis pipeline. Matching Service — конечный автомат состояния поездки/водителя. Узкие места: горячие ячейки (аэропорт, концерт) перегружают один Redis-шард и раздувают surge; бэкпрешер на приёме позиций.
  - level: deep
    text_md: |
      Проблема границ и точности глубже. Straight-line расстояние (haversine) от geohash-поиска — грубая оценка; реальный ETA считает маршрутный движок по дорожному графу (машина за рекой «близко по прямой», но далеко по дороге). Обычно двухфаза: geohash/Redis отбирает кандидатов дёшево, затем маршрутизатор считает точный ETA только для нескольких кандидатов. S2/H3 уменьшают краевые эффекты и упрощают иерархическое расширение радиуса.

      Гонки состояния водителя. Двойное предложение — главный источник багов. Переход статуса должен быть атомарным (Lua/CAS), а таймаут предложения — обязательно освобождать водителя обратно в AVAILABLE, иначе «зависшие» OFFERING утекают из пула. Отклонения и таймауты — норма, алгоритм должен дёшево переходить к следующему кандидату.

      Матчинг как оптимизация. Жадный «ближайшему первому» локально хорош, но глобально неоптимален: иногда выгоднее матчить батчем каждые несколько секунд (собрать пул заявок и водителей района и решить назначение как задачу оптимизации), что снижает суммарное время подачи. Это усложнение, к которому приходят на масштабе.

      Бэкпрешер на 250K/сек. Обновления позиций — устаревающие данные: если система не успевает, надо дропать старые и брать только последнюю позицию водителя (коалесцирование), а не копить очередь. Батчинг записи в Redis, отдельный поток в Kafka для аналитики. Следим за GC-давлением: 250K/сек аллокаций мелких структур бьёт по паузам — переиспользуем буферы (sync.Pool), избегаем лишних аллокаций в горячем пути.

      Горячие ячейки и отказы. Аэропорт/стадион = горячий Redis-шард и всплеск surge; помогает разнос нагрузки и предвычисление surge по ячейкам фоново. Падение Redis-шарда города — деградация: увеличенный радиус/устаревшие позиции лучше, чем полный отказ матчинга; но состояние активных поездок держим в БД, чтобы не потерять их вместе с Redis. Обратные связи surge (высокий множитель отпугивает спрос и притягивает водителей) требуют сглаживания, чтобы цена не «прыгала».

      Эволюция: Redis GEO + жадный матчинг на старте → шардирование по городам и атомарные переходы статуса, когда пошли гонки и горячие ячейки → S2/H3 и маршрутный ETA, когда краевые эффекты и точность подачи стали важны → батчевый матчинг-оптимизатор на самых плотных рынках.
