slug: flash-sale-checkout-degradation
section: system-design
title: "Кейс: корзина и чекаут под нагрузкой чёрной пятницы"
difficulty: senior
tags: [flash-sale, redis, degradation]
question_md: |
  Классический кейс уровня крупного маркетплейса. Спроектируйте корзину и оформление заказа, которые выдержат пик распродажи, когда на ограниченный остаток популярного товара одновременно налетают десятки тысяч человек, и при этом нельзя продать больше, чем есть на складе (oversell).

  Масштаб и требования:

  - Пик распродажи: ~100K RPS на чтение корзины, ~10K RPS на изменение.
  - Есть «горячие» SKU с малым остатком (например, 1000 штук на всю страну).
  - Корзина сохраняется между сессиями.
  - Перепродажа сверх остатка недопустима.
  - Система должна деградировать управляемо, а не падать целиком.

  Спроектируйте: хранение корзины, проверку и резервирование остатков без oversell, сглаживание пика (очереди/waiting room), атомарный декремент горячего счётчика, стратегию graceful degradation. Отдельно — что писали бы на Go.
answer_levels:
  - level: middle
    text_md: |
      Разделяем «положить в корзину» и «оформить заказ» — это разные по требованиям операции.

      Корзина. Хранение в Redis: hash `cart:{user_id}` → {product_id: quantity}. Чтение: Redis → при промахе читаем PostgreSQL и прогреваем Redis. Запись: пишем в Redis, а в PostgreSQL персистим асинхронно (через очередь) — корзина терпит eventual consistency. При добавлении проверяем наличие остатка, но не резервируем: резервирование только при оформлении, иначе брошенные корзины заблокируют весь товар.

      Остаток и oversell. Ключевая опасность — перепродать горячий SKU. Решение — атомарный декремент остатка в Redis при оформлении: `DECR stock:{product_id}`; если результат стал отрицательным — откатываем (`INCR`) и отвечаем «товар закончился». Атомарность Redis гарантирует, что двое не спишут одну и ту же последнюю единицу.

      Компоненты: API Gateway, Cart Service (stateless), Redis (горячие корзины и счётчики остатков), PostgreSQL (персистентное хранилище и source of truth заказов), Stock Service, очередь (Kafka) для сглаживания записи.
  - level: senior
    text_md: |
      Полное решение — горячий ключ остатка, резервирование с TTL, очередь на чекаут и деградация.

      Горячий ключ остатка. Вся распродажа бьёт в один счётчик `stock:{product_id}` — это hot key. Простой `DECR` + откат работает, но безопаснее делать проверку-и-декремент атомарной (Lua-скрипт: если остаток > 0, декрементируй и верни ок, иначе откажи) — иначе между чтением и записью есть окно. При экстремальной нагрузке остаток пред-разбивают на N бакетов (`stock:{id}:0..N`), клиент бьёт в случайный бакет, а суммарный остаток агрегируют — так снимают контеншн с одного ключа ценой более сложной логики «добора» из соседних бакетов, когда один опустел.

      Резервирование. При оформлении не просто списываем — создаём резерв с TTL (например, 10-15 минут на оплату). Не оплатил — резерв истекает, остаток возвращается. Резерв — в Redis (быстро) как UX-слой, но финальное списание фиксируется в PostgreSQL (source of truth заказа); Redis сглаживает, БД хранит истину.

      Очередь и backpressure. Прямые синхронные вызовы к БД на 10K RPS записи в пике опасны. Ставим Kafka как буфер: чекаут кладёт заявку в очередь, воркеры разбирают её в темпе, который выдерживает БД. Это меняет UX (заказ «оформляется»), но защищает систему. На входе — rate limiting на API Gateway (token bucket) и идемпотентность (idempotency_key), чтобы ретраи клиента не создавали дубли заказов.

      Graceful degradation. Под перегрузкой сбрасываем некритичное: отключаем рекомендации и персонализацию, отдаём каталог из кэша (устаревшие данные лучше отказа), показываем упрощённую страницу. Circuit breaker вокруг Redis/PostgreSQL — при деградации зависимости быстро отвечаем фоллбэком, а не копим таймауты. Приоритет — чтобы работали корзина, чекаут и приём оплаты, а витринные фичи жертвуем первыми.

      Почему Go. Cart Service — stateless за балансировщиком, автоскейлится (HPA) под пик; Go дёшев по памяти на инстанс и хорош на высоком RPS. Против stampede на кэше горячего товара (истёк ключ — тысячи запросов ринулись в БД) — single-flight (golang.org/x/sync/singleflight): только одна горутина идёт в БД, остальные ждут её результат. Чекаут-воркеры — пул с ограниченным параллелизмом, уважающий пропускную способность БД. Rate limiter — golang.org/x/time/rate.
  - level: deep
    text_md: |
      Oversell глубже. Redis-остаток быстр, но это не source of truth; при сбое Redis или рассинхроне возможен дрейф. Варианты: (1) относиться к Redis как к «резервировочному» слою, а окончательную корректность подтверждать в БД при финализации заказа (условный UPDATE с проверкой остатка) — тогда oversell в Redis максимум приводит к вежливому отказу на финализации; (2) допускать небольшой контролируемый oversell как бизнес-решение (потом извиниться/вернуть деньги), если это дешевле, чем терять конверсию на строгих блокировках. Что выбрать — вопрос к продукту, и это стоит проговорить.

      Утечка резервов. Брошенные чекауты держат остаток до TTL. TTL закрывает основную массу, но нужна сверка (reconciliation), которая ловит расхождение между суммой активных резервов и фактическим остатком и лечит дрейф — особенно после инцидентов, когда Redis и БД разошлись.

      Старт распродажи (00:00). Худший момент — thundering herd в секунду старта: миллионы клиентов одновременно. Лечится виртуальной комнатой ожидания (waiting room): пускаем в чекаут N человек/сек по токену, остальные ждут в очереди с честной позицией; так пиковый спрос превращается в управляемый поток. Плюс прогрев кэшей и инстансов заранее (prewarming), плюс джиттер на клиентских ретраях.

      Stampede и single-flight. Истечение ключа кэша популярного товара под нагрузкой обрушивает БД. Помимо single-flight — вероятностное раннее обновление (probabilistic early expiration) и «мягкий» TTL, чтобы кэш не истекал у всех разом. Для горячего счётчика — шардирование ключа (см. senior), иначе даже атомарный Redis становится точкой сериализации.

      Отказоустойчивость. Redis недоступен — circuit breaker; для корзины деградируем к PostgreSQL (медленно, но данные целы), для остатка выбираем корректность: лучше пессимистичная блокировка строки в БД (медленно, но без oversell), чем «продать всё подряд». Kafka-буфер защищает БД от пиковой записи, но добавляет лаг оформления — приемлемый компромисс под распродажу. Load shedding — ступенчатый: сначала режем витринные фичи, потом ограничиваем долю входящего трафика, но приём уже начатых оплат защищаем до последнего.

      Эволюция: корзина в Redis + прямой DECR остатка (хватает в обычные дни) → резервы с TTL, очередь на чекаут и rate limiting, когда первая распродажа вскрыла oversell и перегрузку БД → waiting room, шардирование горячих ключей и ступенчатая деградация, когда масштаб пика вырос на порядок.
