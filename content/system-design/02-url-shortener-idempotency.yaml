slug: url-shortener-idempotency
section: system-design
title: "URL shortener и идемпотентность API"
difficulty: senior
tags: [idempotency, api]
question_md: |
  Спроектируйте сервис коротких ссылок вида `short.ly/abc123`. Как генерировать короткие ключи, чтобы не было коллизий и предсказуемости? Как выбрать между 301 и 302 редиректом? Отдельно: как сделать POST-эндпоинт создания ссылки идемпотентным, чтобы повторный запрос (например, из-за ретрая на клиенте) не создавал дубликат?
answer_levels:
  - level: middle
    text_md: |
      Для генерации короткого ключа есть три подхода. Base62-кодирование автоинкрементного ID или Snowflake ID — берём числовой id и переводим в алфавит [0-9a-zA-Z], получая компактную строку без коллизий по построению, потому что id уникален. Хэширование длинного URL (например, MD5/SHA) с обрезкой до 6-8 символов — короче, но требует проверки и разрешения коллизий (взять другую часть хэша или добавить соль при совпадении). Key Generation Service (KGS) — заранее генерирует и складывает в БД пул уникальных случайных ключей, а на запись просто берёт свободный ключ из пула — избавляет от коллизий и от вычислений в момент запроса.

      Хранить соответствие короткий_ключ → длинный_URL нужно в структуре с быстрым точечным чтением: Redis или KV-хранилище как кэш перед основной БД (Postgres/MySQL), которая остаётся источником истины. При редиректе: 301 (Moved Permanently) кэшируется браузером и CDN навсегда, что снижает нагрузку на сервис, но делает невозможным сбор аналитики по кликам после первого раза и усложняет смену целевого URL. 302 (Found) не кэшируется агрессивно, каждый клик идёт через сервис — это позволяет считать клики, менять target URL и делать A/B, но нагружает инфраструктуру сильнее.
  - level: senior
    text_md: |
      Snowflake ID (64 бита: timestamp + machine_id + sequence) предпочтительнее простого автоинкремента в распределённой системе, потому что не требует единого источника последовательности — каждый инстанс генерирует ID независимо и без блокировок, а base62 от него всё равно даёт короткую строку (Snowflake ID помещается в 11 символов base62). Для хэш-подхода коллизии разрешают через probing: если укороченный хэш уже занят другим URL, берут следующие N бит хэша или добавляют счётчик попытки в исходную строку перед повторным хэшированием.

      Ключевая часть вопроса — идемпотентность POST /shorten. Клиент может ретраить запрос из-за таймаута, разрыва соединения или ошибки 5xx, не зная, применилась ли первая попытка. Без защиты повторный POST создаст вторую короткую ссылку на тот же длинный URL — не критично для шортенера, но именно эта проблема на других эндпоинтах (создание платежа, списание средств) приводит к двойному списанию. Стандартный паттерн — заголовок `Idempotency-Key`, который клиент генерирует один раз на логическую операцию (обычно UUID) и передаёт во всех ретраях этого же запроса. Сервер при первом запросе с этим ключом выполняет операцию и сохраняет результат (response body + status code) в таблицу/Redis с TTL (например, 24 часа); при повторном запросе с тем же ключом — не выполняет операцию повторно, а отдаёт сохранённый ответ.

      ```go
      func IdempotencyMiddleware(store IdempotencyStore) func(http.Handler) http.Handler {
          return func(next http.Handler) http.Handler {
              return http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {
                  key := r.Header.Get("Idempotency-Key")
                  if key == "" {
                      next.ServeHTTP(w, r)
                      return
                  }
                  if cached, ok := store.Get(r.Context(), key); ok {
                      w.WriteHeader(cached.StatusCode)
                      w.Write(cached.Body)
                      return
                  }
                  // lock по ключу, чтобы параллельные ретраи не выполнили операцию дважды
                  if !store.Lock(r.Context(), key, 30*time.Second) {
                      w.WriteHeader(http.StatusConflict) // операция уже выполняется
                      return
                  }
                  defer store.Unlock(r.Context(), key)

                  rec := httptest.NewRecorder()
                  next.ServeHTTP(rec, r)

                  store.Save(r.Context(), key, rec.Code, rec.Body.Bytes(), 24*time.Hour)
                  w.WriteHeader(rec.Code)
                  w.Write(rec.Body.Bytes())
              })
          }
      }
      ```

      Отдельный уровень защиты — unique constraint в БД на бизнес-уровне (например, `UNIQUE(idempotency_key)` или `UNIQUE(long_url, owner_id)` если бизнес-логика этого требует): даже если middleware пропустит гонку из двух параллельных запросов с одним ключом, вставка второй строки упадёт по constraint, и это ловится в коде как штатный кейс — вернуть первую созданную запись вместо ошибки 500.
  - level: deep
    text_md: |
      На масштабе идемпотентность превращается в отдельную инфраструктурную задачу, а не просто в middleware. Основная тонкость — гонка между «сохранить результат в idempotency store» и «закоммитить бизнес-транзакцию»: если это две разных операции без атомарности, возможен промежуток, где бизнес-эффект применился, а idempotency-запись ещё не сохранена (или наоборот, при откате бизнес-транзакции). Решение — писать idempotency-ключ и результат операции в одной SQL-транзакции с созданием сущности (одна БД, одна commit-точка), либо, если бизнес-эффект идёт во внешнюю систему (например, вызов платёжного провайдера), сначала атомарно резервировать ключ со статусом `in_progress`, потом выполнять внешний вызов, и только затем фиксировать финальный статус — так параллельный ретрай видит `in_progress` и либо ждёт (poll/backoff), либо получает 409, но никогда не выполняет операцию второй раз.

      Второй нюанс — что считать «тем же запросом». Идемпотентность по ключу защищает от повтора именно этого запроса, но не от логического дублирования при разных ключах (пользователь два раза руками нажал «создать ссылку» на разных вкладках) — для этого нужна отдельная семантическая дедупликация (unique constraint на `(user_id, long_url)` с временным окном, или explicit «похоже, вы уже сокращали этот URL» на уровне UX). Важно не путать эти два механизма: технический idempotency key решает проблему at-least-once delivery на транспортном уровне, а бизнес-дедупликация — проблему дублирующего намерения пользователя.

      Третье — TTL и память idempotency store. Если ключи не протухают, таблица/Redis-namespace растёт бесконечно; если TTL слишком короткий, ретрай, пришедший позже TTL (например, клиент ушёл в оффлайн на сутки и потом ретраит), выполнит операцию заново и создаст дубликат — TTL нужно выбирать исходя из максимально разумного окна ретраев клиента (обычно от нескольких часов до суток), а не произвольно.

      Четвёртое — при высокой конкурентности лок на ключ (как в примере выше) должен быть с TTL и желательно с fencing token, иначе зависший обработчик (упал после Lock, до Unlock) навечно блокирует повторные попытки клиента — это классический прод-баг: клиент ретраит, получает 409 из-за чужого мёртвого лока, и без ручного вмешательства или auto-expiry лока операция никогда не пройдёт. Поэтому TTL лока должен быть заведомо больше p99.9 длительности операции, но не бесконечным.

      При росте системы эволюция обычно такая: сначала unique constraint в БД как единственная защита (дешево, покрывает наивные дубликаты) → добавление Idempotency-Key middleware с хранением в той же БД, когда появляются внешние side-effects (платежи, письма, вызовы третьих сторон) → на высоком масштабе — выделение idempotency store в Redis с записью полного HTTP-ответа и явным API-контрактом (`Idempotency-Key` обязателен для мутирующих эндпоинтов), плюс мониторинг доли 409-ответов как сигнала о проблемах с ретраями на клиенте (агрессивные ретраи с новым ключом на каждый раз — признак того, что клиент вообще не реализовал идемпотентность правильно).
