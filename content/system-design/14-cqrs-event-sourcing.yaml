slug: cqrs-event-sourcing
section: system-design
title: "CQRS и Event Sourcing: суть, когда оправданы, snapshots и эволюция событий"
difficulty: staff
tags: [cqrs, event-sourcing]
question_md: |
  Что такое CQRS и Event Sourcing, чем они отличаются друг от друга (это не одно и то же)? Когда они оправданы, а когда — оверинжиниринг? Как это связано с transactional outbox и Kafka? Зачем нужны snapshots и как эволюционировать схему событий со временем?
answer_levels:
  - level: middle
    text_md: |
      Это **два разных** паттерна, которые часто путают и объединяют, но использовать можно и по отдельности.

      **CQRS (Command Query Responsibility Segregation)** — разделение модели на **команды** (изменяют состояние: `CreateOrder`, `CancelOrder`) и **запросы** (только читают, ничего не меняют). В сильной форме это две отдельные модели данных: нормализованная write-модель для консистентных изменений и денормализованные read-модели (проекции), оптимизированные под конкретные экраны. Их можно даже держать в разных хранилищах (write — Postgres, read — Elasticsearch/Redis), связывая через события.

      **Event Sourcing (ES)** — способ хранения состояния: вместо того чтобы держать текущее состояние сущности (одну строку, которую перезаписываем), мы храним **неизменяемую последовательность событий** — фактов о том, что произошло (`OrderCreated`, `ItemAdded`, `OrderPaid`). Текущее состояние получается **проигрыванием (replay)** событий с начала:

      ```
      OrderCreated{id, user}      -> состояние: {status: new}
      ItemAdded{sku, qty}         -> {status: new, items: [...]}
      OrderPaid{amount}           -> {status: paid, items: [...]}
      ```

      Event store — источник истины (append-only), а текущее состояние — производное. Плюсы ES: полный аудит «из коробки», возможность восстановить состояние на любой момент прошлого, время как первоклассная сущность.

      Связка: ES естественно сочетается с CQRS — события из event store раскладываются в read-проекции. Но CQRS работает и без ES (обычная БД + отдельные read-таблицы), а ES без CQRS редок, но возможен.
  - level: senior
    text_md: |
      **Когда оправданы — и когда оверинжиниринг.** Оба паттерна — дорогие: вводят eventual consistency между write и read, усложняют отладку, требуют инфраструктуры (event store, проекции, версионирование). Оправданы, когда:

      - Нужен **полный аудит и история** по требованиям домена (финансы, бухгалтерия, медицина, комплаенс) — «кто, что, когда изменил» бесплатно из событий.
      - **Сложный домен с богатой бизнес-логикой** (DDD, много инвариантов), где события — естественный язык предметной области.
      - **Асимметрия нагрузки/формы чтения**: пишут в одну модель, а читают десятком разных представлений (CQRS с проекциями снимает конфликт).
      - Нужны **временные запросы** («каким был баланс на дату», replay для аналитики, отладка «как мы пришли в это состояние»).

      Оверинжиниринг, когда: простой CRUD, стабильная схема, команда без опыта ES, нет требований к аудиту. Тогда event sourcing добавляет eventual consistency и сложность миграций событий, ничего не давая взамен. Правило: **начинать с обычного CRUD**, вводить CQRS точечно там, где read/write-модели реально разошлись, а полный ES — только под доменные требования аудита/истории. Частая ошибка — тащить ES «для масштабируемости», хотя масштабирование чтения решается репликами и кэшем куда дешевле.

      **Связь с outbox и Kafka.** После применения команды нужно надёжно опубликовать событие (обновить проекции, уведомить downstream). Прямая двойная запись «БД + Kafka» небезопасна (dual write). Решение — **transactional outbox**: событие пишется в ту же локальную транзакцию, что и изменение состояния, а relay/CDC (Debezium) асинхронно доставляет его в Kafka. В ES это ложится органично: append события в event store и есть та самая атомарная запись, а CDC поверх event store'а стримит события в Kafka для проекций и других сервисов. Доставка остаётся at-least-once — потребители (проекции) обязаны быть идемпотентными (дедуп по event_id / позиции в стриме).
  - level: deep
    text_md: |
      **Snapshots — зачем и как.** Проигрывать всю историю с нуля при каждом чтении становится дорого, когда у агрегата тысячи событий (долгоживущий счёт, чат). **Snapshot** — сериализованное состояние агрегата на определённой версии/позиции; при загрузке берём последний snapshot и доигрываем только события *после* него:

      ```
      load(aggregate):
          snap = snapshotStore.latest(id)      // состояние на версии 1200
          events = eventStore.since(id, 1200)  // только события 1201..1250
          state = apply(snap.state, events)
      ```

      Snapshot — это оптимизация, а не источник истины: его всегда можно выкинуть и пересчитать из событий. Частота — по числу событий (каждые N) или по времени. Ловушка: при изменении логики применения событий старые snapshot'ы могут стать невалидными — их версионируют или инвалидируют.

      **Эволюция схемы событий (schema evolution) — главная боль ES.** События неизменяемы и хранятся *вечно*, а бизнес меняется — формат события v1, записанного 3 года назад, надо уметь читать сегодня. Стратегии:

      1. *Weak schema / толерантный ридер* — новые поля добавляются как опциональные с дефолтами; читатель игнорирует незнакомые поля (JSON, Protobuf с обратной совместимостью). Нельзя переиспользовать/переименовывать теги полей.
      2. *Upcasting* — при чтении старое событие пропускается через цепочку функций-апгрейдеров `v1 -> v2 -> v3`, приводящих к текущей форме до применения. Логика чтения знает про все версии.
      3. *Versioned event types* — `OrderPaidV1`, `OrderPaidV2` как разные типы; апкастер маппит старый в новый.
      4. *Copy-and-transform / migration* — переписать стрим в новую форму (дорого, нарушает неизменность, применяют редко).

      Категорически нельзя: менять смысл существующего поля, удалять поля, от которых зависят старые проекции, «чинить» уже записанные события задним числом (это переписывание истории — ломает аудит и детерминизм replay).

      **Прочие staff-грабли.** (1) *Идемпотентность проекций* — доставка событий at-least-once, поэтому проекция обязана уметь применить одно событие дважды без эффекта (хранить last-processed position / dedup по event_id). (2) *Ordering* — проекции чувствительны к порядку; в Kafka порядок гарантирован только внутри партиции, поэтому события одного агрегата шлют в одну партицию (ключ = aggregate_id). (3) *Eventual consistency UX* — после команды read-модель отстаёт; UI должен это учитывать (оптимистичный апдейт, read-your-writes через чтение из write-модели для только что изменившего пользователя). (4) *Удаление данных / GDPR* — «право на забвение» конфликтует с неизменяемым логом; решают шифрованием per-subject с удалением ключа (crypto-shredding). (5) *Конкурентная запись в агрегат* — оптимистичная блокировка по expected version при append (event store отвергает запись, если версия агрегата изменилась). Итоговая мысль: ES/CQRS — мощный, но дорогой инструмент под конкретные домены; дефолт — не применять, пока аудит/история/расхождение read-write моделей не станут явной болью.
