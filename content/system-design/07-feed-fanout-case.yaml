slug: social-feed-fanout-celebrity
section: system-design
title: "Кейс: лента соцсети на десятки миллионов пользователей"
difficulty: staff
tags: [feed, fanout, redis]
question_md: |
  Классический кейс уровня крупной соцсети. Спроектируйте домашнюю ленту: пользователь публикует пост, а его друзья/подписчики видят агрегированную ленту постов, отсортированную по времени или релевантности.

  Масштаб и требования, которые стоит зафиксировать с интервьюером:

  - 50M DAU, в среднем ~300 друзей на пользователя, но есть «звёзды» с десятками миллионов подписчиков.
  - Активные пользователи публикуют ~5M постов в день, открывают ленту 5-10 раз в день (сотни миллионов чтений ленты в день).
  - Первый экран ленты грузится < 200 мс (p99).
  - Пост может появиться у подписчиков с небольшой задержкой (eventual consistency допустима), терять посты нельзя.
  - Лайки/комментарии и их счётчики.

  Спроектируйте: путь публикации, стратегию fan-out (on write vs on read), схему хранения ленты и постов, обработку «звёзд» (celebrity problem), ранжирование. Отдельно проговорите узкие места и что писали бы на Go.
answer_levels:
  - level: middle
    text_md: |
      Главная проблема ленты — fan-out: при публикации пост нужно «доставить» в ленты всех подписчиков автора. Есть два базовых подхода.

      Fan-out on write (push): в момент публикации сервис сразу дописывает post_id в предвычисленную ленту каждого подписчика. Чтение потом дешёвое — берём готовый список. Плата — дорогая запись: у автора с 300 друзьями один пост это 300 операций записи, а у звезды — миллионы.

      Fan-out on read (pull): при публикации просто сохраняем пост у автора. Лента собирается в момент чтения: смотрим, на кого подписан пользователь, и достаём последние посты каждого, потом мержим и сортируем. Запись дешёвая, но чтение дорогое — при сотнях подписок это сотни запросов на каждое открытие ленты.

      Компоненты для MVP: Post Service (принимает публикацию, пишет пост в БД), Feed Service (отдаёт ленту), очередь (Kafka) между ними, пул fan-out воркеров (разносят посты по лентам), Redis для хранения горячих лент, реляционная БД для постов, объектное хранилище + CDN для медиа. Базовый вариант — чистый push для всех, а дальше выясняется, что он не масштабируется на звёзд.
  - level: senior
    text_md: |
      На масштабе почти все крупные соцсети используют гибрид push/pull, потому что чистые варианты ломаются на краях. Прикинем цифры: 5M постов в день × 300 подписчиков ≈ 1.5B записей в ленты в день, это ~17K записей/сек в среднем и ~60-85K/сек в пике при push. Redis такой поток тянет. Но один пост звезды с 10M подписчиков в push-модели это 10M синхронных записей — не укладывается в SLA публикации и создаёт всплеск записи (thundering herd на fan-out воркеры).

      Решение: порог по числу подписчиков (например, 50K-100K). Обычные авторы работают через push — при публикации событие уходит в Kafka, воркеры дописывают post_id в ленту каждого подписчика. Звёзды работают через pull — их посты не разносятся, а подмешиваются в момент чтения. Путь чтения ленты пользователя: (1) взять push-часть из Redis, (2) отдельным запросом подтянуть свежие посты звёзд, на которых он подписан, (3) смержить и отсортировать, (4) вернуть первые 20-30.

      Схема хранения:

      - Лента — Redis sorted set `feed:{user_id}`, score = timestamp (или ранг), member = post_id. Ограничиваем размер через `ZREMRANGEBYRANK` (храним последние ~1000 постов, глубже — дочитываем из БД).
      - Посты и метаданные — PostgreSQL, партиционирование по дате (или Cassandra при очень большой записи).
      - Медиа — S3 + CDN.
      - Счётчики лайков/комментов — отдельно (Redis-счётчик с асинхронной персистенцией), а не пересчёт по строкам при каждом чтении.

      Ранжирование в простом случае — чистая хронология (score = timestamp). В продуктовой ленте поверх сырого fan-out строят пайплайн ML-скоринга (вовлечённость, близость к автору, свежесть), который пересчитывает score асинхронно, и в ленту попадает top-K.

      На Go тут естественно ложится fan-out воркер: consumer group Kafka, пул горутин с ограниченным параллелизмом (errgroup + семафор или worker pool), батчевая запись в Redis через pipelining. `ZADD` идемпотентен по member (post_id), поэтому повторная обработка события при ретрае не дублирует запись — это важно для at-least-once очереди. Узкие места: амплификация записи на fan-out, горячие Redis-ключи (лента активно читаемого пользователя), консистентность счётчиков.
  - level: deep
    text_md: |
      Консистентность fan-out on write неатомарна: разнос по миллионам лент идёт партиями, поэтому подписчики видят пост с разным лагом — это допустимый eventual consistency, но требует идемпотентности воркеров (спасает `ZADD` по post_id). Список подписчиков звезды настолько велик, что его прочитать и обработать могут занять минуты, и это нормально, если UX не обещает мгновенную доставку всем.

      Динамическая граница push/pull. Порог по числу подписчиков — не единственный триггер. Обычный автор может внезапно набрать вирусный пост и создать celebrity-нагрузку на fan-out. Поэтому граница должна быть динамической: система отслеживает эффективное число подписчиков и скорость роста реакций и на лету переключает автора в pull-режим (или гибридный — push только «горячим» подписчикам, кто онлайн сейчас, pull остальным), чтобы не поймать latency-спайк на публикации.

      Backfill при новой подписке. Если пользователь только что подписался, его push-лента не содержит исторических постов нового автора (fan-out происходил только для тех, кто уже был подписан). Решения: при подписке асинхронно подмешать последние N постов автора в ленту подписчика (мини fan-out «в одну сторону»), либо в момент чтения объединять push-часть с pull-запросом по недавно добавленным подпискам до следующего цикла.

      Deep scroll и cold cache. Redis хранит только первые ~1000 постов; при глубоком скролле или после вытеснения ключа лента дочитывается из БД по (author_ids, created_at). Это медленнее, но происходит редко и только для «хвоста» ленты. Шардирование Redis по user_id (consistent hashing) — иначе один инстанс не вместит все ленты.

      Отказоустойчивость. Лаг fan-out воркеров (Kafka consumer lag) = устаревшие ленты; это первое, что надо мониторить и по чему автоскейлить пул воркеров. Падение воркера безопасно — сообщение переобработается (идемпотентность спасает от дублей). Падение ранжирующего пайплайна деградирует ленту до хронологии, но не роняет её.

      Эволюция системы: чистый pull на старте (мало подписок на человека, читать быстро) → добавление push fan-out, когда pull на чтении стал бутылочным горлышком → гибрид по порогу, когда появились первые звёзды → динамическое переключение режима по реальному трафику плюс отдельный ML-пайплайн ранжирования поверх сырого fan-out.
