slug: chat-message-delivery-ordering
section: system-design
title: "Кейс: доставка сообщений в мессенджере"
difficulty: staff
tags: [chat, websocket, ordering]
question_md: |
  Классический кейс уровня крупного мессенджера. Спроектируйте доставку сообщений: 1-на-1 и групповые чаты, статусы доставки/прочтения, онлайн/офлайн, гарантированный порядок в рамках чата.

  Масштаб и требования, которые стоит зафиксировать:

  - ~100M DAU, десятки миллиардов сообщений в день, пик ~1M сообщений/сек.
  - Доставка онлайн-получателю < 500 мс (p99).
  - Сообщения не теряются (at-least-once), дубли на клиенте недопустимы.
  - Порядок сообщений в рамках одного чата строго сохраняется.
  - Статусы: отправлено, доставлено, прочитано. Онлайн/last seen.
  - Офлайн-получатель получает push-уведомление.

  Спроектируйте: путь доставки сообщения, хранение, маршрутизацию между stateful-серверами соединений, гарантии порядка и at-least-once, presence. Отдельно — что писали бы на Go и почему.
answer_levels:
  - level: middle
    text_md: |
      Базовая модель: клиент держит постоянное соединение (WebSocket) с чат-сервером. При отправке сообщения сервер (1) сохраняет его в хранилище, (2) если получатель онлайн — доставляет ему по его соединению, (3) если офлайн — шлёт push-уведомление через APNs/FCM.

      Ключевое решение по хранению — сообщения удобно хранить/читать по чату: партиция = chat_id, сортировка по времени. Тогда чтение истории чата это последовательное чтение одной партиции без JOIN-ов. Под такой паттерн (write-heavy, чтение по ключу + сортировка) хорошо подходит Cassandra: ключ партиции chat_id, кластеризация по времени, LSM-дерево оптимизировано под запись.

      Статусы: один тик — сервер принял, два тика — доставлено на устройство получателя, «прочитано» — получатель открыл чат. At-least-once обеспечивается тем, что сообщение живёт в хранилище со статусом «не подтверждено», пока клиент явно не подтвердит получение (ACK); при переподключении клиент дозапрашивает неполученное.

      Компоненты: Chat Gateway (stateful, держит WebSocket-соединения), хранилище сообщений (Cassandra), шина между серверами (Kafka/Redis Pub/Sub), presence-хранилище (Redis), Push Service (APNs/FCM).
  - level: senior
    text_md: |
      Полное решение крутится вокруг трёх вещей: маршрутизация между stateful-серверами, порядок и at-least-once.

      Маршрутизация. WebSocket — соединение к конкретному инстансу. Если отправитель A на Gateway-1, а получатель B на Gateway-2, нужно доставить с одного на другой. Держим presence-реестр `user_id → gateway_id` в Redis (кто где онлайн). При отправке сообщения для B находим его gateway и роутим туда через межсерверную шину (Redis Pub/Sub по каналу gateway, или Kafka-топик на инстанс), gateway пушит в WebSocket. Балансировщик для WebSocket должен уметь sticky sessions.

      Порядок. Нельзя полагаться на wall-clock: часы серверов расходятся, и сортировка по timestamp даёт неверный порядок. Правильно — присваивать в рамках чата монотонный sequence number (счётчик на chat_id, например через атомарный инкремент в Redis/БД, либо Snowflake-подобный ID с временной компонентой). Клиент упорядочивает по seq, а не по времени. Это же даёт клиенту способ обнаружить «дырку» (пропущенный seq) и дозапросить пропущенное.

      At-least-once и дедуп. Сообщение персистится до ACK от клиента. Клиент при переподключении присылает last_seen_seq по чатам, сервер отдаёт всё, что новее. Так как канал at-least-once, клиент дедуплицирует по message_id (клиент генерирует его сам — client-side message id — что заодно даёт идемпотентность отправки при ретрае).

      Presence. Heartbeat каждые несколько секунд обновляет ключ `online:{user_id}` в Redis с TTL (пропал heartbeat → ключ истёк → офлайн). Показывать статус всем слишком дорого при 100M — показываем только релевантным контактам и только когда открыт чат.

      Группы. Малые группы (< ~500) — fan-out на сервере: сообщение копируется каждому участнику (как в модели ленты push). Большие группы/каналы — pull: участники сами тянут сообщения.

      Почему Go. Chat Gateway — идеальная задача для Go: держим десятки-сотни тысяч соединений на инстанс, на каждое соединение — пара горутин (read pump и write pump) с каналом отправки. Легковесные горутины дешевле пула потоков. Обязателен backpressure: у каждого соединения ограниченный буфер отправки, медленного клиента (не успевает читать) отключаем или дропаем, иначе он раздувает память. Библиотеки: gorilla/websocket или nhooyr/websocket; при экстремальном числе соединений — epoll-based (gnet).
  - level: deep
    text_md: |
      Порядок глубже. Монотонный seq на chat_id решает порядок внутри чата, но требует источника счётчика без гонок; при высокой записи в один чат счётчик становится горячим ключом — либо централизуем на партиции хранилища (Cassandra clustering key + условная запись), либо используем гибридные логические часы (HLC) / Lamport timestamps, чтобы не ходить за глобальным счётчиком на каждое сообщение. Head-of-line blocking: медленная обработка одного сообщения не должна блокировать чат — но и переупорядочивать нельзя, поэтому в рамках чата обработка последовательна, а параллелизм — между разными чатами (шардирование по chat_id).

      Reconnect storms. После сетевого сбоя миллионы клиентов переподключаются одновременно — thundering herd на Gateway и presence-реестр. Лечится джиттером на реконнекте (случайная задержка), connection draining при деплое (плавно переводим соединения, а не рвём разом), и тем, что дозапрос пропущенного (gap fill) идёт по seq и дешёв.

      Presence на масштабе. Наивный broadcast «X онлайн» всем контактам — квадратичный трафик. Presence вычисляют лениво (по запросу при открытии чата) и агрегируют; last_seen обновляют не на каждый heartbeat, а с загрублением.

      Multi-device. Один пользователь на нескольких устройствах — сообщение фанится на все его устройства, у каждого свой курсор доставки/прочтения. «Прочитано» на одном устройстве синхронизируется на другие.

      Отказоустойчивость. Падение Gateway рвёт соединения, но сообщения не теряются: они персистятся до ACK, клиент переподключается (к другому инстансу) и досинхронизируется по last_seen_seq. Падение между «сохранили» и «доставили онлайн» безопасно — при реконнекте клиент заберёт сообщение сам. Push как fallback, если получатель не онлайн ни на одном gateway.

      Go-специфика на пределе. C10M-соединения: пара горутин на соединение это ~несколько КБ стека × миллионы — считаем память заранее; при упоре в это переходят на event-loop модель (одна горутина на epoll вместо двух на соединение). Тюним GOMAXPROCS под контейнер (automaxprocs), следим за GC-паузами при большом числе живых объектов (буферы соединений), переиспользуем буферы через sync.Pool.

      Эволюция: один stateful-сервер с картой соединений в памяти → несколько серверов + presence-реестр и межсерверная шина, когда перестали влезать в один инстанс → шардирование по chat_id/user_id и вынос порядка на HLC, когда горячие чаты и глобальный счётчик стали узким местом.
