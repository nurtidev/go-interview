slug: sharding-consistent-hashing
section: system-design
title: "Шардирование и консистентное хеширование"
difficulty: staff
tags: [sharding, hashing]
question_md: |
  Как горизонтально шардировать данные между узлами хранения? Почему наивная схема `hash(key) % N` плоха при изменении числа узлов? Как работает consistent hashing и зачем нужны виртуальные узлы? Как справляться с горячими шардами и ребалансировкой при росте кластера?
answer_levels:
  - level: middle
    text_md: |
      Горизонтальное шардирование — это разбиение данных на непересекающиеся части (шарды), каждая из которых хранится на своём узле, чтобы масштабировать хранилище и нагрузку горизонтально, а не вертикально. Ключ шардирования выбирают так, чтобы запросы чаще всего били в один шард (например, `user_id` для сервиса с данными по пользователю) и чтобы данные распределялись равномерно, без явного перекоса в сторону одного значения ключа.

      Наивный способ распределить ключи по N узлам — `hash(key) % N`. Проблема проявляется при изменении N (добавили или убрали узел): результат `% N` меняется почти для всех ключей, потому что модуль операции зависит от N целиком, а не локально — это означает, что почти все данные нужно перераспределить (переехать на другой узел) при любом изменении размера кластера, что на живой системе означает массовую миграцию и просадку по нагрузке в момент ребалансировки.
  - level: senior
    text_md: |
      Consistent hashing решает эту проблему, размещая и узлы, и ключи на одном хэш-кольце (обычно диапазон 0..2^32-1 или 0..2^64-1). Каждый узел хэшируется в одну или несколько точек на кольце; ключ хэшируется туда же и относится к первому узлу по часовой стрелке от своей позиции. При добавлении нового узла он забирает часть диапазона только у своего соседа по кольцу — переезжает примерно 1/N ключей вместо почти всех, и только те ключи, что раньше принадлежали затронутому участку кольца.

      Проблема неравномерности при малом числе узлов (случайные точки на кольце могут кластеризоваться, оставляя одному узлу непропорционально большой диапазон) решается виртуальными узлами (vnodes) — каждый физический узел размещается на кольце не один раз, а через несколько (обычно 100-200) хэш-точек с разными именами (`node-A#0`, `node-A#1`, ...). Это усредняет диапазон, закреплённый за каждым физическим узлом, приближая распределение нагрузки к равномерному, и одновременно упрощает добро- и недобавление узла: при выходе узла его vnodes распределены по всему кольцу, поэтому нагрузка от выпавшего узла размазывается по многим соседям, а не падает целиком на одного.

      Альтернатива — rendezvous hashing (он же Highest Random Weight, HRW): для ключа считаем `hash(key, node)` для каждого узла и выбираем узел с максимальным значением. Не требует явного кольца и структуры данных для его поддержки, при добавлении/удалении узла также переезжает только доля ключей ~1/N, но с ростом числа узлов операция назначения ключа становится O(N) (нужно посчитать хэш от каждого узла), в отличие от O(log N) поиска по кольцу с бинарным поиском по отсортированным точкам. HRW проще реализовать и не требует поддержания сложной структуры, поэтому его выбирают, когда число узлов не очень велико (десятки-сотни) и простота важнее асимптотики.

      Готовые системы решают это по-разному: Redis Cluster делит пространство ключей на 16384 фиксированных hash slots (`CRC16(key) % 16384`), а не на классическое хэш-кольцо — слоты явно переносятся между узлами администратором/контроллером кластера, что даёт предсказуемость и простоту миграции конкретных слотов. Vitess и Citus (шардирование поверх MySQL/PostgreSQL) чаще используют range-based или hash-based шардирование на уровне явно объявленной shard key с метаданными о том, какой диапазон/хэш на каком шарде — с централизованным роутером (vtgate у Vitess), который знает топологию и решардит по явной команде, а не автоматически через кольцо.
  - level: deep
    text_md: |
      Горячие шарды (hot shard) — практическая проблема даже при идеально равномерном хэшировании: равномерность по объёму данных не гарантирует равномерность по нагрузке, если один ключ получает несоразмерно много запросов (celebrity user, виральный контент, флеш-сейл конкретного товара). Consistent hashing размещает такой ключ на одном шарде целиком, и весь его трафик бьёт в один узел независимо от того, как равномерно распределены остальные ключи. Решение — разбиение горячего ключа на суб-ключи (salting/bucketing: `key#0..key#K` с последующим scatter-gather при чтении) для write-heavy горячих ключей, либо read replicas именно этого шарда для read-heavy случая, либо детекция hot key на роутере и кэширование его данных в памяти перед шардом.

      Ребалансировка (resharding) на выросшем кластере — это не только «добавить узел и подождать миграцию по кольцу». На практике важно: (1) миграция должна идти без даунтайма — как правило, через двойную запись (пишем в старый и новый шард одновременно) на время переноса исторических данных, либо через CDC-репликацию (тот же Debezium) старого шарда в новый с последующим атомарным переключением роутинга; (2) во время миграции читатели должны либо знать, что часть диапазона уже переехала (per-range routing table с версией), либо запрос должен уметь фолбэкнуться на старый узел при промахе на новом; (3) сам процесс переноса нагружает сеть и диск исходного и целевого узла, поэтому крупные ребалансировки делают дозированно (rate-limited migration) и в окна низкой нагрузки.

      Запросы, которым нужны данные из нескольких шардов (агрегации, JOIN между сущностями с разными shard key, полнотекстовый поиск по всей таблице) требуют scatter-gather: координатор рассылает запрос на все релевантные шарды параллельно и агрегирует результат на своей стороне (сортировка, top-K, пересчёт агрегатов). Это дороже одного точечного запроса и чувствительно к «хвостам» — если даже один из N шардов отвечает медленно (GC pause, hot shard под нагрузкой), вся scatter-gather операция ждёт самого медленного участника (tail latency amplification: p99 всей операции растёт с числом участников быстрее, чем p99 одного шарда). Смягчают это через hedged requests (дублирующий запрос к чуть более медленному шарду) и разумные таймауты с частичным результатом там, где бизнес это допускает.

      Пример кольца с виртуальными узлами на Go (упрощённо, без блокировок для наглядности):

      ```go
      type Ring struct {
          nodes    map[uint32]string // hash point -> node id
          sorted   []uint32
          replicas int
      }

      func NewRing(nodes []string, replicas int) *Ring {
          r := &Ring{nodes: make(map[uint32]string), replicas: replicas}
          for _, n := range nodes {
              r.AddNode(n)
          }
          return r
      }

      func (r *Ring) AddNode(node string) {
          for i := 0; i < r.replicas; i++ {
              h := hashKey(fmt.Sprintf("%s#%d", node, i))
              r.nodes[h] = node
              r.sorted = append(r.sorted, h)
          }
          sort.Slice(r.sorted, func(i, j int) bool { return r.sorted[i] < r.sorted[j] })
      }

      func (r *Ring) GetNode(key string) string {
          h := hashKey(key)
          idx := sort.Search(len(r.sorted), func(i int) bool { return r.sorted[i] >= h })
          if idx == len(r.sorted) {
              idx = 0 // wrap around кольца
          }
          return r.nodes[r.sorted[idx]]
      }

      func hashKey(s string) uint32 { return crc32.ChecksumIEEE([]byte(s)) }
      ```

      Эволюция при росте: старт с фиксированным `hash % N` на небольшом, редко меняющемся кластере (просадка на ребалансировке допустима, потому что кластер меняется раз в квартал) → переход на consistent hashing с vnodes, когда добавление узлов стало регулярной операцией и полная миграция данных на каждое изменение стала недопустимо дорогой → выделенный роутер/координатор с явной shard map (как vtgate/Citus coordinator) вместо чисто хэш-based решения, когда нужен контроль над тем, какие шарды horizontal-scale отдельно от других (например, шард одного крупного тенанта растёт быстрее остальных и его надо переносить на более мощный узел без переезда всех остальных ключей).
