slug: feed-notifications-fanout
section: system-design
title: "Дизайн ленты и нотификаций: push vs pull"
difficulty: staff
tags: [feed, fanout]
question_md: |
  Спроектируйте ленту новостей (news feed) социальной сети и систему нотификаций о новых постах подписок. Сравните fan-out on write и fan-out on read. Как справиться со «звёздами» — аккаунтами с миллионами подписчиков? Где и как хранить ленту, как ранжировать и как доставлять уведомления в реальном времени?
answer_levels:
  - level: middle
    text_md: |
      Fan-out on write (push-модель) — в момент публикации поста сервис сразу «разносит» его во предвычисленную ленту каждого подписчика (записывает post_id в структуру данных каждого фолловера). Чтение ленты после этого — просто выборка готового списка, очень быстрая. Плата — дорогая запись: у автора с миллионом подписчиков один пост превращается в миллион операций записи, и это происходит на каждый пост.

      Fan-out on read (pull-модель) — при публикации сервис просто сохраняет пост у автора, ничего никуда не разносит. Лента собирается в момент запроса: сервис смотрит, на кого подписан пользователь, и на лету достаёт и объединяет последние посты каждого из них. Запись здесь дешёвая (O(1) на пост), но чтение дорогое — особенно если пользователь подписан на сотни аккаунтов, потому что нужно опросить (fan-out) посты каждого из них при каждом открытии ленты.
  - level: senior
    text_md: |
      На практике почти все крупные системы (Twitter/X, Facebook) используют гибрид. Для обычных пользователей с разумным числом подписчиков — push: при публикации пост синхронно/асинхронно (через очередь) дописывается в предвычисленную ленту (обычно Redis sorted set с score = timestamp или ранг) каждого подписчика, чтение ленты — это `ZREVRANGE` по готовому списку, латентность в единицы миллисекунд. Для «звёзд» (celebrity problem: аккаунты с десятками миллионов подписчиков) push стал бы слишком дорогим и медленным — один твит должен бы синхронно долетать до десятков миллионов лент, что не укладывается в разумный SLA и создаёт огромный всплеск записи (thundering herd на fan-out воркеры). Для таких аккаунтов используют pull: их посты не разносятся заранее, а подтягиваются в момент чтения ленты и подмешиваются к push-части ленты остальных подписок пользователя.

      Хранение: лента конкретного пользователя как Redis sorted set (post_id → score по времени/релевантности), с ограничением размера (`ZREMRANGEBYRANK`, храним последние ~500-1000 постов на пользователя, остальное можно перечитать из БД при скролле глубже). Основные посты и метаданные лежат в отдельном хранилище (Cassandra/Postgres), а sorted set — это только индекс порядка для быстрого чтения первого экрана ленты. Ранжирование в простом случае — чистая хронология (score = timestamp); в продуктовой системе — ML-скор (вовлечённость, близость к автору, свежесть) пересчитываемый асинхронно, и в ленту попадает top-K по этому скору, а не просто последние N.

      Для нотификаций (не путать с самой лентой) добавляется дедупликация и агрегация: если пользователю ставят лайк 50 человек за минуту, нельзя отправить 50 push-уведомлений — система батчит события за окно (например, 1-5 минут) и агрегирует в одно («Вася и еще 49 человек оценили ваш пост»). Доставка в реальном времени — WebSocket/SSE для активных сессий в приложении/вебе (сервер держит соединение и пушит событие сразу), и APNs/FCM для мобильных при закрытом приложении (событие кладётся в очередь для push-провайдера, который доставляет через свою инфраструктуру на устройство).
  - level: deep
    text_md: |
      Консистентность fan-out on write имеет неочевидную грань: разнос поста по миллионам лент — не атомарная операция, поэтому в моменте разные подписчики видят пост с разным лагом (одни уже видят, другие ещё нет) — это допустимый eventual consistency для ленты, но требует, чтобы fan-out воркеры были идемпотентны (повторная обработка того же поста при ретрае после сбоя не должна задублировать запись в sorted set — `ZADD` идемпотентен по построению, если ключ поста используется как member, что удобно). Fan-out обычно делают асинхронно через очередь (Kafka/SQS): при публикации поста в очередь кладётся одно событие "PostCreated", а воркер-пул читает список подписчиков (потенциально миллионы) и партиями записывает в их ленты — сам список подписчиков для celebrity-аккаунта настолько велик, что его прочитать и обработать может занимать минуты, и это нормально, если UX не требует, чтобы все подписчики увидели пост мгновенно.

      Backfill при новой подписке — отдельная проблема: если пользователь только что подписался на кого-то, его push-лента ещё не содержит исторических постов этого автора (fan-out происходил только для тех, кто уже был подписан на момент публикации). Решение — при подписке синхронно или асинхронно подмешать последние N постов нового автора в ленту подписчика (мини fan-out «в одну сторону»), либо в момент чтения ленты объединять push-часть с pull-запросом по недавно добавленным подпискам, помечая их как «догоняющие» до следующего цикла fan-out.

      Проблема hot fan-out worker при вирусном контенте у не-celebrity (обычный пользователь внезапно набрал вирусный пост) — грань между push и pull не статична, а должна быть динамической: система отслеживает эффективное число подписчиков/скорость роста реакций и на лету переключает автора в pull-режим (или гибридный: push только для «горячих» подписчиков — активных сейчас, pull для остальных), чтобы не оказаться в ситуации, когда обычный аккаунт неожиданно создаёт celebrity-нагрузку на fan-out.

      Порядок и дедупликация нотификаций на масштабе тоже нетривиальны: агрегация «N человек лайкнули» требует stateful окна (посчитать все события за интервал перед отправкой), что обычно реализуется как write в Redis-структуру со счётчиком и TTL-триггером на flush (или через stream processing — Kafka Streams/Flink с tumbling window), а не наивным «подождать и посчитать в памяти одного процесса», потому что процесс может упасть и агрегация должна survive restart. Доставка через WebSocket требует знания, на каком именно инстансе приложения открыто соединение конкретного пользователя (connection routing) — обычно решается через presence-реестр (какой gateway-инстанс держит соединение с user_id) в Redis, и событие сначала роутится на нужный gateway, а если пользователь не онлайн ни на одном — уходит в APNs/FCM как fallback.

      Эволюция системы при росте: чистый pull на старте (просто, дешёвая запись, при малом числе подписчиков на человека читать быстро) → добавление push fan-out, когда число подписок у активных пользователей выросло и pull-агрегация на чтении стала бутылочным горлышком → гибрид push/pull по порогу числа подписчиков, когда появились первые celebrity-аккаунты и наивный push начал создавать latency-спайки на публикации → динамическое переключение режима на основе реального трафика/скорости роста подписчиков, плюс отдельный пайплайн ранжирования (ML-скоринг) поверх сырого fan-out, когда чистая хронология перестала давать нужный engagement.
