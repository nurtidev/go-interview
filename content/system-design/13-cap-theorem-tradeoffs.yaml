slug: cap-theorem-tradeoffs
section: system-design
title: "CAP-теорема: точные определения, почему «2 из 3» упрощение, PACELC"
difficulty: senior
tags: [distributed-systems, consistency]
question_md: |
  Дайте точные определения C, A и P в CAP-теореме. Почему формулировка «выбери 2 из 3» — упрощение и вводит в заблуждение? Как выглядит выбор CP vs AP на реальных системах (etcd vs Cassandra)? Что добавляет PACELC к картине?
answer_levels:
  - level: middle
    text_md: |
      CAP-теорема (Brewer, доказана Gilbert & Lynch) — про распределённые системы с репликацией данных. Три свойства:

      - **C (Consistency)** — здесь это **линеаризуемость**: любой чтение видит результат последней завершённой записи, как будто данные в одном экземпляре. Это НЕ «C» из ACID (там consistency — про инварианты схемы).
      - **A (Availability)** — каждый запрос к работающему узлу получает НЕ-ошибочный ответ (не таймаут, не отказ), пусть и не самый свежий.
      - **P (Partition tolerance)** — система продолжает работать, когда сеть между узлами разорвана (partition) и сообщения теряются.

      Теорема: при возникновении сетевого разделения (P) нельзя одновременно гарантировать и C, и A. Придётся выбрать: либо отвечать, рискуя отдать устаревшие данные (пожертвовать C ради A), либо отказывать/ждать ради консистентности (пожертвовать A ради C).

      Грубая классификация систем:
      - **CP** — при партиции выбирают консистентность, жертвуя доступностью (etcd, ZooKeeper, реляционные БД с синхронной репликацией).
      - **AP** — при партиции выбирают доступность, отдавая возможно устаревшие данные (Cassandra, DynamoDB в eventual-режиме, DNS).
  - level: senior
    text_md: |
      **Почему «2 из 3» — вредное упрощение.** P — это не то, что вы «выбираете»: в реальной распределённой системе сети рвутся, узлы падают, пакеты теряются — партиции случаются вне вашей воли. Значит P у вас *всегда есть по факту*, и настоящий выбор возникает **только во время партиции** — между C и A. В нормальном режиме (сеть цела) можно иметь и сильную консистентность, и высокую доступность одновременно — CAP тут ничего не запрещает. Поэтому корректная формулировка не «выбери 2 из 3», а «когда случилась партиция, выбирай между C и A; в остальное время это ложная дилемма».

      Второй нюанс: C и A — не бинарные, а **спектр**. Между линеаризуемостью и «полным AP» лежат промежуточные модели: causal consistency, read-your-writes, monotonic reads, bounded staleness. Многие БД настраиваемы per-запрос (tunable consistency).

      **CP на практике — etcd.** etcd (хранилище для Kubernetes) построен на консенсусе **Raft**: запись подтверждается, только когда её приняло большинство (кворум) узлов. При партиции узлы в меньшинстве **не могут** обслуживать записи и линеаризуемые чтения — они отвечают ошибкой (жертвуют A), чтобы никогда не разошлись в данных. Для конфигурации кластера, лидер-выборов, distributed locks это правильный выбор: лучше временно недоступно, чем two masters.

      **AP на практике — Cassandra.** Cassandra — leaderless, репликация с кворумами, настраиваемая под запрос (`ONE`/`QUORUM`/`ALL`). В AP-настройке при партиции узлы продолжают принимать чтения/записи из своей части кластера (жертвуют C — данные могут временно разойтись), а сходятся потом через hinted handoff, read repair, anti-entropy. Для ленты, метрик, каталога, где «увидеть данные с задержкой в секунды» приемлемо, а простой недопустим — это правильный выбор. Причём Cassandra *tunable*: `QUORUM` на чтении и записи (R+W > N) даёт строгую консистентность ценой доступности — то есть одна система может быть и ближе к CP, и ближе к AP по настройке.
  - level: deep
    text_md: |
      **PACELC — расширение, которое ближе к реальности** (Abadi). CAP описывает только случай партиции и молчит про нормальный режим. PACELC читается так: **if Partition — choose between A and C; Else — choose between L (latency) and C (consistency)**.

      Идея: даже когда сети всё хорошо, у вас остаётся trade-off между **latency и consistency**. Сильная консистентность требует координации (кворумы, синхронная репликация, консенсус) — а это дополнительные round-trip'ы и рост задержки. Хотите линеаризуемость — платите latency даже без всякой партиции; хотите минимальную задержку — ослабляете гарантии (читаете с ближней реплики, асинхронная репликация).

      Классификация PACELC:
      - **PC/EC** — жертвует доступностью при партиции И latency в норме ради консистентности: etcd/ZooKeeper, Google Spanner (синхронно реплицирует через Paxos + TrueTime, платит latency).
      - **PA/EL** — доступность при партиции И низкая latency в норме ценой консистентности: Cassandra, DynamoDB (в eventual-режиме), Riak.
      - **PA/EC**, **PC/EL** — смешанные (например MongoDB в разных настройках read/write concern).

      **Тонкости для staff-уровня.**

      1. *«Availability» в CAP ≠ «доступность» в SLA.* CAP-A — это математически строгое «каждый запрос к живому узлу получает ответ»; система, дающая 99.99% аптайма, может быть CP по CAP (она изредка отказывает при партиции). Не путать формальное определение с продуктовым SLA.

      2. *Линеаризуемость — сильнее, чем нужно большинству.* Полная линеаризуемость дорога; часто достаточно causal consistency или read-your-writes, которые совместимы с высокой доступностью (доказано: causal consistency — самая сильная модель, достижимая в always-available системе). Поэтому «CP vs AP» на практике — это не бинарный флажок системы, а выбор *модели консистентности на конкретную операцию*.

      3. *Микс в одном сервисе.* Реальная архитектура почти всегда гибрид: платёжный баланс и идемпотентность — через CP-хранилище (Postgres/etcd, линеаризуемость), а лента, счётчики лайков, сессии — через AP/eventual (Redis/Cassandra). Правильный ответ на собесе — не «наша система CP» или «AP», а «для этого класса данных нужна линеаризуемость (деньги, брони), для этого — eventual (лента, аналитика)», и обоснование через цену latency/availability каждого выбора.

      4. *Consensus как инструмент CP.* Raft/Paxos дают линеаризуемость через кворум большинства (N/2+1), поэтому кластеры делают нечётными (3, 5) — чтобы кворум существовал ровно в одной части при любой партиции, исключая split-brain. Это цена CP: при потере большинства система замирает.
