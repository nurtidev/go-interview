slug: caching-strategies-stampede
section: system-design
title: "Стратегии кэширования: cache-aside, инвалидация, stampede"
difficulty: senior
tags: [cache, redis]
question_md: |
  Какие есть паттерны работы с кэшем (cache-aside, read-through, write-through, write-behind) и в чём их отличия? Как правильно инвалидировать кэш при изменении данных? Что такое cache stampede (thundering herd) и как его предотвратить на практике?
answer_levels:
  - level: middle
    text_md: |
      Cache-aside (lazy loading) — самый распространённый паттерн: приложение сначала читает из кэша, при промахе (miss) идёт в БД, кладёт результат в кэш и возвращает его; при записи приложение пишет в БД и инвалидирует (или обновляет) соответствующий ключ в кэше. Read-through похож, но логику похода в БД при промахе прячут внутрь самого кэширующего слоя/библиотеки, а не в код приложения. Write-through пишет одновременно в кэш и в БД синхронно при каждой записи — данные в кэше всегда свежие, но запись становится медленнее (два похода вместо одного). Write-behind (write-back) пишет сразу в кэш и отдаёт ответ, а в БД сбрасывает асинхронно батчами — быстрая запись, но риск потери данных при падении кэша до сброса в БД.

      Инвалидация — самая сложная часть кэширования (не просто фраза: «две сложные вещи в CS — это naming things, cache invalidation и off-by-one errors»). Основные способы: TTL (данные сами протухают через время, простая, но допускает временную неактуальность), явная инвалидация (код при обновлении данных удаляет/обновляет ключ в кэше) и событийная (сервис публикует событие об изменении, и все, у кого закэшированы эти данные, инвалидируют ключ по подписке) — последняя нужна, когда кэш размазан по нескольким сервисам/инстансам.
  - level: senior
    text_md: |
      Cache stampede (thundering herd) возникает, когда популярный ключ протухает (TTL истёк) или кэш холодный после деплоя/рестарта, и в этот момент одновременно приходит множество запросов на один и тот же ключ — все они видят промах и параллельно идут в БД пересчитывать/перечитывать одно и то же значение, создавая резкий всплеск нагрузки на БД, который в худшем случае укладывает её. Проблема усиливается на популярных ключах (celebrity content, главная страница, топ-товары), где RPS на один ключ может быть очень высоким.

      Защита номер один — mutex/lock на пересборку: первый запрос, увидевший промах, берёт распределённый лок (например, `SETNX` в Redis с TTL) и идёт пересчитывать значение, остальные запросы либо ждут (retry с backoff) и читают уже готовый результат из кэша, либо отдают немного устаревшее значение (stale-while-revalidate), если оно доступно. В рамках одного процесса Go эта же идея реализуется через `golang.org/x/sync/singleflight` — он дедуплицирует параллельные вызовы с одинаковым ключом в рамках инстанса, гарантируя, что физический поход в БД произойдёт только один раз, а остальные goroutines получат тот же результат:

      ```go
      var g singleflight.Group

      func GetUser(ctx context.Context, id string) (*User, error) {
          v, err, _ := g.Do(id, func() (interface{}, error) {
              if u, ok := cache.Get(id); ok {
                  return u, nil
              }
              u, err := db.FetchUser(ctx, id)
              if err != nil {
                  return nil, err
              }
              cache.Set(id, u, ttl)
              return u, nil
          })
          if err != nil {
              return nil, err
          }
          return v.(*User), nil
      }
      ```

      Важно: singleflight дедуплицирует только внутри одного процесса — под нагрузкой из десятков инстансов нужен ещё и распределённый лок в Redis, иначе каждый инстанс всё равно один раз сходит в БД одновременно с остальными. Второй приём — вероятностное раннее обновление (XFetch/probabilistic early expiration): вместо жёсткого TTL кэш с некоторой вероятностью, растущей по мере приближения к истечению TTL, инициирует фоновое обновление значения заранее, до того как оно протухнет для всех остальных — размазывает пересчёт по времени и почти исключает синхронный всплеск. TTL нужно выбирать не только исходя из свежести данных, но и с учётом LRU eviction под память: если кэш упирается в memory limit, LRU может вытеснить горячий ключ раньше TTL, и тогда защита от stampede на TTL-логике не сработает — нужно мониторить eviction rate отдельно от TTL expiration.
  - level: deep
    text_md: |
      На масштабе консистентность кэша с БД — источник тонких багов. Классическая гонка при cache-aside: поток A читает из БД старое значение (до конкурентного обновления), поток B обновляет БД и удаляет/обновляет кэш, а затем поток A кладёт в кэш то самое старое значение, которое он прочитал раньше — в кэше остаётся stale-запись до следующего TTL. Частичное смягчение — паттерн «удалить кэш после записи, с небольшой задержкой повторно удалить» (delayed double delete), но полностью гонку это не убирает; строгую консистентность даёт только read-through с версионированием (write с CAS/optimistic lock, инвалидация по version number, а не просто delete) либо отказ от кэширования для путей, где критична линеаризуемость.

      Негативное кэширование (negative caching) — отдельная ловушка: если не кэшировать факт «такого ключа не существует», каждый запрос на несуществующий ресурс (в том числе намеренный — атака на перебор ID) идёт прямо в БД, создавая ту же проблему stampede, но для отсутствующих данных. Решение — кэшировать null-результат с более коротким TTL, чем позитивный кэш, обычно вместе с bloom filter перед БД, чтобы отсекать заведомо несуществующие ключи ещё до похода в кэш.

      Событийная инвалидация в мультисервисной архитектуре подвержена out-of-order delivery: если события об изменении публикуются в Kafka/шину без строгого порядка по ключу, консьюмер может применить инвалидацию по старому событию после того, как уже применил по новому, оставив кэш в неактуальном состоянии до следующего TTL — нужно либо гарантировать партиционирование по ключу сущности (Kafka сохраняет порядок внутри партиции), либо прикладывать version/timestamp к событию и игнорировать инвалидации со старой версией.

      Отдельная проблема масштаба — hot key: один ключ (виральный пост, флеш-сейл товар) получает нагрузку, которую не выдерживает даже одна Redis-нода, потому что весь трафик по этому ключу идёт на один шард по консистентному хэшу. Решение — client-side реплики горячего ключа (несколько копий с суффиксом, случайный выбор реплики при чтении, инвалидация всех копий при записи) либо L1-кэш в самом процессе приложения (in-memory LRU на пару секунд) перед L2 (Redis), чтобы не каждый запрос даже уходил по сети. Эволюция системы кэширования с ростом обычно такая: простой cache-aside с TTL на старте → добавление singleflight/mutex, когда замечен stampede при рестартах или на популярных ключах → событийная инвалидация, когда кэш расползается по нескольким сервисам и TTL-лага становится бизнес-проблемой → многоуровневый кэш (in-process L1 + Redis L2 + shard replication на hot keys), когда трафик на отдельные ключи превышает возможности одного узла.
