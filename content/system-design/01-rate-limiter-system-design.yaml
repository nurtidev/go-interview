slug: rate-limiter-system-design
section: system-design
title: "Дизайн rate limiter как системы"
difficulty: senior
tags: [rate-limit, distributed]
question_md: |
  Спроектируйте rate limiter для публичного API. Какие алгоритмы ограничения скорости вы знаете и в чём их trade-offs? Как хранить состояние счётчиков, если API работает на нескольких инстансах? Как обеспечить приемлемую точность и при этом не деградировать производительность под нагрузкой?
answer_levels:
  - level: middle
    text_md: |
      Есть четыре классических алгоритма. Fixed window counter — считаем запросы в интервале (например, минуте) и сбрасываем счётчик на границе окна; просто реализовать, но на границе окна возможен всплеск: клиент может сделать N запросов в конце одного окна и ещё N в начале следующего, получив 2N за короткий промежуток. Sliding window log хранит timestamp каждого запроса и считает, сколько их попало в последние N секунд — точно, но память растёт с числом запросов. Sliding window counter — компромисс: берём текущее окно и часть предыдущего с весом, пропорциональным перекрытию, получая точность близкую к log-варианту, но с O(1) памятью. Token bucket — бакет пополняется токенами с фиксированной скоростью до ёмкости, каждый запрос тратит токен; позволяет короткие всплески трафика в пределах ёмкости бакета, при этом держит средний rate. Leaky bucket обрабатывает запросы из очереди с постоянной скоростью, сглаживая всплески, но добавляя задержку.
      Хранить счётчики можно локально в памяти каждого инстанса — это быстро, но при N инстансах реальный лимит становится примерно в N раз мягче, потому что каждый инстанс считает независимо. Для корректного общего лимита на весь кластер нужно централизованное хранилище состояния, до которого все инстансы обращаются перед тем как пропустить запрос — обычно это Redis из-за низкой латентности и атомарных операций.
  - level: senior
    text_md: |
      На практике для распределённого лимитера чаще всего берут Redis как единый источник правды по счётчикам. Fixed window реализуется через `INCR key`, а TTL выставляется только при первом инкременте (`EXPIRE key ttl NX` в Redis 7+, либо через Lua в более старых версиях) — иначе TTL может «слететь» при повторном вызове EXPIRE и окно никогда не закроется. Sliding window log на Redis — это sorted set: `ZADD key timestamp member`, затем `ZREMRANGEBYSCORE key -inf now-window` для вычистки старых записей и `ZCARD key` для подсчёта; за точность платим O(log n) на операцию и постоянным ростом объёма данных под нагрузкой.

      Token bucket — самый частый выбор для API (так делают AWS, Stripe, GitHub), но его нельзя честно реализовать последовательностью отдельных Redis-команд: между GET текущего числа токенов и SET нового значения возможна гонка, если два запроса пришли одновременно на разные инстансы приложения. Решение — атомарный Lua-скрипт, который Redis выполняет как единую операцию:

      ```lua
      -- KEYS[1] = bucket key, ARGV = capacity, refill_rate, now, requested
      local capacity = tonumber(ARGV[1])
      local refill_rate = tonumber(ARGV[2])
      local now = tonumber(ARGV[3])
      local requested = tonumber(ARGV[4])

      local bucket = redis.call("HMGET", KEYS[1], "tokens", "ts")
      local tokens = tonumber(bucket[1]) or capacity
      local ts = tonumber(bucket[2]) or now

      local delta = math.max(0, now - ts)
      tokens = math.min(capacity, tokens + delta * refill_rate)

      if tokens >= requested then
        tokens = tokens - requested
        redis.call("HMSET", KEYS[1], "tokens", tokens, "ts", now)
        redis.call("EXPIRE", KEYS[1], 60)
        return 1
      else
        redis.call("HMSET", KEYS[1], "tokens", tokens, "ts", now)
        return 0
      end
      ```

      Ключи стоит проектировать составными: `ratelimit:{tier}:{user_id}:{endpoint}` — раздельные лимиты на пользователя, API-ключ и IP одновременно, потому что аутентифицированного пользователя видно по user_id, а неаутентифицированного — только по IP (с оговоркой, что за одним IP может сидеть целый офис или мобильный оператор через NAT). При превышении лимита отдаём `429 Too Many Requests` с заголовком `Retry-After` (в секундах до следующего окна) и опционально `X-RateLimit-Limit/Remaining/Reset` для клиентов, которые сами умеют адаптироваться.

      Под очень высокой нагрузкой поход в Redis на каждый запрос — это лишний network hop (обычно ~0.5-2ms), который заметен на p99 при сотнях тысяч rps. Гибридная схема: локальный кэш-лимитер на инстансе с частью общего лимита (например, global_limit / instance_count с запасом) плюс периодическая синхронизация с Redis — снижает число обращений к общему хранилищу, жертвуя строгой точностью в пользу latency и throughput. Для большинства продуктовых кейсов (защита от абуза, а не биллинг) такая eventual-точность приемлема.
  - level: deep
    text_md: |
      На уровне продакшн-эксплуатации всплывает несколько тонких проблем. Первая — рассинхронизация часов между инстансами приложения: если token bucket считает `now` локальным временем каждого сервера, а сервера расходятся на секунды (NTP drift, GC pause перед вызовом), возможны как ложные 429, так и пропуск лишних запросов. Правильнее брать время с самого Redis (команда `TIME` внутри Lua-скрипта), тогда все инстансы синхронизированы относительно одного источника истины.

      Вторая — поведение под Redis Cluster. Lua-скрипт атомарен только в рамках одного узла, и если ключи лимитера размазаны по разным шардам (что стандартно при хешировании по имени ключа), многокключевые операции в скрипте начнут падать с CROSSSLOT. Решение — hash tags: `ratelimit:{user_id}:endpoint`, где `{user_id}` заставляет Redis Cluster класть в один слот все ключи одного пользователя.

      Третья — что делать, если Redis недоступен. Fail-closed (блокировать всё) защищает от абуза, но кладёт легитимный трафик при любом сбое инфраструктуры — обычно неприемлемо. Fail-open (пропускать всё) сохраняет доступность, но открывает окно для DoS/abuse именно в момент инцидента. На практике делают gray zone: локальный fallback-лимитер (грубый, консервативный) на время недоступности Redis плюс алерт, чтобы инцидент не остался незамеченным, и метрика доли запросов, обслуженных в degraded-режиме.

      Четвёртая — точность token bucket и sliding window log страдает от «горячих» ключей: у крупного клиента (например, один тяжёлый B2B-аккаунt) все запросы летят в один Redis-ключ, который становится точкой контеншна на конкретном узле кластера. Для таких случаев шардируют счётчик на N суб-ключей с последующим суммированием (approximate counting), либо переходят на GCRA (Generic Cell Rate Algorithm) — алгоритм на основе virtual scheduling, который хранит в Redis один timestamp вместо набора счётчиков и математически эквивалентен token bucket, но с меньшим объёмом состояния и без плавающего накопления ошибки округления. Именно GCRA лежит в основе Doorman (Lyft) и rate-limiting библиотек Stripe.

      Пятая — мультирегиональность. Если сервис развёрнут в нескольких регионах с локальными Redis, синхронный глобальный лимит требует либо централизованного координатора в одном регионе (доп. латентность на межрегиональный roundtrip для каждого запроса — обычно неприемлемо), либо смягчения инварианта: каждый регион получает свою долю глобального лимита (soft-partitioning) с периодическим асинхронным ребалансом на основе фактического трафика. Это классический trade-off CAP — строгая консистентность лимита против латентности и доступности.

      Эволюция системы с ростом нагрузки обычно такая: in-memory per-instance лимитер на старте (дёшево, лимит мягче, но абуза пока нет) → общий Redis с Lua-скриптами, когда важна согласованность лимита между инстансами → на десятках-сотнях тысяч rps — вынесение логики в отдельный rate-limiting sidecar/сервис (паттерн Envoy Rate Limit Service) с локальным кэшированием решений и батчевой асинхронной синхронизацией счётчиков, чтобы каждый запрос не бил в Redis напрямую. Частая проблема в проде: инкремент без атомарного TTL превращает ключи в вечнорастущие счётчики после деплоя, который случайно убрал EXPIRE — стоит держать алерт на объём памяти Redis, выделенной под rate-limit namespace.
