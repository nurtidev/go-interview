slug: database-sql-pgx-pools
section: platform
title: "database/sql и pgx: пулы, prepared statements, ловушки"
difficulty: senior
tags: [postgres, pgx]
question_md: |
  Как настроить пул соединений в `database/sql`, какие ловушки подстерегают
  при работе с `rows`, NULL-значениями и prepared statements, и чем `pgx`
  принципиально отличается от `database/sql` в работе с PostgreSQL?
answer_levels:
  - level: middle
    text_md: |
      Пул `database/sql` настраивается четырьмя методами на `*sql.DB`:
      `SetMaxOpenConns` (верхний предел одновременных соединений, включая
      занятые и свободные), `SetMaxIdleConns` (сколько свободных держать в
      резерве, не закрывая), `SetConnMaxLifetime` (максимальный возраст
      соединения — полезно для ротации за прокси/балансировщиком и защиты
      от накопления состояния на стороне сервера) и `SetConnMaxIdleTime`
      (сколько соединение может простаивать перед закрытием). Классическая
      ловушка — забыть `rows.Close()` после `Query`: соединение не
      возвращается в пул, пока весь результат не прочитан или явно не
      закрыт, и при высокой нагрузке пул исчерпывается, новые запросы виsnout
      блокируются в ожидании свободного соединения. Всегда пишут
      `defer rows.Close()` сразу после проверки ошибки `Query`, и
      обязательно проверяют `rows.Err()` после цикла `for rows.Next()`,
      потому что `Next()` возвращает `false` и при обычном завершении
      выборки, и при ошибке сети/сервера — без `Err()` эта ошибка
      проглатывается молча. NULL-значения из БД не помещаются напрямую в
      `string`/`int` — нужны `sql.NullString`, `sql.NullInt64`,
      указатель (`*string`) или типы из `pgtype`.
  - level: senior
    text_md: |
      `QueryRow` — частый источник багов: если строка не найдена, `Scan`
      возвращает `sql.ErrNoRows`, и это нормальный, ожидаемый путь
      выполнения (не сетевая ошибка), который нужно явно отличать через
      `errors.Is(err, sql.ErrNoRows)`, а не логировать как критическую
      ошибку. Prepared statements в `database/sql` кэшируются на уровне
      конкретного физического соединения (`driver.Conn`), а не глобально на
      `*sql.DB` — поэтому при использовании `Stmt` пул может открыть
      подготовку заново на другом соединении, если старое занято, что
      увеличивает round-trip'ы; для PostgreSQL это дополнительно взаимодействует
      с pgbouncer в режиме `transaction pooling`, где prepared statements
      между разными клиентскими транзакциями на одном физическом соединении
      попросту небезопасны (сервер видит разные логические сессии как одно
      соединение) — это одна из причин, почему в проде с pgbouncer в
      transaction mode часто отключают server-side prepare.

      Ловушка `defer rows.Close()` внутри цикла — если вызывать вложенный
      `Query` внутри `for rows.Next()` того же соединения через один и тот
      же `*sql.DB` без выделенной транзакции, это может привести к
      деадлоку пула на `MaxOpenConns = 1` в тестах или просто к лишним
      соединениям в проде; правильный паттерн — прочитать все нужные данные
      из внешнего `rows` в слайс, закрыть его, и только потом делать
      вложенные запросы:

      ```go
      rows, err := db.QueryContext(ctx, "SELECT id, email FROM users WHERE active")
      if err != nil {
          return err
      }
      defer rows.Close()

      var users []User
      for rows.Next() {
          var u User
          var email sql.NullString
          if err := rows.Scan(&u.ID, &email); err != nil {
              return err
          }
          if email.Valid {
              u.Email = email.String
          }
          users = append(users, u)
      }
      if err := rows.Err(); err != nil {
          return err
      }
      ```

      `pgx` в отличие от `database/sql` — не абстракция под generic-драйвер,
      а нативная реализация протокола PostgreSQL: поддерживает `pgxpool`
      (собственный пул, обычно эффективнее общего `database/sql` для
      Postgres-специфичных сценариев), `Batch` (пакетная отправка
      нескольких запросов за один round-trip через extended protocol),
      `CopyFrom` (быстрая массовая загрузка через протокол `COPY`, на
      порядок быстрее пакета `INSERT`), и богатые типы (`pgtype.Numeric`,
      `pgtype.Timestamptz`, нативная поддержка массивов и `jsonb` без
      дополнительного маршалинга).
  - level: deep
    text_md: |
      `database/sql` — намеренно тонкий и универсальный слой над
      `driver.Conn`/`driver.Stmt`/`driver.Rows`: он не знает про специфику
      конкретной БД и требует от драйвера эмулировать общий контракт, из-за
      чего часть возможностей протокола PostgreSQL (типизированные
      массивы, `COPY`, LISTEN/NOTIFY, композитные типы) либо недоступна,
      либо доступна только через костыли поверх `driver.Valuer`/`sql.Scanner`.
      `pgx`, используемый как самостоятельный драйвер (не через
      `database/sql`-совместимый режим `stdlib`), общается по extended
      query protocol напрямую: `Parse` → `Bind` → `Execute` — что даёт
      честные server-side prepared statements с кэшированием плана на
      сервере, статическую типизацию параметров без строкового форматирования
      SQL, и защиту от SQL-инъекций на уровне протокола, а не текстовой
      подстановки.

      Тонкость с context: `QueryContext`/`ExecContext` в `database/sql`
      при отмене `ctx` не мгновенно освобождают соединение — драйвер
      обязан прервать выполнение на сервере (для pgx/lib/pq это через
      отдельное соединение с `CANCEL` запросом, аналог `pg_cancel_backend`)
      и только после подтверждения возвращает соединение в пул; до этого
      момента оно помечено как «busy», и агрессивные короткие таймауты
      с частыми отменами могут парадоксально снизить эффективную пропускную
      способность пула, потому что соединения дольше находятся в
      промежуточном состоянии отмены, чем если бы запрос просто доработал.

      Ещё один слой сложности — взаимодействие с внешним pooler'ом
      (pgbouncer/pgcat) в режиме transaction pooling: `SetMaxOpenConns` в
      `database/sql` регулирует соединения к pgbouncer, а не напрямую к
      Postgres, поэтому реальное число backend-процессов на сервере
      определяется настройками pgbouncer (`pool_size`), и если приложение
      само держит большой пул к pgbouncer, а pgbouncer — маленький пул к
      БД, узкое место просто переносится, а не устраняется; кроме того,
      `SET`-команды сессии (например, `search_path`, `statement_timeout`
      через `SET`) не переживают конец транзакции в transaction pooling,
      что требует либо задавать их через параметры соединения на старте,
      либо оборачивать каждый `SET` в ту же транзакцию, где он используется.
