slug: kafka-partitions-consumer-groups
section: platform
title: "Kafka для Go-разработчика: партиции, группы, offset"
difficulty: senior
tags: [kafka, consumer]
question_md: |
  Как связаны партиции топика, ключ сообщения и consumer group в Kafka,
  почему число «полезных» консьюмеров ограничено числом партиций, и как
  правильно коммитить offset в Go-приложении, чтобы не терять и не
  дублировать сообщения без необходимости?
answer_levels:
  - level: middle
    text_md: |
      Топик в Kafka физически разбит на партиции — это единица параллелизма
      и порядка: порядок сообщений гарантирован только внутри одной
      партиции, между партициями порядок не определён. Если у сообщения
      задан ключ, продюсер по умолчанию хэширует ключ и детерминированно
      направляет все сообщения с одним ключом в одну партицию — так
      достигается порядок «по ключу» (например, все события одного
      пользователя обрабатываются последовательно). Consumer group — это
      механизм, при котором несколько консьюмеров с одним `group.id` делят
      партиции топика между собой так, что каждая партиция назначена ровно
      одному консьюмеру группы в любой момент времени; отсюда следствие —
      если партиций 6, а консьюмеров 10, четыре останутся без работы,
      «полезных» консьюмеров не может быть больше, чем партиций. Offset —
      позиция последнего обработанного сообщения в партиции, которую группа
      коммитит в специальный внутренний топик `__consumer_offsets`, чтобы
      при перезапуске продолжить с нужного места, а не с начала.
  - level: senior
    text_md: |
      Стратегия коммита offset определяет семантику доставки. Auto-commit
      (`enable.auto.commit=true`) коммитит offset периодически по таймеру
      независимо от того, успешно ли обработано сообщение — это самый
      простой, но самый ненадёжный вариант: сообщение может быть
      закоммичено, но не обработано (при крэше между коммитом и обработкой)
      либо обработано дважды при ребалансировке. Правильный порядок для
      at-least-once — обработать сообщение, затем закоммитить offset;
      тогда при крэше после обработки, но до коммита, сообщение будет
      обработано повторно после перезапуска — приложение должно быть
      готово к дублям (идемпотентность на уровне бизнес-логики или
      дедупликация по ключу сообщения). Для at-most-once — закоммитить
      offset, затем обработать; при крэше после коммита, но до обработки,
      сообщение будет потеряно безвозвратно — эта стратегия оправдана
      только там, где потеря сообщения дешевле, чем дубликат.

      Ребалансировка — процесс переназначения партиций при изменении
      состава группы (консьюмер упал, добавился новый, изменилось число
      партиций). Eager (stop-the-world, классический протокол) останавливает
      **всех** консьюмеров группы, отбирает все партиции и раздаёт заново —
      простой на время всей ребалансировки. Cooperative sticky
      (`org.apache.kafka.clients.consumer.CooperativeStickyAssignor`,
      в Go-клиентах — соответствующая настройка `partition.assignment.strategy`)
      переназначает только те партиции, которые действительно нужно
      переместить, оставляя остальным консьюмерам продолжать работу без
      паузы. Классическая ловушка — долгая обработка сообщения внутри
      `poll`-цикла: если время между двумя вызовами `poll` превышает
      `max.poll.interval.ms`, брокер считает консьюмера зависшим и
      исключает его из группы, что вызывает лишнюю ребалансировку и
      возможные дубли; решение — либо укладываться в интервал, либо
      обрабатывать сообщения асинхронно в отдельных горутинах, продолжая
      poll'ить, либо увеличивать `max.poll.interval.ms` для заведомо долгих
      обработчиков.

      Consumer lag — разница между последним записанным offset в партиции
      (log-end-offset) и закоммиченным offset группы; это ключевая метрика
      здоровья консьюмера, растущий lag сигнализирует, что консьюмеры не
      успевают за темпом продюсеров. Пример консьюмера на `segmentio/kafka-go`
      с ручным коммитом:

      ```go
      r := kafka.NewReader(kafka.ReaderConfig{
          Brokers:     []string{"localhost:9092"},
          GroupID:     "orders-service",
          Topic:       "orders.created",
          MaxWait:     time.Second,
          StartOffset: kafka.FirstOffset,
      })
      defer r.Close()

      for {
          m, err := r.FetchMessage(ctx)
          if err != nil {
              break
          }
          if err := handle(ctx, m); err != nil {
              log.Printf("handle failed, will retry: %v", err)
              continue // не коммитим — сообщение обработается снова
          }
          if err := r.CommitMessages(ctx, m); err != nil {
              log.Printf("commit failed: %v", err)
          }
      }
      ```
  - level: deep
    text_md: |
      Основные Go-клиенты различаются архитектурой: `segmentio/kafka-go` —
      чистый Go без cgo, простой API (`Reader`/`Writer`), но исторически
      более скромная поддержка транзакционного producer и некоторых
      продвинутых фич consumer group protocol; `confluent-kafka-go` — cgo-
      биндинг над `librdkafka` (C-библиотека), обычно наиболее полная и
      производительная реализация протокола, но с накладными расходами cgo
      (переключение контекста runtime, сложнее кросс-компиляция, GOMAXPROCS
      эффекты) и зависимостью от версии librdkafka в окружении; `sarama` —
      чистый Go, широко используется, поддерживает transactional producer и
      exactly-once semantics API, но конфигурация многословнее и историчес-
      ки были нюансы с потреблением памяти при большом числе партиций.

      Exactly-once semantics в Kafka достигается не «из коробки» на уровне
      отдельного консьюмера, а комбинацией идемпотентного продюсера
      (`enable.idempotence=true`, дедупликация по producer ID и sequence
      number на брокере) и транзакционного producer/consumer API
      (`transactional.id`, атомарная запись в несколько партиций и/или
      атомарный коммит offset вместе с produce в рамках одной транзакции
      Kafka) — то есть «прочитать → обработать → записать результат и
      закоммитить offset» атомарно относительно чтения из другого топика.
      Без этого паттерна «read-process-write» через границу двух топиков
      неизбежно даёт at-least-once с возможными дублями на стороне
      downstream, что и объясняет, почему exactly-once обычно реализуют на
      уровне идемпотентности бизнес-операции (upsert по ключу, дедупликация
      по message id), а не полагаются на транзакционность брокера во всех
      сценариях.

      Внутреннее устройство ребалансировки: `group coordinator` — один из
      брокеров, отвечающий за конкретную группу (определяется хэшем
      `group.id`), ведёт протокол `JoinGroup`/`SyncGroup`/`Heartbeat`.
      Генерация (generation id) инкрементируется на каждой ребалансировке;
      сообщения с устаревшим generation id от «зависшего» консьюмера
      отклоняются (`ILLEGAL_GENERATION`), что защищает от split-brain,
      когда исключённый из группы, но ещё не осознавший это консьюмер
      продолжает коммитить offset. `session.timeout.ms` и heartbeat-интервал
      определяют, как быстро брокер обнаруживает падение консьюмера
      независимо от `max.poll.interval.ms`, который следит именно за
      «застрявшей» обработкой между вызовами poll — это два разных
      механизма обнаружения отказа, которые часто путают при тюнинге.
