slug: sqli-xss-go
section: platform
title: "SQLi и XSS в Go: плейсхолдеры, html/template и где всё равно дыра"
difficulty: senior
tags: [security, sql-injection, xss]
question_md: |
  Как `database/sql` защищает от SQL-инъекций через плейсхолдеры и почему это надёжнее экранирования? Как `html/template` автоматически экранирует XSS и в каких случаях защита всё равно не срабатывает? Приведите ситуации, где параметризация и auto-escape не помогают.
answer_levels:
  - level: middle
    text_md: |
      **SQL Injection.** Уязвимость возникает, когда пользовательский ввод склеивается со строкой запроса:
      ```go
      // ДЫРА: email = "' OR '1'='1" вернёт всех; "'; DROP TABLE users; --" удалит таблицу
      q := "SELECT * FROM users WHERE email = '" + email + "'"
      db.Query(q)
      ```
      Защита в Go — **плейсхолдеры** (`$1` для Postgres/pgx, `?` для MySQL):
      ```go
      db.QueryContext(ctx, "SELECT id, name FROM users WHERE email = $1", email)
      ```
      Драйвер передаёт запрос и **данные раздельно**: текст ввода никогда не парсится как часть SQL, поэтому кавычки и `;` в нём безвредны.

      **XSS (Cross-Site Scripting).** Если сервер вставляет пользовательский ввод в HTML без экранирования, `<script>alert(1)</script>` выполнится в браузере жертвы. В Go пакет **`html/template`** экранирует автоматически (`<` → `&lt;`), а **`text/template`** — нет. Для HTML-вывода всегда `html/template`. Для JSON API отдавайте `Content-Type: application/json` — браузер не станет исполнять ответ как HTML.
  - level: senior
    text_md: |
      **Почему плейсхолдеры надёжнее экранирования.** Экранирование (ручная замена кавычек) хрупко: легко забыть случай, есть кодировочные обходы, разные диалекты. Плейсхолдеры устраняют проблему архитектурно — сервер БД получает **уже распарсенный** запрос с «дырками» и подставляет значения как данные на уровне протокола (часто через prepared statement). Ввод физически не может стать SQL-кодом.

      **Где параметризация НЕ спасает:**
      - **Идентификаторы нельзя параметризовать** — имена таблиц/колонок, `ORDER BY <col>`, `ASC/DESC`, названия схем. Плейсхолдер работает только для *значений*. Для динамических идентификаторов — строгий **allowlist**:
        ```go
        cols := map[string]string{"name": "name", "created": "created_at"}
        col, ok := cols[req.SortBy]         // не подставлять req.SortBy напрямую!
        if !ok { col = "created_at" }
        q := "SELECT * FROM users ORDER BY " + col   // безопасно: значение из allowlist
        ```
      - **`LIKE`** с пользовательским вводом: `%`/`_` остаются метасимволами шаблона (не инъекция SQL, но обход логики) — экранируйте их вручную под конкретный оператор.
      - **Всё равно склеенная строка**: `fmt.Sprintf` в запрос сводит на нет плейсхолдеры где-то ещё. Инъекция «второго порядка» — данные из БД, вставленные в новый запрос конкатенацией, — так же опасны.

      **`html/template` — контекстно-зависимое экранирование.** Он умнее простого HTML-escape: определяет **контекст** подстановки и экранирует по-разному в HTML-теле, в атрибуте, внутри `<script>` (JS), в URL, в CSS. Одно и то же значение `{{.X}}` будет экранировано по-разному в `<a href="{{.X}}">` и в `<div>{{.X}}</div>`.
  - level: deep
    text_md: |
      **Где `html/template` всё равно даёт XSS:**
      - **Типы-«обходы»**: `template.HTML`, `template.JS`, `template.URL`, `template.CSS`, `template.HTMLAttr` помечают строку как «уже безопасную», и экранирование отключается. Обернули пользовательский ввод в `template.HTML(userInput)` — это прямая XSS-дыра. Эти типы допустимы **только** для доверенного/уже санитизированного контента.
      - **Пользовательский HTML** (rich-text редакторы): его нельзя просто вывести — нужна whitelist-санитизация, например `github.com/microcosm-cc/bluemonday` (`UGCPolicy().Sanitize(...)`), и лишь потом `template.HTML`.
      - **`javascript:` / `data:` URL** в `href`: авто-escape по URL-контексту гасит их (подставляет `#ZgotmplZ`), но если вы кладёте URL через `template.URL`, проверка снимается — валидируйте схему сами.
      - **Неквотированные атрибуты** и попытки строить HTML **конкатенацией** мимо шаблона (`w.Write([]byte("<div>"+userInput))`) — экранирование не участвует вовсе.
      - **`text/template` для HTML** — частая ошибка: не экранирует ничего.

      **Слои защиты сверх auto-escape:** CSP-заголовок (`script-src 'self'`) ограничивает исполнение инлайновых скриптов даже при промахе экранирования; `X-Content-Type-Options: nosniff` не даёт браузеру «угадать» HTML в не-HTML ответе; правильный `Content-Type` на API.

      **Тонкости для staff:**
      - ORM/квери-билдеры (`gorm`, `ent`, `squirrel`) параметризуют значения, но `Raw`/`Exec` с ручной строкой и небезопасная передача идентификаторов остаются на вас; `gorm.Expr`/сырые фрагменты — потенциальная дыра.
      - Инъекция «второго порядка» проходит любые входные фильтры, потому что вредонос попадает в запрос **позже**, уже из доверенного источника (БД) — параметризуйте **каждый** запрос, а не только «внешние».
      - Минимизация прав пользователя БД (только нужные таблицы/операции) — defence-in-depth: даже при инъекции ущерб ограничен.
      - `pgx` поддерживает и extended protocol (настоящий prepared statement), и простой протокол; при `QueryExecModeSimple` параметры экранируются на клиенте — механика иная, но защита от инъекции сохраняется, если использовать параметры, а не конкатенацию.
