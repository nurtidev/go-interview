slug: clickhouse-columnar-mergetree
section: platform
title: "ClickHouse: колоночное хранение, MergeTree и когда OLAP оправдан"
difficulty: senior
tags: [clickhouse, olap, mergetree]
question_md: |
  Почему ClickHouse быстр на аналитике: в чём суть колоночного хранения и как
  устроен движок MergeTree (parts, merges, разреженный индекс, партиционирование)?
  Когда аналитическая (OLAP) БД действительно нужна, а когда это оверкилл и
  задачу решает PostgreSQL с материализованными представлениями?
answer_levels:
  - level: middle
    text_md: |
      **Колоночное хранение — суть.** В OLTP-БД (PostgreSQL, MySQL) строка лежит
      целиком: `[id, name, age, country, ...]` подряд. В ClickHouse каждая
      **колонка** хранится отдельным файлом: все `country` подряд, все `age`
      подряд. Для аналитического запроса `SELECT country, AVG(age) GROUP BY
      country` нужно прочитать только 2 колонки из 50 — это единицы процентов
      данных против 100% при построчном чтении. Плюс однотипные значения в
      колонке отлично сжимаются (LZ4/ZSTD, дельта-кодирование) — в среднем 10-20x.
      Это колоссальная экономия I/O — главная причина скорости.

      **OLTP vs OLAP.** OLTP — короткие точечные транзакции, частые
      `UPDATE`/`DELETE`, отдельные строки. OLAP — длинные запросы с агрегацией по
      миллионам/миллиардам строк, данные в основном только дописываются
      (append-mostly). ClickHouse — это OLAP.

      **MergeTree — базовый движок.** При `INSERT` данные пишутся отдельным
      куском — **part** (небольшой отсортированный по `ORDER BY` набор). В фоне
      ClickHouse **сливает** мелкие parts в крупные — отсюда «MergeTree».
      `PARTITION BY` (например, по месяцу) физически разделяет данные, чтобы можно
      было отбрасывать целые партиции по условию и удалять их целиком.

      **Когда ClickHouse нужен:** событийная аналитика (клики, просмотры),
      логи и метрики, воронки/retention, отчёты и дашборды по большим данным,
      Data Warehouse. **Когда оверкилл:** данных немного, нужны частые точечные
      обновления/удаления, транзакции и строгая консистентность, много JOIN по
      нормализованной модели — тут достаточно PostgreSQL.
  - level: senior
    text_md: |
      **Разреженный (sparse) первичный индекс.** В MergeTree `ORDER BY` = ключ
      сортировки = первичный ключ. Индекс **не** хранит запись на каждую строку:
      одна запись на `index_granularity` строк (по умолчанию 8192) — это «гранула».
      По условию запроса ClickHouse находит нужные гранулы и читает только их.
      Индекс крохотный, помещается в RAM. Поэтому фильтры по префиксу `ORDER BY`
      резко ускоряют запрос, а по колонкам вне ключа — приводят к полному скану
      (тут спасают data skipping indexes или проекции).

      **Почему нет нормальных UPDATE/DELETE.** Data-part иммутабелен. `ALTER
      TABLE ... UPDATE/DELETE` — это **мутация**: тяжёлое асинхронное переписывание
      целых parts в фоне, не транзакция. Поэтому точечные обновления —
      антипаттерн. Обновляемость эмулируют семейством движков.

      **Семейство MergeTree:**
      - `ReplacingMergeTree(ver)` — при merge оставляет строку с максимальным
        `ver` (дедуп по ключу, eventual). Но до merge дубли видны — для
        гарантии нужен `FINAL` (дорого) или дедуп в запросе (`argMax`).
      - `SummingMergeTree` — суммирует числовые колонки при merge.
      - `AggregatingMergeTree` — хранит состояния агрегатов, работает с
        Materialized Views.
      - `CollapsingMergeTree` — «удаления» через знаковые строки.
      - `ReplicatedMergeTree` — любой из выше + репликация через ClickHouse
        Keeper/ZooKeeper (координация merge и дедуп вставок).

      **Batch inserts — критично.** Каждый `INSERT` = новый part. Много мелких
      вставок → «too many parts» и захлёбывание фонового merge. Правило: писать
      **большими батчами** (тысячи-десятки тысяч строк за раз) либо включать
      `async_insert`, чтобы ClickHouse сам буферизовал. Из Go это `PrepareBatch`
      + `batch.Append(...)` + `batch.Send()`.

      **Materialized View — это триггер на INSERT:** при вставке в исходную
      таблицу выполняется запрос и результат пишется в целевую (например,
      `SummingMergeTree` с почасовой предагрегацией). Запросы к предагрегату — в
      тысячи раз быстрее скана сырых событий.

      **Шардинг:** `Distributed`-движок — прокси над локальными таблицами на
      шардах, распределяет запрос по ключу шардирования и объединяет результаты.
  - level: deep
    text_md: |
      **Компрессия и векторизация — почему это ещё быстрее.** Однотипная колонка
      сжимается специализированными кодеками: `Delta`/`DoubleDelta` для
      монотонных (timestamp, счётчики), `Gorilla` для float-метрик, поверх
      `LZ4` (быстро) или `ZSTD` (сильнее). ClickHouse обрабатывает данные
      **векторно** — блоками по колонке через SIMD-инструкции, а не строка за
      строкой, плюс параллелит по ядрам и по гранулам. Отсюда пропускная
      способность в гигабайты/с на ядро.

      **Индексы пропуска данных (data skipping).** Помимо разреженного PK можно
      объявить вторичные индексы `minmax`, `set`, `bloom_filter`,
      `ngrambf_v1`/`tokenbf_v1` (для поиска подстрок) — они хранят метаданные по
      блокам и позволяют пропускать гранулы, не читая их. **Проекции** —
      альтернативная физическая сортировка/агрегат той же таблицы, выбираемая
      оптимизатором.

      **Консистентность — чего нет.** Нет ACID-транзакций в привычном смысле, нет
      честного `UPDATE`, нет FK. Дедупликация в `ReplicatedMergeTree` — по хэшу
      блока вставки (защита от повторной отправки), но между разными вставками
      дубли по бизнес-ключу схлопываются только на merge (eventual). `FINAL`
      форсирует схлопывание на чтении, но читает и мержит на лету — дорого на
      больших данных; на проде чаще дедуплицируют в самом запросе через
      `argMax(col, version)` + `GROUP BY key`. JOIN слабее, чем в OLTP:
      правый набор грузится в память (hash join), для распределённых —
      `GLOBAL JOIN`; часто вместо JOIN используют **словари** (`dictGet`) для
      справочников.

      **Go-специфика.** Драйвер `ClickHouse/clickhouse-go/v2`: нативный протокол
      (эффективнее HTTP), строгая типизация (`UInt64`, `Nullable`, `LowCardinality`,
      `Array`, `DateTime64`) — типы Go должны точно совпадать, иначе ошибка при
      `Append`. Настройки на вставку: `async_insert=1`,
      `wait_for_async_insert=1` (компромисс надёжность/latency),
      `max_insert_block_size`. Батчинг обязателен — не слать по одной строке.

      **Когда OLAP оправдан, а когда оверкилл — честно.**
      - **Нужен ClickHouse:** десятки-сотни миллионов+ строк, аналитические
        агрегации/GROUP BY по широким диапазонам, append-mostly поток событий,
        p95/quantile/uniq по большим объёмам, отдельная read-модель под BI.
      - **Оверкилл:** данных < десятков млн строк и агрегации укладываются в
        секунды на PostgreSQL с правильными индексами и **материализованными
        представлениями**; нужны точечные обновления, транзакции, FK,
        консистентность здесь-и-сейчас; частые мелкие вставки одиночными
        строками (ClickHouse их ненавидит). Типовой прод-паттерн: PostgreSQL как
        source of truth (OLTP) + ClickHouse рядом под аналитику, поток событий
        доставляется батчами (Kafka → ClickHouse).
