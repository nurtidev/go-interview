slug: microservice-outbox-saga-circuit-breaker
section: platform
title: "Микросервисные паттерны: outbox, saga, circuit breaker"
difficulty: staff
tags: [microservices, patterns]
question_md: |
  Объясните паттерн transactional outbox, как устроена saga (оркестрация vs
  хореография) для распределённых транзакций, и как circuit breaker вместе
  с таймаутами, ретраями и bulkhead защищает систему от каскадных отказов.
answer_levels:
  - level: middle
    text_md: |
      Transactional outbox решает проблему атомарности между записью в
      свою БД и публикацией события во внешнюю систему (Kafka, RabbitMQ):
      если делать это как два отдельных действия, при сбое между ними
      можно либо потерять событие, либо записать данные, но не отправить
      уведомление. Решение — в той же транзакции, где меняются бизнес-
      данные, записывать событие в отдельную таблицу `outbox` в этой же
      БД (это гарантированно атомарно, обычная ACID-транзакция), а
      отдельный процесс (relay/publisher) читает таблицу outbox и
      публикует события во внешнюю систему, отмечая их как отправленные.
      Saga — способ реализовать распределённую бизнес-транзакцию через
      цепочку локальных транзакций в разных сервисах, каждая с заранее
      определённой компенсирующей операцией на случай, если более поздний
      шаг цепочки не выполнится (например, если резервирование склада
      успешно, а оплата не прошла — вызывается компенсация «отменить
      резервирование»). Circuit breaker — обёртка над вызовом внешнего
      сервиса, которая при превышении порога ошибок временно перестаёт
      пропускать запросы («открывается»), защищая и вызывающий сервис от
      трат ресурсов на заведомо неудачные вызовы, и сам проблемный сервис
      от лавины повторных запросов.
  - level: senior
    text_md: |
      Оркестрация saga — выделенный координатор (saga orchestrator) явно
      вызывает каждый шаг по очереди и решает, когда запускать компенсации
      при ошибке; логика централизована, легко читается и тестируется, но
      orchestrator становится дополнительным компонентом с собственной
      ответственностью и точкой отказа. Хореография — каждый сервис
      публикует события о своих действиях и подписывается на события
      других, реагируя самостоятельно (нет центрального координатора);
      это снижает связанность, но распределённую бизнес-логику становится
      сложнее восстановить в голове по коду одного сервиса — она «размазана»
      по подписчикам на события через все сервисы.

      Circuit breaker (например, `sony/gobreaker`) реализует конечный
      автомат из трёх состояний: closed (нормальная работа, запросы
      проходят, ошибки считаются в скользящем окне), open (после
      превышения порога ошибок — все запросы немедленно завершаются
      ошибкой без реального вызова, breaker «отдыхает» заданное время) и
      half-open (по истечении таймаута breaker пробует пропустить
      ограниченное число запросов; если они успешны — переходит в closed,
      если нет — возвращается в open).

      ```go
      cb := gobreaker.NewCircuitBreaker(gobreaker.Settings{
          Name:        "payment-service",
          MaxRequests: 3,
          Interval:    10 * time.Second,
          Timeout:     30 * time.Second,
          ReadyToTrip: func(counts gobreaker.Counts) bool {
              return counts.Requests >= 10 && float64(counts.TotalFailures)/float64(counts.Requests) >= 0.5
          },
      })

      result, err := cb.Execute(func() (interface{}, error) {
          ctx, cancel := context.WithTimeout(ctx, 500*time.Millisecond)
          defer cancel()
          return paymentClient.Charge(ctx, req)
      })
      if err != nil {
          if errors.Is(err, gobreaker.ErrOpenState) {
              // не тратим бюджет на заведомо неудачный вызов
          }
      }
      ```

      Таймауты обязательны на каждый внешний вызов (иначе одна медленная
      зависимость исчерпает пул горутин/соединений вызывающего сервиса —
      классический каскадный отказ), ретраи должны идти с exponential
      backoff и jitter (случайным разбросом), чтобы одновременные ретраи
      множества клиентов не создавали синхронизированные волны нагрузки
      («thundering herd») на восстанавливающийся сервис. Bulkhead —
      изоляция пулов ресурсов (отдельные пулы соединений/горутин на разные
      зависимости), чтобы отказ одной зависимости не съедал ресурсы,
      нужные для работы с другими — по аналогии с отсеками корабля,
      которые не дают затоплению распространиться на весь корпус.
  - level: deep
    text_md: |
      Идемпотентность — сквозное требование для saga и retry: если шаг
      saga или ретрай вызова может выполниться повторно (из-за таймаута,
      после которого первый вызов на самом деле успел выполниться на
      сервере, просто ответ не дошёл), повторное выполнение не должно
      приводить к двойному эффекту. Практика — idempotency key, передаваемый
      клиентом (или сгенерированный на основе бизнес-идентификатора вроде
      id заказа) и уникальный индекс/constraint в БД получателя, который
      отвергнет дублирующую вставку; получатель должен возвращать тот же
      результат на повторный запрос с тем же ключом, а не ошибку и не
      двойное списание. Именно комбинация idempotency key + transactional
      outbox даёт end-to-end at-least-once с эффектом exactly-once на
      уровне бизнес-операции.

      Relay outbox-таблицы имеет два практических подхода: polling
      publisher (периодически читает необработанные строки — простой, но
      добавляет задержку и лишнюю нагрузку на БД от постоянного polling) и
      CDC (Change Data Capture) через `Debezium`/логическую репликацию
      PostgreSQL (`pgoutput`), который читает WAL и публикует изменения
      таблицы outbox в Kafka почти в реальном времени без polling —
      предпочтительный подход при высоких требованиях к задержке и
      объёму, но требующий дополнительной инфраструктуры (Debezium
      connector, Kafka Connect).

      Проброс `context` в Go — не только про отмену, но и часть контракта
      resilience-паттернов: deadline должен уменьшаться по всей цепочке
      вызовов (upstream сервис даёт 2с бюджета, значит downstream вызов
      внутри должен получить оставшийся бюджет, а не свежий полный
      таймаут — иначе сумма таймаутов по цепочке может кратно превысить
      ожидания caller'а и продолжать работу над запросом, от которого
      верхний уровень уже отказался). Комбинация circuit breaker + bulkhead
      + retry с backoff иногда называют «resilience stack» (термин из
      Netflix Hystrix, ныне в Go-мире — `sony/gobreaker`, `golang.org/x/time/rate`
      для лимитирования, `avast/retry-go` для ретраев) — важно, что эти
      механизмы должны работать **вместе** и в правильном порядке
      (таймаут глубже ретрая, ретрай глубже circuit breaker), иначе, например,
      ретраи внутри уже открытого breaker'а просто множат нагрузку без пользы,
      а breaker без таймаута на сам вызов не успеет вовремя посчитать
      зависший запрос как ошибку.
