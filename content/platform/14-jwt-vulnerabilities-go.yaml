slug: jwt-vulnerabilities-go
section: platform
title: "JWT-уязвимости: alg none/confusion, хранение, ревокация, refresh"
difficulty: senior
tags: [security, jwt, auth]
question_md: |
  Какие уязвимости характерны для JWT: атака `alg: none`, algorithm confusion (RS256→HS256), небезопасное хранение? Как решается проблема ревокации, если токен по природе stateless? Как правильно организовать access/refresh и валидацию JWT в Go?
answer_levels:
  - level: middle
    text_md: |
      JWT состоит из трёх base64url-частей: `header.payload.signature`. Header содержит алгоритм (`alg`), payload — claims (`sub`, `exp`, `iat`, роли), signature — подпись HMAC (симметрично) или RSA/ECDSA (асимметрично).

      Критично помнить: **payload — это просто base64, не шифрование.** Любой может его декодировать и прочитать. Нельзя класть в JWT пароли и секреты. Единственное, что защищает токен от подделки, — **подпись**, поэтому вся безопасность JWT держится на корректной проверке подписи и `exp`.

      Три базовые уязвимости:
      1. **`alg: none`** — атакующий меняет алгоритм на `none` и убирает подпись; уязвимая библиотека принимает токен «как валидный без подписи».
      2. **Слабый секрет** для HS256 — `"secret"` брутфорсится за секунды; нужен ключ ≥ 256 бит из `crypto/rand`.
      3. **Небезопасное хранение** на клиенте — токен в `localStorage` крадётся через XSS.
  - level: senior
    text_md: |
      **Algorithm confusion (RS256 → HS256)** — тоньше, чем `alg: none`. Сервер использует RSA: подписывает приватным ключом, проверяет публичным. Если код выбирает способ проверки по полю `alg` из **самого токена**, атакующий меняет `alg` на `HS256` и подписывает токен **публичным ключом** (который общеизвестен) как HMAC-секретом. Уязвимый сервер берёт тот же публичный ключ и проверяет HMAC — подпись сходится. Защита: **жёстко фиксировать ожидаемый алгоритм** на стороне сервера и не выбирать его из токена.

      В Go с `github.com/golang-jwt/jwt/v5` правильно так:
      ```go
      token, err := jwt.Parse(tokenStr, func(t *jwt.Token) (any, error) {
          // ключ отдаём ТОЛЬКО если метод — ожидаемый HMAC
          if _, ok := t.Method.(*jwt.SigningMethodHMAC); !ok {
              return nil, fmt.Errorf("unexpected alg: %v", t.Header["alg"])
          }
          return secretKey, nil
      }, jwt.WithValidMethods([]string{"HS256"}))   // белый список алгоритмов
      ```
      `jwt.WithValidMethods` закрывает и `alg: none`, и confusion: любой алгоритм вне списка отвергается до вызова keyfunc. В v5 проверка `exp`/`nbf` включена по умолчанию; дополнительно валидируйте `iss`/`aud` (`jwt.WithIssuer`/`jwt.WithAudience`).

      **Хранение на клиенте.** `localStorage` доступен JS → XSS уводит токен. Безопаснее — **httpOnly + Secure + SameSite cookie** (JS не читает, уходит только на свой origin). Но cookie тянет за собой **CSRF** (браузер шлёт её автоматически) — нужен `SameSite=Lax/Strict` и/или CSRF-токен. Bearer-токен в заголовке от CSRF свободен (браузер не добавляет `Authorization` сам), но уязвим к XSS-краже. Компромисс — короткоживущий access-токен + refresh в httpOnly cookie.
  - level: deep
    text_md: |
      **Ревокация — главная слабость JWT.** Классический JWT **stateless**: сервер не хранит состояние сессии, проверяет только подпись и `exp`. Значит валидный токен нельзя «отозвать» до истечения — а это нужно при логауте, смене пароля, компрометации, бане. Подходы:

      1. **Короткий TTL access-токена + refresh-токен.** Access живёт 5–15 минут (окно ущерба мало), refresh (дни) хранится сервером и легко отзывается. «Ревокация» сводится к отказу выдавать новый access по отозванному refresh.
      2. **Denylist по `jti`.** Каждому токену — уникальный `jti`; отозванные кладём в Redis c TTL = остаток жизни токена, middleware проверяет наличие. Возвращает часть состояния (уже не полностью stateless), но список мал.
      3. **Token versioning / `tokenVersion`.** В записи пользователя — счётчик; claim `ver` сверяется с ним. Смена пароля/логаут «отовсюду» = инкремент, все старые токены разом невалидны. Дёшево и удобно.

      **Refresh-токены и reuse detection (rotating refresh).** При каждом обновлении выдаётся **новый** refresh, старый инвалидируется (rotation). Если приходит уже использованный (отозванный) refresh — это признак кражи: инвалидируем **всю** цепочку/семью токенов пользователя. Refresh хранят как **хэш** (а не в открытом виде), в httpOnly cookie, привязывают к устройству/сессии.

      **Как правильно в Go, чек-лист:**
      - `golang-jwt/jwt/v5` + `jwt.WithValidMethods` с явным списком (никогда не доверять `alg` из токена);
      - секрет HS256 из `crypto/rand` ≥ 32 байт; для асимметрии — RS256/ES256 с ротацией ключей через `kid` в header и набор публичных ключей (JWKS);
      - валидировать `exp`, `nbf`, `iss`, `aud`; ставить `iat`;
      - access короткий + rotating refresh с reuse detection; refresh — hashed, httpOnly, Secure, SameSite;
      - для мгновенного логаута/бана — denylist по `jti` или `tokenVersion`.

      **Тонкости для staff:**
      - Не путать «подписан» и «зашифрован»: чувствительные данные в JWT видны всем; нужна конфиденциальность — JWE, а не JWT.
      - Рассинхрон часов между сервисами ломает `exp`/`nbf` — закладывайте небольшой leeway (`jwt.WithLeeway`).
      - `kid` из токена — тоже недоверенный ввод: сопоставляйте его со **своим** набором ключей, не подгружайте ключ по произвольному URL из header (иначе SSRF/подмена JWKS).
