slug: postgres-indexes-btree
section: platform
title: "Индексы в PostgreSQL: B-tree, составные, покрывающие"
difficulty: senior
tags: [postgres, index]
question_md: |
  Расскажите, как устроен B-tree индекс в PostgreSQL, в каких случаях
  планировщик откажется его использовать даже при наличии индекса на нужной
  колонке, и как правильно проектировать составные и покрывающие индексы.
answer_levels:
  - level: middle
    text_md: |
      B-tree — сбалансированное дерево, в листьях которого лежат пары
      «значение ключа → указатель на строку (TID)», отсортированные по
      значению. Это позволяет быстро искать по равенству, диапазону
      (`<`, `>`, `BETWEEN`), сортировать (`ORDER BY`) и делать `MIN`/`MAX` за
      O(log n) вместо полного сканирования таблицы. Индекс не используется,
      если функция применена к колонке без соответствующего функционального
      индекса (`WHERE lower(email) = ...` не воспользуется обычным индексом
      на `email`), если в `LIKE` шаблон начинается с `%` (`LIKE '%foo'`), или
      если оптимизатор считает, что через индекс придётся прочитать слишком
      большую долю таблицы (низкая селективность) — тогда `Seq Scan` дешевле.
      Составной индекс `(a, b)` работает по правилу левого префикса: запрос
      по `a` или по `a AND b` использует индекс, а запрос только по `b` —
      нет. Проверять реальный план стоит через `EXPLAIN (ANALYZE, BUFFERS)`.
  - level: senior
    text_md: |
      Внутри B-tree страницы образуют дерево фиксированной высоты (обычно
      2-4 уровня даже для десятков миллионов строк), корень и внутренние
      узлы хранят диапазоны ключей с указателями на дочерние страницы,
      листовые — упорядоченные пары ключ/TID с указателями на соседние
      листья для эффективного range scan. Помимо перечисленных в базовом
      ответе причин отказа от индекса, планировщик игнорирует индекс при
      неявном приведении типов (`WHERE int_column = '5'::text` в некоторых
      формулировках не матчит нужный оператор-класс), при `OR`-условиях по
      разным колонкам без `BitmapOr` (обычно PG сам строит `BitmapOr` из
      двух индексов, но если один из операндов не индексирован — план
      деградирует в Seq Scan), а также когда статистика (`pg_stats`)
      устарела и `n_distinct`/`most_common_vals` дают неверную оценку
      селективности — тогда помогает `ANALYZE` или ручная правка `n_distinct`.

      Порядок колонок в составном индексе критичен: равенство должно идти
      перед диапазоном, иначе диапазонное условие «обрывает» упорядоченность
      и последующие колонки не сужают поиск:

      ```sql
      -- хорошо: равенство по tenant_id, затем диапазон по created_at
      CREATE INDEX idx_orders_tenant_created
        ON orders (tenant_id, created_at);

      -- покрывающий индекс: amount не участвует в поиске,
      -- но хранится в индексе, чтобы не идти в heap
      CREATE INDEX idx_orders_covering
        ON orders (tenant_id, created_at) INCLUDE (amount);
      ```

      `INCLUDE` даёт index-only scan: если все запрошенные колонки есть в
      индексе, PostgreSQL не обращается к heap — но только если страница
      таблицы отмечена как «all visible» в visibility map (VM), иначе
      всё равно нужно сходить в heap проверить видимость версии строки по
      MVCC. Частый источник деградации index-only scan — отсутствие
      регулярного `VACUUM`, который обновляет VM. Частичный индекс `WHERE`
      сокращает размер и повышает селективность для узкого подмножества,
      например `CREATE INDEX ... WHERE status = 'pending'` для очереди задач.
  - level: deep
    text_md: |
      Кроме B-tree, PostgreSQL поддерживает несколько специализированных
      методов доступа через pluggable index access methods: GIN
      (Generalized Inverted Index) — для составных значений типа
      `jsonb`, массивов, full-text search, где один документ даёт много
      ключей; GiST — для геометрии, диапазонов, экстент-поиска (R-tree
      подобная структура, приблизительный поиск с последующей
      перепроверкой); BRIN (Block Range Index) — крохотный индекс,
      хранящий min/max по диапазонам физических блоков, эффективен для
      данных с естественной корреляцией с физическим порядком (time-series,
      append-only таблицы с ростом по времени); Hash — только равенство,
      исторически был ненадёжен без WAL-логирования до PG 10, сейчас
      корректен, но почти всегда B-tree предпочтительнее из-за поддержки
      диапазонов при сопоставимой производительности точного поиска.

      HOT (Heap-Only Tuples) updates — оптимизация, при которой `UPDATE`,
      не меняющий индексируемые колонки и оставляющий новую версию строки
      на той же странице (если есть свободное место), не создаёт новую
      запись во всех индексах таблицы — только новая версия строки в heap с
      цепочкой `t_ctid`, и одну запись в индексе, которая её будет находить.
      Это резко снижает write amplification при частых обновлениях «горячих»
      строк. Если новая версия не помещается на странице, HOT невозможен —
      требуется прописать индексные записи во все индексы, что объясняет,
      почему `fillfactor` меньше 100 (оставить пустое место на странице)
      ускоряет update-heavy таблицы.

      Bloat индекса возникает из-за того, что B-tree не переиспользует
      освобождённые страницы мгновенно после массовых удалений/обновлений —
      VACUUM помечает их как свободные во free space map, но физический
      размер файла не уменьшается без `VACUUM FULL` или `REINDEX`.
      `REINDEX CONCURRENTLY` (начиная с PG 12) перестраивает индекс без
      эксклюзивной блокировки записи, строя новый индекс параллельно со
      старым и атомарно переключая его — важно для эксплуатации без
      простоя. Диагностика: `pg_stat_user_indexes`, расширение `pgstattuple`
      для оценки реального bloat-фактора, и сравнение `pg_relation_size`
      индекса с ожидаемым размером по числу строк и ширине ключа.
