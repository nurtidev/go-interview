slug: elasticsearch-inverted-index-sharding
section: platform
title: "Elasticsearch: инвертированный индекс, шардирование, консистентность"
difficulty: senior
tags: [elasticsearch, search, sharding]
question_md: |
  Как устроен полнотекстовый поиск в Elasticsearch: что такое инвертированный
  индекс и пайплайн анализа текста? Как работает шардирование (primary/replica,
  роутинг документов) и какая у ES модель консистентности (NRT, refresh vs flush
  vs translog)? Когда для поиска достаточно PostgreSQL FTS, а когда действительно
  нужен Elasticsearch?
answer_levels:
  - level: middle
    text_md: |
      **Инвертированный индекс.** Вместо «документ → слова» ES строит обратное
      отображение «слово (term) → список документов, где оно встречается»
      (posting list). Поиск слова — это готовый список документов, а не скан
      текстов. Это ядро полнотекстового поиска.

      **Пайплайн анализа (analysis).** Прежде чем попасть в индекс, текст
      проходит анализатор: **токенизация** (разбить на слова) → **нормализация**
      (нижний регистр) → **стемминг** (привести к основе: «бегает»→«бег») →
      удаление **стоп-слов** («и», «в», «the»). Поисковый запрос проходит тот же
      анализатор, поэтому «Бегущий» найдёт «бег». Отсюда важное различие типов
      полей: `text` — анализируется (для поиска), `keyword` — хранится как есть
      (для точных совпадений, сортировки, агрегаций). Часто поле объявляют
      мульти-типом: `title` (text) + `title.keyword` (keyword).

      **Релевантность (BM25).** Документы ранжируются: чем чаще term в документе
      (TF), тем выше; чем реже term во всей коллекции (IDF), тем он важнее.

      **Шардирование.** Кластер → индексы → шарды. **Shard** — самостоятельный
      Lucene-индекс, физическая единица хранения; данные индекса разбиты по
      primary-шардам. **Replica** — копия шарда для отказоустойчивости и
      масштабирования чтения. Документ попадает в шард детерминированно по хэшу
      (по умолчанию `_id`): `shard = hash(_routing) % число_primary_шардов`.

      **NRT (Near Real-Time).** Записанный документ становится искомым не мгновенно,
      а через ~1 секунду (refresh). Это не Real-Time из-за архитектуры сегментов
      Lucene.

      **Postgres FTS достаточно**, если поиск — вспомогательная функция, данных
      немного, нужна консистентность. **ES нужен**, когда поиск — ядро продукта:
      сложная релевантность, fuzzy, автодополнение, фасеты, большие объёмы.
  - level: senior
    text_md: |
      **Шардирование глубже.** Число **primary**-шардов фиксируется при создании
      индекса и его нельзя изменить без **reindex** (потому что роутинг завязан на
      `% num_primary_shards` — изменение числа шардов сломало бы адресацию всех
      документов). Число **replica** менять можно на лету. Ориентир по размеру
      шарда — 10-50 GB: слишком мелкие шарды → накладные расходы, слишком
      крупные → медленное восстановление и ребаланс. Реплики масштабируют чтение
      (запрос идёт на любую копию) и дают HA, но замедляют запись (пишем во все
      копии).

      **Модель консистентности.** ES — **eventual consistent**, без ACID-транзакций
      и без многодокументных транзакций. Путь записи:

      - Документ пишется в **in-memory buffer** и сразу в **translog** (журнал
        операций, аналог WAL — обеспечивает durability и recovery).
      - **Refresh** (по умолчанию раз в секунду) создаёт новый **сегмент** Lucene
        из буфера — только теперь документ виден поиску (это и есть NRT).
      - **Flush** сбрасывает сегменты на диск (Lucene commit) и очищает translog.

      Запись идёт на **primary**-шард, затем параллельно на **replica**;
      `wait_for_active_shards` регулирует, скольких копий ждать. Из-за refresh и
      репликации свежезаписанный документ можно не увидеть немедленно — это
      закладывают в логику (или форсируют `?refresh=wait_for` для критичных мест,
      ценой latency).

      **Запросы.** `bool`-запрос: `must` (влияет на score, обязательно),
      `filter` (**не** влияет на score, результат **кешируется** битсетом — быстро),
      `must_not`, `should`. Правило: точные условия (`status=active`, диапазоны
      дат/цен) — всегда в `filter`, полнотекст — в `must`. ES не делает JOIN:
      данные денормализуют, либо используют `nested`/parent-child (то и другое
      дороже реляционного JOIN).

      **Когда хватит Postgres FTS:** `tsvector` + GIN-индекс + `ts_rank`,
      расширения `pg_trgm` (fuzzy/LIKE) и `unaccent`. Достаточно, если объём
      до ~единиц-десятков миллионов документов, поиск не главная нагрузка, нужна
      транзакционная консистентность с остальными данными и простое ранжирование.
  - level: deep
    text_md: |
      **Сегменты Lucene — это LSM-подобная структура.** Сегмент **иммутабелен**.
      Новые документы — новые маленькие сегменты (при refresh). В фоне ES
      **сливает** мелкие сегменты в крупные (merge), как compaction в LSM.
      **Удаление** документа не переписывает сегмент — ставится tombstone
      (`.del`), а физически документ уходит только при merge. Поэтому «удалённые»
      данные какое-то время занимают место и учитываются в размерах сегментов.
      Много мелких сегментов → медленный поиск; отсюда важность merge-политики и
      `refresh_interval` (для bulk-загрузки его ставят `-1`, а после — ручной
      `_refresh`, чтобы не плодить сегменты на каждую секунду).

      **BM25 внутри.** `score = Σ IDF(term) · (TF · (k1+1)) / (TF + k1·(1 - b + b·|d|/avgdl))`.
      `k1` регулирует насыщение по частоте term (после нескольких вхождений рост
      вклада замедляется), `b` — нормализацию по длине документа `|d|` относительно
      средней `avgdl`. Понимание этого объясняет, почему очень длинные документы
      или частые термины не «перевешивают» результат линейно.

      **Распределённый запрос.** Coordinating-узел рассылает запрос по шардам
      (scatter), собирает и мержит топ-K (gather) — фаза query-then-fetch:
      сначала собираются id+score, потом дозагружаются сами документы. Мастер-узел
      и кворумные выборы (built-in с 7.x, ранее `minimum_master_nodes`) защищают
      от split-brain.

      **Go-специфика.** Клиенты: официальный `elastic/go-elasticsearch` (тонкая
      обёртка над REST, ближе к API) и `olivere/elastic` (типизированный
      query-builder). Массовая индексация — **Bulk API**: тело в формате NDJSON
      (строка-действие, строка-документ, повторять). Настройки для скорости
      bulk: увеличить `refresh_interval`, временно снять реплики (`number_of_
      replicas: 0`), потом вернуть. Ловушка: mapping задавать заранее — иначе ES
      угадает типы (dynamic mapping), и, например, поле-число внезапно станет
      `text` с `.keyword`.

      **Архитектурно: ES не источник правды.** Из-за eventual consistency и
      отсутствия транзакций Elasticsearch держат **рядом** с OLTP-БД: PostgreSQL —
      source of truth, ES — производный поисковый индекс, синхронизируемый через
      **outbox/CDC** (Debezium из logical replication → Kafka → индексатор). Между
      PG и ES тоже eventual consistency — это осознанный trade-off ради поиска.

      **Итог «когда что».** ES — когда поиск/аналитика логов это ядро: сложная
      релевантность и подсветка, fuzzy и автодополнение (completion suggester),
      фасетная навигация, агрегации, десятки+ миллионов документов под высокой
      поисковой нагрузкой, ELK для логов. Postgres FTS — когда поиск
      вспомогательный, важнее консистентность и простота эксплуатации, объёмы
      умеренные.
