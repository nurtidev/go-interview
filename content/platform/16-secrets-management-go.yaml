slug: secrets-management-go
section: platform
title: "Secrets management: env vs vault, ротация, секреты в логах и образах"
difficulty: senior
tags: [security, secrets, deploy]
question_md: |
  Чем плохи секреты в переменных окружения и чем их лучше подавать (Vault, secret manager, смонтированные файлы)? Как организовать ротацию? Как секреты утекают в логи и паники, и почему `.env` в Docker-образе — авария?
answer_levels:
  - level: middle
    text_md: |
      Секрет — это то, что даёт доступ: пароль БД, API-ключ, приватный ключ, JWT-секрет. Базовые правила:

      - **Никогда в коде.** `const dbPassword = "..."` попадает в git-историю навсегда, даже если потом удалить.
      - **Никогда `.env` в репозитории/образе.** Закоммиченный или «запечённый» в Docker-слой `.env` — классическая утечка.
      - **Подавать в рантайме, а не в сборке.** Приложение читает секрет при старте из окружения или смонтированного файла:
        ```go
        pass := os.Getenv("DB_PASSWORD")
        if pass == "" { log.Fatal("DB_PASSWORD not set") }
        ```
      - **Не логировать.** Секрет не должен попадать в логи, сообщения об ошибках, URL, трейсы.

      Переменные окружения — простой и распространённый способ, но у них есть минусы (видны в `/proc`, наследуются детьми, легко утекают в логи), поэтому для чувствительных систем берут secret manager / Vault / смонтированные файлы.
  - level: senior
    text_md: |
      **env vs файлы vs Vault — компромиссы.**

      *Переменные окружения*: просто, работают везде (12-factor). Минусы: видны в `/proc/<pid>/environ` и через `ps e`; **наследуются всеми дочерними процессами** (`os/exec` унесёт их в сторонний бинарник); часто целиком дампятся в логах/крэш-репортах; статичны — обновить без рестарта нельзя.

      *Смонтированные файлы* (Kubernetes Secret / tmpfs): секрет лежит в файле (`/var/run/secrets/...`), читается в рантайме; можно перечитывать при обновлении без рестарта; не светится в `environ`. Но **K8s Secret по умолчанию лишь base64, не шифрование** — нужен encryption-at-rest в etcd и/или внешний менеджер.

      *Vault / AWS Secrets Manager / GCP Secret Manager*: централизованное хранилище с аудитом, шифрованием, контролем доступа. Главный плюс — **динамические секреты**: Vault выдаёт короткоживущие креды БД под конкретный запрос с автоматическим TTL и отзывом. Это переносит модель с «один вечный пароль» на «эфемерные креды», резко снижая ущерб от утечки.

      **Ротация.** Секреты должны меняться — планово и при инциденте. Чтобы ротация не требовала рестарта, приложение не должно кэшировать секрет навечно:
      - читать из файла/менеджера и поддерживать **hot reload** (следить за файлом через `fsnotify`, периодически перечитывать, или подписка Vault);
      - для БД — короткоживущие динамические креды с overlap-окном (старые и новые валидны в переходный период), чтобы не было downtime;
      - хранить не сам секрет, а провайдер, отдающий *актуальное* значение по запросу.
  - level: deep
    text_md: |
      **Секреты в логах и паниках — недооценённый вектор.**
      - **Дамп конфига**: `log.Printf("%+v", cfg)` со структурой, где лежит `Password string`, выведет секрет в лог. Защита — обёртка-тип, который редактирует себя при форматировании:
        ```go
        type Secret string
        func (Secret) String() string        { return "[REDACTED]" }
        func (Secret) GoString() string      { return "[REDACTED]" }   // для %#v
        func (Secret) MarshalJSON() ([]byte, error) { return []byte(`"[REDACTED]"`), nil }
        // доступ к настоящему значению — через явный метод, напр. .Reveal()
        ```
        Тогда `%v`, `%+v`, `%#v`, JSON-логгер и трейсер увидят `[REDACTED]`, а не секрет.
      - **Паники и стектрейсы**: значение аргумента/поля может попасть в стек-трейс или в отправку в Sentry — тот же тип-редактор закрывает и это. Для `log/slog` — `ReplaceAttr`, вычищающий поля вроде `password`, `token`, `authorization`.
      - **Секреты в URL** (`postgres://user:pass@host/db`, `?api_key=...`) утекают в access-логи прокси и трейсы — храните креды отдельно от URL или редактируйте перед логированием.

      **`.env` в Docker-образе.** Две отдельные ошибки:
      1. `COPY . .` затягивает `.env` в слой образа — он навсегда в истории слоёв (`docker history`, `docker save`), доступен всякому, кто вытянет образ. Лечится `.dockerignore` (`**/.env`) и отсутствием секретов в build-контексте.
      2. `ENV DB_PASSWORD=...` в Dockerfile — секрет виден в `docker inspect`/config образа и всем, кто запустит контейнер. Секреты подавать **в рантайме** (`--env-file` на запуске, k8s Secret, смонтированный файл), а для build-time секретов — `RUN --mount=type=secret` (BuildKit), который **не** сохраняется в слой.

      **Тонкости для staff:**
      - Утёкший секрет нужно **ротировать**, а не «удалять из git» — история и форки его сохранят; сканеры (`gitleaks`, `trufflehog`) в pre-commit/CI ловят коммиты с секретами.
      - Least privilege: ключ должен иметь минимум прав и область (scope), чтобы утечка была ограничена; отдельные креды на окружение.
      - Аудит и алерты на доступ к секретам (Vault audit log) — чтобы заметить компрометацию.
      - `os.Environ()`, переданный в `exec.Cmd` без фильтрации, утечёт секреты в сторонний процесс — передавайте детям только нужное подмножество через `cmd.Env`.
