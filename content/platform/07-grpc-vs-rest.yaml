slug: grpc-vs-rest
section: platform
title: "gRPC vs REST: когда что выбирать"
difficulty: middle
tags: [grpc, rest]
question_md: |
  В чём принципиальные различия gRPC и REST/JSON как способов общения между
  сервисами, какие типы вызовов поддерживает gRPC, и в каких ситуациях
  выбирают один подход, а в каких — другой?
answer_levels:
  - level: middle
    text_md: |
      gRPC работает поверх HTTP/2 и использует Protocol Buffers (protobuf) —
      бинарный формат сериализации с кодогенерацией: контракт описывается
      в `.proto`-файле, из которого генерируются клиент и сервер на нужном
      языке, что даёт строгую типизацию и меньше ручного кода по сравнению с
      написанием REST-хендлеров и DTO вручную. REST/JSON — текстовый формат
      поверх HTTP/1.1 или HTTP/2, человекочитаемый, легко дебажится curl'ом
      или браузером, кэшируется стандартными HTTP-механизмами (`ETag`,
      `Cache-Control`) и естественно потребляется фронтендом без
      дополнительных библиотек. gRPC поддерживает 4 типа вызовов: unary
      (обычный запрос-ответ), server-streaming (один запрос — поток
      ответов), client-streaming (поток запросов — один ответ) и
      bidirectional streaming (оба потока независимы). Для внутренних
      сервисов внутри дата-центра с высокими требованиями к latency и
      пропускной способности чаще выбирают gRPC, для публичного API,
      обращения из браузера или интеграций с внешними партнёрами — REST,
      потому что это более универсальный и знакомый интерфейс.
  - level: senior
    text_md: |
      HTTP/2 даёт gRPC мультиплексирование — множество параллельных
      запросов по одному TCP-соединению без head-of-line blocking на
      уровне приложения (в отличие от HTTP/1.1, где по факту нужен пул
      соединений), что снижает накладные расходы на установление соединений
      между микросервисами. Protobuf компактнее JSON за счёт бинарной
      кодировки с тегами полей вместо текстовых имён и отсутствия
      избыточных символов разметки, что снижает трафик и CPU на
      сериализацию — заметно на больших объёмах внутреннего трафика.

      Deadlines в gRPC — часть протокола, а не соглашение приложения:
      клиент передаёт `grpc-timeout` в метаданных запроса, и это значение
      автоматически уменьшается и прокидывается через всю цепочку вызовов
      (`context.Context` с deadline в Go-реализации), так что промежуточный
      сервис знает, сколько времени у него осталось, и может сам решить не
      начинать дорогую операцию, если бюджет времени уже истёк — это
      системно предотвращает ситуацию, когда сервис продолжает работать над
      запросом, от которого клиент уже отказался. В REST аналог (таймауты,
      `context` в HTTP-клиенте) — соглашение приложения, которое нужно
      реализовывать вручную на каждом хопе.

      ```protobuf
      service OrderService {
        rpc GetOrder(GetOrderRequest) returns (Order);
        rpc StreamOrderUpdates(StreamRequest) returns (stream OrderEvent);
      }
      ```

      ```go
      ctx, cancel := context.WithTimeout(ctx, 200*time.Millisecond)
      defer cancel()
      resp, err := client.GetOrder(ctx, &pb.GetOrderRequest{Id: id})
      if st, ok := status.FromError(err); ok && st.Code() == codes.DeadlineExceeded {
          // бюджет времени истёк — не ретраим бесконечно
      }
      ```

      gRPC-Web — прослойка (обычно через proxy типа Envoy), позволяющая
      браузеру ходить в gRPC-сервисы, потому что нативно браузер не может
      управлять HTTP/2 trailers, на которых основан стандартный gRPC-протокол;
      это добавляет инфраструктурную сложность, поэтому для публичных
      браузерных клиентов чаще проще остаться на REST/JSON или GraphQL,
      если не стоит задача именно унифицировать контракт с внутренними
      gRPC-сервисами.
  - level: deep
    text_md: |
      Коды статусов — ещё одно структурное отличие: gRPC определяет
      небольшой фиксированный набор (`OK`, `CANCELLED`, `INVALID_ARGUMENT`,
      `NOT_FOUND`, `ALREADY_EXISTS`, `PERMISSION_DENIED`, `RESOURCE_EXHAUSTED`,
      `FAILED_PRECONDITION`, `UNAVAILABLE`, `DEADLINE_EXCEEDED` и другие) с
      чёткой машинно-понятной семантикой, предназначенной именно для
      программной обработки клиентом (retry-логика может однозначно решить,
      стоит ли повторять запрос по коду `UNAVAILABLE`, но не по
      `INVALID_ARGUMENT`). REST не имеет единого стандарта для error body —
      HTTP-коды (404, 409, 422, 503) грубее и чаще дополняются
      произвольным JSON-телом ошибки, что требует договорённостей внутри
      команды или следования неформальным стандартам типа RFC 7807
      (Problem Details).

      Контрактная эволюция: protobuf проектировался с обратной
      совместимостью как основным сценарием — добавление нового поля с
      новым номером не ломает старых клиентов (они его просто
      игнорируют), удаление поля требует зарезервировать его номер
      (`reserved`), чтобы он не был случайно переиспользован с другим
      типом. В REST аналогичная дисциплина версионирования (`/v1/`, `/v2/`
      в пути, либо расширение JSON новыми optional-полями) держится только
      на конвенции команды, а не на инструментарии кодогенерации.

      На производительность бинарной сериализации нельзя полагаться
      слепо: для очень маленьких сообщений overhead protobuf (тэги полей,
      varint-кодирование) может оказаться сравним с компактным JSON, а
      настоящий выигрыш gRPC проявляется в первую очередь на
      мультиплексировании соединений и потоковой передаче, а не только на
      формате данных — поэтому для нагруженного fan-out между
      микросервисами внутри одного дата-центра выигрыш системный
      (меньше соединений, меньше latency на установление TLS-хендшейков
      при переиспользовании HTTP/2-соединения), а не просто «protobuf
      быстрее JSON» в вакууме. Итоговое эвристическое правило у больших
      компаний (Google, Netflix): gRPC — язык внутренних сервисов,
      REST/GraphQL — язык edge/BFF слоя, обращённого к вебу и мобильным
      клиентам, с трансляцией между протоколами на границе (API gateway).
