slug: observability-logging-metrics-tracing
section: platform
title: "Observability: логи, метрики, трейсинг, pprof"
difficulty: middle
tags: [observability, prometheus]
question_md: |
  Что входит в «три столпа observability» — логи, метрики, трейсинг — как
  их реализовать в Go-сервисе (`slog`, Prometheus, OpenTelemetry), и как
  безопасно использовать `pprof` в продакшене?
answer_levels:
  - level: middle
    text_md: |
      Три столпа observability: логи (structured logging — детальные
      записи о конкретных событиях с контекстом), метрики (агрегированные
      числовые ряды во времени — сколько запросов, какая latency, сколько
      ошибок) и трейсинг (путь одного запроса через несколько сервисов с
      временными метками на каждом шаге). С Go 1.21 в стандартной
      библиотеке появился `log/slog` — structured logging с уровнями
      (`Debug`, `Info`, `Warn`, `Error`) и произвольными полями вместо
      неструктурированной строки, что позволяет искать и агрегировать логи
      по полям (`user_id`, `request_id`) в системах вроде Elasticsearch/Loki.
      Для метрик в Go-экосистеме стандарт — `client_golang` от Prometheus:
      сервис инкрементирует счётчики и записывает значения в коде, а
      Prometheus сам приходит и забирает их по HTTP-эндпоинту `/metrics`
      (pull-модель). `net/http/pprof` — встроенный пакет для профилирования
      живого процесса: подключается импортом `_ "net/http/pprof"` и даёт
      эндпоинты для снятия профилей CPU, памяти и горутин без остановки
      сервиса.
  - level: senior
    text_md: |
      Prometheus предоставляет четыре основных типа метрик: counter
      (монотонно растущее значение, например число запросов —
      анализируется через `rate()` в PromQL, никогда не уменьшается сам,
      только сбрасывается при перезапуске процесса), gauge (значение,
      которое может расти и падать — текущее число открытых соединений,
      размер очереди), histogram (распределение значений по заранее
      заданным бакетам — например, latency запросов, позволяет посчитать
      перцентили через `histogram_quantile()` на стороне Prometheus по
      агрегированным bucket-данным со всех инстансов) и summary (похож на
      histogram, но перцентили считаются на клиенте и не агрегируются
      между инстансами — из-за этого ограничения histogram обычно
      предпочтительнее в мультиинстансных сервисах). Две методологии
      выбора метрик: RED (Rate, Errors, Duration — для сервисов, обычно
      применяется на уровне запросов/эндпоинтов) и USE (Utilization,
      Saturation, Errors — для ресурсов типа CPU, диска, пулов соединений).

      ```go
      var (
          httpDuration = prometheus.NewHistogramVec(prometheus.HistogramOpts{
              Name:    "http_request_duration_seconds",
              Buckets: prometheus.DefBuckets,
          }, []string{"method", "path", "status"})
      )

      func instrumented(next http.Handler) http.Handler {
          return http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {
              start := time.Now()
              rw := &statusRecorder{ResponseWriter: w, status: 200}
              next.ServeHTTP(rw, r)
              httpDuration.WithLabelValues(r.Method, r.URL.Path, strconv.Itoa(rw.status)).
                  Observe(time.Since(start).Seconds())
          })
      }
      ```

      `slog` в связке с трейсингом: корреляция логов по `trace_id`
      достигается добавлением его как поля в каждый вызов логгера через
      `logger.With("trace_id", span.SpanContext().TraceID().String())`, что
      позволяет по одному trace_id находить все логи всех сервисов,
      затронутых конкретным запросом, в централизованной системе логов.
      Distributed tracing через OpenTelemetry строится из span'ов — каждый
      span описывает одну операцию (HTTP-хендлер, вызов БД, вызов другого
      сервиса) с началом/концом/атрибутами, span'ы образуют дерево (root
      span → child spans), и контекст трейса передаётся между сервисами
      через HTTP-заголовок `traceparent` по стандарту W3C Trace Context.
  - level: deep
    text_md: |
      Опасность `pprof` в проде — не в самом профилировании (оно
      спроектировано с низким overhead и безопасно для CPU/heap профилей
      даже под нагрузкой), а в том, что `net/http/pprof` по умолчанию
      регистрирует хендлеры на `DefaultServeMux`, и если сервис случайно
      слушает на том же порту публично, `/debug/pprof/` становится
      доступен внешнему миру — это и утечка внутренней информации
      (структура кода, имена пакетов из стектрейсов), и вектор для DoS
      через дорогие профили (`/debug/pprof/profile?seconds=30` держит
      CPU профилирование 30 секунд по запросу). Правильная практика —
      поднимать pprof на отдельном internal-порту/маршруте, закрытом
      firewall'ом или mTLS, никогда не мешать его с публичным API роутером.
      Профили: `cpu` (сэмплирует стек каждые ~10мс, показывает, где тратится
      процессорное время), `heap` (снимок текущих аллокаций — inuse vs
      alloc_objects, для поиска утечек и лишних аллокаций), `goroutine`
      (текущие стеки всех горутин — незаменимо при подозрении на
      goroutine leak), `block` (где горутины блокируются на примитивах
      синхронизации, требует `runtime.SetBlockProfileRate`) и `mutex`
      (contention на мьютексах, `runtime.SetMutexProfileFraction`) — два
      последних выключены по умолчанию из-за overhead и включаются
      осознанно при расследовании конкретной проблемы производительности.

      Ловушка high cardinality в метриках — типичная причина падения
      Prometheus или взрывного роста памяти: если в label метрики попадает
      значение с неограниченным числом вариантов (`user_id`, полный URL с
      query-параметрами, UUID запроса), Prometheus создаёt отдельный
      time series на каждую уникальную комбинацию значений labels, и их
      число может вырасти на порядки — это называется cardinality explosion,
      и решается заменой высококардинальных значений на нормализованные
      категории (например, шаблон маршрута `/users/{id}` вместо
      реального `/users/12345`) либо переносом такой информации из метрик в
      трейсы/логи, где высокая кардинальность не создаёт системной
      проблемы (там это не time series, а отдельные записи).

      Связь трёх столпов на практике реализуется через exemplars
      (OpenTelemetry/Prometheus умеют прикреплять к конкретному замеру в
      histogram ссылку на конкретный trace_id этого запроса) — это
      позволяет из графика latency с аномальным хвостом сразу перейти в
      конкретный трейс, вызвавший этот хвост, не выполняя отдельный поиск
      по логам. Именно такая интеграция (metrics → traces → logs, объединённые
      trace_id) отличает зрелую observability-платформу от простого набора
      трёх несвязанных инструментов.
