slug: postgres-locks-deadlock
section: platform
title: "Блокировки и deadlock в PostgreSQL"
difficulty: senior
tags: [postgres, locks]
question_md: |
  Какие виды блокировок есть в PostgreSQL на уровне строк и таблиц, как
  возникает deadlock и что делает detector, и как использовать
  `SELECT ... FOR UPDATE SKIP LOCKED` для построения очереди задач на БД?
answer_levels:
  - level: middle
    text_md: |
      На уровне строк PostgreSQL поддерживает четыре режима: `FOR UPDATE`
      (эксклюзивная блокировка строки, блокирует конкурентные `UPDATE`,
      `DELETE` и любые другие `FOR UPDATE`/`FOR SHARE` на этой строке),
      `FOR NO KEY UPDATE` (слабее — не конфликтует с блокировкой ключевых
      колонок для внешних ключей), `FOR SHARE` (разделяемая блокировка,
      разрешает другим читать и ставить `FOR SHARE`, но блокирует запись) и
      `FOR KEY SHARE` (самая слабая, используется для проверки внешних
      ключей). На уровне таблиц — иерархия от `ACCESS SHARE` (обычный
      `SELECT`) до `ACCESS EXCLUSIVE` (`DROP TABLE`, большинство `ALTER
      TABLE`), где более сильные режимы конфликтуют с большим числом
      других режимов. Deadlock возникает, когда две транзакции ждут друг
      друга по циклу («A ждёт блокировку, которую держит B, а B ждёт
      блокировку, которую держит A»); PostgreSQL раз в `deadlock_timeout`
      (по умолчанию 1с) запускает detector, находит цикл и прерывает одну
      из транзакций с ошибкой `40P01`. Профилактика — всегда блокировать
      ресурсы в одном и том же порядке во всех транзакциях приложения.
  - level: senior
    text_md: |
      Практический пример deadlock: транзакция A делает
      `UPDATE accounts SET ... WHERE id = 1`, затем пытается обновить
      `id = 2`; в это же время транзакция B уже обновила `id = 2` и
      пытается обновить `id = 1`. Обе блокируются друг на друге — через
      `deadlock_timeout` detector строит wait-for graph по
      `pg_locks`/`pg_stat_activity`, находит цикл и убивает транзакцию,
      которая заняла его позже (или которую дешевле откатить), с сообщением
      вида `deadlock detected... Process N waits for ShareLock on
      transaction M`. Правило профилактики — единый порядок блокировок,
      например всегда сортировать id перед серией `UPDATE`:

      ```sql
      -- вместо блокировки в порядке прихода запроса — сначала сортируем
      UPDATE accounts SET balance = balance - 100
      WHERE id = (SELECT LEAST(1, 2));
      ```

      Advisory locks — блокировки, никак не связанные с конкретными
      строками, для распределённой координации на уровне приложения:
      `pg_advisory_lock(key)` — сессионная блокировка, живёт до явного
      `pg_advisory_unlock` или разрыва соединения; `pg_advisory_xact_lock(key)`
      — транзакционная, освобождается автоматически на `COMMIT`/`ROLLBACK`.
      Типичный кейс — гарантировать, что только один инстанс сервиса
      выполняет миграцию или cron-задачу одновременно.

      `SELECT ... FOR UPDATE SKIP LOCKED` — основа очередей задач на БД: не
      ждёт занятые строки, а пропускает их и берёт следующие свободные, что
      даёт нескольким воркерам разбирать одну таблицу-очередь без
      конкуренции за одни и те же строки:

      ```sql
      WITH next_job AS (
        SELECT id FROM jobs
        WHERE status = 'pending'
        ORDER BY created_at
        FOR UPDATE SKIP LOCKED
        LIMIT 1
      )
      UPDATE jobs SET status = 'processing'
      WHERE id = (SELECT id FROM next_job)
      RETURNING *;
      ```

      `FOR UPDATE NOWAIT` — альтернатива: вместо пропуска строки сразу
      возвращает ошибку, если строка занята, полезно, когда пропуск
      недопустим и нужно немедленно узнать о конфликте. `lock_timeout`
      ограничивает, сколько транзакция готова ждать любую блокировку,
      прежде чем прервётся с ошибкой — защита от «зависших» запросов,
      которые иначе ждали бы неограниченно долго.
  - level: deep
    text_md: |
      Иерархия табличных блокировок в PG (`ACCESS SHARE`, `ROW SHARE`,
      `ROW EXCLUSIVE`, `SHARE UPDATE EXCLUSIVE`, `SHARE`, `SHARE ROW
      EXCLUSIVE`, `EXCLUSIVE`, `ACCESS EXCLUSIVE`) заведена так, что каждый
      следующий уровень конфликтует с большим набором предыдущих; например
      `SHARE UPDATE EXCLUSIVE` (берётся `VACUUM`, `CREATE INDEX
      CONCURRENTLY`, некоторые `ALTER TABLE`) конфликтует сам с собой, но не
      с обычным чтением/записью — поэтому `CREATE INDEX CONCURRENTLY` можно
      гонять на живой таблице, а обычный `ALTER TABLE ... ADD COLUMN ...
      DEFAULT` до PG 11 требовал `ACCESS EXCLUSIVE` и полной перезаписи
      таблицы (с PG 11+ добавление колонки с константным `DEFAULT` — это
      только метаданные, без блокировки записи всей таблицы).

      Deadlock detector реализован не через постоянный мониторинг, а
      «ленивый»: когда бэкенд не может получить блокировку, он засыпает на
      `deadlock_timeout`, и только если за это время не проснулся сам
      (блокировка не освободилась), запускает построение wait-for графа по
      всем текущим ожиданиям в разделяемой памяти (`LockMethodData`).
      Это сознательный трейд-офф: полноценный детектор дорог, поэтому
      большинство блокировок разрешаются сами (простое ожидание) быстрее,
      чем `deadlock_timeout`, и граф строится только для действительно
      подвисших случаев — отсюда задержка примерно в 1с перед тем, как
      приложение узнает о deadlock, что нужно учитывать в SLA на таймауты
      транзакций.

      Долгие транзакции — системная угроza не только через блокировки, но
      и через `xmin horizon`: PostgreSQL не может очистить (`VACUUM`)
      версии строк, которые теоретически видны самой старой активной
      транзакции, даже если эта транзакция их не читает. Зависшая в
      состоянии `idle in transaction` сессия (например, забытый `BEGIN`
      без `COMMIT` в коде на Go при паническом выходе без `defer tx.Rollback()`)
      держит `xmin` неподвижным, из-за чего растёт bloat по всей базе, а не
      только по затронутым таблицам. Отсюда обязательное правило в
      Go-коде — `defer tx.Rollback()` сразу после успешного `BeginTx`, плюс
      мониторинг `pg_stat_activity.state = 'idle in transaction'` с
      `state_change` старше нескольких секунд и `idle_in_transaction_session_timeout`
      как защитный предохранитель на уровне сервера.
