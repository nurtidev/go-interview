slug: normalization-1nf-3nf-denormalization
section: platform
title: "Нормализация 1NF-3NF и осознанная денормализация"
difficulty: middle
tags: [normalization, schema-design, denormalization]
question_md: |
  Что такое нормальные формы 1NF, 2NF, 3NF — приведите примеры нарушений и
  исправления? Какие аномалии устраняет нормализация? Когда денормализация
  оправдана, чем она отличается от хранения исторического снапшота, и какие
  инструменты применяют вместо денормализации?
answer_levels:
  - level: middle
    text_md: |
      **Зачем.** Нормализация устраняет **аномалии** от избыточности: вставки
      (нельзя добавить сущность без связанной), удаления (удалив последнюю
      связанную строку, теряем данные о сущности), обновления (сменился телефон —
      правь его в тысяче строк). Принцип: каждый факт хранится ровно в одном месте.

      **1NF — атомарность.** Каждая ячейка — неделимое значение, никаких
      списков/массивов/повторяющихся групп в колонке.

      ```
      -- нарушение 1NF: список телефонов в одной ячейке
      user_id | phones
      1       | "+7777, +7888"
      ```

      Проблема: нельзя нормально фильтровать/индексировать. Исправление —
      отдельная строка на каждый телефон (таблица `user_phones`). Признаки
      нарушения: `tags VARCHAR = "a,b,c"`, колонки `phone1, phone2, phone3`.

      **2NF — нет частичных зависимостей.** Актуально только при **составном PK**:
      каждая неключевая колонка зависит от **всего** ключа, а не от части.

      ```
      -- PK (order_id, product_id); product_name зависит только от product_id
      order_id | product_id | quantity | product_name | product_price
      ```

      `product_name`/`product_price` зависят лишь от `product_id` — вынести в
      таблицу `products`.

      **3NF — нет транзитивных зависимостей.** Неключевая колонка не должна
      зависеть от другой неключевой.

      ```
      -- PK emp_id; dept_name зависит от dept_id, а не от emp_id
      emp_id | name | dept_id | dept_name | dept_location
      ```

      Цепочка `emp_id → dept_id → dept_name` — нарушение. Вынести отдел в
      `departments`. На собесе достаточно уверенно владеть 1NF-3NF.
  - level: senior
    text_md: |
      **Разбор исправлений.**

      2NF — выносим то, что зависит от части ключа:

      ```sql
      CREATE TABLE products (
        id    BIGINT PRIMARY KEY,
        name  VARCHAR(100) NOT NULL,
        price NUMERIC(10,2) NOT NULL
      );
      CREATE TABLE order_items (
        order_id   BIGINT NOT NULL REFERENCES orders(id),
        product_id BIGINT NOT NULL REFERENCES products(id),
        quantity   INT    NOT NULL,
        unit_price NUMERIC(10,2) NOT NULL,  -- цена на момент заказа: это ФАКТ заказа
        PRIMARY KEY (order_id, product_id)
      );
      ```

      Важный нюанс: `unit_price` в `order_items` — это **не** нарушение
      нормализации и **не** денормализация. Цена на момент покупки — самостоятельный
      факт заказа, который обязан быть зафиксирован; ссылаться на `products.price`
      нельзя, иначе изменение цены задним числом перепишет историю.

      3NF — выносим транзитивную зависимость:

      ```sql
      CREATE TABLE departments (
        id BIGINT PRIMARY KEY, name VARCHAR(100), location VARCHAR(100)
      );
      CREATE TABLE employees (
        id BIGINT PRIMARY KEY, name VARCHAR(100),
        dept_id BIGINT NOT NULL REFERENCES departments(id)
      );
      ```

      **BCNF** (кратко) — усиленная 3NF: для каждой зависимости `X → Y` левая
      часть `X` обязана быть суперключом. На практике большинство таблиц в 3NF уже
      в BCNF; нарушения редки (перекрывающиеся кандидатные ключи).

      **Денормализация — осознанный trade-off.** Нормализация — дефолт; денормализуют
      при **измеримой** проблеме:

      - JOIN по нескольким большим таблицам стал узким местом (есть метрики, а не
        «на всякий случай»).
      - Read >> Write, данные меняются редко.
      - Кешируемый агрегат (счётчик комментариев на посте вместо `COUNT(*)`
        каждый раз).

      Цена денормализации — **обязанность синхронно обновлять дубли** (иначе drift/
      рассинхрон). Поэтому чаще берут **инструменты вместо** ручной денормализации:
      **materialized views**, **Redis-кэш**, **CQRS** с отдельной read-моделью,
      предагрегация в ClickHouse. Они дают выигрыш без размазывания истины по
      таблицам.
  - level: deep
    text_md: |
      **Формально.** Функциональная зависимость `X → Y`: значение `X` однозначно
      определяет `Y`. **Транзитивная** — `A → B → C`, где `B`, `C` неключевые.
      **Многозначная зависимость** (4NF): один атрибут порождает независимое
      множество значений; если в одной таблице смешаны два независимых факта
      (навыки сотрудника и его проекты), их комбинации дают декартово раздувание —
      разносят в разные таблицы. **5NF** — теоретическая, на практике почти не
      применяется.

      **OLTP vs OLAP — разные дефолты.** В транзакционных системах нормализуют по
      умолчанию (защита от аномалий обновления). В аналитических (ClickHouse,
      Redshift, DWH) **намеренно денормализуют**: строят **star schema** — широкая
      fact-таблица + dimension-таблицы, а часто атрибуты измерений вклеивают прямо
      в факт, потому что JOIN по миллиардам строк дорог, а данные append-only и не
      меняются.

      **Осознанное нарушение 1NF — JSONB.** Хранить массив/объект в `JSONB`
      оправдано, когда атрибуты **разреженные/переменные** (у каждой сущности свой
      набор), читаются как единый блок, и по внутренним полям **не** нужны частые
      фильтрация/JOIN/агрегация. Если же по этим полям постоянно ищут — это
      возвращение к аномалиям 1NF, лучше нормальные колонки/таблицы (или GIN-индекс
      по jsonb как компромисс).

      **Поддержание целостности денормализованных данных.** Дублирующую колонку
      надо держать в согласии: триггеры в БД, обновление в той же транзакции на
      уровне приложения, либо пересчёт материализованного представления. Любой из
      путей добавляет сложность — поэтому денормализация это долг, который берут
      осознанно и под метрики.

      **Go-специфика.**
      - Чрезмерная нормализация в OLTP порождает **N+1**: тянем список, потом на
        каждую строку отдельный запрос за связью. Лечится JOIN/`IN (...)`/
        batch-загрузкой, а не денормализацией схемы.
      - Маппинг: нормализованные строки → структуры Go; для связей «один-ко-многим»
        аккуратно собирают агрегат в памяти (по `id`), а не делают запрос в цикле.
        `sqlx`/`pgx` умеют сканировать в срезы структур; для bulk — `pgx.CopyFrom`.
      - Денормализованные счётчики в Go-сервисе обновляют атомарно (в той же
        транзакции, что и основное изменение), иначе гонки дают расхождение.

      **Практическое правило:** нормализуй до 3NF по умолчанию; денормализуй
      точечно, под конкретную измеренную проблему, предпочитая materialized view /
      кэш / CQRS ручному дублированию; исторические снапшоты (цена, адрес на момент
      события) — это не денормализация, а фиксация факта.
