slug: redis-data-structures-distributed-lock
section: platform
title: "Redis: структуры данных, персистентность, распределённый лок"
difficulty: staff
tags: [redis, lock]
question_md: |
  Какие структуры данных предоставляет Redis и для каких задач их
  применяют, как устроена персистентность (RDB/AOF), почему Redis
  однопоточный по обработке команд, и как правильно (и с какими
  ограничениями) реализовать распределённый лок?
answer_levels:
  - level: middle
    text_md: |
      Redis хранит данные как набор структур: string (кэш значений,
      счётчики через `INCR`), hash (объект с полями, аналог небольшой
      записи — `HSET`/`HGETALL`), list (очередь/стек через `LPUSH`/`RPOP`),
      set (уникальные элементы, пересечения/объединения), sorted set —
      zset (элементы с числовым score, для лидербордов и очередей с
      приоритетом через `ZADD`/`ZRANGE`), bitmap (компактные флаги на
      миллионы пользователей через побитовые операции), HyperLogLog
      (приблизительный подсчёт уникальных элементов с фиксированной малой
      памятью, `PFADD`/`PFCOUNT`) и stream (лог событий с consumer group,
      похож на упрощённую Kafka, `XADD`/`XREADGROUP`). Персистентность
      обеспечивается снапшотами RDB (периодический полный дамп в файл) и/или
      AOF (append-only file — журнал всех команд записи, который можно
      переиграть). Redis обрабатывает команды в один поток (single-threaded
      event loop), что гарантирует атомарность каждой отдельной команды без
      явных локов и делает поведение предсказуемым, но означает, что
      долгая команда (например, `KEYS *` на большом датасете) блокирует
      весь сервер на время выполнения.
  - level: senior
    text_md: |
      RDB — компактный бинарный снапшот всего датасета на момент запуска
      (`SAVE`/`BGSAVE`, либо по правилам `save 900 1` в конфиге); `BGSAVE`
      форкает процесс и использует copy-on-write страниц памяти ОС, чтобы
      не блокировать основной event loop надолго. Минус RDB — при сбое
      между снапшотами теряются все изменения после последнего дампа. AOF
      логирует каждую операцию записи и позволяет настраивать `fsync`
      политику через `appendfsync`: `always` (fsync на каждую команду —
      минимальная потеря данных, но самая низкая пропускная способность),
      `everysec` (fsync раз в секунду — разумный компромисс, дефолт, при
      сбое теряется до секунды данных) и `no` (fsync отдаётся ОС — риск
      потерять больше при сбое ядра). Гибридный режим (RDB preamble в
      AOF-файле, `aof-use-rdb-preamble`) объединяет компактность RDB с
      полнотой AOF при `BGREWRITEAOF`. Для критичных данных используют
      `appendfsync always` или AOF + репликацию с `WAIT`, для чистого кэша
      персистентность часто не нужна вовсе.

      Распределённый лок на Redis строится на атомарной команде
      `SET key token NX PX ttl`: `NX` — установить только если ключа не
      существует (атомарный аналог compare-and-swap), `PX ttl` — TTL в
      миллисекундах, чтобы лок не остался навечно при крэше владельца,
      `token` — случайное уникальное значение, идентифицирующее конкретного
      владельца лока (не просто «1»), чтобы при освобождении можно было
      проверить, что снимает лок именно тот, кто его взял. Освобождение —
      не просто `DEL`, а атомарная проверка+удаление через Lua-скрипт
      (`EVAL`), потому что между проверкой владельца и удалением не должно
      быть гонки:

      ```lua
      -- release.lua
      if redis.call("GET", KEYS[1]) == ARGV[1] then
          return redis.call("DEL", KEYS[1])
      else
          return 0
      end
      ```

      ```go
      token := uuid.NewString()
      ok, err := rdb.SetNX(ctx, lockKey, token, 30*time.Second).Result()
      if err != nil || !ok {
          return errLockNotAcquired
      }
      defer releaseScript.Run(ctx, rdb, []string{lockKey}, token)
      ```
  - level: deep
    text_md: |
      Главная ловушка одиночного Redis-лока — TTL истекает раньше, чем
      завершится защищаемая работа: если обработка занимает дольше `ttl`,
      лок автоматически освобождается, второй клиент успешно берёт тот же
      лок, и теперь два владельца работают параллельно — именно та
      проблема, которую лок должен был предотвратить. Решение — watchdog
      (фоновая горутина, которая периодически продлевает TTL текущего
      владельца, пока работа не завершена, аналог механизма, который
      Redisson называет lock lease renewal), но и это не даёт полной
      гарантии: если процесс-владелец завис (например, STW GC пауза или
      блокировка на CPU) дольше, чем TTL, и не успел продлить — лок всё
      равно освободится под ним.

      Redlock — алгоритм от создателя Redis для получения лока на N
      независимых Redis-инстансах с кворумом (лок считается взятым, если
      получен на большинстве узлов в течение ограниченного времени) — был
      предложен как более надёжная альтернатива одному инстансу. Мартин
      Kleppmann в известном разборе показал, что Redlock не даёт гарантий
      корректности (safety) в общем случае: он защищает от одновременного
      **взятия** лока, но не от того, что клиент, чей лок формально истёк
      (из-за паузы GC, задержки сети, приостановки процесса/VM), продолжит
      считать себя владельцем и выполнит операцию после того, как лок уже
      достался другому — то есть Redlock решает проблему доступности и
      частично — производительности, но не заменяет строгую корректность,
      если ставки высоки (например, запись в файл или внешнюю систему без
      дополнительной защиты).

      Правильное решение для случаев, где корректность критична — fencing
      token: при каждом взятии лока (в том числе в Redlock и в одиночном
      Redis-локе) выдаётся монотонно возрастающий номер (можно через
      `INCR` на отдельном счётчике), и защищаемый ресурс (например,
      файловая система, БД) обязан отвергать операции со старым номером
      token, даже если клиент считает себя владельцем лока. Именно это
      даёт настоящую гарантию exclusivity, а не сам факт «я держу лок в
      Redis» — вывод Kleppmann: распределённый лок на Redis (или Redlock)
      годится как **оптимизация** (снизить дублирование работы, разгрузить
      систему), но не как единственный механизм **корректности** без
      fencing на стороне защищаемого ресурса. Отдельно стоит однопоточная
      модель Redis: она гарантирует, что сам `SET NX` и Lua-скрипт
      выполняются атомарно относительно других команд на **этом**
      инстансе, но ничего не говорит про согласованность между несколькими
      инстансами при сетевых партициях — именно та зона, где Redlock
      подвергается критике.
