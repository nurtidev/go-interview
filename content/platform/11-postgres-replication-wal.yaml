slug: postgres-replication-wal
section: platform
title: "PostgreSQL: WAL, streaming vs logical репликация, слоты и failover"
difficulty: senior
tags: [postgres, replication]
question_md: |
  Что такое WAL в PostgreSQL и зачем он нужен? Чем streaming (физическая) репликация отличается от logical, что такое sync vs async репликация, откуда берётся replication lag и как безопасно читать с реплик? Зачем нужны replication slots и как устроен failover?
answer_levels:
  - level: middle
    text_md: |
      **WAL (Write-Ahead Log)** — журнал упреждающей записи. Прежде чем изменить страницу данных на диске, PostgreSQL сначала пишет запись об изменении в WAL и сбрасывает её на диск (`fsync`). Это даёт **durability** (D в ACID): после `COMMIT` изменение гарантированно в журнале, и при падении сервер «проигрывает» WAL с последней контрольной точки (crash recovery), восстанавливая незаписанные в файлы данных страницы. Побочный, но огромный бонус: этот же поток WAL можно передать на другой сервер — так и работает репликация.

      **Репликация** — поддержание копии БД на другом сервере (standby/replica). Зачем: (1) отказоустойчивость — если падает primary, реплика становится новым primary (failover); (2) масштабирование чтения — тяжёлые SELECT'ы уводят на реплики; (3) бэкапы и аналитика без нагрузки на основную БД.

      Два вида:
      - **Streaming (физическая)** — реплика получает поток WAL-записей и применяет их байт-в-байт, оставаясь точной копией primary на уровне блоков. Реплика read-only (hot standby).
      - **Logical** — передаются не физические WAL-записи, а логические изменения строк (INSERT/UPDATE/DELETE) через publish/subscribe. Можно реплицировать отдельные таблицы, между разными версиями PG, в другую схему.
  - level: senior
    text_md: |
      **Sync vs async.** По умолчанию репликация **асинхронная**: primary коммитит транзакцию, не дожидаясь реплики — быстро, но при аварии primary последние транзакции, не долетевшие до реплики, теряются (ненулевой RPO). **Синхронная** репликация (`synchronous_commit = on` + `synchronous_standby_names`) заставляет primary ждать подтверждения от реплики перед возвратом `COMMIT` клиенту — нулевая потеря данных, но выше latency записи и риск: если синхронная реплика недоступна, коммиты на primary встают. Компромисс — `synchronous_commit` уровней (`remote_write`, `remote_apply`) и кворумная синхронная репликация (`ANY 1 (r1, r2, r3)`).

      **Replication lag.** Отставание реплики от primary — время/объём WAL, ещё не применённый на реплике. Растёт при пиковой записи, тяжёлых транзакциях, медленном диске/сети реплики, или когда долгий запрос на реплике конфликтует с применением WAL. Измеряется через `pg_stat_replication` (на primary: `write_lag`, `flush_lag`, `replay_lag`) и `pg_last_xact_replay_timestamp()` (на реплике).

      **Чтение с реплик — главная ловушка.** Из-за async-lag реплика показывает слегка устаревшие данные — это **eventual consistency**. Классический баг: приложение пишет на primary, тут же читает с реплики и не видит только что записанное (read-your-writes нарушен). Защита в Go-сервисе:

      ```go
      // Разводим пул на запись (primary) и чтение (replica)
      writeDB := mustOpen(primaryDSN)
      readDB := mustOpen(replicaDSN)

      // Правило: после записи в рамках той же логической операции
      // (нужен read-your-writes) — читаем с primary, не с реплики.
      ```

      Стратегии: критичные к свежести чтения (сразу после записи, баланс кошелька) — только с primary; терпимые к задержке (лента, поиск, отчёты) — с реплик. Продвинуто — учитывать LSN: запомнить LSN своей записи и читать с реплики, только если её `replay_lsn` уже дошёл до него.

      **Replication slots.** Слот — именованная точка на primary, которая **гарантирует, что WAL не будет удалён**, пока реплика/потребитель его не получит. Без слота primary может удалить (recycle) WAL-сегменты по `wal_keep_size`/checkpoint, и отставшая реплика «отвалится» с ошибкой «requested WAL segment already removed». Обратная сторона: если реплика умерла, а слот жив, WAL копится и переполняет диск primary (`max_slot_wal_keep_size` ограничивает это). Логическая репликация использует logical replication slots для декодирования.
  - level: deep
    text_md: |
      **Внутри WAL.** Журнал — последовательность записей, адресуемых **LSN (Log Sequence Number)** — монотонной позицией в потоке WAL. Данные пишутся сегментами (обычно 16 MB). Ключевой инвариант WAL: страница данных не сбрасывается на диск, пока соответствующая WAL-запись не зафиксирована (write-ahead). Контрольная точка (checkpoint) периодически сбрасывает грязные страницы и продвигает точку, с которой начнётся recovery. Есть тонкость `full_page_writes`: после checkpoint первая модификация страницы пишет её целиком в WAL (защита от torn pages), что раздувает WAL-трафик.

      **Как работает logical decoding.** Streaming шлёт физический WAL (примитивы уровня блоков — «в файле X, блоке Y изменить байты»), поэтому требует идентичной версии PG и реплицирует всё сразу. Logical replication использует **logical decoding**: плагин (встроенный `pgoutput`) декодирует физический WAL в логические изменения строк по слоту, publisher объявляет `PUBLICATION`, subscriber создаёт `SUBSCRIPTION`. Это фундамент CDC: Debezium подключается как логический потребитель слота и стримит изменения в Kafka. Ограничения logical: по умолчанию не реплицирует DDL, требует REPLICA IDENTITY для UPDATE/DELETE, тяжёлые начальные снапшоты.

      **Failover — детально.** При падении primary одну из реплик **промоутят** (`pg_promote()` / `pg_ctl promote`) в новый primary. Проблемы, которые решает продовый failover: (1) *кто решает и когда* — ручной промоут рискует «двойным primary» (split-brain), когда старый primary воскрес; поэтому используют оркестраторы — **Patroni** (на etcd/Consul/ZooKeeper для распределённого консенсуса и лидер-лока), repmgr, pg_auto_failover; (2) *fencing* — старый primary надо гарантированно изолировать/остановить, иначе два узла принимают записи; (3) *переключение трафика* — приложение должно узнать новый primary: через VIP, HAProxy/pgbouncer, service discovery или запись в DCS; (4) *timeline* — после промоута ветка WAL получает новый timeline ID, и остальные реплики должны переключиться на неё (`pg_rewind` для возврата старого primary в кластер без полного recopy).

      **Метрики RPO/RTO.** Async-репликация: RPO > 0 (можно потерять последние транзакции), RTO зависит от скорости детекта+промоута. Sync-репликация: RPO = 0, но latency записи выше и доступность записи падает при потере кворума синхронных реплик — вечный trade-off CAP на уровне репликации. Практический дефолт большинства систем — async + кворумный failover через Patroni, sync-реплику держат только для данных, где потеря транзакции недопустима (платежи).
