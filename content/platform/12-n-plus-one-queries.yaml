slug: n-plus-one-queries
section: platform
title: "Проблема N+1: как возникает в Go, как найти и как чинить"
difficulty: middle
tags: [postgres, performance]
question_md: |
  Что такое проблема N+1 запросов, как она типично возникает в Go-коде? Как её обнаружить (логи, pg_stat_statements)? Какие есть решения — JOIN, IN/ANY, dataloader-паттерн, батчинг — и когда N+1 на самом деле приемлем?
answer_levels:
  - level: middle
    text_md: |
      **N+1** — антипаттерн, когда вместо одного запроса код делает 1 запрос за списком сущностей, а затем ещё по одному запросу на каждую из N сущностей за связанными данными. Итого N+1 обращений к БД вместо 1–2.

      Классика в Go — цикл с запросом внутри:

      ```go
      // 1 запрос: получить заказы
      orders, _ := db.Query(ctx, "SELECT id, user_id FROM orders WHERE ...")

      for _, o := range orders {
          // +1 запрос НА КАЖДЫЙ заказ — это и есть N+1
          user := db.QueryRow(ctx, "SELECT name FROM users WHERE id = $1", o.UserID)
          // ...
      }
      ```

      Почему это больно: каждый запрос — это сетевой round-trip к БД (даже если сам запрос по индексу быстрый). 500 заказов → 501 round-trip; при RTT 1 мс это уже 0.5 с только на «сеть», не считая нагрузки на пул соединений и БД. На локали в тестах незаметно, в проде под нагрузкой — деградация и исчерпание connection pool.

      Базовое решение — вытащить всех связанных за один запрос по списку id, а потом связать в памяти (JOIN или `IN`), вместо запроса в цикле.
  - level: senior
    text_md: |
      **Как обнаружить.**

      - *Логи запросов.* Включить логирование SQL (в самом сервисе через обёртку/трейсер, или в PostgreSQL `log_min_duration_statement = 0`) — в логах виден повторяющийся один и тот же запрос с разными параметрами N раз подряд на один HTTP-запрос. Самый быстрый способ поймать N+1.
      - *`pg_stat_statements`* — расширение, агрегирующее статистику по нормализованным запросам: `SELECT query, calls, total_exec_time FROM pg_stat_statements ORDER BY calls DESC`. Запрос с аномально большим `calls` относительно числа бизнес-операций — кандидат в N+1.
      - *Трейсинг* (OpenTelemetry): на спане HTTP-запроса видно N дочерних db-спанов одного вида — визуально очевидный N+1.

      **Решения.**

      1. *JOIN* — если связанные данные нужны вместе, тянем одним запросом:

      ```sql
      SELECT o.id, o.total, u.name
      FROM orders o JOIN users u ON u.id = o.user_id
      WHERE o.created_at > $1;
      ```

      2. *IN / ANY (двухфазная загрузка)* — собрать id из первого запроса и догрузить связанные одним запросом по списку. В Go с pgx удобно через `ANY($1)` и массив (не строить строку через конкатенацию — это SQL-инъекция):

      ```go
      ids := make([]int64, len(orders))
      for i, o := range orders {
          ids[i] = o.UserID
      }
      rows, _ := db.Query(ctx,
          `SELECT id, name FROM users WHERE id = ANY($1)`, ids) // 1 запрос вместо N
      byID := map[int64]string{}
      // ... заполняем map и джойним в памяти
      ```

      `ANY($1)` с массивом обычно предпочтительнее `IN (...)` с переменным числом плейсхолдеров: план запроса стабилен, нет риска раздуть число параметров.

      3. *Dataloader-паттерн* — актуален для GraphQL/резолверов, где нельзя заранее собрать все id. Загрузчик копит запрошенные ключи в пределах «тика» и выполняет один батч-запрос `WHERE id = ANY(...)`, кэшируя результат в рамках запроса. Убирает N+1, порождаемый независимыми резолверами.

      4. *Батчинг* — pgx умеет `pgx.Batch` (несколько запросов одним round-trip'ом по протоколу); полезно, когда запросы разнородные, но их надо отправить вместе.
  - level: deep
    text_md: |
      **Когда N+1 приемлем.** Не всякий цикл с запросом — зло; иногда лечение хуже болезни:

      - *Малое и ограниченное N.* Если N гарантированно 1–5 (например, у сущности максимум пара связанных записей), N+1 из 3 запросов проще и читаемее, чем громоздкий JOIN, и разница в latency ничтожна. Оптимизировать стоит по данным профиля, а не превентивно.
      - *JOIN раздувает результат (декартово произведение).* Одна из ловушек «наивного лечения»: заменяя N+1 на JOIN с несколькими one-to-many связями, получаем взрывной рост строк (order × items × payments) — БД гоняет и сеть тащит дублированные данные родителя. Тут двухфазная загрузка через `ANY($1)` (родители одним запросом, дети другим, склейка в памяти) часто *быстрее* одного «умного» JOIN.
      - *Разные источники.* Если связанные данные лежат в другом сервисе/БД/кэше, JOIN невозможен в принципе — остаётся батч по id.

      **Скрытые формы N+1 в Go.** (1) *ORM lazy loading* — GORM с `Preload` без указания связей или ленивая подгрузка ассоциаций тихо генерирует N+1; явный `Preload`/`Joins` или ручной батч решают. (2) *N+1 внутри маппинга* — код, который в цикле сканирования строк дергает вспомогательный запрос (проверку прав, счётчик). (3) *N+1 по вложенным уровням* — заказы → для каждого товары → для каждого товара категория: получается N+M+... , каждый уровень надо батчить отдельно. (4) *Скрытый N+1 через сервисный слой* — метод `GetUser(id)` внутри выглядит невинно, но вызванный в цикле даёт тот же эффект; проблема не в SQL, а в том, где стоит цикл.

      **Практика приоритезации.** Не оптимизируйте вслепую: сначала `pg_stat_statements`/трейс показывает *реальный* топ по `calls * mean_time`, и уже туда прицельно применяете JOIN или батч. Ключевая мысль для собеса: N+1 — это про **число round-trip'ов к БД**, а не про сложность отдельного запроса; иногда 1 более тяжёлый батч-запрос по индексу радикально быстрее сотни лёгких из-за экономии на latency и на давлении на connection pool.
