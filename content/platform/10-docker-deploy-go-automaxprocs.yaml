slug: docker-deploy-go-automaxprocs
section: platform
title: "Деплой Go-сервиса: multi-stage, distroless, GOMAXPROCS"
difficulty: middle
tags: [docker, deploy]
question_md: |
  Как правильно собрать production-образ Go-сервиса через multi-stage
  build, почему в контейнере нужно явно настраивать `GOMAXPROCS` и
  `GOMEMLIMIT`, и на что обратить внимание при выборе базового образа?
answer_levels:
  - level: middle
    text_md: |
      Multi-stage build использует две (или больше) стадии в одном
      Dockerfile: первая (`builder`) содержит полный набор инструментов
      для компиляции (Go toolchain, зависимости), вторая — минимальный
      runtime-образ, в который копируется только готовый бинарник. Это
      резко уменьшает размер финального образа, потому что компилятор,
      кэш модулей и промежуточные файлы не попадают в него. Для Go важно
      собирать статический бинарник с `CGO_ENABLED=0`, чтобы он не
      зависел от системных `.so`-библиотек и мог запускаться в минимальном
      окружении вроде `scratch` или `distroless`, где вообще нет
      стандартной libc/shell. `alpine` — компромиссный вариант с маленьким
      размером, но использует `musl libc` вместо `glibc`, что иногда
      создаёт скрытые проблемы совместимости с CGO-зависимым кодом и
      резолвингом DNS. `GOMAXPROCS` определяет, сколько ОS-потоков
      планировщик Go может использовать параллельно для выполнения
      горутин — по умолчанию равен числу логических ядер, видимых
      рантайму.
  - level: senior
    text_md: |
      ```dockerfile
      # syntax=docker/dockerfile:1
      FROM golang:1.22 AS builder
      WORKDIR /src
      COPY go.mod go.sum ./
      RUN go mod download
      COPY . .
      RUN CGO_ENABLED=0 GOOS=linux go build -ldflags="-s -w" -o /app ./cmd/server

      FROM gcr.io/distroless/static-debian12:nonroot
      COPY --from=builder /app /app
      USER nonroot:nonroot
      EXPOSE 8080
      HEALTHCHECK --interval=10s --timeout=2s CMD ["/app", "-healthcheck"]
      ENTRYPOINT ["/app"]
      ```

      Ключевая ловушка `GOMAXPROCS` в контейнерах: до появления
      cgroup-aware рантайма Go читал `/proc/cpuinfo`/`sched_getaffinity` и
      видел **все** ядра хост-машины, даже если контейнеру через
      `--cpus`/`resources.limits.cpu` в Kubernetes выделена лишь доля
      ядра (например, `500m` — половина ядра). Рантайм в этом случае
      выставляет `GOMAXPROCS` равным полному числу ядер хоста (скажем, 32
      на большой ноде), запускает избыточное число P (processor,
      структура планировщика GMP), что при упоре в CPU-throttling
      (cgroup CFS quota) приводит к частым принудительным паузам всего
      процесса — throttling — и росту latency и p99, даже когда суммарно
      CPU не исчерпан: планировщик просто создаёт больше готовых к запуску
      горутин, чем реально доступно квоты, и они конкурируют внутри
      урезанного окна CFS. Библиотека `go.uber.org/automaxprocs` в `init()`
      читает cgroup limits (`cpu.max` в cgroup v2 или `cpu.cfs_quota_us`/
      `cpu.cfs_period_us` в cgroup v1) и выставляет `GOMAXPROCS` в
      соответствии с реально доступной долей CPU. По умолчанию округление
      идёт вниз (`math.Floor`, `DefaultRoundFunc`) с нижней границей 1:
      при лимите `1500m` получится `GOMAXPROCS=1` (не 2), а при `500m` —
      `floor(0.5) = 0`, что поднимается до минимума в 1 ядро. Это устраняет
      throttling-паузы без изменения кода приложения:

      ```go
      import _ "go.uber.org/automaxprocs"

      func main() {
          // GOMAXPROCS уже выставлен корректно на момент старта main
      }
      ```

      Версионная оговорка: начиная с Go 1.25, рантайм сам стал
      cgroup-aware по умолчанию — он читает CPU-лимит cgroup (`cpu.max`/
      CFS quota) и выставляет `GOMAXPROCS` без сторонних библиотек. Поэтому
      описанная выше ловушка актуальна в первую очередь до появления
      cgroup-aware рантайма, то есть для Go ≤ 1.24; на Go 1.25+
      `go.uber.org/automaxprocs` в основном избыточен, хотя его ещё можно
      использовать ради более тонкого контроля округления или для
      кодовой базы, которая должна собираться и более старыми версиями Go.
  - level: deep
    text_md: |
      С Go 1.19 добавлена runtime-настройка `GOMEMLIMIT` (soft memory
      limit) — она указывает сборщику мусора желаемый верхний предел
      суммарного использования памяти рантаймом, после превышения которого
      GC начинает работать агрессивнее (даже за пределами обычного
      GOGC-триггера), чтобы не допустить настоящего OOM. Это особенно
      важно в контейнерах: `runtime.GOMAXPROCS` решает проблему CPU-квоты,
      а `GOMEMLIMIT` — аналогичную проблему для `memory.max` в cgroup:
      без него Go ориентируется только на `GOGC` (по умолчанию рост кучи
      вдвое между циклами GC), что при небольшом cgroup memory limit может
      привести к тому, что реальное потребление памяти процесса превысит
      лимит контейнера до того, как GC успеет сработать — и ядро убьёт
      процесс через OOM killer (`SIGKILL`, необрабатываемый) без единого
      шанса на graceful shutdown. Практическая рекомендация — выставлять
      `GOMEMLIMIT` в 80-90% от cgroup memory limit, оставляя запас на
      off-heap память рантайма (стеки горутин, память самого GC, mmap'ы),
      сегодня это можно делать и программно через
      `debug.SetMemoryLimit`, либо автоматически через
      `go.uber.org/automaxprocs`-подобные библиотеки, читающие cgroup
      memory limit (например, `KumKeeHyun/gomemlimit` или ручной парсинг
      `/sys/fs/cgroup/memory.max`).

      Тонкости выбора базового образа глубже, чем просто «маленький
      размер»: `scratch` — вообще ничего, ни shell, ни CA-сертификатов, ни
      `/etc/passwd` — если бинарнику нужен TLS к внешним HTTPS-эндпоинтам,
      придётся вручную скопировать `ca-certificates.crt` из builder-стадии
      (`COPY --from=builder /etc/ssl/certs/ca-certificates.crt ...`), иначе
      верификация сертификатов будет падать. `distroless` (`static` или
      `static-debian12`) даёт чуть больше — базовые сертификаты и
      `/etc/passwd` с непривилегированным пользователем `nonroot`, при этом
      всё ещё нет shell, что снижает поверхность атаки (нельзя выполнить
      `docker exec sh` для отладки, но и нельзя выполнить произвольную
      команду через RCE-эксплойт в самом приложении). `alpine` даёт shell и
      пакетный менеджер для дебага, но `musl libc` имеет отличия от `glibc`
      в резолвинге DNS (например, историческая проблема с
      `getaddrinfo`/round-robin DNS в некоторых версиях, приводившая к
      неполному разрешению всех A-записей) и в поведении при статической
      линковке C-библиотек, если где-то в зависимостях всё же используется
      cgo — поэтому для чистого `CGO_ENABLED=0` бинарника `distroless`
      обычно предпочтительнее и безопаснее, чем `alpine`, если не нужен
      shell внутри контейнера для операционных задач. Непривилегированный
      пользователь (`USER nonroot` или числовой UID без записи в
      `/etc/passwd`) и read-only корневой файловый слой
      (`securityContext.readOnlyRootFilesystem` в Kubernetes) — стандартные
      требования security-хардненинга, которые ограничивают ущерб при
      компрометации процесса внутри контейнера.
