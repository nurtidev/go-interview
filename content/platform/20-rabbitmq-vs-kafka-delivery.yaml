slug: rabbitmq-vs-kafka-delivery
section: platform
title: "RabbitMQ vs Kafka: очередь vs лог, доставка, роутинг"
difficulty: senior
tags: [rabbitmq, kafka, messaging]
question_md: |
  Чем принципиально различаются RabbitMQ и Kafka: модель «очередь vs
  распределённый лог», push vs pull, что происходит с сообщением после
  обработки, как устроены гарантии доставки и роутинг? По каким критериям
  выбирать одно или другое под конкретную задачу?
answer_levels:
  - level: middle
    text_md: |
      **Две разные парадигмы.**
      - **RabbitMQ** — брокер сообщений (AMQP): *умный брокер, простой
        потребитель*. Producer шлёт в **exchange**, тот по **bindings**
        маршрутизирует в **очереди**, из очереди читает consumer. Сообщение
        живёт до **ACK** и после подтверждения **удаляется**. Модель **push**:
        брокер сам толкает сообщения потребителю.
      - **Kafka** — распределённый **лог**: *простой брокер, умный потребитель*.
        Топик разбит на **партиции** — упорядоченный append-only лог. Сообщения
        **хранятся** заданное время (retention), **независимо** от того, прочитал
        их кто-то или нет. Модель **pull**: потребитель сам вычитывает и сам
        помнит свою позицию (**offset**).

      **Что с сообщением после обработки.** RabbitMQ: удалено после ACK, перечитать
      нельзя. Kafka: остаётся в логе, можно перечитать с любого offset (**replay**) —
      хоть с начала, хоть новым потребителем.

      **Роутинг.** RabbitMQ гибкий: `direct` (точный routing key), `fanout`
      (всем очередям, pub/sub), `topic` (wildcards `*`/`#`), `headers`. Kafka —
      только топик + партиция; ключ сообщения хэшируется и определяет партицию
      (так достигается порядок «по ключу»).

      **Доставка.** Обе по умолчанию дают **at-least-once** (возможны дубли,
      бизнес-логика должна быть идемпотентна). Exactly-once сложнее и не
      бесплатно.

      **Грубо когда что:** RabbitMQ — очереди задач, сложный роутинг, RPC,
      ретраи/приоритеты, средние объёмы, низкая latency. Kafka — потоки событий,
      реплей, event sourcing, огромный throughput, много независимых потребителей
      одного потока.
  - level: senior
    text_md: |
      **Очередь vs лог — ключевое следствие.**
      - RabbitMQ: несколько потребителей на одной очереди — **конкурирующие
        (competing consumers)**, сообщение достаётся **одному** из них,
        балансировка задач. Порядок гарантирован в рамках очереди, но
        `requeue`/переотправка и `prefetch` могут его нарушить.
      - Kafka: **consumer group** делит партиции между потребителями, каждая
        партиция — ровно одному потребителю группы. Порядок — **внутри партиции**.
        Число «полезных» потребителей ≤ числу партиций. Разные группы читают один
        топик **независимо**, каждая со своим offset.

      **Гарантии доставки — детали.**
      - RabbitMQ: **publisher confirms** (брокер подтвердил приём) + **consumer
        ack** (обработано) = at-least-once. `nack(requeue=true)` — вернуть в
        очередь; `nack(requeue=false)` или истёкший TTL → **Dead Letter
        Exchange** (DLX) → DLQ. Ретраи с задержкой строят цепочкой TTL+DLX.
        `durable`-очередь + `persistent`-сообщение переживают рестарт брокера.
      - Kafka: `acks=all` + `min.insync.replicas` — лидер ждёт запись в реплики
        из ISR (надёжность). Порядок at-least-once: обработать → закоммитить
        offset (при крэше между — повтор). Auto-commit ненадёжен (коммит по
        таймеру независимо от обработки).

      **Throughput и latency.** Kafka заточен на пропускную способность
      (последовательная запись на диск, батчинг, zero-copy, партиции =
      параллелизм) — миллионы msg/s. RabbitMQ — сотни тысяч msg/s, но обычно
      ниже latency и богаче логика на одно сообщение.

      **Prefetch/QoS (RabbitMQ)** — сколько сообщений брокер отдаёт потребителю
      без ACK; регулирует баланс throughput/равномерность. **Consumer lag
      (Kafka)** — отставание offset группы от конца лога, ключевая метрика
      здоровья.

      **Go-клиенты:** RabbitMQ — `rabbitmq/amqp091-go` (confirms, `Qos`, ручной
      ack). Kafka — `segmentio/kafka-go` (чистый Go, простой), `IBM/sarama`
      (transactional producer, EOS), `confluent-kafka-go` (cgo над librdkafka).
  - level: deep
    text_md: |
      **Семантика доставки до дна.**
      - **RabbitMQ exactly-once** как таковой брокер не даёт: publisher confirms
        защищают от потери на публикации, но при ретрае публикации возможен дубль;
        consumer ack защищает от потери на обработке, но при крэше после обработки
        до ack — повтор. Итог всегда at-least-once + **идемпотентность на стороне
        бизнес-логики** (дедуп по `message_id`). **Quorum queues** (на Raft)
        заменили старые mirrored queues и дают надёжную репликацию очереди между
        узлами.
      - **Kafka EOS (exactly-once semantics)** — не «из коробки», а комбинацией:
        **идемпотентный producer** (`enable.idempotence=true`, дедуп по producer
        id + sequence на брокере) + **транзакции** (`transactional.id`, атомарная
        запись в несколько партиций и атомарный коммит offset вместе с produce).
        Это работает для паттерна read-process-write **внутри** Kafka; как только
        результат уходит во внешнюю систему (БД), снова нужна идемпотентность
        приёмника.

      **Log compaction (Kafka)** — особый режim retention: для ключа хранится
      **последнее** значение, старые схлопываются. Идеально для changelog/CDC/
      «текущее состояние по ключу» (например, актуальный профиль пользователя),
      как persistent key-value поверх лога. У RabbitMQ прямого аналога нет.

      **RabbitMQ Streams** — относительно новый тип (лог-подобный, с offset и
      реплеем) — RabbitMQ подобрался к части сценариев Kafka, но экосистема
      стриминга (Kafka Streams, Connect, ksqlDB) остаётся за Kafka.

      **Backpressure.** RabbitMQ: при переполнении/нехватке памяти включает flow
      control (тормозит publisher'ов), потребление регулируется `prefetch`.
      Kafka: брокер не давит на producer напрямую — producer буферизует и может
      блокироваться/дропать по `buffer.memory`/`linger.ms`; потребитель сам
      контролирует темп (pull), риск — растущий lag и превышение
      `max.poll.interval.ms` (тогда ребаланс и дубли).

      **Как выбирать — предметно.**
      - **RabbitMQ:** очереди фоновых задач (обработать одному воркеру), сложный
        роутинг (topic/headers), RPC, ретраи с DLX и приоритеты, per-message TTL,
        средний объём, важна низкая latency и «умная» доставка. Классика для
        «task queue» микросервисов.
      - **Kafka:** event streaming и event sourcing, нужен **реплей** и хранение
        истории, **много независимых** потребителей одного потока, огромный
        throughput (телеметрия, логи, IoT, аналитика), stream processing,
        интеграция систем через шину событий, CDC (Debezium пишет в Kafka).
      - Часто в одной системе **оба**: Kafka как шина событий/лог, RabbitMQ как
        очередь конкретных задач. Обе не заменяют идемпотентность приёмника —
        она нужна в любом случае.
