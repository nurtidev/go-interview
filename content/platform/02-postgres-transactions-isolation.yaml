slug: postgres-transactions-isolation
section: platform
title: "Транзакции и уровни изоляции в PostgreSQL"
difficulty: senior
tags: [postgres, isolation]
question_md: |
  Объясните уровни изоляции транзакций в PostgreSQL, какие аномалии они
  предотвращают, как это связано с MVCC, и почему на Repeatable Read и
  Serializable приложение обязано уметь ретраить транзакцию.
answer_levels:
  - level: middle
    text_md: |
      ACID — Atomicity, Consistency, Isolation, Durability, набор гарантий
      транзакции. Классические аномалии: dirty read (чтение незакоммиченных
      данных другой транзакции), non-repeatable read (повторное чтение той
      же строки в одной транзакции даёт другой результат из-за коммита
      другой транзакции), phantom read (повторный range-запрос видит новые
      строки), lost update (две транзакции читают одно значение, обе
      пишут — одна перезапись теряется). PostgreSQL поддерживает 4 уровня из
      стандарта SQL: Read Uncommitted (в PG фактически работает как Read
      Committed — dirty read вообще не поддерживается), Read Committed
      (дефолт — каждый оператор видит снапшот на момент своего начала),
      Repeatable Read (снапшот фиксируется на начало транзакции) и
      Serializable (полная сериализуемость через SSI). Уровень задаётся
      через `BEGIN; SET TRANSACTION ISOLATION LEVEL ...;` или в параметрах
      подключения.
  - level: senior
    text_md: |
      В основе всего — MVCC: каждая строка хранит `xmin` (id транзакции,
      создавшей версию) и `xmax` (id транзакции, удалившей/обновившей её).
      Транзакция видит те версии, у которых `xmin` закоммичен и меньше или
      равен границе её снапшота, а `xmax` либо пуст, либо принадлежит
      транзакции, не видимой снапшоту. Это даёт читателям возможность не
      блокироваться писателями и наоборот — «читатели не блокируют писателей,
      писатели не блокируют читателей».

      На Read Committed каждый **оператор** берёт новый снапшот, поэтому
      два последовательных `SELECT` в одной транзакции могут увидеть разные
      данные (non-repeatable read допустим), а `UPDATE ... WHERE` может
      «нагнаться» за уже изменённой строкой (PostgreSQL перечитывает строку,
      если её `xmax` коммитнулся между началом и попыткой блокировки — EvalPlanQual).
      Lost update на Read Committed предотвращается явно через
      `SELECT ... FOR UPDATE`:

      ```sql
      BEGIN;
      SELECT balance FROM accounts WHERE id = 1 FOR UPDATE; -- блокирует строку
      UPDATE accounts SET balance = balance - 100 WHERE id = 1;
      COMMIT;
      ```

      Repeatable Read в PostgreSQL — это snapshot isolation: снапшот
      фиксируется один раз на начало транзакции, поэтому и non-repeatable
      read, и phantom read исключены (это сильнее, чем требует стандарт SQL
      для этого уровня). Но write skew всё ещё возможен: две транзакции
      читают непересекающиеся строки, каждая на основе прочитанного
      принимает решение и пишет в свою строку — итоговое состояние
      нарушает инвариант, который был бы соблюдён при последовательном
      выполнении (классический пример — два врача на дежурстве, оба видят
      что «ещё есть один дежурный» и оба уходят). На RR и Serializable при
      конфликте PostgreSQL кидает ошибку сериализации с кодом `40001`
      (`could not serialize access due to concurrent update`), и приложение
      обязано перезапустить транзакцию с начала — это часть контракта
      уровня, а не баг.
  - level: deep
    text_md: |
      Serializable в PostgreSQL реализован через SSI (Serializable
      Snapshot Isolation, алгоритм Cahill/Röhm/Fekete) — надстройка над
      Repeatable Read, которая дополнительно отслеживает «опасные» пары
      rw-конфликтов (одна транзакция читает то, что другая параллельно
      записывает) через `predicate locks` на строки, диапазоны индекса и
      даже целые страницы/таблицы (SIREAD locks, видны в
      `pg_locks` с `mode = SIReadLock`, они не блокируют, а только
      фиксируются для последующего анализа). Если движок обнаруживает цикл
      из двух rw-конфликтов между конкурентными транзакциями (паттерн
      T1 → T2 → T1), одна из них абортируется с `40001`, что и ловит write
      skew — единственный уровень изоляции в PG, который это делает.
      Накладные расходы SSI существенны (память на predicate locks, риск
      false positives — абортов там, где реального конфликта не было бы),
      поэтому это уровень «для корректности», а не для пропускной способности.

      Практическая эволюция: до PostgreSQL 9.1 существовало только Read
      Committed и Serializable-как-Repeatable-Read (полный SSI появился
      именно в 9.1). Важный нюанс для Go-сервисов: код с retry-логикой
      должен ретраить именно на уровне всей бизнес-транзакции (весь
      HTTP-хендлер или use-case), а не отдельного `SELECT`/`UPDATE`,
      потому что после ошибки `40001` транзакция уже в состоянии `aborted`
      и требует `ROLLBACK` + полного повторного выполнения логики с новым
      `BEGIN`. В `pgx`/`database/sql` это обычно оборачивают в функцию
      `WithRetry(ctx, db, fn)`, которая проверяет `pgErr.Code == "40001"`
      (или `"40P01"` для deadlock) и повторяет с экспоненциальным backoff и
      ограничением числа попыток. Смежный нюанс: снапшот в Repeatable Read
      держится всю транзакцию, что может задерживать `VACUUM` от очистки
      старых версий строк (аналог long-running transaction проблемы),
      поэтому долгие RR/Serializable транзакции — источник table bloat в
      высоконагруженных системах.
